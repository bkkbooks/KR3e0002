body:
  text: 血絡論第三十九血絡論第三十九黃帝曰願聞其奇邪而不在經者歧伯曰血絡是也黃帝曰刺血絡而仆者何也血出而射者何也血少黑而濁者何也血出清而半為汁者何也發針而腫者何也血出若多若少而面色蒼蒼者何也發針而面色不變而煩悗者何也多出血而不動搖者何也願聞其故歧伯曰脈氣盛而血虛者刺之則脫氣脫氣則仆血氣俱盛而陰氣多者其血滑刺之則射陽氣畜積久留而不寫者其血黑以濁故不能射新飲而液滲于絡而未合和于血也故血出而汁別焉其不新飲者身中有水久則為腫陰氣積于陽其氣因于絡故刺之血未出而氣先行故腫陰陽之氣其新相得而未和合因而寫之則陰陽俱脫表裏相離故脫色而蒼蒼然刺之血出多色不變而煩悗者刺絡而虛經虛經之屬于陰者陰脫故煩悗陰陽相得而合為痺者此為內溢于經外注于絡如是者陰陽俱有餘雖多出血而弗能虛也黃帝曰相之奈何歧伯曰血脈者盛堅橫以赤上下無常處小者如針大者如筯則而寫之萬全也故無失數矣失數而反各如其度黃帝曰針入而肉著者何也歧伯曰熱氣因于針則針熱熱則肉著于針故堅焉
