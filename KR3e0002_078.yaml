body:
  text: 九鍼論第七十八九鍼論第七十八黃帝曰余聞九鍼於夫子眾多博大矣余猶不能寤敢問九鍼焉生何因而有名歧伯曰九鍼者天地之大數也始於一而終於九故曰一以法天二以法地三以法人四以法時五以法音六以法律七以法星八以法風九以法野黃帝曰以鍼應九之數奈何歧伯曰夫聖人之起天地之數也一而九之故以立九野九而九之九九八十一以起黃鍾數焉以鍼應數也一者天也天者陽也五藏之應天者肺肺者五藏六府之蓋也皮者肺之合也人之陽也故為之治鍼必以大其頭而銳其末令無得深入而陽氣出二者地也人之所以應土者肉也故為之治鍼必筩其身而員其末令無得傷肉分傷則氣得竭三者人也人之所以成生者血脈也故為之治鍼必大其身而員其末令可以按脈勿陷以致其氣令邪氣獨出四者時也時者四時八風之客於經絡之中為瘤病者也故為之治鍼必筩其身而鋒其末令可以寫熱出血而痼病竭五者音也音者冬夏之分分於子午陰與陽別寒與熱爭兩氣相搏合為癰膿者也故為之治鍼必令其末如劍鋒可以取大膿六者律也律者調陰陽四時而合十二經脈虛邪客於經絡而為暴痺者也故為之治鍼必令尖如氂且員且銳中身微大以取暴氣七者星也星者人之七竅邪之所客於經而為痛痺舍於經絡者也故為之治鍼令尖如蚊䖟喙靜以徐往微以久留正氣因之真邪俱往出鍼而養者也八者風也風者人之股肱八節也八正之虛風八風傷人內舍於骨解腰脊節腠理之間為深痺也故為之治鍼必長其身鋒其末可以取深邪遠痺九者野也野者人之節解皮膚之間也淫邪流溢於身如風水之狀而溜不能過於機關大節者也故為之治鍼令尖如挺其鋒微員以取大氣之不能過於關節者也黃帝曰鍼之長短有數乎歧伯曰一曰鑱鍼者取法於巾鍼去末寸半卒銳之長一寸六分主熱在頭身也二曰員鍼取法於絮鍼筩其身而卯其鋒長一寸六分主治分間氣三曰鍉鍼取法於黍粟之銳長三寸半主按脈取氣令邪出四曰鋒鍼取法於絮鍼筩其身鋒其末長一寸六分主癰熱出血五曰鈹鍼取法於劍鋒廣二分半長四寸主大癰膿兩熱爭者也六曰員利鍼取法於氂鍼微大其末反小其身令可深內也長一寸六分主取癰痺者也七曰毫鍼取法於毫毛長一寸六分主寒熱痛痺在絡者也八曰長鍼取法於綦鍼長七寸主取深邪遠痺者也九曰大鍼取法於鋒鍼其鋒微員長四寸主取大氣不出關節者也鍼形畢矣此九鍼大小長短法也黃帝曰願聞身形應九野奈何歧伯曰請言身形之應九野也左足應立春其日戊寅己丑左脅應春分其日乙卯左手應立夏其日戊辰己巳膺喉首頭應夏至其日丙午右手應立秋其日戊申己未右脅應秋分其日辛酉右足應立冬其日戊戌己亥腰尻下竅應冬至其日壬子六府膈下三藏應中州其大禁大禁太一所在之日及諸戊己凡此九者善候八正所在之處所主左右上下身體有癰腫者欲治之無以其所直之日潰治之是謂天忌日也形樂志苦病生於脈治之以灸刺形苦志樂病生於筋治之以熨引形樂志樂病生於肉治之以鍼石形苦志苦病生於咽喝治之以甘藥形數驚恐筋脈不通病生於不仁治之以按摩醪藥是謂形五藏氣心主噫肺主欬肝主語脾主吞腎主欠六府氣膽為怒胃為氣逆噦大腸小腸為泄膀胱不約為遺溺下焦溢為水五味酸入肝辛入肺苦入心甘入脾鹹入腎淡入胃是謂五味五并精氣并肝則憂并心則喜并肺則悲并腎則恐并脾則畏是謂五精之氣并於藏也五惡肝惡風心惡熱肺惡寒腎惡燥脾惡濕此五藏氣所惡也五液心主汗肝主泣肺主涕腎主唾脾主涎此五液所出也五勞久視傷血久臥傷氣久坐傷肉久立傷骨久行傷筋此五久勞所病也五走酸走筋辛走氣苦走血鹹走骨甘走肉是謂五走也五裁病在筋無食酸病在氣無食辛病在骨無食鹹病在血無食苦病在肉無食甘口嗜而欲食之不可多也必自裁也命曰五裁五發陰病發於骨陽病發於血以味發於氣陽病發於冬陰病發於夏五邪邪入於陽則為狂邪入於陰則為血痺邪入於陽轉則為癲疾邪入於陰轉則為瘖陽入之於陰病靜陰出之於陽病喜怒五藏心藏神肺藏魄肝藏魂脾藏意腎藏精志也五主心主脈肺主皮肝主筋脾主肌腎主骨陽明多血多氣太陽多血少氣少陽多氣少血太陰多血少氣厥陰多血少氣少陰多氣少血故曰刺陽明出血氣刺太陽出血惡氣刺少陽出氣惡血刺太陰出血惡氣刺厥陰出血惡氣刺少陰出氣惡血也足陽明太陰為表裏少陽厥陰為表裏太陽少陰為表裏是謂足之陰陽也手陽明太陰為表裏少陽心主為表裏太陽少陰為表裏是謂手之陰陽也
