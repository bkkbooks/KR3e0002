body:
  text: 小鍼解第三小鍼解第三所謂易陳者易言也難入者難著于人也麤守形者守刺法也上守神者守人之血氣有餘不足可補寫也神客者正邪共會也神者正氣也客者邪氣也在門者邪循正氣之所出入也未覩其疾者先知邪正何經之疾也惡知其原者先知何經之病所取之處也刺之微在數遲者徐疾之意也麤守關者守四肢而不知血氣正邪之往來也上守機者知守氣也機之動不離其空中者知氣之虛實用鍼之徐疾也空中之機清淨以微者鍼以得氣密意守氣勿失也其來不可逢者氣盛不可補也其往不可追者氣虛不可寫也不可掛以髮者言氣易失也扣之不發者言不知補寫之意也血氣已盡而氣不下也知其往來者知氣之逆順盛虛也要與之期者知氣之可取之時也麤之闇者冥冥不知氣之微密也妙哉工獨有之者盡知鍼意也往者為逆者言氣之虛而小小者逆也來者為順者言形氣之平平者順也明知逆順正行無間者言知所取之處也迎而奪之者寫也追而濟之者補也所謂虛則實之者氣口虛而當補之也滿則泄之者氣口盛而當寫之也宛陳則除之者去血脈也邪勝則虛之者言諸經有盛者皆寫其邪也徐而疾則實者言徐內而疾出也疾而徐則虛者言疾內而徐出也言實與虛若有若無者言實者有氣虛者無氣也察後與先若亡若存者言氣之虛實補寫之先後也察其氣之已下與常存也為虛與實若得若失者言補者佖然若有得也寫則怳然若有失也夫氣之在脈也邪氣在上者言邪氣之中人也高故邪氣在上也濁氣在中者言水穀皆入于胃其精氣上注於肺濁溜于腸胃言寒溫不適飲食不節而病生于腸胃故命曰濁氣在中也清氣在下者言清濕地氣之中人也必從足始故曰清氣在下也鍼陷脈則邪氣出者取之上鍼中脈則濁氣出者取之陽明合也鍼大深則邪氣反沉者言淺浮之病不欲深刺也深則邪氣從之入故曰反沉也皮肉筋脈各有所處者言經絡各有所主也取五脈者死言病在中氣不足但用鍼盡大寫其諸陰之脈也取三陽之脈者唯言盡寫三陽之氣令病人恇然不復也奪陰者死言取尺之五里五往者也奪陽者狂正言也覩其色察其目知其散復一其形聽其動靜者言上工知相五色于目有知調尺寸小大緩急滑濇以言所病也知其邪正者知論虛邪與正邪之風也右主推之左持而御之者言持鍼而出入也氣至而去之者言補寫氣調而去之也調氣在于終始一者持心也節之交三百六十五會者絡脈之滲灌諸節者也所謂五藏之氣已絕于內者脈口氣內絕不至反取其外之病處與陽經之合有留鍼以致陽氣陽氣至則內重竭重竭則死矣其死也無氣以動故靜所謂五藏之氣已絕于外者脈口氣外絕不至反取其四末之輸有留鍼以致其陰氣陰氣至則陽氣反入入則逆逆則死矣其死也陰氣有餘故躁所以察其目者五藏使五色循明循明則聲章聲章者則言聲與平生異也
