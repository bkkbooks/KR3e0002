body:
  text: 雜病第二十六雜病第二十六厥挾脊而痛者至頂頭沈沈然目䀮䀮然腰脊強取足太陽膕中血絡厥胸滿面腫脣漯漯然暴言難甚則不能言取足陽明厥氣走喉而不能言手足凊大便不利取足少陰厥而腹嚮嚮然多寒氣腹中瀫瀫便溲難取足太陰嗌乾口中熱如膠取足少陰膝中痛取犢鼻以員利針發而間之針大如氂刺膝無疑喉痺不能言取足陽明能言取手陽明瘧不渴間日而作取足陽明渴而日作取手陽明齒痛不惡凊飲取足陽明惡凊飲取手陽明聾而不痛者取足少陽聾而痛者取手陽明衄而不止衃血流取足太陽衃血取手太陽不已刺宛骨下不已刺膕中出血腰痛痛上寒取足太陽陽明痛上熱取足厥陰不可以俯仰取足少陽中熱而喘取足少陰膕中血絡喜怒而不欲食言益小刺足太陰怒而多言刺足少陽顑痛刺手陽明與顑之盛脈出血項痛不可俯仰刺足太陽不可以顧刺手太陽也小腹滿大上走胃至心淅淅身時寒熱小便不利取足厥陰腹滿大便不利腹大亦上走胸嗌喘息喝喝然取足少陰腹滿食不化腹嚮嚮然不能大便取足太陰心痛引腰脊欲嘔取足少陰心痛腹脹嗇嗇然大便不利取足太陰心痛引背不得息刺足少陰不已取手少陽心痛引小腹滿上下無常處便溲難刺足厥陰心痛但短氣不足以息刺手太陰心痛當九節刺之按已刺按之立已不已上下求之得之立已顑痛刺足陽明曲周動脈見血立已不已按人迎于經立已氣逆上刺膺中陷者與下胸動脈腹痛刺臍左右動脈已刺按之立已不已刺氣街已刺按之立已痿厥為四末束悗乃疾解之日二不仁者十日而知無休病已止歲以草刺鼻嚏嚏而已無息而疾迎引之立已大驚之亦可已
