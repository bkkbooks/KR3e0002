body:
  text: 邪客第七十一邪客第七十一黃帝問于伯高曰夫邪氣之客人也或令人目不瞑不臥出者何氣使然伯高曰五穀入于胃也其糟粕津液宗氣分為三隧故宗氣積于胸中出于喉嚨以貫心脈而行呼吸焉營氣者泌其津液注之於脈化以為血以榮四末內注五藏六府以應刻數焉衛氣者出其悍氣之慓疾而先行於四末分肉皮膚之間而不休者也晝日行於陽夜行於陰常從足少陰之分間行於五藏六府今厥氣客於五藏六府則衛氣獨衛其外行於陽不得入於陰行於陽則陽氣盛陽氣盛則陽蹻陷不得入於陰陰虛故目不瞑黃帝曰善治之奈何伯高曰補其不足寫其有餘調其虛實以通其道而去其邪飲以半夏湯一劑陰陽已通其臥立至黃帝曰善此所謂決瀆壅塞經絡大通陰陽和得者也願聞其方伯高曰其湯方以流水千里以外者八升揚之萬遍取其清五升煮之炊以葦薪火沸置秫米一升治半夏五合徐炊令竭為一升半去其滓飲汁一小杯日三稍益以知為度故其病新發者覆杯則臥汗出則已矣久者三飲而已也黃帝問於伯高曰願聞人之肢節以應天地奈何伯高答曰天圓地方人頭圓足方以應之天有日月人有兩目地有九州人有九竅天有風雨人有喜怒天有雷電人有音聲天有四時人有四肢天有五音人有五藏天有六律人有六府天有冬夏人有寒熱天有十日人有手十指辰有十二人有足十指莖垂以應之女子不足二節以抱人形天有陰陽人有夫妻歲有三百六十五日人有三百六十節地有高山人有肩膝地有深谷人有腋膕地有十二經水人有十二經脈地有泉脈人有衛氣地有草蓂人有毫毛天有晝夜人有臥起天有列星人有牙齒地有小山人有小節地有山石人有高骨地有林木人有募筋地有聚邑人有䐃肉歲有十二月人有十二節地有四時不生草人有無子此人與天地相應者也黃帝問于歧伯曰余願聞持針之數內針之理縱舍之意扞皮開腠理奈何脈之屈折出入之處焉至而出焉至而止焉至而徐焉至而疾焉至而入六府之輸於身者余願盡聞少序別離之處離而入陰別而入陽此何道而從行願盡聞其方歧伯曰帝之所問針道乖矣黃帝曰願卒聞之歧伯曰手太陰之脈出於大指之端內屈循白肉際至本節之後大淵留以淡外屈上於本節下內屈與陰諸絡會於魚際數脈并注其氣滑利伏行壅骨之下外屈出於寸口而行上至於肘內廉入於大筋之下內屈上行臑陰入腋下內屈走肺此順行逆數之屈折也心主之脈出於中指之端內屈循中指內廉以上留於掌中伏行兩骨之間外屈出兩筋之間骨肉之際其氣滑利上二寸外屈出行兩筋之間上至肘內廉入於小筋之下留兩骨之會上入於胸中內絡於心脈黃帝曰手少陰之脈獨無腧何也歧伯曰少陰心脈也心者五藏六府之大主也精神之所舍也其藏堅固邪弗能容也容之則心傷心傷則神去神去則死矣故諸邪之在於心者皆在於心之包絡包絡者心主之脈也故獨無腧焉黃帝曰少陰獨無腧者不病乎歧伯曰其外經病而藏不病故獨取其經於掌後鋭骨之端其餘脈出入屈折其行之徐疾皆如手少陰心主之脈行也故本腧者皆因其氣之虛實疾徐以取之是謂因衝而寫因衰而補如是者邪氣得去真氣堅固是謂因天之序黃帝曰持針縱舍奈何歧伯曰必先明知十二經脈之本末皮膚之寒熱脈之盛衰滑澀其脈滑而盛者病日進虛而細者久以持大以澀者為痛痺陰陽如一者病難治其本末尚熱者病尚在其熱以衰者其病亦去矣持其尺察其肉之堅脆大小滑澀寒溫燥濕因視目之五色以知五藏而決死生視其血脈察其色以知其寒熱痛痺黃帝曰持針縱舍余未得其意也歧伯曰持針之道欲端以正安以靜先知虛實而行疾徐左手執骨右手循之無與肉果寫欲端以正補必閉膚輔針導氣邪得淫泆真氣得居黃帝曰扞皮開腠理奈何歧伯曰因其分肉左別其膚微內而徐端之適神不散邪氣得去黃帝問於歧伯曰人有八虛各何以候歧伯答曰以候五藏黃帝曰候之奈何歧伯曰肺心有邪其氣留於兩肘肝有邪其氣流于兩腋脾有邪其氣留于兩髀腎有邪其氣留于兩膕凡此八虛者皆機關之室真氣之所過血絡之所遊邪氣惡血固不得住留住留則傷筋絡骨節機關不得屈伸故痀攣也
