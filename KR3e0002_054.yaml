body:
  text: 天年第五十四天年第五十四黃帝問于歧伯曰願聞人之始生何氣築為基何立而為楯何失而死何得而生歧伯曰以母為基以父為楯失神者死得神者生也黃帝曰何者為神歧伯曰血氣已和榮衛已通五藏已成神氣舍心魂魄畢具乃成為人黃帝曰人之壽夭各不同或夭壽或卒死或病久願聞其道歧伯曰五藏堅固血脈和調肌肉解利皮膚緻密營衛之行不失其常呼吸微徐氣以度行六府化穀津液布揚各如其常故能長久黃帝曰人之壽百歲而死何以致之歧伯曰使道隧以長基牆高以方通調營衛三部三里起骨高肉滿百歲乃得終黃帝曰其氣之盛衰以至其死可得聞乎歧伯曰人生十歲五藏始定血氣已通其氣在下故好走二十歲血氣始盛肌肉方長故好趨三十歲五藏大定肌肉堅固血脈盛滿故好步四十歲五藏六府十二經脈皆大盛以平定腠理始踈榮華頹落髮頗斑白平盛不搖故好坐五十歲肝氣始衰肝葉始薄膽汁始滅目始不明六十歲心氣始衰苦憂悲血氣懈惰故好臥七十歲脾氣虛皮膚枯八十歲肺氣衰魄離故言善悞九十歲腎氣焦四藏經脈空虛百歲五藏皆虛神氣皆去形骸獨居而終矣黃帝曰其不能終壽而死者何如歧伯曰其五藏皆不堅使道不長空外以張喘息暴疾又卑基牆薄脈少血其肉不石數中風寒血氣虛脈不通真邪相攻亂而相引故中壽而盡也
