body:
  text: 歲露論第七十九歲露論第七十九黃帝問於歧伯曰經言夏日傷暑秋病瘧瘧之發以時其故何也歧伯對曰邪客於風府病循膂而下衛氣一日一夜常大會於風府其明日日下一節故其日作晏此其先客於脊背也故每至於風府則腠理開腠理開則邪氣入邪氣入則病作此所以日作尚晏也衛氣之行風府日下一節二十一日下至尾底二十二日入脊內注於伏衝之脈其行九日出於缺盆之中其氣上行故其病稍益至其內搏於五藏橫連募原其道遠其氣深其行遲不能日作故次日乃蓄積而作焉黃帝曰衛氣每至於風府腠理乃發發則邪入焉其衛氣日下一節則不當風府奈何歧伯曰風府無常衛氣之所應必開其腠理氣之所舍節則其府也黃帝曰善夫風之與瘧也相與同類而風常在而瘧特以時休何也歧伯曰風氣留其處瘧氣隨經絡沉以內搏故衛氣應乃作也帝曰善黃帝問於少師曰余聞四時八風之中人也故有寒暑寒則皮膚急而腠理閉暑則皮膚緩而腠理開賊風邪氣因得以入乎將必須八正虛邪乃能傷人乎少師答曰不然賊風邪氣之中人也不得以時然必因其開也其入深其內極病其病人也卒暴因其閉也其入淺以留其病也徐以遲黃帝曰有寒溫和適腠理不開然有卒病者其故何也少師答曰帝弗知邪入乎雖平居其腠理開閉緩急其故常有時也黃帝曰可得聞乎少師曰人與天地相參也與日月相應也故月滿則海水西盛人血氣積肌肉充皮膚緻毛髮堅腠理郤煙垢著當是之時雖遇賊風其入淺不深至其月郭空則海水東盛人氣血虛其衛氣去形獨居肌肉減皮膚縱腠理開毛髮殘膲理薄煙垢落當是之時遇賊風則其入深其病人也卒暴黃帝曰其有卒然暴死暴病者何也少師答曰三虛者其死暴疾也得三實者邪不能傷人也黃帝曰願聞三虛少師曰乘年之衰逢月之空失時之和因為賊風所傷是謂三虛故論不知三虛工反為粗帝曰願聞三實少師曰逢年之盛遇月之滿得時之和雖有賊風邪氣不能危之也黃帝曰善乎哉論明乎哉道請藏之金匱命曰三實然此一夫之論也黃帝曰願聞歲之所以皆同病者何因而然少師曰此八正之候也黃帝曰候之奈何少師曰候此者常以冬至之日太一立於叶蟄之宮其至也天必應之以風雨者矣風雨從南方來者為虛風賊傷人者也其以夜半至也萬民皆臥而弗犯也故其歲民小病其以晝至者萬民懈惰而皆中於虛風故萬民多病虛邪入客於骨而不發於外至其立春陽氣大發腠理開因立春之日風從西方來萬民又皆中於虛風此兩邪相搏經氣結代者矣故諸逢其風而遇其雨者命曰遇歲露焉因歲之和而少賊風者民少病而少死歲多賊風邪氣寒溫不和則民多病而死矣黃帝曰虛邪之風其所傷貴賤何如候之奈何少師答曰正月朔日太一居天留之宮其日西北風不雨人多死矣正月朔日平旦北風春民多死正月朔日平旦北風行民病多者十有三也正月朔日日中北風夏民多死正月朔日夕時北風秋民多死終日北風大病死者十有六正月朔日風從南方來命曰旱鄉從西方來命曰白骨將國有殃人多死亡正月朔日風從東方來發屋揚沙石國有大災也正月朔日風從東南方行春有死亡正月朔日天利溫不風糴賤民不病天寒而風糴貴民多病此所謂候歲之風殘傷人者也二月丑不風民多心腹病三月戌不溫民多寒熱四月巳不暑民多疸病十月申不寒民多暴死諸所謂風者皆發屋折樹木揚沙石起毫毛發腠理者也
