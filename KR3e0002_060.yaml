body:
  text: 玉版第六十玉版第六十黃帝曰余以小針為細物也夫子乃言上合之于天下合之于地中合之于人余以為過針之意矣願聞其故歧伯曰何物大於天乎夫大于針者惟五兵者焉五兵者死之備也非生之具且夫人者天地之鎮也其不可不參乎夫治民者亦唯針焉夫針之與五兵其孰小乎黃帝曰病之生時有喜怒不測飲食不節陰氣不足陽氣有餘營氣不行乃發為癰疽陰陽不通兩熱相搏乃化為膿小針能取之乎歧伯曰聖人不能使化者為之邪不可留也故兩軍相當旗幟相望白刃陳于中野者此非一日之謀也能使其民令行禁止士卒無白刃之難者非一日之教也須臾之得也夫至使身被癰疽之病膿血之聚者不亦離道遠乎夫癰疽之生膿血之成也不從天下不從地出積微之所生也故聖人自治于未有形也愚者遭其已成也黃帝曰其已形不豫遭膿已成不豫見為之奈何歧伯曰膿已成十死一生故聖人弗使已成而明為良方著之竹帛使能者踵而傳之後世無有終時者為其不豫遭也黃帝曰其已有膿血而後遭乎不導之以小針治乎歧伯曰以小治小者其功小以大治大者多害故其已成膿血者其唯砭石鈹鋒之所取也黃帝曰多害者其不可全乎歧伯曰其在逆順焉黃帝曰願聞逆順歧伯曰以為傷者其白眼青黑眼小是一逆也內藥而嘔者是二逆也腹痛渴甚是三逆也肩項中不便是四逆也音嘶色脫是五逆也除此五者為順矣黃帝曰諸病皆有逆順可得聞乎歧伯曰腹脹身熱脈大是一逆也腹鳴而滿四肢清泄其脈大是二逆也衄而不止脈大是三逆也咳且溲血脫形其脈小徑是四逆也咳脫形身熱脈小以疾是謂五逆也如是者不過十五日而死矣其腹大脹四末清脫形泄甚是一逆也腹脹便血其脈大時絶是二逆也咳溲血形肉脫脈搏是三逆也嘔血胸滿引背脈小而疾是四逆也咳嘔腹脹且飧泄其脈絶是五逆也如是者不及一時而死矣工不察此者而刺之是謂逆治黃帝曰夫子之言針甚駿以配天地上數天文下度地紀內別五藏外次六府經脈二十八會盡有周紀能殺生人不能起死者子能反之乎歧伯曰能殺生人不能起死者也黃帝曰余聞之則為不仁然願聞其道弗行於人歧伯曰是明道也其必然也其如刀劍之可以殺人如飲酒使人醉也雖勿診猶可知矣黃帝曰願卒聞之歧伯曰人之所受氣者穀也穀之所注者胃也胃者水穀氣血之海也海之所行雲氣者天下也胃之所出氣血者經隧也經隧者五藏六府之大絡也迎而奪之而已矣黃帝曰上下有數乎歧伯曰迎之五里中道而止五至而已五往而藏之氣盡矣故五五二十五而竭其輸矣此所謂奪其天氣者也非能絶其命而傾其壽者也黃帝曰願卒聞之歧伯曰窺門而刺之者死于家中入門而刺之者死于堂上黃帝曰善乎方明哉道請著之玉版以為重寶傳之後世以為刺禁令民勿敢犯也
