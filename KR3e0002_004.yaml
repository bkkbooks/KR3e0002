body:
  text: 邪氣藏府病形第四邪氣藏府病形第四黃帝問於歧伯曰邪氣之中人也奈何歧伯荅曰邪氣之中人高也黃帝曰高下有度乎歧伯曰身半已上者邪中之也身半已下者濕中之也故曰邪之中人也無有常中于陰則溜于府中于陽則溜于經黃帝曰陰之與陽也異名同類上下相會經絡之相貫如環無端邪之中人或中于陰或中于陽上下左右無有恒常其故何也歧伯曰諸陽之會皆在于面中人也方乘虛時及新用力若飲食汗出腠理開而中于邪中于面則下陽明中于項則下太陽中于頰則下少陽其中于膺背兩脅亦中其經黃帝曰其中于陰奈何歧伯荅曰中于陰者常從臂胻始夫臂與胻其陰皮薄其肉淖澤故俱受于風獨傷其陰黃帝曰此故傷其藏乎歧伯荅曰身之中于風也不必動藏故邪入于陰經則其藏氣實邪氣入而不能客故還之於府故中陽則溜于經中陰則溜于府黃帝曰邪之中人藏奈何歧伯曰愁憂恐懼則傷心形寒寒飲則傷肺以其兩寒相感中外皆傷故氣逆而上行有所墮墜惡血留內若有所大怒氣上而不下積于脅下則傷肝有所擊仆若醉入房汗出當風則傷脾有所用力舉重若入房過度汗出浴水則傷腎黃帝曰五藏之中風奈何歧伯曰陰陽俱感邪乃得往黃帝曰善哉黃帝問於歧伯曰首面與身形也屬骨連筋同血合於氣耳天寒則裂地凌冰其卒寒或手足懈惰然而其面不衣何也歧伯荅曰十二經脈三百六十五絡其血氣皆上于面而走空竅其精陽氣上走於目而為睛其別氣走於耳而為聽其宗氣上出於鼻而為臭其濁氣出於胃走脣舌而為味其氣之津液皆上燻于面而皮又厚其肉堅故天氣甚寒不能勝之也黃帝曰邪之中人其病形何如歧伯曰虛邪之中身也灑淅動形正邪之中人也微先見于色不知于身若有若無若亡若存有形無形莫知其情黃帝曰善哉黃帝問於歧伯曰余聞之見其色知其病命曰明按其脈知其病命曰神問其病知其處命曰工余願聞見而知之按而得之問而極之為之奈何歧伯荅曰夫色脈與尺之相應也如桴鼓影響之相應也不得相失也此亦本末根葉之出候也故根死則葉枯矣色脈形肉不得相失也故知一則為工知二則為神知三則神且明矣黃帝曰願卒聞之歧伯荅曰色青者其脈絃也赤者其脈鉤也黃者其脈代也白者其脈毛黑者其脈石見其色而不得其脈反得其相勝之脈則死矣得其相生之脈則病已矣黃帝問於歧伯曰五藏之所生變化之病形何如歧伯荅曰先定其五色五脈之應其病乃可別也黃帝曰色脈已定別之奈何歧伯曰調其脈之緩急小大滑濇而病變定矣黃帝曰調之奈何歧伯荅曰脈急者尺之皮膚亦急脈緩者尺之皮膚亦緩脈小者尺之皮膚亦減而少氣脈大者尺之皮膚亦賁而起脈滑者尺之皮膚亦滑脈濇者尺之皮膚亦濇凡此變者有微有甚故善調尺者不待於寸善調脈者不待於色能參合而行之者可以為上工上工十全九行二者為中工中工十全七行一者為下工下工十全六黃帝曰請問脈之緩急小大滑濇之病形何如歧伯曰臣請言五藏之病變也心脈急甚者為瘛瘲微急為心痛引背食不下緩甚為狂笑微緩為伏梁在心下上下行時唾血太甚為喉吤微大為心痺引背善淚出小甚為善噦微小為消癉滑甚為善渴微滑為心疝引臍小腹鳴濇甚為瘖微濇為血溢維厥耳鳴顛疾肺脈急甚為癲疾微急為肺寒熱怠惰欬唾血引腰背胸若鼻息肉不通緩甚為多汗微緩為痿瘻偏風頭以下汗出不可止太甚為脛腫微大為肺痺引胸背起惡日光小甚為泄微小為消癉滑甚為息賁上氣微滑為上下出血濇甚為嘔血微濇為鼠瘻在頸支腋之間下不勝其上其應善痠矣肝脈急甚者為惡言微急為肥氣在脅下若覆杯緩甚為善嘔微緩為水瘕痺也太甚為內癰善嘔衄微大為肝痺陰縮欬引小腹小甚為多飲微小為消癉滑甚為㿉疝微滑為遺溺濇甚為溢飲微濇為瘈攣筋痺脾脈急甚為瘈瘲微急為膈中食飲入而還出後沃沫緩甚為痿厥微緩為風痿四肢不用心慧然若無病太甚為擊仆微大為疝氣腹裏大膿血在腸胃之外小甚為寒熱微小為消癉滑甚為㿉癃微滑為蟲毒蛕蝎腹熱濇甚為腸㿉微濇為內㿉多下膿血腎脈急甚為骨癲疾微急為沉厥奔豚足不收不得前後緩甚為折脊微緩為洞洞者食不化下嗌還出太甚為陰痿微大為石水起臍已下至小腹腄腄然上至胃腕死不治小甚為洞泄微小為消癉滑甚為癃㿉微滑為骨痿坐不能起起則目無所見濇甚為大癰微濇為不月沉痔黃帝曰病之六變者刺之奈何歧伯荅曰諸急者多寒緩者多熱大者多氣少血小者血氣皆少滑者陽氣盛微有熱濇者多血少氣微有寒是故刺急者深內而久留之刺緩者淺內而疾發鍼以去其熱刺大者微寫其氣無出其血刺滑者疾發鍼而淺內之以寫其陽氣而去其熱刺濇者必中其脈隨其逆順而久留之必先按而循之已發鍼疾按其痏無令其血出以和其脈諸小者陰陽形氣俱不足勿取以鍼而調以甘藥也黃帝曰余聞五藏六府之氣滎輸所入為合令何道從入入安連過願聞其故歧伯荅曰此陽脈之別入于內屬於府者也黃帝曰滎輸與合各有名乎歧伯荅曰滎輸治外經合治內府黃帝曰治內府奈何歧伯曰取之於合黃帝曰合各有名乎歧伯荅曰胃合於三里大腸合入于巨虛上廉小腸合入于巨虛下廉三焦合入於委陽膀胱合入于委中央膽合入于陽陵泉黃帝曰取之奈何歧伯荅曰取之三里者低跗取之巨虛者舉足取之委陽者屈伸而索之委中者屈而取之陽陵泉者正豎膝予之齊下至委陽之陽取之取諸外經者揄申而從之黃帝曰願聞六府之病歧伯荅曰面熱者足陽明病魚絡血者手陽明病兩跗之上脈豎陷者足陽明病此胃脈也大腸病者腸中切痛而鳴濯濯冬日重感于寒即泄當臍而痛不能久立與胃同候取巨虛上廉胃病者腹䐜脹胃脘當心而痛上肢兩脅膈咽不通食飲不下取之三里也小腸病者小腹痛腰脊控睪而痛時窘之後當耳前熱若寒甚若獨肩上熱甚及手小指次指之間熱若脈陷者此其候也手太陽病也取之巨虛下廉三焦病者腹氣滿小腹尤堅不得小便窘急溢則水留即為脹候在足太陽之外大絡大絡在太陽少陽之間亦見于脈取委陽膀胱病者小腹偏腫而痛以手按之即欲小便而不得肩上熱若脈陷及足小指外廉及脛踝後皆熱若脈陷取委中央膽病者善太息口苦嘔宿汁心下澹澹恐人將捕之嗌中吤吤然數唾在足少陽之本末亦視其脈之陷下者灸之其寒熱者取陽陵泉黃帝曰刺之有道乎歧伯荅曰刺此者必中氣穴無中肉節中氣穴則鍼染于巷中肉節即皮膚痛補寫反則病益篤中筋則筋緩邪氣不出與其真相搏亂而不去反還內著用鍼不審以順為逆也
