body:
  text: 順氣一日分為四時第四十四順氣一日分為四時第四十四黃帝曰夫百病之所始生者必起于燥濕寒暑風雨陰陽喜怒飲食居處氣合而有形得藏而有名余知其然也夫百病者多以旦慧晝安夕加夜甚何也歧伯曰四時之氣使然黃帝曰願聞四時之氣歧伯曰春生夏長秋收冬藏是氣之常也人亦應之以一日分為四時朝則為春日中為夏日入為秋夜半為冬朝則人氣始生病氣衰故旦慧日中人氣長長則勝邪故安夕則人氣始衰邪氣始生故加夜半人氣入藏邪氣獨居于身故甚也黃帝曰其時有反者何也歧伯曰是不應四時之氣藏獨主其病者是必以藏氣之所不勝時者甚以其所勝時者起也黃帝曰治之奈何歧伯曰順天之時而病可與期順者為工逆者為粗黃帝曰善余聞刺有五變以主五輸願聞其數歧伯曰人有五藏五藏有五變五變有五輸故五五二十五輸以應五時黃帝曰願聞五變歧伯曰肝為牡藏其色青其時春其音角其味酸其日甲乙心為牡藏其色赤其時夏其日丙丁其音徵其味苦脾為牝藏其色黃其時長夏其日戊己其音宮其味甘肺為牝藏其色白其音商其時秋其日庚辛其味辛腎為牝藏其色黑其時冬其日壬癸其音羽其味鹹是為五變黃帝曰以主五輸奈何藏主冬冬刺井色主春春刺滎時主夏夏刺輸音主長夏長夏刺經味主秋秋刺合是謂五變以主五輸黃帝曰諸原安合以致六輸歧伯曰原獨不應五時以經合之以應其數故六六三十六輸黃帝曰何謂藏主冬時主夏音主長夏味主秋色主春願聞其故歧伯曰病在藏者取之井病變于色者取之滎病時間時甚者取之輸病變于音者取之經經滿而血者病在胃及以飲食不節得病者取之於合故命曰味主合是謂五變也
