body:
  text: 九鍼十二原第一九鍼十二原第一黃帝問於歧伯曰余子萬民養百姓而收其租稅余哀其不給而屬有疾病余欲勿使被毒藥無用砭石欲以微鍼通其經脈調其血氣營其逆順出入之會令可傳於後世必明為之法令終而不滅久而不絕易用難忘為之經紀異其章別其表裏為之終始令各有形先立鍼經願聞其情歧伯荅曰臣請推而次之令有綱紀始於一終於九焉請言其道小鍼之要易陳而難入麤守形上守神神乎神客在門未覩其疾惡知其原刺之微在速遲麤守關上守機機之動不離其空空中之機清靜而微其來不可逢其往不可追知機之道者不可掛以髮不知機道叩之不發知其往來要與之期麤之闇乎妙哉工獨有之往者為逆來者為順明知逆順正行無問逆而奪之惡得無虛追而濟之惡得無實迎之隨之以意和之鍼道畢矣凡用鍼者虛則實之滿則泄之宛陳則除之邪勝則虛之大要曰徐而疾則實疾而徐則虛言實與虛若有若無察後與先若存若亡為虛與實若得若失虛實之要九鍼最妙補寫之時以鍼為之寫曰必持內之放而出之排陽得鍼邪氣得泄按而引鍼是謂內溫血不得散氣不得出也補曰隨之隨之意若妄之若行若按如蟁䖟止如留如還去如絃絕令左屬右其氣故止外門已閉中氣乃實必無留血急取誅之持鍼之道堅者為寶正指直刺無鍼左右神在秋毫屬意病者審視血脈者刺之無殆方刺之時必在懸陽及與兩衛神屬勿去知病存亡血脈者在腧橫居視之獨澄切之獨堅九鍼之名各不同形一曰鑱鍼長一寸六分二曰員鍼長一寸六分三曰鍉鍼長三寸半四曰鋒鍼長一寸六分五曰鈹鍼長四寸廣二分半六曰員利鍼長一寸六分七曰毫鍼長三寸六分八曰長鍼長七寸九曰大鍼長四寸鑱鍼者頭大末銳去寫陽氣員鍼者鍼如卵形揩摩分間不得傷肌肉以寫分氣鍉鍼者鋒如黍粟之銳主按脈勿陷以致其氣鋒鍼者刃三隅以發痼疾鈹鍼者末如劍鋒以取大膿員利鍼者大如氂且員且銳中身微大以取暴氣毫鍼者尖如蟁䖟喙靜以徐往微以久留之而養以取痛痺長鍼者鋒利身薄可以取遠痺大鍼者尖如梃其鋒微員以寫機關之水也九鍼畢矣夫氣之在脈也邪氣在上濁氣在中清氣在下故鍼陷脈則邪氣出鍼中脈則濁氣出鍼大深則邪氣反沉病益故曰皮肉筋脈各有所處病各有所宜各不同形各以任其所宜無實無虛損不足而益有餘是謂甚病病益甚取五脈者死取三脈者恇奪陰者死奪陽者狂鍼害畢矣刺之而氣不至無問其數刺之而氣至乃去之勿復鍼鍼各有所宜各不同形各任其所為刺之要氣至而有效效之信若風之吹雲明乎若見蒼天刺之道畢矣黃帝曰願聞五藏六府所出之處歧伯曰五藏五腧五五二十五腧六府六腧六六三十六腧經脈十二絡脈十五凡二十七氣以上下所出為井所溜為滎所注為腧所行為經所入為合二十七氣所行皆在五腧也節之交三百六十五會知其要者一言而終不知其要流散無窮所言節者神氣之所遊行出入也非皮肉筋骨也覩其色察其目知其散復一其形聽其動靜知其邪正右主推之左持而御之氣至而去之凡將用鍼必先診脈視氣之劇易乃可以治也五藏之氣已絕於內而用鍼者反實其外是謂重竭重謁必死其死也靜治之者輒反其氣取腋與膺五藏之氣已絕於外而用鍼者反實其內是謂逆厥逆厥則必死其死也躁治之者反取四末刺之害中而不去則精泄害中而去則致氣精泄則病益甚而恇致氣則生為癰瘍五藏有六府六府有十二原十二原出於四關四關主治五藏五藏有疾當取之十二原十二原者五藏之所以稟三百六十五節氣味也五藏有疾也應出十二原十二原各有所出明知其原覩其應而知五藏之害矣陽中之少陰肺也其原出於大淵大淵二陽中之太陽心也其原出於大陵大陵二陰中之少陽肝也其原出於太衝太衝二陰中之至陰脾也其原出於太白太白二陰中之太陰腎也其原出於太谿太谿二膏之原出於鳩尾鳩尾一肓之原出於脖胦脖胦一凡此十二原者主治五藏六府之有疾者也脹取三陽飧泄取三陰今夫五藏之有疾也譬猶刺也猶污也猶結也猶閉也刺雖久猶可拔也污雖久猶可雪也結雖久猶可解也閉雖久猶可決也或言久疾之不可取者非其說也夫善用鍼者取其疾也猶拔刺也猶雪污也猶解結也猶決閉也疾雖久猶可畢也言不可治者未得其術也剌諸熱者如以手探湯刺寒清者如人不欲行陰有陽疾者取之下陵三里正往無殆氣下乃止不下復始也疾高而內者取之陰之陵泉疾高而外者取之陽之陵泉也
