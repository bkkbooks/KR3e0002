body:
  text: 九宮八風第七十七九宮八風第七十七大一常以冬至之日居叶蟄之宮四十六日明日居天留四十六日明日居倉門四十六日明日居陰洛四十五日明日居天宮四十六日明日居玄委四十六日明日居倉果四十六日明日居新洛四十五日明日復居叶蟄之宮曰冬至矣太一日遊以冬至之日居叶蟄之宮數所在日從一處至九日復反於一常如是無已終而復始太一移日天必應之以風雨以其日風雨則吉歲美民安少病矣先之則多雨後之則多汗太一在冬至之日有變占在君太一在春分之日有變占在相太一在中宮之日有變占在吏太一在秋分之日有變占在將太一在夏至之日有變占在百姓所謂有變者太一居五宮之日病風折樹木揚沙石各以其所主占貴賤因視風所從來而占之風從其所居之鄉來為實風主生長養萬物從其衝後來為虛風傷人者也主殺主害者謹候虛風而避之故聖人日避虛邪之道如避矢石然邪弗能害此之謂也是故太一入徙立於中宮乃朝八風以占吉凶也風從南方來名曰大弱風其傷人也內舍於心外在於脈氣主熱風從西南方來名曰謀風其傷人也內舍於脾外在於肌其氣主為弱風從西方來名曰剛風其傷人也內舍於肺外在於皮膚其氣主為燥風從西北方來名曰折風其傷人也內舍於小腸外在於手太陽脈脈絕則溢脈閉則結不通善暴死風從北方來名曰大剛風其傷人也內舍於腎外在於骨與肩背之膂筋其氣主為寒也風從東北方來名曰凶風其傷人也內舍於大腸外在於兩脅腋骨下及肢節風從東方來名曰嬰兒風其傷人也內舍於肝外在於筋紐其氣主為身濕風從東南方來名曰弱風其傷人也內舍於胃外在肌肉其氣主體重此八風皆從其虛之鄉來乃能病人三虛相搏則為暴病卒死兩實一虛病則為淋露寒熱犯其雨濕之地則為痿故聖人避風如避矢石焉其有三虛而偏中於邪風則為擊仆偏枯矣
