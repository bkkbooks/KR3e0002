body:
  text: 海論第三十三海論第三十三黃帝問于歧伯曰余聞刺法于夫子夫子之所言不離于營衛血氣夫十二經脈者內屬于府藏外絡于肢節夫子乃合之于四海乎歧伯荅曰人亦有四海十二經水經水者皆注于海海有東西南北命曰四海黃帝曰以人應之奈何歧伯曰人有髓海有血海有氣海有水穀之海凡此四者以應四海也黃帝曰遠乎哉夫子之合人天地四海也願聞應之奈可歧伯荅曰必先明知陰陽表裏滎輸所在四海定矣黃帝曰定之奈何歧伯曰胃者水穀之海其輸上在氣街下至三里衝脈者為十二經之海其輸上在于大杼下出于巨虛之上下廉膻中者為氣之海其輸上在于柱骨之上下前在于人迎腦為髓之海其輸上在于其蓋下在風府黃帝曰凡此四海者何利何害何生何敗歧伯曰得順者生得逆者敗知調者利不知調者害黃帝曰四海之逆順奈何歧伯曰氣海有餘者氣滿胸中悗息面赤氣海不足則氣少不足以言血海有餘則常想其身大怫然不知其所病血海不足亦常想其身小狹然不知其所病水穀之海有餘則腹滿水穀之海不足則饑不受穀食髓海有餘則輕勁多力自過其度髓海不足則腦轉耳鳴脛痠眩冒目無所見懈怠安臥黃帝曰余已聞逆順調之奈何歧伯曰審守其輸而調其虛實無犯其害順者得復逆者必敗黃帝曰善
