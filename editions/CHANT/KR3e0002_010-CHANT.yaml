body:
  text: 經脈第十經脈第十雷公問於黃帝曰禁脈之言凡刺之理經脈為始營其所行制其度量內次五藏外別六府願盡聞其道黃帝曰人始生先成精精成而腦髓生骨為榦脈為營筋為剛肉為牆皮膚堅而毛髮長穀入于胃脈道以通血氣乃行雷公曰願卒聞經脈之始生黃帝曰經脈者所以能決死生處百病調虛實不可不通肺手太陰之脈起于中焦下絡大腸還循胃口上膈屬肺從肺系橫出腋下下循臑內行少陰心主之前下肘中循臂內上骨下廉入寸口上魚循魚際出大指之端其支者從腕後直出次指內廉出其端是動則病肺脹滿膨膨而喘欬缺盆中痛甚則交兩手而瞀此為臂厥是主肺所生病者欬上氣喘渴煩心胸滿臑臂內前廉痛厥掌中熱氣盛有餘則肩背痛風寒汗出中風小便數而欠氣虛則肩背痛寒少氣不足以息溺色變為此諸病盛則寫之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者寸口大三倍于人迎虛者則寸口反小于人迎也大腸手陽明之脈起于大指次指之端循指上廉出合谷兩骨之間上入兩筋之中循臂上廉入肘外廉上臑外前廉上肩出髃骨之前廉上出于柱骨之會上下入缺盆絡肺下膈屬大腸其支者從缺盆上頸貫頰入下齒中還出挾口交人中左之右右之左上挾鼻孔是動則病齒痛頸腫是主津液所生病者目黃口乾鼽衂喉痺肩前臑痛大指次指痛不用氣有餘則當脈所過者熱腫虛則寒慄不復為此諸病盛則寫之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者人迎大三倍于寸口虛者人迎反小於寸口也胃足陽明之脈起於鼻之交頞中旁納太陽之脈下循鼻外入上齒中還出挾口環脣下交承漿卻循頤後下廉出大迎循頰車上耳前過客主人循髮際至額顱其支者從大迎前下人迎循喉嚨入缺盆下膈屬胃絡脾其直者從缺盆下乳內廉下挾臍入氣街中其支者起于胃口下循腹裏下至氣街中而合以下髀關抵伏兔下膝臏中下循脛外廉下足跗入中指內間其支者下廉三寸而別下入中指外間其支者別跗上入大指間出其端是動則病洒洒振寒善呻數欠顏黑病至則惡人與火聞木聲則惕然而驚心欲動獨閉戶塞牖而處甚則欲上高而歌棄衣而走賁響腹脹是為骭厥是主血所生病者狂瘧溫淫汗出鼽衂口喎脣胗頸腫喉痺大腹水腫膝臏腫痛循膺乳氣街股伏兔骭外廉足跗上皆痛中指不用氣盛則身以前皆熱其有餘于胃則消穀善饑溺色黃氣不足則身以前皆寒慄胃中寒則脹滿為此諸病盛則寫之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者人迎大三倍于寸口虛者人迎反小于寸口也脾足太陰之脈起于大指之端循指內側白肉際過核骨後上內踝前廉上踹內循脛骨後交出厥陰之前上膝股內前廉入腹屬脾絡胃上膈挾咽連舌本散舌下其支者復從胃別上膈注心中是動則病舌本強食則嘔胃脘痛腹脹善噫得後與氣則快然如衰身體皆重是主脾所生病者舌本痛體不能動搖食不下煩心心下急痛溏瘕泄水閉黃疸不能臥強立股膝內腫厥足大指不用為此諸病盛則寫之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者寸口大三倍于人迎虛者寸口反小于人迎也心手少陰之脈起于心中出屬心系下膈絡小腸其支者從心系上挾咽繫目系其直者復從心系卻上肺下出腋下下循臑內後廉行太陰心主之後下肘內循臂內後廉抵掌後脫骨之端入掌內後廉循小指之內出其端是動則病嗌乾心痛渴而欲飲是為臂厥是主心所生病者目黃脅痛臑臂內後廉痛厥掌中熱痛為此諸病盛則寫之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者寸口大再倍於人迎虛者寸口反小于人迎也小腸手太陽之脈起于小指之端循手外側上腕出踝中直上循臂骨下廉出肘內側兩筋之間上循臑外後廉出肩解繞肩胛交肩上入缺盆絡心循咽下膈抵胃屬小腸其支者從缺盆循頸上頰至目銳眥卻入耳中其支者別頰上䪼抵鼻至目內眥斜絡于顴是動則病嗌痛頷腫不可以顧肩似拔臑似折是主液所生病者耳聾目黃頰腫頸頷肩臑肘臂外後廉痛為此諸病盛則寫之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者人迎大再倍于寸口虛者人迎反小于寸口也膀胱足太陽之脈起于目內眥上額交巔其支者從巔至耳上角其直者從巔入絡腦還出別下項循肩髆內挾脊抵腰中入循膂絡腎屬膀胱其支者從腰中下挾脊貫臀入膕中其支者從髆內左右別下貫胛挾脊內過髀樞循髀外從後廉下合膕中以下貫踹內出外踝之後循京骨至小指外側是動則病衝頭痛目似脫項如拔脊痛腰似折髀不可以曲膕如結踹如裂是為踝厥是主筋所生病者痔瘧狂癲疾頭顖項痛目黃淚出鼽衂項背腰尻膕踹腳皆痛小指不用為此諸病盛則寫之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者人迎大再倍于寸口虛者人迎反小于寸口也腎足少陰之脈起于小指之下邪走足心出于然谷之下循內踝之後別入跟中以上踹內出膕內廉上股內後廉貫脊屬腎絡膀胱其直者從腎上貫肝膈入肺中循喉嚨挾舌本其支者從肺出絡心注胸中是動則病饑不欲食面如漆柴欬唾則有血喝喝而喘坐而欲起目䀮䀮如無所見心如懸若饑狀氣不足則善恐心惕惕如人將捕之是為骨厥是主腎所生病者口熱舌乾咽腫上氣嗌乾及痛煩心心痛黃疽腸澼脊股內後廉痛痿厥嗜臥足下熱而痛為此諸病盛則寫之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之灸則強食生肉緩帶披髮大杖重履而步盛者寸口大再倍于人迎虛者寸口反小于人迎也心主手厥陰心包絡之脈起于胸中出屬心包絡下膈歷絡三膲其支者循胸出脅下腋三寸上抵腋下循臑內行太陰少陰之間入肘中下臂行兩筋之間入掌中循中指出其端其支者別掌中循小指次指出其端是動則病手心熱臂肘攣急腋腫甚則胸脅支滿心中憺憺火動面赤目黃喜笑不休是主脈所生病者煩心心痛掌中熱為此諸病盛則寫之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者寸口大一倍于人迎虛者寸口反小于人迎也三焦手少陽之脈起于小指次指之端上出兩指之間循手表腕出臂外兩骨之間上貫肘循臑外上肩而交出足少陽之後入缺盆布膻中散落心包下膈循屬三焦其支者從膻中上出缺盆上項繫耳後直上出耳上角以屈下頰至䪼其支者從耳後入耳中出走耳前過客主人前交頰至目銳眥是動則病耳聾渾渾焞焞嗌腫喉痺是主氣所生病者汗出目銳眥痛頰痛耳後肩臑肘臂外皆痛小指次指不用為此諸病盛則寫之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者人迎大一倍于寸口虛者人迎反小于寸口也膽足少陽之脈起于目銳眥上抵頭角下耳後循頸行手少陽之前至肩上卻交出手少陽之後入缺盆其支者從耳後入耳中出走耳前至目銳眥後其支者別銳眥下大迎合于手少陽抵于䪼下加頰車下頸合缺盆以下胸中貫膈絡肝屬膽循脅裏出氣街繞毛際橫入髀厭中其直者從缺盆下腋循胸過季脅下合髀厭中以下循髀陽出膝外廉下外輔骨之前直下抵絕骨之端下出外踝之前循足跗上入小指次指之間其支者別跗上入大指之間循大指歧骨內出其端還貫爪甲出三毛是動則病口苦善太息心脅痛不能轉側甚則面微有塵體無膏澤足外反熱是為陽厥是主骨所生病者頭痛頷痛目銳眥痛缺盆中腫痛腋下腫馬刁俠癭汗出振寒瘧胸脅肋髀膝外至脛絕骨外髁前及諸節皆痛小指次指不用為此諸病盛則寫之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者人迎大一倍于寸口虛者人迎反小于寸口也肝足厥陰之脈起于大指叢毛之際上循足跗上廉去內踝一寸上踝八寸交出太陰之後上膕內廉循股陰入毛中過陰器抵小腹挾胃屬肝絡膽上貫膈布脅肋循喉嚨之後上入頏顙連目系上出額與督脈會于巔其支者從目系下頰裏環脣內其支者復從肝別貫膈上注肺是動則病腰痛不可以俛仰丈夫㿉疝婦人少腹腫甚則嗌乾面塵脫色是肝所生病者胸滿嘔逆飧泄狐疝遺溺閉癃為此諸病盛則寫之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者寸口大一倍于人迎虛者寸口反小于人迎也手太陰氣絕則皮毛焦太陰者行氣溫于皮毛者也故氣不榮則皮毛焦皮毛焦則津液去皮節津液去皮節者則爪枯毛折毛折者則毛先死丙篤丁死火勝金也手少陰氣絕則脈不通脈不通則血不流血不流則髦色不澤故其面黑如漆柴者血先死壬篤癸死水勝火也足太陰氣絕者則脈不榮肌肉脣舌者肌肉之本也脈不榮則肌肉軟肌肉軟則舌萎人中滿人中滿則脣反脣反者肉先死甲篤乙死木勝土也足少陰氣絕則骨枯少陰者冬脈也伏行而濡骨髓者也故骨不濡則肉不能著也骨肉不相親則肉軟卻肉軟卻故齒長而垢髮無澤髮無澤者骨先死戊篤己死土勝水也足厥陰氣絕則筋絕厥陰者肝脈也肝者筋之合也筋者聚于陰氣而脈絡于舌本也故脈弗榮則筋急筋急則引舌與卵故脣青舌卷卵縮則筋先死庚篤辛死金勝木也五陰氣俱絕則目系轉轉則目運目運者為志先死志先死則遠一日半死矣六陽氣絕則陰與陽相離離則腠理發泄絕汗乃出故旦占夕死夕占旦死經脈十二者伏行分肉之間深而不見其常見者足太陰過于外踝之上無所隱故也諸脈之浮而常見者皆絡脈也六經絡手陽明少陽之大絡起于五指間上合肘中飲酒者衛氣先行皮膚先充絡脈絡脈先盛故衛氣已平營氣乃滿而經脈大盛脈之卒然動者皆邪氣居之留于本末不動則熱不堅則陷且空不與眾同是以知其何脈之動也雷公曰何以知經脈之與絡脈異也黃帝曰經脈者常不可見也其虛實也以氣口知之脈之見者皆絡脈也雷公曰細子無以明其然也黃帝曰諸絡脈皆不能經大節之間必行絕道而出入復合于皮中其會皆見于外故諸刺絡脈者必刺其結上甚血者雖無結急取之以寫其邪而出其血留之發為痺也凡診絡脈脈色青則寒且痛赤則有熱胃中寒手魚之絡多青矣胃中有熱魚際絡赤其暴黑者留久痺也其有赤有黑有青者寒熱氣也其青短者少氣也凡刺寒熱者皆多血絡必間日而一取之血盡而止乃調其虛實其小而短者少氣甚者寫之則悶悶甚則仆不得言悶則急坐之也手太陰之別名曰列缺起于腕上分間並太陰之經直入掌中散入于魚際其病實則手銳掌熱虛則欠㰦小便遺數取之去腕半寸別走陽明也手少陰之別名曰通里去腕一寸半別而上行循經入于心中繫舌本屬目系其實則支膈虛則不能言取之掌後一寸別走太陽也手心主之別名曰內關去腕二寸出于兩筋之間循經以上繫于心包絡心系實則心痛虛則為頭強取之兩筋間也手太陽之別名曰支正上腕五寸內注少陰其別者上走肘絡肩髃實則節弛肘廢虛則生肬小者如指痂疥取之所別也手陽明之別名曰偏歷去腕三寸別入太陰其別者上循臂乘肩髃上曲頰偏齒其別者入耳合于宗脈實則齲聾虛則齒寒痺隔取之所別也手少陽之別名曰外關去腕二寸外遶臂注胸中合心主病實則肘攣虛則不收取之所別也足太陽之別名曰飛陽去踝七寸別走少陰實則鼽窒頭背痛虛則鼽衄取之所別也足少陽之別名曰光明去踝五寸別走厥陰下絡足跗實則厥虛則痿躄坐不能起取之所別也足陽明之別名曰豐隆去踝八寸別走太陰其別者循脛骨外廉上絡頭項合諸經之氣下絡喉嗌其病氣逆則喉痺瘁瘖實則狂巔虛則足不收脛枯取之所別也足太陰之別名曰公孫去本節之後一寸別走陽明其別者入絡腸胃厥氣上逆則霍亂實則腸中切痛虛則鼓脹取之所別也足少陰之別名曰大鍾當踝後繞跟別走太陽其別者并經上走于心包下外貫腰脊其病氣逆則煩悶實則閉癃虛則腰痛取之所別者也足厥陰之別名曰蠡溝去內踝五寸別走少陽其別者徑脛上睪結于莖其病氣逆則睪腫卒疝實則挺長虛則暴癢取之所別也任脈之別名曰尾翳下鳩尾散于腹實則腹皮痛虛則癢搔取之所別也督脈之別名曰長強挾膂上項散頭上下當肩胛左右別走太陽入貫膂實則脊強虛則頭重高搖之挾脊之有過者取之所別也脾之大絡名曰大包出淵腋下三寸布胸脅實則身盡痛虛則百節盡皆縱此脈若羅絡之血者皆取之脾之大絡脈也凡此十五絡者實則必見虛則必下視之不見求之上下人經不同絡脈異所別也
