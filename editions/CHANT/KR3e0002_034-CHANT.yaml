body:
  text: 五亂第三十四五亂第三十四黃帝曰經脈十二者別為五行分為四時何失而亂何得而治歧伯曰五行有序四時有分相順則治相逆則亂黃帝曰何謂相順歧伯曰經脈十二者以應十二月十二月者分為四時四時者春秋冬夏其氣各異營衛相隨陰陽已和清濁不相干如是則順之而治黃帝曰何謂逆而亂歧伯曰清氣在陰濁氣在陽營氣順脈衛氣逆行清濁相干亂于胸中是謂大悗故氣亂于心則煩心密嘿俛首靜伏亂于肺則俛仰喘喝接手以呼亂于腸胃則為霍亂亂于臂脛則為四厥亂于頭則為厥逆頭重眩仆黃帝曰五亂者刺之有道乎歧伯曰有道以來有道以去審知其道是謂身寶黃帝曰善願聞其道歧伯曰氣在于心者取之手少陰心主之輸氣在於肺者取之手太陰滎足少陰輸氣在于腸胃者取之足太陰陽明不下者取之三里氣在于頭者取之天柱大杼不知取足太陽滎輸氣在于臂足取之先去血脈後取其陽明少陽之滎輸黃帝曰補寫奈何歧伯曰徐入徐出謂之導氣補寫無形謂之同精是非有餘不足也亂氣之相逆也黃帝曰允乎哉道明乎哉論請著之玉版命曰治亂也
