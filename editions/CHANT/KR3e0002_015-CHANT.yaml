body:
  text: 五十營第十五五十營第十五黃帝曰余願聞五十營奈何歧伯荅曰天周二十八宿宿三十六分人氣行一周千八分日行二十八宿人經脈上下左右前後二十八脈周身十六丈二尺以應二十八宿漏水下百刻以分晝夜故人一呼脈再動氣行三寸一吸脈亦再動氣行三寸呼吸定息氣行六寸十息氣行六尺日行二分二百七十息氣行十六丈二尺氣行交通于中一周于身下水二刻日行二十五分五百四十息氣行再周于身下水四刻日行四十分二千七百息氣行十周于身下水二十刻日行五宿二十分一萬三千五百息氣行五十營于身水下百刻日行二十八宿漏水皆盡脈終矣所謂交通者并行一數也故五十營備得盡天地之壽矣凡行八百一十丈也
