body:
  text: 熱病第二十三熱病第二十三偏枯身偏不用而痛言不變志不亂病在分腠之間巨鍼取之益其不足損其有餘乃可復也痱之為病也身無痛者四肢不收智亂不甚其言微知可治甚則不能言不可治也病先起于陽後入于陰者先取其陽後取其陰浮而取之熱病三日而氣口靜人迎躁者取之諸陽五十九刺以寫其熱而出其汗實其陰以補其不足者身熱甚陰陽皆靜者勿刺也其可刺者急取之不汗出則泄所謂勿刺者有死徵也熱病七日八日脈口動喘而短者急刺之汗且自出淺刺手大指間熱病七日八日脈微小病者溲血口中乾一日半而死脈代者一日死熱病已得汗出而脈尚躁喘且復熱勿刺膚喘甚者死熱病七日八日脈不躁躁不散數後三日中有汗三日不汗四日死未曾汗者勿腠刺之熱病先膚痛窒鼻充面取之皮以第一鍼五十九苛軫鼻索皮于肺不得索之火火者心也熱病先身濇倚而熱煩悗乾脣口嗌取之皮以第一鍼五十九膚脹口乾寒汗出索脈于心不得索之水水者腎也熱病嗌乾多飲善驚臥不能起取之膚肉以第六鍼五十九目眥青索肉于脾不得索之木木者肝也熱病面青腦痛手足躁取之筋間以第四鍼于四逆筋躄目浸索筋于肝不得索之金金者肺也熱病數驚瘛瘲而狂取之脈以第四鍼急寫有餘者癲疾毛髮去索血于心不得索之水水者腎也熱病身重骨痛耳聾而好瞑取之骨以第四鍼五十九刺骨病不食齧齒耳青索骨于腎不得索之土土者脾也熱病不知所痛耳聾不能自收口乾陽熱甚陰頗有寒者熱在髓死不可治熱病頭痛顳顬目𤸪脈痛善衄厥熱病也取之以第三鍼視有餘不足寒熱痔熱病體重腸中熱取之以第四鍼於其腧及下諸指間索氣于胃胳得氣也熱病挾臍急痛胸脅滿取之湧泉與陰陵泉取以第四鍼鍼嗌裏熱病而汗且出及脈順可汗者取之魚際大淵大都大白寫之則熱去補之則汗出汗出大甚取內踝上橫脈以止之熱病已得汗而脈尚躁盛此陰脈之極也死其得汗而脈靜者生熱病者脈尚盛躁而不得汗者此陽脈之極也死脈盛躁得汗靜者生熱病不可刺者有九一曰汗不出大顴發赤噦者死二曰泄而腹滿甚者死三曰目不明熱不已者死四曰老人嬰兒熱而腹滿者死五曰汗不出嘔下血者死六曰舌本爛熱不已者死七曰欬而衄汗不出出不至足者死八曰髓熱者死九曰熱而痙者死腰折瘈瘲齒噤齘也凡此九者不可刺也所謂五十九刺者兩手外內側各三凡十二痏五指間各一凡八痏足亦如是頭入髮一寸傍三分各三凡六痏更入髮三寸邊五凡十痏耳前後口下者各一項中一凡六痏巔上一顖會一髮際一廉泉一風池二天柱二氣滿胸中喘息取足太陰大指之端去爪甲如薤葉寒則留之熱則疾之氣下乃止心疝暴痛取足太陰厥陰盡刺去其血絡喉痺舌卷口中乾煩心心痛臂內廉痛不可及頭取手小指次指爪甲下去端如韭葉目中赤痛從內眥始取之陰蹻風痙身反折先取足太陽及膕中及血絡出血中有寒取三里癃取之陰蹻及三毛上及血絡出血男子如蠱女子如怚身體腰脊如解不欲飲食先取湧泉見血視跗上盛者盡見血也
