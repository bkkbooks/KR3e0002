body:
  text: 背腧第五十一背腧第五十一黃帝問于歧伯曰願聞五藏之腧出于背者歧伯曰胸中大腧在杼骨之端肺腧在三焦之間心腧在五焦之間膈腧在七焦之間肝腧在九焦之間脾腧在十一焦之間腎腧在十四焦之間背挾脊相去三寸所則欲得而驗之按其處應在中而痛解乃其腧也灸之則可刺之則不可氣盛則寫之虛則補之以火補者毋吹其火須自滅也以火寫者疾吹其火傳其艾須其火滅也
