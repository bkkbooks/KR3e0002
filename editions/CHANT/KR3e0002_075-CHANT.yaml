body:
  text: 刺節真邪第七十五刺節真邪第七十五黃帝問于歧伯曰余聞刺有五節奈何歧伯曰固有五節一曰振埃二曰發矇三曰去爪四曰徹衣五曰解惑黃帝曰夫子言五節余未知其意歧伯曰振埃者刺外經去陽病也發矇者刺府輸去府病也去爪者刺關節肢絡也徹衣者盡刺諸陽之奇輸也解惑者盡知調陰陽補寫有餘不足相傾移也黃帝曰刺節言振埃夫子乃言刺外經去陽病余不知其所謂也願卒聞之歧伯曰振埃者陽氣大逆上滿於胸中憤瞋肩息大氣逆上喘喝坐伏病惡埃煙䭇不得息請言振埃尚疾於振埃黃帝曰善取之何如歧伯曰取之天容黃帝曰其欬上氣窮詘胸痛者取之奈何歧伯曰取之廉泉黃帝曰取之有數乎歧伯曰取天容者無過一里取廉泉者血變而止帝曰善哉黃帝曰刺節言發矇余不得其意夫發矇者耳無所聞目無所見夫子乃言刺府輸去府病何輸使然願聞其故歧伯曰妙乎哉問也此刺之大約鍼之極也神明之類也口說書卷猶不能及也請言發矇耳尚疾於發矇也黃帝曰善願卒聞之歧伯曰刺此者必於日中刺其聽宮中其眸子聲聞於耳此其輸也黃帝曰善何謂聲聞於耳歧伯曰刺邪以手堅按其兩鼻竅而疾偃其聲必應於鍼也黃帝曰善此所謂弗見為之而無目視見而取之神明相得者也黃帝曰刺節善去爪夫子乃言刺關節肢絡願卒聞之歧伯曰腰脊者身之大關節也肢脛者人之管以趨翔也莖垂者身中之機陰精之候津液之道也故飲食不節喜怒不時津液內溢乃下留於睪血道不通日大不休俛仰不便趨翔不能此病榮然有水不上不下鈹石所取形不可匿常不得蔽故命曰去爪帝曰善黃帝曰刺節言徹衣夫子乃言盡刺諸陽之奇輸未有常處也願卒聞之歧伯曰是陽氣有餘而陰氣不足陰氣不足則內熱陽氣有餘則外熱內熱相搏熱於懷炭外畏綿帛近不可近身又不可近席腠理閉塞則汗不出舌焦脣槁腊乾嗌燥飲食不讓美惡黃帝曰善取之奈何歧伯曰或之於其天府大杼三痏又刺中膂以去其熱補足手太陰以去其汗熱去汗稀疾於徹衣黃帝曰善黃帝曰刺節言解惑夫子乃言盡知調陰陽補寫有餘不足相傾移也惑何以解之歧伯曰大風在身血脈偏虛虛者不足實者有餘輕重不得傾側宛伏不知東西不知南北乍上乍下乍反乍覆顛倒無常甚於迷惑黃帝曰善取之奈何歧伯曰寫其有餘補其不足陰陽平復用鍼若此疾於解惑黃帝曰善請藏之靈蘭之室不敢妄出也黃帝曰余聞刺有五邪何謂五邪歧伯曰病有持癰者有容大者有狹小者有熱者有寒者是謂五邪黃帝曰刺五邪奈何歧伯曰凡刺五邪之方不過五章痺熱消滅腫聚散亡寒痺益溫小者益陽大者必去請道其方凡刺癰邪無迎隴易俗移性不得膿脆道更行去其鄉不安處所乃散亡諸陰陽過癰者取之其輸寫之凡刺大邪日以小泄奪其有餘乃益虛剽其通鍼其邪肌肉親視之毋有反其真刺諸陽分肉間凡刺小邪日以大補其不足乃無害視其所在迎之界遠近盡至其不得外侵而行之乃自費刺分肉間凡刺熱邪越而蒼出遊不歸乃無病為開通辟門戶使邪得出病乃已凡刺寒邪日以溫徐往徐來致其神門戶已閉氣不分虛實得調其氣存也黃帝曰官鍼奈何歧伯曰刺癰者用鈹鍼刺大者用鋒鍼刺小者用員利鍼刺熱者用鑱鍼刺寒者用毫鍼也請言解論與天地相應與四時相副人參天地故可為解下有漸洳上生葦蒲此所以知形氣之多少也陰陽者寒暑也熱則滋雨而在上根荄少汁人氣在外皮膚緩腠理開血氣減汗大泄皮淖澤寒則地凍水冰人氣在中皮膚緻腠理閉汗不出血氣強肉堅濇當是之時善行水者不能往冰善穿地者不能鑿凍善用鍼者亦不能取四厥血脈凝結堅搏不往來者亦未可即柔故行水者必待天溫冰釋凍解而水可行地可穿也人脈猶是也治厥者必先熨調和其經掌與腋肘與腳項與脊以調之火氣已通血脈乃行然後視其病脈淖澤者刺而平之堅緊者破而散之氣下乃止此所謂以解結者也用鍼之類在於調氣氣積於胃以通營衛各行其道宗氣留於海其下者注於氣街其上者走於息道故厥在於足宗氣不下脈中之血凝而留止弗之火調弗能取之用鍼者必先察其經絡之實虛切而循之按而彈之視其應動者乃後取之而下之六經調者謂之不病雖病謂之自已也一經上實下虛而不通者此必有橫絡盛加於大經令之不通視而寫之此所謂解結也上寒下熱先刺其項太陽久留之已刺則熨項與肩胛令熱下合乃止此所謂推而上之者也上熱下寒視其虛脈而陷之於經絡者取之氣下乃止此所謂引而下之者也大熱徧身狂而妄見妄聞妄言視足陽明及大絡取之虛者補之血而實者寫之因其偃臥居其頭前以兩手四指挾按頸動脈久持之卷而切推下至缺盆中而復止如前熱去乃止此所謂推而散之者也黃帝曰有一脈生數十病者或痛或癰或熱或寒或痒或痺或不仁變化無窮其故何也歧伯曰此皆邪氣之所生也黃帝曰余聞氣者有真氣有正氣有邪氣何謂真氣歧伯曰真氣者所受於天與穀氣并而充身也正氣者正風也從一方來非實風又非虛風也邪氣者虛風之賊傷人也其中人也深不能自去正風者其中人也淺合而自去其氣來柔弱不能勝真氣故自去虛邪之中人也洒淅動形起毫毛而發腠理其入深內搏於骨則為骨痺搏於筋則為筋攣搏於脈中則為血閉不通則為癰搏於肉與衛氣相搏陽勝者則為熱陰勝者則為寒寒則真氣去去則虛虛則寒搏於皮膚之間其氣外發腠理開毫毛搖氣往來行則為痒留而不去則痺衛氣不行則為不仁虛邪徧容於身半其入深內居榮衛榮衛稍衰則真氣去邪氣獨留發為偏枯其邪氣淺者脈偏痛虛邪之入於身也深寒與熱相搏久留而內著寒勝其熱則骨疼肉枯熱勝其寒則爛肉腐肌為膿內傷骨內傷骨為骨蝕有所疾前筋筋屈不得伸邪氣居其間而不反發於筋溜有所結氣歸之衛氣留之不得反津液久留合而為腸溜久者數歲乃成以手按之柔已有所結氣歸之津液留之邪氣中之凝結日以易甚連以聚居為昔瘤以手按之堅有所結深中骨氣因於骨骨與氣并日以益大則為骨疽有所結中於肉宗氣歸之邪留而不去有熱則化而為膿無熱則為肉疽凡此數氣者其發無常處而有常名也
