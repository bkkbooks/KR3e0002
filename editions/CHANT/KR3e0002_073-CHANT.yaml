body:
  text: 官能第七十三官能第七十三黃帝問于歧伯曰余聞九鍼於夫子眾多矣不可勝數余推而論之以為一紀余司誦之子聽其理非則語余請其正道令可久傳後世無患得其人乃傳非其人勿言歧伯稽首再拜曰請聽聖王之道黃帝曰用鍼之理必知形氣之所在左右上下陰陽表裏血氣多少行之逆順出入之合謀伐有過知解結知補虛寫實上下氣門明通於四海審其所在寒熱淋露以輸異處審於調氣明於經隧左右肢絡盡知其會寒與熱爭能合而調之虛與實鄰知決而通之左右不調把而行之明於逆順乃知可治陰陽不奇故知起時審於本末察其寒熱得邪所在萬刺不殆知官九鍼刺道畢矣明於五輸徐疾所在屈伸出入皆有條理言陰與陽合於五行五藏六府亦有所藏四時八風盡有陰陽各得其位合於明堂各處色部五藏六府察其所痛左右上下知其寒溫何經所在審皮膚之寒溫滑濇知其所苦膈有上下知其氣所在先得其道稀而踈之稍深以留故能徐入之大熱在上推而下之從下上者引而去之視前痛者常先取之大寒在外留而補之入於中者從合寫之鍼所不為灸之所宜上氣不足推而揚之下氣不足積而從之陰陽皆虛火自當之厥而寒甚骨廉陷下寒過於膝下陵三里陰絡所過得之留止寒入於中推而行之經陷下者火則當之結絡堅緊火所治之不知所苦兩蹻之下男陰女陽良工所禁鍼論畢矣用鍼之服必有法則上視天光下司八正以辟奇邪而觀百姓審於虛實無犯其邪是得天之露遇歲之虛救而不勝反受其殃故曰必知天忌乃言鍼意法於往古驗於來今觀於窈冥通於無窮麤之所不見良工之所貴莫知其形若神髣髴邪氣之中人也洒淅動形正邪之中人也微先見於色不知於其身若有若無若亡若存有形無形莫知其情是故上工之取氣乃救其萌芽下工守其已成因敗其形是故工之用鍼也知氣之所在而守其門戶明於調氣補寫所在徐疾之意所取之處寫必用員切而轉之其氣乃行疾而徐出邪氣乃出伸而迎之遙大其穴氣出乃疾補必用方外引其皮令當其門左引其樞右推其膚微旋而徐推之必端以正安以靜堅心無解欲微以留氣下而疾出之推其皮蓋其外門真氣乃存用鍼之要無忘其神雷公問於黃帝曰鍼論曰得其人乃傳非其人勿言何以知其可傳黃帝曰各得其人任之其能故能明其事雷公曰願聞官能奈何黃帝曰明目者可使視色聰耳者可使聽音捷疾辭語者可使傳論語徐而安靜手巧而心審諦者可使行鍼艾理血氣而調諸逆順察陰陽而兼諸方緩節柔筋而心和調者可使導引行氣疾毒言語輕人者可使唾癰呪病爪苦手毒為事善傷者可使按積抑痺各得其能方乃可行其名乃彰不得其人其功不成其師無名故曰得其人乃言非其人勿傳此之謂也手毒者可使試按龜置龜於器下而按其上五十日而死矣手甘者復生如故也
