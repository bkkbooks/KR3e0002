body:
  text: 經水第十二經水第十二黃帝問于歧伯曰經脈十二者外合于十二經水而內屬于五藏六府夫十二經水者其有大小深淺廣狹遠近各不同五藏六府之高下小大受穀之多少亦不等相應奈何夫經水者受水而行之五藏者合神氣魂魄而藏之六府者受穀而行之受氣而揚之經脈者受血而營之合而以治奈何刺之深淺灸之壯數可得聞乎歧伯荅曰善哉問也天至高不可度地至廣不可量此之謂也且夫人生于天地之間六合之內此天之高地之廣也非人力之所能度量而至也若夫八尺之士皮肉在此外可度量切循而得之其死可解剖而視之其藏之堅脆府之大小穀之多少脈之長短血之清濁氣之多少十二經之多血少氣與其少血多氣與其皆多血氣與其皆少血氣皆有大數其治以鍼艾各調其經氣固其常有合乎黃帝曰余聞之快于耳不解于心願卒聞之歧伯荅曰此人之所以參天地而應陰陽也不可不察足太陽外合清水內屬膀胱而通水道焉足少陽外合于渭水內屬于膽足陽明外合于海水內屬于胃足太陰外合于湖水內屬于脾足少陰外合于汝水內屬于腎足厥陰外合于澠水內屬于肝手太陽外合淮水內屬小腸而水道出焉手少陽外合于漯水內屬于三焦手陽明外合于江水內屬于大腸手太陰外合于河水內屬于肺手少陰外合于濟水內屬于心手心主外合于漳水內屬于心包凡此五藏六府十二經水者外有源泉而內有所稟此皆內外相貫如環無端人經亦然故天為陽地為陰腰以上為天腰以下為地故海以北者為陰湖以北者為陰中之陰漳以南者為陽河以北至漳者為陽中之陰漯以南至江者為陽中之太陽此一隅之陰陽也所以人與天地相參也黃帝曰夫經水之應經脈也其遠近淺深水血之多少各不同合而以刺之奈何歧伯荅曰足陽明五藏六府之海也其脈大血多氣盛熱壯刺此者不深弗散不留不寫也足陽明刺深六分留十呼足太陽深五分留七呼足少陽深四分留五呼足太陰深三分留四呼足少陰深二分留三呼足厥陰深一分留二呼手之陰陽其受氣之道近其氣之來疾其刺深者皆無過二分其留皆無過一呼其少長大小肥瘦以心撩之命曰法天之常灸之亦然灸而過此者得惡火則骨枯脈濇刺而過此者則脫氣黃帝曰夫經脈之小大血之多少膚之厚薄肉之堅脆及膕之大小可為量度乎歧伯荅曰其可為度量者取其中度也不甚脫肉而血氣不衰也若夫度之人痟瘦而形肉脫者惡可以度量刺乎審切循捫按視其寒溫盛衰而調之是謂因適而為之真也
