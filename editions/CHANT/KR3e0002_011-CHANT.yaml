body:
  text: 經別第十一經別第十一黃帝問于歧伯曰余聞人之合于天道也內有五藏以應五音五色五時五味五位也外有六府以應六律六律建陰陽諸經而合之十二月十二辰十二節十二經水十二時十二經脈者此五藏六府之所以應天道夫十二經脈者人之所以生病之所以成人之所以治病之所以起學之所始工之所止也麤之所易上之所難也請問其離合出入奈何歧伯稽首再拜曰明乎哉問也此麤之所過上之所息也請卒言之足太陽之正別入于膕中其一道下尻五寸別入于肛屬于膀胱散之腎循膂當心入散直者從膂上出于項復屬于太陽此為一經也足少陰之正至膕中別走太陽而合上至腎當十四顀出屬帶脈直者繫舌本復出于項合于太陽此為一合成以諸陰之別皆為正也足少陽之正繞髀入毛際合于厥陰別者入季脅之間循胸裏屬膽散之上肝貫心以上挾咽出頤頷中散于面繫目系合少陽于外眥也足厥陰之正別跗上上至毛際合于少陽與別俱行此為二合也足陽明之正上至髀入于腹裏屬胃散之脾上通于心上循咽出于口上頞䪼還繫目系合于陽明也足太陰之正上至髀合于陽明與別俱行上結于咽貫舌中此為三合也手太陽之正指地別于肩解入腋走心繫小腸也手少陰之正別入于淵腋兩筋之間屬于心上走喉嚨出于面合目內眥此為四合也手少陽之正指天別于巔入缺盆下走三焦散于胸中也手心主之正別下淵腋三寸入胸中別屬三焦出循喉嚨出耳後合少陽完骨之下此為五合也手陽明之正從手循膺乳別于肩髃入柱骨下走大腸屬于肺上循喉嚨出缺盆合于陽明也手太陰之正別入淵腋少陰之前入走肺散之太陽上出缺盆循喉嚨復合陽明此六合也
