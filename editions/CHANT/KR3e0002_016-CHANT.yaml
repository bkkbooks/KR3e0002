body:
  text: 營氣第十六營氣第十六黃帝曰營氣之道內穀為寶穀入于胃乃傳之肺流溢于中布散于外精專者行于經隧常營無已終而復始是謂天地之紀故氣從太陰出注手陽明上行注足陽明下行至跗上注大指間與太陰合上行抵髀從脾注心中循手少陰出腋下臂注小指合手太陽上行乘腋出䪼內注目內眥上巔下項合足太陽循脊下尻下行注小指之端循足心注足少陰上行注腎從腎注心外散于胸中循心主脈出腋下臂出兩筋之間入掌中出中指之端還注小指次指之端合手少陽上行注膻中散于三焦從三焦注膽出脅注足少陽下行至跗上復從跗注大指間合足厥陰上行至肝從肝上注肺上循喉嚨入頏顙之竅究于畜門其支別者上額循巔下項中循脊入骶是督脈也絡陰器上過毛中入臍中上循腹裏入缺盆下注肺中復出太陰此營氣之所行也逆順之常也
