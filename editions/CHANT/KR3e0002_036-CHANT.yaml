body:
  text: 五癃津液第三十六五癃津液第三十六黃帝問于歧伯曰水穀入于口輸于腸胃其液別為五天寒衣薄則為溺與氣天熱衣厚則為汗悲哀氣并則為泣中熱胃緩則為唾邪氣內逆則氣為之閉塞而不行不行則為水脹余知其然也不知其何由生願聞其道歧伯曰水穀皆入于口其味有五各注其海津液各走其道故三焦出氣以溫肌肉充皮膚為其津其流而不行者為液天暑衣厚則腠理開故汗出寒留于分肉之間聚沫則為痛天寒則腠理閉氣濕不行水下留于膀胱則為溺與氣五藏六府心為之主耳為之聽目為之候肺為之相肝為之將脾為之衛腎為之主外故五藏六府之津液盡上滲于目心悲氣并則心系急心系急則肺舉肺舉則液上溢夫心系與肺不能常舉乍上乍下故欬而泣出矣中熱則胃中消穀消穀則蟲上下作腸胃充郭故胃緩胃緩則氣逆故唾出五穀之津液和合而為膏者內滲入于骨空補益腦髓而下流于陰股陰陽不和則使液溢而下流于陰髓液皆減而下下過度則虛虛故腰背痛而脛痠陰陽氣道不通四海閉塞三焦不寫津液不化水穀并行腸胃之中別于廻腸留于下焦不得滲膀胱則下焦脹水溢則為水脹此津液五別之逆順也
