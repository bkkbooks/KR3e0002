body:
  text: 五音五味第六十五五音五味第六十五右徵與少徵調右手太陽上左商與左徵調左手陽明上少徵與大宮調左手陽明上右角與大角調右足少陽下大徵與少徵調左手太陽上眾羽與少羽調右足太陽下少商與右商調右手太陽下桎羽與眾羽調右足太陽下少宮與大宮調右足陽明下判角與少角調右足少陽下釱商與上商調右足陽明下釱商與上角調左足太陽下上徵與右徵同穀麥畜羊果杏手少陽藏心色赤味苦時夏上羽與大羽同穀大豆畜彘果栗足少陰藏腎色黑味鹹時冬上宮與大宮同穀稷畜牛果棗足太陰藏脾色黃味甘時季夏上商與右商同穀黍畜雞果桃手太陰藏肺色白味辛時秋上角與大角同穀麻畜犬果李足厥陰藏肝色青味酸時春大宮與上角同右足陽明上左角與大角同左足陽明上少羽與大羽同右足太陽下左商與右商同左手陽明上加宮與大宮同左足少陽上質判與大宮同左手太陽下判角與大角同左足少陽下大羽與大角同右足太陽上大角與大宮同右足少陽上右徵少徵質徵上徵判徵右角釱角上角大角判角右商少商釱商上商左商少宮上宮大宮加宮左宮眾羽桎羽上羽大羽少羽黃帝曰婦人無鬚者無血氣乎歧伯曰衝脈任脈皆起於胞中上循背裏為經絡之海其浮而外者循腹右上行會於咽喉別而絡脣口血氣盛則充膚熱肉血獨盛則澹滲皮膚生毫毛今婦人之生有餘於氣不足於血以其數脫血也衝任之脈不榮口脣故鬚不生焉黃帝曰士人有傷於陰陰氣絕而不起陰不用然其鬚不去其故何也宦者獨去何也願聞其故歧伯曰宦者去其宗筋傷其衝脈血寫不復皮膚內結脣口不榮故鬚不生黃帝曰其有天宦者未嘗被傷不脫於血然其鬚不生其故何也歧伯曰此天之所不足也其任衝不盛宗筋不成有氣無血脣口不榮故鬚不生黃帝曰善乎哉聖人之通萬物也若日月之光影音聲鼓響聞其聲而知其形其非夫子孰能明萬物之精是故聖人視其顏色黃赤者多熱氣青白者少熱氣黑色者多血少氣美眉者太陽多血通髯極鬚者少陽多血美鬚者陽明多血此其時然也夫人之常數太陽常多血少氣少陽常多氣少血陽明常多血多氣厥陰常多氣少血少陰常多血少氣太陰常多血少氣此天之常數也
