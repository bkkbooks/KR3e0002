body:
  text: 衛氣第五十二衛氣第五十二黃帝曰五藏者所以藏精神魂魄者也六府者所以受水穀而行化物者也其氣內于五藏而外絡肢節其浮氣之不循經者為衛氣其精氣之行于經者為營氣陰陽相隨外內相貫如環之無端亭亭淳淳乎孰能窮之然其分別陰陽皆有標本虛實所離之處能別陰陽十二經者知病之所生候虛實之所在者能得病之高下知六府之氣街者能知解結契紹于門戶能知虛石之堅軟者知補寫之所在能知六經標本者可以無惑于天下歧伯曰博哉聖帝之論臣請盡意悉言之足太陽之本在跟以上五寸中標在兩絡命門命門者目也足少陽之本在竅陰之間標在窗籠之前窗籠者耳也足少陰之本在內踝下上三寸中標在背腧與舌下兩脈也足厥陰之本在行間上五寸所標在背腧也足陽明之本在厲兌標在人迎頰挾頏顙也足太陰之本在中封前上四寸之中標在背腧與舌本也手太陽之本在外踝之後標在命門之上一寸也手少陽之本在小指次指之間上二寸標在耳後上角下外眥也手陽明之本在肘骨中上至別陽標在顏下合鉗上也手太陰之本在寸口之中標在腋內動也手少陰之本在銳骨之端標在背腧也手心主之本在掌後兩筋之間二寸中標在腋下下三寸也凡候此者下虛則厥下盛則熱上虛則眩上盛則熱痛故石者絕而止之虛者引而起之請言氣街胸氣有街腹氣有街頭氣有街脛氣有街故氣在頭者止之于腦氣在胸者止之膺與背腧氣在腹者止之背腧與衝脈于臍左右之動脈者氣在脛者止之于氣街與承山踝上以下取此者用毫鍼必先按而在久應于手乃刺而予之所治者頭痛眩仆腹痛中滿暴脹及有新積痛可移者易已也積不痛難已也
