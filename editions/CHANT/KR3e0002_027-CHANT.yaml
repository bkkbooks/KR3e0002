body:
  text: 周痺第二十七周痺第二十七黃帝問于歧伯曰周痺之在身也上下移徙隨脈其上下左右相應間不容空願聞此痛在血脈之中邪將在分肉之間乎何以致是其痛之移也間不及下鍼其慉痛之時不及定治而痛已止矣何道使然願聞其故歧伯荅曰此眾痺也非周痺也黃帝曰願聞眾痺歧伯對曰此各在其處更發更止更居更起以右應左以左應右非能周也更發更休也黃帝曰善刺之奈何歧伯對曰刺此者痛雖已止必刺其處勿令復起帝曰善願聞周痺何如歧伯對曰周痺者在于血脈之中隨脈以上隨脈以下不能左右各當其所黃帝曰刺之奈何歧伯對曰痛從上下者先刺其下以過之後刺其上以脫之痛從下上者先刺其上以過之後刺其下以脫之黃帝曰善此痛安生何因而有名歧伯對曰風寒濕氣客于外分肉之間迫切而為沫沫得寒則聚聚則排分肉而分裂也分裂則痛痛則神歸之神歸之則熱熱則痛解痛解則厥厥則他痺發發則如是帝曰善余已得其意矣此內不在藏而外未發于皮獨居分肉之間真氣不能周故命曰周痺故刺痺者必先切循其下之六經視其虛實及大絡之血結而不通及虛而脈陷空者而調之熨而通之其瘛堅轉引而行之黃帝曰善余已得其意矣亦得其事也九者經巽之理十二經脈陰陽之病也
