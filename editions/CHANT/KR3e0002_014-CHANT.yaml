body:
  text: 骨度第十四骨度第十四黃帝問于伯高曰脈度言經脈之長短何以立之伯高曰先度其骨節之大小廣狹長短而脈度定矣黃帝曰願聞眾人之度人長七尺五寸者其骨節之大小長短各幾何伯高曰頭之大骨圍二尺六寸胸圍四尺五寸腰圍四尺二寸髮所覆者顱至項尺二寸髮以下至頤長一尺君子終折結喉以下至缺盆中長四寸缺盆以下至𩩲長九寸過則肺大不滿則肺小𩩲以下至天樞長八寸過則胃大不及則胃小天樞以下至橫骨長六寸半過則廻腸廣長不滿則狹短橫骨長六寸半橫骨上廉以下至內輔之上廉長一尺八寸內輔之上廉以下至下廉長三寸半內輔下廉下至內踝長一尺三寸內踝以下至地長三寸膝膕以下至跗屬長一尺六寸跗屬以下至地長三寸故骨圍大則大過小則不及角以下至柱骨長一尺行腋中不見者長四寸腋以下至季脅長一尺二寸季脅以下至髀樞長六寸髀樞以下至膝中長一尺九寸膝以下至外踝長一尺六寸外踝以下至京骨長三寸京骨以下至地長一寸耳後當完骨者廣九寸耳前當耳門者廣一尺三寸兩顴之間相去七寸兩乳之間廣九寸半兩髀之間廣六寸半足長一尺二寸廣四寸半肩至肘長一尺七寸肘至腕長一尺二寸半腕至中指本節長四寸本節至其末長四寸半項髮以下至背骨長二寸半膂骨以下至尾骶二十一節長三尺上節長一寸四分分之一奇分在下故上七節至于膂骨九寸八分分之七此眾人骨之度也所以立經脈之長短也是故視其經脈之在于身也其見浮而堅其見明而大者多血細而沉者多氣也
