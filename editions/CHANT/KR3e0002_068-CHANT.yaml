body:
  text: 上膈第六十八上膈第六十八黃帝曰氣為上膈者食飲入而還出余已知之矣蟲為下膈下膈者食晬時乃出余未得其意願卒聞之歧伯曰喜怒不適食飲不節寒溫不時則寒汁流於腸中流於腸中則蟲寒蟲寒則積聚守於下管則腸胃充郭衛氣不營邪氣居之人食則蟲上食蟲上食則下管虛下管虛則邪氣勝之積聚以留留則癰成癰成則下管約其癰在管內者即而痛深其癰在外者則癰外而痛浮癰上皮熱黃帝曰刺之奈何歧伯曰微按其癰視氣所行先淺刺其傍稍內益深還而刺之毋過三行察其沉浮以為深淺已刺必熨令熱入中日使熱內邪氣益衰大癰乃潰伍以參禁以除其內恬憺無為乃能行氣後以鹹苦化穀乃下矣
