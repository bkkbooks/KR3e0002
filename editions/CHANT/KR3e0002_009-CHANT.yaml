body:
  text: 終始第九終始第九凡刺之道畢于終始明知終始五藏為紀陰陽定矣陰者主藏陽者主府陽受氣于四末陰受氣于五藏故寫者迎之補者隨之知迎知隨氣可令和和氣之方必通陰陽五藏為陰六府為陽傳之後世以血為盟敬之者昌慢之者亡無道行私必得天殃謹奉天道請言終始終始者經脈為紀持其脈口人迎以知陰陽有餘不足平與不平天道畢矣所謂平人者不病不病者脈口人迎應四時也上下相應而俱往來也六經之脈不結動也本末之寒溫之相守司也形肉血氣必相稱也是謂平人少氣者脈口人迎俱少而不稱尺寸也如是者則陰陽俱不足補陽則陰竭寫陰則陽脫如是者可將以甘藥不可飲以至劑如此者弗炙不已者因而寫之則五藏氣壞矣人迎一盛病在足少陽一盛而躁病在手少陽人迎二盛病在足太陽二盛而躁病在手太陽人迎三盛病在足陽明三盛而躁病在手陽明人迎四盛且大且數名曰溢陽溢陽為外格脈口一盛病在足厥陰厥陰一盛而躁在手心主脈口二盛病在足少陰二盛而躁在手少陰脈口三盛病在足太陰三盛而躁在手太陰脈口四盛且大且數者名曰溢陰溢陰為內關內關不通死不治人迎與太陰脈口俱盛四倍以上命曰關格關格者與之短期人迎一盛寫足少陽而補足厥陰二寫一補日一取之必切而驗之疎取之上氣和乃止人迎二盛寫足太陽補足少陰二寫一補二日一取之必切而驗之疎取之上氣和乃止人迎三盛寫足陽明而補足太陰二寫一補日二取之必切而驗之疎取之上氣和乃止脈口一盛寫足厥陰而補足少陽二補一寫日一取之必切而驗之疎而取上氣和乃止脈口二盛寫足少陰而補足太陽二補一寫二日一取之必切而驗之疎取之上氣和乃止脈口三盛寫足太陰而補足陽明二補一寫日二取之必切而驗之疎而取之上氣和乃止所以日二取之者太陽主胃大富于穀氣故可日二取之也人迎與脈口俱盛三倍以上命曰陰陽俱溢如是者不開則血脈閉塞氣無所行流淫于中五藏內傷如此者因而灸之則變易而為他病矣凡刺之道氣調而止補陰瀉陽音氣益彰耳目聰明反此者血氣不行所謂氣至而有效者瀉則益虛虛者脈大如其故而不堅也堅如其故者適雖言故病未去也補則益實實者脈大如其故而益堅也夫如其故而不堅者適雖言快病未去也故補則實寫則虛痛雖不隨鍼病必衰去必先通十二經脈之所生病而後可得傳于終始矣故陰陽不相移虛實不相傾取之其經凡刺之屬三刺至穀氣邪僻妄合陰陽易居逆順相反沉浮異處四時不得稽留淫泆須鍼而去故一刺則陽邪出再刺則陰邪出三刺則穀氣至穀氣至而止所謂穀氣至者已補而實已寫而虛故以知穀氣至也邪氣獨去者陰與陽未能調而病知愈也故曰補則實寫則虛痛雖不隨鍼病必衰去矣陰盛而陽虛先補其陽後寫其陰而和之陰虛而陽盛先補其陰後寫其陽而和之三脈動于足大指之間必審其實虛虛而寫之是謂重虛重虛病益甚凡刺此者以指按之脈動而實且疾者疾寫之虛而徐者則補之反此者病益甚其動也陽明在上厥陰在中少陰在下膺腧中膺背腧中背肩膊虛者取之上重舌刺舌柱以鈹鍼也手屈而不伸者其病在筋伸而不屈者其病在骨在骨守骨在筋守筋補須一方實深取之稀按其痏以極出其邪氣一方虛淺刺之以養其脈疾按其痏無使邪氣得入邪氣來也緊而疾穀氣來也徐而和脈實者深刺之以泄其氣脈虛者淺刺之使精氣無得出以養其脈獨出其邪氣刺諸痛者其脈皆實故曰從腰以上者手太陰陽明皆主之從腰以下者足太陰陽明皆主之病在上者下取之病在下者高取之病在頭者取之足病在足者取之膕病生於頭者頭重生於手者臂重生於足者足重治病者先刺其病所從生者也春氣在毛夏氣在皮膚秋氣在分肉冬氣在筋骨刺此病者各以其時為齊故刺肥人者以秋冬之齊刺瘦人者以春夏之齊病痛者陰也痛而以手按之不得者陰也深刺之病在上者陽也病在下者陰也癢者陽也淺刺之病先起陰者先治其陰而後治其陽病先起陽者先治其陽而後治其陰刺熱厥者留鍼反為寒刺寒厥者留鍼反為熱刺熱厥者二陰一陽刺寒厥者二陽一陰所謂二陰者二刺陰也一陽者一刺陽也久病者邪氣入深刺此病者深內而久留之間日而復刺之必先調其左右去其血脈刺道畢矣凡刺之法必察其形氣形肉未脫少氣而脈又躁躁厥者必為繆刺之散氣可收聚氣可布深居靜處占神往來閉戶塞牖魂魄不散專意一神精氣之分毋聞人聲以收其精必一其神令志在鍼淺而留之微而浮之以移其神氣至乃休男內女外堅拒勿出謹守勿內是謂得氣凡刺之禁新內勿刺新刺勿內已醉勿刺已刺勿醉新怒勿刺已刺勿怒新勞勿刺已刺勿勞已飽勿刺已刺勿飽已饑勿刺已刺勿饑已渴勿刺已刺勿渴大驚大恐必定其氣乃刺之乘車來者臥而休之如食頃乃刺之出行來者坐而休之如行十里頃乃刺之凡此十二禁者其脈亂氣散逆其營衛經氣不次因而刺之則陽病入於陰陰病出為陽則邪氣復生麤工勿察是謂伐身形體淫泆乃消腦髓津液不化脫其五味是謂失氣也太陽之脈其終也戴眼反折瘛瘲其色白絕皮乃絕汗絕汗則終矣少陽終者耳聾百節盡縱目系絕目系絕一日半則死矣其死也色青白乃死陽明終者口目動作喜驚妄言色黃其上下之經盛而不行則終矣少陰終者面黑齒長而垢腹脹閉塞上下不通而終矣厥陰終者中熱嗌乾喜溺心煩甚則舌卷卵上縮而終矣太陰終者腹脹閉不得息氣噫善嘔嘔則逆逆則面赤不逆則上下不通上下不通則面黑皮毛燋而終矣
