body:
  text: 百病始生第六十六百病始生第六十六黃帝問于歧伯曰夫百病之始生也皆生於風雨寒暑清濕喜怒喜怒不節則傷藏風雨則傷上清濕則傷下三部之氣所傷異類願聞其會歧伯曰三部之氣各不同或起於陰或起於陽請言其方喜怒不節則傷藏藏傷則病起於陰也清濕襲虛則病起於下風雨襲虛則病起於上是謂三部至於其淫泆不可勝數黃帝曰余固不能數故問先師願卒聞其道歧伯曰風雨寒熱不得虛邪不能獨傷人卒然逢疾風暴雨而不病者蓋無虛故邪不能獨傷人此必因虛邪之風與其身形兩虛相得乃客其形兩實相逢眾人肉堅其中於虛邪也因於天時與其身形參以虛實大病乃成氣有定舍因處為名上下中外分為三員是故虛邪之中人也始於皮膚皮膚緩則腠理開開則邪從毛髮入入則抵深深則毛髮立毛髮立則淅然故皮膚痛留而不去則傳舍於絡脈在絡之時痛於肌肉其痛之時息大經乃代留而不去傳舍於經在經之時洒淅喜驚留而不去傳舍於輸在輸之時六經不通四肢則肢節痛腰脊乃強留而不去傳舍於伏衝之脈在伏衝之時體重身痛留而不去傳舍於腸胃在腸胃之時賁嚮腹脹多寒則腸鳴飧泄食不化多熱則溏出麋留而不去傳舍於腸胃之外募原之間留著於脈稽留而不去息而成積或著孫脈或著絡脈或者經脈或著輸脈或著於伏衝之脈或著於膂筋或著於腸胃之募原上連於緩筋邪氣淫泆不可勝論黃帝曰願盡聞其所由然歧伯曰其著孫絡之脈而成積者其積往來上下臂手孫絡之居也浮而緩不能句積而止之故往來移行腸胃之間水湊滲注灌濯濯有音有寒則䐜䐜滿雷引故時切痛其著於陽明之經則挾臍而居飽食則益大饑則益小其著於緩筋也似陽明之積飽食則痛饑則安其著於腸胃之募原也痛而外連於緩筋飽食則安饑則痛其著於伏衝之脈者揣之應手而動發手則熱氣下於兩股如湯沃之狀其著於膂筋在腸後者饑則積見飽則積不見按之不得其著於輸之脈者閉塞不通津液不下孔竅乾壅此邪氣之從外入內從上下也黃帝曰積之始生至其已成奈何歧伯曰積之始生得寒乃生厥乃成積也黃帝曰其成積奈何歧伯曰厥氣生足悗悗生脛寒脛寒則血脈凝濇血脈凝濇則寒氣上入於腸胃入於腸胃則䐜脹䐜脹則腸外之汁沫迫聚不得散日以成積卒然多食飲則腸滿起居不節用力過度則絡脈傷陽絡傷則血外溢血外溢則衂血陰絡傷則血內溢血內溢則後血腸胃之絡傷則血溢於腸外腸外有寒汁沫與血相搏則并合凝聚不得散而積成矣卒然外中於寒若內傷於憂怒則氣上逆氣上逆則六輸不通溫氣不行凝血蘊裏而不散津液濇滲著而不去而積皆成矣黃帝曰其生於陰者奈何歧伯曰憂思傷心重寒傷肺忿怒傷肝醉以入房汗出當風傷脾用力過度若入房汗出浴則傷腎此內外三部之所生病者也黃帝曰善治之奈何歧伯荅曰察其所痛以知其應有餘不足當補則補當寫則寫毋逆天時是謂至治
