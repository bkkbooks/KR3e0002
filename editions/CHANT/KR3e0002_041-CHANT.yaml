body:
  text: 陰陽繫日月第四十一陰陽繫日月第四十一黃帝曰余聞天為陽地為陰日為陽月為陰其合之于人奈何歧伯曰腰以上為天腰以下為地故天為陽地為陰故足之十二經脈以應十二月月生于水故在下者為陰手之十指以應十日日主火故在上者為陽黃帝曰合之于脈奈何歧伯曰寅者正月之生陽也主左足之少陽未者六月主右足之少陽卯者二月主左足之太陽午者五月主右足之太陽辰者三月主左足之陽明巳者四月主右足之陽明此兩陽合于前故曰陽明申者七月之生陰也主右足之少陰丑者十二月主左足之少陰酉者八月主右足之太陰子者十一月主左足之太陰戌者九月主右足之厥陰亥者十月主左足之厥陰此兩陰交盡故曰厥陰甲主左手之少陽己主右手之少陽乙主左手之太陽戊主右手之太陽丙主左手之陽明丁主右手之陽明此兩火并合故為陽明庚主右手之少陰癸主左手之少陰辛主右手之太陰壬主左手之太陰故足之陽者陰中之少陽也足之陰者陰中之太陰也手之陽者陽中之太陽也手之陰者陽中之少陰也腰以上者為陽腰以下者為陰其於五藏也心為陽中之太陽肺為陰中之少陰肝為陰中之少陽脾為陰中之至陰腎為陰中之太陰黃帝曰以治之奈何歧伯曰正月二月三月人氣在左無刺左足之陽四月五月六月人氣在右無刺右足之陽七月八月九月人氣在右無刺右足之陰十月十一月十二月人氣在左無刺左足之陰黃帝曰五行以東方為甲乙木王春春者蒼色主肝肝者足厥陰也今乃以甲為左手之少陽不合于數何也歧伯曰此天地之陰陽也非四時五行之以次行也且夫陰陽者有名而無形故數之可十離之可百散之可千推之可萬此之謂也
