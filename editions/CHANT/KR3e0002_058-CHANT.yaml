body:
  text: 賊風第五十八賊風第五十八黃帝曰夫子言賊風邪氣之傷人也令人病焉今有其不離屏蔽不出空穴之中卒然病者非不離賊風邪氣其故何也歧伯曰此皆嘗有所傷于濕氣藏于血脈之中分肉之間久留而不去若有所墮墜惡血在內而不去卒然喜怒不節飲食不適寒溫不時腠理閉而不通其開而遇風寒則血氣凝結與故邪相襲則為寒痺其有熱則汗出汗出則受風雖不遇賊風邪氣必有因加而發焉黃帝曰今夫子之所言者皆病人之所自知也其毋所遇邪氣又毋怵惕之所志卒然而病者其故何也唯有因鬼神之事乎歧伯曰此亦有故邪留而未發因而志有所惡及有所慕血氣內亂兩氣相搏其所從來者微視之不見聽而不聞故似鬼神黃帝曰其祝而已者其故何也歧伯曰先巫者因知百病之勝先知其病之所從生者可祝而已也
