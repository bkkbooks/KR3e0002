body:
  text: 五禁第六十一五禁第六十一黃帝問于歧伯曰余聞刺有五禁何謂五禁歧伯曰禁其不可刺也黃帝曰余聞刺有五奪歧伯曰無寫其不可奪者也黃帝曰余聞刺有五過歧伯曰補寫無過其度黃帝曰余聞刺有五逆歧伯曰病與脈相逆命曰五逆黃帝曰余聞刺有九宜歧伯曰明知九鍼之論是謂九宜黃帝曰何謂五禁願聞其不可刺之時歧伯曰甲乙日自乘無刺頭無發矇于耳內丙丁日自乘無振埃于肩喉廉泉戊己日自乘四季無刺腹去爪寫水庚辛日自乘無刺關節于股膝壬癸日自乘無刺足脛是謂五禁黃帝曰何謂五奪歧伯曰形肉已奪是一奪也大奪血之後是二奪也大汗出之後是三奪也大泄之後是四奪也新產及大血之後是五奪也此皆不可寫黃帝曰何謂五逆歧伯曰熱病脈靜汗已出脈盛躁是一逆也病泄脈洪大是二逆也著痺不移䐃肉破身熱脈偏絕是三逆也淫而奪形身熱色夭然白及後下血衃血衃篤重是謂四逆也寒熱奪形脈堅搏是謂五逆也
