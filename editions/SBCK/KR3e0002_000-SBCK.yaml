front:
  text: 黃帝素問靈樞經敘昔黃帝作内經十八卷靈樞九卷素問九卷廼其數焉世所奉行唯素問耳越人得其一二而述難經皇甫謐次而爲甲乙諸家之說悉自此始其間或有得失未可爲後世灋則謂如南陽活人書稱欬逆者噦也謹按靈樞經曰新榖氣入于胃與故寒氣相爭故曰噦舉而並之則理可斷矣又如難經第六十五篇是越人標指靈樞本輸之大略世或以爲流注謹按靈樞經曰所言節者神氣之所遊行出入也非皮肉筋骨也又曰神氣者正氣也神氣之所遊行出入者流注也井滎輸經合者本輸也舉而並之則知相去不啻天壤之異但恨靈樞不傳久矣世莫能究夫爲醫者在讀醫書耳讀而不能爲醫者有矣未有不讀而能爲醫者也不讀醫書又非世業殺人尤毒於梃刃是故古人有言曰爲人子而不讀醫書由爲不孝也僕本庸昧自髫迄壯濳心斯道頗渉其理輙不自揣叅對諸書再行校正家藏舊本靈樞九卷共八十一篇增修音釋附于卷末勒爲二十四卷庶使好生之人開卷易朙了無差别除巳具狀經所屬申朙外准使府指揮依條申轉運司選官詳定具書送祕書省國子監今崧專訪請名醫更乞叅詳免誤將來利益無竆功實有自時宋紹興乙亥仲夏望日錦官史崧題黃帝素問靈樞經目錄
