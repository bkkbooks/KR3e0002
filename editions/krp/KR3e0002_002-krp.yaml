front:
  text: 黄帝素問靈樞經卷之二
  hash: sha256:7a511f32cc84dc14d11a0ebda153789635aec00db3267935faaa76af279aea60
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3e0002_SBCK_002-1a}
body:
  text: 根結第五法音歧伯曰天地相感寒暖相移隂陽之道孰少孰多隂道偶陽道竒發于春夏隂氣少陽氣多隂陽不調何補何寫發于秋冬陽氣少隂氣多隂氣盛而陽氣衰故莖葉枯槁濕雨下歸隂陽相移何寫何補竒邪離經不可勝數不知根結五藏六府折關敗樞開闔而走隂陽大失不可復取九鍼之玄要在終始故能知終始一言而畢不知終始鍼道咸絶太陽根于至隂結于命門命門者目也陽朙根于厲兊結于顙大顙大者鉗耳也少陽根于竅隂結于窻籠窻籠者耳中也太陽為開陽朙為闔少陽為樞故開折則肉節瀆而㬥病起矣故㬥病者取之太陽視有餘不足瀆者皮肉宛膲而弱也闔折則氣無所止息而痿疾起矣故痿疾者取之陽朙視有餘不足無所止息者眞氣稽留邪氣居之也樞折即骨繇而不安於地故骨繇者取之少陽視有餘不足骨繇者節緩而不收也所謂骨繇者摇故也當竆其本也太隂根于隱白結于大倉少隂根于湧泉結于廉泉厥隂根于大敦結于玉英絡于膻中太隂爲開厥隂爲闔少陽爲樞故開折則倉廩無所輸膈洞膈洞者取之太隂視有餘不足故開折者氣不足而生病也闔折即氣絶而喜悲悲者取之厥隂視有餘不足樞折則脉有所結而不通不通者取之少隂視有餘不足有結者皆取之不足足太陽根于至隂溜于京骨注于崑崙入于天柱飛揚也足少陽根于竅隂溜于丘墟注于陽輔入于天容光朙也足陽朙根于厲兌溜于衝陽注于下陵入于人迎豐隆也手太陽根于少澤溜于陽谷注于少海入于天窻支正也手少陽根于關衝溜于陽池注于支溝入于天牖外關也手陽朙根于商陽溜于合谷注于陽谿入于扶突偏歷也此所謂十二經者盛絡皆當取之一日一夜五十營以營五藏之精不應數者名曰狂生所謂五十營者五藏皆受氣持其脉口數其至也五十動而不一代者五藏皆受氣四十動一代者一藏無氣三十動一代者二藏無氣二十動一代者三藏無氣十動一代者四藏無氣不滿十動一代者五藏無氣子之短期要在終始所謂五十動而不一代者以爲常也以知五藏之期子之短期者乍數乍踈也黄帝曰逆順五體者言人骨節之小大肉之堅脆皮之厚薄血之清濁氣之滑濇脉之長短血之多少經絡之數余已知之矣此皆布衣匹夫之士也夫王公大人血食之君身體柔脆肌肉軟弱血氣慓悍滑利其刺之徐疾淺深多少可得同之乎歧伯荅曰膏粱菽藿之味何可同也氣滑即出疾其氣濇則出遲氣悍則鍼小而入淺氣濇則鍼大而入深深則欲留淺則欲疾以此觀之刺布衣者深以留之刺大人者微以徐之此皆因氣慓悍滑利也黄帝曰形氣之逆順奈何歧伯曰形氣不足病氣有餘是邪勝也急寫之形氣有餘病氣不足急補之形氣不足病氣不足此隂陽氣俱不足也不可刺之刺之則重不足重不足則隂陽俱竭血氣皆盡五藏空虛筋骨髓枯老者絶滅壯者不復矣形氣有餘病氣有餘此謂隂陽俱有餘也急寫其邪調其虛實故曰有餘者寫之不足者補之此之謂也故曰刺不知逆順眞邪相搏滿而補之則隂陽四溢腸胃充郭肝肺内䐜隂陽相錯虛而寫之則經脉空虛血氣竭枯腸胃㒤辟皮膚薄著毛腠夭膲子之死期故曰用鍼之要在于知調隂與陽調隂與陽精氣乃光合形與氣使神内藏故曰上工平氣中工亂脉下工絶氣危生故曰下工不可不愼也必審五藏變化之病五脉之應經絡之實虛皮之柔麤而後取之也骨繇搖音慓悍岸切勇㨗貌也上比昭切下侯陽道竒箕音夀夭剛柔第六法律黄帝問於少師曰余聞人之生也有剛有柔有弱有强有短有長有隂有陽願聞其方少師荅曰隂中有隂陽中有陽審知隂陽刺之有方得病所始刺之有理謹度病端與時相應内合于五藏六府外合于筋骨皮膚是故内有隂陽外亦有隂陽在内者五藏為隂六府爲陽在外者筋骨爲隂皮膚爲陽故曰病在隂之隂者刺隂之滎輸病在陽之陽者刺陽之合病在陽之隂者刺隂之經病在隂之陽者刺絡脉故曰病在陽者命曰風病在隂者命曰痺病隂陽俱病命曰風痺病有形而不痛者陽之類也無形而痛者隂之類也無形而痛者其陽完而隂傷之也急治其隂無攻其陽有形而不痛者其隂完而陽傷之也急治其陽無攻其隂隂陽俱動乍有形乍無形加以煩心命曰隂勝其陽此謂不表不裏其形不乆黄帝問於伯高曰余聞形氣病之先後外内之應奈何伯高荅曰風寒傷形憂恐忿怒傷氣氣傷藏乃病藏寒傷形乃應形風傷筋脉筋脉乃應此形氣外内之相應也黄帝曰刺之奈何伯高荅曰病九日者三刺而已病一月者十刺而已多少逺近以此衰之久痺不去身者視其血絡盡出其血黄帝曰外内之病難易之治奈何伯高荅曰形先病而未入藏者刺之半其日藏先病而形乃應者刺之倍其日此月内難易之應也黄帝問於伯髙曰余聞形有緩急氣有盛衰骨有大小肉有堅脆皮有厚薄其以立夀夭奈何伯高荅曰形與氣相任則夀不相任則夭皮與肉相果則夀不相果則夭血氣經絡勝形則夀不勝形則夭黄帝曰何謂形之緩急伯高荅曰形充而皮膚緩者則夀形充而皮膚急者則夭形充而脉堅大者順也形充而脉小以弱者氣衰衰則危矣若形充而顴不起者骨小骨小而夭矣形充而大肉䐃堅而有分者肉堅肉堅則夀矣形充而大肉無分理不堅者肉脆肉脆則夭矣此天之生命所以立形定氣而視夀夭者必朙乎此立形定氣而後以臨病人決死生黄帝曰余聞夀夭無以度之伯高荅曰牆基卑高不及其地者不滿三十而死其有因加疾者不及二十而死也黄帝曰形氣之相勝以立夀夭奈何伯高荅曰平人而氣勝形者夀病而形肉脱氣勝形者死形勝氣者危矣黄帝曰余聞刺有三變何謂三變伯高荅曰有刺營者有刺衛者有刺寒痺之留經者黄帝曰刺三變者奈何伯高荅曰刺營者出血刺衛者出氣刺寒痺者内熱黄帝曰營衛寒痺之爲病奈何伯高荅曰營之生病也寒熱少氣血上下行衛之生病也氣痛時來時去怫愾賁響風寒客于腸胃之中寒痺之為病也留而不去時痛而皮不仁黄帝曰刺寒痺内熱奈何伯高荅曰刺布衣者以火焠之刺大人者以藥熨之黄帝曰藥熨奈何伯高荅曰用淳酒二十升蜀椒一升乾薑一斤桂心一斤凡四種皆㕮咀漬酒中用綿絮一斤細白布四丈幷内酒中置酒馬矢煴中蓋封塗勿使泄五日五夜出布綿絮曝乾之乾復漬以盡其汁毎漬必晬其日乃出乾乾幷用滓與綿絮複布爲複巾長六七尺爲六七巾則用之生桑炭炙巾以熨寒痺所刺之處令熱入至于病所寒復炙巾以熨之三十遍而止汗出以巾拭身亦三十遍而止起步内中無見風毎刺必熨如此病已矣此所謂内熱也顴權音䐃堅腹中䐃脂上渠永切怫愾爲意舒下許氣上扶勿切鬱也切㕮咀才與切上音甫下官鍼第七法星凡刺之要官鍼最妙九鍼之宜各有所爲長短大小各有所施也不得其用病弗能移疾淺鍼深内傷良内皮膚爲癰病深鍼淺病氣不寫支爲大膿病小鍼大氣寫太甚疾必爲害病大鍼小氣不泄寫亦復爲敗失鍼之宜大者寫小者不移已言其過請言其所施病在皮膚無常處者取以鑱鍼于病所膚白勿取病在分肉間取以員鍼于病所病在經絡痼痺者取以鋒鍼病在脉氣少當補之者取以鍉鍼于井滎分輸病爲大膿者取以鈹鍼病痺氣㬥發者取以員利鍼病痺氣痛而不去者取以毫鍼病在中者取以長鍼病水腫不能通關節者取以大鍼病在五藏固居者取以鋒鍼寫于井滎分輸取以四時凡刺有九日應九變一曰輸刺輸刺者刺諸經滎輸藏腧也二曰逺道刺逺道刺者病在上取之下刺府腧也三曰經刺經刺者刺大經之結絡經分也四曰絡刺絡刺者刺小絡之血脉也五曰分刺分刺者刺分肉之間也六曰大寫刺大寫刺者刺大膿以鈹鍼也七曰毛刺毛刺者刺浮痺皮膚也八曰巨刺巨刺者左取右右取左九曰焠刺焠刺者刺燔鍼則取痺也凡刺有十二節以應十二經一曰偶刺偶刺者以手直心若背直痛所一刺前一刺後以治心痺刺此者傍鍼之也二曰報刺報刺者刺痛無常處也上下行者直内無拔鍼以左手隨病所按之乃出鍼復刺之也三曰恢刺恢刺直刺傍之舉之前後恢筋急以治筋痺也四曰齊刺齊刺者直入一傍入二以治寒氣小深者或曰三刺三刺者治痺氣小深者也五曰揚刺揚刺者正内一傍内四而浮之以治寒氣之愽大者也六曰直鍼刺直鍼刺者引皮乃刺之以治寒氣之淺者也七曰輸刺輸刺者直入直出稀發鍼而深之以治氣盛而熱者也八曰短刺短刺者刺骨痺稍摇而深之致鍼骨所以上下摩骨也九曰浮刺浮刺者傍入而浮之以治肌急而寒者也十曰隂刺隂刺者左右率刺之以治寒厥中寒厥足踝後少隂也十一曰傍鍼刺傍鍼刺者直刺傍刺各一以治留痺久居者也十二曰賛刺賛刺者直入直出數發鍼而淺之出血是謂治癰腫也脉之所居深不見者刺之微内鍼而久留之以致其空脉氣也脉淺者勿刺按絶其脉乃刺之無令精出獨出其邪氣耳所謂三刺則榖氣出者先淺刺絶皮以出陽邪再刺則隂邪出者少益深絶皮致肌肉未入分肉間也已入分肉之間則榖氣出故刺法曰始刺淺之以逐邪氣而來血氣後刺深之以致隂氣之邪最後刺極深之以下榖氣此之謂也故用鍼者不知年之所加氣之盛衰虛實之所起不可以爲工也凡刺有五以應五藏一曰半刺半刺者淺内而疾發鍼無鍼傷肉如拔毛狀以取皮氣此肺之應也二曰豹文刺豹文刺者左右前後鍼之中脉為故以取經絡之血者此心之應也三曰關刺關刺者直刺左右盡筋上以取筋痺愼無出血此肝之應也或曰淵刺一曰豈刺四曰合谷刺合谷刺者左右雞足鍼于分肉之間以取肌痺此脾之應也五曰輸刺輸刺者直入直出深内之至骨以取骨痺此腎之應也燔鍼煩上音恢刺一本作怪字上苦囘切大也本神第八法風黄帝問于歧伯曰凡刺之法先必本于神血脉營氣精神此五藏之所藏也至其淫泆離藏則精失魂魄飛揚志意恍亂智慮去身者何因而然乎夭之罪與人之過乎何謂德氣生精神魂魄心意志思智慮請問其故歧伯荅曰天之在我者德也地之在我者氣也德流氣薄而生者也故生之來謂之精兩精相搏謂之神隨神往來者謂之魂並精而出入者謂之魄所以任物者謂之心心有所憶謂之意意之所存謂之志因志而存變謂之思因思而遠慕謂之慮因慮而處物謂之智故智者之養生也必順四時而適寒暑和喜怒而安居處節隂陽而調剛柔如是則僻邪不至長生久視是故怵惕思慮者則傷神神傷則恐懼流淫而不止因悲哀動中者竭絶而失生喜樂者神憚散而不藏愁憂者氣閉塞而不行盛怒者迷惑而不治恐懼者神蕩憚而不收心怵愓思慮則傷神神傷則恐懼自失破䐃脫肉毛悴色夭死于冬脾愁憂而不解則傷意意傷則悗亂四肢不舉毛悴色夭死於春肝悲哀動中則傷魂魂傷則狂忘不精不精則不正當人隂縮而攣筋兩脇骨不舉毛悴色夭死於秋肺喜樂無極則傷魄魄傷則狂狂者意不存人皮革焦毛悴色夭死於夏腎盛怒而不止則傷志志傷則喜忘其前言腰脊不可以俛仰屈伸毛悴色夭死於季夏恐懼而不解則傷精精傷則骨痠痿厥精時自下是故五藏主藏精者也不可傷傷則失守而隂虛隂虚則無氣無氣則死矣是故用鍼者察觀病人之態以知精神魂魄之存亡得失之意五者以傷鍼不可以治之也肝藏血血舎魂肝氣虛則恐實則怒脾藏營營舎意脾氣虛則四肢不用五藏不安實則腹脹經溲不利心藏脉脉舎神心氣虚則悲實則笑不休肺藏氣氣舎魄肺氣虛則鼻塞不利少氣實則喘喝胷盈仰息腎藏精精舎志腎氣虛則厥實則脹五藏不安必審五藏之病形以知其氣之虛實謹而調之也悗亂悶上音怵惕的切悚懼也上恥律切下他終始第九法野凡刺之道畢于終始朙知終始五藏爲紀隂陽定矣隂者主藏陽者主府陽受氣于四末隂受氣于五藏故寫者迎之補者隨之知迎知隨氣可令和和氣之方必通隂陽五藏爲隂六府爲陽傳之後世以血爲盟敬之者昌慢之者亡無道行私必得天殃謹奉天道請言終始終始者經脉爲紀持其脉口人迎以知隂陽有餘不足平與不平天道畢矣所謂平人者不病不病者脉口人迎應四時也上下相應而俱徃來也六經之脉不結動也本末之寒温之相守司也形肉血氣必相稱也是謂平人少氣者脉口人迎俱少而不稱尺寸也如是者則隂陽俱不足補陽則隂竭寫隂則陽脱如是者可将以甘藥不可飲以至劑如此者弗炙不已者因而寫之則五藏氣壊矣人迎一盛病在足少陽一盛而躁病在手少陽人迎二盛病在足太陽二盛而躁病在手太陽人迎三盛病在足陽朙三盛而躁病在手陽朙人迎四盛且大且數名曰溢陽溢陽爲外格脉口一盛病在足厥隂厥隂一盛而躁在手心主脉口二盛病在足少隂二盛而躁在手少隂脉口三盛病在足太隂三盛而躁在手太隂脉口四盛且大且數者名曰溢隂溢隂爲内關内關不通死不治人迎與太隂脉口俱盛四倍以上命曰關格關格者與之短期人迎一盛寫足少陽而補足厥隂二寫一補日一取之必切而驗之踈取之上氣和乃止人迎二盛寫足太陽補足少隂二冩一補二日一取之必切而驗之踈取之上氣和乃止人迎三盛寫足陽朙而補足太隂二寫一補日二取之必切而驗之踈取之上氣和乃止脉口一盛寫足厥隂而補足少陽二補一寫日一取之必切而驗之踈而取上氣和乃止脉口二盛寫足少隂而補足太陽二補一寫二日一取之必切而驗之踈取之上氣和乃止脉口三盛寫足太隂而補足陽朙二補一寫日二取之必切而驗之踈而取之上氣和乃止所以日二取之者太陽主胃大富于榖氣故可日二取之也人迎與脉口俱盛三倍以上命曰隂陽俱溢如是者不開則血脉閉塞氣無所行流淫于中五藏内傷如此者因而灸之則變易而爲他病矣凡刺之道氣調而止補隂瀉陽音氣益彰耳目聰朙反此者血氣不行所謂氣至而有効者寫則益虛虛者脉大如其故而不堅也堅如其故者適雖言故病未去也補則益實實者脉大如其故而益堅也夫如其故而不堅者適雖言快病未去也故補則實寫則虛痛雖不隨鍼病必衰去必先通十二經脉之所生病而後可得傳于終始矣故隂陽不相移虛實不相傾取之其經凡刺之屬三刺至榖氣邪僻妄合隂陽易居逆順相反沉浮異處四時不得稽留淫泆須鍼而去故一刺則陽邪出再刺則隂邪出三刺則榖氣至榖氣至而止所謂榖氣至者已補而實已寫而虛故以知榖氣至也邪氣獨去者隂與陽未能調而病知愈也故曰補則實寫則虛痛雖不隨鍼病必衰去矣隂盛而陽虛先補其陽後寫其隂而和之隂虚而陽盛先補其隂後寫其陽而和之三脉動于足大指之間必審其實虚虚而寫之是謂重虚重虚病益甚凡刺此者以指按之脉動而實且疾者疾寫之虛而徐者則補之反此者病益甚其動也陽朙在上厥隂在中少隂在下膺腧中膺背腧中背肩膊虛者取之上重舌刺舌柱以鈹鍼也手屈而不伸者其病在筋伸而不屈者其病在骨在骨守骨在筋守筋補須一方實深取之稀按其痏以極出其邪氣一方虛淺刺之以養其脉疾按其痏無使邪氣得入邪氣來也緊而疾邪氣來也徐而和脉實者深刺之以泄其氣脉虛者淺刺之使精氣無得出以養其脉獨出其邪氣刺諸痛者其脉皆實故曰從腰以上者手太隂陽朙皆主之從腰以下者足太隂陽朙皆主之病在上者下取之病在下者高取之病在頭者取之足病在足者取之膕病生於頭者頭重生於手者臂重生於足者足重治病者先刺其病所從生者也春氣在毛夏氣在皮膚秋氣在分肉冬氣在筋骨刺此病者各以其時為齊故刺肥人者秋冬之齊刺瘦人者以春夏之齊病痛者隂也痛而以手按之不得者隂也深刺之病在上者陽也病在下者隂也癢者陽也淺刺之病先起隂者先治其隂而後治其陽病先起陽者先治其陽而後治其隂刺熱厥者留鍼反爲寒刺寒厥者留鍼反爲熱刺熱厥者二隂一陽刺寒厥者二陽一隂所謂二隂者二刺隂也一陽者一刺陽也久病者邪氣入深刺此病者深内而久留之間日而復刺之必先調其左右去其血脉刺道畢矣凡刺之法必察其形氣形肉未脱少氣而脉又躁躁厥者必為繆刺之散氣可收聚氣可布深居静處占神徃來閉户塞牖魂魄不散專意一神精氣之分毋聞人聲以收其精必一其神令志在鍼淺而留之微而浮之以移其神氣至乃休男内女外堅拒勿出謹守勿内是謂得氣凡刺之禁新内勿刺新刺勿内已醉勿刺已刺勿醉新怒勿刺已刺勿怒新勞勿刺已刺勿勞已飽勿刺已刺勿飽已饑勿刺已刺勿饑已渴勿刺已刺勿渴大驚大恐必定其氣乃刺之乘車來者臥而休之如食頃乃刺之出行来者坐而休之如行十里頃乃刺之凡此十二禁者其脉亂氣散逆其營衛經氣不次因而刺之則陽病入於隂隂病出爲陽則邪氣復生麤工勿察是謂伐身形體淫泆乃消腦髓津液不化脫其五味是謂失氣也太陽之脉其終也戴眼反折瘛瘲其色白絶皮乃絶汗絶汗則終矣少陽終者耳聾百節盡縱目系絶目系絶一日半則死矣其死也色青白乃死陽朙終者口目動作喜驚妄言色黄其上下之經盛而不行則終矣少隂終者面黒齒長而垢腹脹閉塞上下不通而終矣厥隂終者中熱嗌乾喜溺心煩甚則舌卷卵上縮而終矣太隂終者腹脹閇不得息氣噫善嘔嘔則逆逆則面赤不逆則上下不通上下不通則面黒皮毛燋而終矣繆刺救切上眉男内女外外女内難經作男淫濼各切下述齒長聲平黄帝素問靈樞經卷之二
