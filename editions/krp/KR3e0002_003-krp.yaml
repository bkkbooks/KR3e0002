front:
  text: 黄帝素問靈樞經卷之三
  hash: sha256:07c861203f48fbf3342c2a0a17e74936049ac8d133e7b60e966935a626ab1706
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3e0002_SBCK_003-1a}
body:
  text: 經脉第十雷公問於黄帝曰禁脉之言凡刺之理經脉爲始營其所行制其度量内次五藏外别六府願盡聞其道黄帝曰人始生先成精精成而腦髓生骨爲榦脉爲營筋爲剛肉爲牆皮膚堅而毛髮長榖入于胃脉道以通血氣乃行雷公曰願卒聞經脉之始生黄帝曰經脉者所以能决死生處百病調虛實不可不通肺手太隂之脉起于中焦下絡大腸還循胃口上膈屬肺從肺系横出腋下下循臑内行少隂心主之前下肘中循臂内上骨下廉入寸口上魚循魚際出大指之端其支者從腕後直出次指内廉出其端是動則病肺脹滿膨膨而喘欬缺盆中痛甚則交兩手而瞀此爲臂厥是主肺所生病者欬上氣喘渴煩心胷滿臑臂内前廉痛厥掌中熱氣盛有餘則肩背痛風寒汗出中風小便數而欠氣虛則肩背痛寒少氣不足以息溺色變為此諸病盛則寫之虛則補之熱則疾之寒則留之䧟下則灸之不盛不虛以經取之盛者寸口大三倍于人迎虛者則寸口反小于人迎也大腸手陽朙之脉起于大指次指之端循指上廉出合谷兩骨之間上入兩筋之中循臂上廉入肘外廉上臑外前廉上肩出髃骨之前廉上出于柱骨之㑹上下入缺盆絡肺下膈屬大腸其支者從缺盆上頸貫頰入下齒中還出挾口交人中左之右右之左上挾鼻孔是動則病齒痛頸腫是主津液所生病者目黄口乾鼽衂喉痺肩前臑痛大指次指痛不用氣有餘則當脉所過者熱腫虛則寒慄不復爲此諸病盛則寫之虛則補之熱則疾之寒則留之䧟下則灸之不盛不虛以經取之盛者人迎大三倍于寸口虛者人迎反小於寸口也胃足陽朙之脉起於鼻之交頞中旁納約字一本作太陽之脉下循鼻外入上齒中還出挾口環脣下交承漿却循頥後下廉出大迎循頰車上耳前過客主人循髮際至額顱其支者從大迎前下人迎循喉嚨入缺盆下膈屬胃絡脾其直者從缺盆下乳内廉下挾臍入氣街中其支者起于胃口下循腹裏下至氣街中而合以下髀關抵伏兎下膝臏中下循脛外廉下足跗入中指内間其支者下廉三寸而别下入中指外間其支者别跗上入大指間出其端是動則病洒洒振寒善呻數欠顔黒病至則惡人與火聞木聲則愓然而驚心欲動獨閉戸塞牖而處甚則欲上高而歌棄衣而走賁響腹脹是為骭厥是主血所生病者狂瘧温淫汗出鼽衂口喎脣胗頸腫喉痺大腹水腫膝臏腫痛循膺乳氣街股伏兎骭外廉足跗上皆痛中指不用氣盛則身以前皆熱其有餘于胃則消榖善饑溺色黄氣不足則身以前皆寒慄胃中寒則脹滿爲此諸病盛則寫之虛則補之熱則疾之寒則留之䧟下則灸之不盛不虛以經取之盛者人迎大三倍于寸口虛者人迎反小于寸口也脾足太隂之脉起于大指之端循指内側白肉際過核骨後上内踝前廉上踹内循脛骨後交出厥隂之前上膝股内前廉入腹屬脾絡胃上膈挾咽連舌本散舌下其支者復從胃别上膈注心中是動則病舌本強食則嘔胃脘痛腹脹善噫得後與氣則快然如衰身體皆重是主脾所生病者舌本痛體不能動摇食不下煩心心下急痛溏瘕泄水閉黄疸不能臥强立股膝内腫厥足大指不用爲此諸病盛則寫之虛則補之熱則疾之寒則留之䧟下則灸之不盛不虛以經取之盛者寸口大三倍于人迎虛者寸口反小于人迎心手少隂之脉起于心中出屬心系下膈絡小腸其支者從心系上挾咽繫目系其直者復從心系却上肺下出腋下下循臑内後廉行太隂心主之後下肘内循臂内後廉抵掌後脱骨之端入掌内後亷循小指之内出其端是動則病嗌乾心痛渇而欲飲是爲臂厥是主心所生病者目黄脇痛臑臂内後廉痛厥掌中熱痛爲此諸病盛則寫之虛則補之熱則疾之寒則留之䧟下則灸之不盛不虛以經取之盛者寸口大再倍於人迎虛者寸口反小于人迎也小腸手太陽之脉起于小指之端循手外側上腕出踝中直上循臂骨下廉出肘内側兩筋之間上循臑外後廉出肩解繞肩胛交肩上入缺盆絡心循咽下膈抵胃屬小腸其支者從缺盆循頸上頰至目鋭眥却入耳中其支者别頰上䪼抵鼻至目内眥斜絡于顴是動則病嗌痛頷腫不可以顧肩似拔臑似折是主液所生病者耳聾目黄頰腫頸頷肩臑肘臂外後廉痛爲此諸病盛則寫之虛則補之熱則疾之寒則留之䧟下則灸之不盛不虛以經取之盛者人迎大再倍于寸口虛者人迎反小于寸口也膀胱足太陽之脉起于目内眥上額交巔其支者從巔至耳上循其直者從巔入絡腦還出别下項循肩髆内挾脊抵腰中入循膂絡腎屬膀胱其支者從腰中下挾脊貫臀入膕中其支者從髆内左右别下貫胛挾脊内過髀樞循髀外從後廉下合膕中以下貫踹内出外踝之後循京骨至小指外側是動則病衝頭痛目似脫項如拔脊痛腰似折髀不可以曲膕如結踹如裂是爲踝厥是主筋所生病者痔瘧狂癲疾頭𩕄項痛目黄淚出􅍠衂項背腰尻膕踹脚皆痛小指不用為此諸病盛則寫之虛則補之熱則疾之寒則留之䧟下則灸之不盛不虛以經取之盛者人迎大再倍于寸口虛者人迎反小于寸口也腎足少隂之脉起于小指之下邪走足心出于然谷之下循内踝之後别入跟中以上踹内出膕内廉上股内後廉貫脊屬腎絡膀胱其直者從腎上貫肝膈入肺中循喉嚨挾舌本其支者從肺出絡心注胷中是動則病饑不欲食面如漆柴欬唾則有血喝喝而喘坐而欲起目􅉩􅉩如無所見心如懸若饑狀氣不足則善恐心愓愓如人將捕之是爲骨厥是主腎所生病者口熱舌乾咽腫上氣嗌乾及痛煩心心痛黄疽腸澼脊股内後廉痛痿厥嗜臥足下熱而痛爲此諸病盛則寫之虛則補之熱則疾之寒則留之䧟下則灸之不盛不虛以經取之灸則強食生肉緩帶披髮大杖重履而步盛者寸口大再倍于人迎虛者寸口反小于人迎也心主手厥隂心包絡之脉起于胷中出屬心包絡下膈歷絡三膲其支者循胷出脇下腋三寸上抵腋下循臑内行太隂少隂之間入肘中下臂行兩筋之間入掌中循中指出其端其支者别掌中循小指次指出其端是動則病手心熱臂肘攣急腋腫甚則胷脇支滿心中憺憺火動面赤目黄喜笑不休是主脉所生病者煩心心痛掌中熱爲此諸病盛則寫之虛則補之熱則疾之寒則留之䧟下則灸之不盛不虛以經取之盛者寸口大一倍于人迎虛者寸口反小于人迎也三焦手少陽之脉起于小指次指之端上出兩指之間循手表腕出臂外兩骨之間上貫肘循臑外上肩而交出足少陽之後入缺盆布膻中散落心包下膈循屬三焦其支者從膻中上出缺盆上項繫耳後直上出耳上角以屈下頰至䪼其支者從耳後入耳中出走耳前過客主人前交頰至目鋭眥是動則病耳聾渾渾焞焞嗌腫喉痺是主氣所生病者汗出目鋭眥痛頰痛耳後肩臑肘臂外皆痛小指次指不用爲此諸病盛則寫之虛則補之熱則疾之寒則留之䧟下則灸之不盛不虛以經取之盛者人迎大一倍于寸口虛者人迎反小于寸口也膽足少陽之脉起于目鋭眥上抵頭角下耳後循頸行手少陽之前至肩上却交出手少陽之後入缺盆其支者從耳後入耳中出走耳前至目鋭眥後其支者别銃眥下大迎合于手少陽抵于䪼下加頰車下頸合缺盆以下胷中貫膈絡肝屬膽循脇裏出氣街繞毛際横入髀厭中其直者從缺盆下腋循胷過季脇下合髀厭中以下循髀陽出膝外廉下外輔骨之前直下抵絶骨之端下出外踝之前循足跗上入小指次指之間其支者别跗上入大指之間循大指歧骨内出其端還貫爪甲出三毛是動則病口苦善太息心脇痛不能轉側甚則面微有塵體無膏澤足外反熱是爲陽厥是主骨所生病者頭痛頷痛目銳眥痛缺盆中腫痛腋下腫馬刁俠癭汗出振寒瘧胷脇肋髀膝外至脛絶骨外髁前及諸節皆痛小指次指不用爲此諸病盛則寫之虛則補之熱則疾之寒則留之䧟下則灸之不盛不虛以經取之盛者人迎大一倍于寸口虛者人迎反小于寸口也肝足厥隂之脉起于大指叢毛之際上循足跗上廉去内踝一寸上踝八寸交出太隂之後上膕内廉循股隂入毛中過隂器抵小腹挾胃屬肝絡膽上貫膈布脇肋循喉嚨之後上入頏顙連目系上出額與督脉㑹于巔其支者從目系下頰裏環脣内其支者復從肝别貫膈上注肺是動則病腰痛不可以俛仰丈夫㿉疝婦人少腹腫甚則嗌乾面塵脱色是肝所生病者胷滿嘔逆飱泄狐疝遺溺閉癃為此諸病盛則寫之虛則補之熱則疾之寒則留之䧟下則灸之不盛不虛以經取之盛者寸口大一倍于人迎虛者寸口反小于人迎也手太隂氣絶則皮毛焦太隂者行氣温于皮毛者也故氣不榮則皮毛焦皮毛焦則津液去皮節津液去皮節者則爪枯毛折毛折者則毛先死丙篤丁死火勝金也手少隂氣絶則脉不通脉不通則血不流血不流則髦色不澤故其面黒如漆柴者血先死壬篤癸死水勝火也足太隂氣絶者則脉不榮肌肉脣舌者肌肉之本也脉不榮則肌肉軟肌肉軟則舌萎人中滿人中滿則脣反脣反者肉先死甲篤乙死木勝土也足少隂氣絶則骨枯少隂者冬脉也伏行而濡骨髓者也故骨不濡則肉不能著也骨肉不相親則肉軟却肉軟却故齒長而垢髮無澤髮無澤者骨先死戊篤已死土勝水也足厥隂氣絶則筋絶厥隂者肝脉也肝者筋之合也筋者聚于隂氣而脉絡于舌本也故脉弗榮則筋急筋急則引舌與卵故脣青舌卷卵縮則筋先死庚篤辛死金勝木也五隂氣俱絶則目系轉轉則目運目運者爲志先死志先死則遠一日半死矣六陽氣絶則隂與陽相離離則腠理發泄絶汗乃出故旦占夕死夕占旦死經脉十二者伏行分肉之間深而不見其常見者足太隂過于外踝之上無所隠故也諸脉之浮而常見者皆絡脉也六經絡手陽朙少陽之大絡起于五指間上合肘中飲酒者衛氣先行皮膚先充絡脉絡脉先盛故衛氣已平營氣乃滿而經脉大盛脉之卒然動者皆邪氣居之留于本末不動則熱不堅則䧟且空不與衆同是以知其何脉之動也雷公曰何以知經脉之與絡脉異也黄帝曰經脉者常不可見也其虛實也以氣口知之脉之見者皆絡脉也雷公曰細子無以朙其然也黄帝曰諸絡脉皆不能經大節之間必行絶道而出入復合于皮中其㑹皆見于外故諸刺絡脉者必刺其結上甚血者雖無結急取之以寫其邪而出其血留之發爲痺也凡診絡脉脉色青則寒且痛赤則有熱胃中寒手魚之絡多青矣胃中有熱魚際絡赤其㬥黒者留久痺也其有赤有黒有青者寒熱氣也其青短者少氣也凡刺寒熱者皆多血絡必間日而一取之血盡而止乃調其虛實其小而短者少氣甚者寫之則悶悶甚則仆不得言悶則急坐之也手太隂之别名曰列缺起于腕上分間並太隂之經直入掌中散入于魚際其病實則手鋭掌熱虛則欠㰦小便遺數取之去腕半寸别走陽朙也手少隂之别名曰通里去腕一寸半别而上行循經入于心中繫舌本屬目系其實則支膈虛則不能言取之掌後一寸别走太陽也手心主之别名曰内關去腕二寸出于兩筋之間循經以上繫于心包絡心系實則心痛虛則爲頭强取之兩筋間也手太陽之别名曰支正上腕五寸内注少隂其别者上走肘絡肩髃實則節㢮肘廢虛則生肬小者如指痂疥取之所别也手陽朙之别名曰偏歷去腕三寸别入太隂其别者上循臂乘肩髃上曲頰偏齒其别者入耳合于宗脉實則齲聾虛則齒寒痺隔取之所别也手少陽之别名曰外關去腕二寸外遶臂注胷中合心主病實則肘攣虛則不收取之所别也足太陽之别名曰飛陽去踝七寸别走少隂實則鼽窒頭背痛虛則􅍠衂取之所别也足少陽之别名曰光朙去踝五寸别走厥隂下絡足跗實則厥虛則痿躄坐不能起取之所别也足陽朙之别名曰豐隆去踝八寸别走太隂其别者循脛骨外廉上絡頭項合諸經之氣下絡喉嗌其病氣逆則喉痺瘁瘖實則狂巔虛則足不收脛枯取之所别也足太隂之别名曰公孫去本節之後一寸别走陽朙其别者入絡腸胃厥氣上逆則霍亂實則腸中切痛虛則鼓脹取之所别也足少隂之别名曰大鍾當踝後繞跟别走太陽其别者并經上走于心包下外貫腰脊其病氣逆則煩悶實則閉癃虛則腰痛取之所别者也足厥隂之别名曰蠡溝去内踝五寸别走少陽其别者徑脛上睪結于莖其病氣逆則睪腫卒疝實則挺長虛則㬥癢取之所别也住脉之别名曰尾翳下鳩尾散于腹實則腹皮痛虛則癢搔取之所别也督脉之别名曰長强挾膂上項散頭上下當肩胛左右别走太陽入貫膂實則脊強虛則頭重高摇之挾脊之有過者取之所别也脾之大絡名曰大包出淵腋下三寸布胷脇實則身盡痛虛則百節盡皆縱此脉若羅絡之血者皆取之脾之大絡脉也凡此十五絡者實則必見虛則必下視之不見求之上下人經不同絡脉異所别也瞀務音䪼切之劣髀箄音骭旱音憺憺淡音邪同與斜焞焞切土渾肬由音經别第十一黄帝問于歧伯曰余聞人之合于天道也内有五藏以應五音五色五時五味五位也外有六府以應六律六律建隂陽諸經而合之十二月十二辰十二節十二經水十二時十二經脉者此五藏六府之所以應天道夫十二經脉者人之所以生病之所以成人之所以治病之所以起學之所始工之所止也麤之所易上之所難也請問其離合出入奈何歧伯稽首再拜曰朙乎哉問也此麤之所過上之所息也請卒言之足太陽之正别入于膕中其一道下尻五寸别入于肛屬于膀胱散之腎循膂當心入散直者從膂上出于項復屬于太陽此爲一經也足少隂之正至膕中别走太陽而合上至腎當十四顀出屬帶脉直者繫舌本復出于項合于太陽此爲一合成以諸隂之别皆爲正也足少陽之正繞髀入毛際合于厥隂别者入季脇之間循胷裏屬膽散之上肝貫心以上挾咽出頥頷中散于面繫目系合少陽于外眥也足厥隂之正别跗上上至毛際合于少陽與别俱行此爲一合也足陽朙之正上至髀入于腹裏屬胃散之脾上通于心上循咽出于口上頞䪼還繫目系合于陽朙也足太隂之正上至髀合于陽朙與别俱行上結于咽貫舌中此爲三合也手太陽之正指地别于肩解入腋走心繫小腸也手少隂之正别入于淵腋兩筋之間屬于心上走喉嚨出于面合目内眥此爲四合也手少陽之正指天别于巔入缺盆下走三焦散于胷中也手心主之正别下淵腋三寸入胷中别屬三焦出循喉嚨出耳後合少陽完骨之下此爲五合也手陽朙之正從手循膺乳别于肩髃入柱骨下走大腸屬于肺上循喉嚨出缺盆合于陽朙也手太隂之正别入淵腋少隂之前入走肺散之太陽上出缺盆循喉嚨復合陽朙此六合也尻切枯毛肛切胡公頥頷下戸感切上以之切經水第十二黄帝問于歧伯曰經脉十二者外合于十二經水而内屬于五藏六府夫十二經水者其有大小深淺廣狹遠近各不固五藏六府之高下小大受榖之多少亦不等相應奈何夫經水者受水而行之五藏者合神氣魂魄而藏之六府者受榖而行之受氣而揚之經脉者受血而營之合而以治奈何刺之深淺灸之壯數可得聞乎歧伯荅曰善哉問也天至高不可度地至廣不可量此之謂也且夫人生于天地之間六合之内此天之高地之廣也非人力之所能度量而至也若夫八尺之士皮肉在此外可度量切循而得之其死可解剖而視之其藏之堅脆府之大小榖之多少脉之長短血之清濁氣之多少十二經之多血少氣與其少血多氣與其皆多血氣與其皆少血氣皆有大數其治以鍼艾各調其經氣固其常有合乎黄帝曰余聞之快于耳不解于心願卒聞之歧伯荅曰此人之所以參天地而應隂陽也不可不察足太陽外合清水内屬膀胱而通水道焉足少陽外合于渭水内屬于膽足陽朙外合于海水内屬于胃足太隂外合于湖水内屬于脾足少隂外合于汝水内屬于腎足厥隂外合于澠水内屬于肝手太陽外合淮水内屬小腸而水道出焉手少陽外合于漯水内屬于三焦手陽朙外合于江水内屬于大腸手太隂外合于河水内屬于肺手少隂外合于濟水内屬于心手心主外合于漳水内屬于心包凡此五藏六府十二經水者外有源泉而内有所禀此皆内外相貫如環無端人經亦然故天爲陽地爲隂腰以上爲天腰以下爲地故海以北者爲隂湖以北者爲隂中之隂漳以南者爲陽河以北至漳者爲陽中之隂漯以南至江者爲陽中之太陽此一隅之隂陽也所以人與天地相參也黄帝曰夫經水之應經脉也其遠近淺深水血之多少各不同合而以刺之奈何歧伯荅曰足陽朙五藏六府之海也其脉大血多氣盛熱壯刺此者不深弗散不留不寫也足陽朙刺深六分留十呼足太陽深五分留七呼足少陽深四分留五呼足太隂深三分留四呼足少隂深二分留三呼足厥隂深一分留二呼手之隂陽其受氣之道近其氣之來疾其刺深者皆無過二分其留皆無過一呼其少長大小肥瘦以心撩之命曰法天之常灸之亦然灸而過此者得惡火則骨枯脉濇刺而過此者則脫氣黄帝曰夫經脉之小大血之多少膚之厚薄肉之堅脆及膕之大小可爲量度乎歧伯荅曰其可爲度量者取其中度也不甚脱肉而血氣不衰也若夫度之人痟瘦而形肉脱者惡可以度量刺乎審切循捫按視其寒温盛衰而調之是謂因適而爲之眞也澠切彌善漯切通合以心撩之意料之一本作以黄帝素問靈樞經卷之三
