body:
  text: 九鍼論第七十八黄帝曰余聞九鍼於夫子衆多博大矣余猶不能寤敢問九鍼焉生何因而有名歧伯曰九鍼者天地之大數也始於一而終於九故曰一以法天二以法地三以法人四以法時五以法音六以法律七以法星八以法風九以法野黄帝曰以鍼應九之數奈何歧伯曰夫聖人之起天地之數也一而九之故以立九野九而九之九九八十一以起黄鍾數焉以鍼應數也一者天也天者陽也五藏之應天者肺肺者五藏六府之蓋也皮者肺之合也人之陽也故為之治鍼必以大其頭而鋭其末令無得深入而陽氣出二者地也人之所以應土者肉也故為之治鍼必筩其身而員其末令無得傷肉分傷則氣得竭三者人也人之所以成生者血脉也故為之治鍼必大其身而員其末令可以按脉勿陷以致其氣令邪氣獨出四者時也時者四時八風之客於經絡之中為瘤病者也故為之治鍼必筩其身而鋒其末令可以寫熱出血而痼病竭五者音也音者冬夏之分分於子午隂與陽别寒與熱争兩氣相摶合為癰膿者也故為之治鍼必令其末如劒鋒可以取大膿六者律也律者調隂陽四時而合十二經脉虚邪客於經絡而爲㬥痺者也故爲之治鍼必令尖如氂且員且鋭中身微大以取㬥氣七者星也星者人之七竅邪之所客於經而爲痛痺舎於經絡者也故爲之治鍼令尖如蚊䖟喙静以徐徃㣲以久留正氣因之眞邪俱徃出鍼而養者也八者風也風者人之股肱八節也八正之虚風八風傷人内舎於骨解腰脊節腠理之間為深痺也故為之治鍼必長其身鋒其末可以取深邪逺痺九者野也野者人之節解皮膚之間也淫邪流溢於身如風水之狀而溜不能過於機闗大節者也故其之治鍼令尖如挺其鋒微員以取大氣之不能過於闗節者也黄帝曰鍼之長短有數乎歧伯曰一曰鑱鍼者取法於巾鍼去末寸半卒鋭之長一寸六分主熱在頭身也二曰員鍼取法於絮鍼筩其身而卯其鋒長一寸六分主治分間氣三曰鍉鍼取法於黍粟之鋭長三寸半主按脉取氣令邪出四曰鋒鍼取法於絮鍼筩其身鋒其末長一寸六分主癰熱出血五曰鈹鍼取法於劒鋒廣二分半長四寸主大癰膿兩熱争者也六曰員利鍼取法於氂鍼㣲大其末反小其身令可深内也長一寸六分主取癰痺者也七曰毫鍼取法於毫毛長一寸六分主寒熱痛痺在終者也八曰長鍼取法於綦鍼長七寸主取深邪逺痺者也九曰大鍼取法於鋒鍼其鋒微員長四寸主取大氣不出闗節者也鍼形畢矣此九鍼大小長短法也黄帝曰願聞身形應九野奈何歧伯曰請言身形之應九野也左足應立春其日戊寅己丑左脇應春分其日乙夘左毛應立夏其日戊辰己巳膺喉首頭應夏至其日丙午右手應立秋其日戊申己未右脇應秋分其日辛酉右足應立冬其日戊戌己亥腰尻下竅應冬至其日壬子六府膈下三藏應中州其大禁大禁太一所在之日及諸戊巳凡此九者善候八正所在之處所主左右上下身體有癰腫者欲治之無以其所直之日潰治之是謂天忌日也形樂志苦病生於脉治之以灸刺形苦志樂病生於筋治之以熨引形樂志樂病生於肉治之以鍼石形苦志苦病生於咽喝治之以甘藥形數驚恐筋脉不通病生於不仁治之以按摩醪藥是謂形五藏氣心主噫肺主欬肝主語脾主吞腎主欠六府氣膽為怒胃為氣逆噦大腸小腸為泄膀胱不約為遺溺下焦溢為水五味酸入肝辛入肺苦入心甘入脾鹹入腎淡入胃是謂五味五幷精氣幷肝則憂幷心則喜幷肺則悲幷腎則恐幷脾則畏是謂五精之氣幷於藏也五惡肝惡風心惡熱肺惡寒腎惡燥脾惡濕此五藏氣所惡也五液心主汗肝主泣肺主涕腎主唾脾主涎此五液所出也五勞久視傷血久卧傷氣久坐傷肉久立傷骨久行傷筋此五久勞所病也五走酸走筋辛走氣苦走血鹹走骨甘走肉是謂五走也五裁病在筋無食酸病在氣無食辛病在骨無食鹹病在血無食苦病在肉無食甘口嗜而欲食之不可多也必自裁也命曰五裁五發隂病發於骨陽病發於血以味發於氣陽病發於冬隂病發於夏五邪邪入於陽則為狂邪入於隂則為血痺邪入於陽轉則為癲疾邪入於隂轉則為瘖陽入之於隂病静隂出之於陽病喜怒五藏心藏神肺藏魄肝藏魂脾藏意腎藏精志也五主心主脉肺主皮肝主筋脾主肌腎主骨陽朙多血多氣太陽多血少氣少陽多氣少血太隂多血少氣厥隂多血少氣少隂多氣少血故曰刺陽朙出血氣刺太陽出血惡氣刺少陽出氣惡血刺太隂出血惡氣刺厥隂出血惡氣刺少隂出氣惡血也足陽朙太隂為表裏少陽厥隂為表裏太陽少隂為表裏是謂足之隂陽也手陽朙太隂為表裏少陽心主為表裏太陽少隂為表裏是謂手之隂陽也筩同音鍉鍼低音巾鍼布鍼一本作五走湊五五裁問素禁作五嵗露論第七十九黄帝問於岐伯曰經言夏日傷暑秋病瘧瘧之發以時其故何也歧伯對曰邪客於風府病循膂而下衛氣一日一夜常大㑹於風府其朙日日下一節故其日作晏此其先客於脊背也故每至於風府則腠理開腠理開則邪氣入邪氣入則病作此所以日作尚晏也衛氣之行風府日下一節二十一日下至尾底二十二日入脊内注於伏衝之脉其行九日出於缺盆之中其氣上行故其病稍益至其内摶於五藏横連募原其道逺其氣深其行遲不能日作故次日乃稸積而作焉黄帝曰衛氣每至於風府腠理乃發發則邪入焉其衛氣日下一節則不當風府奈何歧伯曰風府無常衛氣之所應必開其腠理氣之所舍節則其府也黄帝曰善夫風之與瘧也相與同類而風常在而瘧特以時休何也歧伯曰風氣留其處瘧氣隨經絡沉以内摶故衛氣應乃作也帝曰善黄帝問於少師曰余聞四時八風之中人也故有寒暑寒則皮膚急而腠理閉暑則皮膚緩而腠理開賊風邪氣因得以入乎將必須八正虚邪乃能傷人乎少師荅曰不然賊風邪氣之中人也不得以時然必因其開也其入深其内極病其病人也卒㬥因其閉也其入淺以留其病也徐以遲黄帝曰有寒温和適腠理不開然有卒病者其故何也少師荅曰帝弗知邪入乎雖平居其腠理開閉緩急其故常有時也黄帝曰可得聞乎少師曰人與天地相參也與日月相應也故月滿則海水西盛人血氣積肌肉充皮膚緻毛髮堅腠理㕁煙垢著當是之時雖遇賊風其入淺不深至其月郭空則海水東盛人氣血虚其衛氣去形獨居肌肉減皮膚縱腠理開毛髮殘膲理薄煙垢落當是之時遇賊風則其入深其病人也卒㬥黄帝曰其有卒然㬥死㬥病者何也少師荅曰三虚者其死㬥疾也得三實者邪不能傷人也黄帝曰願聞三虚少師曰乗年之衰逢月之空失時之和因為賊風所傷是謂三虚故論不知三虚工反為麤帝曰願聞三實少師曰逢年之盛遇月之滿得時之和雖有賊風邪氣不能危之也黄帝曰善乎哉論朙乎哉道請藏之金匱命曰三實然此一夫之論也黄帝曰願聞嵗之所以皆同病者何因而然少師曰此八正之候也黄帝曰候之奈何少師曰候此者常以冬至之日太一立於叶蟄之宫其至也天必應之以風雨者矣風雨從南方來者為虚風賊傷人者也其以夜半至也萬民皆卧而弗犯也故其嵗民小病其以晝至者萬民懈惰而皆中於虚風故萬民多病虚邪入客於骨而不發於外至其立春陽氣大發腠理開因立春之日風從西方來萬民又皆中於虚風此兩邪相搏經氣結代者矣故諸逢其風而遇其雨者命曰遇嵗露焉因嵗之和而少賊風者民少病而少死嵗多賊風邪氣寒温不和則民多病而死矣黄帝曰虚邪之風其所傷貴賤何如候之奈何少師荅曰正月朔日太一居天留之宫其日西北風不雨人多死矣正月朔日平旦北風春民多死正月朔日平旦北風行民病多者十有三也正月朔日日中北風夏民多死正月朔日夕時北風秋民多死終日北風大病死者十有六正月朔日風從南方來命曰旱鄉從西方來命曰白骨將國有殃人多死亡正月朔日風從東方來發屋揚沙石國有大災也正月朔日風從東南方行春有死亡正月朔天利温不風糴賤民不病天寒而風糴貴民多病此所謂候嵗之風傷人者也二月丑不風民多心腹病三月戌不溫民多寒熱四月已不暑民多癉病十月申不寒民多㬥死諸所謂風者皆發屋折樹木揚沙石起毫毛發腠理者也理郄切乞逆大惑論第八十黄帝問於歧伯曰余嘗上於清泠之臺中階而顧匍匐而前則惑余私異之竊内怪之獨瞑獨視安心定氣久而不解獨博獨眩披髮長跪俛而視之後久之不已也卒然自上何氣使然歧伯對曰五藏六府之精氣皆上注於目而為之精精之窠為眼骨之精為瞳子筋之精為黒眼血之精為絡其窠氣之精為白眼肌肉之精為約束裏擷筋骨血氣之精而與脉幷為系上屬於腦後出於項中故邪中於項因逢其身之虚其入深則隨眼系以入於腦入於腦則腦轉腦轉則引目系急目系急則目眩以轉矣邪其精其精所中不相比也則精散精散則視歧視歧見兩物目者五藏六府之精也營衛魂魄之所常營也神氣之所生也故神勞則魂魄散志意亂是故瞳子黒眼法於隂白眼赤脉法於陽也故隂陽合傳而精朙也目者心使也心者神之舎也故神精亂而不轉卒然見非常處精神魂魄散不相得故曰惑也黄帝曰余疑其然余每之東苑未曽不惑去之則復余唯獨為東苑勞神乎何其異也歧伯曰不然也心有所喜神有所惡卒然相惑則精氣亂視誤故惑神移乃復是故間者為迷甚者為惑黄帝曰人之善忘者何氣使然歧伯曰上氣不足下氣有餘腸胃實而心肺虚虚則營衛留於下久之不以時上故善忘也黄帝曰人之善饑而不嗜食者何氣使然歧伯曰精氣幷於脾熱氣留於胃胃熱則消穀穀消故善饑胃氣逆上則胃脘寒故不嗜食也黄帝曰病而不得卧者何氣使然歧伯曰衛氣不得入於隂常留於陽留於陽則陽氣滿陽氣滿則陽蹻盛不得入於隂則隂氣虚故目不瞑矣黄帝曰病目而不得視者何氣使然歧伯曰衛氣留於隂不得行於陽留於隂則隂氣盛隂氣盛則隂蹻滿不得入於陽則陽氣虚故目閉也黄帝曰人之多卧者何氣使然歧伯曰此人腸胃大而皮膚濕而分肉不解焉腸胃大則衛氣留久皮膚濕則分肉不解其行遲夫衛氣者晝日常行於陽夜行於隂故陽氣盡則卧隂氣盡則寤故腸胃大則衛氣行留久皮膚濕分肉不解則行遲留於隂也久其氣不淸則欲瞑故多卧矣其腸胃小皮膚滑以緩分肉解利衛氣之留於陽也久故少瞑焉黄帝曰其非常經也卒然多卧者何氣使然歧伯曰邪氣留於上膲上膲閉而不通已食者飲湯衛氣留久於隂而不行故卒然多卧焉黄帝曰善治此諸邪奈何歧伯曰先其藏府誅其小過後調其氣盛者寫之虚者補之必先朙知其形志之苦樂定乃取之裹擷切奚結神分切方文癰疽第八十一黄帝曰余聞腸胃受穀上焦出氣以温分肉而養骨節通􅴪理中焦出氣如露上注谿谷而滲孫脉津液和調變化而赤為血血和則孫脉先滿溢乃注於絡脉皆盈乃注於經脉隂陽已張因息乃行行有經紀周有道理與天合同不得休止切而調之從虚去實爲則不足疾則氣減留則先後後虚去虚補則有餘血氣已調形氣乃持余已知血氣之平與不平未知癰疽之所從生成敗之時死生之期有逺近何以度之可得聞乎歧伯曰經脉留行不止與天同度與地合紀故天宿失度日月薄蝕地經失紀水道流溢草萓不成五穀不殖徑路不通民不徃來巷聚邑居則别離異處血氣猶然請言其故夫血脉營衛周流不休上應星宿下應經數寒邪客於經絡之中則血泣血泣則不通不通則衛氣歸之不得復反故癰腫寒氣化為熱熱勝則腐肉肉腐則爲膿膿不寫則爛筋筋爛則傷骨骨傷則髓消不當骨空不得泄寫血枯空虚則筋骨肌肉不相榮經脉敗漏薰於五藏藏傷故死矣黄帝曰願盡聞癰疽之形與忌曰名歧伯曰癰發於嗌中名曰猛疽猛疽不治化爲膿膿不寫塞咽半日死其化爲膿者寫則合豕膏冷食三日而已發於頸名曰天疽其癰大以赤黒不急治則熱氣下入淵腋前傷任脉内薰肝肺薰肝肺十餘日而死矣陽留大發消腦留項名曰腦爍其色不樂項痛而如刺以鍼煩心者死不可治發於肩及臑名曰疵癰其狀赤黒急治之此令人汗出至足不害五藏癰發四五日逞焫之發於腋下赤堅者名曰米疽治之以砭石欲細而長踈砭之塗已豕膏六日已勿裹之其癰堅而不潰者為馬刁挾癭急治之發於胸名曰井疽其狀如大豆三四日起不早治下入腹不治七日死矣發於膺名曰甘疽色青其狀如穀實􅌝􅌣常苦寒熱急治之去其寒熱十嵗死死後出膿發於脇名曰敗疵敗疵者女子之病也灸之其病大癰膿治之其中乃有生肉大如赤小豆剉䔖草根各一升以水一斗六升煑之竭為取三升則强飲厚衣坐於釡上令汗出至足已發於股脛名曰股脛疽其狀不甚變而癰膿摶骨不急治三十日死矣發於尻名曰鋭疽其狀赤堅大急治之不治三十日死矣發於股隂名曰赤施不急治六十日死在兩股之内不治十日而當死發於膝名曰疵癰其狀大癰色不變寒熱如堅石勿石石之者死須其柔乃石之者生諸癰疽之發於節而相應者不可治也發於陽者百日死發於隂者三十日死發於脛名曰兎齧其狀赤至骨急治之不治害人也發於内踝名曰走緩其狀癰也色不變數石其輸而止其寒熱不死發於足上下名曰四淫其狀大癰急治之百日死發於足傍名曰厲癰其狀不大初如小指發急治之去其黒者不消輒益不治百日死發於足指名脱癰其狀赤黒死不治不赤黒不死不衰急斬之不則死矣黄帝曰夫子言癰疽何以别之歧伯曰營衛稽留於經脉之中則血泣而不行不行則衛氣從之而不通壅遏而不得行故熱大熱不止熱勝則肉腐肉腐則為膿然不能陷骨髓不為燋枯五藏不為傷故命曰癰黄帝曰何謂疽歧伯曰熱氣淳盛下陷肌膚筋髓枯内連五藏血氣竭當其癰下筋骨良肉皆無餘故命曰疽疽者上之皮夭以堅上如牛領之皮癰者其皮上薄以澤此其候也草萓切魚饑血泣澁音􅌝􅌣樓字古括臑又音懦奴到切䔖翹切力升不則九切上府夭不朙也音么色黃帝素問靈樞經卷之十二終
