front:
  text: 黃帝素問靈樞經卷之六
  hash: sha256:b22312bb51ddea7eb84769a6b8b2cb3ae50d141f26f0fb4d3e2697d23d335ec0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3e0002_SBCK_006-1a}
body:
  text: 師傳第二十九黄帝曰余聞先師有所心藏弗著于方余願聞而藏之則而行之上以治民下以治身使百姓無病上下和親德澤下流子孫無憂傳于後世無有終時可得聞乎歧伯曰逺乎哉問也夫治民與自治治彼與治此治小與治大治國與治家未有逆而能治之也夫惟順而已矣順者非獨隂陽脉論氣之逆順也百姓人民皆欲順其志也黃帝曰順之奈何歧伯曰入國問俗入家問諱上堂問禮臨病人問所便黃帝曰便病人奈何歧伯曰夫中熱消癉則便寒寒中之屬則便熱胃中熱則消榖令人縣心養饑臍以上皮熱腸中熱則出黃如糜臍以下皮寒胃中寒則腹脹腸中寒則腸鳴飱泄胃中寒腸中熱則脹而且泄胃中熱腸中寒則疾饑小腹痛脹黃帝曰胃欲寒饑腸欲熱飲兩者相逆便之奈何且夫王公大人血食之君驕恣從欲輕人而無能禁之禁之則逆其志順之則加其病便之奈何治之何先歧伯曰人之情莫不惡死而樂生告之以其敗語之以其善導之以其所便開之以其所苦雖有無道之人惡有不聽者乎黃帝曰治之奈何歧伯曰春夏先治其標後治其本秋冬先治其本後治其標黃帝曰便其相逆者奈何歧伯曰便此者食飲衣服亦欲適寒温寒無凄愴暑無出汗食飲者熱無灼灼寒無滄滄寒温中適故氣將持乃不致邪僻也黃帝曰本藏以身形支節䐃肉候五藏六府之小大焉今夫王公大人臨朝即位之君而問焉誰可捫循之而後答乎歧伯曰身形支節者藏府之蓋也非面部之閱也黃帝曰五藏之氣閲于面者余已知之矣以肢節知而閱之奈何歧伯曰五藏六府者肺為之蓋巨肩䧟咽候見其外黃帝曰善歧伯曰五藏六府心為之主缺盆為之道骷骨有餘以候􅐳􅚯黃帝曰善歧伯曰肝者主為將使之候外欲知堅固視目大小黃帝曰善歧伯曰脾者主為衛使之迎糧視脣舌好惡以知吉凶黃帝曰善歧伯曰腎者主為外使之逺聽視耳好惡以知其性黃帝曰善願聞六府之候歧伯曰六府者胃為之海廣骸大頸張胷五榖乃容鼻隧以長以候大腸脣厚人中長以候小腸目下果大其膽乃横鼻孔在外膀胱漏泄鼻柱中央起三焦乃約此所以候六府者也上下三等藏安且良矣便平聲决氣第三十黃帝曰余聞人有精氣津液血脉余意以為一氣耳今乃辨為六名余不知其所以然歧伯曰兩神相搏合而成形常先身生是謂精何謂氣歧伯曰上焦開發宣五榖味熏膚充身澤毛若霧露之漑是謂氣何謂津歧伯曰腠理發泄汗出溱溱是謂津何謂液歧伯曰榖入氣滿淖澤注于骨骨屬屈伸洩澤補益腦髓皮膚潤澤是謂液何謂血歧伯曰中焦受氣取汁變化而赤是謂血何謂脉歧伯曰壅遏營氣令無所避是謂脉黃帝曰六氣者有餘不足氣之多少腦髓之虛實血脉之清濁何以知之歧伯曰精脫者耳聾氣脫者目不明津脫者腠理開汗大泄液脫者骨屬屈伸不利色夭腦髓消脛痠耳數鳴血脫者色白夭然不澤其脉空虛此其候也黃帝曰六氣者貴賤何如歧伯曰六氣者各有部主也其貴賤善惡可為常主然五榖與胃為大海也溱音臻腸胃第三十一黃帝問于伯高曰余願聞六府傳榖者腸胃之大小長短受榖之多少奈何伯髙曰請盡言之榖所從出入淺深逺近長短之度脣至齒長九分口廣二寸半齒以後至㑹厭深三寸半大容五合舌重十兩長七寸廣二寸半咽門重十兩廣一寸半至胃長一尺六寸胃䊸曲屈伸之長二尺六寸大一尺五寸徑五寸大容三斗五升小腸後附脊左環廻周疊積其注于廻腸者外附于臍上迴運環十六曲大二寸半徑八分分之少半長三丈二尺迴腸當臍左環迴周葉積而下迴運環反十六曲大四寸徑一寸寸之少半長二丈一尺廣腸傳脊以受廻腸左環葉脊上下辟大八寸徑二寸寸之大半長二尺八寸腸胃所入至所出長六丈四寸四分迴曲環反三十二曲也平人絶榖第三十二黃帝曰願聞人之不食七日而死何也伯髙曰臣請言其故胃大一尺五寸徑五寸長二尺六寸横屈受水榖三斗五升其中之榖常留二斗水一斗五升而滿上焦泄氣出其精微慓悍滑疾下焦下漑諸腸小腸大二寸半徑八分分之少半長三丈二尺受榖二斗四升水六升三合合之大半迴腸大四寸徑一寸寸之少半長二丈一尺受榖一斗水七升半廣腸大八寸徑二寸寸之大半長二尺八寸受榖九升三合八分合之一腸胃之長凡五丈八尺四寸受水榖九斗二升一合合之大半此腸胃所受水榖之數也平人則不然胃滿則腸虛腸滿則胃虛更虛更滿故氣得上下五藏安定血脉和利精神乃居故神者水榖之精氣也故腸胃之中當留榖二斗水一斗五升故平人日再後後二升半一日中五升七日五七三斗五升而留水榖盡矣故平人不食飲七日而死者水榖精氣津液皆盡故也海論第三十三黃帝問于歧伯曰余聞刺法于夫子夫子之所言不離于營衛血氣夫十二經脉者内屬于府藏外絡于肢節夫子乃合之于四海乎歧伯答曰人亦有四海十二經水經水者皆注于海海有東西南北命曰四海黃帝曰以人應之奈何歧伯曰人有髓海有血海有氣海有水榖之海凡此四者以應四海也黃帝曰逺乎哉夫子之合人天地四海也願聞應之奈何歧伯答曰必先明知隂陽表裏滎輸所在四海定矣黃帝曰定之奈何歧伯曰胃者水榖之海其輸上在氣街下至三里衝脉者為十二經之海其輸上在于大杼下出于巨虛之上下亷膻中者為氣之海其輸上在于柱骨之上下前在于人迎腦為髓之海其輸上在于其蓋下在風府黃帝曰凡此四海者何利何害何生何敗歧伯曰得順者生得逆者敗知調者利不知調者害黃帝曰四海之逆順奈何歧伯曰氣海有餘者氣滿胷中悗息面赤氣海不足則氣少不足以言血海有餘則常想其身大怫然不知其所病血海不足亦常想其身小狹然不知其所病水榖之海有餘則腹滿水榖之海不足則饑不受榖食髓海有餘則輕勁多力自過其度髓海不足則腦轉耳鳴脛痠眩冒目無所見懈怠安臥黃帝曰余已聞逆順調之奈何歧伯曰審守其輸而調其虛實無犯其害順者得復逆者必敗黃帝曰善五亂第三十四黃帝曰經脉十二者别為五行分為四時何失而亂何得而治歧伯曰五行有序四時有分相順則治相逆則亂黃帝曰何謂相順歧伯曰經脉十二者以應十二月十二月者分為四時四時者春秋冬夏其氣各異營衛相隨隂陽已和清濁不相于如是則順之而治黃帝曰何謂逆而亂歧伯曰清氣在隂濁氣在陽營氣順脉衛氣逆行清濁相于亂于胷中是謂大悗故氣亂于心則煩心宻嘿俛首靜伏亂于肺則俛仰喘喝接手以呼亂于腸胃則為霍亂亂于臂脛則為四厥亂于頭則為厥逆頭重眩仆黃帝曰五亂者刺之有道乎歧伯曰有道以來有道以去審知其道是謂身寳黃帝曰善願聞其道歧伯曰氣在于心者取之手少隂心主之輸氣在於肺者取之手太隂滎足少隂輸氣在于腸胃者取之足太隂陽朙不下者取之三里氣在于頭者取之天柱大杼不知取足太陽滎輸氣在于臂足取之先去血脉後取其陽朙少陽之榮輸黃帝曰補寫奈何歧伯曰徐入徐出謂之導氣補寫無形謂之同精是非有餘不足也亂氣之相逆也黃帝曰允乎哉道明乎哉論請著之玉版命曰治亂也脹論第三十五黃帝曰脉之應于寸口如何而脹歧伯曰其脉大堅以濇者脹也黃帝曰何以知藏府之脹也歧伯曰隂為藏陽為府黃帝曰夫氣之令人脹也在于血脉之中耶藏府之内乎歧伯曰三二字一云者皆存焉然非脹之舎也黃帝曰願聞脹之舍歧伯曰夫脹者皆在于藏府之外排藏府而郭胷脇脹皮膚故命曰脹黃帝曰藏府之在胷脇腹裏之内也若匣匱之藏禁器也各有次舎異名而同處一域之中其氣各異願聞其故黃帝曰未解其意再問歧伯曰夫胷腹藏府之郭也膻中者心主之宫城也胃者太倉也咽喉小腸者傳送也胃之五竅者閭里門户也亷泉玊英者津液之道也故五藏六府者各有畔界其病各有形狀營氣循脉衛氣逆為脉脹衛氣並脉循分為膚脹三里而寫近者一下逺者三下無問虛實工在疾寫黃帝曰願聞脹形歧伯曰夫心脹者煩心短氣臥不安肺脹者虛滿而喘欬肝脹者脇下滿而痛引小腹脾脹者善噦四肢煩悗體重不能勝衣臥不安腎脹者腹滿引背央央然腰髀痛六府脹胃脹者腹滿胃脘痛鼻聞焦臭妨于食大便難大腸脹者腸鳴而痛濯濯冬日重感于寒則飱泄不化小腸脹者少腹䐜脹引腰而痛膀胱脹者少腹滿而氣癃三焦脹者氣滿于皮膚中輕輕然而不堅膽脹者脇下痛脹口中苦善太息凡此諸脹者其道在一明知逆順鍼數不失寫虛補實神去其室致邪失正眞不可定麤之所敗謂之夭命補虛寫實神歸其室乆塞其空謂之良工黃帝曰脹者焉生何因而有歧伯曰衛氣之在身也常然並脉循分肉行有逆順隂陽相隨乃得天和五藏更始四時循序五榖乃化然後厥氣在下營衛留止寒氣逆上真邪相攻兩氣相搏乃合為脹也黃帝曰善何以解惑歧伯曰合之于眞三合而得帝曰善黃帝問于歧伯曰脹論言無間虛實工在疾寫近者一下逺者三下今有其三而不下者其過焉在歧伯對曰此言䧟于肉盲而中氣宂者也不中氣宂則氣内閉鍼不䧟盲則氣不行上越中肉則衛氣相亂隂陽相逐其于脹也當寫不寫氣故不下三而不下必更其道氣下乃止不下復始可以萬全烏有殆者乎其于脹也必審其􅪊當寫則寫當補則補如鼓應桴惡有不下者乎五癃津液别第三十六黃帝問于歧伯曰水榖入于口輸于腸胃其液别為五天寒衣薄則為溺與氣天熱衣厚則為汗悲哀氣并則為泣中熱胃緩則為唾邪氣内逆則氣為之閉塞而不行不行則為水脹余知其然也不知其何由生願聞其道歧伯曰水榖皆入于口其味有五各注其海津液各走其道故三焦出氣以温肌肉充皮膚為其津其流而不行者為液天暑衣厚則腠理開故汗出寒留于分肉之間聚沫則為痛天寒則腠理閉氣濕不行水下留于膀胱則為溺與氣五藏六府心為之主耳為之聽目為之候肺為之相肝為之將脾為之衛腎為之主外故五藏六府之津液盡上渗于目心悲氣并則心系急心系急則肺舉肺舉則液上溢夫心系與肺不能常舉乍上乍下故欬而泣出矣中熱則胃中消榖消榖則蟲上下作腸胃充郭故胃緩胃緩則氣逆故唾出五榖之津液和合而爲膏者内渗入于骨空補益腦髓而下流于隂股隂陽不和則使液溢而下流于隂髓液皆減而下下過度則虛虛故腰背痛而脛痠隂陽氣道不通四海閉塞三焦不寫津液不化水榖幷行腸胃之中别于迴腸留于下焦不得渗膀胱則下焦脹水溢則爲水脹此津液五别之逆順也五閱五使第三十七黃帝問于歧伯曰余聞刺有五官五閲以觀五氣五氣者五藏之使也五時之副也願聞其五使當安出歧伯曰五官者五藏之閱也黃帝曰願聞其所出令可為常歧伯曰脉出于氣口色見于明堂五色更出以應五時各如其常經氣入藏必當治裏帝曰善五色獨决于明堂乎歧伯曰五官己辨闕庭必張乃立明堂明堂廣大蕃蔽見外方壁高基引垂居外五色乃治平博廣大壽中百嵗見此者刺之必已如是之人者血氣有餘肌肉堅緻故可苦已鍼黃帝曰願聞五官歧伯曰鼻者肺之官也目者肝之官也口脣者脾之官也舌者心之官也耳者腎之官也黃帝曰以官何候歧伯曰以候五藏故肺病者喘息鼻脹肝病者􅗃青脾病者脣黃心病者舌巻短顴赤腎病者顴與顔黒黄帝曰五脉安出五色安見其常色殆者如何歧伯曰五官不辨闕庭不張小其明堂蕃蔽不見又埤其牆牆下無基垂角去外如是者雖平常殆况加疾哉黃帝曰五色之見于明堂以觀五藏之氣左右高下各有形乎歧伯曰府藏之在中也各以次舎左右上下各如其度也緻密也池利切逆順肥瘦第三十八黃帝問于歧伯曰余聞鍼道于夫子衆多畢悉矣夫子之道應若失而據未有堅然者也夫子之問學熟乎將審察于物而心生之乎歧伯曰聖人之為道者上合于天下合于地中合于人事必有明法以起度數法式檢押乃後可傳焉故匠人不能釋尺寸而意短長廢繩墨而起平木也工人不能置規而為圓去矩而為方知用此者固自然之物易用之教逆順之常也黃帝曰願聞自然奈何歧伯曰臨深決水不用功力而水可竭也循掘決衝而經可通也此言氣之滑澀血之清濁行之逆順也黃帝曰願聞人之白黒肥瘦小長各有數乎歧伯曰年質壯大血氣充盈膚革堅固因加以邪刺此者深而留之此肥人也廣肩腋項肉薄厚皮而黒色脣臨臨然其血黒以濁其氣濇以遲其為人也貪于取與刺此者深而留之多益其數也黃帝曰刺瘦人奈何歧伯曰瘦人者皮薄色少肉亷亷然薄脣輕言其血清氣滑易脫于氣易損于血刺此者淺而疾之黃帝曰刺常人奈何歧伯曰視其白黒各為調之其端正敦厚者其血氣和調刺此者無失常數也黃帝曰刺壯士眞骨者奈何歧伯曰刺壯士眞骨堅肉緩節監監然此人重則氣濇血濁刺此者深而留之多益其數勁則氣滑血清刺此者淺而疾之黃帝曰刺嬰兒奈何歧伯曰嬰兒者其肉脆血少氣弱刺此者以豪刺淺刺而疾發鍼日再可也黃帝曰臨深決水奈何歧伯曰血清氣濁疾寫之則氣竭焉黃帝曰循掘决衝奈何歧伯曰血濁氣濇疾寫之則經可通也黃帝曰脉行之逆順奈何歧伯曰手之三隂從藏走手手之三陽從手走頭足之三陽從頭走足足之三隂從足走腹黃帝曰少隂之脉獨下行何也歧伯曰不然夫衝脉者五藏六府之海也五藏六府皆禀焉其上者出於頏顙滲諸陽灌諸精其下者注少隂之大絡出于氣街循隂股内亷入膕中伏行骭骨内下至内踝之後屬而别其下者並于少隂之經滲三隂其前者伏行出跗屬下循跗入大指問渗諸絡而温肌肉故别絡結則跗上不動不動則厥厥則寒矣黃帝曰何以明之歧伯曰以言導之切而驗之其非必動然後乃可明逆順之行也黃帝曰窘乎哉聖人之為道也明于日月微于毫釐其非夫子孰能道之也血絡論第三十九黃帝曰願聞其竒邪而不在經者歧伯曰血絡是也黃帝曰刺血絡而仆者何也血出而射者何也血少黒而濁者何也血出清而半為汁者何也發鍼而腫者何也血出若多若少而面色蒼蒼者何也發鍼而面色不變而煩悗者何也多出血而不動摇者何也願聞其故歧伯曰脉氣盛而血虛者刺之則脫氣脫氣則仆血氣俱盛而隂氣多者其血滑刺之則射陽氣畜積乆留而不寫者其血黒以濁故不能射新飲而液渗于絡而未合和于血也故血出而汁别焉其不新飲者身中有水乆則為腫隂氣積于陽其氣因于絡故刺之血未出而氣先行故腫隂陽之氣其新相得而未和合因而寫之則隂陽俱脫表裏相離故脫色而蒼蒼然刺之血出多色不變而煩悗者刺絡而虛經虛經之屬于隂者隂脫故煩悗隂陽相得而合為痺者此為内溢于經外注于絡如是者隂陽俱有餘雖多出血而弗能虛也黃帝曰相之奈何歧伯曰血脉者盛堅横以赤上下無常處小者如鍼大者如筯則而寫之萬全也故無失數矣失數而反各如其度黃帝曰鍼入而肉著者何也歧伯曰熱氣因于鍼則鍼熱熱則肉著于鍼故堅焉隂陽清濁第四十黃帝曰余聞十二經脉以應十二經水者其五色各異清濁不同人之血氣若一應之奈何歧伯曰人之血氣苟能若一則天下為一矣惡有亂者乎黃帝曰余問一人非問天下之衆歧伯曰夫一人者亦有亂氣天下之衆亦有亂人其合為一耳黃帝曰願聞人氣之清濁歧伯曰受榖者濁受氣者清清者注隂濁者注陽濁而清者上出于咽清而濁者則下行清濁相干命曰亂氣黃帝曰夫隂清而陽濁濁者有清清者有濁清濁别之奈何歧伯曰氣之大别清者上注于肺濁者下走于胃胃之清氣上出于口肺之濁氣下注于經内積于海黃帝曰諸陽皆濁何陽濁甚乎歧伯曰手太陽獨受陽之濁手太隂獨受隂之清其清者上走空竅其濁者下行諸經諸隂皆清足太隂獨受其濁黃帝曰治之奈何歧伯曰清者其氣滑濁者其氣濇此氣之常也故刺隂者深而留之刺陽者淺而疾之清濁相于者以數調之也悗音悶空音孔黃帝素問靈樞經卷之六
