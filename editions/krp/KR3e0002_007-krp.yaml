front:
  text: 黃帝素問靈樞經卷之七
  hash: sha256:43d23d7b491c7403558b6b6deb45d2c495f6aab64bff0d3199df99b06fd1132b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3e0002_SBCK_007-1a}
body:
  text: 隂陽繫日月第四十一黄帝曰余聞天為陽地為隂日為陽月為隂其合之于人奈何歧伯曰腰以上為天腰以下為地故天為陽地為隂故足之十二經脉以應十二月月生于水故在下者為隂手之十指以應十日日主火故在上者為陽黄帝曰合之于脉奈何歧伯曰寅者正月之生陽也主左足之少陽未者六月主右足之少陽夘者二月主左足之太陽午者五月主右足之太陽辰者三月主左足之陽朙巳者四月主右足之陽朙此兩陽合于前故曰陽朙申者七月之生隂也主右足之少隂丑者十二月主左足之少隂酉者八月主右足之太隂子者十一月主左足之太隂戌者九月主右足之厥隂亥者十月主左足之厥隂此兩隂交盡故曰厥隂甲主左手之少陽巳主右手之少陽乙主左手之太陽戊主右手之太陽丙主左手之陽朙丁主右手之陽朙此兩火幷合故為陽朙庚主右手之少隂癸主左手之少隂辛主右手之太隂壬主左手之太隂故足之陽者隂中之少陽也足之隂者隂中之太隂也手之陽者陽中之太陽也手之隂者陽中之少隂也腰以上者為陽腰以下者為隂其於五藏也心為陽中之太陽肺為隂中之少隂肝為隂中之少陽脾為隂中之至隂腎為隂中之太隂黄帝曰以治之奈何歧伯曰正月二月三月人氣在左無刺左足之陽四月五月六月人氣在右無刺右足之陽七月八月九月人氣在右無刺右足之隂十月十一月十二月人氣在足無刺左足之隂黄帝曰五行以東方為甲乙木王春春者蒼色主肝肝者足厥隂也今乃以甲為左手之少陽不合于數何也歧伯曰此天地之隂陽也非四時五行之以次行也且夫隂陽者有名而無形故數之可十離之可百散之可千推之可萬此之謂也病傳第四十二黄帝曰余受九鍼于夫子而私覽于諸方或有導引行氣喬摩灸熨刺焫飲藥之一者可獨守耶將盡行之乎歧伯曰諸方者衆人之方也非一人之所盡行也黄帝曰此乃所謂守一勿失萬物畢者也今余已聞隂陽之要虚實之理傾移之過可治之屬願聞病之變化淫傳絶敗而不可治者可得聞乎歧伯曰要乎哉問道昭乎其如日醒窘乎其如夜暝能被而服之神與俱成畢將服之神自得之生神之理可著于竹帛不可傳于子孫黄帝曰何謂日醒歧伯曰朙于隂陽如惑之解如醉之醒黄帝曰何謂夜瞑歧伯曰瘖乎其無聲漠乎其無形折毛發理正氣横傾淫邪泮衍血脉傳溜大氣入藏腹痛下淫可以致死不可以致生黄帝曰大氣入藏柰何歧伯曰病先發于心一日而之肺三日而之肝五日而之脾三日不已死冬夜半夏日中病先發于肺三日而之肝一日而之脾五日而之胃十日不已死冬日入夏日出病先發于肝三日而之脾五日而之胃三日而之腎三日不已死冬日入夏蚤食病先發于脾一日而之胃二日而之腎三日而之膂膀胱十日不已死冬人定夏晏食病先發于胃五日而之腎三日而之膂膀胱五日而上之心二日不已死冬夜半夏日昳病先發于腎三日而之膂膀胱三日而上之心三日而之小腸三日不已死冬大晨夏早晡病先發于膀胱五日而之腎一日而之小腸一日而之心二日不已死冬雞鳴夏下晡諸病以次相傳如是者皆有死期不可刺也間一藏及二三四藏者乃可刺也昳切徒結淫邪發夢第四十三黄帝曰願聞淫邪泮衍奈何歧伯曰正邪從外襲内而未有定舍反淫于藏不得定處與營衛俱行而與魂魄飛揚使人臥不得安而喜夢氣淫于府則有餘于外不足于内氣淫于藏則有餘于内不足于外黄帝曰有餘不足有形乎歧伯曰隂氣盛則夢渉大水而恐懼陽氣盛則夢大火而燔焫隂陽俱盛則夢相殺上盛則夢飛下盛則夢墮甚饑則夢取甚飽則夢予肝氣盛則夢怒肺氣盛則夢恐懼哭泣飛揚心氣盛則夢善笑恐畏脾氣盛則夢歌樂身體重不舉腎氣盛則夢腰脊兩解不屬凡此十二盛者至而寫之立已厥氣客于心則夢見丘山煙火客于肺則夢飛揚見金鐵之奇物客于肝則夢山林樹木客于脾則夢見丘陵大澤壞屋風雨客于腎則夢臨淵没居水中客于膀胱則夢遊行客于胃則夢飲食客于大腸則夢田野客于小腸則夢聚邑衝衢客于膽則夢鬬訟自刳客于隂器則夢接内客于項則夢斬首客于脛則夢行走而不能前及居深地窌苑中客于股肱則夢禮節拜起客于胞䐈則夢溲便凡此十五不足者至而補之立已也窌切力交順氣一日分為四時第四十四黄帝曰夫百病之所始生者必起于燥濕寒暑風雨隂陽喜怒飲食居處氣合而有形得藏而有名余知其然也夫百病者多以旦慧晝安夕加夜甚何也歧伯曰四時之氣使然黄帝曰願聞四時之氣歧伯曰春生夏長秋收冬藏是氣之常也人亦應之以一日分為四時朝則為春日中為夏日入為秋夜半為冬朝則人氣始生病氣衰故旦慧日中人氣長長則勝邪故安夕則人氣始衰邪氣始生故加夜半人氣入藏邪氣獨居于身故甚也黄帝曰其時有反者何也歧伯曰是不應四時之氣藏獨主其病者是必以藏氣之所不勝時者甚以其所勝時者起也黄帝曰治之奈何歧伯曰順天之時而病可與期順者為工逆者為麤黄帝曰善余聞刺有五變以主五輸願聞其數歧伯曰人有五藏五藏有五變五變有五輸故五五二十五輸以應五時黄帝曰願聞五變歧伯曰肝為牡藏其色青其時春其音角其味酸其日甲乙心為牡藏其色赤其時夏其日丙丁其音徵其味苦脾為牝藏其色黄其時長夏其日戊巳其音宫其味甘肺為牝藏其色白其音商其時秋其日庚辛其味辛腎為牝藏其色黒其時冬其日壬癸其音羽其味鹹是為五變黄帝曰以主五輸奈何藏主冬冬刺井色主春春刺榮時主夏夏刺輸音主長夏長夏刺經味主秋秋刺合是謂五變以主五輸黄帝曰諸原安合以致六輸歧伯曰原獨不應五時以經合之以應其數故六六三十六輸黄帝曰何謂藏主冬時主夏音主長夏味主秋色主春願聞其故歧伯曰病在藏者取之井病變于色者取之滎病時間時甚者取之輸病變于音者取之經經滿而血者病在胃及以飲食不節得病者取之於合故命曰味主合是謂五變也外揣第四十五黄帝曰余聞九鍼九篇余親授其調頗得其意夫九鍼者始於一而終于九然未得其要道也夫九鍼者小之則無内大之則無外深不可爲下高不可爲蓋恍惚無窮流溢無極余知其合于天道人事四時之變也然余願雜之毫毛渾束爲一可乎歧伯曰朙乎哉問也非獨鍼道焉夫治國亦然黄帝曰余願聞鍼道非國事也歧伯曰夫治國者夫惟道焉非道何可小大深淺雜合而為一乎黄帝曰願卒聞之歧伯曰日與月焉水與鏡焉鼓與響焉夫日月之朙不失其影水鏡之察不失其形鼓響之應不後其聲動摇則應和盡得其情黄帝曰窘乎哉昭昭之朙不可蔽其不可蔽不失隂陽也合而察之切而驗之見而得之若清水朙鏡之不失其形也五音不彰五色不朙五藏波蕩若是則内外相襲若鼓之應桴響之應聲影之似形故逺者司外揣内近者司内揣外是謂隂陽之極天地之蓋請藏之靈蘭之室弗敢使泄也五變第四十六黄帝問于少俞曰余聞百疾之始期也必生于風雨寒暑循毫毛而入腠理或復還或留止或為風腫汗出或為消癉或為寒熱或為留癉或為積聚奇邪淫溢不可勝數願聞其故夫同時得病或病此或病彼意者天之為人生風乎何其異也少俞曰夫天之生風者非以私百姓也其行公平正直犯者得之避者得無殆非求人而人自犯之黄帝曰一時遇風同時得病其病各異願聞其故少俞曰善乎哉問請論以比匠人匠人磨斧斤礪刀削斵材木木之隂陽尚有堅脆堅者不入脆者皮㢮至其交節而缺斤斧焉夫一木之中堅脆不同堅者則剛脆者易傷況其材本之不同皮之厚薄汁之多少而各異耶夫木之蚤花先生葉者遇春霜烈風則花落而葉萎久曝大旱則脆木薄皮者枝條汁少而葉萎久隂淫雨則薄皮多汁者皮潰而漉卒風㬥起則剛脆之木枝折杌傷秋霜疾風則剛脆之木根搖而葉落凡此五者各有所傷況於人乎黄帝曰以人應木奈何少俞荅曰木之所傷也皆傷其枝枝之剛脆而堅未成傷也人之有常病也亦因其骨節皮膚腠理之不堅固者邪之所舍也故常為病也黄帝曰人之善病風厥漉汗者何以候之少俞荅曰肉不堅腠理踈則善病風黄帝曰何以候肉之不堅也少俞荅曰膕肉不堅而無分理理者麤理麤理而皮不緻者腠理踈此言其渾然者黄帝曰人之善病消癉者何以候之少俞荅曰五藏皆柔弱者善病消癉黄帝曰何以知五藏之柔弱也少俞荅曰夫柔弱者必有剛强剛强多怒柔者易傷也黄帝曰何以候柔弱之與剛强少俞荅曰此人薄皮膚而目堅固以深者長衝直揚其心剛剛則多怒怒則氣上逆胷中畜積血氣逆留臗皮充肌血脉不行轉而爲熱熱則消肌膚故爲消癉此言其人㬥剛而肌肉弱者也黄帝曰人之善病寒熱者何以候之少俞荅曰小骨弱肉者善病寒熱黄帝曰何以候骨之小大肉之堅脆色之不一也少俞荅曰顴骨者骨之本也顴大則骨大顴小則骨小皮膚薄而其肉無䐃其臂懦懦然其地色殆然不與其天同色汚然獨異此其候也然後臂薄者其髓不滿故善病寒熱也黄帝曰何以候人之善病痺者少俞荅曰麤理而肉不堅者善病痺黄帝曰痺之高下有處乎少俞荅曰欲知其高下者各視其部黄帝曰人之善病腸中積聚者何以候之少俞荅曰皮膚薄而不澤肉不堅而淖澤如此則腸胃惡惡則邪氣留止積聚乃傷脾胃之間寒温不次邪氣稍至稸積留止大聚乃起黄帝曰余聞病形已知之矣願聞其時少俞荅曰先立其年以知其時時高則起時下則殆雖不陷下當年有衝通其病必起是謂因形而生病五變之紀也臗寛音杌兀音漉鹿音懦儒音本藏第四十七黄帝問于歧伯曰人之血氣精神者所以奉生而周于性命者也經脉者所以行血氣而營隂陽濡筋骨利闗節者也衛氣者所以温分肉充皮膚肥腠理司闗闔者也志意者所以御精神收魂魄適寒温和喜怒者也是故血和則經脉流行營覆隂陽筋骨勁强闗節清利矣衛氣和則分肉解利皮膚調柔腠理緻密矣志意和則精神專直魂魄不散悔怒不起五藏不受邪矣寒温和則六府化榖風痺不作經脉通利肢節得安矣此人之常平也五藏者所以藏精神血氣魂魄者也六府者所以化水榖而行津液者也此人之所以具受于天也無愚智賢不肖無以相倚也然有其獨盡天壽而無邪僻之病百年不衰雖犯風雨卒寒大暑猶有弗能害也有其不離屏蔽室内無怵惕之恐然猶不免於病何也願聞其故歧伯對曰窘乎哉問也五藏者所以參天地副隂陽而連四時化五節者也五藏者固有小大高下堅脆端正偏傾者六府亦有小大長短厚薄結直緩急凡此二十五者各不同或善或惡或吉或凶請言其方心小則安邪弗能傷易傷以憂心大則憂不能傷易傷于邪心高則滿于肺中悦而善忘難開以言心下則藏外易傷于寒易恐以言心堅則藏安守固心脆則善病消癉熱中心端正則和利難傷心偏傾則操持不一無守司也肺小則少飲不病喘喝肺大則多飲善病胷痺喉痺逆氣肺高則上氣肩息欬肺下則居賁迫肺善脇下痛肺堅則不病欬上氣肺脆則苦病消癉易傷肺端正則和利難傷肺偏傾則胷偏痛也肝小則藏安無脇下之病肝大則逼胃迫咽迫咽則苦膈中且脇下痛肝高則上支賁切脇悗為息賁肝下則逼胃脇下空脇下空則易受邪肝堅則藏安難傷肝脆則善病消癉易傷肝端正則和利難傷肝偏傾則脇下痛也脾小則藏安難傷于邪也脾大則苦湊䏚而痛不能疾行脾高則䏚引季脇而痛脾下則下加于大腸下加于大腸則藏苦受邪脾堅則藏安難傷脾脆則善病消癉易傷脾端正則和利難傷脾偏傾則善滿善脹也腎小則藏安難傷腎大則善病腰痛不可以俛仰易傷以邪腎高則苦背膂痛不可以俛仰腎下則腰尻痛不可以俛仰為狐疝腎堅則不病腰背痛腎脆則善病消癉易傷腎端正則和利難傷腎偏傾則苦腰尻痛也凡此二十五變者人之所苦常病黄帝曰何以知其然也歧伯曰赤色小理者心小麤理者心大無􅐳􅚯者心高􅐳􅚯小短舉者心下􅐳􅚯長者心下堅􅐳􅚯弱小以薄者心脆􅐳􅚯直下不舉者心端正􅐳􅚯倚一方者心偏傾也白色小理者肺小麤理者肺大巨肩反膺陷喉者肺高合腋張脇者肺下好肩背厚者肺堅肩背薄者肺脆背膺厚者肺端正脇偏疎者肺偏傾也青色小理者肝小麤理者肝大廣胷反骹者肝高合脇兔骹者肝下胷脇好者肝堅脇骨弱者肝脆膺腹好相得者肝端正脇骨偏舉者肝偏傾也黄色小理者脾小麤理者脾大掲脣者脾高脣下縱者脾下脣堅者脾堅脣大而不堅者脾脆脣上下好者脾端正脣偏舉者脾偏傾也黒色小理者腎小麤理者腎大高耳者腎高耳後陷者腎下耳堅者腎堅耳薄不堅者腎脆耳好前居牙車者腎端正耳偏高者腎偏傾也凡此諸變者持則安減則病也帝曰善然非余之所問也願聞人之有不可病者至盡天壽雖有深憂大恐怵惕之志猶不能減也甚寒大熱不能傷也其有不離屏蔽室内又無怵惕之恐然不免于病者何也願聞其故歧伯曰五藏六府邪之舍也請言其故五藏皆小者少病苦燋心大愁憂五藏皆大者緩于事難使以憂五藏皆高者好高舉措五藏皆下者好出人下五藏皆堅者無病五藏皆脆者不離于病五藏皆端正者和利得人心五藏皆偏傾者邪心而善盜不可以為人平反覆言語也黄帝曰願聞六府之應歧伯荅曰肺合大腸大腸者皮其應心合小腸小腸者脉其應肝合膽膽者筋其應脾合胃胃者肉其應腎合三焦膀胱三焦膀胱者腠理毫毛其應黄帝曰應之奈何歧伯曰肺應皮皮厚者大腸厚皮薄者大腸薄皮緩腹裏大者大腸大而長皮急者大腸急而短皮滑者大腸直皮肉不相離者大腸結心應脉皮厚者脉厚脉厚者小腸厚皮薄者脉薄脉薄者小腸薄皮緩者脉緩脉緩者小腸大而長皮薄而脉冲小者小腸小而短諸陽經脉皆多紆屈者小腸結脾應肉肉䐃堅大者胃厚肉䐃麽者胃薄肉䐃小而麽者胃不堅肉䐃不稱身者胃下胃下者下管約不利肉䐃不堅者胃緩肉䐃無小裏累者胃急肉䐃多少裏累者胃結胃結者上管約不利也肝應爪爪厚色黄者膽厚爪薄色紅者膽薄爪堅色青者膽急爪濡色赤者膽緩爪直色白無約者膽直爪惡色黒多紋者膽結也腎應骨宻理厚皮者三焦膀胱厚麤理薄皮者三焦膀胱薄踈腠理者三焦膀胱緩皮急而無毫毛者三焦膀胱急毫毛美而麤者三焦膀胱直稀毫毛者三焦膀胱結也黄帝曰厚薄美惡皆有形願聞其所病歧伯荅曰視其外應以知其内藏則知所病矣尻切枯高骹敲音􅐳結音􅚯于音黃帝素問靈樞經卷之七
