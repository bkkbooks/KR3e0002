  - {type: variant, offset: 0, length: 5900, content: 黃帝素問靈樞經巻之十一官能第七十三黄帝問于歧伯曰余聞九鍼於夫子衆多矣不可勝數余推而論之以為一紀余司誦之子聽其理非則語余請其正道令可久傳後世無患得其人乃傳非其人勿言歧伯稽首再拜曰請聽聖王之道黄帝曰用鍼之理必知形氣之所在左右上下隂陽表裏血氣多少行之逆順出入之合謀伐有過知解結知補虚寫實上下氣門朙通於四海審其所在寒熱淋露以輸異處審於調氣朙於經隧左右肢絡盡知其㑹寒與熱争能合而調之虚與實鄰知決而通之左右不調把而行之朙於逆順乃知可治隂陽不竒故知起時審於本末察其寒熱得邪所在萬刺不殆知官九鍼刺道畢矣朙於五輸徐疾所在屈伸出入皆有條理言隂與五合於五行五藏六府亦有所藏四時八風盡有隂陽各得其位合於朙堂各處色部五藏六府察其所痛左右上下知其寒温何經所在審皮膚之寒温滑濇知其所苦膈有上下知其氣所在先得其道稀而踈之稍深以留故能徐入之大熱在上推而下之從下上者引而去之視前痛者常先取之大寒在外留而補之入於中者從合寫之鍼所不為灸之所宜上氣不足推而揚之下氣不足積而從之隂陽皆虚火自當之厥而寒甚骨廉陷下寒過於膝下陵三里隂絡所過得之留止寒入於中推而行之經陷下者火則當之結絡堅緊火所治之不知所苦兩蹻之下男隂女陽良工所禁鍼論畢矣用鍼之服必有法則上視天光下司八正以辟竒邪而觀百姓審於虚實無犯其邪是得天之露遇嵗之虚救而不勝反受其殃故曰必知天忌乃言鍼意法於徃古驗於來今觀於窈㝠通於無竆麤之所不見良工之所貴莫知其形若神髣髴邪氣之中人也洒淅動形正邪之中人也微先見於色不知於其身若在若無若亡若存有形無形莫知其情是故上工之取氣乃救其萌芽下工守其已成因敗其形是故工之用鍼也知氣之所在而守其門户朙於調氣補寫所在徐疾之意所取之處寫必用員切而轉之其氣乃行疾而徐出邪氣乃出伸而迎之遥大其穴氣出乃疾補必用方外引其皮令當其門左引其樞右推其膚㣲旋而徐推之必端以正安以静堅心無解欲微以留氣下而疾出之推其皮蓋其外門真氣乃存用鍼之要無忘其神雷公問於黄帝曰鍼論曰得其人乃傳非其人勿言何以知其可傳黄帝曰各得其人任之其能故能朙其事雷公曰願聞官能奈何黄帝曰眀目者可使視色聰耳者可使聽音捷疾辭語者可使傳論語徐而安静手巧而心審諦者可使行鍼艾理血氣而調諸逆順察隂陽而兼諸方緩節柔筋而心和調者可使導引行氣疾毒言語輕人者可使唾癰呪病爪苦手毒為事善傷者可使按積抑痺各得其能方乃可行其名乃彰不得其人其功不成其師無名故曰得其人乃言非其人勿傳此之謂也手毒者可使試按龜置龜於器下而按其上五十日而死矣手甘者復生如故也出入之合作會一本把而行之而行之一本作犯窈㝠㝠㝠一本作論疾診尺第七十四黄帝問于歧伯曰余欲無視色持脉獨調其尺以言其病從外知内為之奈何歧伯曰審其尺之緩急小大滑濇肉之堅脆而病形定矣視人之目窠上㣲癕如新卧起狀其頸脉動時欬按其手足上窅而不起者風水膚脹也人膚滑其淖澤者風也尺肉弱者解㑊安卧脱肉者寒熱不治尺膚滑而澤脂者風也尺膚濇者風痺也尺膚麤如枯魚之鱗者水泆飲也尺膚熱甚脉盛躁者病温也其脉盛而滑者病且出也尺膚寒其脉小者泄少氣尺膚炬然先熱後寒者寒熱也尺膚先寒乆大之而熱者亦寒熱也肘所獨熱者腰以上熱手所獨熱者腰以下熱肘前獨熱者膺前熱肘後獨熱者肩背熱臂中獨熱者腰腹熱肘後麤以下三四寸熱者腸中有蟲掌中熱者腹中熱掌中寒者腹中寒魚上白肉有青血脉者胃中有寒尺炬然熱人迎大者當奪先於九月迎取其化源先寫腎之源也蓋以而取之以補心火新校正云詳水將勝也而取之寫水所以𥙷火也水王十月故先於九月迎抑其運氣扶其不勝不勝大商歳肝不勝大羽歳心不勝歳之大角歳脾不勝大徴歳肺不勝大宫歳腎之氣通宜先助心後扶腎氣宜也如此然太陽司天五歳無使㬥過而生其疾食歳穀以全其眞避虚邪以安其正過木過則肝病生水過則心病生天地之氣過亦則脾病生火過則肺病生土過則腎病生金虚邪謂從衝後來之風也然也歳穀謂黃色黑色穀也適氣同異多少制之同寒濕者燥熱化異寒濕者燥化宮大大角大徵歳異寒濕宜治以燥濕化大商大羽歳同寒濕宜治以燥熱化故同者多之異者少之氣用少多隨其嵗也多謂燥熱少謂燥濕用寒遠寒用涼遠涼用温遠温用熱遠熱食宜同法有假者反常反是者病所謂時也及間氣所在同時謂春夏秋冬以除疾病者則勿遠之如太陽司天寒爲病則遠之卽雖其時若六氣臨御假寒熱温涼有假反常也食同藥法爾若無假反法則爲者假熱以療則熱用不遠夏餘氣例同故曰用寒遠寒及有假者反常等事下文備矣病之媒非方制養生之道新校正云按帝日善陽明之政奈何歧伯日卯酉之紀也飱泄脉小手足温泄易巳四時之變寒暑之勝重隂必陽重陽必隂故隂主寒陽主熱故寒甚則熱熱甚則寒故曰寒生熱熱生寒此隂陽之變也故曰冬傷於寒春生癉熱春傷於風夏生後泄腸澼夏傷於暑秋生痎瘧秋傷於濕冬生咳嗽是謂四時之序也目窠音科窅杳音炬然作及然及許切亦齲齒蠧丘禹切掣切尺制痎瘧瘦瘞也上音皆刺節真邪第七十五黄帝問于歧伯曰余聞刺有五節奈何歧伯曰固有五節一曰振埃二曰發曚三曰去爪四曰徹衣五曰解惑黄帝曰夫子言五節余未知其意歧伯曰振埃者刺外經去陽病也發矇者刺府輸去府病也去爪者刺闗節肢絡也徹衣者盡刺諸陽之竒輸也解惑者盡知調隂陽補寫有餘不足相傾移也黄帝曰刺節言振埃夫子乃言刺外經去陽病余不知其所謂也願卒聞之歧伯曰振埃者陽氣大逆上滿於胷中憤瞋肩息大氣逆上喘喝坐伏病惡埃煙䭇不得息請言振埃尚疾於振埃黄帝曰善取之何如歧伯曰取之天容黄帝曰其欬上氣竆詘胷痛者取之奈何歧伯曰取之廉泉黄帝曰取之有數乎歧伯曰取天容者無過一里取廉泉者血變而止帝曰善哉黄帝曰刺節言發矇余不得其意夫發矇者耳無所聞目無所見夫子乃言刺府輸去府病何輸使然願聞其故歧伯曰妙乎哉問也此刺之大約鍼之極也神朙之類也口説書卷猶不能及也請言發矇耳尚疾於發矇也黄帝曰善願卒聞之歧伯曰刺此者必於日中刺其聽宫中其眸子聲聞於耳此其輸也黄帝曰善何謂聲聞於耳歧伯曰刺邪以手堅按其兩鼻竅而疾偃其聲必應於鍼也黄帝曰善此所謂弗見為之而無目視見而取之神朙相得者也黄帝曰刺節善去爪夫子乃言刺闗節肢絡願卒聞之歧伯曰腰脊者身之大闗節也肢脛者人之管以趨翔也莖垂者身中之機隂精之候津液之道也故飲食不節喜怒不時津液内溢乃下留於睪血道不通日大不休俛仰不便趨翔不能此病榮然有水不上不下鈹石所取形不可匿常不得蔽故命曰去爪帝曰善黄帝曰刺節言徹衣夫子乃言盡刺諸陽之竒輸未有常處也願卒聞之歧伯曰是陽氣有餘而隂氣不足隂氣不足則内熱陽氣有餘則外熱内熱相摶熱於懷炭外畏綿帛近不可近身又不可近席腠理閉塞則汗不出舌焦脣槁腊乾嗌燥飲食不讓美惡黄帝曰善取之奈何歧伯曰或之於其天府大杼三痏又刺中膂以去其熱補足手太隂以去其汗熱去汗稀疾於徹衣黄帝曰善黄帝曰刺節言解惑夫子乃言盡知調隂陽補寫有餘不足相傾移也惑何以解之歧伯曰大風在身血脉偏虚虚者不足實者有餘輕重不得傾側宛伏不知東西不知南北乍上乍下乍反乍覆顛倒無常甚於迷惑黄帝曰善取之奈何歧伯曰寫其有餘補其不足隂陽平復用鍼若此疾於解惑黄帝曰善請藏之靈蘭之室不敢妄出也黄帝曰余聞刺有五邪何謂五邪歧伯曰病有持癰者有容大者有狹小者有熱者有寒者是謂五邪黄帝曰刺五邪奈何歧伯曰几刺五邪之方不過五章痺熱消滅腫聚散亡寒痺益温小者益陽大者必去請道其方凡刺癰邪無迎隴易俗移性不得膿脆道更行去其鄉不安處所乃散亡諸隂陽過癰者取之其輸寫之凡刺大邪日以小泄奪其有餘乃益虚剽其通鍼其邪肌肉親視之毋有反其真刺諸陽分肉間凡刺小邪日以大補其不足乃無害視其所在迎之界逺近盡至其不得外侵而行之乃自費刺分肉間凡刺熱邪越而蒼出遊不歸乃無病為開通辟門户使邪得出病乃已凡刺寒邪日以温徐徃徐來致其神門戸已閉氣不分虚實得調其氣存也黄帝曰官鍼奈何歧伯曰刺癰者用鈹鍼刺大者用鋒鍼刺小者用員利鍼刺熱者用鑱鍼刺寒者用毫鍼也請言解論與天地相應與四時相副人參天地故可為解下有漸洳上生葦蒲此所以知形氣之多少也隂陽者寒暑也熱則滋雨而在上根荄少汁人氣在外皮膚緩腠理開血氣減汁大泄皮淖澤寒則地凍水冰人氣在中皮膚緻腠理閉汗不出血氣强肉堅濇當是之時善行水者不能徃冰善穿地者不能鑿凍善用鍼者亦不能取四厥血脉凝結堅摶不徃來者亦未可即柔故行水者必待天温冰釋凍解而水可行地可穿也人脉猶是也治厥者必先熨調和其經掌與腋肘與脚項與脊以調之火氣已通血脉乃行然後視其病脉淖澤者刺而平之堅緊者破而散之氣下乃止此所謂以解結者也用鍼之類在於調氣氣積於胃以通營衛各行其道宗氣留於海其下者注於氣街其上者走於息道故厥在於足宗氣不下脉中之血凝而留止弗之火調弗能取之用鍼者必先察其經絡之實虚切而循之按而彈之視其應動者乃後取之而下之六經調者謂之不病雖病謂之自已也一經上實下虚而不通者此必有横絡盛加於大經令之不通視而寫之此所謂解結也上寒下熱先刺其項太陽久留之已刺則熨項與肩胛令熱下合乃止此所謂推而上之者也上熱下寒視其虚脉而陷之於經絡者取之氣下乃止此所謂引而下之者也大熱徧身狂而妄見妄聞妄言視足陽朙及大絡取之虚者補之血而實者寫之因其偃卧居其頭前以兩手四指挾按頸動脉久持之巻而切推下至缺盆中而復止如前熱去乃止此所謂推而散之者也黄帝曰有一脉生數十病者或痛或癰或熱或寒或痒或痺或不仁變化無竆其故何也岐伯曰此皆邪氣之所生也黄帝曰余聞氣者有真氣有正氣有邪氣何謂真氣𡵨伯曰真氣者所受於天與穀氣幷而充身也正氣者正風也從一方來非實風又非虚風也邪氣者虚風之賊傷人也其中人也深不能自去正風者其中人也淺合而自去其氣來柔弱不能勝真氣故自去虚邪之中人也洒淅動形起毫毛而發腠理其入深内摶於骨則為骨痺摶於筋則為筋攣摶於脉中則為血閉不通則為癰摶於肉與衛氣相摶陽勝者則為熱隂勝者則為寒寒則真氣去去則虚虚則寒搏於皮膚之間其氣外發腠理開毫毛摇氣徃来行則為痒留而不去則痺衛氣不行則為不仁虚邪徧容於身半其入深内居榮衛榮衛稍衰則真氣去邪氣獨留發為偏枯其邪氣淺者脉偏痛虚邪之入於身也深寒與熱相搏久留而内著寒勝其熱則骨疼肉枯熱勝其寒則爛肉腐肌為膿内傷骨内傷骨為骨蝕有所疾前筋筋屈不得伸邪氣居其間而不反發於筋溜有所結氣歸之衛氣留之不得反津液久留合而為腸溜久者數歳乃成以手按之柔已有所結氣歸之津液留之邪氣中之凝結日以易甚連以聚居為昔瘤以手按之堅有所結深中骨氣因於骨骨與氣幷日以益大則為骨疽有所結中於肉宗氣歸之邪留而不去有熱則化而為膿無熱則為肉疽凡此數氣者其發無常處而有常名也䭇噎音竅腊切思亦剽其切匹妙漸洳音上根相牽引貌替下音如草衛氣行第七十六黄帝問於岐伯曰願聞衛氣之行出入之合何如歧伯曰歳有十二月日有十二辰子午為經夘酉為緯天周二十八宿而一面七星四七二十八星房昴為緯虚張為經是故房至畢為陽昴至心為隂陽主晝隂主夜故衛氣之行一日一夜五十周於身晝日行於陽二十五周夜行於隂二十五周周於五歳是故平旦隂盡陽氣出於目目張則氣上行於頭循項下足太陽循背下至小指之端其散者别於目鋭眥下手太陽下至手小指之間外側其散者别於目鋭眥下足少陽注小指次指之間以上循手少陽之分側下至小指之間别者以上至耳前合於頷脉注足陽朙以下行至跗上入五指之間其散者從耳下下手陽朙入大指之間入掌中其至於足也入足心出内踝下行隂分復合於目故爲一周是故日行一舍人氣行一周與十分身之八日行二舍人氣行二周於身與十分身之六日行三舎人氣行於身五周與十分身之四日行四舎人氣行於身七周與十分身之二日行五舍人氣行於身九周日行六舎人氣行於身十周與十分身之八日行七舍人氣行於身十二周在身與十分身之六日行十四舍人氣二十五周於身有竒分與十分身之四陽盡於隂隂受氣矣其始入於隂常從足少隂注於腎腎注於心心注於肺肺注于肝肝注于脾脾復注于腎為周是故夜行一舍人氣行於隂藏一周與十分藏之八亦如陽行之二十五周而復合於目隂陽一日一夜合有竒分十分身之四與十分藏之二是故人之所以卧起之時有早晏者竒分不盡故也黄帝曰衛氣之在於身也上下徃來不以期候氣而刺之奈何伯髙曰分有多少日有長短春秋冬夏各有分理然後常以平旦為紀以夜盡為始是故一日一夜水下百刻二十五刻者半日之度也常如是母巳日入而止隨日之長短各以為紀而刺之謹候其時病可與期失時反候者百病不治故曰刺實者刺其來也刺虚者刺其去也此言氣存亡之時以候虚實而刺之是故謹候氣之所在而刺之是謂逢時在於三陽必候其氣在於陽而刺之病在於三隂必候其氣在隂分而刺之水下一刻人氣在太陽水下二刻人氣在少陽水下三刻人氣在陽朙水下四刻人氣在隂分水下五刻人氣在太陽水下六刻人氣在少陽水下七刻人氣在陽朙水下八刻人氣在隂分水下九刻人氣在太陽水下十刻人氣在少陽水下十一刻人氣在陽朙水下十二刻人氣在隂分水下十三刻人氣在太陽水下十四刻人氣在少陽水下十五刻人氣在陽朙水下十六刻人氣在隂分水下十七刻人氣在太陽水下十八刻人氣在少陽水下十九刻人氣在陽明水下二十刻人氣在隂分水下二十一刻人氣在太陽水下二十二刻人氣在少陽水下二十三刻人氣在陽朙水下二十四刻人氣在隂分水下二十五刻人氣在太陽此半月之度也從房至畢一十四舎水下五十刻日行半度迴行一舍水下三刻與七分刻之四大要曰常以日之加於宿上也人氣在太陽是故日行一舎人氣行三陽行與隂分常如是無已天與地同紀紛紛􅾼􅾼終而復始一日一夜水下百刻而盡矣􅾼􅾼云普巴切按太素音義九宫八風第七十七立秋二西南方玄委秋分七西方倉果立冬六西北方新洛夏至九南方上天招摇中央冬至一北方叶蟄立夏四東南方隂洛春分三東方倉門立春八東北方天留太一常以冬至之日居叶蟄之宫四十六日朙日居天留四十六日朙日居倉門四十六日朙日居隂洛四十五日朙日居天宫四十六日朙日居玄委四十六日朙日居倉果四十六日朙日居新洛四十五日朙日復居叶蟄之宫曰冬至矣太一日遊以冬至之日居叶蟄之宫數所在日從一處至九日復反於一常如是無已終而復始太一移日天必應之以風雨以其日風雨則吉嵗美民安少病矣先之則多雨後之則多汗太一在冬至之日有變占在君太一在春分之日有變占在相太一在中宫之日有變占在吏太一在秋分之日有變占在將太一在夏至之日有變占在百姓所謂有變者太一居五宫之日病風折樹木揚沙石各以其所主占貴賤因視風所從來而占之風從其所居之鄉来為實風主生長養萬物從其衝後来為虚風傷人者也主殺主害者謹候虚風而避之故聖人日避虚邪之道如避矢石然邪弗能害此之謂也是故太一入徙立於中宫乃朝八風以占吉凶也風從南方來名曰大弱風其傷人也内舎於心外在於脉氣主熱風從西南方來名曰謀風其傷人也内舎於脾外在於肌其氣主為弱風從西方來名曰剛風其傷人也内舎於肺外在於皮膚其氣主為燥風從西北方來名曰折風其傷人也内舎於小腸外在於手太陽脉脉絶則溢脉閉則結不通善㬥死風從北方來名曰大剛風其傷人也内舎於腎外在於骨與肩背之膂筋其氣主為寒也風從東北方來名曰凶風其傷人也内舍於大腸外在於兩脇腋骨下及肢節風從東方來名曰嬰兒風其傷人也内舍於肝外在於筋紐其氣主為身濕風從東南方来名曰弱風其傷人也内舎於胃外在肌肉其氣主體重此八風皆從其虚之鄉來乃能病人三虚相摶則為暴病卒死兩實一虚病則為淋露寒熱犯其雨濕之地則為痿故聖人避風如避矢石焉其有三虚而偏中於邪風則為擊仆偏枯矣黃帝素問靈樞經卷第之十一, WYG: ''}
