  - {type: variant, offset: 6, length: 0, content: '', WYG: 吕復亦稱善學者當與素問並觀其㫖義互相發明盖其書雖偽而其言則綴合古}
  - {type: variant, offset: 7, length: 1, content: 敘, WYG: 具有源本譬之梅賾古文襍採逸書聫成篇目雖牴牾罅漏􅎓託顯然而先王遺訓多賴其蒐輯以有傳不可廢也此本前有紹興乙亥史崧序稱舊本九卷八十一篇増修音釋附於卷末又目録首題鼇峯熊宗立㸃校重刋末題原二十四卷今併為十二卷是此本為元時重刋所併吕復稱史崧併是書為十二卷以復其舊殆誤以熊本為史本歟乾隆四十六年四月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀靈樞經原序}
