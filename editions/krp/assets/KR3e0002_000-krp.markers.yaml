  - {type: line-break, offset: 0, content: '', id: KR3e0002_SBCK_000-1a01}
  - {type: variant, offset: 0, length: 1, content: 黃, WYG: 欽定四庫全書子部五靈樞經醫家類提要臣等謹案靈樞經十二卷案晁公武讀書志曰王冰謂靈樞即漢志黄}
  - {type: page-break, offset: 0, content: '', id: KR3e0002_WYG_000-1a, image: WYG0733/WYG0733-0317a.png}
  - {type: variant, offset: 2, length: 0, content: '', WYG: 内經十八卷之九謂或好事者於皇甫諡所集内經倉公論中鈔出之名為古書未知孰是又李濓醫史載元吕復羣經古方論曰内經靈樞漢隋唐志皆不録隋有鍼經九卷唐有靈寳註及黄帝九靈經十二卷而已或謂王冰以九靈更名為靈樞又謂九靈尤詳於鍼故皇甫諡名之為鍼經苟一經而二名不應唐志别出鍼經十二卷是靈樞不及素問之古宋元人已言之矣近時杭世駿道古堂集亦有靈樞經跋曰七畧漢藝文志黄帝内經十八篇皇甫諡以鍼經九卷素問九卷合十八篇當之隋書經籍志鍼經九卷黄帝九靈十二卷是九靈自九靈鍼經自鍼經不可合而為一也王冰以九靈名靈樞不知其何所本余觀其文義淺短與素問之言不類又似竊取素問而鋪張之其為王冰所偽託可知後人莫有傳其書者至宋紹興中錦官史崧乃云家藏舊本靈樞九卷除已具状經所屬申明外准使府指揮依條申轉運司選官詳定其書送秘書省國子監是此書至宋中世而始出未經髙保衡林億等校定也其中十二經水一篇黄帝時無此名冰特據身所見而妄臆度之云云其考證尤為明晰然李杲精究醫理而使羅天益作類經兼採}
  - {type: page-break, offset: 2, content: '', id: KR3e0002_WYG_000-1b, image: WYG0733/WYG0733-0317b.png}
  - {type: page-break, offset: 2, content: '', id: KR3e0002_WYG_000-2a, image: WYG0733/WYG0733-0318a.png}
