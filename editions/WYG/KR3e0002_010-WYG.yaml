body:
  text: 靈樞經巻十宋史崧音釋五音五味第六十六右徵與少徵調右手太陽上左商與左徵調左手陽明上少徵與大宫調左手陽明上右角與大角調右足少陽下大徵與少徵調左手太陽上衆羽與少羽調右足太陽下少商與右商調右手太陽下桎羽與衆羽調右足太陽下少宫與大宫調右足陽明下判角與少角調右足少陽下釱商與上商調右足陽明下釱商與上角調左足太陽下上徵與右徵同穀麥畜羊果杏手少陽藏心色赤味苦時夏上羽與大羽同穀大豆畜彘果栗足少隂藏腎色黒味鹹時冬上宫與大宫同穀稷畜牛果􅀥足太隂藏脾色黄味甘時季夏上商與右商同穀黍畜雞果桃手太隂藏肺色白味辛時秋上角與大角同穀麻畜犬果李足厥隂藏肝色青味酸時春大宫與上角同右足陽明上左角與大角同左足陽明上少羽與大羽同右足太陽下左商與右商同左手陽明上加宫與大宫同左足少陽上質判與大宫同左手太陽下判角與大角同左足少陽下大羽與大角同右足太陽上大角與大宫同右足少陽上右徵少徵質徵上徵判徵右角釱角上角大角判角右商少商釱商上商左商少宫上宫大宫加宫左角宫衆羽桎羽上羽大羽少羽黄帝曰婦人無鬚者無血氣乎岐伯曰衝脈任脈皆起於胞中上循背裏為經絡之海其浮而外者循腹右上行㑹於咽喉别而絡唇口血氣盛則充膚熱肉血獨盛則澹滲皮膚生毫毛今婦人之生有餘於氣不足於血以其數脱血也衝任之脈不榮口唇故鬚不生焉黄帝曰士人有傷於隂隂氣絶而不起隂不用然其鬚不去其故何也宦者獨去何也願聞其故岐伯曰宦者去其宗筋傷其衝脈血寫不復皮膚内結唇口不營故鬚不生黄帝曰其有天宦者未嘗被傷不脱於血然其鬚不生其故何也岐伯曰此天之所不足也其任衝不盛宗筋不成有氣無血唇口不榮故鬚不生黄帝曰善乎哉聖人之通萬物也若日月之光影音聲鼓響聞其聲而知其形其非夫子孰能明萬物之精是故聖人視其顔色黄赤者多熱氣青白者少熱氣黒色者多血少氣美眉者太陽多血通髯極鬚者少陽多血美鬚者陽明多血此其時然也夫人之常數太陽常多血少氣少陽常多氣少血陽明常多血多氣厥隂常多氣少血少隂常多血少氣太隂常多血少氣此天之常數也百病始生第六十六黄帝問于岐伯曰夫百病之始生也皆生於風雨寒暑清濕喜怒喜怒不節則傷藏風雨則傷上清濕則傷下三部之氣所傷異類願聞其㑹歧伯曰三部之氣各不同或起於隂或起於陽請言其方喜怒不節則傷藏藏傷則病起於隂也清濕襲虚則病起於下風雨襲虚則病起於上是謂三部至於其淫泆不可勝數黄帝曰余固不能數故問先師願卒聞其道歧伯曰風雨寒熱不得虚邪不能獨傷人卒然逢疾風暴雨而不病者盖無虚故邪不能獨傷人此必因虚邪之風與其身形兩虚相得乃客其形兩實相逢衆人肉堅其中於虚邪也因於天時與其身形參以虚實大病乃成氣有定舎因處為名上下中外分為三員是故虚邪之中人也始於皮膚皮膚緩則腠理開開則邪從毛髮入入則抵深深則毛髮立毛髮立則淅然故皮膚痛留而不去則傳舎於絡脈在絡之時痛於肌肉其痛之時息大經乃代留而不去傳舍於經在經之時洒淅喜驚留而不去傳舍於輸在輸之時六經不通四肢則肢節痛腰脊乃强留而不去傳舍於伏衝之脈在伏衝之時體重身痛留而不去𫝊舍於腸胃在腸胃之時賁嚮腹脹多寒則腸鳴飱泄食不化多熱則溏出麋留而不去𫝊舍於腸胃之外募原之間留著于脈稽留而不去息而成積或著孫脈或著絡脈或著經脈或著輸脈或著於伏衝之脈或著於膂筋或著于腸胃之募原上連於緩筋邪氣淫佚不可勝論黄帝曰願盡聞其所由然岐伯曰其著孫絡之脈而成積者其積往來上下臂手孫絡之居也浮而緩不能句積而止之故徃來移行腸胃之間水湊滲注灌濯濯有音有寒則䐜䐜滿雷引故時切痛其著於陽明之經則挾臍而居飽食則益大饑則益小其著於緩筋也似陽明之積飽食則痛饑則安其著於腸胃之募原也痛而外連于緩筋飽食則安饑則痛其著於伏衝之脈者揣之應手而動發手則熱氣下於兩股如湯沃之狀其著于膂筋在腸後者饑則積見飽則積不見按之不得其著於輸之脈者閉塞不通津液不下孔竅乾壅此邪氣之從外入内從上下也黄帝曰積之始生至其已成奈何歧伯曰積之始生得寒乃生厥乃成積也黄帝曰其成積奈何歧伯曰厥氣生足悗悗生脛寒脛寒則血脈凝濇血脈凝濇則寒氣上入於腸胃入於腸胃則䐜脹䐜脹則腸外之汁沫迫聚不得散日以成積卒然多食飲則腸滿起居不節用力過度則絡脈傷陽絡傷則血外溢血外溢則衂血隂絡傷則血内溢血内溢則後血腸胃之絡傷則血溢於腸外腸外有寒汁沫與血相摶則并合凝聚不得散而積成矣卒然外中於寒若内傷於憂怒則氣上逆氣上逆則六輸不通温氣不行凝血藴裏而不散津液濇滲著而不去而積皆成矣黄帝曰其生於隂者奈何歧伯曰憂思傷心重寒傷肺忿怒傷肝醉以入房汗出當風傷脾用力過度若入房汗出浴則傷腎此内外三部之所生病者也黄帝曰善治之奈何歧伯答曰察其所痛以知其應有餘不足當補則補當冩則冩毋逆天時是謂至治泆亦行鍼第六十七黄帝問於歧伯曰余聞九鍼於夫子而行之於百姓百姓之血氣各不同形或神動而氣先鍼行或氣與鍼相逢或鍼以出氣獨行或數刺乃知或發鍼而氣逆或數刺病益劇凡此六者各不同形願聞其方歧伯曰重陽之人其神易動其氣易往也黄帝曰何謂重陽之人歧伯曰重陽之人熇熇髙髙言語善疾舉足善髙心肺之蔵氣有餘陽氣滑盛而揚故神動而氣先行黄帝曰重陽之人而神不先行者何也歧伯曰此人頗有隂者也黄帝曰何以知其頗有隂也歧伯曰多陽者多喜多隂者多怒數怒者易解故曰頗有隂其隂陽之離合難故其神不能先行也黄帝曰其氣與鍼相逢奈何歧伯曰隂陽和調而血氣淖澤滑利故鍼入而氣出疾而相逢也黄帝曰鍼已出而氣獨行者何氣使然歧伯曰其隂氣多而陽氣少隂氣沉而陽氣浮者内蔵故鍼已出氣乃隨其後故獨行也黄帝曰數刺乃知何氣使然歧伯曰此人之多隂而少陽其氣沉而氣往難故數刺乃知也黄帝曰鍼入而氣逆者何氣使然歧伯曰其氣逆與其數刺病益甚者非隂陽之氣浮沉之勢也此皆粗之所敗上之所失其形氣無過焉上膈第六十八黄帝曰氣為上膈者食飲入而還出余已知之矣蟲為下膈下膈者食晬時乃出余未得其意願卒聞之歧伯曰喜怒不適食飲不節寒温不時則寒汁流於腸中流於腸中則蟲寒蟲寒則積聚守於下管則腸胃充郭衛氣不營邪氣居之人食則蟲上食蟲上食則下管虛下管虚則邪氣勝之積聚以留留則癰成癰成則下管約其癰在管内者即而痛深其癰在外者則癰外而痛浮癰上皮熱黄帝曰刺之奈何歧伯曰微按其癰視氣所行先淺刺其傍稍内益深還而刺之毋過三行察其沉浮以為深淺已刺必熨令熱入中日使入内邪氣益衰大癰乃潰伍以參禁以除其内恬憺無為乃能行氣後以鹹苦化穀乃下矣潰音㑹憂恚無言第六十九黄帝問於少師曰人之卒然憂恚而言無音者何道之塞何氣出行使音不彰願聞其方少師答曰咽喉者水穀之道也喉嚨者氣之所以上下者也㑹厭者音聲之户也口唇者音聲之扇也舌者音聲之機也懸雍垂者音聲之闗也頏顙者分氣之所泄也横骨者神氣所使主發舌者也故人之鼻洞涕出不收者頏顙不開分氣失也是故厭小而疾薄則發氣疾其開闔利其出氣易其厭大而厚則開闔難其氣出遲故重言也人卒然無音者寒氣客于厭則厭不能發發不能下至其開闔不致故無音黄帝曰刺之奈何歧伯曰足之少隂上繫於舌絡於横骨終於㑹厭兩冩其血脈濁氣乃辟㑹厭之脈上絡任脈取之夭突其厭乃發也寒熱第七十黄帝問于歧伯曰寒熱瘰癧在於頸腋者皆何氣使生歧伯曰此皆䑕瘻寒熱之毒氣也留於脈而不去者也黄帝曰去之奈何歧伯曰䑕瘻之本皆在於蔵其末上出於頸腋之間其浮於脈中而未内著於肌肉而外為膿血者易去也黄帝曰去之奈何歧伯曰請從其本引其末可使衰去而絶其寒熱審按其道以予之徐往徐來以去之其小如麥者一刺知三刺而已黄帝曰決其生死奈何歧伯曰反其目視之其中有赤脈上下貫瞳子見一脈一歳死見一脈半一嵗半死見二脈二嵗死見二脈半二嵗半死見三脈三嵗而死見赤脈不下貫瞳子可治也邪客第七十一黄帝問于伯髙曰夫邪氣之客人也或令人目不瞑不卧出者何氣使然伯髙曰五穀入于胃也其糟粕津液宗氣分為三隧故宗氣積于胸中出于喉嚨以貫心脈而行呼吸焉營氣者泌其津液注之於脈化以為血以榮四末内注五蔵六府以應刻數焉衛氣者出其悍氣之慓疾而先行於四末分肉皮膚之間而不休者也晝日行於陽夜行於隂常從足少隂之分間行於五蔵六府今厥氣客於五蔵六府則衛氣獨衛其外行於陽不得入於隂行於陽則陽氣盛陽氣盛則陽蹻陷不得入於隂隂虚故目不瞑黄帝曰善治之奈何伯髙曰補其不足冩其有餘調其虚實以通其道而去其邪飲以半夏湯一劑隂陽已通其卧立至黄帝曰善此所謂決瀆壅塞經絡大通隂陽和得者也願聞其方伯髙曰其湯方以流水千里以外者八升揚之萬遍取其清五升煑之炊以葦薪火沸置秫米一升治半夏五合徐炊令竭為一升半去其滓飲汁一小盃日三稍益以知為度故其病新發者覆杯則卧汗出則已矣久者三飲而已也黄帝問於伯髙曰願聞人之肢節以應天地奈何伯髙答曰天圓地方人頭圓足方以應之天有日月人有兩目地有九州人有九竅天有風雨人有喜怒天有雷電人有音聲天有四時人有四肢天有五音人有五蔵天有六律人有六府天有冬夏人有寒熱天有十日人有手十指辰有十二人有足十指莖垂以應之女子不足二節以抱人形天有隂陽人有夫妻歳有三百六十五日人有三百六十節地有髙山人有肩膝地有深谷人有腋膕地有十二經水人有十二經脈地有泉脈人有衛氣地有草蓂人有毫毛天有晝夜人有卧起天有列星人有牙齒地有小山人有小節地有山石人有髙骨地有林木人有募筋地有聚邑人有㬷肉嵗有十二月人有十二節地有四時不生草人有無子此人與天地相應者也黄帝問於歧伯曰余願聞持針之數内鍼之理縱舍之意扞皮開腠理奈何脈之屈折出入之處焉至而出焉至而止焉至而徐焉至而疾焉至而入六府之輸於身者余願盡聞少序别離之處離而入隂别而入陽此何道而從行願盡聞其方歧伯曰帝之所問鍼道乖矣黄帝曰願卒聞之歧伯曰手太隂之脈出於大指之端内屈循白肉際至本節之後大淵留以澹外屈上於本節下内屈與隂諸絡㑹於魚際數脈并注其氣滑利伏行壅骨之下外屈出於寸口而行上至於肘内廉入於大筋之下内屈上行臑隂入腋下内屈走肺此順行逆數之屈折也心主之脈出於中指之端内屈循中指内廉以上留於掌中伏行兩骨之間外屈出兩筋之間骨肉之際其氣滑利上二寸外屈出行兩筋之間上至肘内廉入於小筋之下留兩骨之㑹上入於胸中内絡於心脈黄帝曰手少隂之脈獨無腧何也歧伯曰少隂心脈也心者五蔵六府之大主也精神之所舍也其蔵堅固邪弗能容也容之則心傷心傷則神去神去則死矣故諸邪之在於心者皆在於心之包絡包絡者心主之脈也故獨無腧焉黄帝曰少隂獨無腧者不病乎歧伯曰其外經病而蔵不病故獨取其經於掌後鋭骨之端其餘脈出入屈折其行之徐疾皆如手少隂心主之脈行也故本腧者皆因其氣之虚實疾徐以取之是謂因衝而冩因衰而補如是者邪氣得去真氣堅固是謂因天之序黄帝曰持鍼縱舍奈何歧伯曰必先明知十二經脈之本末皮膚之寒熱脈之盛衰滑濇其脈滑而盛者病日進虚而細者久以持大而濇者為痛痺隂陽如一者病難治其本末尚熱者病尚在其熱以衰者其病亦去矣持其尺察其肉之堅脆小大滑濇寒温燥濕因視目之五色以知五蔵而決死生視其血脈察其色以知其寒熱痛痺黄帝曰持鍼縱舍余未得其意也歧伯曰持鍼之道欲端以正安以静先知虚實而行疾徐左手執骨右手循之無與肉果冩欲端以正補必閉膚輔鍼導氣邪得淫泆真氣得居黄帝曰扞皮開腠理奈何歧伯曰因其分肉左别其膚微内而徐端之適神不散邪氣得去黄帝問於歧伯曰人有八虚各何以候歧伯答曰以候五蔵黄帝曰候之奈何歧伯曰肺心有邪其氣留於兩肘肝有邪其氣流于兩腋脾有邪其氣留于兩髀腎有邪其氣留于兩膕凡此八虚者皆機闗之室真氣之所過血絡之所遊邪氣惡血固不得住留住留則傷筋絡骨節機闗不得屈伸故病攣也泌兵媚切扞苦旱切痀音拘通天第七十二黄帝問于少師曰余嘗聞人有隂陽何謂隂人何謂陽人少師曰天地之間六合之内不離於五人亦應之非徒一隂一陽而已也而畧言耳口弗能徧明也黄帝曰願畧聞其意有賢人聖人心能備而行之乎少師曰盖有太隂之人少隂之人太陽之人少陽之人隂陽和平之人凡五人者其態不同其筋骨氣血各不等黄帝曰其不等者可得聞乎少師曰太隂之人貪而不仁下齊湛湛好内而惡出心和而不發不務於時動而後之此太隂之人也少隂之人小貪而賊心見人有亡常若有得好傷好害見人有榮乃反愠怒心疾而無恩此少隂之人也太陽之人居處于于好言大事無能而虚説志發於四野舉措不顧是非為事如常自用事雖敗而常無悔此太陽之人也少陽之人諟諦好自貴有小小官則髙自宜好為外交而不内附此少陽之人也隂陽和平之人居處安静無為懼懼無為欣欣婉然從物或與不争與時變化尊則謙謙譚而不治是謂至治古之善用鍼艾者視人五態乃治之盛者冩之虚者補之黄帝曰治人之五態奈何少師曰太隂之人多隂而無陽其隂血濁其衛氣濇隂陽不和緩筋而厚皮不之疾冩不能移之少隂之人多隂少陽小胃而大腸六府不調其陽明脈小而太陽脈大必審調之其血易脱其氣易敗也太陽之人多陽而少隂必謹調之無脱其隂而冩其陽陽重脱者易狂隂陽皆脱者暴死不知人也少陽之人多陽少隂經小而絡大血在中而無外實隂而虚陽獨冩其絡脈則强氣脱而疾中氣不足病不起也隂陽和平之人其隂陽之氣和血脈調謹診其隂陽視其邪正安容儀審有餘不足盛則冩之虚則補之不盛不虚以經取之此所以調隂陽别五態之人者也黄帝曰夫五態之人者相與毋故卒然新㑹未知其行也何以别之少師答曰衆人之屬不如五態之人者故五五二十五人而五態之人不與焉五態之人尤不合於衆者也黄帝曰别五態之人奈何少師曰太隂之人其狀黮黮然黒色念然下意臨臨然長大膕然未僂此太隂之人也少隂之人其狀清然竊然固以隂賊立而躁嶮行而似伏此少隂之人也太陽之人其狀軒軒儲儲反身折膕此太陽之人也少陽之人其狀立則好仰行則好摇其兩臂兩肘則常出於背此少陽之人也隂陽和平之人其狀委委然隨隨然顒顒然愉愉然䁢暶然豆豆然衆人皆曰君子此隂陽和平之人也諟上坁切黮直稔切暶辭縁切靈樞經卷十
