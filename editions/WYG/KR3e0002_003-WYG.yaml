body:
  text: 靈樞經卷三宋史崧音釋經脈第十雷公問於黄帝曰禁脈之言凡刺之理經脈為始營其所行制其度量内次五藏外别六府願盡聞其道黄帝曰人始生先成精精成而腦髓生骨為幹脈為營筋為剛肉為牆皮膚堅而毛髮長榖入於胃脈道以通血氣乃行雷公曰願卒聞經脈之始生黄帝曰經脈者所以能决死生處百病調虚實不可不通肺手太隂之脈起于中焦下絡大腸還循胃口上膈屬肺從肺系横出腋下下循臑内行少隂心主之前下肘中循臂内上骨下亷入寸口上魚循魚際出大指之端其支者從腕後直出次指内亷出其端是動則病肺脹滿膨膨而喘欬缺盆中痛甚則交兩手而瞀此為臂厥是主肺所生病者欬上氣喘渴煩心胷滿臑臂内前亷痛厥掌中熱氣盛有餘則肩背痛風寒汗出中風小便數而欠氣虚則肩背痛寒少氣不足以息溺色變為此諸病盛則寫之虚則補之熱則疾之寒則留之陷下則炙之不盛不虚以經取之盛者寸口大三倍于人迎虚者則寸口反小于人迎也大腸手陽明之脈起于大指次指之端循指上亷出合谷兩骨之間上入兩節之中循臂上亷入肘外亷上臑外前亷上肩出髃骨之前亷上出于柱骨之㑹上下入缺盆絡肺下膈屬大腸其支者從缺盆上頸貫頰入下齒中還出挾口交人中左之右右之左上挾鼻孔是動則病齒痛頸腫是主津液所生病者目黄口乾鼽衂喉痺肩前臑痛大指次指痛不用氣有餘則當脈所過者熱腫虚則寒慄不復為此諸病盛則寫之虚則補之熱則疾之寒則留之陷下則炙之不盛不虚以經取之盛者人迎大三倍于寸口虚者人迎反小於寸口也胃足陽明之脈起於鼻之交頞中分納一本作約字太陽之脈下循鼻外入上齒中還出挾口環唇下交承漿却循頥後下亷出大迎前頰車上耳前過客主人循髮際至額顱其支者從大迎前下人迎循喉嚨入缺盆下膈屬胃絡脾其直者從缺盆下乳内亷下挾臍入氣街中其支者起于胃口下循腹裏下至氣街中而合以下髀闗抵伏免下膝臏中下循脛外亷下足跗入中指内間其支者下亷三寸而别下入中指外間其支者别跗上入大指間出其端是動則病洒洒振寒善呻數欠顔黒病至則惡人與火聞木聲則愓然而驚心欲動獨閉戸塞牖而處甚則欲上髙而歌棄衣而走賁響腹脹是為骭厥是主血所生病者狂瘧温淫汗出鼽衂口喎唇胗頸腫喉痺大腹水腫膝臏腫痛循膺乳氣街股伏免骭外亷足跗上皆痛中指不用氣盛則身以前皆熱其有餘于胃則消榖善饑溺色黄氣不足則身以前皆寒慄胃中寒則脹滿為此諸病盛則寫之虚則補之熱則疾之寒則留之陷下則炙之不盛不虚以經取之盛者人迎大三倍于寸口虚者人迎反小于寸口也脾足太隂之脈起於大指之端循指内側白肉際過核骨後上内踝前亷上踹内循脛骨後交出厥隂之前上膝股内前亷入腹属脾絡胃上膈挾咽連舌本散舌下其支者復從胃别上膈注心中是動則病舌本強食則嘔胃脘痛腹脹善噫得後與氣則快然如衰身體皆重是主脾所生病者舌本痛體不能動摇食不下煩心心下急痛溏瘕泄水閉黄疸不能卧强立股膝内腫厥足大指不用為此諸病盛則寫之虚則補之熱則疾之寒則留之陷下則炙之不盛不虚以經取之盛者寸口大三倍于人迎虚者寸口反小於人迎心手少隂之脈起于心中出屬心系下膈絡小腸其支者從心系上挾咽繫目系其直者復從心系却上肺下出腋下下循臑内後亷行太隂心主之後下肘内循臂内後亷抵掌後脱骨之端入掌内後亷循小指之内出其端是動則病嗌乾心痛渇而欲飲是為臂厥是主心所生病者目黄脇痛臑臂内後亷痛厥掌中熱痛為此諸病盛則寫之虚則補之熱則疾之寒則留之陷下則炙之不盛不虛以經取之盛者寸口大再倍於人迎虚者寸口反小於人迎也小腸手太陽之脈起于小指之端循手外側上腕出踝中直上循臂骨下亷出肘内側兩筋之間上循臑外後亷出肩解繞肩胛交肩上入缺盆絡心循咽下膈抵胃屬小腸其支者從缺盆循頸上頰至日鋭眥却入耳中其支者别頰上䪼抵鼻至目内眥斜絡于顧是動則病嗌痛頷腫不可以顧肩似技臑似折是主液所生病者耳聾目黄頰腫頸頷肩臑肘臂外後亷痛為此諸病盛則寫之虚則補之熱則疾之寒則留之陷下則炙之不盛不虚以經取之盛者人迎大再倍于寸口虚者人迎反小于寸口也膀胱足太陽之脈起于目内眥上額交巔其支者從巔至耳上角其直者從巔入絡腦還出别下項循肩髆内挾脊抵腰中入循膂絡腎屬膀胱其支者從腰中下挾脊貫臀入膕中其支者從髆内左右别下貫胛挾脊内過髀樞循髀外從後亷下合膕中以下貫踹内出外踝之後循京骨至小指外側是動則病衝頭痛目似脫項如拔脊痛腰似折髀不可以曲膕如結踹如裂是為踝厥是主筋所生病者痔瘧狂癲疾頭􅀈項痛目黄淚出􅍠衂項背腰尻膕踹脚皆痛小指不用為此諸病盛則寫之虚則補之熱則疾之寒則留之陷下則炙之不盛不虚以經取之盛者人迎大再倍于寸口虚者人迎反小于寸口也腎足少隂之脈起于小指之下邪走足心出于然谷之下循内踝之後别入跟中以上踹内出膕内亷上股内後亷貫脊屬腎絡膀胱其直者從腎上貫肝膈入肺中循喉嚨挾舌本其支者從肺出絡心注胷中是動則病饑不欲食面如漆柴欬唾則有血喝喝而喘坐而欲起目􅀈􅀈如無所見心如懸若饑狀氣不足則善恐心愓愓如人将捕之是為骨厥是主腎所生病者口熱舌乾咽腫上氣嗌乾及痛煩心心痛黄疸腸澼脊朘内後亷痛痿厥嗜卧足下熱而痛為此諸病盛則寫之虚則補之熱則疾之寒則留之陷下則炙之不盛不虚以經取之炙則強食生肉緩帶被髮大杖重履而步盛者寸口大再倍于人迎虚者寸口反小于人迎也心主手厥隂心包絡之脈起于胷中出屬心包絡下膈歴絡三膲其支者循胷出脇下腋三寸上抵腋下循臑内行太隂少隂之間入肘中下臂行兩筋之間入掌中循中指出其端其支者别掌中循小指次指出其端是動則病手心熱臂肘攣急腋腫甚則胷脇支滿心中憺憺大動面赤目黄喜笑不休是主脈所生病者煩心心痛掌中熱為此諸病盛則寫之虚則補之熱則疾之寒則留之陷下則炙之不盛不虛以經取之盛者寸口大一倍于人迎虚者寸口反小于人迎也三焦手少陽之脈起于小指次指之端上出兩指之間循手表腕出臂外兩骨之間上貫肘循臑外上肩而交出足少陽之後入缺盆布膻中散落心包下膈循屬三焦其支者從膻中上出缺盆上項繫耳後直上出耳上角以屈下頰至䪼其支者從耳後入耳中出走耳前過客主人前交頰至自鋭眥是動則病耳聾渾渾焞焞嗌腫喉痺是主氣所生病者汗出目鋭眥痛頰痛耳後肩臑肘臂外皆痛小指次指不用為此諸病盛則寫之虚則補之熱則疾之寒則留之陷下則炙之不盛不虚以經取之盛者人迎大一倍于寸口虚者人迎反小于寸口也膽足少陽之脈起于目鋭􅗃上抵頭角下耳後循頸行手少陽之前至肩上却交出手少陽之後入缺盆其支者從耳後入耳中出走耳前至目鋭􅗃後其支者别鋭背下大迎合于手少陽抵于䪼下加頰車下頸合缺盆以下胷中貫膈絡肝屬膽循脇裏出氣街繞毛際横入髀厭中其直者從缺盆下腋循胷過季脇下合髀厭中以下循髀陽出膝外亷下外輔骨之前直下抵絶骨之端下出外踝之前循足跗上入小指次指之間其支者别跗上入大指之間循大指歧骨内出其端還貫爪甲出三毛是動則病口苦善太息心脇痛不能轉側甚則面微有塵體無膏澤足外反熱是為陽厥是主骨所生病者頭痛頷痛目銳􅗃痛缺盆中腫痛腋下腫馬刁俠癭汗出振寒瘧胷脇肋髀膝外至脛絶骨外踝前及諸節皆痛小指次指不用為此諸病盛則寫之虚則補之熱則疾之寒則留之陷下則炙之不盛不虚以經取之盛者人迎大一倍于寸口虚者人迎反小于寸口也肝足厥隂之脈起于大指叢毛之際上循足跗上亷去内踝一寸上踝八寸交出太隂之後上膕内亷循股隂入毛中過隂器抵小腹挾胃屬肝絡膽上貫膈布脇肋循喉嚨之後上入頏顙連目系上出額與督脈㑹于巔其支者從目系下頰裏環唇内其支者復從肝别貫膈上注肺是動則病腰痛不可以俛仰丈夫㿉疝婦人少腹腫甚則嗌乾面塵脱色是肝所生病者胷滿嘔逆飱泄狐疝遺溺閉癃為此諸病盛則寫之虚則補之熱則疾之寒則留之陷下則炙之不盛不虚以經取之盛者寸口大一倍于人迎虚者寸口反小于人迎也手太隂氣絶則皮毛焦太隂者行氣温于皮毛者也故氣不榮則皮毛焦皮毛焦則津液去皮節津液去皮節者則爪枯毛折毛折者則毛先死丙篤丁死火勝金也手少隂氣絶則脈不通脈不通則血不流血不流則髦色不澤故其面黒如漆柴者血先死壬篤癸死水勝火也足太隂氣絶者則脈不榮肌肉唇舌者肌肉之本也脈不榮則肌肉軟肌肉軟則舌萎人中滿人中滿則唇反唇反者肉先死甲篤乙死木勝土也足少隂氣絶則骨枯少隂者冬脈也伏行而濡骨髓者也故骨不濡則肉不能著也骨肉不相親則肉軟却肉軟却故齒長而垢髮無澤髮無澤者骨先死戊篤已死土勝水也足厥隂氣絶則筋絶厥隂者肝脈也肝者筋之合也筋者聚于隂氣而脈絡于舌本也故脈弗榮則筋急筋急則引舌與卵故唇青舌卷卵縮則筋先死庚篤辛死金勝木也五隂氣俱絶則目系轉轉則目運目運者為志先死志先死則逺一日半死矣六陽氣絶則隂與陽相離離則腠理發泄絶汗乃出故旦占夕死夕占旦死經脈十二者伏行分肉之間深而不見其常見者足太隂過于外踝之上無所隠故也諸脈之浮而常見者皆絡脈也六經絡手陽明少陽之大絡起于五指間上合肘中飲酒者衛氣先行皮膚先充絡脈絡脈先盛故衛氣已平營氣乃滿而經脈大盛脈之卒然動者皆邪氣居之留于本末不動則熱不堅則陷且空不與衆同是以知其何脈之動也雷公曰何以知經脈之與絡脈異也黄帝曰經脈者常不可見也其虚實也以氣口知之脈之見者皆絡脈也雷公曰細子無以明其然也黄帝曰諸絡脈皆不能經大節之間必行絶道而出入復合于皮中其㑹皆見于外故諸刺絡脈者必刺其結上甚血者雖無結急取之以寫其邪而出其血留之發為痺也凡診絡脈脈色青則寒且痛赤則有熱胃中寒手魚之絡多青矣胃中有熱魚際絡赤其暴黒者留乆痺也其有赤有黒有青者寒熱氣也其青短者少氣也凡刺寒熱者皆多血絡必間日而一取之血盡而止乃調其虚實其小而短者少氣甚者寫之則悶悶甚則仆不得言悶則急坐之也手太隂之别名曰列缺起於腕上分間並太隂之經直入掌中散入於魚際其病實則手鋭掌熱虚則欠㰦小便遺數取之去腕半寸别走陽明也手少隂之别名曰通里去腕一寸半别而上行循經入於心中繫舌本屬目系其實則支膈虚則不能言取之掌後一寸别走太陽也手心主之别名曰内關去腕二寸出於兩筋之間循經以上繫於心包絡心系實則心痛虚則為頭强取之兩筋間也手太陽之别名曰支正上腕五寸内注少隂其别者上走肘絡肩髃實則節㢮肘廢虚則生肬小者如指痂疥取之所别也手陽明之别名曰偏歴去腕三寸别入太隂其别者上循臂乘肩髃上曲頰偏齒其别者入耳合於宗脈實則齲聾虚則齒寒痺隔取之所别也手少陽之别名曰外闗去腕二寸外遶臂注胷中合心主病實則肘攣虚則不收取之所别也足太陽之别名曰飛陽去踝七寸别走少隂實則鼽窒頭背痛虚則􅍠衂取之所别也足少陽之别名曰光明去踝五寸别走厥隂下絡足跗實則厥虚則痿躄坐不能起取之所别也足陽明之别名曰豐隆去踝八寸别走太隂其别者循脛骨外亷上絡頭項合諸經之氣下絡喉嗌其病氣逆則喉痺瘁瘖實則狂巔虚則足不收脛枯取之所别也足太隂之别名曰公孫去本節之後一寸别走陽明其别者入絡腸胃厥氣上逆則霍亂實則腸中切痛虛則鼓脹取之所别也足少隂之别名曰大鍾當踝後繞跟别走太陽其别者并經上走于心包下外貫腰脊其病氣逆則煩悶實則閉癃虛則腰痛取之所别者也足厥隂之别名曰蠡溝去内踝五寸别走少陽其别者徑脛上睪結於莖其病氣逆則睪腫卒疝實則挺長虛則暴癢取之所别也任脈之别名曰尾翳下鳩尾散於腹實則腹皮痛虚則癢搔取之所别也督脈之别名曰長强挾膂上項散頭上下當肩胛左右别走太陽入貫膂實則脊強虚則頭重髙摇之挾脊之有過者取之所别也脾之大絡名曰大包出淵腋下三寸布胸脇實則身盡痛虛則百節盡皆縱此脉若羅絡之血者皆取之脾之大絡脈也凡此十五絡者實則必見虛則必下視之不見求之上下人經不同絡脉異所别也瞀音務䪼之劣切髀音箄骭音旱憺憺音淡邪與斜同焞焞土渾切肬音由經别第十一黄帝問於岐伯曰余聞人之合於天道也内有五藏以應五音五色五時五味五位也外有六府以應六律六律建隂陽諸經而合之十二月十二辰十二節十二經水十二時十二經脈者此五藏六府之所以應天道夫十二經脈者人之所以生病之所以成人之所以治病之所以起學之所始工之所止也粗之所易上之所難也請問其離合出入柰何岐伯稽首再拜曰明乎哉問也此粗之所過上之所息也請卒言之足太陽之正别入於膕中其一道下尻五寸别入於肛屬於膀胱散之腎循膂當心入散直者從膂上出於項復屬於太陽此為一經也足少隂之正至膕中别走太陽而合上至腎當十四顴出屬帶脉直者繫舌本復出於項合於太陽此為一合成以諸隂之别皆為正也足少陽之正繞髀入毛際合於厥隂别走入季脇之間循胷裏屬膽散之上肝貫心以上挾咽出頥頷中散於面繫目系合少陽於外􅗃也足厥隂之正别跗上上至毛際合於少陽與别俱行此為一合也足陽明之正上至髀入於腹裏及胃散之脾上通於心上循咽出於口上頞䪼還繫目系合於陽明也足太隂之正上至髀合於陽明與别俱行上結於咽貫舌中此為三合也手太陽之正指地别於肩解入腋走心繫小腸也手少隂之正别入於淵腋兩筋之間屬於心上走喉嚨出於面合目内􅗃此為四合也手少陽之正指天别於巔入缺盆下走三焦散於胷中也手心主之正别下淵腋三寸入胷中别屬三焦出循喉嚨出耳後合少陽完骨之下此為五合也手陽明之正從手循膺乳别於肩髃入柱骨下走大腸屬於肺上循喉嚨出缺盆合於陽明也手太隂之正别入淵腋少隂之前入走肺散之太陽上出缺盆循喉嚨復合陽明此六合也尻枯毛切肛胡公切頥頷上以之切下户上切經水第十二黄帝問於岐伯曰經脈十二者外合於十二經水而内屬於五藏六府夫十二經水者其有大小深淺廣狹逺近各不同五藏六府之髙下小大受榖之多少亦不等相應奈何夫經水者受水而行之五藏者合神氣魂魄而藏之六府者受榖而行之受氣而揚之經脈者受血而營之合而以治奈何刺之深淺灸之壯數可得聞乎岐伯答曰善哉問也天至髙不可度地至廣不可量此之謂也且夫人生於天地之間六合之内此天之髙地之廣也非人力之所能度量而至也若夫八尺之士皮肉在此外可度量切循而得之其死可解剖而視之其蔵之堅脆府之大小榖之多少脈之長短血之清濁氣之多少十二經之多血少氣與其少血多氣與其皆多血氣與其皆少血氣皆有大數其治以針艾各調其經氣固其常有合乎黄帝曰余聞之快於耳不解於心願卒聞之岐伯答曰此人之所以參天地而應隂陽也不可不察足太陽外合於清水内屬於膀胱而通水道焉足少陽外合於渭水内屬於膽足陽明外合於海水内屬於胃足太隂外合於湖水内屬於脾足少隂外合於汝水内屬於腎足厥隂外合於澠水内屬於肝手太陽外合於淮水内屬於小腸而水道出焉手少陽外合於漯水内屬於三焦手陽明外合於江水内屬於大腸手太隂外合於河水内屬於肺手少隂外合於濟水内屬於心手心主外合於漳水内屬於心包凡此五蔵六府十二經水者外有源泉而内有所稟此皆内外相貫如環無端人經亦然故天為陽地為隂腰以上為天腰以下為地故海以北者為隂湖以北者為隂中之隂漳以南者為陽河以北至漳者為陽中之隂漯以南至江者為陽中之太陽此一隅之隂陽也所以人與天地相參也黄帝曰夫經水之應經脈也其逺近淺深水血之多少各不同合而以刺之奈何岐伯答曰足陽明五藏六府之海也其脈大血多氣盛熱壯刺此者不深弗散不留不寫也足陽明刺深六分留十呼足太陽深五分留七呼足少陽深四分留五呼足太隂深三分留四呼足少隂深二分留三呼足厥隂深一分留二呼手之隂陽其受氣之道近其氣之來疾其刺深者皆無過二分其留皆無過一呼其少長大小肥瘦以心撩之命曰法天之常灸之亦然灸而過此者得惡火則骨枯脈濇刺而過此者則脫氣黄帝曰夫經脈之小大血之多少膚之厚薄肉之堅脆及膕之大小可為量度乎岐伯答曰其可為度量者取其中度也不甚脱肉而血氣不衰也若夫度之人消瘦而形肉脱者惡可以度量刺乎審切循捫按視其寒温盛衰而調之是謂因適而為之真也澠弥善切漯通合切以心撩之一本作以意料之靈樞經卷三
