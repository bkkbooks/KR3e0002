body:
  text: 靈樞經巻四宋史崧音釋經筋第十三足太陽之筋起于足小指上結于踝邪上結于膝其下循足外側結于踵上循跟結於膕其别者結于踹外上膕中内㢘與膕中并上結于臀上挾脊上項其支者别入結於舌本其直者結於枕骨上頭下顔結於鼻其支者為目上網下結於頄其支者從腋後外㢘結於肩髃其支者入腋下上出缺盆上結於完骨其支者出缺盆邪上出於頄其病小指支跟腫痛膕攣脊反折項筋急肩不舉腋支缺盆中紐痛不可左右摇治在燔針刼刺以知為數以痛為輸名曰仲春痺足少陽之筋起于小指次指上結外踝上循脛外㢘結於膝外廉其支者别起外輔骨上走髀前者結於伏兎之上後者結於尻其直者上乗䏚季脇上走腋前㢘繫於膺乳結於缺盆直者上出腋貫缺盆出太陽之前循耳後上額角交巔上下走頷上結於頄支者結於目眥為外維其病小指次指支轉筋引膝外轉筋膝不可屈伸膕筋急前引髀後引尻即上乗䏚季脇痛上引缺盆膺乳頸維筋急從左之右右目不開上過右角並蹻脉而行左絡於右故傷左角右足不用命曰維筋相交治在燔針刼刺以知為數以痛為輸名曰孟春痺也足陽明之筋起於中三指結於跗上邪外上加於輔骨上結於膝外㢘直上結於髀樞上循脇屬􅆃其直者上循骭結於闕其支者結於外輔骨合少陽其直者上循伏兎上結於髀聚於隂器上腹而布至缺盆而結上頸上挾口合於頄下結於鼻上合於太陽太陽為目上網陽明為目下網其支者從頰結於耳前其病足中指支脛轉筋脚跳堅伏兎轉筋髀前腫㿉疝腹筋急引缺盆及頰卒口僻急者目不合熱則筋縱自不開頰筋有寒則急引頰移口有熱則筋㢮縱緩不勝收故僻治之以馬膏膏其急者以白酒和桂以塗其緩者以桑鉤鉤之即以生桑灰置之坎中髙下以坐等以膏熨急頰且飲美酒噉美炙肉不飲酒者自强也為之三拊而已治在燔針刼刺以知為數以痛為輸名曰季春痺也足太隂之筋起於大指之端内側上結於内踝其直者絡於膝内輔骨上循隂股結於髀聚於隂器上腹結於臍循腹裏結於肋散於胷中其内者著於脊其病足大指支内踝痛轉筋痛膝内輔骨痛隂股引髀而痛隂器紐痛下引臍兩脇痛引膺中脊内痛治在燔針刼刺以知為數以痛為輸命曰孟秋痺也足少隂之筋起於小指之下並足太隂之筋邪走内踝之下結於踵與太陽之筋合而上結於内輔之下並太隂之筋而上循隂股結於隂器循􅆃内挾膂上至項結於枕骨與足太陽之筋合其病足下轉筋及所過而結者皆痛及轉筋病在此者主癎瘛及痙在外者不能俛在内者不能仰故陽病者腰反折不能俛隂病者不能仰治在燔針刼刺以知為數以痛為輸在内者熨引飲藥此筋折紐紐發數甚者死不治名曰仲秋痺也足厥隂之筋起於大指之上上結於内踝之前上循脛上結内輔之下上循隂股結於隂器絡諸筋其病足大指支内踝之前痛内輔痛隂股痛轉筋隂器不用傷於内則不起傷於寒則隂縮入傷於熱則縱挺不收治在行水清隂氣其病轉筋者治在燔針刼刺以知為數以痛為輸命曰季秋痺也手太陽之筋起於小指之上結於腕上循臂内㢘結於肘内銳骨之後彈之應小指之上入結於腋下其支者後走腋後㢘上繞肩脾循頸出走太陽之前結於耳後完骨其支者入耳中直者出耳上下結於頷上屬目外􅗃其病小指支肘内銳骨後㢘痛循臂隂入腋下腋下痛腋後㢘痛繞肩脾引頸而痛應耳中鳴痛引頷目瞑良乆乃得視頸筋急則為筋瘻頸腫寒熱在頸者治在燔針刼刺之以知為數以痛為輸其為腫者復而銳之本支者上曲牙循耳前屬目外􅗃上頷結於角其痛當所過者支轉筋治在燔針刼刺以知為數以痛為輸名曰仲夏痺也手少陽之筋起於小指次指之端結於腕上循臂結於肘上繞臑外亷上肩走頸合手太陽其支者當曲頬入繫舌本其支者上曲牙循耳前属目外眥上乘頷結於角其病當所過者即支轉筋舌卷治在燔針刼刺以知為數以痛為輸名曰季夏痺也手陽眀之筋起於大指次指之端結於腕上循臂上結於肘外上臑結於髃其支者繞肩胛挟􅆃直者從肩髃上頸其支者上頬結於頄直者上出手太陽之前上左角絡頭下右頷其病當所過者支痛及轉筋肩不舉頸不可左右視治在燔針刼刺以知為數以痛為輸名曰孟夏痺也手太隂之筋起於大指之上循指上行結於魚後行寸口外側上循臂結肘中上臑内亷入腋下出缺盆結肩前髃上結缺盆下結胷裏散貫賁合賁下抵季脇其病當所過者支轉筋痛甚成息賁脇急吐血治在燔針刼刺以知為數以痛為輸名曰仲冬痺也手心主之筋起於中指與太隂之筋並行結於肘内亷上臂隂結腋下下散前後挟脇其支者入腋散胷中結於臂其病當所過者支轉筋前及胷痛息賁治在燔針刼刺以知為數以痛為輸名曰孟冬痺也手少隂之筋起於小指之内側結於鋭骨上結肘内亷上入腋交太隂挟乳裏結於胷中循臂下繫於臍其病内急心承伏梁下為肘網其病當所過者支轉筋筋痛治在燔針刼刺以知為數以痛為輸其成伏梁吐血膿者死不治經筋之病寒則反折筋急熱則筋㢮縦不收隂痿不用陽急則反折隂急則俛不伸焠刺者刺寒急也熱則筋縱不收無用燔針名曰季冬痺也足之陽眀手之太陽筋急則口目為噼眥急不能卒視治皆如右方也頄音求骨度第十四黄帝問于伯髙曰脉度言經脉之長短何以立之伯髙曰先度其骨節之大小廣狭長短而脉度定矣黄帝曰願問衆人之度人長七尺五寸者其骨節之大小長短各㡬何伯髙曰頭之大骨圍二尺六寸胷圍四尺五寸腰圍四尺三寸髪所覆者顱至項尺二寸髪以下至頥長一尺君子終折結喉以下至缺盆中長四寸缺盆以下至􅐳􅚯長九寸過則肺大不滿則肺小􅐳􅚯以下至天樞長八寸過則胃大不及則胃小天樞以下至横骨長六寸半過則迴腸廣長不滿則狭短横骨長六寸半横骨上亷以下至内輔之上亷長一尺八寸内輔之上亷以下至下亷長三寸半内輔下亷下至内踝長一尺三寸内踝以下至地長三寸膝膕以下至跗属長一尺六寸跗属以下至地長三寸故骨圍大則太過小則不及角以下至柱骨長一尺行腋中不見者長四寸腋以下至季脇長一尺二寸季脇以下至髀樞長六寸髀樞以下至膝中長一尺九寸膝以下至外踝長一尺六寸外踝以下至京骨長三寸京骨以下至地長一寸耳後當完骨者廣九寸耳前當耳門者廣一尺三寸兩顴之間相去七寸兩乳之間廣九寸半兩髀之間廣六寸半足長一尺二寸廣四寸半肩至肘長一尺七寸肘至腕長一尺二寸半腕至中指本節長四寸本節至其末長四寸半項髪以下至背骨長二寸半膂骨以下至尾骶二十一節長三尺上節長一寸四分分之一竒分在下故上七節至於膂骨九寸八分分之七此衆人骨之度也所以立經脉之長短也是故視其經脉之在於身也其見浮而堅其見眀而大者多血細而沈者多氣也􅐳􅚯上許蝎切又許伐切下云居切髀歩米切股也五十營第十五黄帝曰余願聞五十營奈何岐伯答曰天周二十八宿宿三十六分人氣行一周千八分日行二十八宿人經脉上下左右前後二十八脉周身十六丈二尺以應二十八宿漏水下百刻以分晝夜故人一呼脉再動氣行三寸一吸脉亦再動氣行三寸呼吸定息氣行六寸十息氣行六尺日行二分二百七十息氣行十六丈二尺氣行交通於中一周於身下水二刻日行二十五分五百四十息氣行再周於身下水四刻日行四十分二千七百息氣行十周於身下水二十刻日行五宿二十分一萬三千五百息行氣五十營於身水下百刻日行二十八宿漏水皆盡脉終矣所謂交通者并行一數也故五十營備得盡天地之夀矣凡行八百一十丈也營氣第十六黄帝曰營氣之道内榖為寳榖入於胃乃𫝊之肺流溢於中布散於外精専者行於經隧常營無已終而復始是謂天地之紀故氣從太隂出注手陽眀上行注足陽眀下行至跗上注大指間與太隂合上行抵髀從脾注心中循手少隂出腋下臂注小指合手太陽上行乗腋出蝢内注目内眥上巔下項合足太陽循􅆃下尻下行注小指之端循足心注足少隂上行注腎從腎注心外散於胷中循心主脉出腋下臂出兩筋之間入掌中出中指之端還注小指次指之端合手少陽上行注膻中散於三焦従三焦注胆出脇注足少陽下行至跗上復從跗注大指間合足厥隂上行至肝從肝上注肺上循喉嚨入頏顙之竅究於畜門其支别者上額循巔下項中循􅆃入骶是督脉也絡隂器上過毛中入臍中上循腹裏入缺盆下注肺中復出太隂此營氣之所行也逆順之常也入骶音氐脉度第十七黄帝曰願聞脉度岐伯答曰手之六陽從手至頭長五尺五六三丈手之六隂從手至胷中三尺五寸三六一丈八尺五六三尺合二丈一尺足之六陽從足上至頭八尺六八四丈八尺足之六隂從足至胷中六尺五寸六六三丈六尺五六三尺合三丈九尺蹻脉從足至目七尺五寸二七一丈四尺二五一尺合一丈五尺督脉任脉各四尺五寸二四八尺二五一尺合九尺凡都合一十六丈二尺此氣之大經隧也經脉為裏支而横者為絡絡之别者為孫盛而血者疾誅之盛者寫之虚者飲藥以補之五臟常内閱於上七竅也故肺氣通於鼻肺和則鼻能知臭香矣心氣通於舌心和則舌能知五味矣肝氣通於目肝和則目能辨五色矣脾氣通於口脾和則口能知五糓矣腎氣通於耳腎和則耳能聞五音矣五藏不和則七竅不通六府不和則留為癰故邪在府則陽脉不和陽脉不和則氣留之氣留之則陽氣盛矣陽氣大盛則隂不利隂脉不利則血留之血留之則隂氣盛矣隂氣大盛則陽氣不能榮也故曰關陽氣大盛則隂氣不能榮也故曰格隂陽俱盛不得相榮故曰關格關格者不得盡期而死也黄帝曰蹻脉安起安止何氣榮水歧伯答曰蹻脉者少隂之别起於然骨之後上内踝之上直上循隂股入隂上循胷裏入缺盆上出人迎之前入頄屬目内眥合於太陽陽蹻而上行氣并相還則為濡目氣不榮則目不合黄帝曰氣獨行五藏不榮六府何也岐伯答曰氣之不得無行也如水之流如日月之行不休故隂脉榮其藏陽脉榮其府如環之無端莫知其紀終而復始其流溢之氣内漑藏府外濡腠理黄帝曰蹻脉有隂陽何脉當其數歧伯答曰男子數其陽女子數其隂當數者為經其不當數者為絡也蹻脉渠畧切又音喬經隧音遂營衛生㑹第十八黄帝問於歧伯曰人焉受氣隂陽焉㑹何氣為營何氣為衛營安從生衛於焉㑹老壯不同氣隂陽異位願聞其㑹歧伯答曰人受氣於糓糓入於胃以𫝊與肺五藏六府皆以受氣其清者為營濁者為衛營在脉中衛在脉外營周不休五十而復大㑹隂陽相貫如環無端衛氣行於隂二十五度行於陽二十五度分為晝夜故氣至陽而起至隂而止故曰日中而陽隴為重陽夜半而隂隴為重隂故太隂主内太陽主外各行二十五度分為晝夜夜半為隂隴夜半後而為隂衰平旦隂盡而陽受氣矣日中而陽隴日西而陽衰日入陽盡而隂受氣矣夜半而大㑹萬民皆臥命曰合隂平旦隂盡而陽受氣如是無已與天地同紀黃帝曰老人之不夜瞑者何氣使然少壯之人不晝瞑者何氣使然歧伯答曰壯者之氣血盛其肌肉滑氣道通營衛之行不失其常故晝精而夜瞑老者之氣血衰其肌肉枯氣道澁五藏之氣相摶其營氣衰少而衛氣内伐故晝不精夜不瞑黃帝曰願聞營衛之所行皆何道從來歧伯答曰營出於中焦衛出於下焦黃帝曰願聞三焦之所出歧伯答曰上焦出於胃上口並咽以上貫膈而布胷中走腋循太隂之分而行還至陽明上至舌下足陽明常與營俱行於陽二十五度行於隂亦二十五度一周也故五十度而復大㑹於手太隂矣黃帝曰人有熱飲食下胃其氣未定汗則出或出於面或出於背或出於身半其不循衛氣之道而出何也歧伯曰此外傷於風内開腠理毛蒸理泄衛氣走之固不得循其道此氣慓悍滑疾見開而出故不得從其道故命曰漏泄黃帝曰願聞中焦之所出歧伯答曰中焦亦並胃中出上焦之後此所受氣者泌糟粕蒸精液化其精㣲上注於肺脉乃化而為血以奉生身莫貴於此故獨得行於經隧命曰營氣黃帝曰夫血之與氣異名同類何謂也歧伯答曰營衛者精氣也血者神氣也故血之與氣異名同類焉故奪血者無汗奪汗者無血故人生有兩死而無兩生黃帝曰願聞下焦之所出歧伯答曰下焦者别迴腸注於膀胱而渗入焉故水糓者常并居於胃中成糟粕而俱下於大腸而成下焦渗而俱下濟泌别注循下焦而渗入膀胱焉黃帝曰人飲酒酒亦入胃糓未熟而小便獨先下何也歧伯答曰酒者熟糓之液也其氣悍以清故後糓而入先糓而液出焉黃帝曰善余聞上焦如霧中焦如漚下焦如瀆此之謂也四時氣第十九黃帝問於歧伯曰夫四時之氣各不同形百病之起皆有所生灸刺之道何者為定一本作宅歧伯答曰四時之氣各有所在灸别之道得氣穴為定故春取經血脉分肉之間甚者深刺之間者淺刺之夏取盛經孫絡取分間絶皮膚秋取經腧邪在府取之合冬取并榮必深以留之溫瘧汗不出為五十九痏風㽷膚脹為五十七痏取皮膚之血者盡取之飱泄補三隂之上補隂陵泉皆乆留之熱行乃止轉筋於陽治其陽轉筋於隂治其隂皆卒刺之徒㽷先取環谷下三寸以鈹針針之已刺而筩之而内之入而復之以盡其㽷必堅來緩則煩恱來急則安静間日一刺之㽷盡乃止飲閉藥方刺之時徒飲之方飲無食方食無飲無食他食百三十五日着痺不去久寒不已卒取其三里骨為幹腸中不便取三里盛寫之虛補之癘風者素刺其腫上已刺以銳針針其處按出其惡氣腫盡乃止常食方食無食他食腹中常鳴氣上衝胷喘不能乆立邪在大腸刺肓之原巨虛上亷三里小腹控睪引腰背上衝心邪在小腸者連睪系屬于脊貫肝肺絡心系氣盛則厥逆上衝腸胃燻肝散于肓結于臍故取之肓原以散之刺太隂以予之取厥隂以下之取巨虛不亷以去之按其所過之經以調之善嘔嘔有苦長大息心中憺憺恐人將捕之邪在膽逆在胃膽液泄則口苦胃氣逆則嘔苦故曰嘔膽取三里以下胃氣逆則刺少陽血絡以閉膽逆却調其虛實以去其邪飲食不下膈塞不通邪在胃脘在上脘則刺抑而下之在下脘則散而去之小腹痛腫不得小便邪在三焦約取之太陽大絡視其絡脉與厥隂小絡結而血者腫上及胃脘取三里覩其色察其音以知其散復者視其目色以知病之存亡也一其形聽其動靜者持氣口人迎以視其脉堅且盛且滑者病日進脉軟者病將下諸經實者病三日已氣口候隂人迎候陽也風㽷丸類切筩音同著痺上直畧切下音閉銳鍼上余惠切芒也靈樞經巻四
