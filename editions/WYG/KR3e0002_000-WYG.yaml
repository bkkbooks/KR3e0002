  text: 欽定四庫全書子部五
  hash: sha256:385bc2d94867d1b606f43bb11ebdc68a3a5579aafe48be2b02b9eb652717f689
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3e0002_WYG_000-1a, image: WYG0733/WYG0733-0317a.png}
body:
  text: 靈樞經醫家類提要臣等謹案靈樞經十二卷案晁公武讀書志曰王冰謂靈樞即漢志黄帝内經十八卷之九謂或好事者於皇甫諡所集内經倉公論中鈔出之名為古書未知孰是又李濓醫史載元吕復羣經古方論曰内經靈樞漢隋唐志皆不録隋有鍼經九卷唐有靈寳註及黄帝九靈經十二卷而已或謂王冰以九靈更名為靈樞又謂九靈尤詳於鍼故皇甫諡名之為鍼經苟一經而二名不應唐志别出鍼經十二卷是靈樞不及素問之古宋元人已言之矣近時杭世駿道古堂集亦有靈樞經跋曰七畧漢藝文志黄帝内經十八篇皇甫諡以鍼經九卷素問九卷合十八篇當之隋書經籍志鍼經九卷黄帝九靈十二卷是九靈自九靈鍼經自鍼經不可合而為一也王冰以九靈名靈樞不知其何所本余觀其文義淺短與素問之言不類又似竊取素問而鋪張之其為王冰所偽託可知後人莫有傳其書者至宋紹興中錦官史崧乃云家藏舊本靈樞九卷除已具状經所屬申明外准使府指揮依條申轉運司選官詳定其書送秘書省國子監是此書至宋中世而始出未經髙保衡林億等校定也其中十二經水一篇黄帝時無此名冰特據身所見而妄臆度之云云其考證尤為明晰然李杲精究醫理而使羅天益作類經兼採素問靈樞吕復亦稱善學者當與素問並觀其㫖義互相發明盖其書雖偽而其言則綴合古經具有源本譬之梅賾古文襍採逸書聫成篇目雖牴牾罅漏􅎓託顯然而先王遺訓多賴其蒐輯以有傳不可廢也此本前有紹興乙亥史崧序稱舊本九卷八十一篇増修音釋附於卷末又目録首題鼇峯熊宗立㸃校重刋末題原二十四卷今併為十二卷是此本為元時重刋所併吕復稱史崧併是書為十二卷以復其舊殆誤以熊本為史本歟乾隆四十六年四月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀靈樞經原序昔黄帝作内經十八卷靈樞九卷素問九卷迺其數焉世所奉行唯素問耳越人得其一二而述難經皇甫謐次而為甲乙諸家之説悉自此始其間或有得失未可為後世法則謂如南陽活人書稱欬逆者噦也謹按靈樞經曰新榖氣入於胃與故寒氣相爭故曰噦舉而並之則理可斷矣又如難經第六十五篇是越人標指靈樞本輸之大畧世或以為流注謹按靈樞經曰所言節者神氣之所遊行出入也非皮肉筋骨也又曰神氣者正氣也神氣之所遊行出入者流注也井滎輸經合者本輸也舉而並之則知相去不啻天壤之異但恨靈樞不傳乆矣世莫能究夫為醫者在讀醫書耳讀而不能為醫者有矣未有不讀而能為醫者也不讀醫書又非世業殺人尤毒於挺刃是故古人有言曰為人子而不讀醫書由為不孝也僕本庸昧自髫迄壯潛心斯道頗涉其理輒不自揣參對諸書再行校正家藏舊本靈樞九卷共八十一篇増修音釋附於卷末勒為二十四卷庻使好生之人開卷易明了無差别除已具狀經所屬申明外准使府指揮依條申轉運司選官詳定具書送秘書省國子監今崧専訪請名醫更乞參詳免誤將來利益無窮功實有自時宋紹興乙亥仲夏望日錦官史崧題欽定四庫全書
