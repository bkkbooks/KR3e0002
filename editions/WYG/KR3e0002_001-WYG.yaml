front:
  text: 靈樞經卷一
  hash: sha256:c6d20a101d11cb5e8fc640fd8a84daf5b31e3a5024f7d121bb14a1ff77669d12
body:
  text: 宋史崧音釋九針十二原第一法天黄帝問於歧伯曰余子萬民養百姓而收其租税余哀其不給而屬有疾病余欲勿使被毒藥無用砭石欲以㣲針通其經脈調其血氣營其逆順出入之㑹令可傳於後世必明為之法令終而不滅乆而不絶易用難忘為之經紀異其章别其表裏為之終始令各有形先立針經願聞其情歧伯答曰臣請推而次之令有綱紀始於一終於九焉請言其道小針之要易陳而難入粗守形上守神神乎神客在門未覩其疾惡知其原刺之微在速遲粗守闗上守機機之動不離其空空中之機清静而微其來不可逢其徃不可追知機之道者不可掛以髮不知機道叩之不發知其往來要與之期粗之闇乎妙哉工獨有之往者為逆來者為順明知逆順正行無問迎而奪之惡得無虛追而濟之惡得無實迎之隨之以意和之針道畢矣凡用針者虚則實之滿則泄之宛陳則除之邪勝則虚之大要曰徐而疾則實疾而徐則虚言實與虚若有若無察後與先若存若亡為虚與實若得若失虚實之要九針最妙補寫之時以針為之寫曰必持内之放而出之排陽得針邪氣得泄按而引針是謂内温血不得散氣不得出也補曰隨之隨之意若忘之若行若按如蚊虻止如留如還去如絃絶令左屬右其氣故止外門已閉中氣乃實必無留血急取誅之持針之道堅者為寳正指直刺無針左右神在秋毫屬意病者審視血脈者刺之無殆方刺之時必在懸陽及與兩衛神屬勿去知病存亡血脈者在腧横居視之獨澄切之獨堅九針之名各不同形一曰鑱針長一寸六分二曰貟針長一寸六分三曰鍉針長三寸半四曰鋒針長一寸六分五曰鈹針長四寸廣二分半六曰貟利針長一寸六分七曰毫針長三寸六分八曰長針長七寸九曰大針長四寸鑱針者頭大末銳去寫陽氣貟針者針如卵形揩摩分間不得傷肌肉以寫分氣鍉針者鋒如黍粟之銳主按脈勿陷以致其氣鋒針者刃三隅以發痼疾鈹針者末如劒鋒以取大膿貟利針者大如氂且貟且鋭中身微大以取暴氣毫針者尖如蚊虻喙静以徐往微以乆留之而養以取痛痺長針者鋒利身薄可以取逺痺大針者尖如挺其鋒微貟以寫機闗之水也九針畢矣夫氣之在脈也邪氣在上濁氣在中清氣在下故針陷脈則邪氣出針中脈則濁氣出針太深則邪氣反沈病益故曰皮肉筋脈各有所處病各有所宜各不同形各以任其所宜無實無虚損不足而益有餘是謂甚病病益甚取五脈者死取三脈者恇奪隂者死奪陽者狂針害畢矣刺之而氣不至無問其數刺之而氣至乃去之勿復針針各有所宜各不同形各任其所為刺之要氣至而有效效之信若風之吹雲明乎若見蒼天刺之道畢矣黄帝曰願聞五藏六府所出之處岐伯曰五蔵五腧五五二十五腧六府六腧六六三十六腧經脈十二絡脈十五凡二十七氣以上下所出為井所溜為滎所注為腧所行為經所以為合二十七氣所行皆在五腧也節之交三百六十五㑹知其要者一言而終不知其要流散無窮所言節者神氣之所遊行出入也非皮肉筋骨也覩其色察其目知其散復一其形聽其動静知其邪正右主推之左持而禦之氣至而去之凡將用針必先診脈視氣之劇易乃可以治也五藏之氣已絶於内而用針者皮實其外是謂重竭重竭必死其死也靜治之者輒反其氣取腋與膺五藏之氣已絶於外而用針者反實其内是謂逆厥逆厥則必死其死也躁治之者反取四末刺之害中而不去則精泄害中而去則致氣精泄則病益甚而恇致氣則生為癰瘍五藏有六府六府有十二原十二原出於四闗四闗主治五藏五藏有疾當取之十二原十二原者五藏之所以稟三百六十五節氣味也五藏有疾也應出十二原十二原各有所出明知其原覩其應而知五藏之害矣陽中之少隂肺也其原出於大淵大淵二陽中之太陽心也其原出於大陵大陵二隂中之少陽肝也其原出於太衝太衝二隂中之至隂脾也其原出於太白太白二隂中之太隂腎也其原出於太谿太谿二膏之原出於鳩尾鳩尾一肓之原出於脖胦脖胦一凡此十二原者主治五藏六府之有疾者也脹取三陽飱泄取三隂今夫五藏之有疾也譬猶刺也猶汚也猶結也猶閉也刺雖乆猶可拔也汚雖乆猶可雪也結雖乆猶可解也閉雖乆猶可決也或言久疾之不可取者非其説也夫善用針者取其疾也猶拔刺也猶雪汚也猶解結也猶決閉也疾雖久猶可畢也言不可治者未得其術也刺諸熱者如以手探湯刺寒清者如人不欲行隂有陽疾者取之下陵三里正往無殆氣下乃止不下復始也疾髙而内者取之隂之陵泉疾髙而外者取之陽之陵泉也宛陳上音欎又音藴又於阮切氂莫髙切又音毫在腧春遇切鑱錐銜切鍉音低鈹音皮虻喙下謝穢切取三脈者恇曲王切謹按恇謂不足也脖胦上蒲没切下烏朗切又於桑切溜謹按針經當作流滎音營絶小水也本輸第二法地黄帝問於岐伯曰凡刺之道必通十二經絡之所終始絡脈之所别處五輸之所留六府之所與合四時之所出入五藏之所溜處濶數之度淺深之狀髙下所至願聞其解歧伯曰請言其次也肺出於少商少商者手大指端内側也為井木溜於魚際魚際者手魚也為滎注於大淵大淵魚後一寸陷者中也為腧行於經渠經渠寸口中也動而不居為經入於尺澤尺澤肘中之動脈也為合手太隂經也心出於中衝中衝手中指之端也為井木溜於勞宫勞宫掌中中指本節之内間也為滎注於大陵大陵掌後兩骨之間方下者也為腧行於間使間使之道兩筋之間三寸之中也有過則至無過則止為經入於曲澤曲澤肘内亷下陷者之中也屈而得之為合手少隂也肝出於大敦大敦者足大指之端及三毛之中也為井木溜於行間行間足大指間也為滎注於大衝大衝行間上二寸陷者之中也為腧行於中封中封内踝之前一寸半陷者之中使逆則宛使和則通摇足而得之為經入於曲泉曲泉輔骨之下大筋之上也屈膝而得之為合足厥隂也脾出於隠白隠白者足大指之端内側也為井木溜於大都大都本節之後下陷者之中也為滎注於太白太白腕骨之下也為腧行於商丘商丘内踝之下陷者之中也為經入於隂之陵泉隂之陵泉輔骨之下陷者之中也伸而得之為合足太隂也腎出於湧泉湧泉者足心也為井木溜於然谷然谷然骨之下者也為滎注於大谿大谿内踝之後跟骨之上陷中者也為腧行於復留復留上内踝二寸動而不休為經入於隂谷隂谷輔骨之後大筋之下小筋之上也按之應手屈膝而得之為合足少隂經也膀胱出於至隂至隂者足小指之端也為井金溜於通谷通谷本節之前外側也為滎注於束骨束骨本節之後陷者中也為腧過於京骨京骨足外側大骨之下為原行於崑崙崑崙在外踝之後跟骨之上為經入於委中委中膕中央為合委而取之足太陽也膽出於竅隂竅隂者足小指次指之端也為井金溜於俠谿俠谿足小指次指之間也為滎注於臨泣臨泣上行一寸半陷者中也為腧過於丘墟丘墟外踝之前下陷者中也為原行於陽輔陽輔外踝之上輔骨之前及絶骨之端也為經入於陽之陵泉陽之陵泉在膝外陷者中也為合伸而得之足少陽也胃出於厲兌厲兌者足大指内次指之端也為井金溜於内庭内庭次指外間也為滎注於陷谷陷谷者上中指内間上行二寸陷者中也為腧過於衝陽衝陽足跗上五寸陷者中也為原摇足而得之行於解谿解谿上衝陽一寸半陷者中也為經入於下陵下陵膝下三寸胻骨外三里也為合復下三里三寸為巨虚上亷復下上亷三寸為巨虚下亷也大腸屬上小腸屬下足陽明胃脈也大腸小腸皆屬於胃是足陽明也三焦者上合手少陽出于闗衝闗衝者手小指次指之端也為井金溜於液門液門小指次指之間也為滎注於中渚中渚本節之後陷中者也為腧過於陽池陽池在腕上陷者之中也為原行於支溝支溝上腕三寸兩骨之間陷者中也為經入於天井天井在肘外大骨之上陷者中也為合屈肘乃得之三焦下腧在於足大指之前少陽之後出於膕中外亷名曰委陽是太陽絡也手少陽經也三焦者足少陽太隂一本作陽之所將太陽之别也上踝五寸别入貫腨腸出於委陽並太陽之正入絡膀胱約下焦實則閉癃虚則遺溺遺溺則補之閉癃則冩之手太陽小腸者上合於太陽出於少澤少澤小指之端也為井金溜於前谷前谷在手外亷本節前陷者中也為滎注於後谿後谿者在手外側本節之後也為腧過於腕骨腕骨在手外側腕骨之前為原行於陽谷陽谷在鋭骨之下陷者中也為經入於小海小海在肘内大骨之外去端半寸陷者中也伸臂而得之為合手太陽經也大腸上合手陽明出於商陽商陽大指次指之端也為井金溜於本節之前二間為滎注於本節之後三間為腧過於合谷合谷在大指岐骨之間為原行於陽谿陽谿在兩筋間陷者中也為經入於曲池在肘外輔骨陷者中屈臂而得之為合手陽明也是謂五藏六府之腧五五二十五腧六六三十六腧也六府皆出足之三陽上合於手者也缺盆之中任脈也名曰天突一次任脈側之動脈足陽明也名曰人迎二次脈手陽明也名曰扶突三次脈手太陽也名曰天窗四次脈足少陽也名曰天容五次脈手少陽也名曰天牖六次脈足太陽也名曰天柱七次脈頸中央之脈督脈也名曰風府腋内動脈手太隂也名曰天府腋下三寸手心主也名曰天池刺上闗者呿不能欠刺下闗者欠不能呿刺犢鼻者屈不能伸刺兩闗者伸不能屈足陽明挾喉之動脈也其腧在膺中手陽明次在其腧外不至曲頰一寸手太陽當曲頰足少陽在耳下曲頰之後手少陽出耳後上加完骨之上足太陽挾項大筋之中髪際隂尺動脈在五里五腧之禁也肺合大腸大腸者傳道之府心合小腸小腸者受盛之府肝合膽膽者中精之府脾合胃胃者五榖之府腎合膀胱膀胱者津液之府也少陽屬腎腎上連肺故將兩藏三焦者中瀆之府也水道出焉屬膀胱是孤之府也是六府之所與合者春取絡脈諸滎大經分肉之間甚者深取之間者淺取之夏取諸腧孫絡肌肉皮膚之上秋取諸合餘如春法冬取諸井諸腧之分欲深而留之此四時之序氣之所處病之所舎藏之所宜轉筋者立而取之可令遂已痿厥者張而刺之可令立快也濶數下色角切足跗下音夫呿祛遮切腨時兖切小針解第三法人所謂易陳者易言也難入者難著於人也粗守形者守刺法也上守神者守人之血氣有餘不足可補寫也神客者正邪共㑹也神者正氣也客者邪氣也在門者邪循正氣之所出入也未覩其疾者先知邪正何經之疾也惡知其原者先知何經之病所取之處也刺之微者數遲者徐疾之意也粗守闗者守四肢而不知血氣正邪之徃來也上守機者知守氣也機之動不離其空中者知氣之虚實用針之徐疾也空中之機清浄以微者針以得氣蜜意守氣勿失也其來不可逢者氣盛不可補也其往不可追者氣虚不可寫也不可掛以髮者言氣易失也扣之不發者言不知補寫之意也血氣已盡而氣不下也知其徃來者知氣之逆順盛虛也要與之期者知氣之可取之時也粗之闇者冥冥不知氣之微宻也妙哉工獨有之者盡知針意也徃者為逆者言氣之虛而小小者逆也來者為順者言形氣之平平者順也明知逆順正行無問者言知所取之處也迎而奪之者寫也追而濟之者補也所謂虚則實之者氣口虚而當補之也滿則泄之者氣口盛而當寫之也宛陳則除之者去血脈也邪勝則虚之者言諸經有盛者皆寫其邪也徐而疾則實者言徐内而疾出也疾而徐則虚者言疾内而徐出也言實與虛若有若無者言實者有氣虛者無氣也察後與先若亡若存者言氣之虚實補寫之先後也察其氣之已下與常存也為虚與實若得若失者言補者佖然若有得也寫則怳然若有失也夫氣之在脈也邪氣在上者言邪氣之中人也髙故邪氣在上也濁氣在中者言水榖皆入於胃其精氣上注於肺濁溜於腸胃言寒温不適飲食不節而病生於腸胃故命曰濁氣在中也清氣在下者言清濕地氣之中人也必從足始故曰清氣在下也針陷脈則邪氣出者取之上針中脈則邪氣出者取之陽明合也針大深則邪氣反沈者言淺浮之病不欲深刺也深則邪氣從之入故曰反沈也皮肉筋脈各有所處者言經絡各有所主也取五脈者死言病在中氣不足但用針盡大寫其諸隂之脈也取三陽之脈者唯言盡寫三陽之氣令病人恇然不復也奪隂者死言取尺之五里五徃者也奪陽者狂正言也覩其色察其目知其散復一其形聽其動静者言上工知相五色於目有知調尺寸小大緩急滑濇以言所病也知其邪正者知論虚邪與正邪之風也右主推之左持而御之者言持針而出入也氣至而去之者言補寫氣調而去之也調氣在於終始一者持心也節之交三百六十五㑹者絡脈之滲灌諸節者也所謂五蔵之氣已絶於内者脈口氣内絶不至反取其外之病處與陽經之合有留針以致陽氣陽氣至則内重竭重竭則死矣其死也無氣以動故靜所謂五蔵之氣已絶于外者脈口氣外絶不至反取其四末之輸有留針以致其隂氣隂氣至則陽氣反入入則逆逆則死矣其死也隂氣有餘故躁所以察其目者五藏使五色循明循明則聲章聲章者則言聲與平生異也佖然上皮筆切又音必滿貌怳然上吁往切狂貌深内下音納邪氣藏府病形第四法時黄帝問於岐伯曰邪氣之中人也奈何岐伯答曰邪氣之中人髙也黄帝曰髙下有度乎岐伯曰身半已上者邪中之也身半以下者濕中之也故曰邪之中人也無有常中於隂則溜於府中於陽則溜於經黄帝曰隂之與陽也異名同類上下相㑹經絡之相貫如環無端邪之中人或中於隂或中於陽上下左右無有恒常其故何也岐伯曰諸陽之㑹皆在於面中人也方乘虚時及新用力若飲食汗出腠理開而中於邪中於面則下陽明中於項則下太陽中於頰則下少陽其中於膺背兩脇亦中其經黄帝曰其中於隂奈何岐伯答曰中於隂者常從臂胻始夫臂與胻其隂皮薄其肉淖澤故俱受於風獨傷其隂黄帝曰此故傷其藏乎岐伯答曰身之中於風也不必動藏故邪入於隂經則其藏氣實邪氣入而不能客故還之於府故中陽故溜於經中隂則溜於府黄帝曰邪之中人藏奈何岐伯曰愁憂恐懼則傷心形寒寒飲則傷肺以其兩寒相感中外皆傷故氣道而上行有所墮墜惡血留内若有所大怒氣上而不下積於脇下則傷肝有所擊仆若醉入房汗出當風則傷脾有所用力舉重若入房過度汗出浴水則傷腎黄帝曰五藏之中風奈何岐伯曰隂陽俱感邪乃得徃黄帝曰善哉黄帝問於岐伯曰首面與身形也屬骨連筋同血合於氣耳天寒則裂地凌氷其卒寒或手足懈惰然而其面不衣何也歧伯答曰十二經脈三百六十五絡其血氣皆上于面而走空竅其精陽氣上走於目而為睛其别氣走於耳而為聽其宗氣上出於鼻而為臭其濁氣出於胃走唇舌而為味其氣之津液皆上煄于面而皮又厚其肉堅故天熱甚寒不能勝之也黄帝曰邪之中人其病形何如歧伯曰虚邪之中身也洒浙動形正邪之中人也微先見于色不知于身若有若無若亡若存有形無形莫知其情黄帝曰善哉黄帝問於歧伯曰余聞之見其色知其病命曰明按其脈知其病命曰神問其病知其處命曰工余願聞見而知之按而得之問而極之為之奈何歧伯答曰夫色脈與尺之相應也如桴鼓影響之相應也不得相失也此亦本末根葉之出候也故根死則葉枯矣色脈形肉不得相失也故知一則為工知二則為神知三則神且明矣黄帝曰願卒聞之岐伯答曰色青者其脈絃也赤者其脈鉤也黄者其脈代也白者其脈毛黒者其脈石見其色而不得其脈反得其相勝之脈則死矣得其相生之脈則病已矣黄帝問於歧伯曰五藏之所生變化之病形何如歧伯答曰先定其五色五脈之應其病乃可别也黄帝曰色脈已定别之奈何歧伯曰調其脈之緩急小大滑濇而病變定矣黄帝曰調之奈何歧伯答曰脈急者尺之皮膚亦急脈緩者尺之皮膚亦緩脈小者尺之皮膚亦減而少氣脈大者尺之皮膚亦賁而起脈滑者尺之皮膚亦滑脈濇者尺之皮膚亦濇凡此變者有微有甚故善調尺者不待於寸善調脈者不待於色能參合而行之者可以為上工上工十全九行二者為中工中工十全七行一者為下工下工十全六黄帝曰請問脈之緩急小大滑濇之病形何如歧伯曰臣請言五藏之病變也心脈急甚者為瘈瘲微急為心痛引背食不下緩甚為狂笑微緩為伏梁在心下上下行時唾血大甚為喉吤微大為心痺引背善淚出小甚為善噦㣲小為消癉滑甚為善渴微滑為心疝引臍小腹鳴濇甚為瘖微濇為血溢維厥耳鳴顛疾肺脈急甚為癲疾微急為肺寒熱怠惰欬唾血引腰背胸若鼻息肉不通緩甚為多汗微緩為痿瘻偏風頭以下汗出不可止大甚為脛腫微大為肺痺引胸背起惡日光小甚為泄微小為消癉滑甚為息賁上氣㣲滑為上下出血濇甚為嘔血㣲濇為鼠瘻在頸支腋之間下不勝其上其應善痠矣肝脈急甚者為惡言微急為肥氣在脇下若覆杯緩甚為善嘔微緩為水瘕痺也大甚為内癕善嘔衂微大為肝痺隂縮欬引小腹小甚為多飲微小為消癉滑甚為㿉疝微滑為遺溺濇甚為溢飲微濇為瘈攣筋痺脾脈急甚為瘈瘲微急為膈中食飲入而還出後沃沫緩甚為痿厥微緩為風痿四肢不用心慧然若無病大甚為擊仆微大為疝氣腹裏大膿血在腸胃之外小甚為寒熱微小為消癉滑甚為㿉癃微滑為蟲毒蛕蝎腹熱濇甚為腸㿉微濇為内㿉多下膿血腎脈急甚為骨癲疾微急為沈厥奔豚足不收不得前後緩甚為折脊微緩為洞洞者食不化下嗌還出大甚為隂痿微大為石水起臍已下至小腹腄腄然上至胃腕死不治小甚為洞泄微小為消癉滑甚為癃㿉微滑為骨痿坐不能起起則自無所見濇甚為大癰微濇為不月沈痔黄帝曰病之六變者刺之奈何岐伯答曰諸急者多寒緩者多熱大者多氣少血小者血氣皆少滑者陽氣盛微有熱濇者多血少氣微有寒是故刺急者深内而久留之刺緩者淺内而疾發針以去其熱刺大者微寫其氣無出其血刺滑者疾發針而淺内之以寫其陽氣而去其熱刺濇者必中其脈隨其逆順而久留之必先按而循之已發針疾按其痏無令其血出以和其脈諸小者隂陽形氣俱不足勿取以針而調以甘藥也黄帝曰余聞五藏六府之氣滎輸所入為合令何道從入入安連過願聞其故岐伯答曰此陽脈之别入于内屬於府者也黄帝曰滎輸與合各有名乎岐伯答曰滎輸治外經合治内府黄帝曰治内府奈何岐伯曰取之於合黄帝曰合各有名乎岐伯答曰胃合於三里大腸合入于巨虚上亷小腸合入于巨虛下亷三焦合入於委陽膀胱合入于委中央膽合入于陽陵泉黄帝曰取之奈何歧伯答曰取之三里者低跗取之巨虛者舉足取之委陽者屈伸而索之委中者屈而取之陽陵泉者正竪予之齊下至委陽之陽取之取諸外經者揄申而從之黄帝曰願聞六府之病歧伯答曰面熱者足陽明病魚絡血者手陽明病兩跗之上脈竪陷者足陽明病此胃脈也大腸病者腸中切痛而鳴濯濯冬日重感于寒即泄當臍而痛不能乆立與胃同候取巨虚上亷胃病者腹䐜脹胃脘當心而痛上肢兩脇膈咽不通食飲不下取之三里也小腸病者小腹痛腰脊控睪而痛時窘之後當耳前熱若寒甚若獨肩上熱甚及手小指次指之間熱若脈陷者此其候也手太陽病也取之巨虚下亷三焦病者腹氣滿小腹尤堅不得小便窘急溢則水留即為脹候在足太陽之外大絡大絡在太陽少陽之間亦見于脈取委陽膀胱病者小腹偏腫而痛以手按之即欲小便而不得肩上熱若脈陷及足小指外亷及脛踝後皆熱若脈陷取委中央膽病者善太息口苦嘔宿汁心下澹澹恐人将捕之嗌中吤吤然數唾在足少陽之本末亦視其脈之陷下者炙之其寒熱者取陽陵泉黄帝曰刺之有道乎歧伯答曰刺此者必中氣穴無中肉節中氣穴則針染一作逰于巷中肉節即皮膚痛補寫反則病益篤中筋則筋緩邪氣不出與其真相搏亂而不去反還内著用針不審以順為逆也中于膺背一作肩背亦中其經一本作下其經胻戸當切淖澤上奴教切下皆同甲乙經上音濁下音夜謹詳淖濁也澤夜也入而不客一本作容瘈瘲上給下縱吤音戒噦乙劣切息賁下音奔痠音酸瘕音賈㿉徒回切仆音付蛕蝎上胡恢切腹中長蟲下胡葛切蠧蟲也腄竹垂切痏榮美切榆舂朱切睪音髙隂丸也維厥詳此經絡有陽維隂維故有維厥靈樞經巻一欽定四庫全書靈樞經卷
