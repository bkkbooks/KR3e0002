body:
  text: 靈樞經巻九宋史崧音釋水脹第五十七黄帝問于岐伯曰水與膚脹鼓脹腸覃石瘕石水何以别之岐伯答曰水始起也目窠上微腫如新臥起之狀其頸脉動時欬隂股間寒足脛腫腹乃大其水已成矣以手按其腹隨手而起如裹水之狀此其候也黄帝曰膚脹何以候之岐伯曰膚脹者寒氣客于皮膚之間􅠻􅠻然不堅腹大身盡腫皮厚按其腹窅而不起腹色不變此其候也鼓脹何如岐伯曰鼔脹身皆大大與膚脹等也色蒼黄腹筋起此其候也腸覃何如岐伯曰寒氣客于腸外與衛氣相搏氣不得榮因有所繫癖而内著惡氣乃起瘜肉乃生其始生也大如雞卵稍以益大至其成如懷子之狀久者離歲按之則堅推之則移月事以時下此其候也石瘕何如岐伯曰石瘕生于胞中寒氣客于子門子門閉塞氣不得通惡血當寫不寫衃以留止日以益大狀如懷子月事不以時下皆生于女子可導而下黄帝曰膚脹鼓脹可刺邪岐伯曰先寫其脹之血絡後調其經刺去其血絡也賊風第五十八黄帝曰夫子言賊風邪氣之傷人也令人病焉今有其不離屏蔽不出室穴之中卒然病者非不離賊風邪氣其故何也岐伯曰此皆嘗有所傷于濕氣藏于血脈之中分肉之間久留而不去若有所墮墜惡血在内而不去卒然喜怒不節飲食不適寒温不時腠理閉而不通其開而遇風寒則血氣凝結與故邪相襲則為寒痺其有熱則汗出汗出則受風雖不遇賊風邪氣必有因加而發焉黄帝曰今夫子之所言者皆病人之所自知也其毋所遇邪氣又毋怵惕之所志卒然而病者其故何也唯有因鬼神之事乎岐伯曰此亦有故邪留而未發因而志有所惡及有所慕血氣内亂兩氣相搏其所從來者微視之不見聽而不聞故似鬼神黄帝曰其祝而已者其故何也岐伯曰先巫者因知百病之勝先知其病之所從生者可祝而已也衛氣失常第五十九黄帝曰衛氣之留于腹中搐積不行􅁐藴不得常所使人肢脇胃中滿喘呼逆息者何以去之伯高曰其氣積于胷中者上取之積于腹中者下取之上下皆滿者傍取之黄帝曰取之奈何伯高對曰積于上寫人迎天突喉中積于下者寫三里與氣街上下皆滿者上下取之與季脇之下一寸一本云季脇之下深一寸重者雞足取之診視其脈大而弦急及絶不至者及腹皮急甚者不可刺也黄帝曰善黄帝問于伯高曰何以知皮内氣血筋骨之病也伯高曰色起兩眉薄澤者病在皮唇色青黄赤白黒者病在肌内營氣濡然者病在血氣目色青黄赤白黒者病在筋耳焦枯受塵垢病在骨黄帝曰病形何如取之奈何伯高曰夫百病變化不可勝數然皮有部内有桂血氣有輸骨有屬黄帝曰願聞其故伯高曰皮之部輸于四末内之柱在臂脛諸陽分内之間與足少隂分間血氣之輸輸于諸絡氣血留居則盛而起筋部無隂無陽無左無右候病所在骨之屬者骨空之所以受益而益腦髓者也黄帝曰取之奈何伯高曰夫病變化浮沈深淺不可勝窮各在其處病間者淺之甚者深之間者小之甚者衆之隨變而調氣故曰上工黄帝問于伯高曰人之肥瘦大小寒温有老壯少小别之奈何伯高對曰人年五十已上為老二十已上為壯十八以上為少六歲已上為小黄帝曰何以度之其肥瘦伯高曰人有肥有膏有内黄帝曰别之奈何伯高曰膕内堅一本云䐃内皮滿者肥膕内不堅皮緩者膏皮内不相離者内黄帝曰身之寒温何如伯高曰膏者其内淖而粗理者身寒細理者身熱脂者其内堅細理者熱粗理者寒黄帝曰其肥瘦大小奈何伯高曰膏者多氣而皮縱緩故能縱腹垂腴内者身體容大脂者其身收小黄帝曰三者之氣血多少何如伯高曰膏者多氣多氣者熱熱者耐寒内者多血則充形充形則平脂者其血漬氣滑少故不能大此别于衆人者也黄帝曰衆人奈何伯高曰衆人皮内脂膏不能相加也血與氣不能相多故其形不小不大各自稱其身命曰衆人黄帝曰善治之奈何伯高曰必先别其三形血之多少氣之清濁而後調之治無失常經是故膏人縱腹垂腴内人者上下容大脂人者雖脂不能大者玉版第六十黄帝曰余以小針為細物也夫子乃言上合之于天下合之于地中合之于人余以為過針之意矣願聞其故岐伯曰何物大於天乎夫大于針者惟五兵者焉五兵者死之備也非生之具且夫人者天地之鎭也其不可不參乎夫治民者亦唯針焉夫針之與五兵其孰小乎黄帝曰病之生時有喜怒不測飲食不節隂氣不足陽氣有餘營氣不行乃發為癰疽隂陽不通兩熱相搏乃化為膿小針能取之乎岐伯曰聖人不能使化者為之邪不可留也故兩軍相當旗幟相望白刃陳于中野者此非一日之謀也能使其民令行禁止士卒無白刃之難者非一日之教也須㬰之得也夫至使身佊癰疽之病膿血之聚者不亦離道逺乎夫癰疽之生膿血之成也不從天下不從地出積微之所生也故聖人自治於未有形也愚者遭其已成也黄帝曰其已形不予遭膿已成不予見為之奈何岐伯曰膿已成十死一生故聖人弗使已成而明為良方著之竹帛使能者踵而傳之後世無有終時者為其不予遭也黄帝曰其已有膿血而後遭乎不𨗳之以小針治乎岐伯曰以小治小者其功小以大治大者多害故其已成膿血者其唯砭石鈹鋒之所取也黄帝曰多害者其不可全乎岐伯曰其在逆順焉黄帝曰願聞逆順岐伯曰以為傷者其白眼青黒眼小是一逆也内藥而嘔者是二逆也腹痛渇甚是三逆也肩項中不便是四逆也音嘶色脱是五逆也除此五者為順矣黄帝曰諸病皆有逆順可得聞乎岐伯曰腹脹身熱脈大是一逆也腹鳴而滿四肢清泄其脈大是二逆也衂而不止脈大是三逆也咳且溲血脱形其脈小勁是四逆也欬脱形身熱脈小以疾是謂五逆也如是者不過十五日而死矣其腹大脹四末清脫形泄甚是一逆也腹脹便血其脈大時絶是二逆也欬溲血形内脫脈搏是三逆也嘔血胷滿引背脈小而疾是四逆也欬嘔腹脹且飱泄其脈絶是五逆也如是者不及一時而死矣工不察此者而刺之是謂逆治黄帝曰夫子之言針甚駿以配天地上數天文下度地紀内别五藏外次六府經脈二十八㑹盡有周紀能殺生人不能起死者子能反之乎岐伯曰能殺生人不能起死者也黄帝曰余聞之則為不仁然願聞其道弗行于人岐伯曰是明道也其必然也其如刀劒之可以殺人如飲酒使人醉也雖勿診猶可知矣黄帝曰願卒聞之岐伯曰人之所受氣者穀也穀之所注者胃也胃者水穀氣血之海也海之所行雲氣者天下也胃之所出氣血者經隧也經隧者五藏六府之大絡也迎而奪之而已矣黄帝曰上下有數乎岐伯曰迎之五里中道而止五至而已五徃而藏之氣盡矣故五五二十五而竭其輸矣此所謂奪其天氣者也非能絶其命而傾其壽者也黄帝曰願卒聞之岐伯曰闚門而刺之者死于家中入門而刺之者死于堂上黄帝曰善乎方明哉道請著之玊版以為重寶傳之後世以為刺禁令民勿敢犯也五禁第六十一黄帝問于岐伯曰余聞刺有五禁何謂五禁岐伯曰禁其不可刺也黄帝曰余聞刺有五奪岐伯曰无寫其不可奪者也黄帝曰余聞刺有五過岐伯曰補寫無過其度黄帝曰余聞刺有五逆岐伯曰病與脈相逆命曰五逆黄帝曰余聞刺有九宜岐伯曰明知九針之論是謂九宜黄帝曰何謂五禁願聞其不可刺之時岐伯曰甲乙日自乗无刺頭无發矇于耳内丙丁日自乗無振埃于負喉亷泉戊巳日自乘四季旡刺腹去爪寫水庚辛日自乘無刺闗節于股脥壬癸日自乘無刺足脛是謂五禁黄帝曰何謂五奪岐伯曰形肉已奪是一奪也大奪血之後是二奪也大汗出之後是三奪也大泄之後是四奪也新産及大血之後是五奪也此皆不可寫黄帝曰何謂五逆岐伯曰熱病脈静汗已出脈盛躁是一逆也病泄脈洪大是二逆也著痺不移䐃肉破身熱脈偏絶是三逆也淫而奪形身熱色夭然白及後下血衃血衃篤重是謂四逆也寒熱奪形脈堅搏是謂五逆也動輸第六十二黄帝曰經脈十二而手太隂足少隂陽明獨動不休何也岐伯曰是明胃脈也胃為五藏六府之海其清氣上注于肺肺氣從太隂而行之其行也以息徃來故人一呼脈再動一吸脈亦再動呼吸不已故動而不止黄帝曰氣之過于寸口也上十焉息下八焉伏何道從還不知其極岐伯曰氣之離藏也卒然如弓弩之發如水之下岸上于魚以反衰其餘氣衰散以逆上故其行微黄帝曰足之陽明何因而動岐伯曰胃氣上注于肺其悍氣上衝頭者循咽上走空竅循眼系入絡腦出顑下客主人循牙車合陽明并下人迎此胃氣别走于陽明者也故隂陽上下其動也若一故陽病而陽脈小者為逆隂病而隂脈大者為逆故隂陽俱動俱静若引繩相傾者病黄帝曰足少隂何因而動岐伯曰衝脈者十二經之海也與少隂之大絡起于腎下出于氣街循隂股内廉邪入膕中循脛骨内廉並少隂之經下入内踝之後入足下其别者邪入踝出屬跗上入大指之間注諸絡以温足脛此脈之常動者也黄帝曰營衛之行也上下相貫如環之無端今有其卒然遇邪氣及逢大寒手足懈惰其脈隂陽之道相輸之㑹行相失也氣何由還岐伯曰夫四末隂陽之㑹者此氣之大絡也四街者氣之徑路也故絡絶則徑通四末解則氣從合相輸如環黄帝曰善此所謂如環無端莫知其紀終而復始此之謂也五味論第六十三黄帝問于少俞曰五味入于口也各有所走各有所病酸走筋多食之令人癃鹹走血多食之令人渇辛走氣多食之令人洞心苦走骨多食之令人變嘔甘走肉多食之令人悗心余知其然也不知其何由願聞其故少俞答曰酸入于胃其氣澁以收上之兩焦不能出入也不出即留于胃中胃中和温則下注膀胱膀胱之胞薄以懦得酸則縮綣約而不通水道不行故癃隂者積筋之所終也故酸入而走筋矣黄帝曰鹹走血多食之令人渇何也少俞曰鹹入于胃其氣上走中焦注于脈則血氣走之血與寒相得則凝凝則胃中沐注之注之則胃中竭竭則咽路焦故舌本乾而善渇血脈者中焦之道也故鹹入而走血矣黄帝曰辛走氣多食之令人洞心何也少俞曰辛入于胃其氣走于上焦上焦者受氣而營諸陽者也姜韭之氣薰之營衛之氣不時受之久留心下故洞心辛與氣俱行故辛入而與汗俱出黄帝曰苦走骨多食之令人變嘔何也少俞曰苦入于胃五穀之氣皆不能勝苦苦入下脘三焦之道皆閉而不通故變嘔齒者骨之所終也故苦入而走骨故入而復出知其走骨也黄帝曰甘走肉多食之令人悗心何也少俞曰甘入于胃其氣弱小不能上至于上焦而與穀留于胃中者令人柔潤者也胃柔則緩緩則蟲動蟲動則令人悗心其氣外通于肉故甘走肉隂陽二十五人第六十四黄帝曰余聞隂陽之人何如伯高曰天地之間六合之内不離于五人亦應之故五五二十五人之政而隂陽之人不與焉其態又不合于衆者五余已知之矣願聞二十五人之形血氣之所生别而以候從外知内何如岐伯曰悉乎哉問也此先師之秘也雖伯高猶不能明之也黄帝避席遵循而却曰余聞之得其人弗教是謂重失得而洩之天將厭之余願得而明之金櫃藏之不敢揚之岐伯曰先立五形金木水火土别其五色異其五形之人而二十五人具矣黄帝曰願卒聞之岐伯曰慎之慎之臣請言之木形之人比於上角似於蒼帝其為人蒼色小頭長面大肩背直身小手足好有才勞心少力多憂勞于事能春夏不能秋冬感而病生足厥隂佗佗然大角之人比於左足少陽少陽之上遺遺然左角之人比於右足少陽少陽之下隨隨然一曰少角釱角之人比於右足少陽少陽之上推推然一曰右角判角之人比於左足少陽少陽之下括括然火形之人比於上徵似於赤帝其為人赤色廣䏖脫面小頭好肩背髀腹小手足行安地疾心行摇肩背肉滿有氣輕財少信多慮見事明好顔急心不壽暴死能春夏不能秋冬秋冬感而病生手少隂核核然質徵之人比於左手太陽太陽之上肌肌然一曰質之人一曰大徵少徵之人比於左手太陽太陽之下慆慆然右徵之人比於右手太陽太陽之上鮫鮫然一曰熊熊然質判之人比於左手太陽太陽之下支支頥頥然一曰質徵土形之人比於上宫似於上古黄帝其為人黄色圓面大頭美肩背大腹美股脛小手足多肉上下相稱行安地舉足浮安心好利人不喜權勢善附人也能秋冬不能春夏春夏感而病生足太隂敦敦然大宫之人比於左足陽明陽明之上婉婉然加宫之人比於左足陽明陽明之下坎坎然一曰衆之人少宫之人比於右足陽明陽明之上樞樞然左宫之人比於右足陽明陽明之下兀兀然一曰衆之人一曰陽明之上金形之人比於上商似於白帝其為人方面白色小頭小肩背小腹小手足如骨發踵外骨輕身清亷急心静悍善為吏能秋冬不能春夏春夏感而病生手太隂敦敦然釱商之人比於左手陽明陽明之上廉廉然左商之人比于左手陽明陽明之下脫脫然右商之人比於右手陽明陽明之上監監然小商之人比於右手陽明陽明之下嚴嚴然水形之人比於上羽似於黑帝其為人黒色面不平大頭廉頤小肩大腹動手足發行摇身下尻長背延延然不敬畏善欺給人戮死能秋冬不能春夏春夏感而病生足少隂汙汙然大羽之人比於右足太陽太陽之上頰頰然小羽之人比於左足大陽大陽之下紆紆然衆之為人比于右足太陽太陽之下潔潔然一曰加之人桎之為人比於左足大陽大陽之上安安然是故五形之人二十五變者衆之所以相欺者是也黄帝曰得其形不得其色何如岐伯曰形勝色色勝形者至其勝時年加感則病行失則憂矣形色相得者富貴大樂黄帝曰其形色相勝之時年加可知乎岐伯曰凡年忌下上之人大忌常加七歲十六歳二十五歲三十四歳四十三歳五十二歳六十一歲皆人之大忌不可不自安也感則病行失則憂矣當此之時無為姦事是謂年忌黄帝曰夫子之言脈之上下血氣之候以知形氣奈何岐伯曰足陽明之上血氣盛則髯美長血少氣多則髯短故氣少血多則髯少血氣皆少則無髯兩吻多畫足陽明之下血氣盛則下毛美長至胷血多氣少則下毛美短至臍行則善高舉足足指少肉足善寒血少氣多則肉而善􅏿血氣皆少則無毛有則稀枯悴善痿厥足痺足少陽之上氣血盛則通髯美長血多氣少則通髯美短血少氣多則少髯血氣皆少則無􅂡感於寒濕則善痺骨痛爪枯也足少陽之下血氣盛則脛毛美長外踝肥血多氣少則輕毛美短外踝皮堅而厚血少氣多則胻毛少外踝皮薄而軟血氣皆少則無毛外踝瘦無肉足太陽之上血氣盛則美眉眉有毫毛血多氣少則惡眉面多少理血少氣多則面多肉血氣和則美色足太隂之下血氣盛則跟肉滿踵堅氣少血多則瘦跟空血氣皆少則喜轉筋踵下痛手陽明之上血氣盛則髭美血少氣多則髭惡血氣皆少則無髭手陽明之下血氣盛則腋下毛美手魚肉以温血氣皆少則手瘦以寒手少陽之上血氣盛則眉美以長耳色美血氣皆少則耳焦惡色手少陽之下血氣盛則手捲多肉以温血氣皆少則寒以瘦氣少血多則瘦以多脈手太陽之上血氣盛則有多鬚面多肉以平血氣皆少則面瘦惡色手太陽之下血氣盛則掌肉充滿血氣皆少則掌瘦以寒黄帝曰二十五人者刺之有約乎岐伯曰美眉者足太陽之脈氣血多惡眉者血氣少其肥而澤者血氣有餘肥而不澤者氣有餘血不足瘦而无澤者氣血俱不足審察其形氣有餘不足而調之可以知逆順矣黄帝曰刺其諸隂陽奈何岐伯曰按其寸口人迎以調隂陽切循其經絡之凝濇結而不通者此於身皆為痛痺甚則不行故凝濇凝濇者致氣以温之血和乃止其結絡者脈結濇不和決之乃行故曰氣有餘于上者導而下之氣不足於上者推而休之其稽留不至者因而迎之必明於經隧乃能待之寒與熱争者導而行之其宛陳血不結者則而予之必先明知二十五人則血氣之所在左右上下刺約畢也釱大慆他刀切鮫交胻杭􅏿只玉切靈樞經卷九
