  hash: sha256:084b42f6e95e4e6545e236975ade8e205383fefe1021c9d793f758c21f9377dc
body:
  text: 宋史崧音釋根結第五法音岐伯曰天地相感寒暖相移隂陽之道孰少孰多隂道偶陽道竒發於春夏隂氣少陽氣多隂陽不調何補何寫發於秋冬陽氣少隂氣多隂氣盛而陽氣衰故莖葉枯槁濕雨下歸隂陽相移何寫何補竒邪離經不可勝數不知根結五藏六府折闗敗樞開闔而走隂陽大失不可復取九針之𤣥要在終始故能知終始一言而畢不知終始針道咸絶太陽根于至隂結于命門命門者目也陽明根于厲兊結于顙大顙大者鉗耳也少陽根于竅隂結于窗籠窗籠者耳中也太陽為開陽明為闔少陽為樞故開折則肉節瀆而暴病起矣故暴病者取之太陽視有餘不足瀆者皮肉宛膲而弱也闔折則氣無所止息而痿疾起矣故痿疾者取之陽明視有餘不足無所止息者真氣稽留邪氣居之也樞折即骨繇而不安於地故骨繇者取之少陽視有餘不足骨繇者節緩而不收也所謂骨繇者摇故也當窮其本也太隂根于隱白結于大倉少隂根于湧泉結于亷泉厥隂根于大敦結于玉英絡于膻中太隂為開厥隂為闔少隂為樞故開折則倉廩無所輸膈洞膈洞者取之太隂視有餘不足故開折者氣不足而生病也闔折即氣絶而喜悲悲者取之厥隂視有餘不足樞折則脈有所結而不通不通者取之少隂視有餘不足有結者皆取之不足足太陽根于至隂溜于京骨注于崑崙入于天柱飛揚也足少陽根于竅隂溜于丘墟注于陽輔入于天容光明也足陽明根于厲兌溜于衝陽注于下陵入于人迎豐隆也手太陽根于少澤溜于陽谷注于少海入于天䆫支正也手少陽根于闗衝溜于陽池注于支溝入于天牖外闗也手陽明根于商陽溜于合谷注于陽谿入于扶究偏歴也此所謂十二經者盛絡皆當取之一日一夜五十營以營五藏之精不應數者名曰狂生所謂五十營者五藏皆受氣持其脈口數其至也五十動而不一代者五藏皆受氣四十動一代者一藏無氣三十動一代者二藏無氣二十動一代者三藏無氣十動一代者四藏無氣不滿十動一代者五藏無氣子之短期要在終始所謂五十動而不一代者以為常也以知五藏之期子之短期者乍數乍踈也黄帝曰逆順五體者言人骨節之小大肉之堅脆皮之厚薄血之清濁氣之滑濇脈之長短血之多少經絡之數余已知之矣此皆布衣匹夫之士也夫王公大人血食之君身體柔脆肌肉軟弱血氣慓悍滑利其刺之徐疾淺深多少可得同之乎歧伯答曰膏粱菽藿之味何可同也氣滑即出疾其氣濇則出遲氣悍則針小而入淺氣濇則針大而入深深則欲留淺則欲疾以此觀之刺布衣者深以留之刺大人者微以徐之此皆因氣慓悍滑利也黄帝曰形氣之逆順奈何歧伯曰形氣不足病氣有餘是邪勝也急寫之形氣有餘病氣不足急補之形氣不足病氣不足此隂陽氣俱不足也不可刺之刺之則重不足重不足則隂陽俱竭血氣皆盡五藏空虛筋骨髓枯老者絶滅壯者不復矣形氣有餘病氣有餘此謂隂陽俱有餘也急寫其邪調其虚實故曰有餘者寫之不足者補之此之謂也故曰刺不知逆順真邪相搏滿而補之則隂陽四溢腸胃充郭肝肺内䐜隂陽相錯虛而寫之則經脈空虚血氣竭枯腸胃㒤辟皮膚薄著毛腠夭膲子之死期故曰用針之要在于知調隂與陽調隂與陽精氣乃光合形與氣使神内藏故曰上工平氣中工亂脈下工絶氣危生故曰平工不可不慎也必審五藏變化之病五脈之應經絡之實虛皮之柔麤而後取之也骨繇音摇慓悍上比昭切下侯岸切勇健貌也陽道竒音箕夀夭剛柔第六法律黄帝問於少師曰余聞人之生也有剛有柔有弱有强有短有長有隂有陽願聞其方少師答曰隂中有隂陽中有陽審知隂陽刺之有方得病所始刺之有理謹度病端與時相應内合於五藏六府外合於筋骨皮膚是故内有隂陽外亦有隂陽在内者五藏為隂六府為陽在外者筋骨為隂皮膚為陽故曰病在隂之隂者刺隂之滎輸病在陽之陽者刺陽之合病在陽之隂者刺隂之經病在隂之陽者刺絡脈故曰病在陽者命曰風病在隂者命曰痺隂陽俱病命曰風痺病有形而不痛者陽之類也無形而痛者隂之類也無形而痛者其陽完而隂傷之也急治其隂無攻其陽有形而不痛者其隂完而陽傷之也急治其陽無攻其隂隂陽俱動乍有形乍無形加以煩心命曰隂勝其陽此謂不表不裏其形不乆黄帝問於伯髙曰余聞形氣病之先後外内之應柰何伯髙答曰風寒傷形憂恐忿怒傷氣氣傷藏乃病藏寒傷形乃應形風傷筋脈筋脈乃應此形氣外内之相應也黄帝曰刺之奈何伯髙答曰病九日者三刺而已病一月者十刺而已多少逺近以此衰之乆痺不去身者視其血絡盡出其血黄帝曰外内之病難易之治奈何伯髙答曰形先病而未入藏者刺之半其日藏先病而形乃應者刺之倍其日此月内難易之應也黄帝問於伯髙曰余聞形有緩急氣有盛衰骨有大小肉有堅脆皮有厚薄其以立夀夭奈何伯髙答曰形與氣相任則夀不相任則夭皮與肉相果則夀不相果則夭血氣經絡勝形則夀不勝形則夭黄帝曰何謂形之緩急伯髙答曰形充而皮膚緩者則夀形充而皮膚急者則夭形充而脈堅大者順也形充而脈小以弱者氣衰衰則危矣若形充而顴不起者骨小骨小而夭矣形充而大肉䐃堅而有分者肉堅肉堅則夀矣形充而大肉無分理不堅者内脆肉脆則夭矣此天之生命所以立形定氣而視夀夭者必明乎此立形定氣而後以臨病人決死生黄帝曰余聞夀夭無以度之伯髙答曰牆基卑髙不及其地者不滿三十而死其有因加疾者不及二十而死也黄帝曰形氣之相勝以立夀夭奈何伯髙答曰平人而氣勝形者夀病而形肉脱氣勝形者死形勝氣者危矣黄帝曰余聞刺有三變何謂三變伯髙答曰有刺營者有刺衛者有刺寒痺之留經者黄帝曰刺三變者奈何伯髙答曰刺營者出血刺衛者出氣刺寒痺者内熱黄帝曰營衛寒痺之為病奈何伯髙答曰營之生病也寒熱少氣血上下行衛之生病也氣痛時來時去怫愾賁響風寒客于腸胃之中寒痺之為病也留而不去時痛而皮不仁黄帝曰刺寒痺内熱奈何伯髙答曰刺布衣者以火焠之刺大人者以藥熨之黄帝曰藥熨奈何伯髙答曰用淳酒二十升蜀椒一升乾姜一斤桂心一斤凡四種皆㕮咀漬酒中用綿絮一斤細白布四丈并内酒中置酒馬矢煴中葢封塗勿使泄五日五夜出布綿絮曝乾之乾復漬以盡其汁毎漬必晬其日乃出乾乾并用滓與綿絮複布為複巾長六七尺為六七巾則用之生桑炭炙巾以熨寒痺所刺之處令熱入至于病所寒複炙巾以熨之三十遍而止汗出以巾拭身亦三十遍而止起步内中無見風毎刺必熨如此病已矣此所謂内熱也顴音權䐃堅上渠永切腹中䐃脂怫愾上扶勿切鬱也為意舒下許氣切㕮咀上音甫下才與切煴於文切烟煴氣也晬其日上音醉同也官針第七法星凡刺之要官針最妙九針之宜各有所為長短大小各有所施也不得其用病弗能移疾淺針深内傷良肉皮膚為癰病深針淺病氣不寫支為大膿病小針大氣寫大甚疾必為害病大針小氣不泄寫亦復為敗失針之宜大者寫小者不移已言其過請言其所施病在皮膚無常處者取以鑱針於病所膚白勿取病在分内間取以員針於病所病在經絡痼痺者取以鋒針病在脈氣少當補之者取之鍉針於井滎分輸病為大膿者取以鈹針病痺氣暴發者取以貟利針病痺氣痛而不去者取以毫針病在中者取以長針病水腫不能通闗節者取以大針病在五藏固居者取以鋒針寫於井滎分輸取以四時凡刺有九日應九變一曰輸刺輸刺者刺諸經滎輸藏腧也二曰逺道刺逺道刺者病在上取之下刺府腧也三曰經刺經刺者刺大經之結絡經分也四曰絡刺絡刺者刺小絡之血脈也五曰分刺分刺者刺分肉之間也六曰大寫刺大寫刺者刺大膿以鈹針也七曰毛刺毛刺者刺浮痺皮膚也八曰巨刺巨刺者左取右右取左九曰焠刺焠刺者刺燔針則取痺也凡刺有十二節以應十二經一曰偶刺偶刺者以手直心若背直痛所一刺前一刺後以治心痺刺此者傍針之也二曰報刺報刺者刺痛無常處也上下行者直内無拔針以左手隨病所按之乃出針復刺之也三曰恢刺恢刺直刺傍之舉之前後恢筋急以治筋痺也四曰齊刺齊刺者直入一傍入二以治寒氣小深者或曰三刺三刺者治痺氣小深者也五曰揚刺揚刺者正内一傍内四而浮之以治寒氣之博大者也六曰直針刺直針刺者引皮乃刺之以治寒氣之淺者也七曰輸刺輸刺者直入直出稀發針而深之以治氣盛而熱者也八曰短刺短刺者刺骨痺稍摇而深之致針骨所以上下摩骨也九曰浮刺浮刺者傍入而浮之以治肌急而寒者也十曰隂刺隂刺者左右率刺之以治寒厥中寒厥足踝後少隂也十一曰傍針刺傍針刺者直刺傍刺各一以治留痺乆居者也十二曰賛刺賛刺者直入直出數發針而淺之出血是謂治癰腫也脈之所居深不見者刺之微内針而乆留之以致其空脈氣也脈淺者勿刺按絶其脈乃刺之無令精出獨出其邪氣耳所謂三刺則榖氣出者先淺刺絶皮以出陽邪再刺則隂邪出者少益深絶皮致肌肉未入分肉間也已入分肉之間則榖氣出故刺法曰始刺淺之以逐邪氣而來血氣後刺深之以致隂氣之邪最後刺極深之以下榖氣此之謂也故用針者不知年之所加氣之盛衰虚實之所起不可以為工也凡刺有五以應五藏一曰半刺半刺者淺内而疾發針無針傷肉如拔毛狀以取皮氣此肺之應也二曰豹文刺豹文刺者左右前後針之中脈為故以取經絡之血者此心之應也三曰闗刺闗刺者直刺左右盡筋上以取筋痺慎無出血此肝之應也或曰淵刺一曰豈刺四曰合谷刺合谷刺者左右雞足針于分肉之間以取肌痺此脾之應也五曰輸刺輸刺者直入直出深内之至骨以取骨痺此腎之應也燔針上音煩􅀈刺上苦回切大也一本作怪字本神第八法風黄帝問於歧伯曰凡刺之法先必本於神血脈營氣精神此五藏之所藏也至其淫泆離藏則精失魂魄飛揚志意恍亂智慮去身者何因而然乎夭之罪與人之過乎何謂德氣生精神魂魄心意志思智慮請問其故歧伯答曰天之在我者德也地之在我者氣也德流氣薄而生者也故生之來謂之精兩精相搏謂之神隨神往來者謂之魂並精而出入者謂之魄所以任物者謂之心心有所憶謂之意意之所存謂之志因志而存變謂之思因思而逺慕謂之慮因慮而處物謂之智故智者之養生也必順四時而適寒暑和喜怒而安居處節隂陽而調剛柔如是則僻邪不至長生乆視是故􅇶惕思慮者則傷神神傷則恐懼流淫而不止因悲哀動中者竭絶而失生喜樂者神憚散而不藏愁憂者氣閉塞而不行盛怒者迷惑而不治恐懼者神蕩憚而不收心􅇶惕思慮則傷神神傷則恐懼自失破䐃脫肉毛悴色夭死于冬脾愁憂而不解則傷意意傷則悗亂四肢不舉毛悴色夭死於春肝悲哀動中則傷魂魂傷則狂忘不精不精則不正當人隂縮而攣筋兩脇骨不舉毛悴色夭死于秋肺喜樂無極則傷魄魄傷則狂狂者意不存人皮革焦毛悴色夭死于夏腎盛怒而不止則傷志志傷則喜忘其前言腰脊不可以俛仰屈伸毛悴色夭死于季夏恐懼而不解則傷精精傷則骨痠痿厥精時自下是故五藏主藏精者也不可傷傷則失守而隂虛隂虚則無氣無氣則死矣是故用針者察觀病人之態以知精神魂魄之存亡得失之意五者以傷針不可以治之也肝藏血血舎魂肝氣虛則恐實則怒脾藏營營舎意脾氣虚則四支不用五藏不安實則腹脹經溲不利心藏脈脈舎神心氣虚則悲實則笑不休肺藏氣氣舎魄肺氣虚則鼻塞不利少氣實則喘喝胷盈仰息腎藏精精舎志腎氣虚則厥實則脹五藏不安必審五藏之病形以知其氣之虛實謹而調之也悗亂上音悶怵惕上丑律切下他的切悚懼也終始第九法野凡刺之道畢於終始明知終始五藏為紀隂陽定矣隂者主藏陽者主府陽受氣於四末隂受氣於五藏故寫者迎之補者隨之知迎知隨氣可令和和氣之方必通隂陽五藏為隂六府為陽傳之後世以血為盟敬之者昌慢之者亡無道行私必得天殃謹奉天道請言終始終始者經脈為紀持其脈口人迎以知隂陽有餘不足平與不平天道畢矣所謂平人者不病不病者脈口人迎應四時也上下相應而俱往來也六經之脈不結動也本末之寒温之相守司也形肉血氣必相稱也是謂平人少氣者脈口人迎俱少而不稱尺寸也如是者則隂陽俱不足補陽則隂竭寫隂則陽脱如是者可将以甘藥不可飲以至劑如此者弗炙不已者因而寫之則五藏氣壊矣人迎一盛病在足少陽一盛而躁病在手少陽人迎二盛病在足太陽二盛而躁病在手太陽人迎三盛病在足陽明三盛而躁病在手陽明人迎四盛且大且數名曰溢陽溢陽為外格脈口一盛病在足厥隂一盛而躁在手心主脈口二盛病在足少隂二盛而躁在手少隂脈口三盛病在足太隂三盛而躁在手太隂脈口四盛且大且數者名曰溢隂溢隂為内闗内闗不通死不治人迎與太隂脈口俱盛四倍以上命曰闗格闗格者與之短期人迎一盛寫足少陽而補足厥隂二寫一補日一取之必切而驗之踈取之上氣和乃止人迎二盛寫足太陽補足少隂二冩一補二日一取之必切而驗之踈取之上氣和乃止人迎三盛寫足陽明而補足太隂二寫一補日二取之必切而驗之踈取之上氣和乃止脈口一盛寫足厥隂而補足少陽二補一寫日一取之必切而驗之踈而取上氣和乃止脈口二盛寫足少隂而補足太陽二補一寫二日一取之必切而驗之踈取之上氣和乃止脈口三盛寫足太陽而補足陽明二補一寫日二取之必切而驗之踈而取之上氣和乃止所以日二取之者太陽主胃大富于榖氣故可日二取之也人迎與脈口俱盛三倍以上命曰隂陽俱溢如是者不開則血脉閉塞氣無所行流淫于中五藏内傷如此者因而炙之則變易而為他病矣凡刺之道氣調而止補隂瀉陽音氣益彰耳目聰明反此者謂氣不行所謂氣至而有效者寫則益虚虚者脈大如其故而不堅也堅如其故者適雖言故病未去也補則益實實者脈大如其故而益堅也夫如其故而不堅者適雖言快病未去也故補則實寫則虚痛雖不隨針病必衰去必先通十二經脈之所生病而後可得傳于終始矣故隂陽不相移虚實不相傾取之其經凡刺之屬三刺至榖氣邪僻妄合隂陽易居逆順相反沈浮異處四時不得稽留􅁋泆須針而去故一刺則陽邪出再刺則隂邪出三刺則榖氣至榖氣至而止所謂榖氣至者已補而實已寫而虚故以知榖氣至也邪氣獨去者隂與陽未能調而病知愈也故曰補則實寫則虚痛雖不隨針病必衰去矣隂盛而陽虚先補其陽後寫其隂而和之隂虚而陽盛先補其隂後寫其陽而和之三脈動于足大指之間必審其實虚虚而寫之是謂重虚重虚病益甚凡刺此者以指按之脈動而實且疾者疾寫之虚而徐者則補之反此者病益甚其動也陽明在上厥隂在中少隂在下膺腧中膺背腧中背肩􅈩虚者取之上重舌刺舌柱以鈹針也手屈而不伸者其病在筋伸而不屈者其病在骨在骨守骨在筋守筋補須一方實深取之稀按其痏以極出其邪氣一方虛淺刺之以養其脈疾按其痏無使邪氣得入邪氣来也𦂳而闕氣來也徐而和脈實者深刺之以泄其氣脈虚者淺刺之使精氣無得出以養其脈獨出其邪氣刺諸痛者其脈皆實故曰從腰以上者手太隂陽明皆主之從腰以下者足太隂陽明皆主之病在上者下取之病在下者髙取之病在頭者取之足病在腰者取之膕病生於頭者頭重生於手者臂重生于足者足重治病者先刺其病所從生者也春氣在毛夏氣在皮膚秋氣在分肉冬氣在筋骨刺此病者冬以其時為齊故刺肥人者秋冬之齊刺瘦人者以春夏之齊病痛者隂也痛而以手按之不得者隂也深刺之病在上者陽也病在下者隂也癢者陽也淺刺之病先起隂者先治其隂而後治其陽病先起陽者先治其陽而後治其隂刺熱厥者留針反為寒刺寒厥者留針反為熱刺熱厥者二隂一陽刺寒厥者二陽一隂所謂二隂者二刺隂也一陽者一刺陽也乆病者邪氣入深刺此病者深内而乆留之間日而復刺之必先調其左右去其血脈刺道畢矣凡刺之法必察其形氣形肉未脱少氣而脈又躁躁厥者必為繆刺之散氣可收聚氣可布深居静處占神住来閉户塞牖魂魄不散専意一神精氣之分毋聞人聲以收其精必一其神令志在針淺而留之微而浮之以移其神氣至乃休男内女外堅拒勿出謹守勿内是謂得氣凡刺之禁新内勿刺新刺勿内已醉勿刺已刺勿醉新怒勿刺已刺勿怒新勞勿刺已刺勿勞已飽勿刺已刺勿飽已飢勿刺已刺勿飢已渴勿刺已刺勿渴大驚大恐必定其氣乃刺之乘車來者卧而休之如食須乃刺之出行来者坐而休之如行十里頃乃刺之凡此十二禁者其脈亂氣散逆其營衛經氣不次因而刺之則陽病入於隂隂病出為陽則邪氣復生粗工勿察是謂伐身形體淫泆乃消腦髓津液不化脫其五味是謂失氣也太陽之脈其終也戴眼反折瘈瘲其色白絶皮乃絶汗絶汗則終矣少陽終者耳聾百節盡縱目系絶目系絶一日半則死矣其死也色青白乃死陽明終者口目動作喜驚妄言色黄其上下之經盛而不行則終矣少隂終者面黒齒長而垢腹脹閉塞上下不通而終矣厥隂終者中熱嗌乾喜溺心煩甚則舌卷卵上縮而終矣太隂終者腹脹閉不得息氣噫善嘔嘔則逆逆則面赤不逆則上下不通上下不通則面黒皮毛燋而終矣繆刺上眉救切男内女外難經作男外女内淫濼下述各切齒長平聲靈樞經卷二
