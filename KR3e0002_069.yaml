body:
  text: 憂恚無言第六十九憂恚無言第六十九黃帝問於少師曰人之卒然憂恚而言無音者何道之塞何氣出行使音不彰願聞其方少師答曰咽喉者水穀之道也喉嚨者氣之所以上下者也會厭者音聲之戶也口脣者音聲之扇也舌者音聲之機也戀雍垂者音聲之關也頏顙者分氣之所泄也橫骨者神氣所使主發舌者也故人之鼻洞涕出不收者頏顙不開分氣失也是故厭小而疾薄則發氣疾其開闔利其出氣易其厭大而厚則開闔難其氣出遲故重言也人卒然無音者寒氣客于厭則厭不能發發不能下至其開闔不致故無音黃帝曰刺之奈何歧伯曰足之少陰上繫於舌絡於橫骨終於會厭兩寫其血脈濁氣乃辟會厭之脈上絡任脈取之天突其厭乃發也
