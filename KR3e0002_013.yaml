body:
  text: 經筋第十三經筋第十三足太陽之筋起于足小指上結于踝邪上結于膝其下循足外踝結于踵上循跟結於膕其別者結于踹外上膕中內廉與膕中并上結于臀上挾脊上項其支者別入結於舌本其直者結于枕骨上頭下顏結于鼻其支者為目上網下結于頄其支者從腋後外廉結于肩髃其支者入腋下上出缺盆上結于完骨其支者出缺盆邪上出于頄其病小指支跟腫痛膕攣脊反折項筋急肩不舉腋支缺盆中紐痛不可左右搖治在燔鍼劫刺以知為數以痛為輸名曰仲春痺也足少陽之筋起于小指次指上結外踝上循脛外廉結于膝外廉其支者別起外輔骨上走髀前者結于伏兔之上後者結于尻其直者上乘䏚季脅上走腋前廉繫于膺乳結于缺盆直者上出腋貫缺盆出太陽之前循耳後上額角交巔上下走頷上結于頄支者結于目眥為外維其病小指次指支轉筋引膝外轉筋膝不可屈伸膕筋急前引髀後引尻即上乘䏚季脅痛上引缺盆膺乳頸維筋急從左之右右目不開上過右角並蹻脈而行左絡于右故傷左角右足不用命曰維筋相交治在燔鍼劫刺以知為數以痛為輸名曰孟春痺也足陽明之筋起于中三指結于跗上邪外上加于輔骨上結于膝外廉直上結于髀樞上循脅屬脊其直者上循骭結于其支者結于外輔骨合少陽其直者上循伏兔上結于髀聚于陰器上腹而布至缺盆而結上頸上挾口合于頄下結于鼻上合于太陽太陽為目上網陽明為目下網其支者從頰結于耳前其病足中指支脛轉筋腳跳堅伏兔轉筋髀前腫㿉疝腹筋急引缺盆及頰卒口僻急者目不合熱則筋縱目不開頰筋有寒則急引頰移口有熱則筋弛縱緩不勝收故僻治之以馬膏膏其急者以白酒和桂以塗其緩者以桑鉤鉤之即以生桑灰置之坎中高下以坐等以膏熨急頰且飲美酒噉美炙肉不飲酒者自強也為之三拊而已治在燔鍼劫刺以知為數以痛為輸名曰季春痺也足太陰之筋起于大指之端內側上結于內踝其直者絡于膝內輔骨上循陰股結于髀聚于陰器上腹結于臍循腹裏結于肋散于胸中其內者著于脊其病足大指支內踝痛轉筋痛膝內輔骨痛陰股引髀而痛陰器紐痛下引臍兩脅痛引膺中脊內痛治在燔鍼劫刺以知為數以痛為輸命曰孟秋痺也足少陰之筋起于小指之下並足太陰之筋邪走內踝之下結于踵與太陽之筋合而上結于內輔之下並太陰之筋而上循陰股結于陰器循脊內挾膂上至項結于枕骨與足太陽之筋合其病足下轉筋及所過而結者皆痛及轉筋病在此者主癇瘛及痙在外者不能俛在內者不能仰故陽病者腰反折不能俛陰病者不能仰治在燔鍼劫刺以知為數以痛為輸在內者熨引飲藥此筋折紐紐發數甚者死不治名曰仲秋痺也足厥陰之筋起于大指之上上結于內踝之前上循脛上結內輔之下上循陰股結于陰器絡諸筋其病足大指支內踝之前痛內輔痛陰股痛轉筋陰器不用傷於內則不起傷於寒則陰縮入傷於熱則縱挺不收治在行水清陰氣其病轉筋者治在燔鍼劫刺以知為數以痛為輸命曰季秋痺也手太陽之筋起于小指之上結于腕上循臂內廉結于肘內銳骨之後彈之應小指之上入結于腋下其支者後走腋後廉上繞肩胛循脛出走太陽之前結于耳後完骨其支者入耳中直者出耳上下結于頷上屬目外眥其病小指支肘內銳骨後廉痛循臂陰入腋下腋下痛腋後廉痛繞肩胛引頸而痛應耳中鳴痛引頷目瞑良久乃得視頸筋急則為筋瘻頸腫寒熱在頸者治在燔鍼劫刺之以知為數以痛為輸其為腫者復而銳之本支者上曲牙循耳前屬目外眥上頷結于角其痛當所過者支轉筋治在燔鍼劫刺以知為數以痛為輸名曰仲夏痺也手少陽之筋起于小指次指之端結于腕上循臂結于肘上繞臑外廉上肩走頸合手太陽其支者當曲頰入繫舌本其支者上曲牙循耳前屬目外眥上乘頷結于角其病當所過者即支轉筋舌卷治在燔鍼劫刺以知為數以痛為輸名曰季夏痺也手陽明之筋起于大指次指之端結于腕上循臂上結于肘外上臑結于髃其支者繞肩胛挾脊直者從肩髃上頸其支者上頰結于頄直者上出手太陽之前上左角絡頭下右頷其病當所過者支痛及轉筋肩不舉頸不可左右視治在燔鍼劫刺以知為數以痛為輸名曰孟夏痺也手太陰之筋起于大指之上循指上行結于魚後行寸口外側上循臂結肘中上臑內廉入腋下出缺盆結肩前髃上結缺盆下結胸裏散貫賁合賁下抵季脅其病當所過者支轉筋痛甚成息賁脅急吐血治在燔鍼劫刺以知為數以痛為輸名曰仲冬痺也手心主之筋起于中指與太陰之筋並行結于肘內廉上臂陰結腋下下散前後挾脅其支者入腋散胸中結于臂其病當所過者支轉筋前及胸痛息賁治在燔鍼劫刺以知為數以痛為輸名曰孟冬痺也手少陰之筋起于小指之內側結于銳骨上結肘內廉上入腋交太陰挾乳裏結于胸中循臂下繫于臍其病內急心承伏梁下為肘網其病當所過者支轉筋筋痛治在燔鍼劫刺以知為數以痛為輸其成伏梁唾血膿者死不治經筋之病寒則反折筋急熱則筋弛縱不收陰痿不用陽急則反折陰急則俛不伸焠刺者刺寒急也熱則筋縱不收無用燔鍼名曰季冬痺也足之陽明手之太陽筋急則口目為噼眥急不能卒視治皆如右方也
