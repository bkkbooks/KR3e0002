body:
  text: 病傳第四十二病傳第四十二黃帝曰余受九針于夫子而私覽于諸方或有導引行氣喬摩灸尉刺焫飲藥之一者可獨守耶將盡行之乎歧伯曰諸方者衆人之方也非一人之所盡行也黃帝曰此乃所謂守一勿失萬物畢者也今余已聞陰陽之要虛實之理傾移之過可治之屬願聞病之變化淫傳絶敗而不可治者可得聞乎歧伯曰要乎哉問道昭乎其如日醒窘乎其如夜瞑能被而服之神與俱成畢將服之神自得之生神之理可著于竹帛不可傳于子孫黃帝曰何謂日醒歧伯曰明于陰陽如惑之解如醉之醒黃帝曰何謂夜瞑歧伯曰瘖乎其無聲漠乎其無形折毛發理正氣橫傾淫邪泮衍血脈傳溜大氣入藏腹痛下淫可以致死不可以致生黃帝曰大氣入藏奈何歧伯曰病先發于心一日而之肺三日而之肝五日而之脾三日不已死冬夜半夏日中病先發于肺三日而之肝一日而之脾五日而之胃十日不已死冬日入夏日出病先發于肝三日而之脾五日而之胃三日而之腎三日不已死冬日入夏蚤食病先發于脾一日而之胃二日而之腎三日而之膂膀胱十日不已死冬人定夏晏食病先發于胃五日而之腎三日而之膂膀胱五日而上之心二日不已死冬夜半夏日昳病先發于腎三日而之膂膀胱三日而上之心三日而之小腸三日不已死冬大晨夏早晡病先發于膀胱五日而之腎一日而之小腸一日而之心二日不已死冬雞鳴夏下晡諸病以次相傳如是者皆有死期不可刺也間一藏及二三四藏者乃可刺也
