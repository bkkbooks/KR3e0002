body:
  text: 衛氣行第七十六衛氣行第七十六黃帝問於歧伯曰願聞衛氣之行出入之合何如歧伯曰歲有十二月日有十二辰子午為經卯酉為緯天周二十八宿而一面七星四七二十八星房昴為緯虛張為經是故房至畢為陽昴至心為陰陽主晝陰主夜故衛氣之行一日一夜五十周於身晝日行於陽二十五周夜行於陰二十五周周於五藏是故平旦陰盡陽氣出於目目張則氣上行於頭循項下足太陽循背下至小指之端其散者別於目鋭眥下手太陽下至手小指之間外側其散者別於目鋭眥下足少陽注小指次指之間以上循手少陽之分側下至小指之間別者以上至耳前合於頷脈注足陽明以下行至跗上入五指之間其散者從耳下下手陽明入大指之間入掌中其至於足也入足心出內踝下行陰分復合於目故為一周是故日行一舍人氣行一周與十分身之八日行二舍人氣行二周於身與十分身之六日行三舍人氣行於身五周與十分身之四日行四舍人氣行於身七周與十分身之二日行五舍人氣行於身九周日行六舍人氣行於身十周與十分身之八日行七舍人氣行於身十二周在身與十分身之六日行十四舍人氣二十五周於身有奇分與十分身之二陽盡於陰陰受氣矣其始入於陰當從足少陰注於腎腎注於心心注於肺肺注于肝肝注于脾脾復注于腎為周是故夜行一舍人氣行於陰藏一周與十分藏之八亦如陽行之二十五周而復合於目陰陽一日一夜合有奇分十分身之二與十分藏之二是故人之所以臥起之時有早晏者奇分不盡故也黃帝曰衛氣之在於身也上下往來不以期候氣而刺之奈何伯高曰分有多少日有長短春秋冬夏各有分理然後常以平旦為紀以夜盡為始是故一日一夜水下百刻二十五刻者半日之度也常如是毋已日入而止隨日之長短各以為紀而刺之謹候其時病可與期失時反候者百病不治故曰刺實者刺其來也刺虛者刺其去也此言氣存亡之時以候虛實而刺之是故謹候氣之所在而刺之是謂逢時在於三陽必候其氣在於陽而刺之病在於三陰必候其氣在陰分而刺之水下一刻人氣在太陽水下二刻人氣在少陽水下三刻人氣在陽明水下四刻人氣在陰分水下五刻人氣在太陽水下六刻人氣在少陽水下七刻人氣在陽明水下八刻人氣在陰分水下九刻人氣在太陽水下十刻人氣在少陽水下十一刻人氣在陽明水下十二刻人氣在陰分水下十三刻人氣在太陽水下十四刻人氣在少陽水下十五刻人氣在陽明水下十六刻人氣在陰分水下十七刻人氣在太陽水下十八刻人氣在少陽水下十九刻人氣在陽明水下二十刻人氣在陰分水下二十一刻人氣在太陽水下二十二刻人氣在少陽水下二十三刻人氣在陽明水下二十四刻人氣在陰分水下二十五刻人氣在太陽此半日之度也從房至畢一十四舍水下五十刻日行半度回行一舍水下三刻與七分刻之四大要曰常以日之加於宿上也人氣在太陽是故日行一舍人氣行三陽行與陰分常如是無已天與地同紀紛紛𤽉𤽉終而復始一日一夜水下百刻而盡矣
