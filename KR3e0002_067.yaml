body:
  text: 行鍼第六十七行鍼第六十七黃帝問于歧伯曰余聞九鍼於夫子而行之於百姓百姓之血氣各不同形或神動而氣先鍼行或氣與鍼相逢或鍼已出氣獨行或數刺乃知或發鍼而氣逆或數刺病益劇凡此六者各不同形願聞其方歧伯曰重陽之人其神易動其氣易往也黃帝曰何謂重陽之人歧伯曰重陽之人熇熇高高言語善疾舉足善高心肺之藏氣有餘陽氣滑盛而揚故神動而氣先行黃帝曰重陽之人而神不先行者何也歧伯曰此人頗有陰者也黃帝曰何以知其頗有陰也歧伯曰多陽者多喜多陰者多怒數怒者易解故曰頗有陰其陰陽之離合難故其神不能先行也黃帝曰其氣與鍼相逢奈何歧伯曰陰陽和調而血氣淖澤滑利故鍼入而氣出疾而相逢也黃帝曰鍼已出而氣獨行者何氣使然歧伯曰其陰氣多而陽氣少陰氣沉而陽氣浮者內藏故鍼已出氣乃隨其後故獨行也黃帝曰數刺乃知何氣使然歧伯曰此人之多陰而少陽其氣沉而氣往難故數刺乃知也黃帝曰鍼入而氣逆者何氣使然歧伯曰其氣逆與其數刺病益甚者非陰陽之氣浮沉之勢也此皆麤之所敗上之所失其形氣無過焉
