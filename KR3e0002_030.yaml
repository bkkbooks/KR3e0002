body:
  text: 決氣第三十決氣第三十黃帝曰余聞人有精氣津液血脈余意以為一氣耳今乃辨為六名余不知其所以然歧伯曰兩神相搏合而成形常先身生是謂精何謂氣歧伯曰上焦開發宣五穀味熏膚充身澤毛若霧露之溉是謂氣何謂津歧伯曰腠理發泄汗出溱溱是謂津何謂液歧伯曰穀入氣滿淖澤注于骨骨屬屈伸泄澤補益腦髓皮膚潤澤是謂液何謂血歧伯曰中焦受氣取汁變化而赤是謂血何謂脈歧伯曰壅遏營氣令無所避是謂脈黃帝曰六氣者有餘不足氣之多少腦髓之虛實血脈之清濁何以知之歧伯曰精脫者耳聾氣脫者目不明津脫者腠理開汗大泄液脫者骨屬屈伸不利色夭腦髓消脛痠耳數鳴血脫者色白夭然不澤其脈空虛此其候也黃帝曰六氣者貴賤何如歧伯曰六氣者各有部主也其貴賤善惡可為常主然五穀與胃為大海也
