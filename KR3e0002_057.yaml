body:
  text: 水脹第五十七水脹第五十七黃帝問于歧伯曰水與膚脹鼓脹腸覃石瘕石水何以別之歧伯答曰水始起也目窠上微腫如新臥起之狀其頸脈動時咳陰股間寒足脛瘇腹乃大其水已成矣以手按其腹隨手而起如裹水之狀此其候也黃帝曰膚脹何以候之歧伯曰膚脹者寒氣客于皮膚之間𪔣𪔣然不堅腹大身盡腫皮厚按其腹窅而不起腹色不變此其候也鼓脹何如歧伯曰腹脹身皆大大與膚脹等也色蒼黃腹筋起此其候也腸覃何如歧伯曰寒氣客于腸外與衛氣相搏氣不得榮因有所繫癖而內著惡氣乃起瘜肉乃生其始生也大如雞卵稍以益大至其成如懷子之狀久者離歲按之則堅推之則移月事以時下此其候也石瘕何如歧伯曰石瘕生于胞中寒氣客于子門子門閉塞氣不得通惡血當寫不寫衃以留止日以益大狀如懷子月事不以時下皆生于女子可導而下黃帝曰膚脹鼓脹可刺邪歧伯曰先寫其脹之血絡後調其經刺去其血絡也
