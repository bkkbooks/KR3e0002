body:
  text: 五味論第六十三五味論第六十三黃帝問于少俞曰五味入于口也各有所走各有所病酸走筋多食之令人癃鹹走血多食之令人渴辛走氣多食之令人洞心苦走骨多食之令人變嘔甘走肉多食之令人悗心余知其然也不知其何由願聞其故少俞答曰酸入于胃其氣澀以收上之兩焦弗能出入也不出即留于胃中胃中和溫則下注膀胱膀胱之胞薄以懦得酸則縮綣約而不通水道不行故癃陰者積筋之所終也故酸入而走筋矣黃帝曰鹹走血多食之令人渴何也少俞曰鹹入于胃其氣上走中焦注于脈則血氣走之血與鹹相得則凝凝則胃中汁注之注之則胃中竭竭則咽路焦故舌本乾而善渴血脈者中焦之道也故鹹入而走血矣黃帝曰辛走氣多食之令人洞心何也少俞曰辛入于胃其氣走于上焦上焦者受氣而營諸陽者也薑韭之氣薰之營衛之氣不時受之久留心下故洞心辛與氣俱行故辛入而與汗俱出黃帝曰苦走骨多食之令人變嘔何也少俞曰苦入于胃五穀之氣皆不能勝苦苦入下脘三焦之道皆閉而不通故變嘔齒者骨之所終也故苦入而走骨故入而復出知其走骨也黃帝曰甘走肉多食之令人悗心何也少俞曰甘入于胃其氣弱小不能上至于上焦而與穀留于胃中者令人柔潤者也胃柔則緩緩則蟲動蟲動則令人悗心其氣外通於肉故甘走肉
