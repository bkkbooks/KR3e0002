body:
  text: 通天第七十二通天第七十二黃帝問于少師曰余嘗聞人有陰陽何謂陰人何謂陽人少師曰天地之間六合之內不離於五人亦應之非徒一陰一陽而已也而略言耳口弗能遍明也黃帝曰願略聞其意有賢人聖人心能備而行之乎少師曰蓋有太陰之人少陰之人太陽之人少陽之人陰陽和平之人凡五人者其態不同其筋骨氣血各不等黃帝曰其不等者可得聞乎少師曰太陰之人貪而不仁下齊湛湛好內而惡出心和而不發不務於時動而後之此太陰之人也少陰之人小貪而賊心見人有亡常若有得好傷好害見人有榮乃反慍怒心疾而無恩此少陰之人也太陽之人居處于于好言大事無能而虛説志發於四野舉措不顧是非為事如常自用事雖敗而常無悔此太陽之人也少陽之人諟諦好自貴有小小官則高自宜好為外交而不內附此少陽之人也陰陽和平之人居處安靜無為懼懼無為欣欣婉然從物或與不爭與時變化尊則謙謙談而不治是謂至治古之善用針艾者視人五態乃治之盛者寫之虛者補之黃帝曰治人之五態奈何少師曰太陰之人多陰而無陽其陰血濁其衛氣澀陰陽不和緩筋而厚皮不之疾寫不能移之少陰之人多陰少陽小胃而大腸六府不調其陽明脈小而太陽脈大必審調之其血易脫其氣易敗也太陽之人多陽而少陰必謹調之無脫其陰而寫其陽陽重脫者易狂陰陽皆脫者暴死不知人也少陽之人多陽少陰經小而絡大血在中而氣外實陰而虛陽獨寫其絡脈則強氣脫而疾中氣不足病不起也陰陽和平之人其陰陽之氣和血脈調謹診其陰陽視其邪正安容儀審有餘不足盛則寫之虛則補之不盛不虛以經取之此所以調陰陽別五態之人者也黃帝曰夫五態之人者相與毋故卒然新會未知其行也何以別之少師答曰衆人之屬不如五態之人者故五五二十五人而五態之人不與焉五態之人尤不合於衆者也黃帝曰別五態之人奈何少師曰太陰之人其狀黮黮然黑色念然下意臨臨然長大膕然未僂此太陰之人也少陰之人其狀清然竊然固以陰賊立而躁嶮行而似伏此少陰之人也太陽之人其狀軒軒儲儲反身折膕此太陽之人也少陽之人其狀立則好仰行則好搖其兩臂兩肘則常出於背此少陽之人也陰陽和平之人其狀委委然隨隨然顒顒然愈愈然䁢䁢然豆豆然衆人皆曰君子此陰陽和平之人也
