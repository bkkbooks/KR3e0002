body:
  text: 本輸第二本輸第二黃帝問於歧伯曰凡刺之道必通十二經絡之所終始絡脈之所別處五輸之所留六府之所與合四時之所出入五藏之所溜處闊數之度淺深之狀高下所至願聞其解歧伯曰請言其次也肺出於少商少商者手大指端內側也為井木溜于魚際魚際者手魚也為滎注于大淵大淵魚後一寸陷者中也為腧行于經渠經渠寸口中也動而不居為經入于尺澤尺澤肘中之動脈也為合手太陰經也心出於中衝中衝手中指之端也為井木溜於勞宮勞宮掌中中指本節之內間也為滎注于大陵大陵掌後兩骨之間方下者也為腧行於間使間使之道兩筋之間三寸之中也有過則至無過則止為經入于曲澤曲澤肘內廉下陷者之中也屈而得之為合手少陰也肝出于大敦大敦者足大指之端及三毛之中也為井木溜于行間行間足大指間也為滎注于大衝大衝行間上二寸陷者之中也為腧行于中封中封內踝之前一寸半陷者之中使逆則宛使和則通搖足而得之為經入于曲泉曲泉輔骨之下大筋之上也屈膝而得之為合足厥陰也脾出于隱白隱白者足大指之端內側也為井木溜于大都大都本節之後下陷者之中也為滎注于太白太白腕骨之下也為腧行于商丘商丘內踝之下陷者之中也為經入于陰之陵泉陰之陵泉輔骨之下陷者之中也伸而得之為合足太陰也腎出于湧泉湧泉者足心也為井木溜于然谷然谷然骨之下者也為滎注于大溪大溪內踝之後跟骨之上陷中者也為腧行于復留復留上內踝二寸動而不休為經入于陰谷陰谷輔骨之後大筋之下小筋之上也按之應手屈膝而得之為合足少陰經也膀胱出於至陰至陰者足小指之端也為井金溜于通谷通谷本節之前外側也為滎注于束骨束骨本節之後陷者中也為腧過于京骨京骨足外側大骨之下為原行于崑崙崑崙在外踝之後跟骨之上為經入于委中委中膕中央為合委而取之足太陽也膽出于竅陰竅陰者足小指次指之端也為井金溜于俠溪俠溪足小指次指之間也為滎注于臨泣臨泣上行一寸半陷者中也為腧過于丘墟丘墟外踝之前下陷者中也為原行于陽輔陽輔外踝之上輔骨之前及絶骨之端也為經入于陽之陵泉陽之陵泉在膝外陷者中也為合伸而得之足少陽也胃出于厲兌厲兌者足大指內次指之端也為井金溜于內庭內庭次指外間也為滎注于陷谷陷谷者上中指內間上行二寸陷者中也為腧過于衝陽衝陽足跗上五寸陷者中也為原搖足而得之行于解溪解溪上衝陽一寸半陷者中也為經入于下陵下陵膝下三寸胻骨外三里也為合復下三里三寸為巨虛上廉復下上廉三寸為巨虛下廉也大腸屬上小腸屬下足陽明胃脈也大腸小腸皆屬于胃是足陽明也三焦者上合手少陽出于關衝關衝者手小指次指之端也為井金溜于液門液門小指次指之間也為滎注于中渚中渚本節之後陷者中也為腧過于陽池陽池在腕上陷者之中也為原行于支溝支溝上腕三寸兩骨之間陷者中也為經入于天井天井在肘外大骨之上陷者中也為合屈肘乃得之三焦下腧在于足大指之前少陽之後出于膕中外廉名曰委陽是太陽絡也手少陽經也一焦者足少陽太陰之所將太陽之別也上踝五寸別入貫腨腸出于委陽並太陽之正入絡膀胱約下焦實則閉癃虛則遺溺遺溺則補之閉癃則寫之手太陽小腸者上合於太陽出于少澤少澤小指之端也為井金溜于前谷前谷在手外廉本節前陷者中也為滎注于後溪後溪者在手外側本節之後也為腧過于腕骨腕骨在手外側腕骨之前為原行于陽谷陽谷在鋭骨之下陷者中也為經入于小海小海在肘內大骨之外去端半寸陷者中也伸臂而得之為合手太陽經也太陽上合手陽明出于商陽商陽大指次指之端也為井金溜于本節之前二間為滎注于本節之後三間為腧過于合谷合谷在大指歧骨之間為原行于陽溪陽溪在兩筋間陷者中也為經入于曲池在肘外輔骨陷者中屈臂而得之為合手陽明也是謂五藏六府之腧五五二十五腧六六三十六腧也六府皆出足之三陽上合于手者也缺盆之中任脈也名曰天突一次任脈側之動脈足陽明也名曰人迎二次脈手陽明也名曰扶突三次脈手太陽也名曰天窗四次脈足少陽也名曰天容五次脈手少陽也名曰天牖六次脈足太陽也名曰天柱七次脈頸中央之脈督脈也名曰風府腋內動脈手太陰也名曰天府腋下三寸手心主也名曰天池刺上關者呿不能欠刺下關者欠不能呿刺犢鼻者屈不能伸刺兩關者伸不能屈足陽明挾喉之動脈也其腧在膺中手陽明次在其腧外不至曲頰一寸手太陽當曲頰足少陽在耳下曲頰之後手少陽出耳後上加完骨之上足太陽挾項大筋之中髮際陰尺動脈在五里五腧之禁也肺合大腸大腸者傳道之府心合小腸小腸者受盛之府肝合膽膽者中精之府脾合胃胃者五穀之府腎合膀胱膀胱者津液之府也少陽屬腎腎上連肺故將兩藏三焦者中瀆之府也水道出焉屬膀胱是孤之府也是六府之所與合者春取絡脈諸滎大經分肉之間甚者深取之間者淺取之夏取諸腧孫絡肌肉皮膚之上秋取諸合餘如春法冬取諸井諸腧之分欲深而留之此四時之序氣之所處病之所舍藏之所宜轉筋者立而取之可令遂已痿厥者張而刺之可令立快也
