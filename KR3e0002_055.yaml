body:
  text: 逆順第五十五逆順第五十五黃帝問于伯高曰余聞氣有逆順脈有盛衰刺有大約可得聞乎伯高曰氣之逆順者所以應天地陰陽四時五行也脈之盛衰者所以候血氣之虛實有餘不足刺之大約者必明知病之可刺與其未可刺與其已不可刺也黃帝曰候之奈何伯高曰兵法曰無迎逢逢之氣無擊堂堂之陳刺法曰無刺熇熇之熱無刺漉漉之汗無刺渾渾之脈無刺病與脈相逆者黃帝曰候其可刺奈何伯高曰上工刺其未生者也其次刺其未盛者也其次刺其已衰者也下工刺其方襲者也與其形之盛者也與其病之與脈相逆者也故曰方其盛也勿敢毀傷刺其已衰事必大昌故曰上工治未病不治已病此之謂也
