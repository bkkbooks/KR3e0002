body:
  text: 五閱五使第三十七五閱五使第三十七黃帝問于歧伯曰余聞刺有五官五閱以觀五氣五氣者五藏之使也五時之副也願聞其五使當安出歧伯曰五官者五藏之閱也黃帝曰願聞其所出令可為常歧伯曰脈出于氣口色見于明堂五色更出以應五時各如其常經氣入藏必當治裏帝曰善五色獨決于明堂乎歧伯曰五官已辨闕庭必張乃立明堂明堂廣大蕃蔽見外方壁高基引垂居外五色乃治平博廣大壽中百歲見此者刺之必已如是之人者血氣有餘肌肉堅緻故可苦已鍼黃帝曰願聞五官歧伯曰鼻者肺之官也目者肝之官也口脣者脾之官也舌者心之官也耳者腎之官也黃帝曰以官何候歧伯曰以候五藏故肺病者喘息鼻脹肝病者眥青脾病者脣黃心病者舌卷短顴赤腎病者顴與顏黑黃帝曰五脈安出五色安見其常色殆者如何歧伯曰五官不辨闕庭不張小其明堂蕃蔽不見又埤其牆牆下無基垂角去外如是者雖平常殆況加疾哉黃帝曰五色之見于明堂以觀五藏之氣左右高下各有形乎歧伯曰府藏之在中也各以次舍左右上下各如其度也
