body:
  text: 壽夭剛柔第六壽夭剛柔第六黃帝問於少師曰余聞人之生也有剛有柔有弱有強有短有長有陰有陽願聞其方少師荅曰陰中有陰陽中有陽審知陰陽刺之有方得病所始刺之有理謹度病端與時相應內合于五藏六府外合于筋骨皮膚是故內有陰陽外亦有陰陽在內者五藏為陰六府為陽在外者筋骨為陰皮膚為陽故曰病在陰之陰者刺陰之滎輸病在陽之陽者刺陽之合病在陽之陰者刺陰之經病在陰之陽者刺絡脈故曰病在陽者命曰風病在陰者命曰痺病陰陽俱病命曰風痺病有形而不痛者陽之類也無形而痛者陰之類也無形而痛者其陽完而陰傷之也急治其陰無攻其陽有形而不痛者其陰完而陽傷之也急治其陽無攻其陰陰陽俱動乍有形乍無形加以煩心命曰陰勝其陽此謂不表不裏其形不久黃帝問於伯高曰余聞形氣病之先後外內之應奈何伯高荅曰風寒傷形憂恐忿怒傷氣氣傷藏乃病藏寒傷形乃應形風傷筋脈筋脈乃應此形氣外內之相應也黃帝曰刺之奈何伯高荅曰病九日者三刺而已病一月者十刺而已多少遠近以此衰之久痺不去身者視其血絡盡出其血黃帝曰外內之病難易之治奈何伯高荅曰形先病而未入藏者刺之半其日藏先病而形乃應者刺之倍其日此外內難易之應也黃帝問於伯高曰余聞形有緩急氣有盛衰骨有大小肉有堅脆皮有厚薄其以立壽夭奈何伯高荅曰形與氣相任則壽不相任則夭皮與肉相果則壽不相果則夭血氣經絡勝形則壽不勝形則夭黃帝曰何謂形之緩急伯高荅曰形充而皮膚緩者則壽形充而皮膚急者則夭形充而脈堅大者順也形充而脈小以弱者氣衰衰則危矣若形充而顴不起者骨小骨小則夭矣形充而大肉䐃堅而有分者肉堅肉堅則壽矣形充而大肉無分理不堅者肉脆肉脆則夭矣此天之生命所以立形定氣而視壽夭者必明乎此立形定氣而後以臨病人決死生黃帝曰余聞壽夭無以度之伯高荅曰牆基卑高不及其地者不滿三十而死其有因加疾者不及二十而死也黃帝曰形氣之相勝以立壽夭奈何伯高荅曰平人而氣勝形者壽病而形肉脫氣勝形者死形勝氣者危矣黃帝曰余聞刺有三變何謂三變伯高荅曰有刺營者有刺衛者有刺寒痺之留經者黃帝曰刺三變者奈何伯高荅曰刺營者出血刺衛者出氣刺寒痺者內熱黃帝曰營衛寒痺之為病奈何伯高荅曰營之生病也寒熱少氣血上下行衛之生病也氣痛時來時去怫愾賁響風寒客于腸胃之中寒痺之為病也留而不去時痛而皮不仁黃帝曰刺寒痺內熱奈何伯高荅曰刺布衣者以火焠之刺大人者以藥熨之黃帝曰藥熨奈何伯高荅曰用淳酒二十升蜀椒一升乾薑一斤桂心一斤凡四種皆㕮咀漬酒中用綿絮一斤細白布四丈并內酒中置酒馬矢熅中蓋封塗勿使泄五日五夜出布綿絮曝乾之乾復漬以盡其汁每漬必晬其日乃出乾乾并用滓與綿絮複布為複巾長六七尺為六七巾則用之生桑炭炙巾以熨寒痺所刺之處令熱入至于病所寒復炙巾以熨之三十遍而止汗出以巾拭身亦三十遍而止起步內中無見風每刺必熨如此病已矣此所謂內熱也
