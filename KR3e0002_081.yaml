body:
  text: 癰疽第八十一癰疽第八十一黃帝曰余聞腸胃受穀上焦出氣以溫分肉而養骨節通腠理中焦出氣如露上注溪谷而滲孫脈津液和調變化而赤為血血和則孫脈先滿溢乃注於絡脈皆盈乃注於經脈陰陽已張因息乃行行有經紀周有道理與天合同不得休止切而調之從虛去實寫則不足疾則氣減留則先後從虛去虛補則有餘血氣已調形氣乃持余已知血氣之平與不平未知癰疽之所從生成敗之時死生之期有遠近何以度之可得聞乎歧伯曰經脈留行不止與天同度與地合紀故天宿失度日月薄蝕地經失紀水道流溢草萱不成五穀不殖徑路不通民不往來巷聚邑居則別離異處血氣猶然請言其故夫血脈營衛周流不休上應星宿下應經數寒邪客於經絡之中則血泣血泣則不通不通則衛氣歸之不得復反故癰腫寒氣化為熱熱勝則腐肉肉腐則為膿膿不寫則爛筋筋爛則傷骨骨傷則髓消不當骨空不得泄寫血枯空虛則筋骨肌肉不相榮經脈敗漏薰於五藏藏傷故死矣黃帝曰願盡聞癰疽之形與忌曰名歧伯曰癰發於嗌中名曰猛疽猛疽不治化為膿膿不寫塞咽半日死其化為膿者寫則合豕膏冷食三日而已發於頸名曰天疽其癰大以赤黑不急治則熱氣下入淵腋前傷任脈內薰肝肺薰肝肺十餘日而死矣陽留大發消腦留項名曰腦爍其色不樂項痛而如刺以針煩心者死不可治發於肩及臑名曰疵癰其狀赤黑急治之此令人汗出至足不害五藏癰發四五日逞焫之發於腋下赤堅者名曰米疽治之以砭石欲細而長踈砭之塗已豕膏六日已勿裹之其癰堅而不潰者為馬刁挾癭急治之發於胸名曰井疽其狀如大豆三四日起不早治下入腹不治七日死矣發於膺名曰甘疽色青其狀如穀實𦸈𧁾常苦寒熱急治之去其寒熱十歲死死後出膿發於脅名曰敗疪敗疪者女子之病也灸之其病大癰膿治之其中乃有生肉大如赤小豆銼䔖𧄍草根各一升以水一斗六升煮之竭為取三升則強飲厚衣坐於釜上令汗出至足已發於股脛名曰股脛疽其狀不甚變而癰膿搏骨不急治三十日死矣發於尻名曰鋭疽其狀赤堅大急治之不治三十日死矣發於股陰名曰赤施不急治六十日死在兩股之內不治十日而當死發於膝名曰疵癰其狀大癰色不變寒熱如堅石勿石石之者死須其柔乃石之者生諸癰疽之發於節而相應者不可治也發於陽者百日死發於陰者三十日死發於脛名曰兔齧其狀赤至骨急治之不治害人也發於內踝名曰走緩其狀癰也色不變數石其輸而止其寒熱不死發於足上下名曰四淫其狀大癰急治之百日死發於足傍名曰厲癰其狀不大初如小指發急治之去其黑者不消輒益不治百日死發於足指名脫癰其狀赤黑死不治不赤黑不死不衰急斬之不則死矣黃帝曰夫子言癰疽何以別之歧伯曰營衛稽留於經脈之中則血泣而不行不行則衛氣從之而不通壅遏而不得行故熱大熱不止熱勝則肉腐肉腐則為膿然不能陷骨髓不為燋枯五藏不為傷故命曰癰黃帝曰何謂疽歧伯曰熱氣淳盛下陷肌膚筋髓枯內連五藏血氣竭當其癰下筋骨良肉皆無餘故命曰疽疽者上之皮夭以堅上如牛領之皮癰者其皮上薄以澤此其候也
