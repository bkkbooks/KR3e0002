body:
  text: 動輸第六十二動輸第六十二黃帝曰經脈十二而手太陰足少陰陽明獨動不休何也歧伯曰是明胃脈也胃為五藏六府之海其清氣上注于肺肺氣從太陰而行之其行也以息往來故人一呼脈再動一吸脈亦再動呼吸不已故動而不止黃帝曰氣之過于寸口也上十焉息下八焉伏何道從還不知其極歧伯曰氣之離藏也卒然如弓弩之發如水之下岸上于魚以反衰其餘氣衰散以逆上故其行微黃帝曰足之陽明何因而動歧伯曰胃氣上注于肺其悍氣上衝頭者循咽上走空竅循眼系入絡腦出顑下客主人循牙車合陽明并下人迎此胃氣別走于陽明者也故陰陽上下其動也若一故陽病而陽脈小者為逆陰病而陰脈大者為逆故陰陽俱靜俱動若引繩相傾者病黃帝曰足少陰何因而動歧伯曰衝脈者十二經之海也與少陰之大絡起于腎下出于氣街循陰股內廉邪入膕中循脛骨內廉並少陰之經下入內踝之後入足下其別者邪入踝出屬跗上入大指之間注諸絡以溫足脛此脈之常動者也黃帝曰營衛之行也上下相貫如環之無端今有其卒然遇邪氣及逢大寒手足懈惰其脈陰陽之道相輸之會行相失也氣何由還歧伯曰夫四末陰陽之會者此氣之大絡也四街者氣之徑路也故絡絶則徑通四末解則氣從合相輸如環黃帝曰善此所謂如環無端莫知其紀終而復始此之謂也
