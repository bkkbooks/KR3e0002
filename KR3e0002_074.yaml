body:
  text: 論疾診尺第七十四論疾診尺第七十四黃帝問于歧伯曰余欲無視色持脈獨調其尺以言其病從外知內為之奈何歧伯曰審其尺之緩急小大滑澀肉之堅脆而病形定矣視人之目窠上微癰如新臥起狀其頸脈動時咳按其手足上窅而不起者風水膚脹也尺膚滑其淖澤者風也尺肉弱者解㑊安臥脫肉者寒熱不治尺膚滑而澤脂者風也尺膚澀者風痺也尺膚粗如枯魚之鱗者水泆飲也尺膚熱甚脈盛躁者病溫也其脈盛而滑者病且出也尺膚寒其脈小者泄少氣尺膚炬然先熱後寒者寒熱也尺膚先寒久大之而熱者亦寒熱也肘所獨熱者腰以上熱手所獨熱者腰以下熱肘前獨熱者膺前熱肘後獨熱者肩背熱臂中獨熱者腰腹熱肘後粗以下三四寸熱者腸中有蟲掌中熱者腹中熱掌中寒者腹中寒魚上白肉有青血脈者胃中有寒尺炬然熱人迎大者當奪血尺堅大脈小甚少氣悗有加立死目赤色者病在心白在肺青在肝黃在脾黑在腎黃色不可名者病在胸中診目痛赤脈從上下者太陽病從下上者陽明病從外走內者少陽病診寒熱赤脈上下至瞳子見一脈一歲死見一脈半一歲半死見二脈二歲死見二脈半二歲半死見三脈三歲死診齲齒痛按其陽之來有過者獨熱在右右熱在左左熱在上上熱在下下熱診血脈者多赤多熱多青多痛多黑為久痺多赤多黑多青皆見者寒熱身痛而色微黃齒垢黃爪甲上黃黃疸也安臥小便黃赤脈小而澀者不嗜食人病其寸口之脈與人迎之脈小大等及其浮沉等者病難已也女子手少陰脈動甚者妊子嬰兒病其頭毛皆逆上者必死耳間青脈起者掣痛大便赤辦飧泄脈小者手足寒難已飧泄脈小手足溫泄易已四時之變寒暑之勝重陰必陽重陽必陰故陰主寒陽主熱故寒甚則熱熱甚則寒故曰寒生熱熱生寒此陰陽之變也故曰冬傷於寒春生疸熱春傷於風夏生飧泄腸澼夏傷於暑秋生痎瘧秋傷於濕冬生咳嗽是謂四時之序也
