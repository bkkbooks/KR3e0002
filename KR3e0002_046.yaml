body:
  text: 五變第四十六五變第四十六黃帝問于少俞曰余聞百疾之始期也必生于風雨寒暑循毫毛而入腠理或復還或留止或為風腫汗出或為消癉或為寒熱或為留癉或為積聚奇邪淫溢不可勝數願聞其故夫同時得病或病此或病彼意者天之為人生風乎何其異也少俞曰夫天之生風者非以私百姓也其行公平正直犯者得之避者得無殆非求人而人自犯之黃帝曰一時遇風同時得病其病各異願聞其故少俞曰善乎哉問請論以比匠人匠人磨斧斤礪刀削斲材木木之陰陽尚有堅脆堅者不入脆者皮弛至其交節而缺斤斧焉夫一木之中堅脆不同堅者則剛脆者易傷況其材木之不同皮之厚薄汁之多少而各異耶夫木之蚤花先生葉者遇春霜烈風則花落而葉萎久曝大旱則脆木薄皮者枝條汁少而葉萎久陰淫雨則薄皮多汁者皮潰而漉卒風暴起則剛脆之木枝折杌傷秋霜疾風則剛脆之木根搖而葉落凡此五者各有所傷況於人乎黃帝曰以人應木奈何少俞荅曰木之所傷也皆傷其枝枝之剛脆而堅未成傷也人之有常病也亦因其骨節皮膚腠理之不堅固者邪之所舍也故常為病也黃帝曰人之善病風厥漉汗者何以候之少俞荅曰肉不堅腠理踈則善病風黃帝曰何以候肉之不堅也少俞荅曰膕肉不堅而無分理理者麤理麤理而皮不緻者腠理踈此言其渾然者黃帝曰人之善病消癉者何以候之少俞荅曰五藏皆柔弱者善病消癉黃帝曰何以知五藏之柔弱也少俞荅曰夫柔弱者必有剛強剛強多怒柔者易傷也黃帝曰何以候柔弱之與剛強少俞荅曰此人薄皮膚而目堅固以深者長衝直揚其心剛剛則多怒怒則氣上逆胸中畜積血氣逆留臗皮充肌血脈不行轉而為熱熱則消肌膚故為消癉此言其人暴剛而肌肉弱者也黃帝曰人之善病寒熱者何以候之少俞荅曰小骨弱肉者善病寒熱黃帝曰何以候骨之小大肉之堅脆色之不一也少俞荅曰顴骨者骨之本也顴大則骨大顴小則骨小皮膚薄而其肉無䐃其臂懦懦然其地色殆然不與其天同色污然獨異此其候也然後臂薄者其髓不滿故善病寒熱也黃帝曰何以候人之善病痺者少俞荅曰麤理而肉不堅者善病痺黃帝曰痺之高下有處乎少俞荅曰欲知其高下者各視其部黃帝曰人之善病腸中積聚者何以候之少俞荅曰皮膚薄而不澤肉不堅而淖澤如此則腸胃惡惡則邪氣留止積聚乃傷脾胃之間寒溫不次邪氣稍至蓄積留止大聚乃起黃帝曰余聞病形已知之矣願聞其時少俞荅曰先立其年以知其時時高則起時下則殆雖不陷下當年有衝通其病必起是謂因形而生病五變之紀也
