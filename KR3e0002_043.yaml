body:
  text: 淫邪發夢第四十三淫邪發夢第四十三黃帝曰願聞淫邪泮衍奈何歧伯曰正邪從外襲內而未有定舍反淫于藏不得定處與營衛俱行而與魂魄飛揚使人臥不得安而喜夢氣淫于府則有餘于外不足于內氣淫于藏則有餘于內不足于外黃帝曰有餘不足有形乎歧伯曰陰氣盛則夢涉大水而恐懼陽氣盛則夢大火而燔焫陰陽俱盛則夢相殺上盛則夢飛下盛則夢墮甚飢則夢取甚飽則夢豫肝氣盛則夢怒肺氣盛則夢恐懼哭泣飛揚心氣盛則夢善笑恐畏脾氣盛則夢歌樂身體重不舉腎氣盛則夢腰脊兩解不屬凡此十二盛者至而寫之立已厥氣客于心則夢見丘山煙火客于肺則夢飛揚見金鐵之奇物客于肝則夢山林樹木客于脾則夢見丘陵大澤壞屋風雨客于腎則夢臨淵沒居水中客于膀胱則夢遊行客于胃則夢飲食客于大腸則夢田野客于小腸則夢聚邑衝衢客于膽則夢鬭訟自刳客于陰器則夢接內客于項則夢斬首客于脛則夢行走而不能前及居深地窖苑中客于股肱則夢禮節拜起客于胞䐈則夢溲便凡此十五不足者至而補之立已也
