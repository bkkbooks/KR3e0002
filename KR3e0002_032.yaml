body:
  text: 平人絶穀第三十二平人絶穀第三十二黃帝曰願聞人之不食七日而死何也伯高曰臣請言其故胃大一尺五寸徑五寸長二尺六寸橫屈受水穀三斗五升其中之穀常留二斗水一斗五升而滿上焦泄氣出其精微慓悍滑疾下焦下溉諸腸小腸大二寸半徑八分分之少半長三丈二尺受穀二斗四升水六升三合合之大半回腸大四寸徑一寸寸之少半長二丈一尺受穀一斗水七升半廣腸大八寸徑二寸寸之大半長二尺八寸受穀九升三合八分合之一腸胃之長凡五丈八尺四寸受水穀九斗二升一合合之大半此腸胃所受水穀之數也平人則不然胃滿則腸虛腸滿則胃虛更虛更滿故氣得上下五藏安定血脈和利精神乃居故神者水穀之精氣也故腸胃之中當留穀二斗水一斗五升故平人日再後後二升半一日中五升七日五七三斗五升而留水穀盡矣故平人不食飲七日而死者水穀精氣津液皆盡故也
