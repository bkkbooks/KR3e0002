  - {type: variant, offset: 351, length: 0, content: '', WYG: 於寸口如何而脹歧伯曰其脉大堅以濇者脹也黃帝曰何以知藏府之脹也歧伯曰隂為藏陽為府黃帝曰夫氣之令人脹也在於血脉之中耶藏府之内乎歧伯曰三一云二字者皆存焉然非脹之舎也黃帝曰願聞脹之舍歧伯曰夫脹者皆在於藏府之外排藏府而郭胷脇脹皮膚故命曰脹黃帝曰藏府之在胷脇腹裏之内也若匣匱之藏禁器也各有次舎異名而同處一域之中其氣各異願聞其故黃帝曰未解其意再問歧伯曰夫胷腹藏府之郭也膻中者心主之宫城也胃者大倉也咽喉小腸者傳送也胃之五竅者閭里門户也亷泉玊英者津液之道也故五藏六府者各有畔界其病各有形狀營氣循脉衛氣逆為脉脹衛氣並脉循分為膚脹三里而寫近者一下逺者三下無問虛實工在疾寫黃帝曰願聞脹形歧伯曰夫心脹者煩心短氣臥不安肺脹者虛滿而喘欬肝脹者脇下滿而痛引小腹脾脹者善噦四肢煩悗體重不能勝衣臥不安腎脹者腹滿引背央央然腰髀痛六府脹胃脹者腹滿胃脘痛鼻聞焦臭妨於食大便難大腸脹者腸鳴而痛濯濯冬日重感於寒則飱泄不化小腸脹者少腹䐜脹引腰而痛膀胱脹者少腹滿而氣癃三焦脹者氣滿於皮膚中輕輕然而不堅膽脹者脇下痛脹口中苦善太息凡此諸脹者其道在一明知逆順針數不失寫虛補實神去其室致邪失正眞不可定粗之所敗謂之夭命補虛寫實神歸其室乆塞其空謂之良工黃帝曰脹者焉生何因而有歧伯曰衛氣之在身也常然並脉循分肉行有逆順隂陽相隨乃得天和五藏更始四時有序五糓乃化然後厥氣在下營衛留止寒氣逆上真邪相攻兩氣相摶乃合為脹也黃帝曰善何以解惑歧伯曰合之於眞三合而得帝曰善黃帝問於歧伯曰脹論言無間虛實工在疾寫近者一下逺者三下今有其三而下下者其過焉在歧伯對曰此言䧟於肉肓而中氣宂者也不中氣宂則氣内閉針不䧟肓則氣不行上越中肉則衛氣相亂隂陽相逐其於脹也當寫不寫氣故不下三而不下必更其道氣下乃止不下復始可以萬全烏有殆者乎其於脹也必審其脈當寫則寫當補則補如鼓應桴惡有不下者乎五癃津液别第三十六黃帝問於歧伯曰水糓入於口輸於腸胃其液别為五天寒衣薄則為溺與氣天熱衣厚則為汗悲哀氣并則為泣中熱胃緩則為唾邪氣内逆則氣為之閉塞而不行不行則為水脹余知其然也不知其何由生願聞其道歧伯曰水糓皆入於口其味有五各注其海津液各走其道故三焦出氣以温肌肉充皮膚為其津其流而不行者為液天暑衣厚則腠理開故汗出寒留於分肉之間聚沫則為痛天寒則腠理閉氣濕不行水下留於膀胱則為溺與氣五藏六府心為之主耳為之聽目為之候肺為之相肝為之將脾為之衛腎為之主外故五藏六府之津液盡上渗於目心悲氣并則心系急心系急則肺舉肺舉則液上溢夫心系與肺不能常舉乍上乍下故欬而泣出矣中熱則胃中消糓消糓則蟲上下作腸胃充郭故胃緩胃緩則氣逆故唾出五糓之津液和合而為高者内渗入於骨空補益腦髓而下流於隂股隂陽不和則使液溢而下流於隂髓液皆減而下下過度則虛虛故腰背痛而脛痠隂陽氣道不通四海閉塞三焦不寫津液不化水糓并行腸胃之中别於迴腸留於下焦不得渗膀胱則下焦脹水溢則為水脹此津液五别之順逆也五閱五使第三十七黃帝問於歧伯曰余聞刺有五官五閲以觀五氣五氣者五藏之使也五時之副也願聞其五使當安出歧伯曰五官者五藏之閱也黃帝曰願聞其所出令可為常歧伯曰脉出於氣口色見於明堂五色更出以應五時各如其常經氣入藏必當治裏帝曰善五色獨决於明堂乎歧伯曰五官己辨闕庭必張乃立明堂明堂廣大蕃蔽見外方垂高基引垂居外五色乃治平𫝊廣大壽中百嵗見此者刺之必已如是之人者血氣有餘肌肉堅緻故可苦已針黃帝曰願聞五官歧伯曰鼻者肺之官也目者肝之官也口唇者脾之官也舌者心之官也耳者腎之官也黃帝曰以官何候歧伯曰以候五藏故肺病者喘息鼻脹肝病者􅗃青脾病者唇黃心病者舌巻短顴赤腎病者顴與頄黒黄帝曰五脉安出五色安見其常色殆者如何歧伯曰五官不辨闕庭不張小其明堂蕃蔽不見又埤其墻墻下無基垂角去外如是者雖平常殆况加疾哉黃帝曰五色之見於明堂以觀五藏之氣左右高下各有形乎歧伯曰府藏之在中也各以次舎左右上下各如其度也緻池利切宻也逆順肥瘦第三十八黃帝問於歧伯曰余聞鍼道於夫子衆多畢悉矣夫子之道應若失而㨿未有堅然者也夫子之問學熟乎將審察於物而心生之乎歧伯曰聖人之為道者上合於天下合於地中合於人事必有明法以起度數法式檢押乃後可傳焉故匠人不能釋尺寸而意短長廢繩墨而起平水也工人不能置規而為貟去矩而為方知用此者固自然之物易用之教逆順之常也黃帝曰願聞自然奈何歧伯曰臨深泱水不用功力而水可竭也循掘決衝而經可通也此言氣之滑澁血之清濁行之逆順也黃帝曰願聞人之白黒肥瘦小長各有數乎歧伯曰年質壯大血氣充盈膚革堅固因加以邪刺此者深而留之此肥人也廣肩腋項肉薄厚皮而黒色唇臨臨然其血黒以濁其氣濇以遲其為人也貪於取與刺此者深而留之多益其數}
