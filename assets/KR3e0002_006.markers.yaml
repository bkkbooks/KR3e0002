  - {type: variant, offset: 5, length: 0, content: '', SBCK: 三十一黃帝問于伯高曰余願聞}
  - {type: variant, offset: 5, length: 7, content: 六壽夭剛柔第六, WYG: 二十九黄帝曰余聞先師有所心藏弗著於方余願聞而藏之則而行之上以治民下以治身使百姓無病上下和親德澤下流子孫無憂傳於後世無有終時可得聞乎歧伯曰逺乎哉問也夫治民與自治治彼與治此治小與治大治國與治家未有逆而能治之也夫惟順而已矣順者非獨隂陽脉論氣之逆順也百姓人民皆欲順其志也}
