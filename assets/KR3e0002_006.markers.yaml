  - {type: variant, offset: 563, length: 1, content: 脈, SBCK: 不寫者其血黒以濁故不能射新飲而液渗于絡而未合和于血也故血出而汁别焉其不新飲者身中有水乆則為腫隂氣積于陽其氣因于絡故刺之血未出而氣先行故腫隂陽之氣其新相得而未和合因而寫之則隂陽俱脫表裏相離故脫色而蒼蒼然刺之血出多色不變而煩悗者刺絡而虛經虛經之屬于隂者隂脫故煩悗隂陽相得而合為痺者此為内溢于經外注于絡如是者隂陽俱有餘雖多出血而弗能虛也黃帝曰相之奈何歧伯曰血脉者盛}
