  - {type: variant, offset: 16, length: 2, content: 少師, WYG: 面者余已知之矣以肢節知而閱之奈何歧伯曰五藏六府者肺為之葢巨肩陷咽候見其外黃帝曰善歧伯曰五藏六府心為之主缺盆為之道䯏骨有餘以候􅐳􅚯黃帝曰善歧伯曰肝者主為將使之候外欲知堅固視目大小黃帝曰善歧伯曰脾者主為衛使之迎糧視唇舌好惡以知吉㐫黃帝曰善歧伯曰腎者主為外使之逺聽視耳好惡以知其性黃帝曰善願聞六府之候歧伯曰六府者胃為之海廣骸大頸張胷五糓乃容鼻隧以長以候大腸唇厚人中長以候小腸目下果大其膽乃横鼻孔在外膀胱漏泄鼻柱中央起三焦乃約此所以候六府者也上下三等藏安且良矣便平聲决氣第三十黃帝}
