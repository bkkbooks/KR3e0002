  front:
  - {type: variant, offset: 0, length: 1, content: 壽, SBCK: 黃帝素問靈樞經卷之六師傳第二十九黄帝曰余聞先師有所心藏弗著于方余願聞而藏之則而行之上以治民下以治身使百姓無病上下和親德澤下流子孫無憂傳于後世無有終時可得聞乎歧伯曰逺乎哉問也夫治民與自治治彼與治此治小與治大治國與治家未有逆而能治之也夫惟順而已矣順者非獨隂陽脉論氣之逆順也百姓人民皆欲順其志也黃帝曰順之奈何歧伯曰入國問俗入家問諱上堂問禮臨病人問所便黃帝曰便病人奈何歧伯曰夫中熱消癉則便寒寒中之屬則便熱胃中熱則消榖令人縣心養饑臍以上皮熱腸中熱則出黃如糜臍以下皮寒胃中寒則腹脹腸中寒則腸鳴飱泄胃中寒腸中熱則脹而且泄胃中熱腸中寒則疾饑小腹痛脹黃帝曰胃欲寒饑腸欲熱飲兩者相逆便之奈何且夫王公大人血食之君驕恣從欲輕人而無能禁之禁之則逆其志順之則加其病便之奈何治之何先歧伯曰人之情莫不惡死而樂生告之以其敗語之以其善導之以其所便開之以其所苦雖有無道之人惡有不聽者乎黃帝曰治之奈何歧伯曰春夏先治其標後治其本秋冬先治其本後治其標黃帝曰便其相逆者奈何歧伯曰便此者食飲衣服亦欲適寒温寒無凄愴暑無出汗食飲者熱無灼灼寒無滄滄寒温中適故氣將持乃不致邪僻也黃帝曰本藏以身形支節䐃肉􅀱五藏六府之小大焉今夫王公大人臨朝即位之君而問焉誰可捫循之而後答乎歧伯曰身形支節者藏府之蓋也非面部之閱也黃帝曰五藏之氣閲于面者余已知之矣以肢節知而閱之奈何歧伯曰五藏六府者肺為之蓋巨肩䧟咽􅀱見其外黃帝曰善歧伯曰五藏六府心為之主缺盆為之道骷骨有餘以候􅐳􅚯黃帝曰善歧伯曰肝者主為將使之􅀱外欲知堅固視目大小黃帝曰善歧伯曰脾者主為衛使之迎糧視脣舌好惡以知吉凶黃帝曰善歧伯曰腎者主為外使之逺聽視耳好惡以知其性黃帝曰善願聞六府之􅀱歧伯曰六府者胃為之海廣骸大頸張胷五榖乃容鼻隧以長以􅀱大腸脣厚人中長以􅀱小腸目下果大其膽乃横鼻孔在外膀胱漏泄鼻柱中央起三焦乃約此所以􅀱六府者也上下三等藏安且良矣便平聲决氣第三十黃帝曰余聞人有精氣津液血脉余意以為一氣耳今乃辨為六名余不知其所以然歧伯曰兩神相搏合而成形常先身生是謂精何謂氣歧伯曰上焦開發宣五榖味熏膚充身澤毛若霧露之漑是謂氣何謂津歧伯曰腠理發泄汗出溱溱是謂津何謂液歧伯曰榖入氣滿淖澤注于骨骨屬屈伸洩澤補益腦髓皮膚潤澤是謂液何謂血歧伯曰中焦受氣取汁變化而赤是謂血何謂脉歧伯曰壅遏營氣令無所避是謂脉黃帝曰六氣者有餘不足氣之多少腦髓之虛實血脉之清濁何以知之歧伯曰精脫者耳聾氣脫者目不明津脫者腠理開汗大泄液脫者骨屬屈伸不利色}
