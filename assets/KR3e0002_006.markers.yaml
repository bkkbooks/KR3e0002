  - {type: variant, offset: 314, length: 2, content: 寒傷, WYG: 府黃帝曰凡此四海者何利何害何生何敗歧伯曰得順者生得逆者敗知調者利不知調者害黃帝曰四海之逆順奈何歧伯曰氣海有餘者氣滿胷中悗息面赤氣海不足則氣少不足以言血海有餘則常想其身大怫然不知其所病血海不足亦常想其身小狹然不知其所病水糓之海有餘則腹滿水糓之海不足則饑不受糓食髓海有餘則輕勁多力自過其度髓海不足則腦轉耳鳴脛痠眩胃目無所見懈怠安臥黃帝曰余已聞逆順調之奈何歧伯曰審守其輸而調其虛實無犯其害順者得復逆者必敗黃帝曰善五亂第三十四黃帝曰經脉十二者别為五行分為四時何失而亂何得而治歧伯曰五行有序四時有分相順則治相逆則亂黃帝曰何謂相順歧伯曰經脉十有二者以應十二月十二月者分為四時四時者春秋冬夏其氣各異營衛相隨隂陽已和清濁不相干如是則順之而治黃帝曰何謂逆而亂歧伯曰清氣在隂濁氣在陽營氣順脉衛氣逆行清濁相干亂於胷中是謂大悗故氣亂於心則煩心宻嘿俛首靜伏亂於肺則俛仰喘喝接手以呼亂於腸胃則為霍亂亂於臂脛則為四厥亂於頭則為厥逆頭重眩仆黃帝曰五亂者刺之有道乎歧伯曰有道以來有道以去審知其道是謂身寳黃帝曰善願聞其道歧伯曰氣在於心者取之手少隂心主之輸氣在於肺者取之手太隂榮足少隂輸氣在於腸胃者取之足太隂陽明不下者取之三里氣在於頭者取之天柱大杼不知取足太陽榮輸氣在於臂足取之先去血脉後取其陽明少陽之榮輸黃帝曰補寫奈何歧伯曰徐入徐出謂之導氣補寫無}
