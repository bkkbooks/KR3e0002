  - {type: variant, offset: 313, length: 9, content: 風寒傷形憂恐忿怒傷, SBCK: 臨深決水不用功力而水可竭也循掘決衝而經可通也此言}
  - {type: variant, offset: 313, length: 0, content: '', WYG: 請盡言之糓所從出入淺深逺近長短之度脣至齒長九分口廣二寸半齒以後至㑹厭深三寸半大容五合舌重十兩長七寸廣二寸半咽門重十兩廣一寸半至胃長一尺六寸胃䊸曲屈伸之長二尺六寸大一尺五寸徑五寸大容三升五升小腸後附脊左環廻周叠積其注於廻腸者外附于臍上迴運環十六曲大二寸半徑八分分之少半長三丈四尺迴腸當臍左環迴周葉積而下迴運環反十六曲大四寸徑一寸寸之少半長二丈一尺廣腸傳􅆃以受迴腸左環葉積上下辟大八寸徑二寸寸之大半長二尺八寸腸胃所入至所出長六丈四寸四分迴曲環反三十二曲也平人絶糓第三十二黃帝曰願聞人之不食七日而死何也伯髙曰臣請言其故胃大一尺五寸徑五寸長二尺六寸横屈受水糓三斗五升其中之糓常留二斗水一斗五升而滿上焦泄氣出其精微慓悍滑疾下焦下漑諸腸小腸大二寸半徑八分分之少半長三丈二尺受糓二斗四升水六升三合合之大半迴腸大四寸徑一寸寸之少半長二丈一尺受糓一斗水七升半廣腸大八寸徑二寸寸之大半長二尺八寸受糓九升三合八分合之一腸胃之長凡五丈八尺四寸受水糓九斗二升一合合之大半此腸胃所受水糓之數也平人則不然胃滿則腸虛腸滿則胃虛更虛更滿故氣得上下五藏安定血脉和利精神乃居故神者水糓之精氣也故腸胃之中當留糓二斗水一斗五升故平人日再後後二升半一日中五升七日五七三斗五升而留水糓盡矣故平人不食飲七日而死者水糓精氣津液皆盡故也海論第三十三黃帝問於歧伯曰余聞刺法於夫子夫子之所言不離於營衛血氣夫十二經脉者内屬於府藏外絡於肢節夫子乃合之於四海乎歧伯答曰人亦有四海十二經水經水者皆注於海海有東西南北命曰四海黃帝曰以人應之奈何歧伯曰人有髓海有血海有氣海有水糓之海凡此四者以應四海也黃帝曰逺乎哉夫子之合人天地四海也願聞應之奈何歧伯答曰必先明知隂陽表裏滎輸所在四海定矣黃帝曰定之奈何歧伯曰胃者水糓之海其輸上在氣街下至三里衝脉者為十二經之海其輸上在於大杼下出於巨虛之上下亷膻中者為氣之海其輸上在於骨柱之上下前在於人迎腦為髓之海其輸上在于其葢下在}
