  - {type: variant, offset: 549, length: 0, content: '', SBCK: 歧伯曰血絡是也黃帝曰刺血絡而仆者何也血出而射者何也血少黒而濁者何也血出清而半為汁者何也發鍼而腫者何也血出若多若少而面色蒼蒼者何也發鍼而面色不變而煩悗者何也多出血而不動摇者何也願聞其故歧伯曰脉氣盛而血虛者刺之}
