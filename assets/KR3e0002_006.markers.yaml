  - {type: variant, offset: 2, length: 2, content: 剛柔, SBCK: 腦髓消脛痠耳數鳴血脫者色白夭然不澤其脉空虛此其􅀱也黃帝曰六氣者貴賤何如歧伯曰六氣者各有部主也其貴賤善惡可為常主然五榖與胃為大海也溱音臻腸胃}
  - {type: page-break, offset: 2, content: '', id: KR3e0002_SBCK_006-5a}
  - {type: variant, offset: 2, length: 2, content: 剛柔, krp: 腦髓消脛痠耳數鳴血脫者色白夭然不澤其脉空虛此其候也黃帝曰六氣者貴賤何如歧伯曰六氣者各有部主也其貴賤善惡可為常主然五榖與胃為大海也溱音臻腸胃}
