  - {type: variant, offset: 15, length: 0, content: '', WYG: 俗入家問諱上堂問禮臨病人問所便黃帝曰便病人奈何歧伯曰夫中熱消癉則便寒寒中之屬則便熱胃中熱則消糓令人縣心養饑臍以上皮熱腸中熱則出黃如糜臍以下皮寒胃中寒則腹脹腸中寒則腸鳴飱泄胃中寒腸中熱則脹而且泄胃中熱腸中寒則疾饑小腹痛脹黃帝曰胃欲寒饑腸欲熱飲兩者相逆便之奈何且夫王公大人血食之君驕恣從欲輕人而無能禁之禁之則逆其志順之則加其病便之奈何治之何先歧伯曰人之情莫不惡死而樂生告之以其敗語之以其善導之以其所便開之以其所苦雖有無道之人惡有不聽者乎黃帝曰治之奈何歧伯曰春夏先治其標後治其本秋冬先治其本後治其標黃帝曰便其相逆者奈何歧伯曰便此者食飲衣服亦欲適寒温寒無凄愴暑無出汗食飲者熱無灼灼寒無滄滄寒温中適故氣將持乃不致邪僻也黃帝曰本藏以身形支節䐃肉候五藏六府之小大焉今夫王公大人臨朝即位之君而問焉誰可捫循之而後答乎歧伯曰身形支節者藏府之葢也非面部之閱也黃帝曰五藏之氣閲}
