  - {type: 'tls:seg', offset: 6, content: '', id: KR3e0002_CHANT_006-1a.2}
  - {type: variant, offset: 6, length: 1, content: 壽, SBCK: 府傳榖者腸胃之大小長短受榖之多少奈何伯髙曰請盡言之榖所從出入淺深逺近長短之度脣至齒長九分口廣二寸半齒以後至㑹厭深三寸半大容五合舌重十兩長七寸廣二寸半咽門重十兩廣一寸半至胃長一尺六寸胃䊸曲屈伸之長二尺六寸大一尺五寸徑五寸大容三斗五升小腸後附脊左環廻周疊積其注于廻腸者外附于臍上迴運環十六曲大二寸半徑八分分之少半長三丈二尺迴腸當臍左環迴周葉積而下迴運環反十六曲大四寸徑一寸寸之少半長二丈一尺廣腸傳脊以受廻腸左環葉脊上下辟大八寸徑二寸寸之大半長二尺八寸腸胃所入至所出長六丈四寸四分迴曲環反三十二曲也平人絶榖第三十二黃帝曰願聞人之不食七日而死何也伯髙曰臣請言其故胃大一尺五寸徑五寸長二尺六寸横屈受水榖三斗五升其中之榖常留二斗水一斗五升而滿上焦泄氣出其精微慓悍滑疾下焦下漑諸腸小腸大二寸半徑八分分之少半長三丈二尺受榖二斗四升水六升三合合之大半迴腸大四寸徑一寸寸之少半長二丈一尺受榖一斗水七升半廣腸大八寸徑二寸寸之大半長二尺八寸受榖九升三合八分合之一腸胃之長凡五丈八尺四寸受水榖九斗二升一合合之大半此腸胃所受水榖之數也平人則不然胃滿則腸虛腸滿則胃虛更虛更滿故氣得上下五藏安定血脉和利精神乃居故神者水榖之精氣也故腸胃之中當留榖二斗水一斗五升故平人日再後後二升半一日中五升七日五七三斗五升而留水榖盡矣故平人不食飲七日而死者水榖精氣津液皆盡故也海論第三十三黃帝問于歧伯曰余聞刺法于夫子夫子之所言不離于營衛血氣夫十二經脉者内屬于府藏外絡于肢節夫子乃合之于四海乎歧伯答曰人亦有四海十二經水經水者皆注于海海有東西南北命曰四海黃帝曰以人應之奈何歧伯曰人有髓海有血海有氣海有水榖之海凡此四者以應四海也黃帝曰逺乎哉夫子之合人天地四海也願聞應之奈何歧伯答曰必先明知隂陽表裏滎輸所在四海定矣黃帝曰定之奈何歧伯曰胃者水榖之海其輸上在氣街下至三里衝脉者為十二經之海其輸上在于大杼下出于巨虛之上下亷膻中者為氣之海其輸上在于柱骨之上下前在于人迎腦為髓之海其輸上在于其蓋下在風府黃帝曰凡此四海者何利何害何生何敗歧伯曰得順者生得逆者敗知調者利不知調者害黃帝曰四海之逆順奈何歧伯曰氣海有餘者氣滿胷中悗息面赤氣海不足則氣少不足以言血海有餘則常想其身大怫然不知其所病血海不足亦常想其身小狹然不知其所病水榖之海有餘則腹滿水榖之海不足則饑不受榖食髓海有餘則輕勁多力自過其度髓海不足則腦轉耳鳴脛痠􅅭冒目無所見懈怠安臥黃帝曰余已聞逆順調之奈何歧伯曰審守其輸而調其虛實無犯其害順者得復逆者必敗黃帝曰善五亂第三十四黃帝曰經脉十二者别為五行分為四時何失而亂何得而治歧伯曰五行有序四時有分相順則治相逆則亂黃帝曰何謂相順歧伯曰經脉十二者以應十二月十二月者分為四時四時者春秋冬夏其氣各異營衛相隨隂陽已和清濁不相于如是則順之而治黃帝曰何謂逆而亂歧伯曰清氣在隂濁氣在陽營氣順脉衛氣逆行清濁相于亂于胷中是謂大悗故氣亂于心則煩心宻嘿俛首靜伏亂于肺則俛仰喘喝接手以呼亂于腸胃則為霍亂亂于臂脛則為四厥亂于頭則為厥逆頭重􅅭仆黃帝曰五亂者刺之有道乎歧伯曰有道以來有道以去審知其道是謂身寳黃帝曰善願聞其道歧伯曰氣在于心者取之手少隂心主之輸氣在於肺者取之手太隂滎足少隂輸氣在于腸胃者取之足太隂陽朙不下者取之三里氣在于頭者取之天柱大杼不知取足太陽滎輸氣在于臂足取之先去血脉後取其陽朙少陽之榮輸黃帝曰補寫奈何歧伯曰徐入徐出謂之導氣補寫無形謂之同精是非有餘不足也亂氣之相逆也黃帝曰允乎哉道明乎哉論請著之玉版命曰治亂也脹論第三十五黃帝曰脉之應于寸口如何而脹歧伯曰其脉大堅以濇者脹也黃帝曰何以知藏府之脹也歧伯曰隂為藏陽為府黃帝曰夫氣之令人脹也在于血脉之中耶藏府之内乎歧伯曰三二字一云者皆存焉然非脹之舎也黃帝曰願聞脹之舍歧伯曰夫脹者皆在于藏府之外排藏府而郭胷脇脹皮膚故命曰脹黃帝曰藏府之在胷脇腹裏之内也若匣匱之藏禁器也各有次舎異名而同處一域之中其氣各異願聞其故黃帝曰未解其意再問歧伯曰夫胷腹藏府之郭也膻中者心主之宫城也胃者太倉也咽喉小腸者傳送也胃之五竅者閭里門户也亷泉玊英者津液之道也故五藏六府者各有畔界其病各有形狀營氣循脉衛氣逆為脉脹衛氣並脉循分為膚脹三里而寫近者一下逺者三下無問虛實工在疾寫黃帝曰願聞脹形歧伯曰夫心脹者煩心短氣臥不安肺脹者虛滿而喘欬肝脹者脇下滿而痛引小腹脾脹者善噦四肢煩悗體重不能勝衣臥不安腎脹者腹滿引背央央然腰髀痛六府脹胃脹者腹滿胃脘痛鼻聞焦臭妨于食大便難大腸脹者腸鳴而痛濯濯冬日重感于寒則飱泄不化小腸脹者少腹䐜脹引腰而痛膀胱脹者少腹滿而氣癃三焦脹者氣滿于皮膚中輕輕然而不堅膽脹者脇下痛脹口中苦善太息凡此諸脹者其道在一明知逆順鍼數不失寫虛補實神去其室致邪失正眞不可定麤之所敗謂之}
