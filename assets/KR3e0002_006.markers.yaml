  - {type: variant, offset: 545, length: 3, content: 皮膚緩, SBCK: 驗之其非必動然後乃可明逆順之行也黃帝曰窘乎哉聖人之為道也明于日月微于毫釐其非夫子孰能道之也血絡論第三十九黃帝曰願聞其竒邪而不在經}
