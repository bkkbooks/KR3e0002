  - {type: variant, offset: 850, length: 2, content: 用鍼, WYG: 旦慧日中人氣長長則勝邪故晝安夕則人氣始衰邪氣始生故加夜半人氣入藏邪氣獨居于身故甚也黄帝曰其時有反者何也岐伯曰是不應四時之氣藏獨主其病者是必以藏氣之所不勝時者甚以其所勝時者起也黄帝曰治之奈何岐伯曰順天之時而病可與期順者為工逆者為粗黄帝曰善五聞刺有五變以主五輸願聞其數岐伯曰人有五藏五藏有五變五變有五輸故五五二十五輸以應五時黄帝曰願聞五變岐伯曰肝為牡藏其色青其時春其音角其味酸其日甲乙心為牡藏其色赤其時夏其日丙丁其音徵其味苦脾為牝藏其色黄其時長夏其日戊巳其音宫其味甘肺為牝藏其色白其音商其時秋其日庚辛其味辛腎為牝藏其色黒其時冬其日壬癸其音羽其味鹹是為五變黄帝曰以主五輸奈何藏主冬冬刺井色主春春刺榮時主夏夏刺輸音主長夏長夏刺經味主秋秋刺合是謂五變以主五輸黄帝曰諸原安合以致六輸岐伯曰原獨不應五時以經合之以應其數故六六三十六輸黄帝曰何謂藏主冬時主夏音主長夏味主秋色主春願聞其故岐伯曰病在藏者取之井病變于色者取之滎病時閒時甚者取之輸病變于音者取之經經滿而血者病在胃及以飲食不節得病者取之於合故命曰味主合是謂五變也外揣第四十五黄帝曰余聞九針九篇余親授其調頗得其意夫九針者始于一而終于九然未得其要道也夫九針者小之則無内大之則無外深不可為下高不可為蓋恍惚無窮流溢無極余知其合于天道人事四時之變也然余願雜之毫毛渾束為一可乎岐伯曰明乎哉問也非獨針道焉夫治國亦然黄帝曰余願聞針道非國事也岐伯曰夫治國者夫惟道焉非道何可小大深淺雜合而為一乎黄帝曰願卒聞之岐伯曰日與月焉水與鏡焉鼓與響焉夫日月之明不失其影水鏡之察不失其形鼓響之應不後其聲動摇則應和盡得其情黄帝曰窘乎哉昭昭之明不可蔽其不可蔽不失隂陽也合而察之切而騐之見而得之若清水明鏡之不失其形也五音不彰五色不明五藏波蕩若是則内外相襲若鼓之應桴響之應聲影之似形故逺者司外揣内近者司内揣外是謂隂陽之極天地之蓋請藏之靈蘭之室弗敢使泄也五變第四十六黄帝問于少俞曰余聞百疾之始期也必生于風雨寒暑循毫毛而入腠理或復還或留止或為風腫汗出或為消癉或為發熱或為留痺或為積聚奇邪淫溢不可勝數願聞其故夫同時得病或病此或病彼意者天之為人生風乎何其異也少俞曰夫天之生風者非以私百姓也其行公平正直犯者得之避者得無殆非求人而人自犯之黄帝曰一時遇風同時得病其病各異願聞其故少俞曰善乎哉問請論以比匠人匠人磨斧斤礪刀削斵材木木之隂陽尚有堅脆堅}
