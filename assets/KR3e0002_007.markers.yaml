  - {type: variant, offset: 855, length: 1, content: 年, krp: 其合于天道人事四時之變也然余願雜之毫毛渾束爲一可乎歧伯曰朙乎哉問也非獨鍼道焉夫治國亦然黄帝曰余願聞鍼道非國事也歧伯曰夫治國者夫惟道焉非道何可小大深淺雜合而為一乎黄帝曰願卒聞之歧伯曰日與月焉水與鏡焉鼓與響焉夫日月之朙不失其影水鏡之察不失其形鼓響之應不後其聲動摇則應和盡得其情黄帝曰窘乎哉昭昭之朙不可蔽其不可蔽不失隂陽也合而察之切而驗之見而得之若清水朙鏡之不失其形也五音不彰五色不朙五藏波蕩若是則内外相襲若鼓之應桴響之應聲影之似形故逺者司外揣内近者司内揣外是謂隂陽之極天地之蓋請藏之靈蘭之室弗敢使泄也五變第四十六黄帝問于少俞曰余聞百疾之始期也必生于風雨寒暑循毫毛而入腠理或復還或留止或為風腫汗出或為消癉或為寒熱或為留癉或為積聚奇邪淫溢不可勝數願聞其故夫同時得病或病此或病彼意者天之為人生風乎何其異也少俞曰夫天之生風者非以私百姓也其行公平正直犯者得之避者得無殆非求人而人自犯之黄帝曰一時遇風同時得病其病各異願聞其故少俞曰善乎哉問請論以比匠人匠人磨斧斤礪刀削斵材木木之隂陽尚有堅脆堅者不入脆者皮㢮至其交節而缺斤斧焉夫一木之中堅脆不同堅者則剛脆者易傷況其材本之不同皮之厚薄汁之多少而各異耶夫木之蚤花先生葉者遇春霜烈風則花落而葉萎久曝大旱則脆木薄皮者枝條汁少而葉萎久隂淫雨則薄皮多汁者皮潰而漉卒風㬥起則剛脆之木枝折杌傷秋霜疾風則剛脆之木根搖而葉落凡此五者各有所傷況於人乎黄帝曰以人應木奈何少俞荅曰木}
