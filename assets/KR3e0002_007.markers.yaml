  - {type: variant, offset: 868, length: 0, content: '', WYG: 黄帝曰余聞病形已知之矣願聞其時少俞答曰先立其年以知其時時高則起時下則殆雖不陷下當年有衝通其病必起是謂因形而生病五變之紀也臗寛杌兀漉鹿懦儒本藏第四十七黄帝問於岐伯曰人之血氣精神者所以奉生而周于性命者也經脈者所以行血氣而營隂陽濡筋骨利闗節者也衛氣者所以温分肉充皮膚肥腠理司闗闔者也志意者所以御精神収魂魄適寒温和喜怒者也是故血和則經脈流行營覆隂陽筋骨勁强闗節清利矣衛氣和則分肉解利皮膚調柔腠理緻密矣志意和則精神専直魂魄不散悔怒不起五藏不受邪矣寒温和則六府化榖風痺不作經脈通利肢節得安矣此人之常平也五藏者所以藏精神血氣魂魄者也六府者所以化水榖而行津液者也此人之所以具受于天也無愚智賢不肖無以相倚也然有其獨盡天壽而無邪僻之病百年不衰雖犯風雨卒寒大暑猶有弗能害也有其不離屏蔽室内無怵惕之恐然猶不免于病何也願聞其故岐伯對曰窘乎哉問也五藏者所以參天地副隂陽而連四時化五節者也五藏者固有大小高下堅脆端正偏傾者六府亦有大小長短厚薄結直緩急凡此二十五者各不同或善或惡或吉或凶請言其方心小則安邪不能傷易傷以憂心大則憂不能傷易傷于邪心高則滿于肺中悦而善忘難開以言心下則藏外易傷于寒易恐以言心堅則藏安守固心脆則善病消癉熱中心端正則和利難傷心偏傾則操持不一無守司也肺小則少飲不病喘喝肺大則多飲善病胷痺喉痺逆氣肺高則上氣肩息欬肺下則居賁迫肺善脇下痛肺堅則不病欬上氣肺脆則苦病消癉易傷肺端正則和利難傷肺偏傾則胷偏痛也肝小則藏安無脇下之病肝大則逼胃迫咽迫咽則苦膈中且脇下痛肝高則上支賁切脇悗為息賁肝下則逼胃脇下空脇下空則易受邪肝堅則藏安難傷肝脆則善病消癉易傷肝端正則和利難傷肝偏傾則脇下痛也脾小則藏安難傷于邪也脾大則苦湊䏚而痛不能疾行脾高則䏚引季脇而痛脾下則下加于大腸下加于大腸則藏苦受邪脾堅則藏安難傷脾脆則善病消癉易傷脾端正則和利難傷脾偏傾則善滿善脹也腎小則藏安難傷腎大則善病腰痛不可以俛仰易傷以邪腎高則苦背膂痛不可以俛仰腎下則腰尻痛不可以俛仰為狐疝腎堅則不病腰背痛腎脆則苦病消癉易傷腎端正則和利難傷腎偏傾則苦腰尻痛也凡此二十五變者人之所苦常病黄帝曰何以知其然也岐伯曰赤色小理者心小粗理者心大無􅐳􅚯者心高􅐳􅚯小短舉者心下􅐳􅚯長者心堅􅐳􅚯弱小以薄者心脆􅐳􅚯直下不舉者心端正􅐳􅚯倚一方者心偏傾也白色小理者肺小粗理者肺大巨肩反膺陷喉者肺高合腋張脇者肺下好肩背厚者肺堅肩背薄者肺脆背膺厚者肺端正脇偏疎者肺偏傾也青色小理者肝小粗理者肝大廣胷反骹者肝高合脇兔骹者肝下胷脇好者肝堅脇骨弱者肝脆膺腹好相得者肝端正脇骨偏舉者肝偏傾也黄色小理者脾小粗理者脾大掲唇者脾高唇下縱者脾下唇堅者脾堅唇大而不堅者脾脆唇上下好者脾端正唇偏舉者脾偏傾也黒色小理者腎小粗理者腎大高耳者腎高耳後陷者腎下耳堅者腎堅耳薄不堅者腎脆耳好前居牙車者腎端正耳偏高者腎偏傾也凡此諸變者持則安减則病也帝曰善然非余之所問也願聞人之有不可病者至盡夭壽雖有深憂大恐怵惕之志猶不能減也甚寒大熱不能傷也其有不離屏蔽室内又無怵惕之恐然不免于病者何也願聞其故岐伯曰五藏六府邪之舍也請言其故五藏皆小者少病苦燋心大愁憂五藏皆大者緩于事難使以憂五藏皆高者好高舉措五藏皆下者好出人下五藏皆堅者無病五藏皆脆者不離于病五藏皆端正者和利得人心五藏皆偏傾者邪心而善盜}
