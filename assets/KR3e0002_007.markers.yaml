  - {type: variant, offset: 586, length: 259, content: 以治氣盛而熱者也八曰短刺短刺者刺骨痺稍搖而深之致鍼骨所以上下摩骨也九曰浮刺浮刺者傍入而浮之以治肌急而寒者也十曰陰刺陰刺者左右率刺之以治寒厥中寒厥足踝後少陰也十一曰傍鍼刺傍鍼刺者直刺傍刺各一以治留痺久居者也十二曰贊刺贊刺者直入直出數發鍼而淺之出血是謂治癰腫也脈之所居深不見者刺之微內鍼而久留之以致其空脈氣也脈淺者勿刺按絕其脈乃刺之無令精出獨出其邪氣耳所謂三刺則穀氣出者先淺刺絕皮以出陽邪再刺則陰邪出者少益深絕皮致肌肉未入分肉間也已入分肉之間則穀氣出故刺法曰始刺淺之以逐邪氣而來血氣後刺深之以致陰氣之邪最後刺極深之以下穀氣, SBCK: 可萬}
