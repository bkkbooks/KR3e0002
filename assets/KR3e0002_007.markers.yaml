  - {type: variant, offset: 867, length: 0, content: '', SBCK: 舍也故常為病也黄帝曰人之善病風厥漉汗者何以􅀱之少俞荅曰肉不堅腠理踈則善病風黄帝曰何以候肉之不堅也少俞荅曰膕肉不堅而無分理理者麤理麤理而皮不緻者腠理踈此言其渾然者黄帝曰人之善病消癉者何以候之少俞荅曰五藏皆柔弱者善病消癉黄帝曰何以知五藏之柔弱也少俞荅曰夫柔弱者必有剛强剛强多怒柔者易傷也黄帝曰何以候柔弱之與剛强少俞荅曰此人薄皮膚而目堅固以深者長衝直􅀭其心剛剛則多怒怒則氣上逆胷中畜積血氣逆留臗皮充肌血脉不行轉而爲熱熱則消肌膚故爲消癉此言其人㬥剛而肌肉弱者也黄帝曰人之善病寒熱者何以候之少俞荅曰小骨弱肉者善病寒熱黄帝曰何以候骨之小大肉之堅脆色之不一也少俞荅曰顴骨者骨之本也顴大則骨大顴小則骨小皮膚薄而其肉無䐃其臂懦懦然其地色殆然不與其天同色汚然獨異此其候也然後臂薄者其髓不滿故善病寒熱也黄帝曰何以候人之善病痺者少俞荅曰麤理而肉不堅者善病痺黄帝曰痺之高下有處乎少俞荅曰欲知其高下者各視其部黄帝曰人之善病腸中積聚者何以候之少俞荅曰皮膚薄而不澤肉不堅而淖澤如此則腸胃惡惡則邪氣留止積聚乃傷脾胃之間寒温不次邪氣稍至稸積留止大聚乃}
