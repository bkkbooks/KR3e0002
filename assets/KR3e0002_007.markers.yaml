  - {type: variant, offset: 19, length: 368, content: 宜各有所為長短大小各有所施也不得其用病弗能移疾淺鍼深內傷良肉皮膚為癰病深鍼淺病氣不寫反為大膿病小鍼大氣寫太甚疾必為害病大鍼小氣不泄寫亦復為敗失鍼之宜大者寫小者不移已言其過請言其所施病在皮膚無常處者取以鑱鍼于病所膚白勿取病在分肉間取以員鍼于病所病在經絡痼痺者取以鋒鍼病在脈氣少當補之者取以鍉鍼于井滎分輸病為大膿者取以鈹鍼病痺氣暴發者取以員利鍼病痺氣痛而不去者取以毫鍼病在中者取以長鍼病水腫不能通關節者取以大鍼病在五藏固居者取以鋒鍼寫于井滎分輸取以四時凡刺有九日應九變一曰輸刺輸刺者刺諸經滎輸藏腧也二曰遠道刺遠道刺者病在上取之下刺府腧也三曰經刺經刺者刺大經之結絡經分也四曰絡刺絡刺者刺小絡之血脈也五曰分刺分刺者刺分肉之間也六曰大寫刺大寫刺者刺大膿以鈹鍼也七曰毛刺毛刺者刺浮痺皮膚也八曰巨刺巨刺者左取右右取左九曰焠刺焠刺者刺燔鍼則取痺也凡刺有, SBCK: ''}
