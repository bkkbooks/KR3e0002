  - {type: variant, offset: 849, length: 0, content: '', krp: 病傳第四十二黄帝曰余受九鍼于夫子而私覽于諸方或有導引行氣喬摩灸熨刺焫飲藥之一者可獨守耶將盡行之乎歧伯曰諸方者衆人之方也非一人之所盡行也黄帝曰此乃所謂守一勿失萬物畢者也今余已聞隂陽之要虚實之理傾移之過可治之屬願聞病之變化淫傳絶敗而不可治者可得聞乎歧伯曰要乎哉問道昭乎其如日醒窘乎其如夜暝能被而服之神與俱成畢將服之神自得之生神之理可著于竹帛不可傳于子孫黄帝曰何謂日醒歧伯曰朙于隂陽如惑之解如醉之醒黄帝曰何謂夜瞑歧伯曰瘖乎其無聲漠乎其無形折毛發理正氣横傾淫邪泮衍血脉傳溜大氣入藏腹痛下淫可以致死不可以致生黄帝曰大氣入藏柰何歧伯曰病先發于心一日而之肺三日而之肝五日而之脾三日不已死冬夜半夏日中病先發于肺三日而之肝一日而之脾五日而之胃十日不已死冬日入夏日出病先發于肝三日而之脾五日而之胃三日而之腎三日不已死冬日入夏蚤食病先發于脾一日而之胃二日而之腎三日而之膂膀胱十日不已死冬人定夏晏食病先發于胃五日而之腎三日而之膂膀胱五日而上之心二日不已死冬夜半夏日昳病先發于腎三日而之膂膀胱三日而上之心三日而之小腸三日不已死冬大晨夏早晡病先發于膀胱五日而之腎一日而之小腸一日而之心二日不已死冬雞鳴夏下晡諸病以次相傳如是者皆有死期不可刺也間一藏及二三四藏者乃可刺也昳切徒結淫邪發夢第四十三黄帝曰願聞淫邪泮衍奈何歧伯曰正邪從外襲内而未有定舍反淫于藏不得定處與營衛俱行而與魂魄飛揚使人臥不得安而喜夢氣淫于府則有餘于外不足于内氣淫于藏則有餘于内不足于外黄帝曰有餘不足有形乎歧伯曰隂氣盛則夢渉大水而恐懼陽氣盛則夢大火而燔焫隂陽俱盛則夢相殺上盛則夢飛下盛則夢墮甚饑則夢取甚飽則夢予肝氣盛則夢怒肺氣盛則夢恐懼哭泣飛揚心氣盛則夢善笑恐畏脾氣盛則夢歌樂身體重不舉腎氣盛則夢腰脊兩解不屬凡此十二盛者至而寫之立已厥氣客于心則夢見丘山煙火客于肺則夢飛揚見金鐵之奇物客于肝則夢山林樹木客于脾則夢見丘陵大澤壞屋風雨客于腎則夢臨淵没居水中客于膀胱則夢遊行客于胃則夢飲食客于大腸則夢田野客于小腸則夢聚邑衝衢客于膽則夢鬬訟自刳客于隂器則夢接内客于項則夢斬首客于脛則夢行走而不能前及居深地窌苑中客于股肱則夢禮節拜起客于胞䐈則夢溲便凡此十五不足者至而補之立已也窌切力交順氣一日分為四時第四十四黄帝曰夫百病之所始生者必起于燥濕寒暑風雨隂陽喜怒飲食居處氣合而有形得藏而有名余知其然也夫百病者多以旦慧晝安夕加夜甚何也歧伯曰四時之氣使然黄帝曰願聞四時之氣歧伯曰春生夏長秋收冬藏是氣之常也人亦應之以一日分為四時朝則為春日中為夏日入為秋夜半為冬朝則人氣始生病氣衰}
  - {type: variant, offset: 850, length: 1, content: 用, SBCK: 旦慧日中人氣長長則勝邪故安夕則人氣始衰邪氣始生故加夜半人氣入藏邪氣獨居于身故甚也黄帝曰其時有反者何也歧伯曰是不應四時之氣藏獨主其病者是必以藏氣之所不勝時者甚以其所勝時者起也黄帝曰治之奈何歧伯曰順天之時而病可與期順者為工逆者為麤黄帝曰善余聞刺有五變以主五輸願聞其數歧伯曰人有五藏五藏有五變五變有五輸故五五二十五輸以應五時黄帝曰願聞五變歧伯曰肝為牡藏其色青其時春其音角其味酸其日甲乙心為牡藏其色赤其時夏其日丙丁其音徵其味苦脾為牝藏其色黄其時長夏其日戊巳其音宫其味甘肺為牝藏其色白其音商其時秋其日庚辛其味辛腎為牝藏其色黒其時冬其日壬癸其音羽其味鹹是為五變黄帝曰以主五輸奈何藏主冬冬刺井色主春春刺榮時主夏夏刺輸音主長夏長夏刺經味主秋秋刺合是謂五變以主五輸黄帝曰諸原安合以致六輸歧伯曰原獨不應五時以經合之以應其數故六六三十六輸黄帝曰何謂藏主冬時主夏音主長夏味主秋色主春願聞其故歧伯曰病在藏者取之井病變于色者取之滎病時間時甚者取之輸病變于音者取之經經滿而血者病在胃及以飲食不節得病者取之於合故命曰味主合是謂五變也外揣第四十五黄帝曰余聞九鍼九篇余親授其調頗得其意夫九}
