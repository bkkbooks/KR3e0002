  - {type: 'tls:seg', offset: 17, content: '', id: KR3e0002_CHANT_012-1a.5}
  - {type: variant, offset: 17, length: 2, content: 經脈, SBCK: 九鍼者天地之大數也始於一而終於九故曰一以法天二以法地三以法人四以法時五以法音六以法律七以法星八以法風九以法野黄帝曰以鍼應九之數奈何歧伯曰夫聖人之起天地之數也一而九之故以立九野九而九之九九八}
  - {type: page-break, offset: 17, content: '', id: KR3e0002_SBCK_012-1b}
  - {type: variant, offset: 17, length: 2, content: 經脈, krp: 九鍼者天地之大數也始於一而終於九故曰一以法天二以法地三以法人四以法時五以法音六以法律七以法星八以法風九以法野黄帝曰以鍼應九之數奈何歧伯曰夫聖人之起天地之數也一而九之故以立九野九而九之九九八}
  - {type: variant, offset: 20, length: 1, content: 二, SBCK: 一以起黄鍾數焉以鍼應數也一}
