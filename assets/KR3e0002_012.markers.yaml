  - {type: variant, offset: 626, length: 0, content: '', SBCK: 少師曰􅀱此者常以冬至之日太一立於叶蟄之宫其至也天必應之以風雨者矣風雨從南方來者為虚風賊傷人者也其以夜半至也萬民皆卧而弗犯也故其嵗民小病其以晝至者萬民懈惰而皆中於虚風故萬民多病虚邪入客於骨而不發於外至其立春陽氣大發腠理開因立春之日風從西方來萬民又皆中於虚風此兩邪相搏經氣結代者矣故諸逢其風而遇其雨者命曰遇嵗露焉因嵗之和而少賊風者民少病而少死嵗多賊風邪氣寒温不和則民多病而死矣黄帝曰虚邪之風其所傷貴賤何如􅀱之奈何少師荅曰正月朔日太一居天留之宫其日西北風不雨人多死矣正月朔日平旦北風春民多死正月朔日平旦北風行民病多者十有三也正月朔日日中北風夏民多死正月朔日夕時北風秋民多死終日北風大病死者十有六正月朔日風從南方來命曰旱鄉從西方來命曰白骨將國有殃人多死亡正月朔日風從東方來發屋􅀭沙石國有大災也正月朔日風從東南方行春有死亡正月朔天利温不風糴賤民不病天寒而風糴貴民多病此所謂􅀱嵗之風傷人者也二月丑不風民多心腹病三月戌不溫民多寒熱四月已不暑民多癉病十月申不寒民多㬥死諸所謂風者皆發屋折樹木􅀭沙石起毫毛發腠理者也理郄切乞逆大惑論第八十黄帝問於}
