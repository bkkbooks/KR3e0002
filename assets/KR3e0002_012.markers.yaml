  - {type: variant, offset: 99, length: 3, content: 者受穀, SBCK: 氣膽為怒胃為氣逆噦大腸小腸為泄膀胱不約為遺溺下焦溢為水五味酸入肝辛入肺苦入心甘入脾鹹入腎淡入胃是謂五味五幷精氣幷肝則憂幷心則喜幷肺則悲幷腎則恐幷脾則畏是謂五精之氣幷於藏也五惡肝惡風心惡熱肺惡寒腎惡燥脾惡濕此五藏氣所惡也五液心主汗肝主泣肺主涕腎主唾脾主涎此五液所出也五勞久視傷血久卧傷氣久坐傷肉久立傷骨久行傷筋此五久勞所病也五走酸走筋辛走氣苦走血鹹走骨甘走肉是謂五走也五裁病在筋無食酸病在氣無食辛病在骨無食鹹病在血無食苦病在肉無食甘口嗜}
