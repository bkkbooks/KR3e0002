  - {type: variant, offset: 598, length: 0, content: '', SBCK: 其有卒然㬥死㬥病者何也少師荅曰三虚者其死㬥疾也得三實者邪不能傷人也黄帝曰願聞三虚少師曰乗年之衰逢月之空失時之和因為賊風所傷是謂三虚故論不知三虚工反為麤帝曰願聞三實少師曰逢年之盛遇月之滿得時之和雖有賊風邪氣不能危之也黄帝曰善乎哉論朙乎哉道請藏之金匱命曰三實然此一}
