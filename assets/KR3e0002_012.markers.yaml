  - {type: variant, offset: 641, length: 4, content: 脈大血多, krp: 然余每之東苑未曽不惑去之則復余唯獨為東苑勞神乎何其異也歧伯曰不然也心有所喜神有所惡卒然相惑則精氣亂視誤故惑神移乃復是故間者為迷甚者為惑黄帝曰人之善忘者何氣使然歧伯曰上氣不足下氣有餘腸胃實而心肺虚虚則營衛留於下久之不以時上故善忘也黄帝曰人之善饑而不嗜食者何氣使然歧伯曰精氣幷於脾熱氣留於胃胃熱則消穀穀消故善饑胃氣逆上則胃脘寒故不嗜食也黄帝曰病而不得卧者何氣使然歧伯曰衛氣不得入於隂常留於陽留於陽則陽氣滿陽氣滿則陽蹻盛不得入於隂則隂氣虚故目不瞑矣黄帝曰病目而不得視者何氣使然歧伯曰衛氣留於隂不得行於陽留於隂則隂}
