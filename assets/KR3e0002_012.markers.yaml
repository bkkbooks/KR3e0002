  - {type: variant, offset: 126, length: 0, content: '', SBCK: 所應必開其腠理氣之所舍節則其府也黄帝曰善夫風之與瘧也相與同類而風常在而瘧特以時休何也歧伯曰風氣留其處瘧氣隨經絡沉以内摶故衛氣應乃作也帝曰善黄帝問於少師曰余聞四時八風之中人也故有寒暑寒則皮膚急而腠理閉暑則皮膚緩而腠理開賊風邪氣因得以入乎將必須八正虚邪乃能傷人乎少師荅曰不然賊風邪氣之中人也不得以時然必因其開也其入}
