  - {type: page-break, offset: 0, content: '', id: KR3e0002_SBCK_012-1a}
  - {type: variant, offset: 0, length: 0, content: '', WYG: 欽定四庫全書子部五靈樞經醫家類提要臣等謹案靈樞經十二卷案晁公武讀書志曰王冰謂靈樞即漢志黄帝内經十八卷之九謂或好事者於皇甫諡所集内經倉公論中鈔出之名為古書未知孰是又李濓醫史載元吕復羣經古方論曰内經靈樞漢隋唐志皆不録隋有鍼經九卷唐有靈寳註及黄帝九靈經十二卷而已或謂王冰以九靈更名為靈樞又謂九靈尤詳於鍼故皇甫諡名之為鍼經苟一經而二名不應唐志别出鍼經十二卷是靈樞不及素問之古宋元人已言之矣近時杭世駿道古堂集亦有靈樞經跋曰七畧漢藝文志黄帝内經十八篇皇甫諡以鍼經九卷素問九卷合十八篇當之隋書經籍志鍼經九卷黄帝九靈十二卷是九靈自九靈鍼經自鍼經不可合而為一也王冰以九靈名靈樞不知其何所本余觀其文義淺短與素問之言不類又似竊取素問而鋪張之其為王冰所偽託可知後人莫有傳其書者至宋紹興中錦官史崧乃云家藏舊本靈樞九卷除已具状經所屬申明外准使府指揮依條申轉運司選官詳定其書送秘書省國子監是此書至宋中世而始出未經髙保衡林億等校定也其中十二經水一篇黄帝時無此名冰特據身所見而妄臆度之云云其考證尤為明晰然李杲精究醫理而使羅天益作類經兼採素問靈樞吕復亦稱善學者當與素問並觀其㫖義互相發明盖其書雖偽而其言則綴合古經具有源本譬之梅賾古文襍採逸書聫成篇目雖牴牾罅漏􅎓託顯然而先王遺訓多賴其蒐輯以有傳不可廢也此本前有紹興乙亥史崧序稱舊本九卷八十一篇増修音釋附於卷末又目録首題鼇峯熊宗立㸃校重刋末題原二十四卷今併為十二卷是此本為元時重刋所併吕復稱史崧併是書為十二卷以復其舊殆誤以熊本為史本歟乾隆四十六年四月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀靈樞經原序昔黄帝作内經十八卷靈樞九卷素問九卷迺其數焉世所奉行唯素問耳越人得其一二而述難經皇甫謐次而為甲乙諸家之説悉自此始其間或有得失未可為後世法則謂如南陽活人書稱欬逆者噦也謹按靈樞經曰新榖氣入於胃與故寒氣相爭故曰噦舉而並之則理可斷矣又如難經第六十五篇是越人標指靈樞本輸之大畧世或以為流注謹按靈樞經曰所言節者神氣之所遊行出入也非皮肉筋骨也又曰神氣者正氣也神氣之所遊行出入者流注也井滎輸經合者本輸也舉而並之則知相去不啻天壤之異但恨靈樞不傳乆矣世莫能究夫為醫者在讀醫書耳讀而不能為醫者有矣未有不讀而能為醫者也不讀醫書又非世業殺人尤毒於挺刃是故古人有言曰為人子而不讀醫書由為不孝也僕本庸昧自髫迄壯潛心斯道頗涉其理輒不自揣參對諸書再行校正家藏舊本靈樞九卷共八十一篇増修音釋附於卷末勒為二十四卷庻使好生之人開卷易明了無差别除已具狀經所屬申明外准使府指揮依條申轉運司選官詳定具書送秘書省國子監今崧専訪請名醫更乞參詳免誤將來利益無窮功實有自時宋紹興乙亥仲夏望日錦官史崧題欽定四庫全書靈樞經卷一宋史崧音釋九針十二原第一法天黄帝問於歧伯曰余子萬民養百姓而收其租税余哀其不給而屬有疾病余欲勿使被毒藥無用砭石欲以㣲針通其經脈調其血氣營其逆順出入之㑹令可傳於後世必明為之法令終而不滅乆而不絶易用難忘為之經紀異其章别其表裏為之終始令各有形先立針經願聞其情歧伯答曰臣請推而次之令有綱紀始於一終於九焉請言其道小針之要易陳而難入粗守形上守神神乎神客在門未覩其疾惡知其原刺之微在速遲粗守闗上守機機之動不離其空空中之機清静而微其來不可逢其徃不可追知機之道者不可掛以髮不知機道叩之不發知其往來要與之期粗之闇乎妙哉工獨有之往者為逆來者為順明知逆順正行無問迎而奪之惡得無虛追而濟之惡得無實迎之隨之以意和之針道畢矣凡用針者虚則實之滿則泄之宛陳則除之邪勝則虚之大要曰徐而疾則實疾而徐則虚言實與虚若有若無察後與先若存若亡為虚與實若得若失虚實之要九針最妙補寫之時以針為之寫曰必持内之放而出之排陽得針邪氣得泄按而引針是謂内温血不得散氣不得出也補曰隨之隨之意若忘之若行若按如蚊虻止如留如還去如絃絶令左屬右其氣故止外門已閉中氣乃實必無留血急取誅之持針之道堅者為寳正指直刺無針左右神在秋毫屬意病者審視血脈者刺之無殆方刺之時必在懸陽及與兩衛神屬勿去知病存亡血脈者在腧横居視之獨澄切之獨堅九針之名各不同形一曰鑱針長一寸六分二曰貟針長一寸六分三曰鍉針長三寸半四曰鋒針長一寸六分五曰鈹針長四寸廣二分半六曰貟利針長一寸六分七曰毫針長三寸六分八曰長針長七寸九曰大針長四寸鑱針者頭大末銳去寫陽氣貟針者針如卵形揩摩分間不得傷肌肉以寫分氣鍉針者鋒如黍粟之銳主按脈勿陷以致其氣鋒針者刃三隅以發痼疾鈹針者末如劒鋒以取大膿貟利針者大如氂且貟且鋭中身微大以取暴氣毫針者尖如蚊虻喙静以徐往微以乆留之而養以取痛痺長針者鋒利身薄可以取逺痺大針者尖如挺其鋒微貟以寫機闗之水也九針畢矣夫氣之在脈也邪氣在上濁氣在中清氣在下故針陷脈則邪氣出針中脈則濁氣出針太深則邪氣反沈病益故曰皮肉筋脈各有所處病各有所宜各不同形各以任其所宜無實無虚損不足而益有餘是謂甚病病益甚取五脈者死取三脈者恇奪隂者死奪陽者狂針害畢矣刺之而氣不至無問其數刺之而氣至乃去之勿復針針各有所宜各不同形各任其所為刺之要氣至而有效效之信若風之吹雲明乎若見蒼天刺之道畢矣黄帝曰願聞五藏六府所出之處岐伯曰五蔵五腧五五二十五腧六府六腧六六三十六腧經脈十二絡脈十五凡二十七氣以上下所出為井所溜為滎所注為腧所行為經所以為合二十七氣所行皆在五腧也節之交三百六十五㑹知其要者一言而終不知其要流散無窮所言節者神氣之所遊行出入也非皮肉筋骨也覩其色察其目知其散復一其形聽其動静知其邪正右主推之左持而禦之氣至而去之凡將用針必先診脈視氣之劇易乃可以治也五藏之氣已絶於内而用針者皮實其外是謂重竭重竭必死其死也靜治之者輒反其氣取腋與膺五藏之氣已絶於外而用針者反實其内是謂逆厥逆厥則必死其死也躁治之者反取四末刺之害中而不去則精泄害中而去則致氣精泄則病益甚而恇致氣則生為癰瘍五藏有六府六府有十二原十二原出於四闗四闗主治五藏五藏有疾當取之十二原十二原者五藏之所以稟三百六十五節氣味也五藏有疾也應出十二原十二原各有所出明知其原覩其應而知五藏之害矣陽中之少隂肺也其原出於大淵大淵二陽中之太陽心也其原出於大陵大陵二隂中之少陽肝也其原出於太衝太衝二隂中之至隂脾也其原出於太白太白二隂中之太隂腎也其原出於太谿太谿二膏之原出於鳩尾鳩尾一肓之原出於脖胦脖胦一凡此十二原者主治五藏六府之有疾者也脹取三陽飱泄取三隂今夫五藏之有疾也譬猶刺也猶汚也猶結也猶閉也刺雖乆猶可拔也汚雖乆猶可雪也結雖乆猶可解也閉雖乆猶可決也或言久疾之不可取者非其説也夫善用針者取其疾也猶拔刺也猶雪汚也猶解結也猶決閉也疾雖久猶可畢也言不可治者未得其術也刺諸熱者如以手探湯刺寒清者如人不欲行隂有陽疾者取之下陵三里正往無殆氣下乃止不下復始也疾髙而内者取之隂之陵泉疾髙而外者取之陽之陵泉也宛陳上音欎又音藴又於阮切氂莫髙切又音毫在腧春遇切鑱錐銜切鍉音低鈹音皮虻喙下謝穢切取三脈者恇曲王切謹按恇謂不足也脖胦上蒲没切下烏朗切又於桑切溜謹按針經當作流滎音營絶小水也本輸第二法地黄帝問於岐伯曰凡刺之道必通十二經絡之所終始絡脈之所别處五輸之所留六府之所與合四時之所出入五藏之所溜處濶數之度淺深之狀髙下所至願聞其解歧伯曰請言其次也肺出於少商少商者手大指端内側也為井木溜於魚際魚際者手魚也為滎注於大淵大淵魚後一寸陷者中也為腧行於經渠經渠寸口中也動而不居為經入於尺澤尺澤肘中之動脈也為合手太隂經也心出於中衝中衝手中指之端也為井木溜於勞宫勞宫掌中中指本節之内間也為滎注於大陵大陵掌後兩骨之間方下者也為腧行於間使間使之道兩筋之間三寸之中也有過則至無過則止為經入於曲澤曲澤肘内亷下陷者之中也屈而得之為合手少隂也肝出於大敦大敦者足大指之端及三毛之中也為井木溜於行間行間足大指間也為滎注於大衝大衝行間上二寸陷者之中也為腧行於中封中封内踝之前一寸半陷者之中使逆則宛使和則通摇足而得之為經入於曲泉曲泉輔骨之下大筋之上也屈膝而得之為合足厥隂也脾出於隠白隠白者足大指之端内側也為井木溜於大都大都本節之後下陷者之中也為滎注於太白太白腕骨之下也為腧行於商丘商丘内踝之下陷者之中也為經入於隂之陵泉隂之陵泉輔骨之下陷者之中也伸而得之為合足太隂也腎出於湧泉湧泉者足心也為井木溜於然谷然谷然骨之下者也為滎注於大谿大谿内踝之後跟骨之上陷中者也為腧行於復留復留上内踝二寸動而不休為經入於隂谷隂谷輔骨之後大筋之下小筋之上也按之應手屈膝而得之為合足少隂經也膀胱出於至隂至隂者足小指之端也為井金溜於通谷通谷本節之前外側也為滎注於束骨束骨本節之後陷者中也為腧過於京骨京骨足外側大骨之下為原行於崑崙崑崙在外踝之後跟骨之上為經入於委中委中膕中央為合委而取之足太陽也膽出於竅隂竅隂者足小指次指之端也為井金溜於俠谿俠谿足小指次指之間也為滎注於臨泣臨泣上行一寸半陷者中也為腧過於丘墟丘墟外踝之前下陷者中也為原行於陽輔陽輔外踝之上輔骨之前及絶骨之端也為經入於陽之陵泉陽之陵泉在膝外陷者中也為合伸而得之足少陽也胃出於厲兌厲兌者足大指内次指之端也為井金溜於内庭内庭次指外間也為滎注於陷谷陷谷者上中指内間上行二寸陷者中也為腧過於衝陽衝陽足跗上五寸陷者中也為原摇足而得之行於解谿解谿上衝陽一寸半陷者中也為經入於下陵下陵膝下三寸胻骨外三里也為合復下三里三寸為巨虚上亷復下上亷三寸為巨虚下亷也大腸屬上小腸屬下足陽明胃脈也大腸小腸皆屬於胃是足陽明也三焦者上合手少陽出于闗衝闗衝者手小指次指之端也為井金溜於液門液門小指次指之間也為滎注於中渚中渚本節之後陷中者也為腧過於陽池陽池在腕上陷者之中也為原行於支溝支溝上腕三寸兩骨之間陷者中也為經入於天井天井在肘外大骨之上陷者中也為合屈肘乃得之三焦下腧在於足大指之前少陽之後出於膕中外亷名曰委陽是太陽絡也手少陽經也三焦者足少陽太隂一本作陽之所將太陽之别也上踝五寸别入貫腨腸出於委陽並太陽之正入絡膀胱約下焦實則閉癃虚則遺溺遺溺則補之閉癃則冩之手太陽小腸者上合於太陽出於少澤少澤小指之端也為井金溜於前谷前谷在手外亷本節前陷者中也為滎注於後谿後谿者在手外側本節之後也為腧過於腕骨腕骨在手外側腕骨之前為原行於陽谷陽谷在鋭骨之下陷者中也為經入於小海小海在肘内大骨之外去端半寸陷者中也伸臂而得之為合手太陽經也大腸上合手陽明出於商陽商陽大指次指之端也為井金溜於本節之前二間為滎注於本節之後三間為腧過於合谷合谷在大指岐骨之間為原行於陽谿陽谿在兩筋間陷者中也為經入於曲池在肘外輔骨陷者中屈臂而得之為合手陽明也是謂五藏六府之腧五五二十五腧六六三十六腧也六府皆出足之三陽上合於手者也缺盆之中任脈也名曰天突一次任脈側之動脈足陽明也名曰人迎二次脈手陽明也名曰扶突三次脈手太陽也名曰天窗四次脈足少陽也名曰天容五次脈手少陽也名曰天牖六次脈足太陽也名曰天柱七次脈頸中央之脈督脈也名曰風府腋内動脈手太隂也名曰天府腋下三寸手心主也名曰天池刺上闗者呿不能欠刺下闗者欠不能呿刺犢鼻者屈不能伸刺兩闗者伸不能屈足陽明挾喉之動脈也其腧在膺中手陽明次在其腧外不至曲頰一寸手太陽當曲頰足少陽在耳下曲頰之後手少陽出耳後上加完骨之上足太陽挾項大筋之中髪際隂尺動脈在五里五腧之禁也肺合大腸大腸者傳道之府心合小腸小腸者受盛之府肝合膽膽者中精之府脾合胃胃者五榖之府腎合膀胱膀胱者津液之府也少陽屬腎腎上連肺故將兩藏三焦者中瀆之府也水道出焉屬膀胱是孤之府也是六府之所與合者春取絡脈諸滎大經分肉之間甚者深取之間者淺取之夏取諸腧孫絡肌肉皮膚之上秋取諸合餘如春法冬取諸井諸腧之分欲深而留之此四時之序氣之所處病之所舎藏之所宜轉筋者立而取之可令遂已痿厥者張而刺之可令立快也濶數下色角切足跗下音夫呿祛遮切腨時兖切小針解第三法人所謂易陳者易言也難入者難著於人也粗守形者守刺法也上守神者守人之血氣有餘不足可補寫也神客者正邪共㑹也神者正氣也客者邪氣也在門者邪循正氣之所出入也未覩其疾者先知邪正何經之疾也惡知其原者先知何經之病所取之處也刺之微者數遲者徐疾之意也粗守闗者守四肢而不知血氣正邪之徃來也上守機者知守氣也機之動不離其空中者知氣之虚實用針之徐疾也空中之機清浄以微者針以得氣蜜意守氣勿失也其來不可逢者氣盛不可補也其往不可追者氣虚不可寫也不可掛以髮者言氣易失也扣之不發者言不知補寫之意也血氣已盡而氣不下也知其徃來者知氣之逆順盛虛也要與之期者知氣之可取之時也粗之闇者冥冥不知氣之微宻也妙哉工獨有之者盡知針意也徃者為逆者言氣之虛而小小者逆也來者為順者言形氣之平平者順也明知逆順正行無問者言知所取之處也迎而奪之者寫也追而濟之者補也所謂虚則實之者氣口虚而當補之也滿則泄之者氣口盛而當寫之也宛陳則除之者去血脈也邪勝則虚之者言諸經有盛者皆寫其邪也徐而疾則實者言徐内而疾出也疾而徐則虚者言疾内而徐出也言實與虛若有若無者言實者有氣虛者無氣也察後與先若亡若存者言氣之虚實補寫之先後也察其氣之已下與常存也為虚與實若得若失者言補者佖然若有得也寫則怳然若有失也夫氣之在脈也邪氣在上者言邪氣之中人也髙故邪氣在上也濁氣在中者言水榖皆入於胃其精氣上注於肺濁溜於腸胃言寒温不適飲食不節而病生於腸胃故命曰濁氣在中也清氣在下者言清濕地氣之中人也必從足始故曰清氣在下也針陷脈則邪氣出者取之上針中脈則邪氣出者取之陽明合也針大深則邪氣反沈者言淺浮之病不欲深刺也深則邪氣從之入故曰反沈也皮肉筋脈各有所處者言經絡各有所主也取五脈者死言病在中氣不足但用針盡大寫其諸隂之脈也取三陽之脈者唯言盡寫三陽之氣令病人恇然不復也奪隂者死言取尺之五里五徃者也奪陽者狂正言也覩其色察其目知其散復一其形聽其動静者言上工知相五色於目有知調尺寸小大緩急滑濇以言所病也知其邪正者知論虚邪與正邪之風也右主推之左持而御之者言持針而出入也氣至而去之者言補寫氣調而去之也調氣在於終始一者持心也節之交三百六十五㑹者絡脈之滲灌諸節者也所謂五蔵之氣已絶於内者脈口氣内絶不至反取其外之病處與陽經之合有留針以致陽氣陽氣至則内重竭重竭則死矣其死也無氣以動故靜所謂五蔵之氣已絶于外者脈口氣外絶不至反取其四末之輸有留針以致其隂氣隂氣至則陽氣反入入則逆逆則死矣其死也隂氣有餘故躁所以察其目者五藏使五色循明循明則聲章聲章者則言聲與平生異也佖然上皮筆切又音必滿貌怳然上吁往切狂貌深内下音納邪氣藏府病形第四法時黄帝問於岐伯曰邪氣之中人也奈何岐伯答曰邪氣之中人髙也黄帝曰髙下有度乎岐伯曰身半已上者邪中之也身半以下者濕中之也故曰邪之中人也無有常中於隂則溜於府中於陽則溜於經黄帝曰隂之與陽也異名同類上下相㑹經絡之相貫如環無端邪之中人或中於隂或中於陽上下左右無有恒常其故何也岐伯曰諸陽之㑹皆在於面中人也方乘虚時及新用力若飲食汗出腠理開而中於邪中於面則下陽明中於項則下太陽中於頰則下少陽其中於膺背兩脇亦中其經黄帝曰其中於隂奈何岐伯答曰中於隂者常從臂胻始夫臂與胻其隂皮薄其肉淖澤故俱受於風獨傷其隂黄帝曰此故傷其藏乎岐伯答曰身之中於風也不必動藏故邪入於隂經則其藏氣實邪氣入而不能客故還之於府故中陽故溜於經中隂則溜於府黄帝曰邪之中人藏奈何岐伯曰愁憂恐懼則傷心形寒寒飲則傷肺以其兩寒相感中外皆傷故氣道而上行有所墮墜惡血留内若有所大怒氣上而不下積於脇下則傷肝有所擊仆若醉入房汗出當風則傷脾有所用力舉重若入房過度汗出浴水則傷腎黄帝曰五藏之中風奈何岐伯曰隂陽俱感邪乃得徃黄帝曰善哉黄帝問於岐伯曰首面與身形也屬骨連筋同血合於氣耳天寒則裂地凌氷其卒寒或手足懈惰然而其面不衣何也歧伯答曰十二經脈三百六十五絡其血氣皆上于面而走空竅其精陽氣上走於目而為睛其别氣走於耳而為聽其宗氣上出於鼻而為臭其濁氣出於胃走唇舌而為味其氣之津液皆上煄于面而皮又厚其肉堅故天熱甚寒不能勝之也黄帝曰邪之中人其病形何如歧伯曰虚邪之中身也洒浙動形正邪之中人也微先見于色不知于身若有若無若亡若存有形無形莫知其情黄帝曰善哉黄帝問於歧伯曰余聞之見其色知其病命曰明按其脈知其病命曰神問其病知其處命曰工余願聞見而知之按而得之問而極之為之奈何歧伯答曰夫色脈與尺之相應也如桴鼓影響之相應也不得相失也此亦本末根葉之出候也故根死則葉枯矣色脈形肉不得相失也故知一則為工知二則為神知三則神且明矣黄帝曰願卒聞之岐伯答曰色青者其脈絃也赤者其脈鉤也黄者其脈代也白者其脈毛黒者其脈石見其色而不得其脈反得其相勝之脈則死矣得其相生之脈則病已矣黄帝問於歧伯曰五藏之所生變化之病形何如歧伯答曰先定其五色五脈之應其病乃可别也黄帝曰色脈已定别之奈何歧伯曰調其脈之緩急小大滑濇而病變定矣黄帝曰調之奈何歧伯答曰脈急者尺之皮膚亦急脈緩者尺之皮膚亦緩脈小者尺之皮膚亦減而少氣脈大者尺之皮膚亦賁而起脈滑者尺之皮膚亦滑脈濇者尺之皮膚亦濇凡此變者有微有甚故善調尺者不待於寸善調脈者不待於色能參合而行之者可以為上工上工十全九行二者為中工中工十全七行一者為下工下工十全六黄帝曰請問脈之緩急小大滑濇之病形何如歧伯曰臣請言五藏之病變也心脈急甚者為瘈瘲微急為心痛引背食不下緩甚為狂笑微緩為伏梁在心下上下行時唾血大甚為喉吤微大為心痺引背善淚出小甚為善噦㣲小為消癉滑甚為善渴微滑為心疝引臍小腹鳴濇甚為瘖微濇為血溢維厥耳鳴顛疾肺脈急甚為癲疾微急為肺寒熱怠惰欬唾血引腰背胸若鼻息肉不通緩甚為多汗微緩為痿瘻偏風頭以下汗出不可止大甚為脛腫微大為肺痺引胸背起惡日光小甚為泄微小為消癉滑甚為息賁上氣㣲滑為上下出血濇甚為嘔血㣲濇為鼠瘻在頸支腋之間下不勝其上其應善痠矣肝脈急甚者為惡言微急為肥氣在脇下若覆杯緩甚為善嘔微緩為水瘕痺也大甚為内癕善嘔衂微大為肝痺隂縮欬引小腹小甚為多飲微小為消癉滑甚為㿉疝微滑為遺溺濇甚為溢飲微濇為瘈攣筋痺脾脈急甚為瘈瘲微急為膈中食飲入而還出後沃沫緩甚為痿厥微緩為風痿四肢不用心慧然若無病大甚為擊仆微大為疝氣腹裏大膿血在腸胃之外小甚為寒熱微小為消癉滑甚為㿉癃微滑為蟲毒蛕蝎腹熱濇甚為腸㿉微濇為内㿉多下膿血腎脈急甚為骨癲疾微急為沈厥奔豚足不收不得前後緩甚為折脊微緩為洞洞者食不化下嗌還出大甚為隂痿微大為石水起臍已下至小腹腄腄然上至胃腕死不治小甚為洞泄微小為消癉滑甚為癃㿉微滑為骨痿坐不能起起則自無所見濇甚為大癰微濇為不月沈痔黄帝曰病之六變者刺之奈何岐伯答曰諸急者多寒緩者多熱大者多氣少血小者血氣皆少滑者陽氣盛微有熱濇者多血少氣微有寒是故刺急者深内而久留之刺緩者淺内而疾發針以去其熱刺大者微寫其氣無出其血刺滑者疾發針而淺内之以寫其陽氣而去其熱刺濇者必中其脈隨其逆順而久留之必先按而循之已發針疾按其痏無令其血出以和其脈諸小者隂陽形氣俱不足勿取以針而調以甘藥也黄帝曰余聞五藏六府之氣滎輸所入為合令何道從入入安連過願聞其故岐伯答曰此陽脈之别入于内屬於府者也黄帝曰滎輸與合各有名乎岐伯答曰滎輸治外經合治内府黄帝曰治内府奈何岐伯曰取之於合黄帝曰合各有名乎岐伯答曰胃合於三里大腸合入于巨虚上亷小腸合入于巨虛下亷三焦合入於委陽膀胱合入于委中央膽合入于陽陵泉黄帝曰取之奈何歧伯答曰取之三里者低跗取之巨虛者舉足取之委陽者屈伸而索之委中者屈而取之陽陵泉者正竪予之齊下至委陽之陽取之取諸外經者揄申而從之黄帝曰願聞六府之病歧伯答曰面熱者足陽明病魚絡血者手陽明病兩跗之上脈竪陷者足陽明病此胃脈也大腸病者腸中切痛而鳴濯濯冬日重感于寒即泄當臍而痛不能乆立與胃同候取巨虚上亷胃病者腹䐜脹胃脘當心而痛上肢兩脇膈咽不通食飲不下取之三里也小腸病者小腹痛腰脊控睪而痛時窘之後當耳前熱若寒甚若獨肩上熱甚及手小指次指之間熱若脈陷者此其候也手太陽病也取之巨虚下亷三焦病者腹氣滿小腹尤堅不得小便窘急溢則水留即為脹候在足太陽之外大絡大絡在太陽少陽之間亦見于脈取委陽膀胱病者小腹偏腫而痛以手按之即欲小便而不得肩上熱若脈陷及足小指外亷及脛踝後皆熱若脈陷取委中央膽病者善太息口苦嘔宿汁心下澹澹恐人将捕之嗌中吤吤然數唾在足少陽之本末亦視其脈之陷下者炙之其寒熱者取陽陵泉黄帝曰刺之有道乎歧伯答曰刺此者必中氣穴無中肉節中氣穴則針染一作逰于巷中肉節即皮膚痛補寫反則病益篤中筋則筋緩邪氣不出與其真相搏亂而不去反還内著用針不審以順為逆也中于膺背一作肩背亦中其經一本作下其經胻戸當切淖澤上奴教切下皆同甲乙經上音濁下音夜謹詳淖濁也澤夜也入而不客一本作容瘈瘲上給下縱吤音戒噦乙劣切息賁下音奔痠音酸瘕音賈㿉徒回切仆音付蛕蝎上胡恢切腹中長蟲下胡葛切蠧蟲也腄竹垂切痏榮美切榆舂朱切睪音髙隂丸也維厥詳此經絡有陽維隂維故有維厥靈樞經巻一欽定四庫全書靈樞經卷二宋史崧音釋根結第五法音岐伯曰天地相感寒暖相移隂陽之道孰少孰多隂道偶陽道竒發於春夏隂氣少陽氣多隂陽不調何補何寫發於秋冬陽氣少隂氣多隂氣盛而陽氣衰故莖葉枯槁濕雨下歸隂陽相移何寫何補竒邪離經不可勝數不知根結五藏六府折闗敗樞開闔而走隂陽大失不可復取九針之𤣥要在終始故能知終始一言而畢不知終始針道咸絶太陽根于至隂結于命門命門者目也陽明根于厲兊結于顙大顙大者鉗耳也少陽根于竅隂結于窗籠窗籠者耳中也太陽為開陽明為闔少陽為樞故開折則肉節瀆而暴病起矣故暴病者取之太陽視有餘不足瀆者皮肉宛膲而弱也闔折則氣無所止息而痿疾起矣故痿疾者取之陽明視有餘不足無所止息者真氣稽留邪氣居之也樞折即骨繇而不安於地故骨繇者取之少陽視有餘不足骨繇者節緩而不收也所謂骨繇者摇故也當窮其本也太隂根于隱白結于大倉少隂根于湧泉結于亷泉厥隂根于大敦結于玉英絡于膻中太隂為開厥隂為闔少隂為樞故開折則倉廩無所輸膈洞膈洞者取之太隂視有餘不足故開折者氣不足而生病也闔折即氣絶而喜悲悲者取之厥隂視有餘不足樞折則脈有所結而不通不通者取之少隂視有餘不足有結者皆取之不足足太陽根于至隂溜于京骨注于崑崙入于天柱飛揚也足少陽根于竅隂溜于丘墟注于陽輔入于天容光明也足陽明根于厲兌溜于衝陽注于下陵入于人迎豐隆也手太陽根于少澤溜于陽谷注于少海入于天䆫支正也手少陽根于闗衝溜于陽池注于支溝入于天牖外闗也手陽明根于商陽溜于合谷注于陽谿入于扶究偏歴也此所謂十二經者盛絡皆當取之一日一夜五十營以營五藏之精不應數者名曰狂生所謂五十營者五藏皆受氣持其脈口數其至也五十動而不一代者五藏皆受氣四十動一代者一藏無氣三十動一代者二藏無氣二十動一代者三藏無氣十動一代者四藏無氣不滿十動一代者五藏無氣子之短期要在終始所謂五十動而不一代者以為常也以知五藏之期子之短期者乍數乍踈也黄帝曰逆順五體者言人骨節之小大肉之堅脆皮之厚薄血之清濁氣之滑濇脈之長短血之多少經絡之數余已知之矣此皆布衣匹夫之士也夫王公大人血食之君身體柔脆肌肉軟弱血氣慓悍滑利其刺之徐疾淺深多少可得同之乎歧伯答曰膏粱菽藿之味何可同也氣滑即出疾其氣濇則出遲氣悍則針小而入淺氣濇則針大而入深深則欲留淺則欲疾以此觀之刺布衣者深以留之刺大人者微以徐之此皆因氣慓悍滑利也黄帝曰形氣之逆順奈何歧伯曰形氣不足病氣有餘是邪勝也急寫之形氣有餘病氣不足急補之形氣不足病氣不足此隂陽氣俱不足也不可刺之刺之則重不足重不足則隂陽俱竭血氣皆盡五藏空虛筋骨髓枯老者絶滅壯者不復矣形氣有餘病氣有餘此謂隂陽俱有餘也急寫其邪調其虚實故曰有餘者寫之不足者補之此之謂也故曰刺不知逆順真邪相搏滿而補之則隂陽四溢腸胃充郭肝肺内䐜隂陽相錯虛而寫之則經脈空虚血氣竭枯腸胃㒤辟皮膚薄著毛腠夭膲子之死期故曰用針之要在于知調隂與陽調隂與陽精氣乃光合形與氣使神内藏故曰上工平氣中工亂脈下工絶氣危生故曰平工不可不慎也必審五藏變化之病五脈之應經絡之實虛皮之柔麤而後取之也骨繇音摇慓悍上比昭切下侯岸切勇健貌也陽道竒音箕夀夭剛柔第六法律黄帝問於少師曰余聞人之生也有剛有柔有弱有强有短有長有隂有陽願聞其方少師答曰隂中有隂陽中有陽審知隂陽刺之有方得病所始刺之有理謹度病端與時相應内合於五藏六府外合於筋骨皮膚是故内有隂陽外亦有隂陽在内者五藏為隂六府為陽在外者筋骨為隂皮膚為陽故曰病在隂之隂者刺隂之滎輸病在陽之陽者刺陽之合病在陽之隂者刺隂之經病在隂之陽者刺絡脈故曰病在陽者命曰風病在隂者命曰痺隂陽俱病命曰風痺病有形而不痛者陽之類也無形而痛者隂之類也無形而痛者其陽完而隂傷之也急治其隂無攻其陽有形而不痛者其隂完而陽傷之也急治其陽無攻其隂隂陽俱動乍有形乍無形加以煩心命曰隂勝其陽此謂不表不裏其形不乆黄帝問於伯髙曰余聞形氣病之先後外内之應柰何伯髙答曰風寒傷形憂恐忿怒傷氣氣傷藏乃病藏寒傷形乃應形風傷筋脈筋脈乃應此形氣外内之相應也黄帝曰刺之奈何伯髙答曰病九日者三刺而已病一月者十刺而已多少逺近以此衰之乆痺不去身者視其血絡盡出其血黄帝曰外内之病難易之治奈何伯髙答曰形先病而未入藏者刺之半其日藏先病而形乃應者刺之倍其日此月内難易之應也黄帝問於伯髙曰余聞形有緩急氣有盛衰骨有大小肉有堅脆皮有厚薄其以立夀夭奈何伯髙答曰形與氣相任則夀不相任則夭皮與肉相果則夀不相果則夭血氣經絡勝形則夀不勝形則夭黄帝曰何謂形之緩急伯髙答曰形充而皮膚緩者則夀形充而皮膚急者則夭形充而脈堅大者順也形充而脈小以弱者氣衰衰則危矣若形充而顴不起者骨小骨小而夭矣形充而大肉䐃堅而有分者肉堅肉堅則夀矣形充而大肉無分理不堅者内脆肉脆則夭矣此天之生命所以立形定氣而視夀夭者必明乎此立形定氣而後以臨病人決死生黄帝曰余聞夀夭無以度之伯髙答曰牆基卑髙不及其地者不滿三十而死其有因加疾者不及二十而死也黄帝曰形氣之相勝以立夀夭奈何伯髙答曰平人而氣勝形者夀病而形肉脱氣勝形者死形勝氣者危矣黄帝曰余聞刺有三變何謂三變伯髙答曰有刺營者有刺衛者有刺寒痺之留經者黄帝曰刺三變者奈何伯髙答曰刺營者出血刺衛者出氣刺寒痺者内熱黄帝曰營衛寒痺之為病奈何伯髙答曰營之生病也寒熱少氣血上下行衛之生病也氣痛時來時去怫愾賁響風寒客于腸胃之中寒痺之為病也留而不去時痛而皮不仁黄帝曰刺寒痺内熱奈何伯髙答曰刺布衣者以火焠之刺大人者以藥熨之黄帝曰藥熨奈何伯髙答曰用淳酒二十升蜀椒一升乾姜一斤桂心一斤凡四種皆㕮咀漬酒中用綿絮一斤細白布四丈并内酒中置酒馬矢煴中葢封塗勿使泄五日五夜出布綿絮曝乾之乾復漬以盡其汁毎漬必晬其日乃出乾乾并用滓與綿絮複布為複巾長六七尺為六七巾則用之生桑炭炙巾以熨寒痺所刺之處令熱入至于病所寒複炙巾以熨之三十遍而止汗出以巾拭身亦三十遍而止起步内中無見風毎刺必熨如此病已矣此所謂内熱也顴音權䐃堅上渠永切腹中䐃脂怫愾上扶勿切鬱也為意舒下許氣切㕮咀上音甫下才與切煴於文切烟煴氣也晬其日上音醉同也官針第七法星凡刺之要官針最妙九針之宜各有所為長短大小各有所施也不得其用病弗能移疾淺針深内傷良肉皮膚為癰病深針淺病氣不寫支為大膿病小針大氣寫大甚疾必為害病大針小氣不泄寫亦復為敗失針之宜大者寫小者不移已言其過請言其所施病在皮膚無常處者取以鑱針於病所膚白勿取病在分内間取以員針於病所病在經絡痼痺者取以鋒針病在脈氣少當補之者取之鍉針於井滎分輸病為大膿者取以鈹針病痺氣暴發者取以貟利針病痺氣痛而不去者取以毫針病在中者取以長針病水腫不能通闗節者取以大針病在五藏固居者取以鋒針寫於井滎分輸取以四時凡刺有九日應九變一曰輸刺輸刺者刺諸經滎輸藏腧也二曰逺道刺逺道刺者病在上取之下刺府腧也三曰經刺經刺者刺大經之結絡經分也四曰絡刺絡刺者刺小絡之血脈也五曰分刺分刺者刺分肉之間也六曰大寫刺大寫刺者刺大膿以鈹針也七曰毛刺毛刺者刺浮痺皮膚也八曰巨刺巨刺者左取右右取左九曰焠刺焠刺者刺燔針則取痺也凡刺有十二節以應十二經一曰偶刺偶刺者以手直心若背直痛所一刺前一刺後以治心痺刺此者傍針之也二曰報刺報刺者刺痛無常處也上下行者直内無拔針以左手隨病所按之乃出針復刺之也三曰恢刺恢刺直刺傍之舉之前後恢筋急以治筋痺也四曰齊刺齊刺者直入一傍入二以治寒氣小深者或曰三刺三刺者治痺氣小深者也五曰揚刺揚刺者正内一傍内四而浮之以治寒氣之博大者也六曰直針刺直針刺者引皮乃刺之以治寒氣之淺者也七曰輸刺輸刺者直入直出稀發針而深之以治氣盛而熱者也八曰短刺短刺者刺骨痺稍摇而深之致針骨所以上下摩骨也九曰浮刺浮刺者傍入而浮之以治肌急而寒者也十曰隂刺隂刺者左右率刺之以治寒厥中寒厥足踝後少隂也十一曰傍針刺傍針刺者直刺傍刺各一以治留痺乆居者也十二曰賛刺賛刺者直入直出數發針而淺之出血是謂治癰腫也脈之所居深不見者刺之微内針而乆留之以致其空脈氣也脈淺者勿刺按絶其脈乃刺之無令精出獨出其邪氣耳所謂三刺則榖氣出者先淺刺絶皮以出陽邪再刺則隂邪出者少益深絶皮致肌肉未入分肉間也已入分肉之間則榖氣出故刺法曰始刺淺之以逐邪氣而來血氣後刺深之以致隂氣之邪最後刺極深之以下榖氣此之謂也故用針者不知年之所加氣之盛衰虚實之所起不可以為工也凡刺有五以應五藏一曰半刺半刺者淺内而疾發針無針傷肉如拔毛狀以取皮氣此肺之應也二曰豹文刺豹文刺者左右前後針之中脈為故以取經絡之血者此心之應也三曰闗刺闗刺者直刺左右盡筋上以取筋痺慎無出血此肝之應也或曰淵刺一曰豈刺四曰合谷刺合谷刺者左右雞足針于分肉之間以取肌痺此脾之應也五曰輸刺輸刺者直入直出深内之至骨以取骨痺此腎之應也燔針上音煩􅀈刺上苦回切大也一本作怪字本神第八法風黄帝問於歧伯曰凡刺之法先必本於神血脈營氣精神此五藏之所藏也至其淫泆離藏則精失魂魄飛揚志意恍亂智慮去身者何因而然乎夭之罪與人之過乎何謂德氣生精神魂魄心意志思智慮請問其故歧伯答曰天之在我者德也地之在我者氣也德流氣薄而生者也故生之來謂之精兩精相搏謂之神隨神往來者謂之魂並精而出入者謂之魄所以任物者謂之心心有所憶謂之意意之所存謂之志因志而存變謂之思因思而逺慕謂之慮因慮而處物謂之智故智者之養生也必順四時而適寒暑和喜怒而安居處節隂陽而調剛柔如是則僻邪不至長生乆視是故􅇶惕思慮者則傷神神傷則恐懼流淫而不止因悲哀動中者竭絶而失生喜樂者神憚散而不藏愁憂者氣閉塞而不行盛怒者迷惑而不治恐懼者神蕩憚而不收心􅇶惕思慮則傷神神傷則恐懼自失破䐃脫肉毛悴色夭死于冬脾愁憂而不解則傷意意傷則悗亂四肢不舉毛悴色夭死於春肝悲哀動中則傷魂魂傷則狂忘不精不精則不正當人隂縮而攣筋兩脇骨不舉毛悴色夭死于秋肺喜樂無極則傷魄魄傷則狂狂者意不存人皮革焦毛悴色夭死于夏腎盛怒而不止則傷志志傷則喜忘其前言腰脊不可以俛仰屈伸毛悴色夭死于季夏恐懼而不解則傷精精傷則骨痠痿厥精時自下是故五藏主藏精者也不可傷傷則失守而隂虛隂虚則無氣無氣則死矣是故用針者察觀病人之態以知精神魂魄之存亡得失之意五者以傷針不可以治之也肝藏血血舎魂肝氣虛則恐實則怒脾藏營營舎意脾氣虚則四支不用五藏不安實則腹脹經溲不利心藏脈脈舎神心氣虚則悲實則笑不休肺藏氣氣舎魄肺氣虚則鼻塞不利少氣實則喘喝胷盈仰息腎藏精精舎志腎氣虚則厥實則脹五藏不安必審五藏之病形以知其氣之虛實謹而調之也悗亂上音悶怵惕上丑律切下他的切悚懼也終始第九法野凡刺之道畢於終始明知終始五藏為紀隂陽定矣隂者主藏陽者主府陽受氣於四末隂受氣於五藏故寫者迎之補者隨之知迎知隨氣可令和和氣之方必通隂陽五藏為隂六府為陽傳之後世以血為盟敬之者昌慢之者亡無道行私必得天殃謹奉天道請言終始終始者經脈為紀持其脈口人迎以知隂陽有餘不足平與不平天道畢矣所謂平人者不病不病者脈口人迎應四時也上下相應而俱往來也六經之脈不結動也本末之寒温之相守司也形肉血氣必相稱也是謂平人少氣者脈口人迎俱少而不稱尺寸也如是者則隂陽俱不足補陽則隂竭寫隂則陽脱如是者可将以甘藥不可飲以至劑如此者弗炙不已者因而寫之則五藏氣壊矣人迎一盛病在足少陽一盛而躁病在手少陽人迎二盛病在足太陽二盛而躁病在手太陽人迎三盛病在足陽明三盛而躁病在手陽明人迎四盛且大且數名曰溢陽溢陽為外格脈口一盛病在足厥隂一盛而躁在手心主脈口二盛病在足少隂二盛而躁在手少隂脈口三盛病在足太隂三盛而躁在手太隂脈口四盛且大且數者名曰溢隂溢隂為内闗内闗不通死不治人迎與太隂脈口俱盛四倍以上命曰闗格闗格者與之短期人迎一盛寫足少陽而補足厥隂二寫一補日一取之必切而驗之踈取之上氣和乃止人迎二盛寫足太陽補足少隂二冩一補二日一取之必切而驗之踈取之上氣和乃止人迎三盛寫足陽明而補足太隂二寫一補日二取之必切而驗之踈取之上氣和乃止脈口一盛寫足厥隂而補足少陽二補一寫日一取之必切而驗之踈而取上氣和乃止脈口二盛寫足少隂而補足太陽二補一寫二日一取之必切而驗之踈取之上氣和乃止脈口三盛寫足太陽而補足陽明二補一寫日二取之必切而驗之踈而取之上氣和乃止所以日二取之者太陽主胃大富于榖氣故可日二取之也人迎與脈口俱盛三倍以上命曰隂陽俱溢如是者不開則血脉閉塞氣無所行流淫于中五藏内傷如此者因而炙之則變易而為他病矣凡刺之道氣調而止補隂瀉陽音氣益彰耳目聰明反此者謂氣不行所謂氣至而有效者寫則益虚虚者脈大如其故而不堅也堅如其故者適雖言故病未去也補則益實實者脈大如其故而益堅也夫如其故而不堅者適雖言快病未去也故補則實寫則虚痛雖不隨針病必衰去必先通十二經脈之所生病而後可得傳于終始矣故隂陽不相移虚實不相傾取之其經凡刺之屬三刺至榖氣邪僻妄合隂陽易居逆順相反沈浮異處四時不得稽留􅁋泆須針而去故一刺則陽邪出再刺則隂邪出三刺則榖氣至榖氣至而止所謂榖氣至者已補而實已寫而虚故以知榖氣至也邪氣獨去者隂與陽未能調而病知愈也故曰補則實寫則虚痛雖不隨針病必衰去矣隂盛而陽虚先補其陽後寫其隂而和之隂虚而陽盛先補其隂後寫其陽而和之三脈動于足大指之間必審其實虚虚而寫之是謂重虚重虚病益甚凡刺此者以指按之脈動而實且疾者疾寫之虚而徐者則補之反此者病益甚其動也陽明在上厥隂在中少隂在下膺腧中膺背腧中背肩􅈩虚者取之上重舌刺舌柱以鈹針也手屈而不伸者其病在筋伸而不屈者其病在骨在骨守骨在筋守筋補須一方實深取之稀按其痏以極出其邪氣一方虛淺刺之以養其脈疾按其痏無使邪氣得入邪氣来也𦂳而闕氣來也徐而和脈實者深刺之以泄其氣脈虚者淺刺之使精氣無得出以養其脈獨出其邪氣刺諸痛者其脈皆實故曰從腰以上者手太隂陽明皆主之從腰以下者足太隂陽明皆主之病在上者下取之病在下者髙取之病在頭者取之足病在腰者取之膕病生於頭者頭重生於手者臂重生于足者足重治病者先刺其病所從生者也春氣在毛夏氣在皮膚秋氣在分肉冬氣在筋骨刺此病者冬以其時為齊故刺肥人者秋冬之齊刺瘦人者以春夏之齊病痛者隂也痛而以手按之不得者隂也深刺之病在上者陽也病在下者隂也癢者陽也淺刺之病先起隂者先治其隂而後治其陽病先起陽者先治其陽而後治其隂刺熱厥者留針反為寒刺寒厥者留針反為熱刺熱厥者二隂一陽刺寒厥者二陽一隂所謂二隂者二刺隂也一陽者一刺陽也乆病者邪氣入深刺此病者深内而乆留之間日而復刺之必先調其左右去其血脈刺道畢矣凡刺之法必察其形氣形肉未脱少氣而脈又躁躁厥者必為繆刺之散氣可收聚氣可布深居静處占神住来閉户塞牖魂魄不散専意一神精氣之分毋聞人聲以收其精必一其神令志在針淺而留之微而浮之以移其神氣至乃休男内女外堅拒勿出謹守勿内是謂得氣凡刺之禁新内勿刺新刺勿内已醉勿刺已刺勿醉新怒勿刺已刺勿怒新勞勿刺已刺勿勞已飽勿刺已刺勿飽已飢勿刺已刺勿飢已渴勿刺已刺勿渴大驚大恐必定其氣乃刺之乘車來者卧而休之如食須乃刺之出行来者坐而休之如行十里頃乃刺之凡此十二禁者其脈亂氣散逆其營衛經氣不次因而刺之則陽病入於隂隂病出為陽則邪氣復生粗工勿察是謂伐身形體淫泆乃消腦髓津液不化脫其五味是謂失氣也太陽之脈其終也戴眼反折瘈瘲其色白絶皮乃絶汗絶汗則終矣少陽終者耳聾百節盡縱目系絶目系絶一日半則死矣其死也色青白乃死陽明終者口目動作喜驚妄言色黄其上下之經盛而不行則終矣少隂終者面黒齒長而垢腹脹閉塞上下不通而終矣厥隂終者中熱嗌乾喜溺心煩甚則舌卷卵上縮而終矣太隂終者腹脹閉不得息氣噫善嘔嘔則逆逆則面赤不逆則上下不通上下不通則面黒皮毛燋而終矣繆刺上眉救切男内女外難經作男外女内淫濼下述各切齒長平聲靈樞經卷二欽定四庫全書靈樞經卷三宋史崧音釋經脈第十雷公問於黄帝曰禁脈之言凡刺之理經脈為始營其所行制其度量内次五藏外别六府願盡聞其道黄帝曰人始生先成精精成而腦髓生骨為幹脈為營筋為剛肉為牆皮膚堅而毛髮長榖入於胃脈道以通血氣乃行雷公曰願卒聞經脈之始生黄帝曰經脈者所以能决死生處百病調虚實不可不通肺手太隂之脈起于中焦下絡大腸還循胃口上膈屬肺從肺系横出腋下下循臑内行少隂心主之前下肘中循臂内上骨下亷入寸口上魚循魚際出大指之端其支者從腕後直出次指内亷出其端是動則病肺脹滿膨膨而喘欬缺盆中痛甚則交兩手而瞀此為臂厥是主肺所生病者欬上氣喘渴煩心胷滿臑臂内前亷痛厥掌中熱氣盛有餘則肩背痛風寒汗出中風小便數而欠氣虚則肩背痛寒少氣不足以息溺色變為此諸病盛則寫之虚則補之熱則疾之寒則留之陷下則炙之不盛不虚以經取之盛者寸口大三倍于人迎虚者則寸口反小于人迎也大腸手陽明之脈起于大指次指之端循指上亷出合谷兩骨之間上入兩節之中循臂上亷入肘外亷上臑外前亷上肩出髃骨之前亷上出于柱骨之㑹上下入缺盆絡肺下膈屬大腸其支者從缺盆上頸貫頰入下齒中還出挾口交人中左之右右之左上挾鼻孔是動則病齒痛頸腫是主津液所生病者目黄口乾鼽衂喉痺肩前臑痛大指次指痛不用氣有餘則當脈所過者熱腫虚則寒慄不復為此諸病盛則寫之虚則補之熱則疾之寒則留之陷下則炙之不盛不虚以經取之盛者人迎大三倍于寸口虚者人迎反小於寸口也胃足陽明之脈起於鼻之交頞中分納一本作約字太陽之脈下循鼻外入上齒中還出挾口環唇下交承漿却循頥後下亷出大迎前頰車上耳前過客主人循髮際至額顱其支者從大迎前下人迎循喉嚨入缺盆下膈屬胃絡脾其直者從缺盆下乳内亷下挾臍入氣街中其支者起于胃口下循腹裏下至氣街中而合以下髀闗抵伏免下膝臏中下循脛外亷下足跗入中指内間其支者下亷三寸而别下入中指外間其支者别跗上入大指間出其端是動則病洒洒振寒善呻數欠顔黒病至則惡人與火聞木聲則愓然而驚心欲動獨閉戸塞牖而處甚則欲上髙而歌棄衣而走賁響腹脹是為骭厥是主血所生病者狂瘧温淫汗出鼽衂口喎唇胗頸腫喉痺大腹水腫膝臏腫痛循膺乳氣街股伏免骭外亷足跗上皆痛中指不用氣盛則身以前皆熱其有餘于胃則消榖善饑溺色黄氣不足則身以前皆寒慄胃中寒則脹滿為此諸病盛則寫之虚則補之熱則疾之寒則留之陷下則炙之不盛不虚以經取之盛者人迎大三倍于寸口虚者人迎反小于寸口也脾足太隂之脈起於大指之端循指内側白肉際過核骨後上内踝前亷上踹内循脛骨後交出厥隂之前上膝股内前亷入腹属脾絡胃上膈挾咽連舌本散舌下其支者復從胃别上膈注心中是動則病舌本強食則嘔胃脘痛腹脹善噫得後與氣則快然如衰身體皆重是主脾所生病者舌本痛體不能動摇食不下煩心心下急痛溏瘕泄水閉黄疸不能卧强立股膝内腫厥足大指不用為此諸病盛則寫之虚則補之熱則疾之寒則留之陷下則炙之不盛不虚以經取之盛者寸口大三倍于人迎虚者寸口反小於人迎心手少隂之脈起于心中出屬心系下膈絡小腸其支者從心系上挾咽繫目系其直者復從心系却上肺下出腋下下循臑内後亷行太隂心主之後下肘内循臂内後亷抵掌後脱骨之端入掌内後亷循小指之内出其端是動則病嗌乾心痛渇而欲飲是為臂厥是主心所生病者目黄脇痛臑臂内後亷痛厥掌中熱痛為此諸病盛則寫之虚則補之熱則疾之寒則留之陷下則炙之不盛不虛以經取之盛者寸口大再倍於人迎虚者寸口反小於人迎也小腸手太陽之脈起于小指之端循手外側上腕出踝中直上循臂骨下亷出肘内側兩筋之間上循臑外後亷出肩解繞肩胛交肩上入缺盆絡心循咽下膈抵胃屬小腸其支者從缺盆循頸上頰至日鋭眥却入耳中其支者别頰上䪼抵鼻至目内眥斜絡于顧是動則病嗌痛頷腫不可以顧肩似技臑似折是主液所生病者耳聾目黄頰腫頸頷肩臑肘臂外後亷痛為此諸病盛則寫之虚則補之熱則疾之寒則留之陷下則炙之不盛不虚以經取之盛者人迎大再倍于寸口虚者人迎反小于寸口也膀胱足太陽之脈起于目内眥上額交巔其支者從巔至耳上角其直者從巔入絡腦還出别下項循肩髆内挾脊抵腰中入循膂絡腎屬膀胱其支者從腰中下挾脊貫臀入膕中其支者從髆内左右别下貫胛挾脊内過髀樞循髀外從後亷下合膕中以下貫踹内出外踝之後循京骨至小指外側是動則病衝頭痛目似脫項如拔脊痛腰似折髀不可以曲膕如結踹如裂是為踝厥是主筋所生病者痔瘧狂癲疾頭􅀈項痛目黄淚出􅍠衂項背腰尻膕踹脚皆痛小指不用為此諸病盛則寫之虚則補之熱則疾之寒則留之陷下則炙之不盛不虚以經取之盛者人迎大再倍于寸口虚者人迎反小于寸口也腎足少隂之脈起于小指之下邪走足心出于然谷之下循内踝之後别入跟中以上踹内出膕内亷上股内後亷貫脊屬腎絡膀胱其直者從腎上貫肝膈入肺中循喉嚨挾舌本其支者從肺出絡心注胷中是動則病饑不欲食面如漆柴欬唾則有血喝喝而喘坐而欲起目􅀈􅀈如無所見心如懸若饑狀氣不足則善恐心愓愓如人将捕之是為骨厥是主腎所生病者口熱舌乾咽腫上氣嗌乾及痛煩心心痛黄疸腸澼脊朘内後亷痛痿厥嗜卧足下熱而痛為此諸病盛則寫之虚則補之熱則疾之寒則留之陷下則炙之不盛不虚以經取之炙則強食生肉緩帶被髮大杖重履而步盛者寸口大再倍于人迎虚者寸口反小于人迎也心主手厥隂心包絡之脈起于胷中出屬心包絡下膈歴絡三膲其支者循胷出脇下腋三寸上抵腋下循臑内行太隂少隂之間入肘中下臂行兩筋之間入掌中循中指出其端其支者别掌中循小指次指出其端是動則病手心熱臂肘攣急腋腫甚則胷脇支滿心中憺憺大動面赤目黄喜笑不休是主脈所生病者煩心心痛掌中熱為此諸病盛則寫之虚則補之熱則疾之寒則留之陷下則炙之不盛不虛以經取之盛者寸口大一倍于人迎虚者寸口反小于人迎也三焦手少陽之脈起于小指次指之端上出兩指之間循手表腕出臂外兩骨之間上貫肘循臑外上肩而交出足少陽之後入缺盆布膻中散落心包下膈循屬三焦其支者從膻中上出缺盆上項繫耳後直上出耳上角以屈下頰至䪼其支者從耳後入耳中出走耳前過客主人前交頰至自鋭眥是動則病耳聾渾渾焞焞嗌腫喉痺是主氣所生病者汗出目鋭眥痛頰痛耳後肩臑肘臂外皆痛小指次指不用為此諸病盛則寫之虚則補之熱則疾之寒則留之陷下則炙之不盛不虚以經取之盛者人迎大一倍于寸口虚者人迎反小于寸口也膽足少陽之脈起于目鋭􅗃上抵頭角下耳後循頸行手少陽之前至肩上却交出手少陽之後入缺盆其支者從耳後入耳中出走耳前至目鋭􅗃後其支者别鋭背下大迎合于手少陽抵于䪼下加頰車下頸合缺盆以下胷中貫膈絡肝屬膽循脇裏出氣街繞毛際横入髀厭中其直者從缺盆下腋循胷過季脇下合髀厭中以下循髀陽出膝外亷下外輔骨之前直下抵絶骨之端下出外踝之前循足跗上入小指次指之間其支者别跗上入大指之間循大指歧骨内出其端還貫爪甲出三毛是動則病口苦善太息心脇痛不能轉側甚則面微有塵體無膏澤足外反熱是為陽厥是主骨所生病者頭痛頷痛目銳􅗃痛缺盆中腫痛腋下腫馬刁俠癭汗出振寒瘧胷脇肋髀膝外至脛絶骨外踝前及諸節皆痛小指次指不用為此諸病盛則寫之虚則補之熱則疾之寒則留之陷下則炙之不盛不虚以經取之盛者人迎大一倍于寸口虚者人迎反小于寸口也肝足厥隂之脈起于大指叢毛之際上循足跗上亷去内踝一寸上踝八寸交出太隂之後上膕内亷循股隂入毛中過隂器抵小腹挾胃屬肝絡膽上貫膈布脇肋循喉嚨之後上入頏顙連目系上出額與督脈㑹于巔其支者從目系下頰裏環唇内其支者復從肝别貫膈上注肺是動則病腰痛不可以俛仰丈夫㿉疝婦人少腹腫甚則嗌乾面塵脱色是肝所生病者胷滿嘔逆飱泄狐疝遺溺閉癃為此諸病盛則寫之虚則補之熱則疾之寒則留之陷下則炙之不盛不虚以經取之盛者寸口大一倍于人迎虚者寸口反小于人迎也手太隂氣絶則皮毛焦太隂者行氣温于皮毛者也故氣不榮則皮毛焦皮毛焦則津液去皮節津液去皮節者則爪枯毛折毛折者則毛先死丙篤丁死火勝金也手少隂氣絶則脈不通脈不通則血不流血不流則髦色不澤故其面黒如漆柴者血先死壬篤癸死水勝火也足太隂氣絶者則脈不榮肌肉唇舌者肌肉之本也脈不榮則肌肉軟肌肉軟則舌萎人中滿人中滿則唇反唇反者肉先死甲篤乙死木勝土也足少隂氣絶則骨枯少隂者冬脈也伏行而濡骨髓者也故骨不濡則肉不能著也骨肉不相親則肉軟却肉軟却故齒長而垢髮無澤髮無澤者骨先死戊篤已死土勝水也足厥隂氣絶則筋絶厥隂者肝脈也肝者筋之合也筋者聚于隂氣而脈絡于舌本也故脈弗榮則筋急筋急則引舌與卵故唇青舌卷卵縮則筋先死庚篤辛死金勝木也五隂氣俱絶則目系轉轉則目運目運者為志先死志先死則逺一日半死矣六陽氣絶則隂與陽相離離則腠理發泄絶汗乃出故旦占夕死夕占旦死經脈十二者伏行分肉之間深而不見其常見者足太隂過于外踝之上無所隠故也諸脈之浮而常見者皆絡脈也六經絡手陽明少陽之大絡起于五指間上合肘中飲酒者衛氣先行皮膚先充絡脈絡脈先盛故衛氣已平營氣乃滿而經脈大盛脈之卒然動者皆邪氣居之留于本末不動則熱不堅則陷且空不與衆同是以知其何脈之動也雷公曰何以知經脈之與絡脈異也黄帝曰經脈者常不可見也其虚實也以氣口知之脈之見者皆絡脈也雷公曰細子無以明其然也黄帝曰諸絡脈皆不能經大節之間必行絶道而出入復合于皮中其㑹皆見于外故諸刺絡脈者必刺其結上甚血者雖無結急取之以寫其邪而出其血留之發為痺也凡診絡脈脈色青則寒且痛赤則有熱胃中寒手魚之絡多青矣胃中有熱魚際絡赤其暴黒者留乆痺也其有赤有黒有青者寒熱氣也其青短者少氣也凡刺寒熱者皆多血絡必間日而一取之血盡而止乃調其虚實其小而短者少氣甚者寫之則悶悶甚則仆不得言悶則急坐之也手太隂之别名曰列缺起於腕上分間並太隂之經直入掌中散入於魚際其病實則手鋭掌熱虚則欠㰦小便遺數取之去腕半寸别走陽明也手少隂之别名曰通里去腕一寸半别而上行循經入於心中繫舌本屬目系其實則支膈虚則不能言取之掌後一寸别走太陽也手心主之别名曰内關去腕二寸出於兩筋之間循經以上繫於心包絡心系實則心痛虚則為頭强取之兩筋間也手太陽之别名曰支正上腕五寸内注少隂其别者上走肘絡肩髃實則節㢮肘廢虚則生肬小者如指痂疥取之所别也手陽明之别名曰偏歴去腕三寸别入太隂其别者上循臂乘肩髃上曲頰偏齒其别者入耳合於宗脈實則齲聾虚則齒寒痺隔取之所别也手少陽之别名曰外闗去腕二寸外遶臂注胷中合心主病實則肘攣虚則不收取之所别也足太陽之别名曰飛陽去踝七寸别走少隂實則鼽窒頭背痛虚則􅍠衂取之所别也足少陽之别名曰光明去踝五寸别走厥隂下絡足跗實則厥虚則痿躄坐不能起取之所别也足陽明之别名曰豐隆去踝八寸别走太隂其别者循脛骨外亷上絡頭項合諸經之氣下絡喉嗌其病氣逆則喉痺瘁瘖實則狂巔虚則足不收脛枯取之所别也足太隂之别名曰公孫去本節之後一寸别走陽明其别者入絡腸胃厥氣上逆則霍亂實則腸中切痛虛則鼓脹取之所别也足少隂之别名曰大鍾當踝後繞跟别走太陽其别者并經上走于心包下外貫腰脊其病氣逆則煩悶實則閉癃虛則腰痛取之所别者也足厥隂之别名曰蠡溝去内踝五寸别走少陽其别者徑脛上睪結於莖其病氣逆則睪腫卒疝實則挺長虛則暴癢取之所别也任脈之别名曰尾翳下鳩尾散於腹實則腹皮痛虚則癢搔取之所别也督脈之别名曰長强挾膂上項散頭上下當肩胛左右别走太陽入貫膂實則脊強虚則頭重髙摇之挾脊之有過者取之所别也脾之大絡名曰大包出淵腋下三寸布胸脇實則身盡痛虛則百節盡皆縱此脉若羅絡之血者皆取之脾之大絡脈也凡此十五絡者實則必見虛則必下視之不見求之上下人經不同絡脉異所别也瞀音務䪼之劣切髀音箄骭音旱憺憺音淡邪與斜同焞焞土渾切肬音由經别第十一黄帝問於岐伯曰余聞人之合於天道也内有五藏以應五音五色五時五味五位也外有六府以應六律六律建隂陽諸經而合之十二月十二辰十二節十二經水十二時十二經脈者此五藏六府之所以應天道夫十二經脈者人之所以生病之所以成人之所以治病之所以起學之所始工之所止也粗之所易上之所難也請問其離合出入柰何岐伯稽首再拜曰明乎哉問也此粗之所過上之所息也請卒言之足太陽之正别入於膕中其一道下尻五寸别入於肛屬於膀胱散之腎循膂當心入散直者從膂上出於項復屬於太陽此為一經也足少隂之正至膕中别走太陽而合上至腎當十四顴出屬帶脉直者繫舌本復出於項合於太陽此為一合成以諸隂之别皆為正也足少陽之正繞髀入毛際合於厥隂别走入季脇之間循胷裏屬膽散之上肝貫心以上挾咽出頥頷中散於面繫目系合少陽於外􅗃也足厥隂之正别跗上上至毛際合於少陽與别俱行此為一合也足陽明之正上至髀入於腹裏及胃散之脾上通於心上循咽出於口上頞䪼還繫目系合於陽明也足太隂之正上至髀合於陽明與别俱行上結於咽貫舌中此為三合也手太陽之正指地别於肩解入腋走心繫小腸也手少隂之正别入於淵腋兩筋之間屬於心上走喉嚨出於面合目内􅗃此為四合也手少陽之正指天别於巔入缺盆下走三焦散於胷中也手心主之正别下淵腋三寸入胷中别屬三焦出循喉嚨出耳後合少陽完骨之下此為五合也手陽明之正從手循膺乳别於肩髃入柱骨下走大腸屬於肺上循喉嚨出缺盆合於陽明也手太隂之正别入淵腋少隂之前入走肺散之太陽上出缺盆循喉嚨復合陽明此六合也尻枯毛切肛胡公切頥頷上以之切下户上切}
