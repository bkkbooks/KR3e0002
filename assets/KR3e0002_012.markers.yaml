  - {type: variant, offset: 648, length: 1, content: 壯, SBCK: 熱勝則腐肉肉腐則爲膿膿不寫則爛筋筋爛則傷骨骨傷則髓消不當骨空不得泄寫血枯空虚則筋骨肌肉不相榮經脉敗漏薰於五藏藏傷故死矣黄帝曰願盡聞癰疽之形與忌曰名歧伯曰癰發於嗌中名曰猛疽猛疽不治化爲膿膿不寫塞咽半日死其化爲膿者寫則合豕膏冷食三日而已發於頸名曰天疽其癰大以赤黒不急治則熱氣下入淵腋前傷任脉内薰肝肺薰肝肺十餘日而死矣陽留大發消腦留項名曰腦爍其色不樂項痛而如}
