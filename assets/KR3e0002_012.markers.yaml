  - {type: variant, offset: 61, length: 2, content: 高下, krp: 蓋也皮者肺之合也人之陽也故為之治鍼必以大其頭而鋭其末令無得深入而陽氣出二者地也人之所以應土者肉也故為之治鍼必筩其身而員其末令無得傷肉分傷則氣得竭三者人也人之所以成生者血脉也故為之治鍼必大其身而員其末令可以按脉勿陷以致其氣令邪氣獨出四者時也時者四時八風之客於經絡之中為瘤病者也故為之治鍼必筩其身而鋒其末令可以寫熱出血而痼病竭五者音也音者冬夏之分分於子午隂與陽别寒與熱争兩氣相摶合為癰膿者也故為之治鍼必令其末如劒鋒可以取大膿六者律也律者調隂陽四時而合十二經脉虚邪客於經絡而爲㬥痺者也故爲之治鍼必令尖如氂且員且鋭中身微大以取㬥氣七者星也星者人之七竅邪之所客於經而爲痛痺舎於經絡者也故爲之治鍼令尖如蚊䖟喙静以徐徃㣲以久留正氣因之眞邪俱徃出鍼而養者也八者風也風者人之股肱八節也八正之虚風八風傷人内舎於骨解腰脊節腠理之間為深痺也故為之治鍼必長其身鋒其末可以取深邪逺痺九者野也野者人之節解皮膚之間也淫邪流溢於身如風水之狀而溜不能過於機闗大節者也故其之治鍼令尖如挺其鋒微員以取大氣之不能過於闗節者也黄帝曰鍼之長短有數乎歧伯曰一曰鑱鍼者取法於巾鍼去末寸半卒鋭之長一寸六分主熱在頭身也二曰員鍼取法於絮鍼筩其身而卯其鋒長一寸六分主治分間氣三曰鍉鍼取法於黍粟之鋭長三寸半主按脉取氣令邪出四曰鋒鍼取法於絮鍼筩其身鋒其末長一寸六分主癰熱出血五曰鈹鍼取法於劒鋒廣二分半長四寸主大癰膿兩熱争者也六曰員利鍼取法於氂鍼㣲大其末反}
