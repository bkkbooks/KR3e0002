  - {type: punctuation, offset: 647, content: ，, id: KR3e0002_CHANT_012-bkkpn117}
  - {type: 'tls:seg', offset: 647, content: '', id: KR3e0002_CHANT_012-4a.15}
  - {type: variant, offset: 647, length: 0, content: '', SBCK: 隂氣盛則隂蹻滿不得入於陽則陽氣虚故目閉也黄帝曰人之多卧者何氣使然歧伯曰此人腸胃大而皮膚濕而分肉不解焉腸胃大則衛氣留久皮膚濕則分肉不解其行遲夫衛氣者晝日常行於陽夜行於隂故陽氣盡則卧隂氣盡則寤故腸胃大則衛氣行留久皮膚濕分肉不解則行遲留於隂也久其氣不淸則欲瞑故多卧矣其腸胃小皮膚滑以緩分肉解利衛氣之留於陽也久故少瞑焉黄帝曰其非常經也卒然多卧者何氣使然歧伯曰邪氣留於上膲上膲閉而不通已食者飲湯衛氣留久於隂而不行故卒然多卧焉黄帝曰善治此諸邪奈何歧伯曰先其藏府誅其小過後調其氣盛者寫之虚者補之必先朙知其形志之苦樂定乃取之裹擷切奚結神分切方文癰疽第八十一黄帝曰余聞腸胃受穀上焦出氣以温分肉而養骨節通􅴪理中焦出氣如露上注谿谷而滲孫脉津液和調變化而赤為血血和則孫脉先滿溢乃注於絡脉皆盈乃注於經脉隂陽已張因息乃行行有經紀周有道理與天合同不得休止切而調之從虚去實爲則不足疾則氣減留則先後後虚去虚補則有餘血氣已調形氣乃持余已知血氣之平與不平未知癰疽之所從生成敗之時死生之期有逺近何以度之可得聞乎歧伯曰經脉留行不止與天同度與地合紀故天宿失度日月薄蝕地經失紀水道流溢草萓不成五穀不殖徑路不通民不徃來巷聚邑居則别離異處血氣猶然請言其故夫血脉營衛周流不休上應星宿下應經數寒邪客於經絡之中則血泣血泣則不通不通則衛氣歸之不得復反故癰腫寒氣化為}
