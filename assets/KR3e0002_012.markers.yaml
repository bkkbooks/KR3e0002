  - {type: 'tls:seg', offset: 640, content: '', id: KR3e0002_CHANT_012-4a.13}
  - {type: variant, offset: 640, length: 0, content: '', SBCK: 則精散精散則視歧視歧見兩物目者五藏六府之精也營衛魂魄之所常營也神氣之所生也故神勞則魂􅅎散志意亂是故瞳子黒眼法於隂白眼赤脉法於陽也故隂陽合傳而精朙也目者心使也心者神之舎也故神精亂而不轉卒然見非常處精神魂魄散不相得故曰惑也黄帝曰余疑}
  - {type: variant, offset: 640, length: 0, content: '', krp: 則精散精散則視歧視歧見兩物目者五藏六府之精也營衛魂魄之所常營也神氣之所生也故神勞則魂魄散志意亂是故瞳子黒眼法於隂白眼赤脉法於陽也故隂陽合傳而精朙也目者心使也心者神之舎也故神精亂而不轉卒然見非常處精神魂魄散不相得故曰惑也黄帝曰余疑}
  - {type: variant, offset: 641, length: 4, content: 脈大血多, SBCK: 然余每之東苑未曽不惑去之則復余唯獨為東苑勞神乎何其異也歧伯曰不然也心有所喜神有所惡卒然相惑則精氣亂視誤故惑神移乃復是故間者為迷甚者為惑黄帝曰人之善忘者何氣使然歧伯曰上氣不足下氣有餘腸胃實而心肺虚虚則營衛留於下久之不以時上故善忘也黄帝曰人之善饑而不嗜食者何氣使然歧伯曰精氣幷於脾熱氣留於胃胃熱則消穀穀消故善饑胃氣逆上則胃脘寒故不嗜食也黄帝曰病而不得卧者何氣使然歧伯曰衛氣不得入於隂常留於陽留於陽則陽氣滿陽氣滿則陽蹻盛不得入於隂則隂氣虚故目不瞑矣黄帝曰病目而不得視者何氣使然歧伯曰衛氣留於隂不得行於陽留於隂則隂}
