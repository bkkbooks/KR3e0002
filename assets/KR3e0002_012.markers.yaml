  - {type: variant, offset: 650, length: 0, content: '', SBCK: 以鍼煩心者死不可治發於肩及臑名曰疵癰其狀赤黒急治之}
  - {type: variant, offset: 650, length: 0, content: '', krp: 以鍼煩心者死不可治發於肩及臑名曰疵癰其狀赤黒急治之}
  - {type: variant, offset: 651, length: 0, content: '', SBCK: 令人汗出至足不害五藏癰發四五日逞焫之發於腋下赤堅者名曰米疽治之以砭石欲細而長踈砭之塗已豕膏六日已勿裹之其癰堅而不潰者為馬刁挾癭急治之發於胸名曰井疽其狀如大豆三四日起不早治下入腹不治七日死矣發於膺名曰甘疽色青其狀如穀實􅌝􅌣常苦寒熱急治之去其寒熱十嵗死死後出膿發於脇名曰敗疵敗疵者女子之病也灸之其病大癰膿治之其中乃有生肉大如赤小豆剉䔖草根各一升以水一斗六升煑之竭為取三升則强飲厚衣坐於釡上令汗出至足已發於股脛名曰股脛疽其狀不甚變而癰膿摶骨不急治三十日死矣發於尻名曰鋭疽其狀赤堅大急治之不治三十日死矣發於股隂名曰赤施不急治六十日死在兩股之内不治十日而當死發於膝名曰疵癰其狀大癰色不變寒熱如堅石勿石石之者死須其柔乃石之者生諸癰疽之發於節而相應}
