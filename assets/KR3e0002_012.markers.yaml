  - {type: variant, offset: 595, length: 1, content: 黃, SBCK: 與日月相應也故月滿則海水西盛人血氣積肌肉充皮膚緻毛髮堅腠理㕁煙垢著當是之時雖遇賊風其入淺不深至其月郭空則海水東盛人氣血虚其衛氣去形獨居肌肉減皮膚縱腠理開毛髮殘膲理薄煙垢落當是之時遇賊風則其入深其病人也卒㬥黄}
