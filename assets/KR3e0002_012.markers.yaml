  - {type: variant, offset: 638, length: 1, content: 海, krp: 精氣皆上注於目而為之精精之窠為眼骨之精為瞳子筋之精為黒眼血之精為絡其窠氣之精為白眼肌肉之精為約束裏擷筋骨血氣之精而與脉幷為系上屬於腦後出於項中故邪中於項因逢其身之虚其入深則隨眼系以入於腦入於腦則腦轉腦轉則引目系急目系急則目眩以轉矣邪其精其精所中不相比}
