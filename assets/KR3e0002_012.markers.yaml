  - {type: variant, offset: 887, length: 0, content: '', WYG: 澠弥善切漯通合切以心撩之一本作以意料之靈樞經卷三欽定四庫全書靈樞經巻四宋史崧音釋經筋第十三足太陽之筋起于足小指上結于踝邪上結于膝其下循足外側結于踵上循跟結於膕其别者結于踹外上膕中内㢘與膕中并上結于臀上挾脊上項其支者别入結於舌本其直者結於枕骨上頭下顔結於鼻其支者為目上網下結於頄其支者從腋後外㢘結於肩髃其支者入腋下上出缺盆上結於完骨其支者出缺盆邪上出於頄其病小指支跟腫痛膕攣脊反折項筋急肩不舉腋支缺盆中紐痛不可左右摇治在燔針刼刺以知為數以痛為輸名曰仲春痺足少陽之筋起于小指次指上結外踝上循脛外㢘結於膝外廉其支者别起外輔骨上走髀前者結於伏兎之上後者結於尻其直者上乗䏚季脇上走腋前㢘繫於膺乳結於缺盆直者上出腋貫缺盆出太陽之前循耳後上額角交巔上下走頷上結於頄支者結於目眥為外維其病小指次指支轉筋引膝外轉筋膝不可屈伸膕筋急前引髀後引尻即上乗䏚季脇痛上引缺盆膺乳頸維筋急從左之右右目不開上過右角並蹻脉而行左絡於右故傷左角右足不用命曰維筋相交治在燔針刼刺以知為數以痛為輸名曰孟春痺也足陽明之筋起於中三指結於跗上邪外上加於輔骨上結於膝外㢘直上結於髀樞上循脇屬􅆃其直者上循骭結於闕其支者結於外輔骨合少陽其直者上循伏兎上結於髀聚於隂器上腹而布至缺盆而結上頸上挾口合於頄下結於鼻上合於太陽太陽為目上網陽明為目下網其支者從頰結於耳前其病足中指支脛轉筋脚跳堅伏兎轉筋髀前腫㿉疝腹筋急引缺盆及頰卒口僻急者目不合熱則筋縱自不開頰筋有寒則急引頰移口有熱則筋㢮縱緩不勝收故僻治之以馬膏膏其急者以白酒和桂以塗其緩者以桑鉤鉤之即以生桑灰置之坎中髙下以坐等以膏熨急頰且飲美酒噉美炙肉不飲酒者自强也為之三拊而已治在燔針刼刺以知為數以痛為輸名曰季春痺也足太隂之筋起於大指之端内側上結於内踝其直者絡於膝内輔骨上循隂股結於髀聚於隂器上腹結於臍循腹裏結於肋散於胷中其内者著於脊其病足大指支内踝痛轉筋痛膝内輔骨痛隂股引髀而痛隂器紐痛下引臍兩脇痛引膺中脊内痛治在燔針刼刺以知為數以痛為輸命曰孟秋痺也足少隂之筋起於小指之下並足太隂之筋邪走内踝之下結於踵與太陽之筋合而上結於内輔之下並太隂之筋而上循隂股結於隂器循􅆃内挾膂上至項結於枕骨與足太陽之筋合其病足下轉筋及所過而結者皆痛及轉筋病在此者主癎瘛及痙在外者不能俛在内者不能仰故陽病者腰反折不能俛隂病者不能仰治在燔針刼刺以知為數以痛為輸在内者熨引飲藥此筋折紐紐發數甚者死不治名曰仲秋痺也足厥隂之筋起於大指之上上結於内踝之前上循脛上結内輔之下上循隂股結於隂器絡諸筋其病足大指支内踝之前痛内輔痛隂股痛轉筋隂器不用傷於内則不起傷於寒則隂縮入傷於熱則縱挺不收治在行水清隂氣其病轉筋者治在燔針刼刺以知為數以痛為輸命曰季秋痺也手太陽之筋起於小指之上結於腕上循臂内㢘結於肘内銳骨之後彈之應小指之上入結於腋下其支者後走腋後㢘上繞肩脾循頸出走太陽之前結於耳後完骨其支者入耳中直者出耳上下結於頷上屬目外􅗃其病小指支肘内銳骨後㢘痛循臂隂入腋下腋下痛腋後㢘痛繞肩脾引頸而痛應耳中鳴痛引頷目瞑良乆乃得視頸筋急則為筋瘻頸腫寒熱在頸者治在燔針刼刺之以知為數以痛為輸其為腫者復而銳之本支者上曲牙循耳前屬目外􅗃上頷結於角其痛當所過者支轉筋治在燔針刼刺以知為數以痛為輸名曰仲夏痺也手少陽之筋起於小指次指之端結於腕上循臂結於肘上繞臑外亷上肩走頸合手太陽其支者當曲頬入繫舌本其支者上曲牙循耳前属目外眥上乘頷結於角其病當所過者即支轉筋舌卷治在燔針刼刺以知為數以痛為輸名曰季夏痺也手陽眀之筋起於大指次指之端結於腕上循臂上結於肘外上臑結於髃其支者繞肩胛挟􅆃直者從肩髃上頸其支者上頬結於頄直者上出手太陽之前上左角絡頭下右頷其病當所過者支痛及轉筋肩不舉頸不可左右視治在燔針刼刺以知為數以痛為輸名曰孟夏痺也手太隂之筋起於大指之上循指上行結於魚後行寸口外側上循臂結肘中上臑内亷入腋下出缺盆結肩前髃上結缺盆下結胷裏散貫賁合賁下抵季脇其病當所過者支轉筋痛甚成息賁脇急吐血治在燔針刼刺以知為數以痛為輸名曰仲冬痺也手心主之筋起於中指與太隂之筋並行結於肘内亷上臂隂結腋下下散前後挟脇其支者入腋散胷中結於臂其病當所過者支轉筋前及胷痛息賁治在燔針刼刺以知為數以痛為輸名曰孟冬痺也手少隂之筋起於小指之内側結於鋭骨上結肘内亷上入腋交太隂挟乳裏結於胷中循臂下繫於臍其病内急心承伏梁下為肘網其病當所過者支轉筋筋痛治在燔針刼刺以知為數以痛為輸其成伏梁吐血膿者死不治經筋之病寒則反折筋急熱則筋㢮縦不收隂痿不用陽急則反折隂急則俛不伸焠刺者刺寒急也熱則筋縱不收無用燔針名曰季冬痺也足之陽眀手之太陽筋急則口目為噼眥急不能卒視治皆如右方也頄音求骨度第十四黄帝問于伯髙曰脉度言經脉之長短何以立之伯髙曰先度其骨節之大小廣狭長短而脉度定矣黄帝曰願問衆人之度人長七尺五寸者其骨節之大小長短各㡬何伯髙曰頭之大骨圍二尺六寸胷圍四尺五寸腰圍四尺三寸髪所覆者顱至項尺二寸髪以下至頥長一尺君子終折結喉以下至缺盆中長四寸缺盆以下至􅐳􅚯長九寸過則肺大不滿則肺小􅐳􅚯以下至天樞長八寸過則胃大不及則胃小天樞以下至横骨長六寸半過則迴腸廣長不滿則狭短横骨長六寸半横骨上亷以下至内輔之上亷長一尺八寸内輔之上亷以下至下亷長三寸半内輔下亷下至内踝長一尺三寸内踝以下至地長三寸膝膕以下至跗属長一尺六寸跗属以下至地長三寸故骨圍大則太過小則不及角以下至柱骨長一尺行腋中不見者長四寸腋以下至季脇長一尺二寸季脇以下至髀樞長六寸髀樞以下至膝中長一尺九寸膝以下至外踝長一尺六寸外踝以下至京骨長三寸京骨以下至地長一寸耳後當完骨者廣九寸耳前當耳門者廣一尺三寸兩顴之間相去七寸兩乳之間廣九寸半兩髀之間廣六寸半足長一尺二寸廣四寸半肩至肘長一尺七寸肘至腕長一尺二寸半腕至中指本節長四寸本節至其末長四寸半項髪以下至背骨長二寸半膂骨以下至尾骶二十一節長三尺上節長一寸四分分之一竒分在下故上七節至於膂骨九寸八分分之七此衆人骨之度也所以立經脉之長短也是故視其經脉之在於身也其見浮而堅其見眀而大者多血細而沈者多氣也􅐳􅚯上許蝎切又許伐切下云居切髀歩米切股也五十營第十五黄帝曰余願聞五十營奈何岐伯答曰天周二十八宿宿三十六分人氣行一周千八分日行二十八宿人經脉上下左右前後二十八脉周身十六丈二尺以應二十八宿漏水下百刻以分晝夜故人一呼脉再動氣行三寸一吸脉亦再動氣行三寸呼吸定息氣行六寸十息氣行六尺日行二分二百七十息氣行十六丈二尺氣行交通於中一周於身下水二刻日行二十五分五百四十息氣行再周於身下水四刻日行四十分二千七百息氣行十周於身下水二十刻日行五宿二十分一萬三千五百息行氣五十營於身水下百刻日行二十八宿漏水皆盡脉終矣所謂交通者并行一數也故五十營備得盡天地之夀矣凡行八百一十丈也營氣第十六黄帝曰營氣之道内榖為寳榖入於胃乃𫝊之肺流溢於中布散於外精専者行於經隧常營無已終而復始是謂天地之紀故氣從太隂出注手陽眀上行注足陽眀下行至跗上注大指間與太隂合上行抵髀從脾注心中循手少隂出腋下臂注小指合手太陽上行乗腋出蝢内注目内眥上巔下項合足太陽循􅆃下尻下行注小指之端循足心注足少隂上行注腎從腎注心外散於胷中循心主脉出腋下臂出兩筋之間入掌中出中指之端還注小指次指之端合手少陽上行注膻中散於三焦従三焦注胆出脇注足少陽下行至跗上復從跗注大指間合足厥隂上行至肝從肝上注肺上循喉嚨入頏顙之竅究於畜門其支别者上額循巔下項中循􅆃入骶是督脉也絡隂器上過毛中入臍中上循腹裏入缺盆下注肺中復出太隂此營氣之所行也逆順之常也入骶音氐脉度第十七黄帝曰願聞脉度岐伯答曰手之六陽從手至頭長五尺五六三丈手之六隂從手至胷中三尺五寸三六一丈八尺五六三尺合二丈一尺足之六陽從足上至頭八尺六八四丈八尺足之六隂從足至胷中六尺五寸六六三丈六尺五六三尺合三丈九尺蹻脉從足至目七尺五寸二七一丈四尺二五一尺合一丈五尺督脉任脉各四尺五寸二四八尺二五一尺合九尺凡都合一十六丈二尺此氣之大經隧也經脉為裏支而横者為絡絡之别者為孫盛而血者疾誅之盛者寫之虚者飲藥以補之五臟常内閱於上七竅也故肺氣通於鼻肺和則鼻能知臭香矣心氣通於舌心和則舌能知五味矣肝氣通於目肝和則目能辨五色矣脾氣通於口脾和則口能知五糓矣腎氣通於耳腎和則耳能聞五音矣五藏不和則七竅不通六府不和則留為癰故邪在府則陽脉不和陽脉不和則氣留之氣留之則陽氣盛矣陽氣大盛則隂不利隂脉不利則血留之血留之則隂氣盛矣隂氣大盛則陽氣不能榮也故曰關陽氣大盛則隂氣不能榮也故曰格隂陽俱盛不得相榮故曰關格關格者不得盡期而死也黄帝曰蹻脉安起安止何氣榮水歧伯答曰蹻脉者少隂之别起於然骨之後上内踝之上直上循隂股入隂上循胷裏入缺盆上出人迎之前入頄屬目内眥合於太陽陽蹻而上行氣并相還則為濡目氣不榮則目不合黄帝曰氣獨行五藏不榮六府何也岐伯答曰氣之不得無行也如水之流如日月之行不休故隂脉榮其藏陽脉榮其府如環之無端莫知其紀終而復始其流溢之氣内漑藏府外濡腠理黄帝曰蹻脉有隂陽何脉當其數歧伯答曰男子數其陽女子數其隂當數者為經其不當數者為絡也蹻脉渠畧切又音喬經隧音遂營衛生㑹第十八黄帝問於歧伯曰人焉受氣隂陽焉㑹何氣為營何氣為衛營安從生衛於焉㑹老壯不同氣隂陽異位願聞其㑹歧伯答曰人受氣於糓糓入於胃以𫝊與肺五藏六府皆以受氣其清者為營濁者為衛營在脉中衛在脉外營周不休五十而復大㑹隂陽相貫如環無端衛氣行於隂二十五度行於陽二十五度分為晝夜故氣至陽而起至隂而止故曰日中而陽隴為重陽夜半而隂隴為重隂故太隂主内太陽主外各行二十五度分為晝夜夜半為隂隴夜半後而為隂衰平旦隂盡而陽受氣矣日中而陽隴日西而陽衰日入陽盡而隂受氣矣夜半而大㑹萬民皆臥命曰合隂平旦隂盡而陽受氣如是無已與天地同紀黃帝曰老人之不夜瞑者何氣使然少壯之人不晝瞑者何氣使然歧伯答曰壯者之氣血盛其肌肉滑氣道通營衛之行不失其常故晝精而夜瞑老者之氣血衰其肌肉枯氣道澁五藏之氣相摶其營氣衰少而衛氣内伐故晝不精夜不瞑黃帝曰願聞營衛之所行皆何道從來歧伯答曰營出於中焦衛出於下焦黃帝曰願聞三焦之所出歧伯答曰上焦出於胃上口並咽以上貫膈而布胷中走腋循太隂之分而行還至陽明上至舌下足陽明常與營俱行於陽二十五度行於隂亦二十五度一周也故五十度而復大㑹於手太隂矣黃帝曰人有熱飲食下胃其氣未定汗則出或出於面或出於背或出於身半其不循衛氣之道而出何也歧伯曰此外傷於風内開腠理毛蒸理泄衛氣走之固不得循其道此氣慓悍滑疾見開而出故不得從其道故命曰漏泄黃帝曰願聞中焦之所出歧伯答曰中焦亦並胃中出上焦之後此所受氣者泌糟粕蒸精液化其精㣲上注於肺脉乃化而為血以奉生身莫貴於此故獨得行於經隧命曰營氣黃帝曰夫血之與氣異名同類何謂也歧伯答曰營衛者精氣也血者神氣也故血之與氣異名同類焉故奪血者無汗奪汗者無血故人生有兩死而無兩生黃帝曰願聞下焦之所出歧伯答曰下焦者别迴腸注於膀胱而渗入焉故水糓者常并居於胃中成糟粕而俱下於大腸而成下焦渗而俱下濟泌别注循下焦而渗入膀胱焉黃帝曰人飲酒酒亦入胃糓未熟而小便獨先下何也歧伯答曰酒者熟糓之液也其氣悍以清故後糓而入先糓而液出焉黃帝曰善余聞上焦如霧中焦如漚下焦如瀆此之謂也四時氣第十九黃帝問於歧伯曰夫四時之氣各不同形百病之起皆有所生灸刺之道何者為定一本作宅歧伯答曰四時之氣各有所在灸别之道得氣穴為定故春取經血脉分肉之間甚者深刺之間者淺刺之夏取盛經孫絡取分間絶皮膚秋取經腧邪在府取之合冬取并榮必深以留之溫瘧汗不出為五十九痏風㽷膚脹為五十七痏取皮膚之血者盡取之飱泄補三隂之上補隂陵泉皆乆留之熱行乃止轉筋於陽治其陽轉筋於隂治其隂皆卒刺之徒㽷先取環谷下三寸以鈹針針之已刺而筩之而内之入而復之以盡其㽷必堅來緩則煩恱來急則安静間日一刺之㽷盡乃止飲閉藥方刺之時徒飲之方飲無食方食無飲無食他食百三十五日着痺不去久寒不已卒取其三里骨為幹腸中不便取三里盛寫之虛補之癘風者素刺其腫上已刺以銳針針其處按出其惡氣腫盡乃止常食方食無食他食腹中常鳴氣上衝胷喘不能乆立邪在大腸刺肓之原巨虛上亷三里小腹控睪引腰背上衝心邪在小腸者連睪系屬于脊貫肝肺絡心系氣盛則厥逆上衝腸胃燻肝散于肓結于臍故取之肓原以散之刺太隂以予之取厥隂以下之取巨虛不亷以去之按其所過之經以調之善嘔嘔有苦長大息心中憺憺恐人將捕之邪在膽逆在胃膽液泄則口苦胃氣逆則嘔苦故曰嘔膽取三里以下胃氣逆則刺少陽血絡以閉膽逆却調其虛實以去其邪飲食不下膈塞不通邪在胃脘在上脘則刺抑而下之在下脘則散而去之小腹痛腫不得小便邪在三焦約取之太陽大絡視其絡脉與厥隂小絡結而血者腫上及胃脘取三里覩其色察其音以知其散復者視其目色以知病之存亡也一其形聽其動靜者持氣口人迎以視其脉堅且盛且滑者病日進脉軟者病將下諸經實者病三日已氣口候隂人迎候陽也風㽷丸類切筩音同著痺上直畧切下音閉銳鍼上余惠切芒也靈樞經巻四欽定四庫全書靈樞經巻五宋史崧音釋五邪第二十邪在肺則病皮膚痛寒熱上氣喘汗出欬動肩背取之膺中外腧背三莭五藏一本作五顴又五節之傍以手疾按之快然乃刺之取之缺盆中以越之邪在肝則兩脇中痛寒中惡血在内行善掣節時脚腫取之行間以引脇下補三里以温胃中取血脉以散惡血取耳間青脉以去其掣邪左脾胃則病肌肉痛陽氣有餘隂氣不足則熱中善饑陽氣不足隂氣有餘則寒中腸鳴腹痛隂陽俱有餘若俱不足則有寒有熱皆調於三里邪在腎則病骨痛隂痺隂痺者按之而不得腹脹腰痛大便難肩背頸項痛時眩取之湧泉崑崙視有血者盡取之邪在心則病心痛喜悲時眩仆視有餘不足而調之其輸也顴音權寒熱病第二十一皮寒熱者不可附席毛髪焦鼻槁腊不得汗取三陽之絡以補手太隂肌寒熱者肌痛毛髮焦而唇槁腊不得汗取三陽於下以去其血者補足太隂以出其汗骨寒熱者病无所安汗注不休齒未槁取其少隂于隂股之絡齒已槁死不治骨厥亦然骨痺舉節不用而痛汗注煩心取三隂一本作三陽之經補之身有所傷血出多及中風寒若有所墮墜四支懈惰不收名曰體惰取其小腹臍下三結交三結交者陽明太隂也臍下三寸關元也厥痺者厥氣上及腹取隂陽之絡視主病也寫陽補隂經也頸側之動脉人迎人迎足陽明也在嬰筋之前嬰筋之後手陽明也名曰扶突次脉足少陽脉也名曰天牖次脉足太陽也名曰天柱腋下動脉臂太隂也名曰天府陽迎頭痛胷滿不得息取之人迎暴瘖氣鞕取扶突與舌本出血暴􅀢氣䝉耳目不明取天牖暴挛癎眩足不任身取天柱暴癉内逆肝肺相摶血溢鼻口取天府此為大牖五部臂陽明有入頄徧齒者名曰大迎下齒齲取之臂惡寒補之不惡寒寫之足太陽有入頄徧齒者多曰角孫上齒齲取之在鼻與頄前方病之時其脉盛盛則寫之虛則補之一曰取之出鼻外足陽明有挾鼻入於面者名曰懸顱屬口對入繫目本視有過者取之損有餘益不足反者益其足太陽有通項入於腦者正屬目本名曰眼系頭目苦痛取之在項中兩筋間入腦乃别隂􅀈陽􅀈隂陽相交陽入隂隂出陽交於目銳􅗃陽氣盛則瞋目隂氣盛則瞑目熱厥取足太隂少陽皆留之寒厥取足陽明少隂於足皆留之舌縱涎下煩悗取足少隂振寒洒洒鼓頷不得汗出腹脹煩悗取手太隂刺虚者刺其去也刺實者刺其來也春取絡脉夏取分腠秋取氣口冬取經輸凡此四時各以時為齊絡脉治皮膚分腠治肌肉氣口治筋脉經輸治骨髓五藏身有五部伏兎一腓二腓者腨也眥三五藏之腧四項五此五部有癰疽者死病始手臂者先取手陽明太隂而汗出病始頭首者先取項太陽而汗出病始足脛者先取足陽明而汗出臂太隂可汗出足陽明可汗出故取隂而汗出甚者止之於陽取陽而汗出甚者止之於隂凡刺之害中而不去則精泄不中而去則致氣精泄則病甚而惟致氣則生為癰疽也槁腊下思禹丘禹切亦切齒齒蠧也頄逵仇二音而顴也悗音悶腓音肥癲狂第二十二目眥外決於面者為銳眥在内近鼻者為内眥上為外眥下為内眥癲疾始生先不樂頭重痛視舉目赤甚作極已而煩心候之於顔取手太陽陽明太隂血變而止癲疾始作而引口啼呼喘悸者候之手陽明太陽左强者攻其右右强者攻其左血變而止癲疾始作先反僵因而􅆃痛候之足太陽陽明太隂手太陽血變而止治癲疾者常與之居察其所當取之處病至視之有過者寫之置其血於瓠壺之中至其發時血獨動矣不動灸窮骨二十壯窮骨者骶骨也骨癲疾者􅀈齒諸腧分肉眥滿而骨居汗出煩悗嘔多沃沫氣下泄不治筋癲疾者身倦攣急大刺項大經之大抒脉嘔多沃沫氣下泄不治脉癲疾者暴仆四肢之脉皆脹而縱脉滿盡刺之出血不滿灸之挾項太陽灸帯脉於腰相去三寸諸分肉本輸嘔多沃沫氣下泄不治癲疾者疾發如狂者死不治狂始生先自悲也喜忘苦怒善恐者得之憂饑治之取手太隂陽明血變而止及取足太隂陽明狂始發少臥不饑自高賢也自辯智也自尊貴也善罵詈日夜不休治之取手陽明太陽太隂舌下少隂視之盛者皆取之不盛釋之也狂言驚善笑好歌樂妄行不休者得之大恐治之取手陽明太陽太隂在目妄見耳妄聞善呼者少氣之所生也治之取手太陽太隂陽明足太隂頭兩顑狂者多食善見鬼神善笑而不發於外者得之有所大喜治之取足太隂太陽陽明後取手太隂太陽陽明狂而新發未應如此者先取曲泉左右動脉及盛者見血有頃已不已以法取之灸骨骶二十壯風逆暴四肢腫身漯漯唏然時寒饑則煩飽則善變取手太隂表裏足少隂陽明之經肉凊取榮骨凊取井經也厥逆為病也足暴凊胷若將裂腸若將以刀切之煩而不能食脉大小皆濇煖取足少隂凊取足陽明凊别補之温則寫之厥逆腹脹滿腸鳴胷滿不得息取之下胷二脇欬而動手者與背腧以手按之立快者是也内閉不得溲刺足少隂太陽與骶上以長針氣逆則取其太隂陽明厥隂甚取少隂陽明動者之經也少氣身漯漯也言吸吸也骨痠體重懈惰不能動補足少隂短氣息短不屬動作氣索補足少隂去血絡也倦攣上音權顑口感切飢黄起行唏許几切笑也熱病第二十三偏枯身偏不用而痛言不變志不亂病在分腠之間巨針取之益其不足損其有餘乃可復也痱之為病也身無痛者四肢不收智亂不甚其言微知可治甚則不能言不可治也病先起於陽後入於隂者先取其陽後取其隂浮而取之熱病三日而氣口靜人迎躁者取之諸陽五十九刺以寫其熱而出其汗實其隂以補其不足者身熱甚隂陽皆靜者勿刺也其可刺者急取之不汗出則泄所謂勿刺者有死徴也熱病七日八日脉口動喘而短一本作弦者急刺之汗且自出淺刺手大指間熱病七日八日脉微小病者溲血口中乾一日半而死脉代者一日死熱病已得汗出而脉尚躁喘且復熱勿刺膚喘甚者死熱病七日八日脉不躁躁不散数後三日中有汗三日不汗四日死未曽汗者勿腠刺之熱病先膚痛窒鼻充面取之皮以第一針五十九苛軫鼻索皮於肺不得索之火火者心也熱病先身濇倚而熱煩悗亁唇口嗌取之皮以第一針五十九膚脹口乾寒汗出索脉於心不得索之水水者腎也熱病嗌亁多飲善驚臥不能起取之膚肉以第六針五十九目眥青索肉於脾不得索之木木者肝也熱病面青腦痛手足躁取之筋間以第四針於四逆筋躄目浸索筋於肝不得索之金金者肺也熱病數驚瘈瘲而狂取之脉以第四針急寫有餘者癲疾毛髪去索血於心不得索之水水者腎也熱病身重骨痛耳聾而好瞑取之骨以第四針五十九刺骨病不食齧齒耳青索骨於腎不得索之土土者脾也熱病不知所痛耳聾不能自收口乾陽熱甚隂頗有寒者熱在髓死不可治熱病頭痛顳顬目􅪴脉痛善衂厥熱病也取之以第三針視有餘不足寒熱痔熱病體重腸中熱取之以第四針於其腧及下諸指間索氣於胃胳得氣也熱病挾臍急痛胷脇滿取之湧泉與隂陵泉取以第四針針嗌裏熱病而汗且出及脉順可汗者取之魚際大淵大都大白寫之則熱去補之則汗出汗出大甚取内踝上横脉以止之熱病已得汗而脉尚躁盛此隂脉之極也死其得汗而脉靜者生熱病者脉尚盛躁而不得汗者此陽脉之極也死脉盛躁得汗靜者生熱病不可刺者有九一曰汗不出大顴發赤噦者死二曰泄而腹滿甚者死三曰目不明熱不已者死四曰老人嬰兒熱而腹滿者死五曰汗不出嘔下血者死六曰舌本爛熱不已者死七曰欬而衂汗不出出不至足者死八曰髓熱者死九曰熱而痙者死腰折瘈瘲齒噤齘也凡此九者不可刺也所謂五十九刺者兩手外内側各三凡十二痏五指間各一凡八痏足亦如是頭入髪一寸傍三分各三凡六痏更入髪三寸邉五凡十痏耳前後口下者各一項中一凡六痏巔上闕頔㑹一髪際一亷泉一風池二天柱二氣滿胷中喘息取足太隂大指之端去爪甲如薤葉寒則留之熱則疾之氣下乃止心疝暴痛取足太隂厥隂盡刺去其血絡喉痺舌卷口中乾煩心心痛臂内亷痛不可及頭取手小指次指爪甲下去端如韭葉目中赤痛從内眥始取之隂蹻風痙身反折先取足太陽及膕中及血絡出血中有寒取三里癃取之隂蹻及三毛上及血絡出血男子如蠱女子如怚身體腰􅆃如解不欲飲食先取湧泉見血視跗上盛者盡見血也痱音肥痙巨井切噤巨禁切齘音介厥病第二十四厥頭痛面若腫起而煩心取之足陽明太隂厥頭痛頭脉痛心悲善泣視頭動脉反盛者刺盡去血後調足厥隂厥頭痛貞貞頭重而痛寫頭上五行行五先取手少隂後取足少隂厥頭痛意善忘按之不得取頭面左右動脉後取足太隂厥頭痛項先痛腰􅆃為應先取天柱後取足太陽厥頭痛頭痛甚耳前後脉湧有熱一本云有動脉寫出其血後取足少陽眞頭痛頭痛甚腦盡痛手足寒至節死不治頭痛不可取於腧者有所擊堕惡血在於内若肉傷痛未已則可刺不可逺取也頭痛不可刺者大痺為惡日作者可令少愈不可已頭半寒痛先取手少陽陽明後取足少陽陽明厥心痛與背相控善瘈如從後觸其心傴僂者腎心痛也先取京骨崑崙發針不已取然谷厥心痛腹脹胷滿心尤痛甚胃心痛也取之大都大白厥心痛痛如以錐針刺其心心痛甚者脾心痛也取之然谷大谿厥心痛色蒼蒼如死狀終日不得太息肝心痛也取之行間大衝厥心痛卧若徒居心痛間動作痛益甚色不變肺心痛也取之魚際大淵眞心痛手足凊至節心痛甚旦發夕死夕發旦死心痛不可刺者中有盛聚不可取於腧腸中有蟲瘕及蛟蛕皆不可取以小針心腸痛憹作痛腫聚往來上下行痛有休止腹熱喜渴涎出者是蛟蛕也以手聚按而堅持之無令得移以大針刺之乆持之蟲不動乃出針也㤣腹憹痛形中上者耳聾無聞取耳中耳鳴取耳前動脉耳痛不可刺者耳中有膿若有乾耵矃耳無聞也耳聾取手小指次指爪甲上與肉交者先取手後取足耳鳴取手中指爪甲上左取右右取左先取手後取足髀不可舉側而取之在漚合中以貟利針大針不可刺病注下血取曲泉風痺淫濼病不可已者足如履氷時如入湯中股脛淫濼煩心頭痛時嘔時悗眩已汗出乆則目眩悲以喜恐短氣不樂不出三年死也貞貞都耕切憹乃老切㤣音烹耵矃上都領切耳中垢也下乃頃切病本第二十五先病而後逆者治其本先逆而後病者治其本先寒而後生病者治其本先病而後生寒者治其本先熱而後生病者治其本先泄而後生他病者治其本必且調之乃治其他病先病而後中滿者治其標先病後泄者治其本先中滿而後煩心者治其本有客氣有同氣大小便不利治其標大小便利治其本病發而有餘本而標之先治其本後治其標病發而不足標而本之先治其標後治其本謹詳察間甚以意調之間者并行甚為獨行先小大便不利而後生他病者治其本也雜病第二十六厥挾脊而痛者至頂頭沈沈然目􅉩􅉩然腰脊强取足太陽膕中血絡厥胷滿面腫脣漯漯然暴言難甚則不能言取足陽明厥氣走喉而不能言手足凊大便不利取足少隂厥而腹嚮嚮然多寒氣腹中糓糓便溲難取足太隂嗌乾口中熱如膠取足少隂膝中痛取犢鼻以貟利針發而間之針大如氂刺膝無疑喉痺不能言取足陽明能言取手陽明瘧不渇間日而作取足陽明渇而日作取手陽明齒痛不惡清飲取足陽明惡清飲取手陽明聾而不痛者取足少陽聾而痛者取手陽明衂而不止衃血流取足太陽衃血取手太陽不已刺宛骨下不已刺膕中出血腰痛痛上寒取足太陽陽明痛上熱取足厥隂不可以俛仰取足少陽中熱而喘取足少隂膕中血絡喜怒而不欲食言益小刺足太隂怒而多言刺足少陽顑痛刺手陽明與顑之盛脈出血項痛不可俛仰刺足太陽不可以顧刺手太陽也小腹滿大上走胃至心淅淅身時寒熱小便不利取足厥隂腹滿大便不利腹大亦上走胷嗌喘息喝喝然取足少隂腹滿食不化腹嚮嚮然不能大便取足太隂心痛引腰􅆃欲嘔取足少隂心痛腹脹嗇嗇然大便不利取足太隂心痛引背不得息刺足少隂不已取手少陽心痛引小腹滿上下無常處便溲難刺足厥隂心痛但短氣不足以息刺手太隂心痛當九節次之按已刺按之立已不已上下求之得之立已顑痛刺足陽明曲周動脉見血立已不已按人迎於經立已氣逆上刺膺中陷者與下胷動脉腹痛刺臍左右動脉已刺按之立已不已刺氣街已刺按之立已痿厥為四末束悗乃疾解之日二不仁者十日而知無休病已止歲以草刺鼻嚏嚏而已無息而疾迎引之立已大驚之亦可已嚮響糓解周痺第二十七黃帝問於岐伯曰周痺之在身也上下移徙隨脉其上下左右相應間不容空願聞此痛在血脉之中邪將在分肉之間乎何以致是其痛之移也間不及下針其慉痛之時不及定治而痛已止矣何道使然願聞其故歧伯答曰此衆痺也非周痺也黃帝曰願聞衆痺歧伯對曰此各在其處更發更止更居更起以右應左以左應右非能周也更發更休也黄帝曰善刺之奈何歧伯對曰刺此者痛雖已止必刺其處勿令復起帝曰善願聞周痺何如歧伯對曰周痺者在於血脉之中随脉以上随脉以下不能左右各當其所黃帝曰刺之奈何歧伯對曰痛從上下者先刺其下以過一作遏下同之後刺其上以脫之痛從下上者先刺其上以過之後刺其下以脫之黃帝曰善此痛安生何因而有名歧伯對曰風寒濕氣客於外分肉之間廹切而為沫沫得寒則聚聚則排分肉而分裂也分裂則痛痛則神歸之神歸之則熱熱則痛解痛解則厥厥則他痺發發則如是帝曰善余已得其意矣此内不在藏而外未發於皮獨居分肉之間眞氣不能周故命曰周痺故刺痺者必先切循其下之六經視其虛實及大絡之血結而不通及虛而脉陷空者而調之熨而通之其堅轉引而行之黃帝曰善余已得其意矣亦得其事也九者經巽之理十二經脉隂陽之病也慉許六切口問第二十八黃帝閒居辟左右而問於歧伯曰余已聞九針之經論隂陽逆順六經已畢願得口問歧伯避席再拜曰善乎哉問也此先師之所口傳也黄帝曰願聞口傳歧伯答曰夫百病之始生也皆生於風雨寒暑隂陽喜怒飲食居處大驚卒恐則血氣分離隂陽破散經絡厥絶脉道不通隂陽相逆衛氣稽留經脉虛空血氣不次乃失其常論不在經者請道其方黃帝曰人之欠者何氣使然歧伯答曰衞氣晝日行於陽夜半則行於隂隂者主夜夜者臥陽者主上隂者主下故隂氣積於下陽氣未盡陽引而上隂引而下隂陽相引故數欠陽氣盡隂氣盛則目瞑隂氣盡而陽氣盛則寤矣寫足少隂補足太陽黃帝曰人之噦者何氣使然歧伯曰糓入於胃胃氣上注於肺今有故寒氣與新谷氣俱還入於胃新故相亂眞邪相攻氣并相逆復出於胃故為噦補手太隂寫足少隂黃帝曰人之唏者何氣使然歧伯曰此隂氣盛而陽氣虛隂氣疾而陽氣徐隂氣盛而陽氣絶故為唏補足太陽寫足少隂黃帝曰人之振寒者何氣使然歧伯曰寒氣客於皮膚隂氣盛陽氣虛故為振寒寒傈補諸陽黃帝曰人之噫者何氣使然歧伯曰寒氣客於胃厥逆從下上散復出於胃故為噫補足太隂陽明一曰補眉本也黃帝曰人之􅅉者何氣使然歧伯曰陽氣和利滿於心出於鼻故為􅅉補足太陽榮眉本一曰眉上也黃帝曰人之嚲者何氣使然歧伯曰胃不實則諸脉虛諸脉虛則筋脉懈惰筋脉懈惰則行隂用力氣不能復故為嚲因其所在補分肉間黃帝曰人之哀而泣涕出者何氣使然歧伯曰心者五藏六府之主也目者宗脉之所聚也上液之道也口鼻者氣之門户也故悲哀愁憂則心動心動則五藏六府皆摇摇則宗脉感宗脉感則液道開液道開故泣涕出焉藏者所以灌精濡空竅者也故上液之道開則泣泣不止則液竭液竭則精不灌精不灌則目無所見矣故命曰奪精補天柱經挾頸黃帝曰人之太息者何氣使然歧伯曰憂思則心系急心系急則氣道約約則不利故太息以伸出之補手少隂心主足少陽留之也黃帝曰人之涎下者何氣使然歧伯曰飲食者皆入於胃胃中有熱則蟲動蟲動則胃緩胃緩則亷泉開故涎下補足少隂黃帝曰人之耳中鳴者何氣使然歧伯曰耳者宗脉之所聚也故胃中空則宗脉虛虛則下溜脉有所竭者故耳鳴補客主人手大指爪甲上與肉交者也黃帝曰人之自齧舌者何氣使然此厥逆走上脉氣故至也少隂氣至則齧舌少陽氣至則齧頰陽明氣至則齧唇矣視主病者則補之凡此十二邪者皆竒邪之走空竅者也故邪之所在皆為不足故上氣不足腦為之不滿耳為之苦鳴頭為之苦傾目為之鳴中氣不足故使為之變腸為之苦鳴下氣不足則乃為痿厥心俛補足外踝下留之黃帝曰治之奈何歧伯曰腎主為欠取足少隂肺主為噦取手太隂足少隂唏者隂與陽絶故補足太陽寫足少隂振寒者補諸陽噫者補足太隂陽明􅅉者補足太陽眉本嚲因其所在補分肉間泣出補天柱經俠頸俠頸者頭中分也太息補手少隂心主足少陽留之涎下補足少隂耳鳴補客主人手大指爪甲上與肉交者自齧舌視主病者則補之目眩頭傾補足外踝下留之痿厥心悗刺足大指間上二寸留之一曰足外踝下留之靈樞經巻五欽定四庫全書靈樞經卷六宋史崧音釋師傳第二十九黄帝曰余聞先師有所心藏弗著於方余願聞而藏之則而行之上以治民下以治身使百姓無病上下和親德澤下流子孫無憂傳於後世無有終時可得聞乎歧伯曰逺乎哉問也夫治民與自治治彼與治此治小與治大治國與治家未有逆而能治之也夫惟順而已矣順者非獨隂陽脉論氣之逆順也百姓人民皆欲順其志也黃帝曰順之奈何歧伯曰入國問俗入家問諱上堂問禮臨病人問所便黃帝曰便病人奈何歧伯曰夫中熱消癉則便寒寒中之屬則便熱胃中熱則消糓令人縣心養饑臍以上皮熱腸中熱則出黃如糜臍以下皮寒胃中寒則腹脹腸中寒則腸鳴飱泄胃中寒腸中熱則脹而且泄胃中熱腸中寒則疾饑小腹痛脹黃帝曰胃欲寒饑腸欲熱飲兩者相逆便之奈何且夫王公大人血食之君驕恣從欲輕人而無能禁之禁之則逆其志順之則加其病便之奈何治之何先歧伯曰人之情莫不惡死而樂生告之以其敗語之以其善導之以其所便開之以其所苦雖有無道之人惡有不聽者乎黃帝曰治之奈何歧伯曰春夏先治其標後治其本秋冬先治其本後治其標黃帝曰便其相逆者奈何歧伯曰便此者食飲衣服亦欲適寒温寒無凄愴暑無出汗食飲者熱無灼灼寒無滄滄寒温中適故氣將持乃不致邪僻也黃帝曰本藏以身形支節䐃肉候五藏六府之小大焉今夫王公大人臨朝即位之君而問焉誰可捫循之而後答乎歧伯曰身形支節者藏府之葢也非面部之閱也黃帝曰五藏之氣閲於面者余已知之矣以肢節知而閱之奈何歧伯曰五藏六府者肺為之葢巨肩陷咽候見其外黃帝曰善歧伯曰五藏六府心為之主缺盆為之道䯏骨有餘以候􅐳􅚯黃帝曰善歧伯曰肝者主為將使之候外欲知堅固視目大小黃帝曰善歧伯曰脾者主為衛使之迎糧視唇舌好惡以知吉㐫黃帝曰善歧伯曰腎者主為外使之逺聽視耳好惡以知其性黃帝曰善願聞六府之候歧伯曰六府者胃為之海廣骸大頸張胷五糓乃容鼻隧以長以候大腸唇厚人中長以候小腸目下果大其膽乃横鼻孔在外膀胱漏泄鼻柱中央起三焦乃約此所以候六府者也上下三等藏安且良矣便平聲决氣第三十黃帝曰余聞人有精氣津液血脉余意以為一氣耳今乃辨為六名余不知其所以然歧伯曰兩神相摶合而成形常先身生是謂精何謂氣歧伯曰上焦開發宣五糓味熏膚充身澤毛若霧露之漑是謂氣何謂津歧伯曰腠理發泄汗出溱溱是謂津何謂液歧伯曰糓入氣滿淖澤注於骨骨屬屈伸洩澤補益腦髓皮膚潤澤是謂液何謂血歧伯曰中焦受氣取汁變化而赤是謂血何謂脉歧伯曰壅渇營氣令無所避是謂脉黃帝曰六氣者有餘不足氣之多少腦髓之虛實血脉之清濁何以知之歧伯曰精脫者耳聾氣脫者目不明津脫者腠理開汗大泄液脫者骨屬屈伸不利色夭腦髓消脛痠耳數鳴血脫者色白夭然不澤其脉空虛此其候也黃帝曰六氣者貴賤何如歧伯曰六氣者各有部主也其貴賤善惡可為常主然五糓與胃為大海也溱音臻腸胃第三十一黃帝問於伯高曰余願聞六府傳糓者腸胃之大小長短受糓之多少奈何伯髙曰請盡言之糓所從出入淺深逺近長短之度脣至齒長九分口廣二寸半齒以後至㑹厭深三寸半大容五合舌重十兩長七寸廣二寸半咽門重十兩廣一寸半至胃長一尺六寸胃䊸曲屈伸之長二尺六寸大一尺五寸徑五寸大容三升五升小腸後附脊左環廻周叠積其注於廻腸者外附于臍上迴運環十六曲大二寸半徑八分分之少半長三丈四尺迴腸當臍左環迴周葉積而下迴運環反十六曲大四寸徑一寸寸之少半長二丈一尺廣腸傳􅆃以受迴腸左環葉積上下辟大八寸徑二寸寸之大半長二尺八寸腸胃所入至所出長六丈四寸四分迴曲環反三十二曲也平人絶糓第三十二黃帝曰願聞人之不食七日而死何也伯髙曰臣請言其故胃大一尺五寸徑五寸長二尺六寸横屈受水糓三斗五升其中之糓常留二斗水一斗五升而滿上焦泄氣出其精微慓悍滑疾下焦下漑諸腸小腸大二寸半徑八分分之少半長三丈二尺受糓二斗四升水六升三合合之大半迴腸大四寸徑一寸寸之少半長二丈一尺受糓一斗水七升半廣腸大八寸徑二寸寸之大半長二尺八寸受糓九升三合八分合之一腸胃之長凡五丈八尺四寸受水糓九斗二升一合合之大半此腸胃所受水糓之數也平人則不然胃滿則腸虛腸滿則胃虛更虛更滿故氣得上下五藏安定血脉和利精神乃居故神者水糓之精氣也故腸胃之中當留糓二斗水一斗五升故平人日再後後二升半一日中五升七日五七三斗五升而留水糓盡矣故平人不食飲七日而死者水糓精氣津液皆盡故也海論第三十三黃帝問於歧伯曰余聞刺法於夫子夫子之所言不離於營衛血氣夫十二經脉者内屬於府藏外絡於肢節夫子乃合之於四海乎歧伯答曰人亦有四海十二經水經水者皆注於海海有東西南北命曰四海黃帝曰以人應之奈何歧伯曰人有髓海有血海有氣海有水糓之海凡此四者以應四海也黃帝曰逺乎哉夫子之合人天地四海也願聞應之奈何歧伯答曰必先明知隂陽表裏滎輸所在四海定矣黃帝曰定之奈何歧伯曰胃者水糓之海其輸上在氣街下至三里衝脉者為十二經之海其輸上在於大杼下出於巨虛之上下亷膻中者為氣之海其輸上在於骨柱之上下前在於人迎腦為髓之海其輸上在于其葢下在風府黃帝曰凡此四海者何利何害何生何敗歧伯曰得順者生得逆者敗知調者利不知調者害黃帝曰四海之逆順奈何歧伯曰氣海有餘者氣滿胷中悗息面赤氣海不足則氣少不足以言血海有餘則常想其身大怫然不知其所病血海不足亦常想其身小狹然不知其所病水糓之海有餘則腹滿水糓之海不足則饑不受糓食髓海有餘則輕勁多力自過其度髓海不足則腦轉耳鳴脛痠眩胃目無所見懈怠安臥黃帝曰余已聞逆順調之奈何歧伯曰審守其輸而調其虛實無犯其害順者得復逆者必敗黃帝曰善五亂第三十四黃帝曰經脉十二者别為五行分為四時何失而亂何得而治歧伯曰五行有序四時有分相順則治相逆則亂黃帝曰何謂相順歧伯曰經脉十有二者以應十二月十二月者分為四時四時者春秋冬夏其氣各異營衛相隨隂陽已和清濁不相干如是則順之而治黃帝曰何謂逆而亂歧伯曰清氣在隂濁氣在陽營氣順脉衛氣逆行清濁相干亂於胷中是謂大悗故氣亂於心則煩心宻嘿俛首靜伏亂於肺則俛仰喘喝接手以呼亂於腸胃則為霍亂亂於臂脛則為四厥亂於頭則為厥逆頭重眩仆黃帝曰五亂者刺之有道乎歧伯曰有道以來有道以去審知其道是謂身寳黃帝曰善願聞其道歧伯曰氣在於心者取之手少隂心主之輸氣在於肺者取之手太隂榮足少隂輸氣在於腸胃者取之足太隂陽明不下者取之三里氣在於頭者取之天柱大杼不知取足太陽榮輸氣在於臂足取之先去血脉後取其陽明少陽之榮輸黃帝曰補寫奈何歧伯曰徐入徐出謂之導氣補寫無形謂之同精是非有餘不足也亂氣之相逆也黃帝曰允乎哉道明乎哉論請著之玉版命曰治亂也脹論第三十五黃帝曰脉之應於寸口如何而脹歧伯曰其脉大堅以濇者脹也黃帝曰何以知藏府之脹也歧伯曰隂為藏陽為府黃帝曰夫氣之令人脹也在於血脉之中耶藏府之内乎歧伯曰三一云二字者皆存焉然非脹之舎也黃帝曰願聞脹之舍歧伯曰夫脹者皆在於藏府之外排藏府而郭胷脇脹皮膚故命曰脹黃帝曰藏府之在胷脇腹裏之内也若匣匱之藏禁器也各有次舎異名而同處一域之中其氣各異願聞其故黃帝曰未解其意再問歧伯曰夫胷腹藏府之郭也膻中者心主之宫城也胃者大倉也咽喉小腸者傳送也胃之五竅者閭里門户也亷泉玊英者津液之道也故五藏六府者各有畔界其病各有形狀營氣循脉衛氣逆為脉脹衛氣並脉循分為膚脹三里而寫近者一下逺者三下無問虛實工在疾寫黃帝曰願聞脹形歧伯曰夫心脹者煩心短氣臥不安肺脹者虛滿而喘欬肝脹者脇下滿而痛引小腹脾脹者善噦四肢煩悗體重不能勝衣臥不安腎脹者腹滿引背央央然腰髀痛六府脹胃脹者腹滿胃脘痛鼻聞焦臭妨於食大便難大腸脹者腸鳴而痛濯濯冬日重感於寒則飱泄不化小腸脹者少腹䐜脹引腰而痛膀胱脹者少腹滿而氣癃三焦脹者氣滿於皮膚中輕輕然而不堅膽脹者脇下痛脹口中苦善太息凡此諸脹者其道在一明知逆順針數不失寫虛補實神去其室致邪失正眞不可定粗之所敗謂之夭命補虛寫實神歸其室乆塞其空謂之良工黃帝曰脹者焉生何因而有歧伯曰衛氣之在身也常然並脉循分肉行有逆順隂陽相隨乃得天和五藏更始四時有序五糓乃化然後厥氣在下營衛留止寒氣逆上真邪相攻兩氣相摶乃合為脹也黃帝曰善何以解惑歧伯曰合之於眞三合而得帝曰善黃帝問於歧伯曰脹論言無間虛實工在疾寫近者一下逺者三下今有其三而下下者其過焉在歧伯對曰此言䧟於肉肓而中氣宂者也不中氣宂則氣内閉針不䧟肓則氣不行上越中肉則衛氣相亂隂陽相逐其於脹也當寫不寫氣故不下三而不下必更其道氣下乃止不下復始可以萬全烏有殆者乎其於脹也必審其脈當寫則寫當補則補如鼓應桴惡有不下者乎五癃津液别第三十六黃帝問於歧伯曰水糓入於口輸於腸胃其液别為五天寒衣薄則為溺與氣天熱衣厚則為汗悲哀氣并則為泣中熱胃緩則為唾邪氣内逆則氣為之閉塞而不行不行則為水脹余知其然也不知其何由生願聞其道歧伯曰水糓皆入於口其味有五各注其海津液各走其道故三焦出氣以温肌肉充皮膚為其津其流而不行者為液天暑衣厚則腠理開故汗出寒留於分肉之間聚沫則為痛天寒則腠理閉氣濕不行水下留於膀胱則為溺與氣五藏六府心為之主耳為之聽目為之候肺為之相肝為之將脾為之衛腎為之主外故五藏六府之津液盡上渗於目心悲氣并則心系急心系急則肺舉肺舉則液上溢夫心系與肺不能常舉乍上乍下故欬而泣出矣中熱則胃中消糓消糓則蟲上下作腸胃充郭故胃緩胃緩則氣逆故唾出五糓之津液和合而為高者内渗入於骨空補益腦髓而下流於隂股隂陽不和則使液溢而下流於隂髓液皆減而下下過度則虛虛故腰背痛而脛痠隂陽氣道不通四海閉塞三焦不寫津液不化水糓并行腸胃之中别於迴腸留於下焦不得渗膀胱則下焦脹水溢則為水脹此津液五别之順逆也五閱五使第三十七黃帝問於歧伯曰余聞刺有五官五閲以觀五氣五氣者五藏之使也五時之副也願聞其五使當安出歧伯曰五官者五藏之閱也黃帝曰願聞其所出令可為常歧伯曰脉出於氣口色見於明堂五色更出以應五時各如其常經氣入藏必當治裏帝曰善五色獨决於明堂乎歧伯曰五官己辨闕庭必張乃立明堂明堂廣大蕃蔽見外方垂高基引垂居外五色乃治平𫝊廣大壽中百嵗見此者刺之必已如是之人者血氣有餘肌肉堅緻故可苦已針黃帝曰願聞五官歧伯曰鼻者肺之官也目者肝之官也口唇者脾之官也舌者心之官也耳者腎之官也黃帝曰以官何候歧伯曰以候五藏故肺病者喘息鼻脹肝病者􅗃青脾病者唇黃心病者舌巻短顴赤腎病者顴與頄黒黄帝曰五脉安出五色安見其常色殆者如何歧伯曰五官不辨闕庭不張小其明堂蕃蔽不見又埤其墻墻下無基垂角去外如是者雖平常殆况加疾哉黃帝曰五色之見於明堂以觀五藏之氣左右高下各有形乎歧伯曰府藏之在中也各以次舎左右上下各如其度也緻池利切宻也逆順肥瘦第三十八黃帝問於歧伯曰余聞鍼道於夫子衆多畢悉矣夫子之道應若失而㨿未有堅然者也夫子之問學熟乎將審察於物而心生之乎歧伯曰聖人之為道者上合於天下合於地中合於人事必有明法以起度數法式檢押乃後可傳焉故匠人不能釋尺寸而意短長廢繩墨而起平水也工人不能置規而為貟去矩而為方知用此者固自然之物易用之教逆順之常也黃帝曰願聞自然奈何歧伯曰臨深泱水不用功力而水可竭也循掘決衝而經可通也此言氣之滑澁血之清濁行之逆順也黃帝曰願聞人之白黒肥瘦小長各有數乎歧伯曰年質壯大血氣充盈膚革堅固因加以邪刺此者深而留之此肥人也廣肩腋項肉薄厚皮而黒色唇臨臨然其血黒以濁其氣濇以遲其為人也貪於取與刺此者深而留之多益其數也黃帝曰刺瘦人奈何歧伯曰瘦人者皮薄色少肉亷亷然薄唇輕言其血清氣滑易脫於氣易損於血刺此者淺而疾之黃帝曰刺常人奈何歧伯曰視其白黒各為調之其端正敦厚者其血氣和調刺此者無失常數也黃帝曰刺壯士眞骨者奈何歧伯曰刺壯士眞骨堅肉緩節監監然此人重則氣濇血濁刺此者深而留之多益其數勁則氣滑血清刺此者淺而疾之黃帝曰刺嬰兒奈何歧伯曰嬰兒者其肉脆血少氣弱刺此者以豪刺淺刺而疾發針日再可也黃帝曰臨深決水奈何歧伯曰血清氣濁疾寫之則氣竭焉黃帝曰循掘决衝奈何歧伯曰血濁氣濇疾寫之則經可通也黃帝曰脉行之逆順奈何歧伯曰手之三隂從藏走手手之三陽從手走頭足之三陽從頭走足足之三隂從足走腹黃帝曰少隂之脉獨下行何也歧伯曰不然夫衝脉者五藏六府之海也五藏六府皆稟焉其上者出於頄顙渗諸陽灌諸精其下者注少隂之大絡出於氣街循隂股内亷入膕中伏行骭骨内下至内踝之後属而别其下者並於少隂之經渗三隂其前者伏行出跗属下循跗入大指問渗諸絡而温肌肉故别絡結則跗上不動不動則厥厥則寒矣黃帝曰何以明之歧伯曰以言導之切而騐之其非必動然後乃可明逆順之行也黃帝曰窘乎哉聖人之為道也明於日月微於毫釐其非夫子孰能道之也血絡論第三十九黃帝曰願聞其竒邪而不在經者歧伯曰血絡是也黃帝曰刺血絡而仆者何也血出而射者何也血少黒而濁者何也血出清而半為汁者何也發針而腫者何也血出若多若少而面色蒼蒼者何也發針而面色不變而煩悗者何也多出血而不動摇者何也願聞其故歧伯曰脉氣盛而血虛者刺之則脫氣脫氣則仆血氣俱盛而隂氣多者其血滑刺之則射陽氣畜積乆留而不寫者其血黒以濁故不能射新飲而液渗於絡而未合和於血也故血出而汁别焉其不新飲者身中有水乆則為腫隂氣積於陽其氣因於絡故刺之血未出而氣先行故腫隂陽之氣其新相得而未和合因而寫之則隂陽俱脫表裏相離故脫色而蒼蒼然刺之血出多色不變而煩悗者刺絡而虛經虛經之属於隂者隂脫故煩悶隂陽相得而合為痺者此為内溢於經外注於絡如是者隂陽俱有餘雖多出血而弗能虛也黃帝曰相之奈何歧伯曰血脉者盛堅横以赤上下無常處小者如針大者如筯則而寫之萬全也故無失數矣失數而反各如其度黃帝曰針入而肉著者何也歧伯曰熱氣因於針則針熱熱則肉著於針故堅焉隂陽清濁第四十黃帝曰余聞十二經脉以應十二經水者其五色各異清濁不同人之血氣若一應之奈何歧伯曰人之血氣苟能若一則天下為一矣惡有亂者乎黃帝曰余問一人非問天下之衆歧伯曰夫一人者亦有亂氣天下之衆亦有亂人其合而為一耳黃帝曰願聞人氣之清濁歧伯曰受糓者濁受氣者清清者注隂濁者注陽濁而清者上出於咽清而濁者則下行清濁相干命曰亂氣黃帝曰夫隂清而陽濁濁者有清清者有濁清濁别之奈何歧伯曰氣之大别清者上注於肺濁者下走於胃胃之清氣上出於口肺之濁氣下注於經内積於海黃帝曰諸陽皆濁何陽濁甚乎歧伯曰手太陽獨受陽之濁手太隂獨受隂之清其清者上走空竅其濁者下行諸經諸經皆清足太隂獨受其濁黃帝曰治之奈何歧伯曰清者其氣滑濁者其氣濇此氣之常也故刺隂者深而留之刺陽者淺而疾之清濁相干者以數調之也悗音悶空音孔靈樞經卷六欽定四庫全書靈樞經卷七宋史崧音釋隂陽繫日月第四十一黄帝曰余聞天為陽地為隂日為陽月為隂其合之于人奈何岐伯曰腰以上為天腰以下為地故天為陽地為隂故足之十二經脈以應十二月月生于水故在下者為隂手之十指以應十日日主火故在上者為陽黄帝曰合之于脈柰何岐伯曰寅者正月之生陽也主左足之少陽未者六月主右足之少陽夘者二月主左足之太陽午者五月主右足之太陽辰者三月主左足之陽明巳者四月主右足之陽明此兩陽合于前故曰陽明申者七月之生隂也主右足之少隂丑者十二月主左足之少隂酉者八月主右足之太隂子者十一月主左足之太隂戌者九月主右足之厥隂亥者十月主左足之厥隂此兩隂交盡故曰厥隂甲主左手之少陽巳主右手之少陽乙主左手之太陽戊主右手之太陽丙主左手之陽明丁主右手之陽明此兩火并合故為陽明庚主右手之少隂癸主左手之少隂辛主右手之太隂壬主左手之太隂故足之陽者隂中之少陽也足之隂者隂中之太隂也手之陽者陽中之太陽也手之隂者陽中之少隂也腰以上者為陽腰以下者為隂其於五藏也心為陽中之太陽肺為隂中之少隂肝為隂中之少陽脾為隂中之至隂腎為隂中之太隂黄帝曰以治柰何岐伯曰正月二月三月人氣在左無刺左足之陽四月五月六月人氣在右無刺右足之陽七月八月九月人氣在右無刺右足之隂十月十一月十二月人氣在左無刺左足之隂黄帝曰五行以東方為甲乙木王春春者蒼色主肝肝者足厥隂也今乃以甲為左手之少陽不合于數何也岐伯曰此天地之隂陽也非四時五行之以次行也且夫陰陽者有名而無形故數之可十離之可百散之可千推之可萬此之謂也病傳第四十二黄帝曰余受九針于夫子而私覽于諸方或有導引行氣喬摩灸熨刺炳飲藥之一者可獨守耶將盡行之乎岐伯曰諸方者衆人之方也非一人之所盡行也黄帝曰此乃所謂守一勿失萬物畢者也今余已聞隂陽之要虚實之理傾移之過可治之屬願聞病之變化淫傳絶敗而不可治者可得聞乎岐伯曰要乎哉問道昭乎其如旦醒窘乎其如夜暝能被而服之神與俱成畢將服之神自得之生神之理可著于竹帛不可𫝊于子孫黄帝曰何謂旦醒岐伯曰明于隂陽如惑之解如醉之醒黄帝曰何謂夜瞑岐伯曰瘖乎其無聲漠乎其無形折毛發理正氣横傾淫邪泮衍血脈𫝊溜大氣入藏腹痛下淫可以致死不可以致生黄帝曰大氣入藏奈何岐伯曰病先發于心一日而之肺三日而之肝五日而之脾三日不已死冬夜半夏日中病先發于肺三日而之肝一日而之脾五日而之胃十日不已死冬日入夏日出病先發于肝三日而之脾五日而之胃三日而之腎三日不已死冬日入夏蚤食病先發于脾一日而之胃二日而之腎三日而之膂膀胱十日不已死冬人定夏晏食病先發于胃五日而之腎三日而之膂膀胱五日而上之心二日不已死冬夜半夏日昳病先發于腎三日而之膂膀胱三日而上之心三日而之小腸三日不已死冬大晨夏早晡病先發于膀胱五日而之腎一日而之小腸一日而之心二日不已死冬雞鳴夏下晡諸病以次相𫝊如是者皆有死期不可刺也間一藏及二三四藏者乃可刺也昳徒結切淫邪發夢第四十三黄帝曰願聞淫邪泮衍奈何岐伯曰正邪從外襲内而未有定舍反淫于藏不得定處與營衛俱行而與魂魄飛揚使人臥不得安而喜夢氣淫于府則有餘于外不足於内氣淫于藏則有餘于内不足于外黄帝曰有餘不足有形乎岐伯曰隂氣盛則夢渉大水而恐懼陽氣盛則夢大火而燔炳隂陽俱盛則夢相殺上盛則夢飛下盛則夢墮甚饑則夢取甚飽則夢予肝氣盛則夢怒肺氣盛則夢恐懼哭泣飛揚心氣盛則夢善笑恐畏脾氣盛則夢歌樂身體重不舉腎氣盛則夢腰脊兩解不屬凡此十二盛者至而冩之立已厥氣客于心則夢見丘山烟火客于肺則夢飛揚見金鐵之奇物客于肝則夢山林樹木客于脾則夢見丘陵大澤壞屋風雨客于腎則夢臨淵没居水中客于膀胱則夢遊行客于胃則夢飲食客于大腸則夢田野客于小腸則夢聚邑衝衢客于膽則夢鬬訟自刳客于隂器則夢接内客于項則夢斬首客于脛則夢行走而不能前及居深地窌苑中客于股肱則夢禮節拜起客于胞䐈則夢溲便凡此十五不足者至而補之立已也窌力交切順氣一日分為四時第四十四黄帝曰夫百病之所始生者必起于燥濕寒暑風雨隂陽喜怒飲食居處氣合而有形得藏而有名余知其然也夫百病者多以旦慧晝安夕加夜甚何也岐伯曰四時之氣使然黄帝曰願聞四時之氣岐伯曰春生夏長秋收冬藏是氣之常也人亦應之以一日分為四時朝則為春日中為夏日入為秋夜半為冬朝則人氣始生病氣衰故旦慧日中人氣長長則勝邪故晝安夕則人氣始衰邪氣始生故加夜半人氣入藏邪氣獨居于身故甚也黄帝曰其時有反者何也岐伯曰是不應四時之氣藏獨主其病者是必以藏氣之所不勝時者甚以其所勝時者起也黄帝曰治之奈何岐伯曰順天之時而病可與期順者為工逆者為粗黄帝曰善五聞刺有五變以主五輸願聞其數岐伯曰人有五藏五藏有五變五變有五輸故五五二十五輸以應五時黄帝曰願聞五變岐伯曰肝為牡藏其色青其時春其音角其味酸其日甲乙心為牡藏其色赤其時夏其日丙丁其音徵其味苦脾為牝藏其色黄其時長夏其日戊巳其音宫其味甘肺為牝藏其色白其音商其時秋其日庚辛其味辛腎為牝藏其色黒其時冬其日壬癸其音羽其味鹹是為五變黄帝曰以主五輸奈何藏主冬冬刺井色主春春刺榮時主夏夏刺輸音主長夏長夏刺經味主秋秋刺合是謂五變以主五輸黄帝曰諸原安合以致六輸岐伯曰原獨不應五時以經合之以應其數故六六三十六輸黄帝曰何謂藏主冬時主夏音主長夏味主秋色主春願聞其故岐伯曰病在藏者取之井病變于色者取之滎病時閒時甚者取之輸病變于音者取之經經滿而血者病在胃及以飲食不節得病者取之於合故命曰味主合是謂五變也外揣第四十五黄帝曰余聞九針九篇余親授其調頗得其意夫九針者始于一而終于九然未得其要道也夫九針者小之則無内大之則無外深不可為下高不可為蓋恍惚無窮流溢無極余知其合于天道人事四時之變也然余願雜之毫毛渾束為一可乎岐伯曰明乎哉問也非獨針道焉夫治國亦然黄帝曰余願聞針道非國事也岐伯曰夫治國者夫惟道焉非道何可小大深淺雜合而為一乎黄帝曰願卒聞之岐伯曰日與月焉水與鏡焉鼓與響焉夫日月之明不失其影水鏡之察不失其形鼓響之應不後其聲動摇則應和盡得其情黄帝曰窘乎哉昭昭之明不可蔽其不可蔽不失隂陽也合而察之切而騐之見而得之若清水明鏡之不失其形也五音不彰五色不明五藏波蕩若是則内外相襲若鼓之應桴響之應聲影之似形故逺者司外揣内近者司内揣外是謂隂陽之極天地之蓋請藏之靈蘭之室弗敢使泄也五變第四十六黄帝問于少俞曰余聞百疾之始期也必生于風雨寒暑循毫毛而入腠理或復還或留止或為風腫汗出或為消癉或為發熱或為留痺或為積聚奇邪淫溢不可勝數願聞其故夫同時得病或病此或病彼意者天之為人生風乎何其異也少俞曰夫天之生風者非以私百姓也其行公平正直犯者得之避者得無殆非求人而人自犯之黄帝曰一時遇風同時得病其病各異願聞其故少俞曰善乎哉問請論以比匠人匠人磨斧斤礪刀削斵材木木之隂陽尚有堅脆堅者不入脆者皮㢮至其交節而缺斤斧焉夫一木之中堅脆不同堅者則剛脆者易傷况其材本之不同皮之厚薄汁之多少而各異耶夫木之蚤花先生葉者遇春霜烈風則花落而葉萎久曝大旱則脆木薄皮者枝條汁少而葉萎久隂淫雨則薄皮多汁者皮潰而漉卒風暴起則剛脆之木枝折杌傷秋霜疾風則剛脆之木根摇而葉落凡此五者各有所傷况於人乎黄帝曰以人應木奈何少俞答曰木之所傷也皆傷其枝枝之剛脆而堅未成傷也人之有常病也亦因其骨節皮膚腠理之不堅固者邪之所舍也故常為病也黄帝曰人之善病風厥漉汗者何以候之少俞答曰肉不堅腠理疎則善病風黄帝曰何以候肉之不堅也少俞答曰膕肉不堅而無分理理者粗理粗理而皮不緻者腠理疎此言其渾然者黄帝曰人之善病消癉者何以候之少俞答曰五藏皆柔弱者善病消癉黄帝曰何以知五藏之柔弱也少俞答曰夫柔弱者必有剛强剛强多怒柔者易傷也黄帝曰何以候柔弱之與剛强少俞答曰此人薄皮膚而目堅固以深者長衝直揚其心剛剛則多怒怒則氣上逆胷中畜積血氣逆留臗皮充肌血脈不行轉而為熱熱則消肌膚故為消癉此言其人暴剛而肌肉弱者也黄帝曰人之善病寒熱者何以候之少俞答曰小骨弱肉者善病寒熱黄帝曰何以候骨之大小肉之堅脆色之不一也少俞答曰顴骨者骨之本也顴大則骨大顴小則骨小皮膚薄而其肉無􅀈其臂濡濡然其地色殆然不與其天同色汚然獨異此其候也然後臂薄者其髓不滿故善病寒熱也黄帝曰何以候人善病痺者少俞答曰粗理而肉不堅者善病痺黄帝曰痺之高下有處乎少俞答曰欲知其高下者各視其部黄帝曰人之善病腸中積聚者何以候之少俞答曰皮膚薄而不澤肉不堅而淖澤如此則腸胃惡惡則邪氣留止積聚乃傷脾胃之間寒温不次邪氣稍至稸積留止大聚乃起黄帝曰余聞病形已知之矣願聞其時少俞答曰先立其年以知其時時高則起時下則殆雖不陷下當年有衝通其病必起是謂因形而生病五變之紀也臗寛杌兀漉鹿懦儒本藏第四十七黄帝問於岐伯曰人之血氣精神者所以奉生而周于性命者也經脈者所以行血氣而營隂陽濡筋骨利闗節者也衛氣者所以温分肉充皮膚肥腠理司闗闔者也志意者所以御精神収魂魄適寒温和喜怒者也是故血和則經脈流行營覆隂陽筋骨勁强闗節清利矣衛氣和則分肉解利皮膚調柔腠理緻密矣志意和則精神専直魂魄不散悔怒不起五藏不受邪矣寒温和則六府化榖風痺不作經脈通利肢節得安矣此人之常平也五藏者所以藏精神血氣魂魄者也六府者所以化水榖而行津液者也此人之所以具受于天也無愚智賢不肖無以相倚也然有其獨盡天壽而無邪僻之病百年不衰雖犯風雨卒寒大暑猶有弗能害也有其不離屏蔽室内無怵惕之恐然猶不免于病何也願聞其故岐伯對曰窘乎哉問也五藏者所以參天地副隂陽而連四時化五節者也五藏者固有大小高下堅脆端正偏傾者六府亦有大小長短厚薄結直緩急凡此二十五者各不同或善或惡或吉或凶請言其方心小則安邪不能傷易傷以憂心大則憂不能傷易傷于邪心高則滿于肺中悦而善忘難開以言心下則藏外易傷于寒易恐以言心堅則藏安守固心脆則善病消癉熱中心端正則和利難傷心偏傾則操持不一無守司也肺小則少飲不病喘喝肺大則多飲善病胷痺喉痺逆氣肺高則上氣肩息欬肺下則居賁迫肺善脇下痛肺堅則不病欬上氣肺脆則苦病消癉易傷肺端正則和利難傷肺偏傾則胷偏痛也肝小則藏安無脇下之病肝大則逼胃迫咽迫咽則苦膈中且脇下痛肝高則上支賁切脇悗為息賁肝下則逼胃脇下空脇下空則易受邪肝堅則藏安難傷肝脆則善病消癉易傷肝端正則和利難傷肝偏傾則脇下痛也脾小則藏安難傷于邪也脾大則苦湊䏚而痛不能疾行脾高則䏚引季脇而痛脾下則下加于大腸下加于大腸則藏苦受邪脾堅則藏安難傷脾脆則善病消癉易傷脾端正則和利難傷脾偏傾則善滿善脹也腎小則藏安難傷腎大則善病腰痛不可以俛仰易傷以邪腎高則苦背膂痛不可以俛仰腎下則腰尻痛不可以俛仰為狐疝腎堅則不病腰背痛腎脆則苦病消癉易傷腎端正則和利難傷腎偏傾則苦腰尻痛也凡此二十五變者人之所苦常病黄帝曰何以知其然也岐伯曰赤色小理者心小粗理者心大無􅐳􅚯者心高􅐳􅚯小短舉者心下􅐳􅚯長者心堅􅐳􅚯弱小以薄者心脆􅐳􅚯直下不舉者心端正􅐳􅚯倚一方者心偏傾也白色小理者肺小粗理者肺大巨肩反膺陷喉者肺高合腋張脇者肺下好肩背厚者肺堅肩背薄者肺脆背膺厚者肺端正脇偏疎者肺偏傾也青色小理者肝小粗理者肝大廣胷反骹者肝高合脇兔骹者肝下胷脇好者肝堅脇骨弱者肝脆膺腹好相得者肝端正脇骨偏舉者肝偏傾也黄色小理者脾小粗理者脾大掲唇者脾高唇下縱者脾下唇堅者脾堅唇大而不堅者脾脆唇上下好者脾端正唇偏舉者脾偏傾也黒色小理者腎小粗理者腎大高耳者腎高耳後陷者腎下耳堅者腎堅耳薄不堅者腎脆耳好前居牙車者腎端正耳偏高者腎偏傾也凡此諸變者持則安减則病也帝曰善然非余之所問也願聞人之有不可病者至盡夭壽雖有深憂大恐怵惕之志猶不能減也甚寒大熱不能傷也其有不離屏蔽室内又無怵惕之恐然不免于病者何也願聞其故岐伯曰五藏六府邪之舍也請言其故五藏皆小者少病苦燋心大愁憂五藏皆大者緩于事難使以憂五藏皆高者好高舉措五藏皆下者好出人下五藏皆堅者無病五藏皆脆者不離于病五藏皆端正者和利得人心五藏皆偏傾者邪心而善盜不可以為人平反覆言語也黄帝曰願聞六府之應岐伯答曰肺合大腸大腸者皮其應心合小腸小腸者脈其應肝合膽膽者筋其應脾合胃胃者肉其應腎合三焦膀胱三焦膀胱者腠理毫毛其應黄帝曰應之奈何岐伯曰肺應皮皮厚者大腸厚皮薄者大腸薄皮緩腹裏大者大腸大而長皮急者大腸急而短皮滑者大腸直皮肉不相離者大腸結心應脈皮厚者脈厚脈厚者小腸厚皮薄者脈薄脈薄者小腸薄皮緩者脈緩脈緩者小腸大而長皮薄而脈冲小者小腸小而短諸陽經脈皆多紆屈者小腸結脾應肉肉䐃堅大者胃厚肉䐃麽者胃薄肉䐃小而麽者胃不堅肉䐃不稱身者胃下胃下者下管約不利肉䐃不堅者胃緩肉䐃無小裏累者胃急肉䐃多少裏累者胃結胃結者上管約不利也肝應爪爪厚色黄者膽厚爪薄色紅者膽薄爪堅色青者膽急爪濡色赤者膽緩爪直色白無約者膽直爪惡色黒多紋者膽結也腎應骨宻理厚皮者三焦膀胱厚粗理薄皮者三焦膀胱薄疎腠理者三焦膀胱緩皮急而無毫毛者三焦膀胱急毫毛美而粗者三焦膀胱直稀毫毛者三焦膀胱結也黄帝曰厚薄美惡皆有形願聞其所病岐伯答曰視其外應以知其内藏則知所病矣尻枯髙反骹敲􅐳結骭干靈樞經卷七欽定四庫全書靈樞經卷八宋史崧音釋禁服第四十八雷公問于黄帝曰細子得受業通于九針六十篇旦暮勤服之近者編絶久者簡垢然尚諷誦弗置未盡解于意矣外揣言渾束為一未知所謂也夫大則無外小則無内大小無極髙下無度束之奈何士之才力或有厚薄智慮􅄶淺不能博大深奥自强于學若細子細子恐其散于後世絶于子孫敢問約之奈何黄帝曰善乎哉問也此先師之所禁坐私傳之也割臂㰱血之盟也子若欲得之何不齋乎雷公再拜而起曰請聞命于是也乃齋宿三日而請曰敢問今日正陽細子願以受盟黄帝乃與俱入齋室割臂歃盟黄帝親祝曰今日正陽歃血𫝊方有敢背此言者反受其殃雷公再拜曰細丁受之黄帝乃左握其手右授之書曰愼之愼之吾為子言之凡刺之理經脈為始營其所行知其度量内刺五藏外刺六府審察衛氣為百病母調其虚實虚實乃止寫其血絡血盡不殆矣雷公曰此皆細子之所以通未知其所約也黄帝曰夫約方者猶約囊也囊滿而弗約則輸泄方成弗約則神與弗俱雷公曰願為下材者勿滿而約之黄帝曰未滿而知約之以為工不可以為天下師雷公曰願聞為工黄帝曰寸口主中人迎主外兩者相應俱往俱來若引繩大小齊等春夏人迎微大秋冬寸口微大如是者名曰平人人迎大一倍于寸口病在足少陽一倍而燥在手少陽人迎二倍病在足太陽二倍而燥病在手大陽人迎三倍病在足陽明三倍而燥病在手陽明盛則為熱虚則為寒緊則為痛痺代則乍甚乍間盛則寫之虚則補之緊痛則取之分肉代則取血絡具飲藥陷下則炙之不盛不虚以經取之名曰經刺人迎四倍者且大且數名曰溢陽溢陽為外格死不治必審按其本末察其寒熱以騐其藏府之病寸口大于人迎一倍病在足厥隂一倍而燥在手心主寸口二倍病在足少隂二倍而燥在手少隂寸口三倍病在足太隂三倍而燥在手大隂盛則脹滿寒中食不化虚則熱中出縻少氣溺色變緊則痛痺代則乍痛乍止盛則寫之虚則補之緊則先刺而後灸之代則取血絡而後調之陷下則徒灸之陷下者脈血結于中中有著血血寒故宜灸之不盛不虚以經取之寸口四倍者名曰内闗内闗者且大且數死不治必審察其本末之寒温以驗其藏府之病通其營輸乃可𫝊于大數大數曰盛則徒寫之虚則徒補之緊則灸刺且飲藥陷下則徒灸之不盛不虚以經取之所謂經治者飲藥亦曰灸刺脈急則引脈大以弱則欲安静用力無勞也歃楚洽切五色第四十九雷公問于黄帝曰五色獨決于明堂乎小子未知其所謂也黄帝曰明堂者鼻也闕者眉間也庭者顔也蕃者頰側也蔽者耳門也其間欲方大去之十步皆見于外如是者壽必中百歲雷公曰五官之辨奈何黄帝曰明堂骨高以起平以直五藏次于中央六府挾其兩側首面上于闕庭王宫在于下極五藏安于胷中真色以致病色不見明堂潤澤以清五官惡得無辨乎雷公曰其不辨者可得聞乎黄帝曰五色之見也各出其色部部骨陷者必不免于病矣其色部乘襲者雖病甚不死矣雷公曰官五色奈何黄帝曰青黒為痛黄赤為熱白為寒是謂五官雷公曰病之益甚與其方衰如何黄帝曰外内皆在焉切其脈口滑小緊以沈者病益甚在中人迎氣大緊以浮者其病益甚在外其脈口浮滑者病日進人迎沈而滑者病日損其脈口滑以沈者病日進在内其人迎脈滑盛以浮者其病日進在外脈之浮沈及人迎與寸口氣小大等者病難已病之在藏沈而大者易已小為逆病在府浮而大者其病易已人迎盛堅者傷于寒氣口盛堅者傷於食雷公曰以色言病之間甚奈何黄帝曰其色麤以明沈天者為甚其色上行者病益甚其色下行如雲徹散者病方以五色各有藏部有外部有内部也色從外部走内部者其病從外走内其色從内走外者其病從内走外病生於内者先治其隂後治其陽反者益甚其病生於陽者先治其外後治其内反者益甚其脈滑大以代而長者病從外來目有所見志有所惡此陽氣之并也可變而已雷公曰小子聞風者百病之始也厥逆者寒濕之起也别之奈何黄帝曰常候闕中薄澤為風冲濁為痺在地為厥此其常也各以其色言其病雷公曰人不病卒死何以知之黄帝曰大氣入于藏府者不病而卒死矣雷公曰病小愈而卒死者何以知之黄帝曰赤色出兩顴大如母指者病雖小愈必卒死黒色出於庭大如母指必不病而卒死雷公再拜曰善哉其死有期乎黄帝曰察色以言其時雷公曰善乎願卒聞之黄帝曰庭者首面也闕上者咽喉也闕中者肺也下極者心也直下者肝也肝左者膽也下者脾也方上者胃也中央者大腸也挾大腸者腎也當腎者臍也面王以上者小腸也面王以下者膀胱子處也顴者肩也顴後者臂也臂下者手也目内眥上者膺乳也挾繩而上者背也循牙車以下者股也中央者膝也膝以下者脛也當脛以下者足也巨分者股裏也巨屈者膝臏也此五藏六府肢節之部也各有部分有部分用隂和陽用陽和隂當明部分萬舉萬當能别左右是謂大道男女異位故曰隂陽審察澤夭謂之良工沈濁為内浮澤為外黄赤為風青黒為痛白為寒黄而膏潤為膿亦甚者為血痛甚為攣寒甚為皮不仁五色各見其部察其浮沈以知淺深察其澤夭以觀成敗察其散搏以知逺近視色上下以知病處積神於心以知往今故相氣不微不知是非屬意勿去乃知新故色明不麤沈夭為甚不明不澤其病不甚其色散駒駒然未有聚其病散而氣痛聚未成也腎乘心心先病腎為應色皆如是男子色在于面王為小腹痛下為卵痛其圜直為莖痛高為本下為首狐疝㿉隂之屬也女子在于面王為膀胱子處之病散為痛搏為聚方員左右各如其色形其隨而下至胝為爪有潤如膏狀為暴食不潔左為左右為右其色有邪聚散而不端面色所指者也色者青黒赤白黄皆端滿有别鄉别鄉赤者其色亦大如榆夾在面王為不日其色上銳首空上向下鋭下向在左右如法以五色命藏青為肝赤為心白為肺黄為脾黒為腎肝合筋心合脈肺合脾脾合肉腎合骨也論勇第五十黄帝問于少俞曰有人于此並行並立其年之長少等也衣之厚薄均也卒然遇烈風暴雨或病或不病或皆病或皆不病其故何也少俞曰帝問何急黄帝曰願盡聞之少俞曰春青風夏陽風秋凉風冬寒風凡此四時之風者其所病各不同形黄帝曰四時之風病人如何少俞曰黄色薄皮弱肉者不勝春之虚風白色薄皮弱肉者不勝夏之虚風青色薄皮弱肉不勝秋之虚風赤色薄皮弱肉不勝冬之虚風也黄帝曰黒色不病乎少俞曰黒色而皮厚肉堅固不傷于四時之風其皮薄而肉不堅色不一者長夏至而有虚風者病矣其皮厚而肌肉堅者長夏至而有虚風不病矣其皮厚而肌肉堅者必重感于寒外内皆然乃病黄帝曰善黄帝曰夫人之忍痛與不忍痛者非勇怯之分也夫勇士之不忍痛者見難則前見痛則止夫怯士之忍痛者聞難則恐遇痛不動夫勇士之忍痛者見難不恐遇痛不動夫怯士之不忍痛者見難與痛目轉面盼恐不能言失氣驚顔色變化乍死乍生余見其然也不知其何由願聞其故少俞曰夫忍痛與不忍痛者皮膚之厚薄肌肉之堅脆緩急之分也非勇怯之謂也黄帝曰願聞勇怯之所由然少俞曰勇士者目深以固長衡直揚三焦理横其心端直其肝大以堅其膽滿以傍怒則氣盛而胷張肝舉而膽横眥裂而目揚毛起而面蒼此勇士之由然者也黄帝曰願聞怯士之所由然少俞曰怯士者目大而不減隂陽相失其焦理縱􅐳􅚯短而小肝系緩其膽不滿而縮腸胃挺脇下空雖方大怒氣不能滿其胷肝肺雖肇氣衰復下故不能久怒此怯士之所由然者也黄帝曰怯士之得酒怒不避勇士者何藏使然少俞曰酒者水穀之精熟穀之液也其氣慓悍其入于胃中則胃脹氣上逆滿于胷中肝浮膽横當是之時固比于勇士氣衰則悔與勇士同類不知避之名曰酒悖也胃挺下古梗切背腧第五十一黄帝問于岐伯曰願聞五藏之腧出于背者岐伯曰胷中大腧在杼骨之端肺腧在三焦之聞心腧在五焦之間膈腧在七焦之間肝腧在九焦之間脾腧在十一焦之間腎腧在十四焦之間皆挾脊相去三寸所則欲得而驗之按其處應在中而痛解乃其腧也灸之則可刺之則不可氣盛則寫之虚則補之以火補者母吹其火須自滅也以火寫者疾吹其火傳其艾須其火滅也衛氣第五十二黄帝曰五藏者所以藏精神魂魄者也六府者所以受水穀而行化物者也其氣内于五藏而外絡肢節其浮氣之不循經者為衛氣其精氣之行于經者為營氣隂陽相隨外内相貫如環之無端亭亭淳淳乎孰能窮之然其分别隂陽皆有標本虚實所離之處能别隂陽十二經者知病之所生候虚實之所在者能得病之高下知六府之氣街者能知解結契紹于門户能知虚石之堅軟者知補寫之所在能知六經標本者可以無惑于天下岐伯曰博哉聖帝之論臣請盡意悉言之足太陽之本在跟以上五寸中標在兩絡命門命門者目也足少陽之本在竅隂之間標在䆫籠之前䆫籠者耳也足少隂之本在内踝下上三寸中標在背腧與舌下兩脈也足厥隂之本在行間上五寸所標在背腧也足陽明之本在厲兊標在人迎頰挾頏顙也足大隂之本在中封前上四寸之中標在背腧與舌本也手太陽之本在外踝之後標在命門之上一寸也手少陽之本在小指次指之間上二寸標在耳後上角下外眥也手陽明之本在肘骨中上至别陽標在顔下合鉗上也手太隂之本在寸口之中標在腋内動也手少隂之本在鋭骨之端標在背腧也手心主之本在掌後兩筋之間二寸中標在腋下下三寸也凡候此者下虚則厥下盛則熱上虚則炫上盛則熱痛故石者絶而止之虚者引而起之請言氣街胷氣有街腹氣有街頭氣有街脛氣有街故氣在頭者止之于腦氣在胷者止之膺與背腧氣在腹者止之背腧與衝脈干臍左右之動脈者氣在脛者止之于氣街與承山踝上以下取此者用毫針必先按而在久應于手乃刺而予之所治者頭痛眩仆腹痛中滿暴脹及有新積痛可移者易已也積不痛難已也鉗音鈐論痛第五十三黄帝問于少俞曰筋骨之强弱肌肉之堅脆皮膚之厚薄腠理之疎密各不同其于針石火焫之痛何如腸胃之厚薄堅脆亦不等其於毒藥何如願盡聞之少俞曰人之骨强筋弱肉緩皮膚厚者耐痛其于針石之痛火焫亦然黄帝曰其耐火焫者何以知之少俞答曰加以黒色而美骨者耐火焫黄帝曰其不耐針石之痛者何以知之少俞曰堅肉薄皮者不耐針石之痛于火焫亦然黄帝曰人之病或同時而傷或易已或難已其故何如少俞曰同時而傷其身多熱者易已多寒者難已黄帝曰人之勝毒何以知之少俞曰胃厚色黒大骨及肥者皆勝毒故骨瘦而薄胃者皆不勝毒也天年第五十四黄帝問于岐伯曰願聞人之始生何氣築為基何立而為楯何失而死何得而生岐伯曰以母為基以父為楯失神者死得神者生也黄帝曰何者為神岐伯曰血氣已和榮衛已通五藏已成神氣舍心魂魄畢具乃成為人黄帝曰人之壽夭各不同或無病或卒死或病久願聞其道岐伯曰五藏堅固血脈和暢肌肉解利皮膚緻密營衛之行不失其常呼吸微徐氣以度衛六府化穀津液布揚各如其常故能長久黄帝曰人之壽百嵗而死何以致之岐伯曰使道隧以長基牆髙以方通調營衛三部三里起骨髙肉滿百歲乃得終黄帝曰其氣之盛衰以至其死可得聞乎岐伯曰人生十歲五藏始定血氣已通其氣在下故好走二十歲血氣始盛肌肉方長故好趨三十歲五藏大定肌肉堅固血脈盛滿故好步四十歲五藏六府十二經脈皆大盛以平定腠理始疎榮華頽落髪頗斑白平盛不摇故好坐五十歲肝氣始衰肝葉始薄膽汁始滅目始不明六十歲心氣始衰苦憂悲血氣懈惰故好臥七十歲脾氣虚皮膚枯八十歲肺氣衰魄離故言善悮九十歲腎氣焦四藏經脈空虚百歲五藏皆虚神氣皆去形骸獨居而終矣黄帝曰其不能終壽而死者何如岐伯曰其五藏皆不堅使道不長空外以張喘息暴疾又卑基牆薄脈少血其肉不石數中風寒血氣虚脈不通真邪相攻亂而相引故中壽而盡也逆順第五十五黄帝問于伯高曰余聞氣有逆順脈有盛衰刺有大約可得聞乎伯高曰氣之逆順者所以應天地隂陽四時五行也脈之盛衰者所以候血氣之虚實有餘不足刺之大約者必明知病之可刺與其未可刺與其已不可刺也黄帝曰候之奈何伯高曰兵法曰無迎逢逢之氣無擊堂堂之陣刺法曰無刺熇熇之熱無刺漉漉之汗無刺渾渾之脈無刺病與脈相逆者黄帝曰候其可刺柰何伯高曰上工刺其未生者也其次刺其未盛者也其次刺其已衰者也下工刺其方襲者也與其形之盛者也與其病之與脈相逆者也故曰方其盛也勿敢毁傷刺其已衰事必大昌故曰上工治未病不治已病此之謂也逢蒲蒙切熇呼切五味第五十六黄帝曰願聞穀氣有五味其入五藏分别奈何伯高曰胃者五藏六府之海也水穀皆入于胃五藏六府皆稟氣于胃五味各走其所喜穀味酸先走肝穀味苦先走心穀味甘先走脾穀味辛先走肺穀味鹹先走腎穀氣津液已行營衛大通乃化糟粕以次傳下黄帝曰營衛之行奈何伯高曰穀始入于胃其精微者先出于胃之兩焦以溉五藏别出兩行營衛之道其大氣之搏而不行者積于胷中命曰氣海出于肺循喉咽故呼則出吸則入天地之精氣其大数常出三入一故穀不入半日則氣衰一日則氣少矣黄帝曰穀之五味可得聞乎伯高曰請盡言之五穀秔米甘麻酸大豆鹹麥苦黄黍辛五果􅀥甘李酸栗鹹杏苦桃辛五畜牛甘犬酸猪鹹羊苦雞辛五菜葵甘韭酸藿鹹薤苦葱辛五色黄色宜甘青色宜酸黒色宜鹹赤色宜苦白色宜辛凡此五者各有所宜五宜所言五色者脾病者宜食秔米飯牛肉􅀥葵心病者宜食麥羊肉杏薤腎病者宜食大豆黄巻猪肉藿肝病者宜食麻犬肉李韮肺病者宜食黄黍雞肉桃葱五禁肝病禁辛病禁鹹脾病禁酸腎病禁甘肺病禁苦肝色青宜食甘秔米飯牛肉􅀥葵皆甘心色赤宜食酸犬肉麻李韭皆酸脾色黄宜食鹹大豆豕肉栗藿皆鹹肺色白宜食苦麥羊肉杏薤皆苦腎色黒宜食辛黄黍雞肉桃葱皆辛靈樞經卷八欽定四庫全書靈樞經巻九宋史崧音釋水脹第五十七黄帝問于岐伯曰水與膚脹鼓脹腸覃石瘕石水何以别之岐伯答曰水始起也目窠上微腫如新臥起之狀其頸脉動時欬隂股間寒足脛腫腹乃大其水已成矣以手按其腹隨手而起如裹水之狀此其候也黄帝曰膚脹何以候之岐伯曰膚脹者寒氣客于皮膚之間􅠻􅠻然不堅腹大身盡腫皮厚按其腹窅而不起腹色不變此其候也鼓脹何如岐伯曰鼔脹身皆大大與膚脹等也色蒼黄腹筋起此其候也腸覃何如岐伯曰寒氣客于腸外與衛氣相搏氣不得榮因有所繫癖而内著惡氣乃起瘜肉乃生其始生也大如雞卵稍以益大至其成如懷子之狀久者離歲按之則堅推之則移月事以時下此其候也石瘕何如岐伯曰石瘕生于胞中寒氣客于子門子門閉塞氣不得通惡血當寫不寫衃以留止日以益大狀如懷子月事不以時下皆生于女子可導而下黄帝曰膚脹鼓脹可刺邪岐伯曰先寫其脹之血絡後調其經刺去其血絡也賊風第五十八黄帝曰夫子言賊風邪氣之傷人也令人病焉今有其不離屏蔽不出室穴之中卒然病者非不離賊風邪氣其故何也岐伯曰此皆嘗有所傷于濕氣藏于血脈之中分肉之間久留而不去若有所墮墜惡血在内而不去卒然喜怒不節飲食不適寒温不時腠理閉而不通其開而遇風寒則血氣凝結與故邪相襲則為寒痺其有熱則汗出汗出則受風雖不遇賊風邪氣必有因加而發焉黄帝曰今夫子之所言者皆病人之所自知也其毋所遇邪氣又毋怵惕之所志卒然而病者其故何也唯有因鬼神之事乎岐伯曰此亦有故邪留而未發因而志有所惡及有所慕血氣内亂兩氣相搏其所從來者微視之不見聽而不聞故似鬼神黄帝曰其祝而已者其故何也岐伯曰先巫者因知百病之勝先知其病之所從生者可祝而已也衛氣失常第五十九黄帝曰衛氣之留于腹中搐積不行􅁐藴不得常所使人肢脇胃中滿喘呼逆息者何以去之伯高曰其氣積于胷中者上取之積于腹中者下取之上下皆滿者傍取之黄帝曰取之奈何伯高對曰積于上寫人迎天突喉中積于下者寫三里與氣街上下皆滿者上下取之與季脇之下一寸一本云季脇之下深一寸重者雞足取之診視其脈大而弦急及絶不至者及腹皮急甚者不可刺也黄帝曰善黄帝問于伯高曰何以知皮内氣血筋骨之病也伯高曰色起兩眉薄澤者病在皮唇色青黄赤白黒者病在肌内營氣濡然者病在血氣目色青黄赤白黒者病在筋耳焦枯受塵垢病在骨黄帝曰病形何如取之奈何伯高曰夫百病變化不可勝數然皮有部内有桂血氣有輸骨有屬黄帝曰願聞其故伯高曰皮之部輸于四末内之柱在臂脛諸陽分内之間與足少隂分間血氣之輸輸于諸絡氣血留居則盛而起筋部無隂無陽無左無右候病所在骨之屬者骨空之所以受益而益腦髓者也黄帝曰取之奈何伯高曰夫病變化浮沈深淺不可勝窮各在其處病間者淺之甚者深之間者小之甚者衆之隨變而調氣故曰上工黄帝問于伯高曰人之肥瘦大小寒温有老壯少小别之奈何伯高對曰人年五十已上為老二十已上為壯十八以上為少六歲已上為小黄帝曰何以度之其肥瘦伯高曰人有肥有膏有内黄帝曰别之奈何伯高曰膕内堅一本云䐃内皮滿者肥膕内不堅皮緩者膏皮内不相離者内黄帝曰身之寒温何如伯高曰膏者其内淖而粗理者身寒細理者身熱脂者其内堅細理者熱粗理者寒黄帝曰其肥瘦大小奈何伯高曰膏者多氣而皮縱緩故能縱腹垂腴内者身體容大脂者其身收小黄帝曰三者之氣血多少何如伯高曰膏者多氣多氣者熱熱者耐寒内者多血則充形充形則平脂者其血漬氣滑少故不能大此别于衆人者也黄帝曰衆人奈何伯高曰衆人皮内脂膏不能相加也血與氣不能相多故其形不小不大各自稱其身命曰衆人黄帝曰善治之奈何伯高曰必先别其三形血之多少氣之清濁而後調之治無失常經是故膏人縱腹垂腴内人者上下容大脂人者雖脂不能大者玉版第六十黄帝曰余以小針為細物也夫子乃言上合之于天下合之于地中合之于人余以為過針之意矣願聞其故岐伯曰何物大於天乎夫大于針者惟五兵者焉五兵者死之備也非生之具且夫人者天地之鎭也其不可不參乎夫治民者亦唯針焉夫針之與五兵其孰小乎黄帝曰病之生時有喜怒不測飲食不節隂氣不足陽氣有餘營氣不行乃發為癰疽隂陽不通兩熱相搏乃化為膿小針能取之乎岐伯曰聖人不能使化者為之邪不可留也故兩軍相當旗幟相望白刃陳于中野者此非一日之謀也能使其民令行禁止士卒無白刃之難者非一日之教也須㬰之得也夫至使身佊癰疽之病膿血之聚者不亦離道逺乎夫癰疽之生膿血之成也不從天下不從地出積微之所生也故聖人自治於未有形也愚者遭其已成也黄帝曰其已形不予遭膿已成不予見為之奈何岐伯曰膿已成十死一生故聖人弗使已成而明為良方著之竹帛使能者踵而傳之後世無有終時者為其不予遭也黄帝曰其已有膿血而後遭乎不𨗳之以小針治乎岐伯曰以小治小者其功小以大治大者多害故其已成膿血者其唯砭石鈹鋒之所取也黄帝曰多害者其不可全乎岐伯曰其在逆順焉黄帝曰願聞逆順岐伯曰以為傷者其白眼青黒眼小是一逆也内藥而嘔者是二逆也腹痛渇甚是三逆也肩項中不便是四逆也音嘶色脱是五逆也除此五者為順矣黄帝曰諸病皆有逆順可得聞乎岐伯曰腹脹身熱脈大是一逆也腹鳴而滿四肢清泄其脈大是二逆也衂而不止脈大是三逆也咳且溲血脱形其脈小勁是四逆也欬脱形身熱脈小以疾是謂五逆也如是者不過十五日而死矣其腹大脹四末清脫形泄甚是一逆也腹脹便血其脈大時絶是二逆也欬溲血形内脫脈搏是三逆也嘔血胷滿引背脈小而疾是四逆也欬嘔腹脹且飱泄其脈絶是五逆也如是者不及一時而死矣工不察此者而刺之是謂逆治黄帝曰夫子之言針甚駿以配天地上數天文下度地紀内别五藏外次六府經脈二十八㑹盡有周紀能殺生人不能起死者子能反之乎岐伯曰能殺生人不能起死者也黄帝曰余聞之則為不仁然願聞其道弗行于人岐伯曰是明道也其必然也其如刀劒之可以殺人如飲酒使人醉也雖勿診猶可知矣黄帝曰願卒聞之岐伯曰人之所受氣者穀也穀之所注者胃也胃者水穀氣血之海也海之所行雲氣者天下也胃之所出氣血者經隧也經隧者五藏六府之大絡也迎而奪之而已矣黄帝曰上下有數乎岐伯曰迎之五里中道而止五至而已五徃而藏之氣盡矣故五五二十五而竭其輸矣此所謂奪其天氣者也非能絶其命而傾其壽者也黄帝曰願卒聞之岐伯曰闚門而刺之者死于家中入門而刺之者死于堂上黄帝曰善乎方明哉道請著之玊版以為重寶傳之後世以為刺禁令民勿敢犯也五禁第六十一黄帝問于岐伯曰余聞刺有五禁何謂五禁岐伯曰禁其不可刺也黄帝曰余聞刺有五奪岐伯曰无寫其不可奪者也黄帝曰余聞刺有五過岐伯曰補寫無過其度黄帝曰余聞刺有五逆岐伯曰病與脈相逆命曰五逆黄帝曰余聞刺有九宜岐伯曰明知九針之論是謂九宜黄帝曰何謂五禁願聞其不可刺之時岐伯曰甲乙日自乗无刺頭无發矇于耳内丙丁日自乗無振埃于負喉亷泉戊巳日自乘四季旡刺腹去爪寫水庚辛日自乘無刺闗節于股脥壬癸日自乘無刺足脛是謂五禁黄帝曰何謂五奪岐伯曰形肉已奪是一奪也大奪血之後是二奪也大汗出之後是三奪也大泄之後是四奪也新産及大血之後是五奪也此皆不可寫黄帝曰何謂五逆岐伯曰熱病脈静汗已出脈盛躁是一逆也病泄脈洪大是二逆也著痺不移䐃肉破身熱脈偏絶是三逆也淫而奪形身熱色夭然白及後下血衃血衃篤重是謂四逆也寒熱奪形脈堅搏是謂五逆也動輸第六十二黄帝曰經脈十二而手太隂足少隂陽明獨動不休何也岐伯曰是明胃脈也胃為五藏六府之海其清氣上注于肺肺氣從太隂而行之其行也以息徃來故人一呼脈再動一吸脈亦再動呼吸不已故動而不止黄帝曰氣之過于寸口也上十焉息下八焉伏何道從還不知其極岐伯曰氣之離藏也卒然如弓弩之發如水之下岸上于魚以反衰其餘氣衰散以逆上故其行微黄帝曰足之陽明何因而動岐伯曰胃氣上注于肺其悍氣上衝頭者循咽上走空竅循眼系入絡腦出顑下客主人循牙車合陽明并下人迎此胃氣别走于陽明者也故隂陽上下其動也若一故陽病而陽脈小者為逆隂病而隂脈大者為逆故隂陽俱動俱静若引繩相傾者病黄帝曰足少隂何因而動岐伯曰衝脈者十二經之海也與少隂之大絡起于腎下出于氣街循隂股内廉邪入膕中循脛骨内廉並少隂之經下入内踝之後入足下其别者邪入踝出屬跗上入大指之間注諸絡以温足脛此脈之常動者也黄帝曰營衛之行也上下相貫如環之無端今有其卒然遇邪氣及逢大寒手足懈惰其脈隂陽之道相輸之㑹行相失也氣何由還岐伯曰夫四末隂陽之㑹者此氣之大絡也四街者氣之徑路也故絡絶則徑通四末解則氣從合相輸如環黄帝曰善此所謂如環無端莫知其紀終而復始此之謂也五味論第六十三黄帝問于少俞曰五味入于口也各有所走各有所病酸走筋多食之令人癃鹹走血多食之令人渇辛走氣多食之令人洞心苦走骨多食之令人變嘔甘走肉多食之令人悗心余知其然也不知其何由願聞其故少俞答曰酸入于胃其氣澁以收上之兩焦不能出入也不出即留于胃中胃中和温則下注膀胱膀胱之胞薄以懦得酸則縮綣約而不通水道不行故癃隂者積筋之所終也故酸入而走筋矣黄帝曰鹹走血多食之令人渇何也少俞曰鹹入于胃其氣上走中焦注于脈則血氣走之血與寒相得則凝凝則胃中沐注之注之則胃中竭竭則咽路焦故舌本乾而善渇血脈者中焦之道也故鹹入而走血矣黄帝曰辛走氣多食之令人洞心何也少俞曰辛入于胃其氣走于上焦上焦者受氣而營諸陽者也姜韭之氣薰之營衛之氣不時受之久留心下故洞心辛與氣俱行故辛入而與汗俱出黄帝曰苦走骨多食之令人變嘔何也少俞曰苦入于胃五穀之氣皆不能勝苦苦入下脘三焦之道皆閉而不通故變嘔齒者骨之所終也故苦入而走骨故入而復出知其走骨也黄帝曰甘走肉多食之令人悗心何也少俞曰甘入于胃其氣弱小不能上至于上焦而與穀留于胃中者令人柔潤者也胃柔則緩緩則蟲動蟲動則令人悗心其氣外通于肉故甘走肉隂陽二十五人第六十四黄帝曰余聞隂陽之人何如伯高曰天地之間六合之内不離于五人亦應之故五五二十五人之政而隂陽之人不與焉其態又不合于衆者五余已知之矣願聞二十五人之形血氣之所生别而以候從外知内何如岐伯曰悉乎哉問也此先師之秘也雖伯高猶不能明之也黄帝避席遵循而却曰余聞之得其人弗教是謂重失得而洩之天將厭之余願得而明之金櫃藏之不敢揚之岐伯曰先立五形金木水火土别其五色異其五形之人而二十五人具矣黄帝曰願卒聞之岐伯曰慎之慎之臣請言之木形之人比於上角似於蒼帝其為人蒼色小頭長面大肩背直身小手足好有才勞心少力多憂勞于事能春夏不能秋冬感而病生足厥隂佗佗然大角之人比於左足少陽少陽之上遺遺然左角之人比於右足少陽少陽之下隨隨然一曰少角釱角之人比於右足少陽少陽之上推推然一曰右角判角之人比於左足少陽少陽之下括括然火形之人比於上徵似於赤帝其為人赤色廣䏖脫面小頭好肩背髀腹小手足行安地疾心行摇肩背肉滿有氣輕財少信多慮見事明好顔急心不壽暴死能春夏不能秋冬秋冬感而病生手少隂核核然質徵之人比於左手太陽太陽之上肌肌然一曰質之人一曰大徵少徵之人比於左手太陽太陽之下慆慆然右徵之人比於右手太陽太陽之上鮫鮫然一曰熊熊然質判之人比於左手太陽太陽之下支支頥頥然一曰質徵土形之人比於上宫似於上古黄帝其為人黄色圓面大頭美肩背大腹美股脛小手足多肉上下相稱行安地舉足浮安心好利人不喜權勢善附人也能秋冬不能春夏春夏感而病生足太隂敦敦然大宫之人比於左足陽明陽明之上婉婉然加宫之人比於左足陽明陽明之下坎坎然一曰衆之人少宫之人比於右足陽明陽明之上樞樞然左宫之人比於右足陽明陽明之下兀兀然一曰衆之人一曰陽明之上金形之人比於上商似於白帝其為人方面白色小頭小肩背小腹小手足如骨發踵外骨輕身清亷急心静悍善為吏能秋冬不能春夏春夏感而病生手太隂敦敦然釱商之人比於左手陽明陽明之上廉廉然左商之人比于左手陽明陽明之下脫脫然右商之人比於右手陽明陽明之上監監然小商之人比於右手陽明陽明之下嚴嚴然水形之人比於上羽似於黑帝其為人黒色面不平大頭廉頤小肩大腹動手足發行摇身下尻長背延延然不敬畏善欺給人戮死能秋冬不能春夏春夏感而病生足少隂汙汙然大羽之人比於右足太陽太陽之上頰頰然小羽之人比於左足大陽大陽之下紆紆然衆之為人比于右足太陽太陽之下潔潔然一曰加之人桎之為人比於左足大陽大陽之上安安然是故五形之人二十五變者衆之所以相欺者是也黄帝曰得其形不得其色何如岐伯曰形勝色色勝形者至其勝時年加感則病行失則憂矣形色相得者富貴大樂黄帝曰其形色相勝之時年加可知乎岐伯曰凡年忌下上之人大忌常加七歲十六歳二十五歲三十四歳四十三歳五十二歳六十一歲皆人之大忌不可不自安也感則病行失則憂矣當此之時無為姦事是謂年忌黄帝曰夫子之言脈之上下血氣之候以知形氣奈何岐伯曰足陽明之上血氣盛則髯美長血少氣多則髯短故氣少血多則髯少血氣皆少則無髯兩吻多畫足陽明之下血氣盛則下毛美長至胷血多氣少則下毛美短至臍行則善高舉足足指少肉足善寒血少氣多則肉而善􅏿血氣皆少則無毛有則稀枯悴善痿厥足痺足少陽之上氣血盛則通髯美長血多氣少則通髯美短血少氣多則少髯血氣皆少則無􅂡感於寒濕則善痺骨痛爪枯也足少陽之下血氣盛則脛毛美長外踝肥血多氣少則輕毛美短外踝皮堅而厚血少氣多則胻毛少外踝皮薄而軟血氣皆少則無毛外踝瘦無肉足太陽之上血氣盛則美眉眉有毫毛血多氣少則惡眉面多少理血少氣多則面多肉血氣和則美色足太隂之下血氣盛則跟肉滿踵堅氣少血多則瘦跟空血氣皆少則喜轉筋踵下痛手陽明之上血氣盛則髭美血少氣多則髭惡血氣皆少則無髭手陽明之下血氣盛則腋下毛美手魚肉以温血氣皆少則手瘦以寒手少陽之上血氣盛則眉美以長耳色美血氣皆少則耳焦惡色手少陽之下血氣盛則手捲多肉以温血氣皆少則寒以瘦氣少血多則瘦以多脈手太陽之上血氣盛則有多鬚面多肉以平血氣皆少則面瘦惡色手太陽之下血氣盛則掌肉充滿血氣皆少則掌瘦以寒黄帝曰二十五人者刺之有約乎岐伯曰美眉者足太陽之脈氣血多惡眉者血氣少其肥而澤者血氣有餘肥而不澤者氣有餘血不足瘦而无澤者氣血俱不足審察其形氣有餘不足而調之可以知逆順矣黄帝曰刺其諸隂陽奈何岐伯曰按其寸口人迎以調隂陽切循其經絡之凝濇結而不通者此於身皆為痛痺甚則不行故凝濇凝濇者致氣以温之血和乃止其結絡者脈結濇不和決之乃行故曰氣有餘于上者導而下之氣不足於上者推而休之其稽留不至者因而迎之必明於經隧乃能待之寒與熱争者導而行之其宛陳血不結者則而予之必先明知二十五人則血氣之所在左右上下刺約畢也釱大慆他刀切鮫交胻杭􅏿只玉切靈樞經卷九欽定四庫全書靈樞經巻十宋史崧音釋五音五味第六十六右徵與少徵調右手太陽上左商與左徵調左手陽明上少徵與大宫調左手陽明上右角與大角調右足少陽下大徵與少徵調左手太陽上衆羽與少羽調右足太陽下少商與右商調右手太陽下桎羽與衆羽調右足太陽下少宫與大宫調右足陽明下判角與少角調右足少陽下釱商與上商調右足陽明下釱商與上角調左足太陽下上徵與右徵同穀麥畜羊果杏手少陽藏心色赤味苦時夏上羽與大羽同穀大豆畜彘果栗足少隂藏腎色黒味鹹時冬上宫與大宫同穀稷畜牛果􅀥足太隂藏脾色黄味甘時季夏上商與右商同穀黍畜雞果桃手太隂藏肺色白味辛時秋上角與大角同穀麻畜犬果李足厥隂藏肝色青味酸時春大宫與上角同右足陽明上左角與大角同左足陽明上少羽與大羽同右足太陽下左商與右商同左手陽明上加宫與大宫同左足少陽上質判與大宫同左手太陽下判角與大角同左足少陽下大羽與大角同右足太陽上大角與大宫同右足少陽上右徵少徵質徵上徵判徵右角釱角上角大角判角右商少商釱商上商左商少宫上宫大宫加宫左角宫衆羽桎羽上羽大羽少羽黄帝曰婦人無鬚者無血氣乎岐伯曰衝脈任脈皆起於胞中上循背裏為經絡之海其浮而外者循腹右上行㑹於咽喉别而絡唇口血氣盛則充膚熱肉血獨盛則澹滲皮膚生毫毛今婦人之生有餘於氣不足於血以其數脱血也衝任之脈不榮口唇故鬚不生焉黄帝曰士人有傷於隂隂氣絶而不起隂不用然其鬚不去其故何也宦者獨去何也願聞其故岐伯曰宦者去其宗筋傷其衝脈血寫不復皮膚内結唇口不營故鬚不生黄帝曰其有天宦者未嘗被傷不脱於血然其鬚不生其故何也岐伯曰此天之所不足也其任衝不盛宗筋不成有氣無血唇口不榮故鬚不生黄帝曰善乎哉聖人之通萬物也若日月之光影音聲鼓響聞其聲而知其形其非夫子孰能明萬物之精是故聖人視其顔色黄赤者多熱氣青白者少熱氣黒色者多血少氣美眉者太陽多血通髯極鬚者少陽多血美鬚者陽明多血此其時然也夫人之常數太陽常多血少氣少陽常多氣少血陽明常多血多氣厥隂常多氣少血少隂常多血少氣太隂常多血少氣此天之常數也百病始生第六十六黄帝問于岐伯曰夫百病之始生也皆生於風雨寒暑清濕喜怒喜怒不節則傷藏風雨則傷上清濕則傷下三部之氣所傷異類願聞其㑹歧伯曰三部之氣各不同或起於隂或起於陽請言其方喜怒不節則傷藏藏傷則病起於隂也清濕襲虚則病起於下風雨襲虚則病起於上是謂三部至於其淫泆不可勝數黄帝曰余固不能數故問先師願卒聞其道歧伯曰風雨寒熱不得虚邪不能獨傷人卒然逢疾風暴雨而不病者盖無虚故邪不能獨傷人此必因虚邪之風與其身形兩虚相得乃客其形兩實相逢衆人肉堅其中於虚邪也因於天時與其身形參以虚實大病乃成氣有定舎因處為名上下中外分為三員是故虚邪之中人也始於皮膚皮膚緩則腠理開開則邪從毛髮入入則抵深深則毛髮立毛髮立則淅然故皮膚痛留而不去則傳舎於絡脈在絡之時痛於肌肉其痛之時息大經乃代留而不去傳舍於經在經之時洒淅喜驚留而不去傳舍於輸在輸之時六經不通四肢則肢節痛腰脊乃强留而不去傳舍於伏衝之脈在伏衝之時體重身痛留而不去𫝊舍於腸胃在腸胃之時賁嚮腹脹多寒則腸鳴飱泄食不化多熱則溏出麋留而不去𫝊舍於腸胃之外募原之間留著于脈稽留而不去息而成積或著孫脈或著絡脈或著經脈或著輸脈或著於伏衝之脈或著於膂筋或著于腸胃之募原上連於緩筋邪氣淫佚不可勝論黄帝曰願盡聞其所由然岐伯曰其著孫絡之脈而成積者其積往來上下臂手孫絡之居也浮而緩不能句積而止之故徃來移行腸胃之間水湊滲注灌濯濯有音有寒則䐜䐜滿雷引故時切痛其著於陽明之經則挾臍而居飽食則益大饑則益小其著於緩筋也似陽明之積飽食則痛饑則安其著於腸胃之募原也痛而外連于緩筋飽食則安饑則痛其著於伏衝之脈者揣之應手而動發手則熱氣下於兩股如湯沃之狀其著于膂筋在腸後者饑則積見飽則積不見按之不得其著於輸之脈者閉塞不通津液不下孔竅乾壅此邪氣之從外入内從上下也黄帝曰積之始生至其已成奈何歧伯曰積之始生得寒乃生厥乃成積也黄帝曰其成積奈何歧伯曰厥氣生足悗悗生脛寒脛寒則血脈凝濇血脈凝濇則寒氣上入於腸胃入於腸胃則䐜脹䐜脹則腸外之汁沫迫聚不得散日以成積卒然多食飲則腸滿起居不節用力過度則絡脈傷陽絡傷則血外溢血外溢則衂血隂絡傷則血内溢血内溢則後血腸胃之絡傷則血溢於腸外腸外有寒汁沫與血相摶則并合凝聚不得散而積成矣卒然外中於寒若内傷於憂怒則氣上逆氣上逆則六輸不通温氣不行凝血藴裏而不散津液濇滲著而不去而積皆成矣黄帝曰其生於隂者奈何歧伯曰憂思傷心重寒傷肺忿怒傷肝醉以入房汗出當風傷脾用力過度若入房汗出浴則傷腎此内外三部之所生病者也黄帝曰善治之奈何歧伯答曰察其所痛以知其應有餘不足當補則補當冩則冩毋逆天時是謂至治泆亦行鍼第六十七黄帝問於歧伯曰余聞九鍼於夫子而行之於百姓百姓之血氣各不同形或神動而氣先鍼行或氣與鍼相逢或鍼以出氣獨行或數刺乃知或發鍼而氣逆或數刺病益劇凡此六者各不同形願聞其方歧伯曰重陽之人其神易動其氣易往也黄帝曰何謂重陽之人歧伯曰重陽之人熇熇髙髙言語善疾舉足善髙心肺之蔵氣有餘陽氣滑盛而揚故神動而氣先行黄帝曰重陽之人而神不先行者何也歧伯曰此人頗有隂者也黄帝曰何以知其頗有隂也歧伯曰多陽者多喜多隂者多怒數怒者易解故曰頗有隂其隂陽之離合難故其神不能先行也黄帝曰其氣與鍼相逢奈何歧伯曰隂陽和調而血氣淖澤滑利故鍼入而氣出疾而相逢也黄帝曰鍼已出而氣獨行者何氣使然歧伯曰其隂氣多而陽氣少隂氣沉而陽氣浮者内蔵故鍼已出氣乃隨其後故獨行也黄帝曰數刺乃知何氣使然歧伯曰此人之多隂而少陽其氣沉而氣往難故數刺乃知也黄帝曰鍼入而氣逆者何氣使然歧伯曰其氣逆與其數刺病益甚者非隂陽之氣浮沉之勢也此皆粗之所敗上之所失其形氣無過焉上膈第六十八黄帝曰氣為上膈者食飲入而還出余已知之矣蟲為下膈下膈者食晬時乃出余未得其意願卒聞之歧伯曰喜怒不適食飲不節寒温不時則寒汁流於腸中流於腸中則蟲寒蟲寒則積聚守於下管則腸胃充郭衛氣不營邪氣居之人食則蟲上食蟲上食則下管虛下管虚則邪氣勝之積聚以留留則癰成癰成則下管約其癰在管内者即而痛深其癰在外者則癰外而痛浮癰上皮熱黄帝曰刺之奈何歧伯曰微按其癰視氣所行先淺刺其傍稍内益深還而刺之毋過三行察其沉浮以為深淺已刺必熨令熱入中日使入内邪氣益衰大癰乃潰伍以參禁以除其内恬憺無為乃能行氣後以鹹苦化穀乃下矣潰音㑹憂恚無言第六十九黄帝問於少師曰人之卒然憂恚而言無音者何道之塞何氣出行使音不彰願聞其方少師答曰咽喉者水穀之道也喉嚨者氣之所以上下者也㑹厭者音聲之户也口唇者音聲之扇也舌者音聲之機也懸雍垂者音聲之闗也頏顙者分氣之所泄也横骨者神氣所使主發舌者也故人之鼻洞涕出不收者頏顙不開分氣失也是故厭小而疾薄則發氣疾其開闔利其出氣易其厭大而厚則開闔難其氣出遲故重言也人卒然無音者寒氣客于厭則厭不能發發不能下至其開闔不致故無音黄帝曰刺之奈何歧伯曰足之少隂上繫於舌絡於横骨終於㑹厭兩冩其血脈濁氣乃辟㑹厭之脈上絡任脈取之夭突其厭乃發也寒熱第七十黄帝問于歧伯曰寒熱瘰癧在於頸腋者皆何氣使生歧伯曰此皆䑕瘻寒熱之毒氣也留於脈而不去者也黄帝曰去之奈何歧伯曰䑕瘻之本皆在於蔵其末上出於頸腋之間其浮於脈中而未内著於肌肉而外為膿血者易去也黄帝曰去之奈何歧伯曰請從其本引其末可使衰去而絶其寒熱審按其道以予之徐往徐來以去之其小如麥者一刺知三刺而已黄帝曰決其生死奈何歧伯曰反其目視之其中有赤脈上下貫瞳子見一脈一歳死見一脈半一嵗半死見二脈二嵗死見二脈半二嵗半死見三脈三嵗而死見赤脈不下貫瞳子可治也邪客第七十一黄帝問于伯髙曰夫邪氣之客人也或令人目不瞑不卧出者何氣使然伯髙曰五穀入于胃也其糟粕津液宗氣分為三隧故宗氣積于胸中出于喉嚨以貫心脈而行呼吸焉營氣者泌其津液注之於脈化以為血以榮四末内注五蔵六府以應刻數焉衛氣者出其悍氣之慓疾而先行於四末分肉皮膚之間而不休者也晝日行於陽夜行於隂常從足少隂之分間行於五蔵六府今厥氣客於五蔵六府則衛氣獨衛其外行於陽不得入於隂行於陽則陽氣盛陽氣盛則陽蹻陷不得入於隂隂虚故目不瞑黄帝曰善治之奈何伯髙曰補其不足冩其有餘調其虚實以通其道而去其邪飲以半夏湯一劑隂陽已通其卧立至黄帝曰善此所謂決瀆壅塞經絡大通隂陽和得者也願聞其方伯髙曰其湯方以流水千里以外者八升揚之萬遍取其清五升煑之炊以葦薪火沸置秫米一升治半夏五合徐炊令竭為一升半去其滓飲汁一小盃日三稍益以知為度故其病新發者覆杯則卧汗出則已矣久者三飲而已也黄帝問於伯髙曰願聞人之肢節以應天地奈何伯髙答曰天圓地方人頭圓足方以應之天有日月人有兩目地有九州人有九竅天有風雨人有喜怒天有雷電人有音聲天有四時人有四肢天有五音人有五蔵天有六律人有六府天有冬夏人有寒熱天有十日人有手十指辰有十二人有足十指莖垂以應之女子不足二節以抱人形天有隂陽人有夫妻歳有三百六十五日人有三百六十節地有髙山人有肩膝地有深谷人有腋膕地有十二經水人有十二經脈地有泉脈人有衛氣地有草蓂人有毫毛天有晝夜人有卧起天有列星人有牙齒地有小山人有小節地有山石人有髙骨地有林木人有募筋地有聚邑人有㬷肉嵗有十二月人有十二節地有四時不生草人有無子此人與天地相應者也黄帝問於歧伯曰余願聞持針之數内鍼之理縱舍之意扞皮開腠理奈何脈之屈折出入之處焉至而出焉至而止焉至而徐焉至而疾焉至而入六府之輸於身者余願盡聞少序别離之處離而入隂别而入陽此何道而從行願盡聞其方歧伯曰帝之所問鍼道乖矣黄帝曰願卒聞之歧伯曰手太隂之脈出於大指之端内屈循白肉際至本節之後大淵留以澹外屈上於本節下内屈與隂諸絡㑹於魚際數脈并注其氣滑利伏行壅骨之下外屈出於寸口而行上至於肘内廉入於大筋之下内屈上行臑隂入腋下内屈走肺此順行逆數之屈折也心主之脈出於中指之端内屈循中指内廉以上留於掌中伏行兩骨之間外屈出兩筋之間骨肉之際其氣滑利上二寸外屈出行兩筋之間上至肘内廉入於小筋之下留兩骨之㑹上入於胸中内絡於心脈黄帝曰手少隂之脈獨無腧何也歧伯曰少隂心脈也心者五蔵六府之大主也精神之所舍也其蔵堅固邪弗能容也容之則心傷心傷則神去神去則死矣故諸邪之在於心者皆在於心之包絡包絡者心主之脈也故獨無腧焉黄帝曰少隂獨無腧者不病乎歧伯曰其外經病而蔵不病故獨取其經於掌後鋭骨之端其餘脈出入屈折其行之徐疾皆如手少隂心主之脈行也故本腧者皆因其氣之虚實疾徐以取之是謂因衝而冩因衰而補如是者邪氣得去真氣堅固是謂因天之序黄帝曰持鍼縱舍奈何歧伯曰必先明知十二經脈之本末皮膚之寒熱脈之盛衰滑濇其脈滑而盛者病日進虚而細者久以持大而濇者為痛痺隂陽如一者病難治其本末尚熱者病尚在其熱以衰者其病亦去矣持其尺察其肉之堅脆小大滑濇寒温燥濕因視目之五色以知五蔵而決死生視其血脈察其色以知其寒熱痛痺黄帝曰持鍼縱舍余未得其意也歧伯曰持鍼之道欲端以正安以静先知虚實而行疾徐左手執骨右手循之無與肉果冩欲端以正補必閉膚輔鍼導氣邪得淫泆真氣得居黄帝曰扞皮開腠理奈何歧伯曰因其分肉左别其膚微内而徐端之適神不散邪氣得去黄帝問於歧伯曰人有八虚各何以候歧伯答曰以候五蔵黄帝曰候之奈何歧伯曰肺心有邪其氣留於兩肘肝有邪其氣流于兩腋脾有邪其氣留于兩髀腎有邪其氣留于兩膕凡此八虚者皆機闗之室真氣之所過血絡之所遊邪氣惡血固不得住留住留則傷筋絡骨節機闗不得屈伸故病攣也泌兵媚切扞苦旱切痀音拘通天第七十二黄帝問于少師曰余嘗聞人有隂陽何謂隂人何謂陽人少師曰天地之間六合之内不離於五人亦應之非徒一隂一陽而已也而畧言耳口弗能徧明也黄帝曰願畧聞其意有賢人聖人心能備而行之乎少師曰盖有太隂之人少隂之人太陽之人少陽之人隂陽和平之人凡五人者其態不同其筋骨氣血各不等黄帝曰其不等者可得聞乎少師曰太隂之人貪而不仁下齊湛湛好内而惡出心和而不發不務於時動而後之此太隂之人也少隂之人小貪而賊心見人有亡常若有得好傷好害見人有榮乃反愠怒心疾而無恩此少隂之人也太陽之人居處于于好言大事無能而虚説志發於四野舉措不顧是非為事如常自用事雖敗而常無悔此太陽之人也少陽之人諟諦好自貴有小小官則髙自宜好為外交而不内附此少陽之人也隂陽和平之人居處安静無為懼懼無為欣欣婉然從物或與不争與時變化尊則謙謙譚而不治是謂至治古之善用鍼艾者視人五態乃治之盛者冩之虚者補之黄帝曰治人之五態奈何少師曰太隂之人多隂而無陽其隂血濁其衛氣濇隂陽不和緩筋而厚皮不之疾冩不能移之少隂之人多隂少陽小胃而大腸六府不調其陽明脈小而太陽脈大必審調之其血易脱其氣易敗也太陽之人多陽而少隂必謹調之無脱其隂而冩其陽陽重脱者易狂隂陽皆脱者暴死不知人也少陽之人多陽少隂經小而絡大血在中而無外實隂而虚陽獨冩其絡脈則强氣脱而疾中氣不足病不起也隂陽和平之人其隂陽之氣和血脈調謹診其隂陽視其邪正安容儀審有餘不足盛則冩之虚則補之不盛不虚以經取之此所以調隂陽别五態之人者也黄帝曰夫五態之人者相與毋故卒然新㑹未知其行也何以别之少師答曰衆人之屬不如五態之人者故五五二十五人而五態之人不與焉五態之人尤不合於衆者也黄帝曰别五態之人奈何少師曰太隂之人其狀黮黮然黒色念然下意臨臨然長大膕然未僂此太隂之人也少隂之人其狀清然竊然固以隂賊立而躁嶮行而似伏此少隂之人也太陽之人其狀軒軒儲儲反身折膕此太陽之人也少陽之人其狀立則好仰行則好摇其兩臂兩肘則常出於背此少陽之人也隂陽和平之人其狀委委然隨隨然顒顒然愉愉然䁢暶然豆豆然衆人皆曰君子此隂陽和平之人也諟上坁切黮直稔切暶辭縁切靈樞經卷十欽定四庫全書靈樞經巻十一宋史崧音釋官能第七十三黄帝問于歧伯曰余聞九鍼於夫子衆多矣不可勝數余推而論之以為一紀余司誦之子聽其理非則語余請正其道令可久傳後世無患得其人乃傳非其人勿言歧伯稽首再拜曰請聽聖王之道黄帝曰用鍼之理必知形氣之所在左右上下隂陽表裏血氣多少行之逆順出入之合謀伐有過知解結知補虚冩實上下氣門明通於四海審其所在寒熱淋露以輸異處審於調氣明於經隧左右肢絡盡知其㑹寒與熱争能合而調之虚與實鄰知決而通之左右不調犯而行之明於逆順乃知可治隂陽不竒故知起時審於本末察其寒熱得邪所在萬刺不殆知官九鍼刺道畢矣明於五輸徐疾所在屈伸出入皆有條理言隂與五合於五行五蔵六府亦有所蔵四時八風盡有隂陽各得其位合於明堂各處色部五蔵六府察其所痛左右上下知其寒温何經所在審皮膚之寒温滑濇知其所苦膈有上下知其氣所在先得其道稀而疎之稍深以留故能徐入之大熱在上推而下之從下上者引而去之視前痛者常先取之大寒在外留而補之入於中者從合冩之鍼所不為灸之所宜上氣不足推而揚之下氣不足積而從之隂陽皆虚火自當之厥而寒甚骨廉陷下寒過於膝下陵三里隂絡所過得之留止寒入於中推而行之經陷下者火則當之結絡堅𦂳火所治之不知所苦兩蹻之下男隂女陽良工所禁鍼論畢矣用鍼之服必有法則上視天光下司八正以辟竒邪而觀百姓審於虚實無犯其邪是得天之露遇嵗之虚救而不勝反受其殃故曰必知天忌乃言鍼意法於往古驗於來今觀於窈㝠通於無窮粗之所不見良工之所貴莫知其形若神髣髴邪氣之中人也灑淅動形正邪之中人也微先見於色不知於其身若在若無若亡若存有形無形莫知其情是故上工之取氣乃救其萌芽下工守其已成因敗其形是故工之用鍼也知氣之所在而守其門户明於調氣補冩所在徐疾之意所取之處冩必用員切而轉之其氣乃行疾而徐出邪氣乃出伸而迎之遥大其穴氣出乃疾補必用方外引其皮令當其門左引其樞右推其膚㣲旋而徐推之必端以正安以静堅心無解欲微以留氣下而疾出之推其皮盖其外門真氣乃存用針之要無忘其神雷公問於黄帝曰針論曰得其人乃傳非其人勿言何以知其可傳黄帝曰各得其人任之其能故能明其事雷公曰願聞官能奈何黄帝曰眀目者可使視色聰耳者可使聽音捷疾辭語者可使傳論語徐而安静手巧而心審諦者可使行針艾理血氣而調諸逆順察隂陽而兼諸方緩節柔筋而心和調者可使導引行氣疾毒言語輕人者可使唾癰呪病爪苦手毒為事善傷者可使按積抑痺各得其能方乃可行其名乃彰不得其人其功不成其師無名故曰得其人乃言非其人勿傳此之謂也手毒者可使試按龜置龜於器下而按其上五十日而死矣手甘者復生如故也出入之合一本作㑹把而行之一本作犯而行之窈㝠一本作㝠㝠論疾診尺第七十四黄帝問于歧伯曰余欲無視色持脈獨調其尺以言其病從外知内為之奈何歧伯曰審其尺之緩急小大滑濇肉之堅脆而病形定矣視人之目窠上㣲癕如新卧起狀其頸脈動時欬按其手足上窅而不起者風水膚脹也人膚滑其淖澤者風也尺肉弱者解㑊安卧脱肉者寒熱不治尺膚滑而澤脂者風也尺膚濇者風痺也尺膚粗如枮魚之鱗者水泆飲也尺膚熱甚脈盛躁者病温也其脈盛而滑者病且出也尺膚寒甚脈小者病少氣尺膚炬然先熱後寒者寒熱也尺膚先寒久大之而熱者亦寒熱也肘所獨熱者腰以上熱手所獨熱者腰以下熱肘前獨熱者膺前熱肘後獨熱者肩背熱臂中獨熱者腰腹熱肘後粗以下三四寸熱者腸中有蟲掌中熱者腹中熱掌中寒者腹中寒魚上白内有青血脈者胃中有寒尺炬然熱人迎大者當奪血尺堅大脈小甚少氣悗有加立死目赤色者病在心白在肺青在肝黄在脾黒在腎黄色不可名者病在胸中診目痛赤脈從上下者太陽病從下上者陽明病從外走内者少陽病診寒熱赤脈上下至瞳子見一脈一歳死見一脈半一歳半死見二脈二嵗死見二脈半二歳半死見三脈三嵗死診齲齒痛按其陽之來有過者獨熱在左左熱在右右熱在上上熱在下下熱診血脈者多赤多熱多青多痛多黒為久痺多赤多黒多青皆見者寒熱身痛而色微黄齒垢黄爪甲上黄黄疸也安卧小便黄赤脈小而澁者不嗜食人病其寸口之脈與人迎之脈小大等及其浮沉等者病難已也女子手少隂脈動甚者姙子嬰兒病其頭毛皆逆上者必死耳間青脈起者掣痛大便赤辨飱泄脈小者手足寒難已飱泄脈小手足温泄易已四時之變寒暑之勝重隂必陽重陽必隂故隂主寒陽主熱故寒甚則熱熱甚則寒故曰寒生熱熱生寒此隂陽之變也故曰冬傷於寒春生癉熱春傷於風夏生後泄腸僻夏傷於暑秋生痎瘧秋傷於濕冬生咳嗽是謂四時之序也目窠科窅音杳炬然其吕切齲丘禹切掣尺制切痎瘧上音皆瘦病也刺節真邪第七十五黄帝問于歧伯曰余聞刺有五節奈何歧伯曰固有五節一曰振埃二曰發矇三曰去爪四曰徹衣五曰解惑黄帝曰夫子言五節余未知其意歧伯曰振埃者刺外去陽病也發矇者刺府輸去府病也去爪者刺闗節肢絡也徹衣者盡刺諸陽之竒輸也解惑者盡知調隂陽補冩有餘不足相傾移也黄帝曰刺節言振埃夫子乃言刺外經去陽病余不知其所謂也願聞其故歧伯曰振埃者陽氣大逆上滿於胸中憤瞋有息大氣逆上喘喝坐伏病惡埃烟鍧不得息請言振埃尚疾於振埃黄帝曰善取之何如歧伯曰取之天容黄帝曰其欬上氣窮詘胸痛者取之奈何歧伯曰取之廉泉黄帝曰取之有數乎歧伯曰取天容者無過一里取廉泉者血變而止帝曰善哉黄帝曰刺節言發矇余不得其意夫發矇者耳無所聞目無所見夫子乃言刺府輸去府病何輸使然願聞其故歧伯曰妙乎哉聞也此刺之大約針之極也神眀之類也口説書卷猶不能及也請言發矇耳尚疾於發矇也黄帝曰善願卒聞之歧伯曰刺此者必於日中刺其聽宫中其眸子聲聞於耳此其輸也黄帝曰善何謂聲聞於耳歧伯曰刺邪以手堅按其兩鼻竅而疾偃其聲必應於針也黄帝曰善此所謂弗見為之而無目視見而取之神明相得者也黄帝曰刺節善去爪夫子乃言刺闗節肢絡願卒聞之歧伯曰腰脊者身之大闗節也肢脛者人之管以趨翔也莖垂者身中之機隂精之候津液之道也故飲食不節喜怒不時津液内溢乃下流於睪血道不通目大不休俛仰不便趨翔不能此病榮然有水不上不下鈹石所取形不可匿常不得蔽故命曰去爪帝曰善黄帝曰刺節言徹衣夫子乃言盡刺諸陽之竒輸未有常處也願卒聞之歧伯曰是陽氣有餘而隂氣不足隂氣不足則内熱陽氣有餘則外熱内熱相摶熱於懷炭外畏綿帛近不可近身又不可近席腠理閉塞則汗不出舌焦唇槁腊乾嗌燥飲食不讓美惡黄帝曰善取之奈何歧伯曰或之於其天府大杼三痏又刺中膂以去其熱補足手太隂以去其汗熱去汗稀疾於徹衣黄帝曰善黄帝曰刺節言解惑夫子乃言盡知調隂陽補㵼有餘不足相傾移也惑何以解之歧伯曰大風在身血脈偏虚虚者不足實者有餘輕重不得傾側宛伏不知東西不知南北乍上乍下乍反乍覆顛倒無常甚於迷惑黄帝曰善取之奈何歧伯曰㵼其有餘補其不足隂陽平復用針若此疾於解惑黄帝曰善請蔵之靈蘭之室不敢妄出也黄帝曰余聞刺有五邪何謂五邪歧伯曰病有持癰者有容大者有狹小者有熱者有寒者是謂五邪黄帝曰刺五邪奈何歧伯曰凡刺五邪之方不過五章痺熱消滅腫聚散亡寒痺益温小者益陽大者必去請道其方凡刺癰邪無迎隴易俗移性不得膿脆道更行去其鄉不安處所乃散亡諸隂陽過癰者取之其輸冩之凡刺大邪日以小泄奪其有餘乃益虚剽其通針其邪肌肉親視之毋有反其真刺諸陽分肉間凡刺小邪日以大補其不足乃無害視其所在迎之界逺近盡至其不得外侵而行之乃自費刺分肉間凡刺熱邪越而蒼出遊不歸乃無病為開通辟門户使邪得出病乃已凡刺寒邪日以温徐往徐來致其神門戸已閉氣不分虚實得調其氣存也黄帝曰官針奈何岐伯曰刺癰者用鈹針刺大者用鋒針刺小者用員利針刺熱者用鑱針刺寒者用毫針也請言解論與天地相應與四時相副人參天地故可為解下有漸洳上生葦蒲此所以知形氣之多少也隂陽者寒暑也熱則滋雨而在上根荄少汁人氣在外皮膚緩腠理開血氣減汁大泄皮淖澤寒則地凍水冰人氣在中皮膚緩腠理閉汗不出血氣强肉堅濇當是之時善行水者不能往冰善穿地者不能鑿凍善用針者亦不能取四厥血脈凝結堅摶不往來者亦未可即柔故行水者必待天温冰釋凍解而水可行地可穿也人脈猶是也治厥者必先熨調和其經掌與腋肘與脚頂與脊以調之火氣已通血脈乃行然後視其病脈淖澤者刺而平之堅𦂳者破而散之氣下乃止此所謂以解結者也用針之類在於調氣氣積於胃以通營衛各行其道宗氣留於海其下者注於氣街其上者走於息道故厥在於足宗氣不下脈中之血凝而留止弗之火調弗能取之用針者必先察其經絡之實虚切而循之按而彈之視其應動者乃後取之而下之六經調者謂之不病雖病謂之自已也一經上實下虚而不通者此必有横絡盛加於大經令之不通視而㵼之此所謂解結也上寒下熱先刺其項太陽久留之已刺則熨項與肩胛令熱下合乃止此所謂推而上之者也上熱下寒視其虚脈而陷之於經絡者取之氣下乃止此所謂引而下之者也大熱徧身狂而妄見妄聞妄言視足陽明及大絡取之虚者補之血而實者㵼之因其􅅯卧居其頭前以兩手四指挾按頸動脈久持之巻而切推下至缺盆中而復止如前熱去乃止此所謂推而散之者也黄帝曰有一脈生數十病者或痛或癰或熱或寒或痒或痺或不仁變化無窮其故何也岐伯曰此皆邪氣之所生也黄帝曰余聞氣者有真氣有正氣有邪氣何謂真氣􅄮伯曰真氣者所受於天與穀氣并而充身也正氣者正風也從一方來非實風又非虚風也邪氣者虚風之賊傷人也其中人也深不能自去正風者其中人也淺合而自去其氣來柔弱不能勝真氣故自去虚邪之中人也灑浙動形起毫毛而發腠理其入深内摶於骨則為骨痺摶於筋則為筋攣摶於脈中則為血閉不通則為癰摶於肉與衛氣相摶陽勝者則為熱隂勝者則為寒寒則真氣去去則虚虚則寒搏於皮膚之間其氣外發腠理開毫毛摇氣往来行則為痒留而不去則痺衛氣不行則為不仁虚邪徧容於身半其入深内居榮衛榮衛稍衰則真氣去邪氣獨留發為偏枯其邪氣淺者脈偏痛虚邪之入於身也深寒與熱相摶久留而内著寒勝其熱則骨疼肉枯熱勝其寒則爛肉腐肌為膿内傷骨内傷骨為骨蝕有所疾前筋筋屈不得伸邪氣居其間而不反發於筋溜有所結氣歸之衛氣留之不得反津液久留合而為腸溜久者數歳乃成以手按之柔已有所結氣歸之津液留之邪氣中之凝結日以易甚運以聚居為昔瘤以手按之堅有所結深中骨氣因於骨骨與氣并日以益大則為骨疽有所結中於肉宗氣歸之邪留而不去有熱則化而為膿無熱則為肉疽凡此數氣者其發無常處而有常名也䭇音壹窮詘下音屈腊思亦切剽其匹妙切漸洳上音替下音如草根相牽引貌衛氣行第七十六黄帝問於岐伯曰願聞衛氣之行出入之合何如伯髙曰歳有十二月日有十二辰子午為經夘酉為緯天周二十八宿而一面七星四七二十八星房􅄧為緯虚張為經是故房至畢為陽昴至心為隂陽主晝隂主夜故衛氣之行一日一夜五十周於身晝日行於陽二十五周夜行於隂二十五周周於五歳是故平旦隂盡陽氣出於目目張則氣上行於頭循項下足太陽循背下至小指之端其散者别於目鋭眥下手太陽下至手小指之間外側其散者别於目鋭眥下足少陽注小指次指之間以上循手少陽之分側下至小指之間别者以上至耳前合於頷脈注足陽明以下行至跗上入五指之間其散者從耳下下手陽明入大指之間入掌中其至於足也入足心出内踝下行隂分復合於目故為一周是故日行一舍人氣行一周與十分身之八日行二舍人氣行二周於身與十分身之六日行三舎人氣行於身五周與十分身之四日行四舎人氣行於身七周與十分身之二日行五舍人氣行於身九周日行六舎人氣行於身十周與十分身之八日行七舍人氣行於身十二周在身與十分身之六日行十四舍人氣二十五周於身有竒分與十分身之四陽盡於隂隂受氣矣其始入於隂常從足少隂注於腎腎注於心心注於肺肺注於肝肝注於脾脾復注于腎為周是故夜行一舍人氣行於隂蔵一周與十分蔵之八亦如陽行之二十五周而復合於目隂陽一日一夜合有竒分十分身之四與十分蔵之二是故人之所以卧起之時有早晏者竒分不盡故也黄帝曰衛氣之在於身也上下往來不以期候氣而刺之奈何伯髙曰分有多少日有長短春秋冬夏各有分理然後常以平旦為紀以夜盡為始是故一日一夜水下百刻二十五刻者半日之度也常如是母巳日入而止隨日之長短各以為紀而刺之謹候其時病可與期失時反候者百病不治故曰刺實者刺其來也刺虚者刺其去也此言氣存亡之時以候虚實而刺之是故謹候氣之所在而刺之是謂逢時在於三陽必候其氣在於陽而刺之病在於三隂必候其氣在隂分而刺之水下一刻人氣在太陽水下二刻人氣在少陽水下三刻人氣在陽明水下四刻人氣在隂分水下五刻人氣在太陽水下六刻人氣在少陽水下七刻人氣在陽明水下八刻人氣在隂分水下九刻人氣在太陽水下十刻人氣在少陽水下十一刻人氣在陽明水下十二刻人氣在隂分水下十三刻人氣在太陽水下十四刻人氣在少陽水下十五刻人氣在陽明水下十六刻人氣在隂分水下十七刻人氣在太陽水下十八刻人氣在少陽水下十九刻人氣在陽明水下二十刻人氣在隂分水下二十一刻人氣在太陽水下二十二刻人氣在少陽水下二十三刻人氣在陽明水下二十四刻人氣在隂分水下二十五刻人氣在太陽此半月之度也從房至畢一十四舎水下五十刻日行半度迴行一舍水下三刻與七分刻之四大要曰常以日之加於宿上也人氣在太陽是故日行一舎人氣行三陽行與隂分常如是無已天與地同紀紛紛􅀈􅀈終而復始一日一夜水下百刻而盡矣􅀈􅀈按大素音義云普巴切九宫八風第七十七立秋二𤣥委方西南秋分七倉果西方立冬六新洛方西北夏至九上天南方招摇中央冬至一叶蟄北方立夏四隂洛方東南春分三倉門東方立春八天留方東北太一常以冬至之日居叶蟄之宫四十六日明日居天留四十六日明日居倉門四十六日明日居隂洛四十五日明日居天宫四十六日明日居𤣥委四十六日明日居倉果四十六日明日居新洛四十五日明日復居叶蟄之宫曰冬至矣太一日遊以冬至之日居叶蟄之宫數所在日從一處至九日復反於一常如是無已終而復始太一移日天必應之以風雨以其日風雨則吉嵗美民安少病矣先之則多雨後之則多汗太一在冬至之日有變占在君太一在春分之日有變占在相太一在中宫之日有變占在吏太一在秋分之日有變占在將太一在夏至之日有變占在百姓所謂有變者太一居五宫之日病風折樹木揚沙石各以其所主占貴賤因視風所從來而占之風從其所居之鄉来為實風主生長養萬物從其衝後来為虚風傷人者也主殺主害者謹候虚風而避之故聖人日避虚邪之道如避矢石然邪弗能害此之謂也是故太一入徙立於中宫乃朝八風以占吉凶也風從南方來名曰大弱風其傷人也内舎於心外在於脈氣主熱風從西南方來名曰謀風其傷人也内舎於脾外在於肌其氣主為弱風從西方來名曰剛風其傷人也内舎於肺外在於皮膚其氣主為燥風從西北方來名曰折風其傷人也内舎於小腸外在於手太陽脈脈絶則溢脈閉則結不通善暴死風從北方來名曰大剛風其傷人也内舎於腎外在於骨與肩背之膂筋其氣主為寒也風從東北方來名曰凶風其傷人也内舍於大腸外在於兩脇腋骨下及肢節風從東方來名曰嬰兒風其傷人也内舍於肝外在於筋紐其氣主為身濕風從東南方来名曰弱風其傷人也内舎於胃外在肌肉其氣主體重此八風皆從其虚之鄉來乃能病人三虚相摶則為暴病卒死兩實一虚病則為淋霤寒熱犯其雨濕之地則為痿故聖人避風如避矢石焉其有三虚而偏中於邪風則為擊仆偏枯矣靈樞經卷十一欽定四庫全書靈樞經卷十二宋史崧音釋九針論第七十八黄帝曰余聞九針於夫子衆多博大矣余猶不能寤敢問九針焉生何因而有名岐伯曰九針者天地之大數也始於一而終於九故曰一以法天二以法地三以法人四以法時五以法音六以法律七以法星八以法風九以法野黄帝曰以針應九之數奈何歧伯曰夫聖人之起天地之數也一而九之故以立九野九而九之九九八十一以起黄鐘數焉以針應數也一者天也天者陽也五臓之應天者肺肺者五臓六府之盖也皮者肺之合也人之陽也故為之治針必以大其頭而鋭其末令無得深入而陽氣出二者地也人之所以應土者肉也故為之治針必筩其身而員其末令無得傷肉分傷則氣得竭三者人也人之所以成生者血脈也故為之治針必大其身而員其末令可以按脈勿陷以致其氣令邪氣獨出四者時也時者四時八風之客於經絡之中為瘤病者也故為之治針必筩其身而鋒其末令可以瀉熱出血而痼病竭五者音也音者冬夏之分分於子午隂與陽别寒與熱争兩氣相摶合為癰膿者也故為之治針必令其末如劍鋒可以取大膿六者律也律者調隂陽四時而合十二經脈虚邪客於經絡而為暴痺者也故為之治針必令尖如氂且員且鋭中身㣲大以取暴氣七者星也星者人之七竅邪之所客於經而為痛痺舎於經絡者也故為之治針令尖如蛟虻喙静以徐往㣲以久留正氣因之邪氣俱往出針而養者也八者風也風者人之股肱八節也八正之虚風八風傷人内舎於骨解腰脊節腠理之間為深痺也故為之治針必長其身鋒其末可以取深邪逺痺九者野也野者人之節解皮膚之間也淫邪流溢於身如風水之狀而溜不能過於機闗大節者也其為之治針令小大如挺其鋒微員以取大氣之不能過於闗節者也黄帝曰針之長短有數乎岐伯曰一曰鑱針者取法於巾針去末寸半卒鋭之長一寸六分主熱在頭身也二曰員針取法於絮針筩其身而卯其鋒長一寸六分主治分間氣三曰鍉針取法於黍粟之鋭長三寸半主按脈取氣令邪出四曰鋒針取法於絮針筩其身鋒其末長一寸六分主癰熱出血五曰鈹針取法於劍鋒廣二分半長四寸主大癰膿兩熱争者也六曰員利針取法於氂針㣲大其末反小其身令可深内也長一寸六分主取癰痺者也七曰毫針取法於毫毛長一寸六分主寒熱痛痺在絡者也八曰長針取法於綦針長七寸主取深邪逺痺者也九曰大針取法於鋒針其鋒微員長四寸主取大氣不出闗節者也針形畢矣此九針大小長短法也黄帝曰願聞身形應九野奈何岐伯曰請言身形之應九野也左足應立春其日戊寅己丑左脇應春分其日乙夘左毛應立夏其日戊辰己巳膺喉首頭應夏至其日丙午右手應立秋其日戊申己未右脇應秋分其日辛酉右足應立冬其日戊戌己亥腰尻下竅應冬至其日壬子六府膈下三臓應中州其大禁大禁太一所在之日及諸戊巳凡此九者善候八正所在之處所主左右上下身體有癰腫者欲治之無以其所直之日潰治之是謂天忌日也形樂志苦病生於脈治之以灸刺形苦志樂病生於筋治之以熨引形樂志樂病生於肉治之以針石形苦志苦病生於咽喝治之以甘藥形數驚恐筋脈不通病生於不仁治之以按摩醪藥是謂形五臓氣心主噫肺主欬肝主語脾主吞腎主欠六腑氣膽為怒胃為氣逆噦大腸小腸為泄膀胱不約為遺溺下焦溢為水五味酸入肝辛入肺苦入心甘入脾鹹入腎淡入胃是謂五味五并精氣并肝則憂并心則喜并肺則悲并腎則恐并脾則畏是謂五精之氣并於臓也五惡肝惡風心惡熱肺惡寒腎惡燥脾惡濕此五臓氣所惡也五液心主汗肝主泣肺主涕腎主唾脾主涎此五液所出也五勞久視傷血久卧傷氣久坐傷肉久立傷骨久行傷筋此五久勞所病也五走酸走筋辛走氣苦走血鹹走骨甘走肉足謂五走也五裁病在筋無食酸病在氣無食辛病在骨無食鹹病在血無食苦病在肉無食甘口嗜而欲食之不可多也必自裁也命曰五裁五發隂病發於骨陽病發於血以味發於氣陽病發於冬隂病發於夏五邪邪入於陽則為狂邪入於隂則為血痺邪入於陽轉則為癲疾邪入於隂轉則為瘖陽入之於隂病静隂出之於陽病喜怒五臓心蔵神肺蔵魄肝蔵魂脾蔵意腎蔵精志也五主心主脈肺主皮肝主筋脾主肌腎主骨陽明多血多氣太陽多血少氣少陽多氣少血太隂多血少氣厥隂多血少氣少隂多氣少血故曰刺陽明出血氣刺太陽出血惡氣刺少陽出氣惡血刺太隂出血惡氣刺厥隂出血惡氣刺少隂出氣惡血也足陽明太隂為表裏少陽厥隂為表裏太陽少隂為表裏是謂足之隂陽也手陽明太隂為表裏少陽心主為表裏太陽少隂為表裏是謂手之隂陽也筩音同鍉針音低巾針一本作布針五走五湊五裁素問作五禁嵗露論第七十九黄帝問於岐伯曰經言夏日傷暑秋病瘧瘧之發以時其故何也岐伯對曰邪客於風府病循膂而下衛氣一日一夜常大㑹於風府其明日日下一節故其日作晏此其先客於脊背也故每至於風府則腠理開腠理開則邪氣入邪氣入則病作此所以日作尚晏也衛氣之行風府日下一節二十一日下至尾底二十二日入脊内注於伏衝之脈其行九日出於缺盆之中其氣上行故其病稍益至其内摶於五蔵横連募原其道逺其氣深其行遲不能日作故次日乃稸積而作焉黄帝曰衛氣每至於風府腠理乃發發則邪入焉其衛氣日下一節則不當風府奈何岐伯曰風府無常衛氣之所應必開其腠理氣之所舍節則其府也黄帝曰善夫風之與瘧也相與同類而風常在而瘧特無時休何也􅄮伯曰風氣留其處瘧氣隨經絡沉以内摶故衛氣應乃作也帝曰善黄帝問於少師曰余聞四時八風之中人也故有寒暑寒則皮膚急而腠理閉暑則皮膚緩而腠理開賊風邪氣因得以入乎將必須八正虚邪乃能傷人乎少師答曰不然賊風邪氣之中人也不得以時然必因其開也其入深其内極病其病人也卒暴因其閉也其入淺以留其病也徐以遲黄帝曰有寒温和適腠理不開然有卒病者其故何也少師答曰帝弗知邪入乎雖平居其腠理開閉緩急其故常有時也黄帝曰可得聞乎少師曰人與天地相參也與日月相應也故月滿則海水西盛人血氣積肌肉充皮膚緻毛髮堅腠理㕁烟垢著當是之時雖遇賊風其入淺不深至其月郭空則海水東盛人氣血虚其衛氣去形獨居肌肉減皮膚縱腠理開毛髮殘膲理薄煙垢落當是之時遇賊風則其入深其病人也卒暴黄帝曰其有卒然暴死暴病者何也少師答曰三虚者其死暴疾也得三實者邪不能傷人也黄帝曰願聞三虚少師曰乗年之衰逢月之空失時之和因為賊風所傷是謂三虚故論不知三虚工反為粗帝曰願聞三實少師曰逢年之盛遇月之滿得時之和雖有賊風邪氣不能危之也黄帝曰善乎哉論明乎哉道請蔵之金匱命曰三實然此一夫之論也黄帝曰願聞嵗之所以皆同病者何因而然少師曰此八正之候也黄帝曰候之奈何少師曰候此者常以冬至之日太一立於叶蟄之宫其至也天必應之以風雨者矣風雨從南方來者為虚風賊傷人者也其以夜半至也萬民皆卧而弗犯也故其嵗民小病其以晝至者萬民懈惰而皆中於虚風故萬民多病虚邪入客於骨而不發於外至其立春陽氣大發腠理開因立春之日風從西方來萬民又皆中於虚風此兩邪相搏經氣結代者矣故諸逢其風而遇其雨者命曰遇嵗露焉因嵗之和而少賊風者民少病而少死嵗多賊風邪氣寒温不和則民多病而死矣黄帝曰虚邪之風其所傷貴賤何如候之奈何少師答曰正月朔日太一居天留之宫其日西北風不雨人多死矣正月朔日平旦北風春民多死正月朔日平旦北風行民病多者十有三也正月朔日日中北風夏民多死正月朔日夕時北風秋民多死終日北風大病死者十有六正月朔日風從南方來命曰旱鄉從西方來命曰白骨將國有殃人多死亡正月朔日風從東方來發屋揚沙石國有大災也正月朔日風從東南方行春有死亡正月朔天利温不風糴賤民不病天寒而風糴貴民多病此所謂候嵗之風􅀈傷人者也二月丑不風民多心腹病三月戌不溫民多寒熱四月已不暑民多癉病十月申不寒民多暴死諸所謂風者皆發屋折樹木揚沙石起毫毛發腠理者也理郄乞逆切大惑論第八十黄帝問於歧伯曰余嘗上於清泠之臺中階而顧匍匐而前則惑余私異之竊内怪之獨瞑獨視安心定氣久而不解獨轉獨眩披髮長跪俛而視之後久之不已也卒然自上何氣使然歧伯對曰五臓六腑之精氣皆上注於目而為之精精之窠為眼骨之精為瞳子筋之精為黒眼血之精為絡其窠氣之精為白眼肌肉之精為約束裏擷筋骨血氣之精而與脈并為系上屬於腦後出於項中故邪中於項因逢其身之虚其入深則隨眼系以入於腦入於腦則腦轉腦轉則引目系急目系急則目眩以轉矣邪其精其精所中不相比也則精散精散則視岐視岐見兩物目者五臓六腑之精也營衛䰟魄之所常營也神氣之所生也故神勞則䰟􅅎散志意亂是故瞳子黒眼法於隂白眼赤脈法於陽也故隂陽合傳而精明也目者心使也心者神之舎也故神精亂而不轉卒然見非常處精神䰟魄散不相得故曰惑也黄帝曰余疑其然余每之東苑未曽不惑去之則復余唯獨為東苑勞神乎何其異也􅄮伯曰不然也心有所喜神有所惡卒然相惑則精氣亂視誤故惑神移乃復是故間者為迷甚者為惑黄帝曰人之善忘者何氣使然岐伯曰上氣不足下氣有餘腸胃實而心肺虚虚則營衛留於下久之不以時上故善忘也黄帝曰人之善饑而不嗜食者何氣使然岐伯曰精氣并於脾熱氣留於胃胃熱則消穀穀消故善饑胃氣逆上則胃腕寒故不嗜食也黄帝曰病而不得卧者何氣使然岐伯曰衛氣不得入於隂常留於陽留於陽則陽氣滿陽氣滿則陽蹻盛不得入於隂則隂氣虚故目不瞑矣黄帝曰病目而不得視者何氣使然岐伯曰衛氣留於隂不得行於陽留於隂則隂氣盛隂氣盛則隂蹻滿不得入於陽則陽氣虚故目閉也黄帝曰人之多卧者何氣使然岐伯曰此人腸胃大而皮膚濕而分肉不解焉腸胃大則衛氣留久皮膚濕則分肉不解其行遲夫衛氣者晝日常行於陽夜行於隂故陽氣盡則卧隂氣盡則寤故腸胃大則衛氣行留久皮膚濕分肉不解則行遲留於隂也久其氣不精則欲瞑故多卧矣其腸胃小皮膚滑以緩分肉解利衛氣之留於陽也久故少瞑焉黄帝曰其非常經也卒然多卧者何氣使然歧伯曰邪氣留於上膲上膲閉而不通已食者飲湯衛氣留久於隂而不行故卒然多卧焉黄帝曰善治此諸邪奈何岐伯曰先其臓腑誅其小過後調其氣盛者㵼之虚者補之必先明知其形志之苦樂定乃取之裹擷奚結切神分方文切癰疽第八十一黄帝曰余聞腸胃受穀上焦出氣以温分肉而養骨節通腠理中焦出氣如露上注谿谷而滲孫脈津液和調變化而赤為血血和則孫脈先滿溢乃注於絡脈皆盈乃注於經脈隂陽已張因息乃行行有經紀周有道理與天合同不得休止切而調之從虚去實瀉則不足疾則氣減留則先後後虚去虚補則有餘血氣已調形氣乃持余已知血氣之平與不平未知癰疽之所從生成敗之時死生之期有逺近何以度之可得聞乎歧伯曰經脈留行不止與天同度與地合紀故天宿失度日月薄蝕地經失紀水道流溢草萓不成五穀不殖徑路不通民不往來巷聚邑居則别離異處血氣猶然請言其故夫血脈營衛周流不休上應星宿下應經數寒邪客於經絡之中則血泣血泣則不通不通則衛氣歸之不得復反故癰腫寒氣化為熱熱勝則腐肉肉腐則為膿膿不㵼則爛筋筋爛則傷骨骨傷則髓消不當骨空不得泄㵼血枯空虚則筋骨肌肉不相榮經脈敗漏薰於五臓臓傷故死矣黄帝曰願盡聞癰疽之形與忌曰名岐伯曰癰發於嗌中名曰猛疽猛疽不治化為膿膿不㵼塞咽半日死其化為膿者㵼則合豕膏冷食三日而已發於頸名曰天疽其癰大以赤黒不急治則熱氣下入淵腋前傷任脈内薰肝肺薰肝肺十餘日而死矣陽留大發消腦留項名曰腦爍其色不樂項痛而如刺以針煩心者死不可治發於肩及臑名曰疵癰其狀赤黒急治之此令人汗出至足不害五臓癰發四五日逞焫之發於腋下赤堅者名曰米疽治之以砭石欲細而長疎砭之塗已豕膏六日已勿裹之其癰堅而不潰者為馬刀挾纓急治之發於胸名曰井疽其狀如大豆三四日起不早治下入腹不治七日死矣發於膺名曰甘疽色青其狀如穀實􅌝􅌣常苦寒熱急治之去其寒熱十嵗死死後出膿發於脇名曰敗疵敗疵者女子之病也灸之其病大癰膿治之其中乃有生肉大如赤小豆剉䔖􅀢草根各一升以水一斗六升煑之竭為取三升則强飲厚衣坐於釡上令汗出至足已發於股脛名曰股脛疽其狀不甚變而癰膿摶骨不急治三十日死矣發於尻名曰鋭疽其狀赤堅大急治之不治三十日死矣發於股隂名曰赤施不急治六十日死在兩股之内不治十日而當死發於膝名曰疵癰其狀大癰色不變寒熱如堅石勿石石之者死須其柔乃石之者生諸癰疽之發於節而相應者不可治也發於陽者百日死發於隂者三十日死發於脛名曰兎齧其狀赤至骨急治之不治害人也發於内踝名曰走緩其狀癰也色不變數石其輸而止其寒熱不死發於足上下名曰四淫其狀大癰急治之百日死發於足傍名曰厲癰其狀不大初如小指發急治之去其黒者不消輒益不治百日死發於足指名脱癰其狀赤黒死不治不赤黒不死不衰急斬之不則死矣黄帝曰夫子言癰疽何以别之歧伯曰營衛稽留於經脈之中則血泣而不行不行則衛氣從之而不通壅遏而不得行故熱大熱不止熱勝則肉腐肉腐則為膿然不能陷骨髓不為焦枯五臓不為傷故命曰癰黄帝曰何謂疽歧伯曰熱氣淳盛下陷肌膚筋髓枯内連五臓血氣竭當其癰下筋骨良肉皆無餘故命曰疽疽者上之皮夭以堅上如牛領之皮癰者其皮上薄以澤此其候也草萓魚饑切血泣音澀􅌝􅌣古括樓字臑奴到切又音儒䔖􅀢力升切不則上府九切夭音么色不明也靈樞經卷十二}
