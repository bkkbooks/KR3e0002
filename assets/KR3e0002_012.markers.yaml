  - {type: variant, offset: 103, length: 0, content: '', SBCK: 欲食之不可多也必自裁也命曰五裁五發隂病發於骨陽病發於血以味發於氣陽病發於冬隂病發於夏五邪邪入於陽則為狂邪入於隂則為血痺邪入於陽轉則為癲疾邪入於隂轉則為瘖陽入之於隂病静隂出之於陽病喜怒五藏心藏神肺藏魄肝藏魂脾藏意腎藏精志也五主心主脉肺主皮肝主筋脾主肌腎主骨陽朙多血多氣太陽多血少氣少陽多氣少血太隂多血少氣厥隂多血少氣少隂多氣少血故曰刺陽朙出血氣刺太陽出血惡氣刺少陽出氣惡血刺太隂出血惡氣刺厥隂出血惡氣刺少隂出氣惡血也足陽朙太隂為表裏少陽厥隂為表裏太陽少隂為表裏是謂足之隂陽也手陽朙太隂為表裏少陽心主為表裏太陽少隂為表裏是謂手之隂陽也筩同音鍉鍼低音巾鍼布鍼一本作五走湊五五裁問素禁作五嵗露論第七十九黄帝問於岐伯曰經言夏日傷暑秋病瘧瘧之發以時其故何也歧伯對曰邪客於風府病循膂而下衛氣一日一夜常大㑹於風府其朙日日下一節故其日作晏此其先客於脊背也故每至於風府則腠理開腠理開則邪氣入邪氣入則病作此所以日作尚晏也衛氣之}
