  - {type: variant, offset: 1592, length: 0, content: '', krp: 宛陳藴又於阮切上音鬱又音氂又音毫莫高切在腧切春遇鑱切鉏銜鍉低音鈹皮音䖟喙穢切下許取三脉者恇王曲謂不足也切謹按恇脖胦朗切又於桑切上蒲没切下烏溜經當作謹按難流滎小水也音營絶本輸第二法地黄帝問於歧伯曰凡刺之道必通十二經絡之所終始絡脉之所别處五輸之所留六府之所與合四時之所出入五藏之所溜處闊數之度淺深之狀高下所至願聞其解歧伯曰請言其次也肺出於少商少商者手大指端内側也為井木溜于魚際魚際者手魚也爲滎注于大淵大淵魚後一寸䧟者中也爲腧行于經渠經渠寸口中也動而不居爲經入于尺澤尺澤肘中之動脉也爲合手太隂經也心出於中衝中衝手中指之端也爲井木溜於勞宫勞宫掌中中指本節之内間也爲滎注于大陵大陵掌後兩骨之間方下者也爲腧行於間使間使之道兩筋之間三寸之中也有過則至無過則止爲經入于曲澤曲澤肘内廉下䧟者之中也屈而得之爲合手少隂也肝出于大敦大敦者足大指之端及三毛之中也爲井木溜于行間行間足大指間也爲滎注于大衝大衝行間上二寸䧟者之中也爲腧行于中封中封内踝之前一寸半䧟者之中使逆則宛使和則通摇足而得之爲經入于曲泉曲泉輔骨之下大筋之上也屈膝而得之爲合足厥隂也脾出于隱白隱白者足大指之端内側也爲井木溜于大都大都本節之後下䧟者之中也爲滎注于太白太白腕骨之下也爲腧行于商丘商丘内踝之下䧟者之中也爲經入于隂之陵泉隂之陵泉輔骨之下䧟者之中也伸而得之為合足太隂也腎出于湧泉湧泉者足心也爲井木溜于然谷然谷然骨之下者也爲滎注于大谿大谿内踝之後跟骨之上䧟中者也爲腧行于復留復留上内踝二寸動而不休爲經入于隂谷隂谷輔骨之後大筋之下小筋之上也按之應手屈膝而得之爲合足少隂經也膀胱出於至隂至隂者足小指之端也爲井金溜于通谷通谷本節之前外側也爲滎注于朿骨朿骨本節之後䧟者中也爲腧過于京骨京骨足外側大骨之下爲原行于崑崙崑崙在外踝之後跟骨之上爲經入于委中委中膕中央爲合委而取之足太陽也膽出于竅隂竅隂者足小指次指之端也爲井金溜于俠谿俠谿足小指次指之間也爲滎注于臨泣臨泣上行一寸半䧟者中也爲腧過于丘墟丘墟外踝之前下䧟者中也爲原行于陽輔陽輔外踝之上輔骨之前及絶骨之端也為經入于陽之陵泉陽之陵泉在膝外䧟者中也為合伸而得之足少陽也胃出于厲兌厲兌者足大指内次指之端也為井金溜于内庭内庭次指外間也為滎注于䧟谷䧟谷者上中指内間上行二寸䧟者中也爲腧過于衝陽衝陽足跗上五寸䧟者中也爲原摇足而得之行于解谿解谿上衝陽一寸半䧟者中也爲經入于下陵下陵膝下三寸胻骨外三里也為合復下三里三寸爲巨虛上廉復下上廉三寸為巨虚下廉也大腸屬上小腸屬下足陽朙胃脉也大腸小腸皆屬于胃是足陽朙也三焦者上合手少陽出于關衝關衝者手小指次指之端也爲井金溜于液門液門小指次指之間也爲滎注于中渚中渚本節之後䧟者中也爲腧過于陽池陽池在腕上䧟者之中也爲原行于支溝支溝上腕三寸兩骨之間䧟者中也爲經入于天井天井在肘外大骨之上䧟者中也爲合屈肘乃得之三焦下腧在于足大指之前少陽之後出于膕中外廉名曰委陽是太陽絡也手少陽經也三焦者足少陽太隂作陽一本之所將太陽之别也上踝五寸别入貫腨腸出于委陽並太陽之正入絡膀胱約下焦實則閉癃虚則遺溺遺溺則補之閉癃則冩之手太陽小腸者上合於太陽出于少澤少澤小指之端也爲井金溜于前谷前谷在手外廉本節前䧟者中也爲滎注于後谿後谿者在手外側本節之後也為腧過于腕骨腕骨在手外側腕骨之前爲原行于陽谷陽谷在鋭骨之下䧟者中也爲經入于小海小海在肘内大骨之外去端半寸䧟者中也伸臂而得之為合手太陽經也太腸上合手陽朙出于商陽商陽大指次指之端也爲井金溜于本節之前二間爲滎注于本節之後三間爲腧過于合谷合谷在大指歧骨之間爲原行于陽谿陽谿在兩筋間䧟者中也爲經入于曲池在肘外輔骨䧟者中屈臂而得之爲合手陽朙也是謂五藏六府之腧五五二十五腧六六三十六腧也六府皆出足之三陽上合于手者也缺盆之中任脉也名曰天突一次任脉側之動脉足陽朙也名曰人迎二次脉手陽朙也名曰扶突三次脉手太陽也名曰天窻四次脉足少陽也名曰天容五次脉手少陽也名曰天牖六次脉足太陽也名曰天柱七次脉頸中央之脉督脉也名曰風府腋内動脉手太隂也名曰天府腋下三寸手心主也名曰天池刺上關者呿不能欠刺下關者欠不能呿刺犢鼻者屈不能伸刺兩關者伸不能屈足陽朙挾喉之動脉也其腧在膺中手陽朙次在其腧外不至曲頰一寸手太陽當曲頰足少陽在耳下曲頰之後手少陽出耳後上加完骨之上足太陽挾項大筋之中髪際隂尺動脉在五里五腧之禁也肺合大腸大腸者傳道之府心合小腸小腸者受盛之府肝合膽膽者中精之府脾合胃胃者五榖之府腎合膀胱膀胱者津液之府也少陽屬腎腎上連肺故將兩藏三焦者中瀆之府也水道出焉屬膀胱是孤之府也是六府之所與合者春取絡脉諸滎大經分肉之間甚者深取之間者淺取之夏取諸腧孫絡肌肉皮膚之上秋取諸合餘如春法冬取諸井諸腧之分欲深而留之此四時之序氣之所處病之所舎藏之所宜轉筋者立而取之可令遂已痿厥者張而刺之可令立快也闊數角切下色足跗夫下音呿切祛遮腨切時兖小鍼解第三法人所謂易陳者易言也難入者難著于人也麤守形者守刺法也上守神者守人之血氣有餘不足可補寫也神客者正邪共㑹也神者正氣也客者邪氣也在門者邪循正氣之所出入也未覩其疾者先知邪正何經之疾也惡知其原者先知何經之病所取之處也刺之微在數遲者徐疾之意也麤守關者守四肢而不知血氣正邪之徃來也上守機者知守氣也機之動不離其空中者知氣之虚實用鍼之徐疾也空中之機清浄以微者鍼以得氣密意守氣勿失也其來不可逢者氣盛不可補也其徃不可追者氣虛不可寫也不可掛以髮者言氣易失也扣之不發言者不知補寫之意也血氣已盡而氣不下也知其徃來者知氣之逆順盛虛也要與之期者知氣之可取之時也麤之闇者冥冥不知氣之微密也妙哉工獨有之者盡知鍼意也徃者爲逆者言氣之虛而小小者逆也來者爲順者言形氣之平平者順也朙知逆順正行無間者言知所取之處也迎而奪之者寫也追而濟之者補也所謂虛則實之者氣口虛而當補之也滿則泄之者氣口盛而當寫之也宛陳則除之者去血脉也邪勝則虛之者言諸經有盛者皆寫其邪也徐而疾則實者言徐内而疾出也疾而徐則虛者言疾内而徐出也言實與虛若有若無者言實者有氣虛者無氣也察後與先若亾若存者言氣之虛實補寫之先後也察其氣之已下與常存也爲虚與實若得若失者言補者佖然若有得也寫則怳然若有失也夫氣之在脉也邪氣在上者言邪氣之中人也高故邪氣在上也濁氣在中者言水榖皆入于胃其精氣上注於肺濁溜于腸胃言寒温不適飲食不節而病生于腸胃故命曰濁氣在中也清氣在下者言清濕地氣之中人也必從足始故曰清氣在下也鍼䧟脉則邪氣出者取之上鍼中脉則濁氣出者取之陽朙合也鍼大深則邪氣反沉者言淺浮之病不欲深刺也深則邪氣從之入故曰反沉也皮肉筋脉各有所處者言經絡各有所主也取五脉者死言病在中氣不足但用鍼盡大寫其諸隂之脉也取三陽之脉者唯言盡寫三陽之氣令病人恇然不復也奪隂者死言取尺之五里五徃者也奪陽者狂正言也覩其色察其目知其散復一其形聽其動静者言上工知相五色于目有知調尺寸小大緩急滑濇以言所病也知其邪正者知論虛邪與正邪之風也右主推之左持而御之者言持鍼而出入也氣至而去之者言補寫氣調而去之也調氣在于終始一者持心也節之交三百六十五㑹者絡脉之滲灌諸節者也所謂五藏之氣已絶于内者脉口氣内絶不至反取其外之病處與陽經之合有留鍼以致陽氣陽氣至則内重竭重竭則死矣其死也無氣以動故靜所謂五藏之氣已絶于外者脉口氣外絶不至反取其四末之輸有留鍼以致其隂氣隂氣至則陽氣反入入則逆逆則死矣其死也隂氣有餘故躁所以察其目者五藏使五色循朙循朙則聲章聲章者則言聲與平生異也佖然音必滿貌上皮筆切又怳然切狂貌上吁徃深内納下音邪氣藏府病形第四法時黄帝問於歧伯曰邪氣之中人也奈何歧伯荅曰邪氣之中人高也黄帝曰高下有度乎歧伯曰身半已上者邪中之也身半已下者濕中之也故曰邪之中人也無有常中于隂則溜于府中于陽則溜于經黄帝曰隂之與陽也異名同類上下相㑹經絡之相貫如環無端邪之中人或中于隂或中于陽上下左右無有恒常其故何也歧伯曰諸陽之㑹皆在于面中人也方乘虛時及新用力若飲食汗出腠理開而中于邪中于面則下陽朙中于項則下太陽中于頰則下少陽其中于膺背兩脇亦中其經黄帝曰其中于隂奈何歧伯荅曰中于隂者常從臂胻始夫臂與胻其隂皮薄其肉淖澤故俱受于風獨傷其隂黄帝曰此故傷其藏乎歧伯荅曰身之中于風也不必動藏故邪入于隂經則其藏氣實邪氣入而不能客故還之於府故中陽則溜于經中隂則溜于府黄帝曰邪之中人藏奈何歧伯曰愁憂恐懼則傷心形寒寒飲則傷肺以其兩寒相感中外皆傷故氣道而上行有所墮墜惡血留内若有所大怒氣上而不下積于脇下則傷肝有所擊仆若醉入房汗出當風則傷脾有所用力舉重若入房過度汗出浴水則傷腎黄帝曰五藏之中風奈何歧伯曰隂陽俱感邪乃得徃黄帝曰善哉黄帝問於歧伯曰首面與身形也屬骨連筋同血合於氣耳天寒則裂地凌冰其卒寒或手足懈惰然而其面不衣何也歧伯荅曰十二經脉三百六十五絡其血氣皆上于面而走空竅其精陽氣上走於目而為睛其别氣走於耳而為聽其宗氣上出於鼻而為臭其濁氣出於胃走脣舌而為味其氣之津液皆上燻于面而皮又厚其肉堅故天氣甚寒不能勝之也黄帝曰邪之中人其病形何如歧伯曰虛邪之中身也灑淅動形正邪之中人也微先見于色不知于身若有若無若亾若存有形無形莫知其情黄帝曰善哉黄帝問於歧伯曰余聞之見其色知其病命曰朙按其脉知其病命曰神問其病知其處命曰工余願聞見而知之按而得之問而極之爲之奈何歧伯荅曰夫色脉與尺之相應也如桴鼓影響之相應也不得相失也此亦本末根葉之出候也故根死則葉枯矣色脉形肉不得相失也故知一則爲工知二則爲神知三則神且朙矣黄帝曰願卒聞之歧伯荅曰色青者其脉絃也赤者其脉鉤也黄者其脉代也白者其脉毛黒者其脉石見其色而不得其脉反得其相勝之脉則死矣得其相生之脉則病已矣黄帝問於歧伯曰五藏之所生變化之病形何如歧伯荅曰先定其五色五脉之應其病乃可别也黄帝曰色脉已定别之奈何歧伯曰調其脉之緩急小大滑濇而病變定矣黄帝曰調之奈何歧伯荅曰脉急者尺之皮膚亦急脉緩者尺之皮膚亦緩脉小者尺之皮膚亦減而少氣脉大者尺之皮膚亦賁而起脉滑者尺之皮膚亦滑脉濇者尺之皮膚亦濇凡此變者有微有甚故善調尺者不待於寸善調脉者不待於色能參合而行之者可以為上工上工十全九行二者為中工中工十全七行一者為下工下工十全六黄帝曰請問脉之緩急小大滑濇之病形何如歧伯曰臣請言五藏之病變也心脉急甚者爲瘛瘲微急為心痛引背食不下緩甚為狂笑微緩為伏梁在心下上下行時唾血太甚爲喉吤微大爲心痺引背善淚出小甚爲善噦㣲小爲消癉滑甚爲善渴微滑爲心疝引臍小腹鳴濇甚爲瘖微濇爲血溢維厥耳鳴顛疾肺脉急甚爲癲疾微急爲肺寒熱怠惰欬唾血引腰背胷若鼻息肉不通緩甚爲多汗微緩爲痿瘻偏風頭以下汗出不可止太甚爲脛腫微大爲肺痺引胷背起惡日光小甚爲泄微小爲消癉滑甚爲息賁上氣㣲滑為上下出血濇甚為嘔血㣲濇為鼠瘻在頸支腋之間下不勝其上其應善痠矣肝脉急甚者為惡言微急為肥氣在脇下若覆杯緩甚為善嘔微緩為水瘕痺也太甚為内癰善嘔衂微大為肝痺隂縮欬引小腹小甚為多飲微小為消癉滑甚為㿉疝微滑為遺溺濇甚為溢飲微濇為瘈攣筋痺脾脉急甚為瘈瘲微急為膈中食飲入而還出後沃沫緩甚爲痿厥微緩爲風痿四肢不用心慧然若無病太甚為擊仆微大爲疝氣腹裏大膿血在腸胃之外小甚為寒熱微小爲消癉滑甚為㿉癃微滑為蟲毒蛕蝎腹熱濇甚為腸㿉微濇為内㿉多下膿血腎脉急甚爲骨癲疾微急為沉厥奔豚足不收不得前後緩甚為折脊微緩為洞洞者食不化下嗌還出太甚為隂痿微大為石水起臍已下至小腹腄腄然上至胃腕死不治小甚爲洞泄微小爲消癉滑甚爲癃㿉微滑爲骨痿坐不能起起則目無所見濇甚爲大癰微濇爲不月沉痔黄帝曰病之六變者刺之奈何歧伯荅曰諸急者多寒緩者多熱大者多氣少血小者血氣皆少滑者陽氣盛微有熱濇者多血少氣微有寒是故刺急者深内而久留之刺緩者淺内而疾發鍼以去其熱刺大者微寫其氣無出其血刺滑者疾發鍼而淺内之以寫其陽氣而去其熱刺濇者必中其脉隨其逆順而久留之必先按而循之已發鍼疾按其痏無令其血出以和其脉諸小者隂陽形氣俱不足勿取以鍼而調以甘藥也黄帝曰余聞五藏六府之氣滎輸所入爲合令何道從入入安連過願聞其故歧伯荅曰此陽脉之别入于内屬於府者也黄帝曰滎輸與合各有名乎歧伯荅曰滎輸治外經合治内府黄帝曰治内府奈何歧伯曰取之於合黄帝曰合各有名乎歧伯荅曰胃合於三里大腸合入于巨虚上廉小腸合入于巨虛下亷三焦合入於委陽膀胱合入于委中央膽合入于陽陵泉黄帝曰取之奈何歧伯荅曰取之三里者低跗取之巨虛者舉足取之委陽者屈伸而索之委中者屈而取之陽陵泉者正竪膝予之齊下至委陽之陽取之取諸外經者揄申而從之黄帝曰願聞六府之病歧伯荅曰面熱者足陽朙病魚絡血者手陽朙病兩跗之上脉竪䧟者足陽朙病此胃脉也大腸病者腸中切痛而鳴濯濯冬日重感于寒即泄當臍而痛不能久立與胃同候取巨虛上亷胃病者腹䐜脹胃脘當心而痛上肢兩脇膈咽不通食飲不下取之三里也小腸病者小腹痛腰脊控睪而痛時窘之後當耳前熱若寒甚若獨肩上熱甚及手小指次指之間熱若脉䧟者此其候也手太陽病也取之巨虛下廉三焦病者腹氣滿小腹尤堅不得小便窘急溢則水留即為脹候在足太陽之外大絡大絡在太陽少陽之間亦見于脉取委陽膀胱病者小腹偏腫而痛以手按之即欲小便而不得肩上熱若脉䧟及足小指外廉及脛踝後皆熱若脉䧟取委中央膽病者善太息口苦嘔宿汁心下澹澹恐人将捕之嗌中吤吤然數唾在足少陽之本末亦視其脉之䧟下者灸之其寒熱者取陽陵泉黄帝曰刺之有道乎歧伯荅曰刺此者必中氣穴無中肉節中氣穴則鍼染遊一作于巷中肉節即皮膚痛補寫反則病益篤中筋則筋緩邪氣不出與其眞相搏亂而不去反還内著用鍼不審以順為逆也中于膺背肩背一作亦中其經下其經一本作胻切戸當淖澤濁下音液謹詳淖濁也澤液也上奴教切下皆同甲乙經上音入而不客作容一本瘛瘲下縱上治吤戒音噦切乙劣息賁音下奔痠酸音瘕賈音㿉切徒回仆付音蛕蝎腹中長蟲上胡恢切蠧蟲也下胡葛切腄切竹垂痏切榮美揄切舂朱睪隂丸音高也維厥隂維故有維厥􅊨詳此經絡有陽維黄帝素問靈樞經卷之一終}
