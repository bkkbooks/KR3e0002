足跗下音夫呿祛遮切腨時兖切小針解第三法人所謂易陳者易言也難入者難著於人也粗守形者守刺法也上守神者守人之血氣有餘不足可補寫也神客者正邪共㑹也神者正氣也客者邪氣也在門者邪循正氣之所出入也未覩其疾者先知邪正何經之疾也惡知其原者先知何經之病所取之處也刺之微者數遲者徐疾之意也粗守闗者守四肢而不知血氣正邪之徃來也上守機者知守氣也機之動不離其空中者知氣之虚實用針之徐疾也空中之機清浄以微者針以得氣蜜意守氣勿失也其來不可逢者氣盛不可補也其往不可追者氣虚不可寫也不可掛以髮者言氣易失也扣之不發者言不知補寫之意也血氣已盡而氣不下也知其徃來者知氣之逆順盛虛也要與之期者知氣之可取之時也粗之闇者冥冥不知氣之微宻也妙哉工獨有之者盡知針意也徃者為逆者言氣之虛而小小者逆也來者為順者言形氣之平平者順也明知逆順正行無問者言知所取之處也迎而奪之者寫也追而濟之者補也所謂虚則實之者氣口虚而當補之也滿則泄之者氣口盛而當寫之也宛陳則除之者去血脈也邪勝則虚之者言諸經有盛者皆寫其邪也徐而疾則實者言徐内而疾出也疾而徐則虚者言疾内而徐出也言實與虛若有若無者言實者有氣虛者無氣也察後與先若亡若存者言氣之虚實補寫之先後也察其氣之已下與常存也為虚與實若得若失者言補者佖然若有得也寫則怳然若有失也夫氣之在脈也邪氣在上者言邪氣之中人也髙故邪氣在上也濁氣在中者言水榖皆入於胃其精氣上注於肺濁溜於腸胃言寒温不適飲食不節而病生於腸胃故命曰濁氣在中也清氣在下者言清濕地氣之中人也必從足始故曰清氣在下也針陷脈則邪氣出者取之上針中脈則邪氣出者取之陽明合也針大深則邪氣反沈者言淺浮之病不欲深刺也深則邪氣從之入故曰反沈也皮肉筋脈各有所處者言經絡各有所主也取五脈者死言病在中氣不足但用針盡大寫其諸隂之脈也取三陽之脈者唯言盡寫三陽之氣令病人恇然不復也奪隂者死言取尺之五里五徃者也奪陽者狂正言也覩其色察其目知其散復一其形聽其動静者言上工知相五色於目有知調尺寸小大緩急滑濇以言所病也知其邪正者知論虚邪與正邪之風也右主推之左持而御之者言持針而出入也氣至而去之者言補寫氣調而去之也調氣在於終始一者持心也節之交三百六十五㑹者絡脈之滲灌諸節者也所謂五蔵之氣已絶於内者脈口氣内絶不至反取其外之病處與陽經之合有留針以致陽氣陽氣至則内重竭重竭則死矣其死也無氣以動故靜所謂五蔵之氣已絶于外者脈口氣外絶不至反取其四末之輸有留針以致其隂氣隂氣至則陽氣反入入則逆逆則死矣其死也隂氣有餘故躁所以察其目者五藏使五色循明循明則聲章聲章者則言聲與平生異也佖然上皮筆切又音必滿貌怳然上吁往切狂貌深内下音納邪氣藏府病形第四法時黄帝問於岐伯曰邪氣之中人也奈何岐伯答曰邪氣之中人髙也黄帝曰髙下有度乎岐伯曰身半已上者邪中之也身半以下者濕中之也故曰邪之中人也無有常中於隂則溜於府中於陽則溜於經黄帝曰隂之與陽也異名同類上下相㑹經絡之相貫如環無端邪之中人或中於隂或中於陽上下左右無有恒常其故何也岐伯曰諸陽之㑹皆在於面中人也方乘虚時及新用力若飲食汗出腠理開而中於邪中於面則下陽明中於項則下太陽中於頰則下少陽其中於膺背兩脇亦中其經黄帝曰其中於隂奈何岐伯答曰中於隂者常從臂胻始夫臂與胻其隂皮薄其肉淖澤故俱受於風獨傷其隂黄帝曰此故傷其藏乎岐伯答曰身之中於風也不必動藏故邪入於隂經則其藏氣實邪氣入而不能客故還之於府故中陽故溜於經中隂則溜於府黄帝曰邪之中人藏奈何岐伯曰愁憂恐懼則傷心形寒寒飲則傷肺以其兩寒相感中外皆傷故氣道而上行有所墮墜惡血留内若有所大怒氣上而不下積於脇下則傷肝有所擊仆若醉入房汗出當風則傷脾有所用力舉重若入房過度汗出浴水則傷腎黄帝曰五藏之中風奈何岐伯曰隂陽俱感邪乃得徃黄帝曰善哉黄帝問於岐伯曰首面與身形也屬骨連筋同血合於氣耳天寒則裂地凌氷其卒寒或手足懈惰然而其面不衣何也歧伯答曰十二經脈三百六十五絡其血氣皆上于面而走空竅其精陽氣上走於目而為睛其别氣走於耳而為聽其宗氣上出於鼻而為臭其濁氣出於胃走唇舌而為味其氣之津液皆上煄于面而皮又厚其肉堅故天熱甚寒不能勝之也黄帝曰邪之中人其病形何如歧伯曰虚邪之中身也洒浙動形正邪之中人也微先見于色不知于身若有若無若亡若存有形無形莫知其情黄帝曰善哉黄帝問於歧伯曰余聞之見其色知其病命曰明按其脈知其病命曰神問其病知其處命曰工余願聞見而知之按而得之問而極之為之奈何歧伯答曰夫色脈與尺之相應也如桴鼓影響之相應也不得相失也此亦本末根葉之出候也故根死則葉枯矣色脈形肉不得相失也故知一則為工知二則為神知三則神且明矣黄帝曰願卒聞之岐伯答曰色青者其脈絃也赤者其脈鉤也黄者其脈代也白者其脈毛黒者其脈石見其色而不得其脈反得其相勝之脈則死矣得其相生之脈則病已矣黄帝問於歧伯曰五藏之所生變化之病形何如歧伯答曰先定其五色五脈之應其病乃可别也黄帝曰色脈已定别之奈何歧伯曰調其脈之緩急小大滑濇而病變定矣黄帝曰調之奈何歧伯答曰脈急者尺之皮膚亦急脈緩者尺之皮膚亦緩脈小者尺之皮膚亦減而少氣脈大者尺之皮膚亦賁而起脈滑者尺之皮膚亦滑脈濇者尺之皮膚亦濇凡此變者有微有甚故善調尺者不待於寸善調脈者不待於色能參合而行之者可以為上工上工十全九行二者為中工中工十全七行一者為下工下工十全六黄帝曰請問脈之緩急小大滑濇之病形何如歧伯曰臣請言五藏之病變也心脈急甚者為瘈瘲微急為心痛引背食不下緩甚為狂笑微緩為伏梁在心下上下行時唾血大甚為喉吤微大為心痺引背善淚出小甚為善噦㣲小為消癉滑甚為善渴微滑為心疝引臍小腹鳴濇甚為瘖微濇為血溢維厥耳鳴顛疾肺脈急甚為癲疾微急為肺寒熱怠惰欬唾血引腰背胸若鼻息肉不通緩甚為多汗微緩為痿瘻偏風頭以下汗出不可止大甚為脛腫微大為肺痺引胸背起惡日光小甚為泄微小為消癉滑甚為息賁上氣㣲滑為上下出血濇甚為嘔血㣲濇為鼠瘻在頸支腋之間下不勝其上其應善痠矣肝脈急甚者為惡言微急為肥氣在脇下若覆杯緩甚為善嘔微緩為水瘕痺也大甚為内癕善嘔衂微大為肝痺隂縮欬引小腹小甚為多飲微小為消癉滑甚為㿉疝微滑為遺溺濇甚為溢飲微濇為瘈攣筋痺脾脈急甚為瘈瘲微急為膈中食飲入而還出後沃沫緩甚為痿厥微緩為風痿四肢不用心慧然若無病大甚為擊仆微大為疝氣腹裏大膿血在腸胃之外小甚為寒熱微小為消癉滑甚為㿉癃微滑為蟲毒蛕蝎腹熱濇甚為腸㿉微濇為内㿉多下膿血腎脈急甚為骨癲疾微急為沈厥奔豚足不收不得前後緩甚為折脊微緩為洞洞者食不化下嗌還出大甚為隂痿微大為石水起臍已下至小腹腄腄然上至胃腕死不治小甚為洞泄微小為消癉滑甚為癃㿉微滑為骨痿坐不能起起則自無所見濇甚為大癰微濇為不月沈痔黄帝曰病之六變者刺之奈何岐伯答曰諸急者多寒緩者多熱大者多氣少血小者血氣皆少滑者陽氣盛微有熱濇者多血少氣微有寒是故刺急者深内而久留之刺緩者淺内而疾發針以去其熱刺大者微寫其氣無出其血刺滑者疾發針而淺内之以寫其陽氣而去其熱刺濇者必中其脈隨其逆順而久留之必先按而循之已發針疾按其痏無令其血出以和其脈諸小者隂陽形氣俱不足勿取以針而調以甘藥也黄帝曰余聞五藏六府之氣滎輸所入為合令何道從入入安連過願聞其故岐伯答曰此陽脈之别入于内屬於府者也黄帝曰滎輸與合各有名乎岐伯答曰滎輸治外經合治内府黄帝曰治内府奈何岐伯曰取之於合黄帝曰合各有名乎岐伯答曰胃合於三里大腸合入于巨虚上亷小腸合入于巨虛下亷三焦合入於委陽膀胱合入于委中央膽合入于陽陵泉黄帝曰取之奈何歧伯答曰取之三里者低跗取之巨虛者舉足取之委陽者屈伸而索之委中者屈而取之陽陵泉者正竪予之齊下至委陽之陽取之取諸外經者揄申而從之黄帝曰願聞六府之病歧伯答曰面熱者足陽明病魚絡血者手陽明病兩跗之上脈竪陷者足陽明病此胃脈也大腸病者腸中切痛而鳴濯濯冬日重感于寒即泄當臍而痛不能乆立與胃同候取巨虚上亷胃病者腹䐜脹胃脘當心而痛上肢兩脇膈咽不通食飲不下取之三里也小腸病者小腹痛腰脊控睪而痛時窘之後當耳前熱若寒甚若獨肩上熱甚及手小指次指之間熱若脈陷者此其候也手太陽病也取之巨虚下亷三焦病者腹氣滿小腹尤堅不得小便窘急溢則水留即為脹候在足太陽之外大絡大絡在太陽少陽之間亦見于脈取委陽膀胱病者小腹偏腫而痛以手按之即欲小便而不得肩上熱若脈陷及足小指外亷及脛踝後皆熱若脈陷取委中央膽病者善太息口苦嘔宿汁心下澹澹恐人将捕之嗌中吤吤然數唾在足少陽之本末亦視其脈之陷下者炙之其寒熱者取陽陵泉黄帝曰刺之有道乎歧伯答曰刺此者必中氣穴無中肉節中氣穴則針染一作逰于巷中肉節即皮膚痛補寫反則病益篤中筋則筋緩邪氣不出與其真相搏亂而不去反還内著用針不審以順為逆也中于膺背一作肩背亦中其經一本作下其經胻戸當切淖澤上奴教切下皆同甲乙經上音濁下音夜謹詳淖濁也澤夜也入而不客一本作容瘈瘲上給下縱吤音戒噦乙劣切息賁下音奔痠音酸瘕音賈㿉徒回切仆音付蛕蝎上胡恢切腹中長蟲下胡葛切蠧蟲也腄竹垂切痏榮美切榆舂朱切睪音髙隂丸也維厥詳此經絡有陽維隂維故有維厥靈樞經巻一欽定四庫全書靈樞經卷}
