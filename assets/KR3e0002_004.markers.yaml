  - {type: variant, offset: 132, length: 0, content: '', SBCK: 二十五度分為晝夜故氣至陽而起至隂而止故曰日中而陽隴為重陽夜半而隂隴為重隂故太隂主内太陽主外各行二十五度分為晝夜夜半為隂隴夜半後而為隂衰平旦隂盡而陽受氣矣日中而陽隴日西而陽衰日入陽盡而隂受氣矣夜半而大㑹萬民皆臥命曰合隂平旦隂盡而陽受氣如是無已與天地同紀黃帝曰老人之不夜瞑者何氣使然少壯之人不晝瞑者何氣使然歧伯答曰壯者之氣血盛其肌肉滑氣道通營衛之行不失其常故晝精而夜瞑老者之氣血衰其肌肉枯氣道澀五藏之氣相摶其營氣衰少而衛氣内伐故晝不精夜不瞑黃帝曰願聞營衛之所行皆何道從來歧伯答曰營出于中焦衛出于下焦黃帝曰願聞三焦之所出歧伯答曰}
