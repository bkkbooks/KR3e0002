  - {type: variant, offset: 1, length: 0, content: '', WYG: 上結于膝其下循足外側結于踵上循跟結於膕其别者結于踹外上膕中内㢘與膕中并上結于臀上挾脊上項其支者别入結於舌本其直者結於枕骨上頭下顔結於鼻其支者為目上網下結於頄其支者從腋後外㢘結於肩髃其支者入腋下上出缺盆上結於完骨其支者出缺盆邪上出於頄其病小指支跟腫痛膕攣脊反折項筋急肩不舉腋支缺盆中紐痛不可左右摇治在燔針刼刺以知為數以痛為輸名曰仲春痺足少陽之筋起于小指次指上結外踝上循脛外㢘結於膝外廉其支者别起外輔骨上走髀前者結於伏兎之上後者結於尻其直者上乗䏚季脇上走腋前㢘繫於膺乳結於缺盆直者上出腋貫缺盆出太陽之前循耳後上額角交巔上下走頷上結於頄支者結於目眥為外維其病小指次指支轉筋引膝外轉筋膝不可屈伸膕筋急前引髀後引尻即上乗䏚季脇痛上引缺盆膺乳頸維筋急從左之右右目不開上過右角並蹻脉而行左絡於右故傷左角右足不用命曰維筋相交治在燔針刼刺以知為數以痛為輸名曰孟春痺也足陽明之筋起於中三指結於跗上邪外上加於輔骨上結於膝外㢘直上結於髀樞上循脇屬􅆃其直者上循骭結於闕其支者結於外輔骨合少陽其直者上循伏兎上結於髀聚於隂器上腹而布至缺盆而結上頸上挾口合於頄下結於鼻上合於太陽太陽為目上網陽明為目下網其支者從頰結於耳前其病足中指支脛轉筋脚跳堅伏兎轉筋髀前腫㿉疝腹筋急引缺盆及頰卒口僻急者目不合熱則筋縱自不開頰筋有寒則急引頰移口有熱則筋㢮縱緩不勝收故僻治之以馬膏膏其急者以白酒和桂以塗其緩者以桑鉤鉤之即以生桑灰置之坎中髙下以坐等以膏熨急頰且飲美酒噉美炙肉不飲酒者自强也為之三拊而已治在燔針刼刺以知為數以痛為輸名曰季春痺也足太隂之筋起於大指之端内側上結於内踝其直者絡於膝内輔骨上循隂股結於髀聚於隂器上腹結於臍循腹裏結於肋散於胷中其内者著於脊其病足大指支内踝痛轉筋痛膝内輔骨痛隂股引髀而痛隂器紐痛下引臍兩脇痛引膺中脊内痛治在燔針刼刺以知為數以痛為輸命曰孟秋痺也足少隂之筋起於小指之下並足太隂之筋邪走内踝之下結於踵與太陽之筋合而上結於内輔之下並太隂之筋而上循隂股結於隂器循􅆃内挾膂上至項結於枕骨與足太陽之筋合其病足下轉筋及所過而結者皆痛及轉筋病在此者主癎瘛及痙在外者不能俛在内者不能仰故陽病者腰反折不能俛隂病者不能仰治在燔針刼刺以知為數以痛為輸在内者熨引飲藥此筋折紐紐發數甚者死不治名曰仲秋痺也足厥隂之筋起於大指之上上結於内踝之前上循脛上結内輔之下上循隂股結於隂器絡諸筋其病足大指支内踝之前痛内輔痛隂股痛轉筋隂器不用傷於内則不起傷於寒則隂縮入傷於熱則縱挺不收治在行水清隂}
