  - {type: variant, offset: 7, length: 0, content: '', WYG: 十八黄帝問於歧伯曰人焉受氣隂陽焉㑹何氣為營何氣為衛營安從生衛於焉㑹老壯不同氣隂陽異位願聞其㑹歧伯答曰人受氣於糓糓入於胃以𫝊與肺五藏六府皆以受氣其清者為營濁者為衛營在脉中衛在脉外營周不休五十而復大㑹隂陽相貫如環無端衛氣行於隂二十五度行於陽二十五度分為晝夜故氣至陽而起至隂而止故曰日中而陽隴為重陽夜半而隂隴為重隂故太隂主内太陽主外各行二十五度分為晝夜夜半為隂隴夜半後而為隂衰平旦隂盡而陽受氣矣日中而陽隴日西而陽衰日入陽盡而隂受氣矣夜半而大㑹萬民皆臥命曰合隂平旦隂盡而陽受氣如是無已與天地同紀黃帝曰老人之不夜瞑者何氣使然少壯之人不晝瞑者何氣使然歧伯答曰壯者之氣血盛其肌肉滑氣道通營衛之行不失其常故晝精而夜瞑老者之氣血衰其肌肉枯氣道澁五藏之氣相摶其營氣衰少而衛氣内伐故晝不精夜不瞑黃帝曰願聞營衛之所行皆何道從來歧伯答曰營出於中焦衛出於下焦黃帝曰願聞三焦之所出歧伯答曰上焦出於胃上口並咽以上貫膈而布胷中走腋循太隂之分而行還至陽明上至舌下足陽明常與營俱行於陽二十五度行於隂亦二十五度一周也故五十度而復大㑹於手太隂矣黃帝曰人有熱飲食下胃其氣未定汗則出或出於面或出於背或出於身半其不循衛氣之道而出何也歧伯曰此外傷於風内開腠理毛蒸理泄衛氣走之固不得循其道此氣慓悍滑疾見開而出故不得從其道故命曰漏泄黃帝曰願聞中焦之所出歧伯答曰中焦亦並胃中出上焦之後此所受氣者泌糟粕蒸精液化其精㣲上注於肺脉乃化而為血以奉生身莫貴於此故獨得行於經隧命曰營氣黃帝曰夫血之與氣異名同類何謂也歧伯答曰營衛者精氣也血者神氣也故血之與氣異名同類焉故奪血者無汗奪汗者無血故人生有兩死而無兩生黃帝曰願聞下焦之所出歧伯答曰下焦者别迴腸注於膀胱而渗入焉故水糓者常并居於胃中成糟粕而俱下於大腸而成下焦渗而俱下濟泌别注循下焦而渗入膀胱焉黃帝曰人飲酒酒亦入胃糓未熟而小便獨先下何也歧伯答曰酒者熟糓之液也其氣悍以清故後糓而入先糓而液出焉黃帝曰善余聞上焦如霧中焦如漚下焦如瀆此之謂也}
