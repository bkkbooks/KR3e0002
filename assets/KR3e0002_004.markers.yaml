  - {type: variant, offset: 494, length: 646, content: 百六十五絡其血氣皆上于面而走空竅其精陽氣上走於目而為睛其別氣走於耳而為聽其宗氣上出於鼻而為臭其濁氣出於胃走脣舌而為味其氣之津液皆上燻于面而皮又厚其肉堅故天氣甚寒不能勝之也黃帝曰邪之中人其病形何如歧伯曰虛邪之中身也灑淅動形正邪之中人也微先見于色不知于身若有若無若亡若存有形無形莫知其情黃帝曰善哉黃帝問於歧伯曰余聞之見其色知其病命曰明按其脈知其病命曰神問其病知其處命曰工余願聞見而知之按而得之問而極之為之奈何歧伯荅曰夫色脈與尺之相應也如桴鼓影響之相應也不得相失也此亦本末根葉之出候也故根死則葉枯矣色脈形肉不得相失也故知一則為工知二則為神知三則神且明矣黃帝曰願卒聞之歧伯荅曰色青者其脈絃也赤者其脈鉤也黃者其脈代也白者其脈毛黑者其脈石見其色而不得其脈反得其相勝之脈則死矣得其相生之脈則病已矣黃帝問於歧伯曰五藏之所生變化之病形何如歧伯荅曰先定其五色五脈之應其病乃可別也黃帝曰色脈已定別之奈何歧伯曰調其脈之緩急小大滑濇而病變定矣黃帝曰調之奈何歧伯荅曰脈急者尺之皮膚亦急脈緩者尺之皮膚亦緩脈小者尺之皮膚亦減而少氣脈大者尺之皮膚亦賁而起脈滑者尺之皮膚亦滑脈濇者尺之皮膚亦濇凡此變者有微有甚故善調尺者不待於寸善調脈者不待於色能參合而行之者可以為上工上工十全九行二者為中工中工十全七行一者為下工下工十全六黃帝曰請問脈之緩急小大滑濇之病形何如歧伯曰臣請言五藏之病變也心脈急甚者為瘛瘲微急為心痛引背食不下緩甚為狂笑微緩為伏梁在心下上下行時唾血太甚為喉吤微大為心痺引背善淚出小甚為善噦微小為消癉滑甚為善渴微滑為心疝引臍, WYG: 里}
