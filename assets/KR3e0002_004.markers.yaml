  - {type: variant, offset: 2, length: 0, content: '', WYG: 其病轉筋者治在燔針刼刺以知為數以痛為輸命曰季秋痺也手太陽之筋起於小指之上結於腕上循臂内㢘結於肘内銳骨之後彈之應小指之上入結於腋下其支者後走腋後㢘上繞肩脾循頸出走太陽之前結於耳後完骨其支者入耳中直者出耳上下結於頷上屬目外􅗃其病小指支肘内銳骨後㢘痛循臂隂入腋下腋下痛腋後㢘痛繞肩脾引頸而痛應耳中鳴痛引頷目瞑良乆乃得視頸筋急則為筋瘻頸腫寒熱在頸者治在燔針刼刺之以知為數以痛為輸其為腫者復而銳之本支者上曲牙循耳前屬目外􅗃上頷結於角其痛當所過者支轉筋治在燔針刼刺以知為數以痛為輸名曰仲夏痺也手少陽之筋起於小指次指之端結於腕上循臂結於肘上繞臑外亷上肩走頸合手太陽其支者當曲頬入繫舌本其支者上曲牙循耳前属目外眥上乘頷結於角其病當所過者即支轉筋舌卷治在燔針刼刺以知為數以痛為輸名曰季夏痺也手陽眀之筋起於大指次指之端結於腕上循臂上結於肘外上臑結於髃其支者繞肩胛挟􅆃直者從肩髃上頸其支者上頬結於頄直者上出手太陽之前上左角絡頭下右頷其病當所過者支痛及轉筋肩不舉頸不可左右視治在燔針刼刺以知為數以痛為輸名曰孟夏痺也手太隂之筋起於大指之上循指上行結於魚後行寸口外側上循臂結肘中上臑内亷入腋下出缺盆結肩前髃上結缺盆下結胷裏散貫賁合賁下抵季脇其病當所過者支轉筋痛甚成息賁脇急吐血治在燔針刼刺以知為數以痛為輸名曰仲冬痺也手心主之筋起於中指與太隂之筋並行結於肘内亷上臂隂結腋下下散前後挟脇其支者入腋散胷中結於臂其病當所過者支轉筋前及胷痛息賁治在燔針刼刺以知為數以痛為輸名曰孟冬痺也手少隂之筋起於小指之内側結於鋭骨上結肘内亷上入腋交太隂挟乳裏結於胷中循臂下繫於臍其病内急心承伏梁下為肘網其病當所過者支轉筋筋痛治在燔針刼刺以知為數以痛為輸其成伏梁吐血膿者死不治經筋之病寒則反折筋急熱則筋㢮縦不收隂痿不用陽急則反折隂急則俛不伸焠刺者刺寒急也熱則筋縱不收無用燔針名曰季冬痺也足之陽眀手之太陽筋急則口目為噼眥急不能卒視治皆如右方也頄音求骨度第十四黄帝問于伯髙曰脉度言經脉之長短何以立之伯髙曰先度其骨節之大小廣狭長短而脉度定矣黄帝曰願問衆人之度人長七尺五寸者其骨節之大小長短各㡬何伯髙曰頭之大骨圍二尺六寸胷圍四尺五寸腰圍四尺三寸髪所覆者顱至項尺二寸髪以下至頥長一尺君子終折結喉以下至缺盆中長四寸缺盆以下至􅐳􅚯長九寸過則肺大不滿則肺小􅐳􅚯以下至天樞長八寸過則胃大不及則胃小天樞以下至横骨長六寸半過則迴腸廣長不滿則狭短横骨長六寸半横骨上亷以下至内輔之上亷長一尺八寸内輔之上亷以下至下亷長三寸半内輔下亷下至内踝長一尺三寸内踝以下至地長三寸膝膕以下至跗属長一尺六寸跗属以下至地長三寸故骨圍大則太過小則不及角以下至柱骨長一尺行腋中不見者長四寸腋以下至季脇長一尺二寸季脇以下至髀樞長六寸髀樞以下至膝中長一尺九寸膝以下至外踝長一尺六寸外踝以下至京骨長三寸京骨以下至地長一寸耳後當完骨者廣九寸耳前當耳門者廣一尺三寸兩顴之間相去七寸兩乳之間廣九寸半兩髀之間廣六寸半足長一尺二寸廣四寸半肩至肘長一尺七寸肘至腕長一尺二寸半腕至中指本節長四寸本節至其末長四寸半項髪以下至背骨長二寸半膂骨以下至尾骶二十一節長三尺上節長一寸四分分之一竒分在下故上七節至於膂骨九寸八分分之七此衆人骨之度也所以立經脉之長短也是故視其經脉之在於身也其見浮而堅其見眀而大者多血細而沈者多氣也􅐳􅚯上許蝎切又許伐切下云居切髀歩米切股也五十營第十五黄帝曰余願聞五十營奈何岐伯答曰天周二十八宿宿三十六分人氣行一周千八分日行二十八宿人經脉上下左右前後二十八脉周身十六丈二尺以應二十八宿漏水下百刻以分晝夜故人一呼脉再動氣行三寸一吸脉亦再動氣行三寸呼吸定息氣行六寸十息氣行六尺日行二分二百七十息氣行十六丈二尺氣行交通於中一周於身下水二刻日行二十五分五百四十息氣行再周於身下水四刻日行四十分二千七百息氣行十周於身下水二十刻日行五宿二十分一萬三千五百息行氣五十營於身水下百刻日行二十八宿漏水皆盡脉終矣所謂交通者并行一數也故五十營備得盡天地之夀矣凡行八百一十丈也營氣第十六黄帝曰營氣之道内榖為寳榖入於胃乃𫝊之肺流溢於中布散於外精専者行於經隧常營無已終而復始是謂天地之紀故氣從太隂出注手陽眀上行注足陽眀下行至跗上注大指間與太隂合上行抵髀從脾注心中循手少隂出腋下臂注小指合手太陽上行乗腋出蝢内注目内眥上巔下項合足太陽循􅆃下尻下行注小指之端循足心注足少隂上行注腎從腎注心外散於胷中循心主脉出腋下臂出兩筋之間入掌中出中指之端還注小指次指之端合手少陽上行注膻中散於三焦従三焦注胆出脇注足少陽下行至跗上復從跗注大指間合足厥隂上行至肝從肝上注肺上循喉嚨入頏顙之竅究於畜門其支别者上額循巔下項中循􅆃入骶是督脉也絡隂器上過毛中入臍中上循腹裏入缺盆下注肺中復出太隂此營氣之所行也逆順之常也入骶音氐脉度第十七黄帝曰願聞脉度岐伯答曰手之六陽從手至頭長五尺五六三丈手之六隂從手至胷中三尺五寸三六一丈八尺五六三尺合二丈一尺足之六陽從足上至頭八尺六八四丈八尺足之六隂從足至胷中六尺五寸六六三丈六尺五六三尺合三丈九尺蹻脉從足至目七尺五寸二七一丈四尺二五一尺合一丈五尺督脉任脉各四尺五寸二四八尺二五一尺合九尺凡都合一十六丈二尺此氣之大經隧也經脉為裏支而横者為絡絡之别者為孫盛而血者疾誅之盛者寫之虚者飲藥以補之五臟常内閱於上七竅也故肺氣通於鼻肺和則鼻能知臭香矣心氣通於舌心和則舌能知五味矣肝氣通於目肝和則目能辨五色矣脾氣通於口脾和則口能知五糓矣腎氣通於耳腎和則耳能聞五音矣五藏不和則七竅不通六府不和則留為癰故邪在府則陽脉不和陽脉不和則氣留之氣留之則陽氣盛矣陽氣大盛則隂不利隂脉不利則血留之血留之則隂氣盛矣隂氣大盛則陽氣不能榮也故曰關陽氣大盛則隂氣不能榮也故曰格隂陽俱盛不得相榮故曰關格關格者不得盡期而死也黄帝曰蹻脉安起安止何氣榮水歧伯答曰蹻脉者少隂之别起於然骨之後上内踝之上直上循隂股入隂上循胷裏入缺盆上出人迎之前入頄屬目内眥合於太陽陽蹻而上行氣并相還則為濡目氣不榮則目不合黄帝曰氣獨行五藏不榮六府何也岐伯答曰氣之不得無行也如水之流如日月之行不休故隂脉榮其藏陽脉榮其府如環之無端莫知其紀終而復始其流溢之氣内漑}
