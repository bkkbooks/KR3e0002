  - {type: variant, offset: 20, length: 1, content: 歧, krp: 膕其别者結于踹外上膕中内㢘與膕中并上結于臀上挾脊上項其支者别入結於舌本其直者結于枕骨上頭下顔結于鼻其支者為目上網下結于頄其支者從腋後外㢘結于肩髃其支者入腋下上出缺盆上結于完骨其支者出缺盆邪上出于頄其病小指支跟腫痛膕攣脊反折項筋急肩不舉腋支缺盆中紐痛不可左右摇治在燔鍼劫刺以知爲數以痛爲輸名曰仲春痺足少陽之筋起于小指次指上結外踝上循脛外㢘結于膝外廉其支者别起外輔骨上走髀前者結于伏兎之上後者結于尻其直者上乗䏚季脇上走腋前㢘繫于膺乳結于缺盆直者上出腋貫缺盆出太陽之前循耳後上額角交巔上下走頷上結于頄支者結于目眥為外維其病小指次指支轉筋引膝外轉筋膝不可屈伸膕筋急前引髀後引尻即上乗䏚季脇痛上引缺盆膺乳頸維筋急從左之右右目不開上過右角並蹻脉而行左絡于右故傷左角右足不用命曰維筋相交治在燔鍼刼刺以知為數以痛為輸名曰孟春痺也足陽明之筋起于中三指結于跗上邪外上加于輔骨上結于膝外㢘直上結于髀樞上循脇屬脊其直者上循骭結于其支者結于外輔骨合少陽其直者上循伏兎上結于髀聚于隂器上腹而布至缺盆而結上頸上挾口合于頄下結于鼻上合于太陽太陽為目上網陽明為目下網其支者從頰結于耳前其病足中指支脛轉筋脚跳堅伏兎轉筋髀前腫㿉疝腹筋急引缺盆及頰卒口僻急者目不合熱則筋縱自不開頰筋有寒則急引頰移口有熱則筋㢮縱緩不勝收故僻治之以馬膏膏其急者以白酒和桂以塗其緩者以桑鉤鉤之即以生桑灰置之坎中髙下以坐等以膏熨急頰且飲美酒噉美炙肉不飲酒者自强也為之三拊而已治在燔鍼刼刺以知為數以痛為輸名曰季春痺也足太隂之筋起于大指之端内側上結于内踝其直者絡于膝内輔骨上循隂股結于髀聚于隂器上腹結于臍循腹裏結于肋散于胷中其内者著于脊其病足大指支内踝痛轉筋痛膝内輔骨痛隂股引髀而痛隂器紐痛下引臍兩脇痛引膺中脊内痛治在燔鍼刼刺以知為數以痛為輸命曰孟秋痺也足少隂之筋起于小指之下並足太隂之筋邪走内踝之下結于踵與太陽之筋合而上結于内輔之下並太隂之筋而上循隂股結于隂器循脊内挾膂上至項結于枕骨與足太陽之筋合其病足下轉筋及所過而結者皆痛及轉筋病在此者主癎瘛及痙在外者不能俛在内者不能仰故陽病者腰反折不能俛隂病者不能仰治在燔鍼刼刺以知為數以痛為輸在内者熨引飲藥此筋折紐紐發數甚者死不治名曰仲秋痺也足厥隂之筋起于大指之上上結于内踝之前上循脛上結内輔之下上循隂股結于隂器絡諸筋其病足大指支内踝之前痛内輔痛隂股痛轉筋隂器不用傷於内則不起傷於寒則隂縮入傷於熱則縱挺不收治在行水清隂氣其病轉筋者治在燔鍼刼刺以知為數以痛為輸命曰季秋痺也手太陽之筋起于小指之上結于腕上循臂内㢘結于肘内銳骨之後彈之應小指之上入結于腋下其支者後走腋後㢘上繞肩胛循脛出走太陽之前結于耳後完骨其支者入耳中直者出耳上下結于頷上屬目外眥其病小指支肘内銳骨後㢘痛循臂隂入腋下腋下痛腋後㢘痛繞肩脾引頸而痛應耳中鳴痛引頷目瞑良乆乃得視頸筋急則為筋瘻頸腫寒熱在頸者治在燔鍼劫刺之以知為數以痛為輸其為腫者復而銳之本支者上曲牙循耳前屬目外眥上頷結于角其痛當所過者支轉筋治在燔鍼劫刺以知為數以痛為輸名曰仲夏痺也手少陽之筋起于小指次指之端結于腕上循臂結于肘上繞臑外亷上肩走頸合手太陽其支者當曲頬入繫舌本其支者上曲牙循耳前屬目外眥上乘頷結于角其病當所過者即支轉筋舌卷治在燔鍼劫刺以知為數以痛為輸名曰季夏痺也手陽眀之筋起于大指次指之端結于腕上循臂上結于肘外上臑結于髃其支者繞肩胛挟脊直者從肩髃上頸其支者上頬結于頄直者上出手太陽之前上左角絡頭下右頷其病當所過者支痛及轉筋肩不舉頸不可左右視治在燔鍼劫刺以知為數以痛為輸名曰孟夏痺也手太隂之筋起于大指之上循指上行結于魚後行寸口外側上循臂結肘中上臑内亷入腋下出缺盆結肩前髃上結缺盆下結胷裏散貫賁合賁下抵季脇其病當所過者支轉筋痛甚成息賁脇急吐血治在燔鍼劫刺以知為數以痛為輸名曰仲冬痺也手心主之筋起于中指與太隂之筋並行結于肘内亷上臂隂結腋下下散前後挾脇其支者入腋散胷中結于臂其病當所過者支轉筋前及胷痛息賁治在燔鍼劫刺以知爲數以痛爲輸名曰孟冬痺也手少隂之筋起于小指之内側結于鋭骨上結肘内亷上入腋交太隂挾乳裏結于胷中循臂下繫于臍其病内急心承伏梁下爲肘網其病當所過者支轉筋筋痛治在燔鍼劫刺以知為數以痛為輸其成伏梁唾血膿者死不治經筋之病寒則反折筋急熱則筋㢮縦不收隂痿不用陽急則反折隂急則俛不伸焠刺者刺寒急也熱則筋縱不收無用燔鍼名曰季冬痺也足之陽眀手之太陽筋急則口目為噼眥急不能卒視治皆如右方也頄音求骨度第十四黄帝問于}
