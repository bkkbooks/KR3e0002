  - {type: variant, offset: 829, length: 1111, content: 之脈則病已矣黃帝問於歧伯曰五藏之所生變化之病形何如歧伯荅曰先定其五色五脈之應其病乃可別也黃帝曰色脈已定別之奈何歧伯曰調其脈之緩急小大滑濇而病變定矣黃帝曰調之奈何歧伯荅曰脈急者尺之皮膚亦急脈緩者尺之皮膚亦緩脈小者尺之皮膚亦減而少氣脈大者尺之皮膚亦賁而起脈滑者尺之皮膚亦滑脈濇者尺之皮膚亦濇凡此變者有微有甚故善調尺者不待於寸善調脈者不待於色能參合而行之者可以為上工上工十全九行二者為中工中工十全七行一者為下工下工十全六黃帝曰請問脈之緩急小大滑濇之病形何如歧伯曰臣請言五藏之病變也心脈急甚者為瘛瘲微急為心痛引背食不下緩甚為狂笑微緩為伏梁在心下上下行時唾血太甚為喉吤微大為心痺引背善淚出小甚為善噦微小為消癉滑甚為善渴微滑為心疝引臍小腹鳴濇甚為瘖微濇為血溢維厥耳鳴顛疾肺脈急甚為癲疾微急為肺寒熱怠惰欬唾血引腰背胸若鼻息肉不通緩甚為多汗微緩為痿瘻偏風頭以下汗出不可止太甚為脛腫微大為肺痺引胸背起惡日光小甚為泄微小為消癉滑甚為息賁上氣微滑為上下出血濇甚為嘔血微濇為鼠瘻在頸支腋之間下不勝其上其應善痠矣肝脈急甚者為惡言微急為肥氣在脅下若覆杯緩甚為善嘔微緩為水瘕痺也太甚為內癰善嘔衄微大為肝痺陰縮欬引小腹小甚為多飲微小為消癉滑甚為㿉疝微滑為遺溺濇甚為溢飲微濇為瘈攣筋痺脾脈急甚為瘈瘲微急為膈中食飲入而還出後沃沫緩甚為痿厥微緩為風痿四肢不用心慧然若無病太甚為擊仆微大為疝氣腹裏大膿血在腸胃之外小甚為寒熱微小為消癉滑甚為㿉癃微滑為蟲毒蛕蝎腹熱濇甚為腸㿉微濇為內㿉多下膿血腎脈急甚為骨癲疾微急為沉厥奔豚足不收不得前後緩甚為折脊微緩為洞洞者食不化下嗌還出太甚為陰痿微大為石水起臍已下至小腹腄腄然上至胃腕死不治小甚為洞泄微小為消癉滑甚為癃㿉微滑為骨痿坐不能起起則目無所見濇甚為大癰微濇為不月沉痔黃帝曰病之六變者刺之奈何歧伯荅曰諸急者多寒緩者多熱大者多氣少血小者血氣皆少滑者陽氣盛微有熱濇者多血少氣微有寒是故刺急者深內而久留之刺緩者淺內而疾發鍼以去其熱刺大者微寫其氣無出其血刺滑者疾發鍼而淺內之以寫其陽氣而去其熱刺濇者必中其脈隨其逆順而久留之必先按而循之已發鍼疾按其痏無令其血出以和其脈諸小者陰陽形氣俱不足勿取以鍼而調以甘藥也黃帝曰余聞五藏六府之氣滎輸所入為合令何道從入入安連過願聞其故歧伯荅曰此陽脈之別入于內屬於府者也黃帝曰滎輸與合各有名乎歧伯荅曰滎輸治外經合治內府黃帝曰治內府奈何歧伯曰取之於合黃帝曰合各有名乎歧伯荅曰胃合於三里大腸合入于巨虛上廉小腸合入于巨虛下廉三焦合入於委陽膀胱合入于委中央膽合入于陽陵泉黃帝曰取之奈何歧伯荅曰取之三里者低跗取之巨虛者舉足取之委陽者屈伸而索之委中者屈而取之陽陵泉者正豎膝予之齊下至委陽之陽取之取諸外經者揄申而從之, SBCK: ''}
