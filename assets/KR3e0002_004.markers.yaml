  - {type: variant, offset: 1956, length: 3, content: 足陽明, SBCK: 别迴腸注于膀胱而渗入焉故水榖者常并居于胃中成糟粕而俱下于大腸而成下焦渗而俱下濟泌别注循下焦而渗入膀胱焉黃帝曰人飲酒酒亦入胃榖未熟而小便獨先下何也歧伯答曰酒者熟榖之液也其氣悍以清故後榖而入先榖而液出焉黃帝曰善余聞上焦如霧中焦如漚下焦如瀆此之謂也四時氣第十九黃帝問于歧伯曰夫四時之氣各不同形百}
