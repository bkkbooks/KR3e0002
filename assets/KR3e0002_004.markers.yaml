  - {type: variant, offset: 27, length: 1, content: 人, SBCK: 布散于外精専者行于經隧常營無已終而復始是謂天地之紀故氣從太隂出注手陽眀上行注足陽眀下行至跗上注大指間與太隂合上行抵髀從脾注心中循手少隂出腋下臂注小指合手太陽上行乗腋出䪼内注目内眥上巔下項合足太陽循􅆃下尻下行注小指之端循足心注足少隂上行注腎從腎注心外散于胷中循心主脉出腋下臂出兩筋之間入掌中出中指之端還注小指次指之端合手少陽上行注膻中散于三焦従三焦注膽出脇注足少陽下行至跗上復從跗注大指間合足厥隂上行至肝從肝上注肺上循喉嚨入頏顙之竅究于畜門其支别者上額循巔下項中循脊入骶是督脉}
