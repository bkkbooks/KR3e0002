  - {type: variant, offset: 2, length: 0, content: '', WYG: 交三結交者陽明太隂也臍下三寸關元也厥痺者厥氣上及腹取隂陽之絡視主病也寫陽補隂經也頸側之動脉人迎人迎足陽明也在嬰筋之前嬰筋之後手陽明也名曰扶突次脉足少陽脉也名曰天牖次脉足太陽也名曰天柱腋下動脉臂太隂也名曰天府陽迎頭痛胷滿不得息取之人迎暴瘖氣鞕取扶突與舌本出血暴􅀢氣䝉耳目不明取天牖暴挛癎眩足不任身取天柱暴癉内逆肝肺相摶血溢鼻口取天府此為大牖五部臂陽明有入頄徧齒者名曰大迎下齒齲取之臂惡寒補之不惡寒寫之足太陽有入頄徧齒者多曰角孫上齒齲取之在鼻與頄前方病之時其脉盛盛則寫之虛則補之一曰取之出鼻外足陽明有挾鼻入於面者名曰懸顱屬口對入繫目本視有過者取之損有餘益不足反者益其足太陽有通項入於腦者正屬目本名曰眼系頭目苦痛取之在項中兩筋間入腦乃别隂􅀈陽􅀈隂陽相交陽入隂隂出陽交於目銳􅗃陽氣盛則瞋目隂氣盛則瞑目熱厥取足太隂少陽皆留之寒厥取足陽明少隂於足皆留之舌縱涎下煩悗取足少隂振寒洒洒鼓頷不得汗出腹脹煩悗取手太隂刺虚者刺其去也刺實者刺其來也春取絡脉夏取分腠秋取氣口冬取經輸凡此四時各以時為齊絡脉治皮膚分腠治肌肉氣口治筋脉經輸治骨髓五藏身有五部伏兎一腓二腓者腨也眥三五藏之腧四項五此五部有癰疽者死病始手臂者先取手陽明太隂而汗出病始頭首者先取項太陽而汗出病始足脛者先取足陽明而汗出臂太隂可汗出足陽明可汗出故取隂而汗出甚者止之於陽取陽而汗出甚者止之於隂凡刺之害中而不去則精泄不中而去則致氣精泄則病甚而惟致氣則生為癰疽也槁腊下思禹丘禹切亦切齒齒蠧也頄逵仇二音而顴也悗音悶腓音肥癲狂}
