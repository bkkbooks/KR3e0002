  - {type: variant, offset: 3, length: 0, content: '', WYG: 二十二目眥外決於面者為銳眥在内近鼻者為内眥上為外眥下為内眥癲疾始生先不樂頭重痛視舉目赤甚作極已而煩心候之於顔取手太陽陽明太隂血變而止癲疾始作而引口啼呼喘悸者候之手陽明太陽左强者攻其右右强者攻其左血變而止癲疾始作先反僵因而􅆃痛候之足太陽陽明太隂手太陽血變而止治癲疾者常與之居察其所當取之處病至視之有過者寫之置其血於瓠壺之中至其發時血獨動矣不動灸窮骨二十壯窮骨者骶骨也骨癲疾者􅀈齒諸腧分肉眥滿而骨居汗出煩悗嘔多沃沫氣下泄不治筋癲疾者身倦攣急大刺項大經之大抒脉嘔多沃沫氣下泄不治脉癲疾者暴仆四肢之脉皆脹而縱脉滿盡刺之出血不滿灸之挾項太陽灸帯脉於腰相去三寸諸分肉本輸嘔多沃沫氣下泄不治癲疾者疾發如狂者死不治狂始生先自悲也喜忘苦怒善恐者得之憂饑治之取手太隂陽明血變而止及取足太隂陽明狂始發少臥不饑自高賢也自辯智也自尊貴也善罵詈日夜不休治之取手陽明太陽太隂舌下少隂視之盛者皆取之不盛釋之也狂言驚善笑好歌樂妄行不休者得之大恐治之取手陽明太陽太隂在目妄見耳妄聞善呼者少氣之所生也治之取手太陽太隂陽明足太隂頭兩顑狂者多食善見鬼神善笑而不發於外者得之有所大喜治之取足太隂太陽陽明後取手太隂太陽陽明狂而新發未應如此者先取曲泉左右動脉及盛者見血有頃已不已以法取之灸骨骶二十壯風逆暴四肢腫身漯漯唏然時寒饑則煩飽則善變取手太隂表裏足少隂陽明之經肉凊取榮骨凊取井經也厥逆為病也足暴凊胷若將裂腸若將以刀切之煩而不能食脉大小皆濇煖取足少隂凊取足陽明凊别補之温則寫之厥逆腹脹滿腸鳴胷滿不得息取之下胷二脇欬而動手者與背腧以手按之立快者是也内閉不得溲刺足少隂太陽與骶上以長針氣逆則取其太隂陽明厥隂甚取少隂陽明動者之經也少氣身漯漯也言吸吸也骨痠體重懈惰不能動補足少隂短氣息短不屬動作氣索補足少隂去血絡也倦攣上音權顑口感切飢黄起行唏許几切笑也熱病第二十三偏枯身偏不用而痛言不變志不亂病在分腠之間巨針取之益其不足損其有餘乃可復也痱之為病也身無痛者四肢不收智亂不甚其言微知可治甚則不能言不可治也病先起於陽後入於隂者先取其陽後取其隂浮而取之熱病三日而氣口靜人迎躁者取之諸陽}
