  - {type: variant, offset: 11, length: 2, content: 天地, SBCK: 周痺之在身也上下移徙隨脉其上下左右}
  - {type: variant, offset: 11, length: 2, content: 天地, WYG: 余已聞九針之經論隂陽逆順六經已畢願得口問歧伯避席再拜曰善乎哉問也此先師之所口傳也黄帝曰願聞口傳歧伯答曰夫百病之始生也皆生於風雨寒暑隂陽喜怒飲食居處大驚卒恐則血氣分離隂陽破散經絡厥絶脉道不通隂陽}
  - {type: variant, offset: 11, length: 2, content: 天地, krp: 周痺之在身也上下移徙隨脉其上下左右}
  - {type: variant, offset: 14, length: 1, content: 感, SBCK: 應間不容空願聞此痛在血脉之中邪將在分肉之間乎何以致是其痛之移也間不及下鍼其慉痛之時不及定治而痛已止矣何道使然願聞其故歧伯答曰此衆痺也非周痺也黃帝曰願聞衆痺歧伯對曰此各在其處更發更止更居更起以右應左以左應右非能周也更發更休也黄帝曰善刺之奈何歧伯對曰刺此者痛雖已止必刺其處勿令復起帝曰善願聞周痺何如歧伯對曰周痺者在于血脉之中隨脉以上隨脉以下不能左右各當其所黃帝曰刺之奈何歧伯對曰痛從上下者先刺其下以過下同一作遏之後刺其上以脫之痛從下上者先刺其上以過之後刺其下以脫之黃帝曰善此痛安生何因而有名歧伯對曰風}
