  - {type: variant, offset: 8, length: 0, content: '', SBCK: 十九苛軫鼻索皮于肺不得索之火火者心也熱病先身濇倚而熱煩悗亁脣口嗌取之皮以第一鍼五十九膚脹口乾寒汗出索脉于心不得索之水水者䁂也熱病嗌亁多飲善驚臥不能起取之膚肉以第六鍼五十九目眥青索肉于脾不得索之木木者肝也熱病面青腦痛手足躁取之筋間以第四鍼于四逆筋躄目浸索筋于肝不得索之金金者肺也熱病數驚瘈瘲而狂取之脉以第四鍼急寫有餘者癲疾毛髪去索血于心不得索之水水者腎也熱病身重骨痛耳聾而好瞑取之骨以第四鍼五十九刺骨病不食齧齒耳青索骨于腎不得索之土土者脾也熱病不知所痛耳聾不能自收口乾陽熱甚隂頗有寒者熱在髓死不可治熱病頭痛顳顬目􅪴脉痛善衂厥熱病也取之以第三鍼視有餘不足寒熱痔熱病體重腸中熱取之以第四鍼於其腧及下諸指間索氣于胃胳得氣也熱病挾臍急痛胷脇滿取之湧泉與隂陵泉取以第四鍼鍼嗌裏熱病而汗且出及脉順可汗者取之魚際大淵大都大白寫之則熱去補之則汗出汗出大甚取内踝上横脉以止之熱病已得汗而脉尚躁盛此隂脉之極也死其得汗而脉靜者生熱病者脉尚盛躁而不得汗者此陽脉之極也死脉盛躁得汗靜者生熱病不可刺者有九一曰汗不出大顴發赤噦者死二曰泄而腹滿甚者死三曰目不明熱不已者死四曰老人嬰兒熱而腹滿者死五曰汗不出嘔下血者死六曰舌本爛熱不已者死七曰欬而衂汗不出出不至足者死八曰髓熱者死九曰熱而痙者死腰折瘈瘲齒噤齘也凡此九者不可刺也所謂五十九刺者兩手外内側各三凡十二痏五指間各一凡八痏足亦如是頭入髪一寸傍三分各三凡六痏更入髪三寸邉五凡十痏耳前後口下者各一項中一凡六痏巔上一􅇟㑹一髪際一亷泉一風池二天柱二氣滿胷中喘息取足太隂大指之端去爪甲如薤葉寒則留之熱則疾之氣下乃止心疝㬥痛取足太隂厥隂盡刺去其血絡喉痺舌卷口中乾煩心心痛臂内亷痛不可及頭取手小指次指爪甲下去端如韭葉目中赤痛從内眥始取之隂蹻風痙身反折先取足太陽及膕中及血絡出血中有寒取三里癃取之隂蹻及三毛上及血絡出血男子如蠱女子如怚身體腰􅆃如解不欲飲食先取湧泉見血視跗上盛者盡見血也痱音肥痙切巨井噤切巨禁齘音介厥病第二十四厥頭痛面若腫起而煩心取之足陽明太隂厥頭痛頭脉痛心悲善泣視頭動脉反盛者刺盡去血後調足厥隂厥頭痛貞貞頭重而痛寫頭上五行行五先取手少隂後取足少隂厥頭痛意善忘按之不得取頭面左右動脉後取足太隂厥頭痛項先痛腰脊為應先取天柱後取足太陽厥頭痛頭痛甚耳前後脉湧有熱有動脉一本云寫出其血後取足少陽眞頭痛頭痛甚腦盡痛手足寒至節死不治頭痛不可取于腧者有所擊堕惡血在于内若肉傷痛未已則可刺不可逺取也頭痛不可刺者大痺為惡日作者可令少愈不可已頭半寒痛先取手少陽陽明後取足少陽陽明厥心痛與背相控善瘈如從後觸其心傴僂者腎心痛也先取京骨崑崙發狂不已取然谷厥心痛腹脹胷滿心尤痛甚胃心痛也取之大都大白厥心痛痛如以錐鍼刺其心心痛甚者脾心痛也取之然谷大谿厥心痛色蒼蒼如死狀終日不得太息肝心痛也取之行間大衝厥心痛卧若徒居心痛間動作痛益甚色不變肺心痛也取之魚際大淵眞心痛手足凊至節心痛甚旦發夕死夕發旦死心痛不可刺者中有盛聚不可取于腧腸中有蟲瘕及蛟蛕皆不可取以小鍼心腸痛憹作痛腫聚往來上下行痛有休止腹熱喜渴涎出者是蛟蛕也以手聚按而堅持之無令得移以大鍼刺之乆持之蟲不動乃出鍼也㤣腹憹痛形中上者耳聾無聞取耳中耳鳴取耳前動脉耳痛不可刺者耳中有膿若有乾耵聹耳無聞也耳聾取手小指次指爪甲上與肉交者先取手後取足耳鳴取手中指爪甲上左取右右取左先取手後取足足髀不可舉側而取之在樞合中以貟利鍼大鍼不可刺病注下血取曲泉風痺􅁋濼病不可已者足如履冰時如入湯中股脛淫濼煩心頭痛時嘔時悗􅅭已汗出久則目􅅭悲以喜恐短氣不樂不出三年死也貞貞切都耕儂切乃老㤣音烹耵聹耳中垢也上都領切頂切下乃病本第二十五先病而後逆者治其本先逆而後病者治其本先寒而後生病者治其本先病而後生寒者治其本先熱而後生病者治其本先泄而後生他病者治其本必且調之乃治其他病先病而後中滿者治其標先病後泄者治其本先中滿而後煩心者治其本有客氣有同氣大小便不利治其標大小便利治其本病發而有餘本而標之先治其本後治其標病發而不足標而本之先治其標後治其本謹詳察間甚以意調之間者并行甚為獨行先小大便不利而後生他病者治其本也雜病第二十六厥挾脊而痛者至頂頭沈沈然目􅉩􅉩然腰脊强取足太陽膕中血絡厥胷滿面腫脣漯漯然㬥言難甚則不能言取足陽明厥氣走喉而不能言手足凊大便不利取足少隂厥而腹嚮嚮然多寒氣腹中􅥃􅥃便溲難取足太隂嗌乾口中熱如膠取足少隂膝中痛取犢鼻以貟利鍼發而間之鍼大如氂刺膝無疑喉痺不能言取足陽明能言取手陽明瘧不渇間日而作取足陽明渇而日作取手陽明齒痛不惡清飲取足陽明惡清飲取手陽明聾而不痛者取足少陽聾而痛者取手陽明衂而不止衃血流取足太陽衃血取手太陽不已刺宛骨下不已刺膕中出血腰痛痛上寒取足太陽陽明痛上熱取足厥隂不可以俛仰取足少陽中熱而喘取足少隂膕中血絡喜怒而不欲食言益小刺足太隂怒而多言刺足少陽顑痛刺手陽明與顑之盛脉出血項痛不可俛仰刺足太陽不可以顧刺手太陽也小腹滿大上走胃至心淅淅身時寒熱小便不利取足厥隂腹滿大便不利腹大亦上走胷嗌喘息喝喝然取足少隂腹滿食不化腹嚮嚮然不能大便取足太隂心痛引腰􅆃欲嘔取足少隂心痛腹脹嗇嗇然大便不利取足太隂心痛引背不得息刺足少隂不已取手少陽心痛引小腹滿上下無常處便溲難刺足厥隂心痛但短氣不足以息刺手太隂心痛當九節剌之按已刺按之立已不已上下求之得之立已顑痛刺足陽明曲周動脉見血立已不已按人迎于經立已氣逆上刺膺中陷者與下胷動脉腹痛刺臍左右動脉已刺按之立已不已刺氣街已刺按之立已痿厥爲四末束悗乃疾解之日二不仁者十日而知無休病已止歲以草刺鼻嚏嚏而已無息而疾迎引之立已大驚之亦可已嚮音響􅥃音斛周痺第二十七黃帝問于}
