  - {type: variant, offset: 4, length: 2, content: 根結, krp: 十九刺以寫其熱而出其汗實其隂以補其不足者身熱甚隂陽皆靜者勿刺也其可刺者急取之不汗出則泄所謂勿刺者有死徴也熱病七日八日脉口動喘而短作弦一本者急刺之汗且自出淺刺手大指間熱病七日八日脉微小病者溲血口中乾一日半而死脉代者一日死熱病已得汗出而脉尚躁喘且復熱勿刺膚喘甚者死熱病七日八日脉不躁躁不散数後三日中有汗三日不汗四日死未曽汗者勿腠刺之熱病先膚痛窒鼻充面取之皮以}
  - {type: variant, offset: 6, length: 0, content: '', WYG: 而不通及虛而脉陷空者而調之熨而通之其堅轉引而行之黃帝曰善余已得其意矣亦得其事也九者經巽之理十二經脉隂陽之病也慉許六切口問}
