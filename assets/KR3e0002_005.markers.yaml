  - {type: variant, offset: 2, length: 0, content: '', krp: 交三結交者陽明大隂也臍下三寸關元也厥痺者厥氣上及腹取隂陽之絡視主病也寫陽補隂經也頸側之動脉人迎人迎足陽明也在嬰筋之前嬰筋之後手陽明也名曰扶突次脉足少陽脉也名曰天牖次脉足太陽也名曰天柱腋下動脉臂太隂也名曰天府陽迎頭痛胷滿不得息取之人迎㬥瘖氣鞕取扶突與舌本出血㬥聾氣䝉耳目不明取天牖㬥攣癎眩足不任身取天柱㬥癉内逆肝肺相搏血溢鼻口取天府此為天牖五部臂陽明有入頄徧齒者名曰大迎下齒齲取之臂惡寒補之不惡寒寫之足太陽有入頄徧齒者名曰角孫上齒齲取之在鼻與頄前方病之時其脉盛盛則寫之虛則補之一曰取之出鼻外足陽明有挾鼻入于面者名曰懸顱屬口對入繫目本視有過者取之損有餘益不足反者益其足太陽有通項入于腦者正屬目本名曰眼系頭目苦痛取之在項中兩筋間入腦乃别隂蹻陽蹻隂陽相交陽入隂隂出陽交于目銳眥陽氣盛則瞋目隂氣盛則瞑目熱厥取足太隂少陽皆留之寒厥取足陽明少隂于足皆留之舌縱涎下煩悗取足少隂振寒洒洒鼓頷不得汗出腹脹煩悗取手太隂刺虚者刺其去也刺實者刺其來也春取絡脉夏取分腠秋取氣口冬取經輸凡此四時各以時為齊絡脉治皮膚分腠治肌肉氣口治筋脉經輸治骨髓五藏身有五部伏兎一腓二腓者腨也眥三五藏之腧四項五此五部有癰疽者死病始手臂者先取手陽明太隂而汗出病始頭首者先取項太陽而汗出病始足脛者先取足陽明而汗出臂太隂可汗出足陽明可汗出故取隂而汗出甚者止之于陽取陽而汗出甚者止之於隂凡刺之害中而不去則精泄不中而去則致氣精泄則病甚而恇致氣則生為癰疽也槁腊亦切下思齲齒蠧也丘禹切頄面頰也逵仇二音悗悶音腓音肥癲狂}
  - {type: variant, offset: 3, length: 0, content: '', SBCK: 二十二目眥外決于面者爲銳眥在内近鼻者爲内眥上爲外眥下爲内眥癲疾始生先不樂頭重痛視舉目赤甚作極已而煩心候之于顔取手太陽陽朙太隂血變而止癲疾始作而引口啼呼喘悸者候之手陽朙太陽左强者攻其右右强者攻其左血變而止癲疾始作先反僵因而脊痛􅀱之足太陽陽朙太隂手太陽血變而止治癲疾者常與之居􅀕其所當取之處病至視之有過者寫之置其血于瓠壺之中至其發時血獨動矣不動灸窮骨二十壯窮骨者骶骨也骨癲疾者顑齒諸腧分肉皆滿而骨居汗出煩悗嘔多沃沫氣下泄不治筋癲疾者身倦攣急大刺項大經之大抒脉嘔多沃沫氣下泄不治脉癲疾者暴仆四肢之脉皆脹而縱脉滿盡刺之出血不滿灸之挾項太陽灸帯脉于腰相去三寸諸分肉本輸嘔多沃沫氣下泄不治癲疾者疾發如狂者死不治狂始生先自悲也喜忘苦怒善恐者得之憂饑治之取手太隂陽明血變而止及取足太隂陽明狂始發少臥不饑自高賢也自辯智也自尊貴也善罵詈日夜不休治之取手陽明太陽太隂舌下少隂視之盛者皆取之不盛釋之也狂言驚善笑好歌樂妄行不休者得之大恐治之取手陽明太陽太隂狂目妄見耳妄聞善呼者少氣之所生也治之取手太陽太隂陽明足太隂頭兩顑狂者多食善見鬼神善笑而不發于外者得之有所大喜治之取足太隂太陽陽明後取手太隂太陽陽明狂而新發未應如此者先取曲泉左右動脉及盛者見血有頃已不已以法取之灸骨骶二十壯風逆㬥四肢腫身漯漯唏然時寒饑則煩飽則善變取手大隂表裏足少隂陽明之經肉凊取滎骨凊取井經也厥逆為病也足㬥凊胷若將裂腸若將以刀切之煩而不能食脉大小皆濇煖取足少隂凊取足陽明凊則補之温則寫之厥逆腹脹滿腸鳴胷滿不得息取之下胷二脇欬而動手者與背腧以手按之立快者是也内閉不得溲刺足少隂太陽與骶上以長鍼氣逆則取其太隂陽明厥隂甚取少隂陽明動者之經也少氣身漯漯也言吸吸也骨痠體重懈惰不能動補足少隂短氣息短不屬動作氣索補足少隂去血絡也倦攣權上音顑黄起行口感切面唏笑也許几切熱病第二十三偏枯身偏不用而痛言不變志不亂病在分腠之間巨鍼取之益其不足損其有餘乃可復也痱之為病也身無痛者四肢不收智亂不甚其言微知可治甚則不能言不可治也病先起于陽後入于隂者先取其陽後取其隂浮而取之熱病三日而氣口靜人迎躁者取之諸陽}
