  - {type: variant, offset: 16, length: 4, content: 暖相移陰, SBCK: 濕氣客于外分肉之間廹切而爲沫沫得寒則聚聚則排分肉而分裂也分裂則痛痛則神歸之神歸之則熱熱則痛解痛解則厥厥則他痺發發則如是帝曰善余已得其意矣此内不在藏而外未發于皮獨居分肉之間眞氣不能周故命曰周痺故刺痺者必先切循其下之六經視其虛實及大絡之血結而不通及虛而脉陷空者而調之熨而通之其瘛堅轉引而行之黃帝曰善余已得其意矣亦得其事也九者經巽之理十二經脉隂}
