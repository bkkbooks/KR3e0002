  - {type: variant, offset: 4, length: 1, content: 根, WYG: 十九刺以寫其熱而出其汗實其隂以補其不足者身熱甚隂陽皆靜者勿刺也其可刺者急取之不汗出則泄所謂勿刺者有死徴也熱病七日八日脉口動喘而短一本作弦者急刺之汗且自出淺刺手大指間熱病七日八日脉微小病者溲血口中乾一日半而死脉代者一日死熱病已得汗出而脉尚躁喘且復熱勿刺膚喘甚者死熱病七日八日脉不躁躁不散数後三日中有汗三日不汗四日死未曽汗者勿腠刺之熱病先膚痛窒鼻充面取之皮以第一針五十九苛軫鼻索皮於肺不得索之火火者心也熱病先身濇倚而熱煩悗亁唇口嗌取之皮以第一針五十九膚脹口乾寒汗出索脉於心不得索之水水者腎也熱病嗌亁多飲善驚臥不能起取之膚肉以第六針五十九目眥青索肉於脾不得索之木木者肝也熱病面青腦痛手足躁取之筋間以第四針於四逆筋躄目浸索筋於肝不得索之金金者肺也熱病數驚瘈瘲而狂取之脉以第四針急寫有餘者癲疾毛髪去索血於心不得索之水水者腎也熱病身重骨痛耳聾而好瞑取之骨以第四針五十九刺骨病不食齧齒耳青索骨於腎不得索之土土者脾也熱病不知所痛耳聾不能自收口乾陽熱甚隂頗有寒者熱在髓死不可治熱病頭痛顳顬目􅪴脉痛善衂厥熱病也取之以第三針視有餘不足寒熱痔熱病體重腸中熱取之以第四針於其腧及下諸指間索氣於胃胳得氣也熱病挾臍急痛胷脇滿取之湧泉與隂陵泉取以第四針針嗌裏熱病而汗且出及脉順可汗者取之魚際大淵大都大白寫之則熱去補之則汗出汗出大甚取内踝上横脉以止之熱病已得汗而脉尚躁盛此隂脉之極也死其得汗而脉靜者生熱病者脉尚盛躁而不得汗者此陽脉之極也死脉盛躁得汗靜者生熱病不可刺者有九一曰汗不出大顴發赤噦者死二曰泄而腹滿甚者死三曰目不明熱不已者死四曰老人嬰兒熱而腹滿者死五曰汗不出嘔下血者死六曰舌本爛熱不已者死七曰欬而衂汗不出出不至足者死八曰髓熱者死九曰熱而痙者死腰折瘈瘲齒噤齘也凡此九者不可刺也所謂五十九刺者兩手外内側各三凡十二痏五指間各一凡八痏足亦如是頭入髪一寸傍三分各三凡六痏更入髪三寸邉五凡十痏耳前後口下者各一項中一凡六痏巔上闕頔㑹一髪際一亷泉一風池二天柱二氣滿胷中喘息取足太隂大指之端去爪甲如薤葉寒則留之熱則疾之氣下乃止心疝暴痛取足太隂厥隂盡刺去其血絡喉痺舌卷口中乾煩心心痛臂内亷痛不可及頭取手小指次指爪甲下去端如韭葉目中赤痛從内眥始取之隂蹻風痙身反折先取足太陽及膕中及血絡出血中有寒取三里癃取之隂蹻及三毛上及血絡出血男子如蠱女子如怚身體腰􅆃如解不欲飲食先取湧泉見血視跗上盛者盡見血也痱音肥痙巨井切噤巨禁切齘音介厥病第二十四厥頭痛面若腫起而煩心取之足陽明太隂厥頭痛頭脉痛心悲善泣視頭動脉反盛者刺盡去血後調足厥隂厥頭痛貞貞頭重而痛寫頭上五行行五先取手少隂後取足少隂厥頭痛意善忘按之不得取頭面左右動脉後取足太隂厥頭痛項先痛腰􅆃為應先取天柱後取足太陽厥頭痛頭痛甚耳前後脉湧有熱一本云有動脉寫出其血後取足少陽眞頭痛頭痛甚腦盡痛手足寒至節死不治頭痛不可取於腧者有所擊堕惡血在於内若肉傷痛未已則可刺不可逺取也頭痛不可刺者大痺為惡日作者可令少愈不可已頭半寒痛先取手少陽陽明後取足少陽陽明厥心痛與背相控善瘈如從後觸其心傴僂者腎心痛也先取京骨崑崙發針不已取然谷厥心痛腹脹胷滿心尤痛甚胃心痛也取之大都大白厥心痛痛如以錐針刺其心心痛甚者脾心痛也取之然谷大谿厥心痛色蒼蒼如死狀終日不得太息肝心痛也取之行間大衝厥心痛卧若徒居心痛間動作痛益甚色不變肺心痛也取之魚際大淵眞心痛手足凊至節心痛甚旦發夕死夕發旦死心痛不可刺者中有盛聚不可取於腧腸中有蟲瘕及蛟蛕皆不可取以小針心腸痛憹作痛腫聚往來上下行痛有休止腹熱喜渴涎出者是蛟蛕也以手聚按而堅持之無令得移以大針刺之乆持之蟲不動乃出針也㤣腹憹痛形中上者耳聾無聞取耳中耳鳴取耳前動脉耳痛不可刺者耳中有膿若有乾耵矃耳無聞也耳聾取手小指次指爪甲上與肉交者先取手後取足耳鳴取手中指爪甲上左取右右取左先取手後取足髀不可舉側而取之在漚合中以貟利針大針不可刺病注下血取曲泉風痺淫濼病不可已者足如履氷時如入湯中股脛淫濼煩心頭痛時嘔時悗眩已汗出乆則目眩悲以喜恐短氣不樂不出三年死也貞貞都耕切憹乃老切㤣音烹耵矃上都領切耳中垢也下乃頃切病本第二十五先病而後逆者治其本先逆而後病者治其本先寒而後生病者治其本先病而後生寒者治其本先熱而後生病者治其本先泄而後生他病者治其本必且調之乃治其他病先病而後中滿者治其標先病後泄者治其本先中滿而後煩心者治其本有客氣有同氣大小便不利治其標大小便利治其本病發而有餘本而標之先治其本後治其標病發而不足標而本之先治其標後治其本謹詳察間甚以意調之間者并行甚為獨行先小大便不利而後生他病者治其本也雜病第二十六厥挾脊而痛者至頂頭沈沈然目􅉩􅉩然腰脊强取足太陽膕中血絡厥胷滿面腫脣漯漯然暴言難甚則不能言取足陽明厥氣走喉而不能言手足凊大便不利取足少隂厥而腹嚮嚮然多寒氣腹中糓糓便溲難取足太隂嗌乾口中熱如膠取足少隂膝中痛取犢鼻以貟利針發而間之針大如氂刺膝無疑喉痺不能言取足陽明能言取手陽明瘧不渇間日而作取足陽明渇而日作取手陽明齒痛不惡清飲取足陽明惡清飲取手陽明聾而不痛者取足少陽聾而痛者取手陽明衂而不止衃血流取足太陽衃血取手太陽不已刺宛骨下不已刺膕中出血腰痛痛上寒取足太陽陽明痛上熱取足厥隂不可以俛仰取足少陽中熱而喘取足少隂膕中血絡喜怒而不欲食言益小刺足太隂怒而多言刺足少陽顑痛刺手陽明與顑之盛脈出血項痛不可俛仰刺足太陽不可以顧刺手太陽也小腹滿大上走胃至心淅淅身時寒熱小便不利取足厥隂腹滿大便不利腹大亦上走胷嗌喘息喝喝然取足少隂腹滿食不化腹嚮嚮然不能大便取足太隂心痛引腰􅆃欲嘔取足少隂心痛腹脹嗇嗇然大便不利取足太隂心痛引背不得息刺足少隂不已取手少陽心痛引小腹滿上下無常處便溲難刺足厥隂心痛但短氣不足以息刺手太隂心痛當九節次之按已刺按之立已不已上下求之得之立已顑痛刺足陽明曲周動脉見血立已不已按人迎於經立已氣逆上刺膺中陷者與下胷動脉腹痛刺臍左右動脉已刺按之立已不已刺氣街已刺按之立已痿厥為四末束悗乃疾解之日二不仁者十日而知無休病已止歲以草刺鼻嚏嚏而已無息而疾迎引之立已大驚之亦可已嚮響糓解周痺第二十七黃帝問於岐伯曰周痺之在身也上下移徙隨脉其上下左右相應間不容空願聞此痛在血脉之中邪將在分肉之間乎何以致是其痛之移也間不及下針其慉痛之時不及定治而痛已止矣何道使然願聞其故歧伯答曰此衆痺也非周痺也黃帝曰願聞衆痺歧伯對曰此各在其處更發更止更居更起以右應左以左應右非能周也更發更休也黄帝曰善刺之奈何歧伯對曰刺此者痛雖已止必刺其處勿令復起帝曰善願聞周痺何如歧伯對曰周痺者在於血脉之中随脉以上随脉以下不能左右各當其所黃帝曰刺之奈何歧伯對曰痛從上下者先刺其下以過一作遏下同之後刺其上以脫之痛從下上者先刺其上以過之後刺其下以脫之黃帝曰善此痛安生何因而有名歧伯對曰風寒濕氣客於外分肉之間廹切而為沫沫得寒則聚聚則排分肉而分裂也分裂則痛痛則神歸之神歸之則熱熱則痛解痛解則厥厥則他痺發發則如是帝曰善余已得其意矣此内不在藏而外未發於皮獨居分肉之間眞氣不能周故命曰周痺故刺痺者必先切循其下之六經視其虛實及大絡之血}
