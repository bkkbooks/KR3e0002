  front:
  - {type: variant, offset: 0, length: 1, content: 根, SBCK: 黃帝素問靈樞經卷之五五邪第二十邪在肺則病皮膚痛寒熱上氣喘汗出欬動肩背取之膺中外腧背三節五藏顴又五節一本作五之傍以手疾按之快然乃刺之取之缺盆中以越之邪在肝則兩脇中痛寒中惡血在内行善掣節時脚腫取之行間以引脇下補三里以温胃中取血脉以散惡血取耳間青脉以去其掣邪左脾胃則病肌肉痛陽氣有餘隂氣不足則熱中善饑陽氣不足隂氣有餘則寒中腸鳴腹痛隂陽俱有餘若俱不足則有寒有熱皆調于三里邪在腎則病骨痛隂痺隂痺者按之而不得腹脹腰痛大便難肩背頸項痛時􅅭取之湧泉崑崙視有血者盡取之邪在心則病心痛喜悲時􅅭仆視有餘不足而調之其輸也顀音椎寒熱病第二十一皮寒熱者不可附席毛髪焦鼻槁腊不得汗取三陽之絡以補手太隂肌寒熱者肌痛毛髮焦而脣槁腊不得汗取三陽于下以去其血者補足太隂以出其汗骨寒熱者病無所安汗注不休齒未槁取其少隂于隂股之絡齒已槁死不治骨厥亦然骨痺舉節不用而痛汗注煩心取三隂三陽一本作之經補之身有所傷血出多及中風寒若有所墮墜四支懈惰不收名曰體惰取其小腹臍下三}
