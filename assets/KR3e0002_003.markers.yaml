  - {type: variant, offset: 47, length: 0, content: '', WYG: 則身以前皆寒慄胃中寒則脹滿為此諸病盛則寫之虚則補之熱則疾之寒則留之陷下則炙之不盛不虚以經取之盛者人迎大三倍于寸口虚者人迎反小于寸口也脾足太隂之脈起於大指之端循指内側白肉際過核骨後上内踝前亷上踹内循脛骨後交出厥隂之前上膝股内前亷入腹属脾絡胃上膈挾咽連舌本散舌下其支者復從胃别上膈注心中是動則病舌本強食則嘔胃脘痛腹脹善噫得後與氣則快然如衰身體皆重是主脾所生病者舌本痛體不能動摇食不下煩心心下急痛溏瘕泄水閉黄疸不能卧强立股膝内腫厥足大指不用為此諸病盛則寫之虚則補之熱則疾之寒則留之陷下則炙之不盛不虚以經取之盛者寸口大三倍于人迎虚者寸口反小於人迎心手少隂之脈起于心中出屬心系下膈絡小腸其支者從心系上挾咽繫目系其直者復從心系却上肺下出腋下下循臑内後亷行太隂心主之後下肘内循臂内後亷抵掌後脱骨之端入掌内後亷循小指之内出其端是動則病嗌乾心痛渇而欲飲是為臂厥是主心所生病者目黄脇痛臑臂内後亷痛厥掌中熱痛為此諸病盛則寫之虚則補之熱則疾之寒則留之陷下則炙之不盛不虛以經取之盛者寸口大再倍於人迎虚者寸口反小於人迎也小腸手太陽之脈起于小指之端循手外側上腕出踝中直上循臂骨下亷出肘内側兩筋之間上循臑外後亷出肩解繞肩胛交肩上入缺盆絡心循咽下膈抵胃屬小腸其支者從缺盆循頸上頰至日鋭眥却入耳中其支者别頰上䪼抵鼻至目内眥斜絡于顧是動則病嗌痛頷腫不}
