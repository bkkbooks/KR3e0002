  - {type: variant, offset: 45, length: 0, content: '', SBCK: 則當脉所過者熱腫虛則寒慄不復爲此諸病盛則寫之虛則補之熱則疾之寒則留之䧟下則灸之不盛不虛以經取之盛者人迎大三倍于寸口虛者人迎反小於寸口也胃足陽朙之脉起於鼻之交頞中旁納約字一本作太陽之脉下循鼻外入上齒中還出挾口環脣下交承漿却循頥後下廉出大迎循頰車上耳前過客主人循髮際至額顱其支者從大迎前下人迎循喉嚨入缺盆下膈屬胃絡脾其直者從缺盆下乳内廉下挾臍入氣街中其支者起于胃口下循腹裏下至氣街中而合以下髀關抵伏兎下膝臏中下循脛外廉下足跗入中指内間其支者下廉三寸而别下入中指外間其支者别跗上入大指間出其端是動則病洒洒振寒善呻數欠顔黒病至則惡人與火聞木聲則愓然而驚心欲動獨􅐬戸塞牖而處甚則欲上高而歌棄衣而走賁響腹脹是為骭厥是主血所生病者狂瘧温淫汗出鼽衂口喎脣胗頸腫喉痺大腹水腫膝臏腫痛循膺乳氣街股伏兎骭外廉足跗上皆痛中指不用氣盛則身以前皆熱其有餘于胃則消榖善饑溺色黄氣}
  - {type: page-break, offset: 45, content: '', id: KR3e0002_SBCK_003-3a}
  - {type: page-break, offset: 45, content: '', id: KR3e0002_SBCK_003-3b}
  - {type: page-break, offset: 45, content: '', id: KR3e0002_SBCK_003-4a}
  - {type: variant, offset: 45, length: 0, content: '', WYG: 則當脈所過者熱腫虚則寒慄不復為此諸病盛則寫之虚則補之熱則疾之寒則留之陷下則炙之不盛不虚以經取之盛者人迎大三倍于寸口虚者人迎反小於寸口也胃足陽明之脈起於鼻之交頞中分納一本作約字太陽之脈下循鼻外入上齒中還出挾口環唇下交承漿却循頥後下亷出大迎前頰車上耳前過客主人循髮際至額顱其支者從大迎前下人迎循喉嚨入缺盆下膈屬胃絡脾其直者從缺盆下乳内亷下挾臍入氣街中其支者起于胃口下循腹裏下至氣街中而合以下髀闗抵伏免下膝臏中下循脛外亷下足跗入中指内間其支者下亷三寸而别下入中指外間其支者别跗上入大指間出其端是動則病洒洒振寒善呻數欠顔黒病至則惡人與火聞木聲則愓然而驚心欲動獨閉戸塞牖而處甚則欲上髙而歌棄衣而走賁響腹脹是為骭厥是主血所生病者狂瘧温淫汗出鼽衂口喎唇胗頸腫喉痺大腹水腫膝臏腫痛循膺乳氣街股伏免骭外亷足跗上皆痛中指不用氣盛則身以前皆熱其有餘于胃則消榖善饑溺色黄氣}
