  - {type: variant, offset: 0, length: 0, content: '', WYG: 欽定四庫全書靈樞經卷三宋史崧音釋經脈第十雷公問於黄帝曰禁脈之言凡刺之理經脈為始營其所行制其度量内次五藏外别六府願盡聞其道黄帝曰人始生先成精精成而腦髓生骨為幹脈為營筋為剛肉為牆皮膚堅而毛髮長榖入於胃脈道以通血氣乃行雷公曰願卒聞經脈之始生黄帝曰經脈者所以能决死生處百病調虚實不可不通肺手太隂之脈起于中焦下絡大腸還循胃口上膈屬肺從肺系横出腋下下循臑内行少隂心主之前下肘中循臂内上骨下亷入寸口上魚循魚際出大指之端其支者從腕後直出次指内亷出其端是動則病肺脹滿膨膨而喘欬缺盆中痛甚則交兩手而瞀此為臂厥是主肺所生病者欬上氣喘渴煩心胷滿臑臂内前亷痛厥掌中熱氣盛有餘則肩背痛風寒汗出中風}
