  - {type: variant, offset: 254, length: 223, content: 逆順盛虛也要與之期者知氣之可取之時也麤之闇者冥冥不知氣之微密也妙哉工獨有之者盡知鍼意也往者為逆者言氣之虛而小小者逆也來者為順者言形氣之平平者順也明知逆順正行無間者言知所取之處也迎而奪之者寫也追而濟之者補也所謂虛則實之者氣口虛而當補之也滿則泄之者氣口盛而當寫之也宛陳則除之者去血脈也邪勝則虛之者言諸經有盛者皆寫其邪也徐而疾則實者言徐內而疾出也疾而徐則虛者言疾內而徐出也言實與虛若有若無者言實者有氣虛者無氣也察後與先若亡若存者言氣之虛實補寫之先後也察, SBCK: 道近}
