  - {type: variant, offset: 54, length: 1, content: 正, SBCK: 汗出目鋭眥痛頰痛耳後肩臑肘臂外皆痛小指次指不用爲此諸病盛則寫之虛則補之熱則疾之寒則留之䧟下則灸之不盛不虛以經取之盛者人迎大一倍于寸口虛者人迎反小于寸口也膽足少陽之脉起于目鋭眥上抵頭角下耳後循頸行手少陽之前至肩上却交出手少陽之後入缺盆其支者從耳後入耳中出走耳前至目鋭眥後其支者别銃眥下大迎合于手少陽抵于䪼下加頰車下頸合缺盆以下胷中貫膈絡肝屬膽循脇裏出氣街繞毛際横入髀厭中其直者從缺盆下腋循胷過季脇下合髀厭中以下循髀陽出膝外廉下外輔骨之前直下抵絶骨之端下出外踝之前循足跗上入小指次指之間其支者别跗上入大指之間循大指歧骨内出其端還貫爪甲出三毛是動則病口苦善太息心脇痛不能轉側甚則面微有塵體無膏澤足外反熱是爲陽厥是主骨所生病者頭痛頷痛目銳眥痛缺盆中腫痛腋下腫馬刁俠癭汗出振寒瘧胷脇肋髀膝外至脛絶骨外髁前及諸節皆痛小指次指不用爲此諸病盛則寫之虛則補之熱則疾之寒則留之䧟下則灸之不盛不虛以經取之盛者人迎大一倍于寸口虛者人迎反小于寸口也肝足厥隂之脉起于大指叢毛之際上循足跗上廉去内踝一寸上踝八寸交出太隂之後上膕内廉循股隂入毛中過隂器抵小腹挾胃屬肝絡膽上貫膈布脇肋循喉嚨之後上入頏顙連目系上出額與督脉㑹于巔其支者從目系下頰裏環脣内其支者復從肝别貫膈上注肺是動則病腰痛不可以俛仰丈夫㿉疝婦人少腹腫甚則嗌乾面塵脱色是肝所生病者胷滿嘔逆飱泄狐疝遺溺閉癃為此諸病盛則寫之虛則補之熱則疾之寒則留之䧟下則灸之不盛不虛以經取之盛者寸口大一倍于人迎虛者寸口反小于人迎也手太隂氣絶則皮毛焦太隂者行氣温于皮毛者也故氣不榮則皮毛焦皮毛焦則津液去皮節津液去皮節者則爪枯毛折毛折者則毛先死丙篤丁死火勝金也手少隂氣絶則脉不通脉不通則血不流血不流則髦色不澤故其面黒如漆柴者血先死壬篤癸死水勝火也足太隂氣絶者則脉不榮肌肉脣舌者肌肉之本也脉不榮則肌肉軟肌肉軟則舌萎人中滿人中滿則脣反脣反者肉先死甲篤乙死木勝土也足少隂氣絶則骨枯少隂者冬脉也伏行而濡骨髓者也故骨不濡則肉不能著也骨肉不相親則肉軟却肉軟却故齒長而垢髮無澤髮無澤者骨先死戊篤已死土勝水也足厥隂氣絶則筋絶厥隂者肝脉也肝者筋之合也筋者聚于隂氣而脉絡于舌本也故脉弗榮則筋急筋急則引舌與卵故脣青舌卷卵縮則筋先死庚篤辛死金勝木也五隂氣俱絶則目系轉轉則目運目運者爲志先死志先死則遠一日半死矣六陽氣絶則隂與陽相離離則腠理發泄絶汗乃出故旦占夕死夕占旦死經脉十二者伏行分肉之間深而不見其常見者足太隂過于外踝之上無所隠故也諸脉之浮而常見者皆絡脉也六經絡手陽朙少陽之大絡起于五指間上合肘中飲酒者衛氣先行皮膚先充絡脉絡脉先盛故衛氣已平營氣乃滿而經脉大盛脉之卒然動者皆}
