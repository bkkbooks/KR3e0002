  - {type: page-break, offset: 45, content: '', id: KR3e0002_WYG_003-3b, image: WYG0733/WYG0733-0341d.png}
  - {type: variant, offset: 45, length: 0, content: '', krp: 則當脉所過者熱腫虛則寒慄不復爲此諸病盛則寫之虛則補之熱則疾之寒則留之䧟下則灸之不盛不虛以經取之盛者人迎大三倍于寸口虛者人迎反小於寸口也胃足陽朙之脉起於鼻之交頞中旁納約字一本作太陽之脉下循鼻外入上齒中還出挾口環脣下交承漿却循頥後下廉出大迎循頰車上耳前過客主人循髮際至額顱其支者從大迎前下人迎循喉嚨入缺盆下膈屬胃絡脾其直者從缺盆下乳内廉下挾臍入氣街中其支者起于胃口下循腹裏下至氣街中而合以下髀關抵伏兎下膝臏中下循脛外廉下足跗入中指内間其支者下廉三寸而别下入中指外間其支者别跗上入大指間出其端是動則病洒洒振寒善呻數欠顔黒病至則惡人與火聞木聲則愓然而驚心欲動獨閉戸塞牖而處甚則欲上高而歌棄衣而走賁響腹脹是為骭厥是主血所生病者狂瘧温淫汗出鼽衂口喎脣胗頸腫喉痺大腹水腫膝臏腫痛循膺乳氣街股伏兎骭外廉足跗上皆痛中指不用氣盛則身以前皆熱其有餘于胃則消榖善饑溺色黄氣}
  - {type: punctuation, offset: 47, content: ，, id: KR3e0002_CHANT_003-bkkpn10}
  - {type: 'tls:seg', offset: 47, content: '', id: KR3e0002_CHANT_003-1a.12}
  - {type: variant, offset: 47, length: 0, content: '', SBCK: 則身以前皆寒慄胃中寒則脹滿爲此諸病盛則寫之虛則補之熱則疾之寒則留之䧟下則灸之不盛不虛以經取之盛者人迎大三倍于寸口虛者人迎反小于寸口也脾足太隂之脉起于大指之端循指内側白肉際過核骨後上内踝前廉上踹内循脛骨後交出厥隂之前上膝股内前廉入腹屬脾絡胃上膈挾咽連舌本散舌下其支者復從胃别上膈注心中是動則病舌本強食則嘔胃脘痛腹脹善噫得後與氣則快然如衰身體皆重是主脾所生病者舌本痛體不能動摇食不下煩心心下急痛溏瘕泄水閉黄疸不能臥强立股膝内腫厥足大指不用爲此諸病盛則寫之虛則補之熱則疾之寒則留之䧟下則灸之不盛不虛以經取之盛者寸口大三倍于人迎虛者寸口反小于人迎心手少隂之脉起于心中出屬心系下膈絡小腸其支者從心系上挾咽繫目系其直者復從心系却上肺下出腋下下循臑内後廉行太隂心主之後下肘内循臂内後廉抵掌後脱骨之端入掌内後亷循小指之内出其端是動則病嗌乾心痛渇而欲飲是爲臂厥是主心所生病者目黄脇痛臑臂内後廉痛厥掌中熱痛爲此諸病盛則寫之虛則補之熱則疾之寒則留之䧟下則灸之不盛不虛以經取之盛者寸口大再倍於人迎虛者寸口反小于人迎也小腸手太陽之脉起于小指之端循手外側上腕出踝中直上循臂骨下廉出肘内側兩筋之間上循臑外後廉出肩解繞肩胛交肩上入缺盆絡心循咽下膈抵胃屬小腸其支者從缺盆循頸上頰至目鋭眥却入耳中其支者别頰上䪼抵鼻至目内眥斜絡于顴是動則病嗌痛頷腫不}
