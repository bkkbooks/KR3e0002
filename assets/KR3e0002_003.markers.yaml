  - {type: variant, offset: 69, length: 0, content: '', SBCK: 凡刺寒熱者皆多血絡必間日而一取之血盡而止乃調其虛實其小而短者少氣甚者寫之則悶悶甚則仆不得言悶則急坐之也手太隂之别名曰列缺起于腕上分間並太隂之經直入掌中散入于魚際其病實則手鋭掌熱虛則欠㰦小便遺數取之去腕半寸别走陽朙也手少隂之别名曰通里去腕一寸半别而上行循經入于心中繫舌本屬目系其實則支膈虛則不能言取之掌後一寸别走太陽也手心主之别名曰内關去腕二寸出于兩筋之間循經以上繫于心包絡心系實則心痛虛則爲頭强取之兩筋間也手太陽之别名曰支正上腕五寸内注少隂其别者上走肘絡肩髃實則節㢮肘廢虛則生肬小者如指痂疥取之所别也手陽朙之别名曰偏歷去腕三寸别入太隂其别者上循臂乘肩髃上曲頰偏齒其别者入耳合于宗脉實則齲聾虛則齒寒痺隔取之所别也手少陽之别名曰外關去腕二寸外遶臂注胷中合心主病實則肘攣虛則不收取之所别也足太陽之别名曰飛陽去踝七寸别走少隂實則鼽窒頭背痛虛則􅍠衂取之所别也足少陽之别名曰光朙去踝五寸别走厥隂下絡足跗實則厥虛則痿躄坐不能起取之所别也足陽朙之别名曰豐隆去踝八寸别走太隂其别者循脛骨外廉上絡頭項合諸經之氣下絡喉嗌其病氣逆則喉痺瘁瘖實則狂巔虛則足不收脛枯取之所别也足太隂之别名曰公孫去本節之後一寸别走陽朙其别者入絡腸胃厥氣上逆則霍亂實則腸中切痛虛則鼓脹取之所别也足少隂之别名曰大鍾當踝後繞跟别走太陽其别者并經上走于心包下外貫腰脊其病氣逆則煩悶實則閉癃虛則腰痛取之所别者也足厥隂之别名曰蠡溝去内踝五寸别走少陽其别者徑脛上睪結于莖其病氣逆則睪腫卒疝實則挺長虛則㬥癢取之所别也住脉之别名曰尾翳下鳩尾散于腹實則腹皮痛虛則癢搔取之所别也督脉之别名曰長强挾膂上項散頭上下當肩胛左右别走太陽入貫膂實則脊強虛則頭重高摇之挾脊之有過者取之所别也脾之大絡名曰大包出淵腋下三寸布胷脇實則身盡痛虛則百節盡皆縱此脉若羅絡之血者皆取之脾之大絡脉也凡此十五絡者實則必見虛則必下視之不見求之上下人經不同絡脉異所别也瞀務音䪼切之劣髀箄音骭旱音憺憺淡音邪同與斜焞焞切土渾肬由音經别第十一黄帝問于歧伯曰余聞人之合于天道也内有五藏以應五音五色五時五味五位也外有六府以應六律六律建隂陽諸經而合之十二月十二辰十二節十二經水十二時十二經脉者此五藏六府之所以應天道夫十二經脉者人之所以生病之所以成人之所以治病之所以起學之所始工之所止也麤之所易上之所難也請問其離合出入奈何歧伯稽首再拜曰朙乎哉問也此麤之所過上之所息也請卒言之足太陽之正别入于膕中其一道下尻五寸别入于肛屬于膀胱散之腎循膂當心入散直者從膂上出于項復屬于太陽此爲一經也足少隂之正至膕中别走太陽而合上至腎當十四顀出屬帶脉直者繫舌本復出于項合于太陽此爲一合成以諸隂之别皆爲正也足少陽之正繞髀入毛際合于厥隂别者入季脇之間循胷裏屬膽散之上肝貫心以上挾咽出頥頷中散于面繫目系合少陽于外眥也足厥隂之正别跗上上至毛際合于少陽與别俱行此爲一合也足陽朙之正上至髀入于腹裏屬胃散之脾上通于心上循咽出于口上頞䪼還繫目系合于陽朙也足太隂之正上至髀合于陽朙與别俱行上結于咽貫舌中此爲三合也手太陽之正指地别于肩解入腋走心繫小腸也手少隂之正别入于淵腋兩筋之間屬于心上走喉嚨出于面合目内眥此爲四合也手少陽之正指天别于巔入缺盆下走三焦散于胷中也手心主之正别下淵腋三寸入胷中别屬三焦出循喉嚨出耳後合少陽完骨之下此爲五合也手陽朙之正從手循膺乳别于肩髃入柱骨下走大腸屬于肺上循喉嚨出缺盆合于陽朙也手太隂之正别入淵腋少隂之前入走肺散之太陽上出缺盆循喉嚨復合陽朙此六合也尻切枯毛肛切胡公頥頷下戸感切上以之切經水第十二黄帝問于歧伯曰經脉十二者外合于十二經水而内屬于五藏六府夫十二經水者其有大小深淺廣狹遠近各不固五藏六府之高下小大受榖之多少亦不等相應奈何夫經水者受水而行之五藏者合神氣魂魄而藏之六府者受榖而行之受氣而􅀭之經脉者受血而營之合而以治奈何刺之深淺灸之壯數可得聞乎歧伯荅曰善哉問也天至高不可度地至廣不可量此之謂也且夫人生于天地之間六合之内此天之高地之廣也非人力之所能度量而至也若夫八尺之士皮肉}
