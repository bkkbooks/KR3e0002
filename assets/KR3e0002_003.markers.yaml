markers:
  front:
  - {type: variant, offset: 0, length: 0, content: '', SBCK: 黄帝素問靈樞經卷之三經脉第十雷公問於黄帝曰禁脉之言凡刺之理經脉爲始營其所行制其度量内次五藏外别六府願盡聞其道黄帝曰人始生先成精精成而腦髓生骨爲榦脉爲營筋爲剛肉爲牆皮膚堅而毛髮長榖入于胃脉道以通血氣乃行雷公曰願卒聞經脉之始生黄帝曰經脉者所以能决死生處百病調虛實不可不通肺手太隂之脉起于中焦下絡大腸還循胃口上膈屬肺從肺系横出腋下下循臑内行少隂心主之前下肘中循臂内上骨下廉入寸口上魚循魚際出大指之端其支者從腕後直出次指内廉出其端是動則病肺脹滿膨膨而喘欬缺盆中痛甚則交兩手而瞀此爲臂厥是主肺所生病者欬上氣喘渴煩心胷滿臑臂内前廉痛厥掌中􅀬氣盛有餘則肩背痛風寒汗出中風}
