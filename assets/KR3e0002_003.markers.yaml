  - {type: variant, offset: 708, length: 305, content: 陽之脈者唯言盡寫三陽之氣令病人恇然不復也奪陰者死言取尺之五里五往者也奪陽者狂正言也覩其色察其目知其散復一其形聽其動靜者言上工知相五色于目有知調尺寸小大緩急滑濇以言所病也知其邪正者知論虛邪與正邪之風也右主推之左持而御之者言持鍼而出入也氣至而去之者言補寫氣調而去之也調氣在于終始一者持心也節之交三百六十五會者絡脈之滲灌諸節者也所謂五藏之氣已絕于內者脈口氣內絕不至反取其外之病處與陽經之合有留鍼以致陽氣陽氣至則內重竭重竭則死矣其死也無氣以動故靜所謂五藏之氣已絕于外者脈口氣外絕不至反取其四末之輸有留鍼以致其陰氣陰氣至則陽氣反入入則逆逆則死矣其死也陰氣有餘故躁所以察其目者五藏使五色循明循明則聲章聲章者則言聲與平生異也, SBCK: ''}
