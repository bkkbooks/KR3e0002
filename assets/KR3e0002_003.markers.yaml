  - {type: variant, offset: 51, length: 1, content: 神, SBCK: 腎足少隂之脉起于小指之下邪走足心出于然谷之下循内踝之後别入跟中以上踹内出膕内廉上股内後廉貫脊屬腎絡膀胱其直者從腎上貫肝膈入肺中循喉嚨挾舌本其支者從肺出絡心注胷中是動則病饑不欲食面如漆柴欬唾則有血喝喝而喘坐而欲起目􅉩􅉩如無所見心如懸若饑狀氣不足則善恐心愓愓如人將捕之是爲骨厥是主腎所生病者口熱舌乾咽腫上氣嗌乾及痛煩心心痛黄疽腸澼脊股内後廉痛痿厥嗜臥足下熱而痛爲此諸病盛則寫之虛則補之熱則疾之寒則留之䧟下則灸之不盛不虛以經取之灸則強食生肉緩帶披髮大杖重履而步盛者寸口大再倍于人迎虛者寸口反小于人迎也心主手厥隂心包絡之脉起于胷中出屬心包絡下膈歷絡三膲其支者循胷出脇下腋三寸上抵腋下循臑内行太隂少隂之間入肘中下臂行兩筋之間入掌中循中指出其端其支者别掌中循小指次指出其端是動則病手心熱臂肘攣急腋腫甚則胷脇支滿心中憺憺火動面赤目黄喜笑不休是主脉所生病者煩心心痛掌中熱爲此諸病盛則寫之虛則補之熱則疾之寒則留之䧟下則灸之不盛不虛以經取之盛者寸口大一倍于人迎虛者寸口反小于人迎也三焦手少陽之脉起于小指次指之端上出兩指之間循手表腕出臂外兩骨之間上貫肘循臑外上肩而交出足少陽之後入缺盆布膻中散落心包下膈循屬三焦其支者從膻中上出缺盆上項繫耳後直上出耳上角以屈下頰至䪼其支者從耳後入耳中出走耳前過}
