  - {type: variant, offset: 154, length: 0, content: '', krp: 之政奈何歧伯日卯酉之紀也飱泄脉小手足温泄易巳四時之變寒暑之勝重隂必陽重陽必隂故隂主寒陽主熱故寒甚則熱熱甚則寒故曰寒生熱熱生寒此隂陽之變也故曰冬傷於寒春生癉熱春傷於風夏生後泄腸澼夏傷於暑秋生痎瘧秋傷於濕冬生咳嗽是謂四時之序也目窠音科窅杳音炬然作及然及許切亦齲齒蠧丘禹切掣切尺制痎瘧瘦瘞也上音皆刺節真邪第七十五黄帝問于歧伯曰余聞刺有五節奈何歧伯曰固有五節一曰振埃二曰發曚三曰去爪四曰徹衣五曰解惑黄帝曰夫子言五節余未知其意歧伯曰振埃者刺外經去陽病也發矇者刺府輸去府病也去爪者刺闗節肢絡也徹衣者盡刺諸陽之竒輸也解惑者盡知調隂陽補寫有餘不足相傾移也黄帝曰刺節言振埃夫子乃言刺外經去陽病余不知其所謂也願卒聞之歧伯曰振埃者陽氣大逆上滿於胷中憤瞋肩息大氣逆上喘喝坐伏病惡埃煙䭇不得息請言振埃尚疾於振埃黄帝曰善取之何如歧伯曰取之天容黄帝曰其欬上氣竆詘胷痛者取之奈何歧伯曰取之廉泉黄帝曰取之有數乎歧伯曰取天容者無過一里取廉泉者血變而止帝曰善哉黄帝曰刺節言發矇余不得其意夫發矇者耳無所聞目無所見夫子乃言刺府輸去府病何輸使然願聞其故歧伯曰妙}
