  - {type: variant, offset: 538, length: 0, content: '', SBCK: 房至畢一十四舎水下五十刻日行半度迴行一舍水下三刻與七分刻之四大要曰常以日之加於宿上也人氣在太陽是故日行一舎人氣行三陽行與隂分常如是無已天與地同紀紛紛􅾼􅾼終而復始一日一夜水下百刻而盡矣􅾼􅾼云普巴切按太素音義九宫八風第七十七立秋二西南方􅀇委秋分七西方倉果立冬六西北方新洛夏至九南方上天招摇中央冬至一北方叶蟄立夏四東南方隂洛春分三東方倉門立春八東北方天留太一常以冬至之日居叶蟄之宫四十六日朙日居天留四十六日朙日居倉門四十六日朙日居隂洛四十五日朙日居天宫四十六日朙日居􅀇委四十六日朙日居倉果四十六日朙日居新洛四十五日朙日復居叶蟄之宫曰冬至矣太一日遊以冬至之日居叶蟄之宫數所在日從一處至九日復反於一常如是無已終而復始太一移日天必應之以風雨以其日風雨則吉嵗美民安少病矣先之則多雨後之則多汗太一在冬至之日有變占在君太一在春分之日有變占在相太一在中宫之日有變占在吏太一在秋分之日有變占在將太一在夏至之日有變占在百姓所謂有變者太一居五宫之日病風折樹木􅀭沙石各以其所主占貴賤因視風所從來而占之風從其所居之鄉来為實風主生長養萬物從其衝後来為虚風傷人者也主殺主害者謹􅀱虚風而避之故聖人日避虚邪之道如避矢石然邪弗能害此之謂也是故太一入徙立於中宫乃朝八風以占吉凶也風從南方來名曰大弱風其傷人也内舎於心外在於脉氣主熱風從西南方來名曰謀風其傷人也内舎於脾外在於肌其氣主為弱風從西方來名曰剛風其傷人也内舎於肺外在於皮膚其氣主為燥風從西北方來名曰折風其傷人也内舎於小腸外在於}
