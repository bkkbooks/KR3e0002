  - {type: variant, offset: 162, length: 1, content: 過, SBCK: 生也黄帝曰余聞氣者有真氣有正氣有邪氣何謂真氣􅄮伯曰真氣者所受於天與穀氣幷而充身也正氣者正風也從一方來非實風又非虚風也邪氣者虚風之賊傷人也其中人也深不能自去正風者其中人也淺合而自去其氣來柔弱不能勝真氣故自去虚邪之中人也洒淅動形起毫毛而發腠理其入深内摶於骨則為骨痺摶於筋則為筋攣摶於脉中則為血閉不通則為癰摶於肉與衛氣相摶陽勝者則為熱隂勝者則為寒寒則真氣去去則虚虚則寒搏於皮膚之間其氣外發腠理開毫毛摇氣徃来行則為痒留而不去則痺衛氣不行則為不仁虚邪徧容於身半其入深内居榮衛榮衛稍衰則真氣去邪氣獨留發為偏枯其邪氣淺者脉偏痛虚邪之入於身也深寒與熱相􅅮久留而内著寒勝其熱則骨疼肉枯熱勝其寒則爛肉腐肌為膿内傷骨内傷骨為骨蝕有所疾前筋筋屈不得伸邪氣居其間而不反發於筋溜有所結氣歸之衛氣留之不得反津液久留合而為腸溜久者數歳乃成以手按之柔已有所結氣歸之津液留之邪氣中之凝結日以易甚連以聚居為昔瘤以手按之堅有所結深中骨氣因於骨骨與氣幷日以益大則為骨疽有所結中於肉宗氣歸之邪留而不去有熱則化而為膿無熱則為肉疽凡此數氣者其發無常處而有常名也䭇噎音竅腊切思亦剽其切匹妙漸洳音}
