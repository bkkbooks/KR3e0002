  - {type: variant, offset: 159, length: 1, content: 麤, krp: 刺之大約鍼之極也神朙之類也口説書卷猶不能及也請言發矇耳尚疾於發矇也黄帝曰善願卒聞之歧伯曰刺此者必於日中刺其聽宫中其眸子聲聞於耳此其輸也黄帝曰善何謂聲聞於耳歧伯曰刺邪以手堅按其兩鼻竅而疾偃其聲必應於鍼也黄帝曰善此所謂弗見為之而無目視見而取之神朙相得者也黄帝曰刺節善去爪夫子乃言刺闗節肢絡願卒聞之歧伯曰腰脊者身之大闗節也肢脛者人之管以趨翔也莖垂者身中之機隂精之候津液之道也故飲食不節喜怒不時津液内溢乃下留於睪血道不通日大不休俛仰不便趨翔不能此病榮然有水不上不下鈹石所取形不可匿常不得蔽故命曰去爪帝曰善黄帝曰刺節言徹衣夫子乃言盡刺諸陽之竒輸未有常處也願卒聞之歧伯曰是陽氣有餘而隂氣不足隂氣不足則内熱陽氣有餘則外熱内熱相摶熱於懷炭外畏綿帛近不可近身又不可近席腠理閉塞則汗不出舌焦脣槁腊乾嗌燥飲食不讓美惡黄帝曰善取之奈何歧伯曰或之於其天府大杼三痏又刺中膂以去其熱補足手太隂以去其汗熱去汗稀疾於徹衣黄帝曰善黄帝曰刺節言解惑夫子乃言盡知調隂陽補寫有餘不足相傾移也惑何以解之歧伯曰大風在身血脉偏虚虚者不足實者有餘輕重不得傾側宛伏不知東西不知南北乍上乍下乍反乍覆顛倒無常甚於迷惑黄帝曰善取之奈何歧伯曰寫其有餘補其不足隂陽平復用鍼若此疾於解惑黄帝曰善請藏之靈蘭之室不敢妄出也黄帝曰余聞刺有五邪何謂五邪歧伯曰病有持癰者有容大者有狹小者有熱者有寒者是謂五邪黄帝曰刺五邪奈何歧伯曰几刺五邪之方不過五章痺熱消滅腫聚散亡寒痺益温小者益陽大者必去請道其方凡刺癰邪無迎隴易俗移性不得膿脆道更行去其鄉不安處所乃散亡諸隂陽過癰者取之其輸寫之凡刺大邪日以小泄奪其有餘乃益虚剽其通鍼其邪肌肉親視之毋有反其真刺諸陽分肉間凡刺小邪日以大補其不足乃無害視其所在迎之界逺近盡至其不得外侵而行之乃自費刺分肉間凡刺熱邪越而蒼出遊不歸乃無病為開通辟門户使邪得出病乃已凡刺寒邪日以温徐徃徐來致其神門戸已閉氣不分虚實得調其氣存也黄帝曰官鍼奈何歧伯曰刺癰者用鈹鍼刺大者用鋒鍼刺小者用員利鍼刺熱者用鑱鍼刺寒者用毫鍼也請言解論與天地相應與四時相副人參天地故可為解下有漸洳上生葦蒲此所以知形氣之多少也隂陽者寒暑也熱則滋雨而在上根荄少汁人氣在外皮膚緩腠理開血氣減汁大泄皮淖澤寒則地凍水冰人氣在中皮膚緻腠理閉汗不出血氣强肉堅濇當是之時善行水者不能徃冰善穿地者不能鑿凍善用鍼者亦不能取四厥血脉凝結堅摶不徃來者亦未可即柔故行水者必待天温冰釋凍解而水可行地可穿也人脉猶是也治厥者必先熨調和其經掌與腋肘與脚項與脊以調之火氣已通血脉乃行然後視其病脉淖澤者刺而平之堅緊者破而散之氣下乃止此所謂以解結者也用鍼之類在於調氣氣積於胃以通營衛各行其道宗氣留於海其下者注於氣街其上者走於息道故厥在於足宗氣不下脉中之血凝而留止弗之火調弗能取之用鍼者必先察其經絡之實虚切而循之按而彈之視其應動者乃後取之而下之六經調者謂之不病雖病謂之自已也一經上實下虚而不通者此必有横絡盛加於大經令之不通視而寫之此所謂解結也上寒下熱先刺其項太陽久留之已刺則熨項與肩胛令熱下合乃止此所謂推而上之者也上熱下寒視其虚脉而陷之於經絡者取之氣下乃止此所謂引而下之者也大熱徧身狂而妄見妄聞妄言視足陽朙及大絡取之虚者補之血而實者寫之因其偃卧居其頭前以兩手四指挾按頸動脉久持之巻而切推下至缺盆中而復止如前熱去乃止此所謂推而散之者也黄帝曰有一脉生數十病者或痛或癰或熱或寒或痒或痺或不仁變化無竆其故何也岐伯曰此皆邪氣}
