  - {type: variant, offset: 153, length: 0, content: '', SBCK: 請聽聖王之道黄帝曰用鍼之理必知形氣之所在左右上下隂陽表裏血氣多少行之逆順出入之合謀伐有過知解結知補虚寫實上下氣門朙通於四海審其所在寒熱淋露以輸異處審於調氣朙於經隧左右肢絡盡知其㑹寒與熱争能合而調之虚與實鄰知決而通之左右不調把而行之朙於逆順乃知可治隂陽不竒故知起時審於本末察其寒熱得邪所在萬刺不殆知官九鍼刺道畢矣朙於五輸徐疾所在屈伸出入皆有條理言隂與五合於五行五藏六府亦有所藏四時八風盡有隂陽各得其位合於朙堂各處色部五藏六府察其所痛左右上下知其寒温何經所在審皮膚之寒温滑濇知其所苦膈有上下知其氣所在先得其道稀而踈之稍深以留故能徐入之大熱在上推而下之從下上者引而去之視前痛者常先取之大寒在外留而補之入於中者從合寫之鍼所不為灸之所宜上氣不足推而􅀭之下氣不足積而從之隂陽皆虚火自當之厥而寒甚骨廉陷下寒過於膝下陵三里隂絡所過得之留止寒入於中推而行之經陷下者火則當之結絡堅緊火所治之不知所苦兩蹻之下男隂女陽良工所禁鍼論畢矣用鍼之服必有法則上視天光下司八正以辟竒邪而觀百姓審於虚實無犯其邪是得天之露遇嵗之虚救而不勝反受其殃故曰必知天忌乃言鍼意法於徃古驗於來今觀於窈㝠通於無竆麤之所不見良工之所貴莫知其形若神髣髴邪氣之中人也洒淅動形正邪之中人也微先見於色不知於其身若在若無若亡若存有形無形莫知其情是故上工之取氣乃救其萌芽下工守其已成因敗其形是故工之用鍼也知氣之所在而守其門户朙於調氣補寫所在徐疾之意所取之處寫必用員切而轉之其氣乃行疾而徐出邪氣乃出伸而迎之遥大其􅔙氣出乃疾補必用方外引其皮令當其門左引其樞右推其膚㣲旋而徐推之必端以正安以静堅心無解欲微以留氣下而疾出之推其皮蓋其外門真氣乃存用鍼之要無忘其神雷公問於黄帝曰鍼論曰得其人乃傳非其人勿言何以知其可傳黄帝曰各得其人任之其能故能朙其事雷公曰願聞官能奈何黄帝曰眀目者可使視色聰耳者可使聽音捷疾辭語者可使傳論語徐而安静手巧而心審諦者可使行鍼艾理血氣而調諸逆順察隂陽而兼諸方緩節柔筋而心和調者可使導引行氣疾毒言語輕人者可使唾癰呪病爪苦手毒為事善傷者可使按積抑痺各得其能方乃可行其名乃彰不得其人其功不成其師無名故曰得其人乃言非其人勿傳此之謂也手毒者可使試按龜置龜於器下而按其上五十日而死矣手甘者復生如故也出入之合作會一本把而行之而行之一本作犯窈㝠㝠㝠一本作論疾診尺第七十四黄帝問于歧伯曰余欲無視色持脉獨調其尺以言其病從外知内為之奈何歧伯曰審其尺之緩急小大滑濇肉之堅脆而病形定矣視人之目窠上㣲癕如新卧起狀其頸脉動時欬按其手足上窅而不起者風水膚脹也人膚滑其淖澤者風也尺肉弱者解㑊安卧脱肉者寒熱不治尺膚滑而澤脂者風也尺膚濇者風痺也尺膚麤如枯魚之鱗者水泆飲也尺膚熱甚脉盛躁者病温也其脉盛而滑者病且出也尺膚寒其脉小者泄少氣尺膚炬然先熱後寒者寒熱也尺膚先寒乆大之而熱者亦寒熱也肘所獨熱者腰以上熱手所獨熱者腰以下熱肘前獨熱者膺前熱肘後獨熱者肩背熱臂中獨熱者腰腹熱肘後麤以下三四寸熱者腸中有蟲掌中熱者腹中熱掌中寒者腹中寒魚上白肉有青血脉者胃中有寒尺炬然熱人迎大者當奪先於九月迎取其化源先寫腎之源也蓋以而取之以補心火新校正云詳水將勝也而取之寫水所以􅀘火也水王十月故先於九月迎抑其運氣扶其不勝不勝大商歳肝不勝大羽歳心不勝歳之大角歳脾不勝大徴歳肺不勝大宫歳腎之氣通宜先助心後扶腎氣宜也如此然太陽司天五歳無使㬥過而生其疾食歳穀以全其眞避虚邪以安其正過木過則肝病生水過則心病生天地之氣過亦則脾病生火過則肺病生土過則腎病生金虚邪謂從衝後來之風也然也歳穀謂黃色黑色穀也適氣同異多少制之同寒濕者燥熱化異寒濕者燥化宮大大角大徵歳異寒濕宜治以燥濕化大商大羽歳同寒濕宜治以燥熱化故同者多之異者少之氣用少多隨其嵗也多謂燥熱少謂燥濕用寒遠寒用涼遠涼用温遠温用熱遠熱食宜同法有假者反常反是者病所謂時也及間氣所在同時謂春夏秋冬以除疾病者則勿遠之如太陽司天寒爲病則遠之卽雖其時若六氣臨御假寒熱温涼有假反常也食同藥法爾若無假反法則爲者假熱以療則熱用不遠夏餘氣例同故曰用寒遠寒及有假者反常等事下文備矣病之媒非方制養生之道新校正云按帝日善陽}
