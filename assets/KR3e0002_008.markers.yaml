  - {type: variant, offset: 3, length: 3, content: 八本神, SBCK: 五十黄帝問于少俞曰有人于此並行並立其年之長少等也衣之厚薄均也卒然遇烈風㬥雨或病或不病或皆病或皆不病其故何也少俞曰帝問何急黄帝曰願盡聞之少俞曰春青風夏陽風秋凉風冬寒風凡此四時之風者其所病各不同形黄帝曰四時之風病人如何少俞曰黄色薄皮弱肉者不勝春之虚風白色薄皮弱肉者不勝夏之虚風青色薄皮弱肉不勝秋之虚風赤色薄皮弱肉不勝冬之虚風也黄帝曰黒色不病乎少俞曰黒色而皮厚肉堅固不傷于四時之風其皮薄而肉不堅色不一者長夏至而有虚風者病矣其皮厚而肌肉堅者長夏至而有虚風不病矣其皮厚而肌肉堅者必重感于寒外内皆然乃病黄帝曰善黄帝曰夫人之忍痛與不忍痛者非勇怯之分也夫勇士之不忍痛者見難則前見痛則止夫怯士之忍痛者聞難則恐遇痛不動夫勇士之忍痛者見難不恐遇痛不動夫怯士之不忍痛者見難與痛目轉面盻恐不能言失氣驚顔色變化乍死乍生余見其然也不知其何由願聞其故少俞曰夫忍痛與不忍痛者皮膚之薄厚肌肉之堅脆緩急之分也非勇怯之謂也黄帝曰願聞勇怯之所由然少俞曰勇士者目深以固長衡直􅀭三焦理横其心端直其肝大以堅其膽滿以傍怒則氣盛而胷張肝舉而膽横眥裂而目􅀭毛起而面蒼此勇士之由然者也黄帝曰願聞怯士之所由然少俞曰怯士者目大而不減隂陽相失其焦理縱􅐳􅚯短而小肝系緩其膽不滿而縱腸胃挺脇下空雖方大怒氣不能滿其胷肝肺雖舉氣衰復下故不能久怒此怯士之所由然者也黄帝曰怯士之得酒怒不避勇士者何藏使然少俞曰酒者水穀之精熟穀之液也其氣慓悍其入于胃中則胃脹氣上逆滿于胷中肝浮膽横當是之時固比于勇士氣衰則悔與勇士同類不知避之名曰酒悖也胃挺便切下古背腧}
