  - {type: 'tls:seg', offset: 95, content: '', id: KR3e0002_CHANT_008-2a.4}
  - {type: variant, offset: 95, length: 0, content: '', SBCK: 願聞人之始生何氣築為基何立而為楯何失而死何得而生歧伯曰以母為基以父為楯失神者死得神者生也黄帝曰何者為神歧伯曰血氣已和榮衛已通五藏已成神氣舍心魂魄畢具乃成為人黄帝曰人之壽夭各不同或夭夀或卒死或病久願聞其道歧伯曰五藏堅固血脉和調肌肉解利皮膚緻密營衛之行不失其常呼吸微徐氣以度行六府化穀津液布􅀭各如其常故能長久黄帝曰人之壽百嵗而死何以致之歧伯曰使道隧以長基牆髙以方通調營衛三部三里起骨髙肉滿百歲乃得終黄帝曰其氣之盛衰以至其死可得聞乎歧伯曰人生十歲五藏始定血氣已通其氣在下故好走二十歲血氣始盛肌肉方長故好趨三十歲五藏大定肌肉堅固血脉盛滿故好步四十歲五藏六府十二經脉皆大盛以平定腠理始踈榮華頽落髪頗斑白平盛不摇故好坐五十歲肝氣始衰肝葉始薄膽汁始滅目始不朙六十歲心氣始衰苦憂悲血氣懈惰故好臥七十歲脾氣虚皮膚枯八十歲肺氣衰魄離故言善悮九十歲腎氣焦四藏經脉空虚百歲五藏皆虚神氣皆去形骸獨居而終矣黄帝曰其不能終壽而死者何如歧伯曰其五藏皆不堅使道不長空外以張喘息㬥疾又卑基牆薄脉少血其肉不石數中風寒血氣虚脉不通真邪相攻亂而相引故中壽而盡也逆順第五十五黄帝問于伯高曰余聞氣有逆順脉有盛衰刺有大約可得聞乎伯高曰氣之逆順者所以應}
