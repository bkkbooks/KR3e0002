  - {type: variant, offset: 81, length: 0, content: '', SBCK: 者也六府者所以受水穀而行化物者也其氣内干五藏而外絡肢節其浮氣之不循經者為衛氣其精氣之行于經者為營氣隂陽相隨外内相貫如環之無端亭亭淳淳乎孰能窮之然其分别隂陽皆有標本虚實所離之處能别隂陽十二經者知病之所生候虚實之所在者能得病之高下知六府之氣街者能知解結契紹于門户能知虚石之堅軟者知補寫之所在能知六經標本者可以無惑于天下歧伯曰博哉聖帝之論臣請盡意悉言之足太陽之本在跟以上五寸中標在兩絡命門命門者目也足少陽之本在竅隂之間標在窻籠之前窻籠者耳也足少隂之本在内踝下上三寸中標在背腧與舌下兩脉也足厥隂之本在行間上五寸所標在背腧也足陽朙之本在厲兊標在人迎頰挾頏顙也足太隂之本在中封前上四寸之中標在背腧與舌本也手太陽之本在外踝之後標在命門之上一寸也手少陽之本在小指次指之間上二寸標在耳後上角下外眥也手陽朙之本在肘骨中上至别陽標在顔下合鉗上也手太隂之本在寸口之中標在腋内動也手少隂之本在鋭骨之端標在背腧也手}
