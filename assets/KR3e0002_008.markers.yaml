  - {type: variant, offset: 2, length: 0, content: '', WYG: 於心以知往今故相氣不微不知是非屬意勿去乃知新故色明不麤沈夭為甚不明不澤其病不甚其色散駒駒然未有聚其病散而氣痛聚未成也腎乘心心先病腎為應色皆如是男子色在于面王為小腹痛下為卵痛其圜直為莖痛高為本下為首狐疝㿉隂之屬也女子在于面王為膀胱子處之病散為痛搏為聚方員左右各如其色形其隨而下至胝為爪有潤如膏狀為暴食不潔左為左右為右其色有邪聚散而不端面色所指者也色者青黒赤白黄皆端滿有别鄉别鄉赤者其色亦大如榆夾在面王為不日其色上銳首空上向下鋭下向在左右如法以五色命藏青為肝赤為心白為肺黄為脾黒為腎肝合筋心合脈肺合脾脾合肉腎合骨也論勇}
