  - {type: variant, offset: 1, length: 0, content: '', SBCK: 末察其寒熱以驗其藏府之病寸口大干人迎一倍病在足厥隂一倍而躁在手心主寸口二倍病在足少隂二倍而躁在手少隂寸口三倍病在足太隂三倍而躁在手太隂盛則脹滿寒中食不化虚則熱中出縻少氣溺色變緊則痛痺代則乍痛乍止盛則寫之虚則補之緊則先刺而後灸之代則取血絡而後調之陷下則徒灸之陷下者脉血結于中中有著血血寒故宜灸之不盛不虚以經取之寸口四倍者名曰内闗内闗者且大且數死不治必審察其本末之寒温以驗其藏府之病通其營輸乃可傳于大數大數曰盛則徒寫之虚則徒補之緊則灸刺且飲藥陷下則徒灸之不盛不虚以經取之所謂經治者飲藥亦曰灸刺脉急則引脉大以弱則欲安静用力無勞也歃切楚洽五色第四十九雷公問于黄帝曰五色獨決于朙堂乎小子未知其所謂也黄帝曰朙堂者鼻也闕者眉間也庭者顔也蕃者頰側也蔽者耳門也其間欲方大去之十步皆見于外如是者壽必中百歲雷公曰五官之辨奈何黄帝曰朙堂骨高以起平以直五藏次于中央六府挾其兩側首面上于闕庭王宫在于下極五藏安于胷中真色以致病色不見朙堂潤澤以情五官惡得無辨乎雷公曰其不辨者可得聞乎黄帝曰五色之見也各出其色部部骨陷者必不免于病矣其色部乘襲者雖病甚不死矣雷公曰官五色奈何黄帝曰青黒為痛黄赤為熱白為寒是謂五官雷公曰病之益甚與其方衰如何黄帝曰外内皆在焉切其脉口滑小緊以沉者病益甚在中人迎氣大緊以浮者其病益甚在外其脉口浮滑者病日進人迎沉而滑者病日損其脉口滑以沉者病日進在内其人迎脉滑盛以浮者其病日進在外脉之浮沉及人迎與寸口氣小大等者病難已病之在藏沉而大者易已小爲逆病在府浮而大者其病易已人迎盛堅者傷於寒氣口盛堅者傷於食雷公曰以色言病之間甚奈何黄帝曰其色麤以朙沉大者爲甚其色上行者病益甚其色下行如雲徹散者病方以五色各有藏部有外部有内部也色從外部走内部者其病從外走内其色從内走外者其病從内走外病生於内者先治其隂後治其陽反者益甚其病生於陽者先治其外後治其内反者益甚其脉滑大以代而長者病從外來目有所見志有所惡此陽氣之并也可變而已雷公曰小子聞風者百病之始也厥逆者寒濕之起也别之奈何黄帝曰常候闕中薄澤為風冲濁為痺在地為厥此其常也各以其色言其病雷公曰人不病卒死何以知之黄帝曰大氣入于藏府者不病而卒死矣雷公曰病小愈而卒死者何以知之黄帝曰赤色出兩顴大如母指者病雖小愈必卒死黒色出於庭大如母指必不病而卒死雷公再拜曰善哉其死有期乎黄帝曰察色以言其時雷公曰善乎願卒聞之黄帝曰庭者首面也闕上者咽喉也闕中者肺也下極者心也直下者肝也肝左者膽也下者脾也方上者胃也中央者大腸也挾大腸者腎也當腎者臍也面王以上者小腸也面王以下者膀胱子處也顴者肩也顴後者臂也臂下者手也目内眥上者膺乳也挾繩而上者背也循牙車以下者股也中央者膝也膝以下者脛也當脛以下者足也巨分者股裏也巨屈者膝臏也此五藏六府肢節之部也各有部分有部分用隂和陽用陽和隂當朙部分萬舉萬當能别左右是謂大道男女異位故曰隂陽審察澤夭謂之良工沉濁為内浮澤為外黄赤為風青黒為痛白為寒黄而膏潤為膿亦甚者為血痛甚為攣寒甚為皮不仁五色各見其部察其浮沉以知淺深察其澤夭以觀成敗察其散搏以知逺近視色上下以知病處積}
