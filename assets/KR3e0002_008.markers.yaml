  - {type: variant, offset: 0, length: 0, content: '', SBCK: 黃帝素問靈樞經卷之八禁服第四十八雷公問于黄帝曰細子得受業通于九鍼六十篇旦暮勤服之近者編絶久者簡垢然尚諷誦弗置未盡解於意矣外揣言渾束為一未知所謂也夫大則無外小則無内大小無極髙下無度束之奈何士之才力或有厚薄智慮􅄶淺不能博大深奥自强于學若細子細子恐其散于後世絶于子孫敢問約之奈何黄帝曰善乎哉問也此先師之所禁坐私傳之也割臂㰱血之盟也子若欲得之何不齋乎雷公再拜而起曰請聞命于是也乃齋宿三日而請曰敢問今日正陽細子願以受盟黄帝乃與俱入齋室割臂歃血黄帝親祝曰今日正陽歃血􅀓方有敢背此言者反受其殃雷公再拜曰細子受之黄帝乃左握其手右授之書曰愼之愼之吾為子言之凡刺之理經脉為始營其所行知其度量内刺五藏外刺六府審察衛氣為百病母調其虚實虚實乃止寫其血絡血盡不殆矣雷公曰此皆細子之所以通未知其所約也黄帝曰夫約方者猶約囊也囊滿而弗約則輸泄方成弗約則神與弗俱雷公曰願為下材者勿滿而約之黄帝曰未滿而知約之以為工不可以為天下師雷公曰願聞為工黄帝曰寸口主中人迎主外兩者相應俱徃俱來若引繩大小齊等春夏人迎微大秋冬寸口微大如是者名曰平人人迎大一倍于寸口病在足少陽一倍而躁在手少陽人迎二倍病在足太陽二倍而躁病在手太陽人迎三倍病在足陽朙三倍而躁病在手陽朙盛則為熱虚則為寒緊則為痛痺代則乍甚乍間盛則冩之虚則補之緊痛則取之分肉代則取血絡且飲藥陷下則灸之不盛不虚以經取之名曰經刺人迎四倍者且大且數名曰溢陽溢陽為外格死不治必審按其}
