  - {type: variant, offset: 88, length: 0, content: '', SBCK: 言氣街胷氣有街腹氣有街頭氣有街脛氣有街故氣在頭者止之于腦氣在胷者止之膺與背腧氣在腹者止之背腧與衝脉干臍左右之動脉者氣在脛者止之于氣街與承山踝上以下取此者用毫鍼必先按而在久應于手乃刺而予之所治者頭痛眩仆腹痛中滿㬥脹及有新積痛可移者易已也積不痛難已也鉗音鈐論痛第五十三黄帝}
