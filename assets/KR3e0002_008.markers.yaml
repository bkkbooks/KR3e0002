  - {type: variant, offset: 89, length: 0, content: '', SBCK: 于少俞曰筋骨之强弱肌肉之堅脆皮膚之厚薄腠理之疎密各不同其于鍼石火焫之痛何如腸胃之厚薄堅脆亦不等其於毒藥何如願盡聞之少俞曰人之骨强筋弱肉緩皮膚厚者耐痛其于鍼石之痛火焫亦然黄帝曰其耐火焫者何以知之少俞荅曰加以黒色而美骨者耐火焫黄帝曰其不耐鍼石之痛者何以知之少俞曰堅肉薄皮者不耐鍼石之痛于火焫亦然黄帝曰人之病或同時而傷或易已或難已}
