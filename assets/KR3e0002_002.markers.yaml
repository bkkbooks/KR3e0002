  - {type: variant, offset: 3, length: 0, content: '', WYG: 六法律黄帝問於少師曰余聞人之生也有剛有柔有弱有强有短有長有隂有陽願聞其方少師答曰隂中有隂陽中有陽審知隂陽刺之有方得病所始刺之有理謹度病端與時相應内合於五藏六府外合於筋骨皮膚是故内有隂陽外亦有隂陽在内者五藏為隂六府為陽在外者筋骨為隂皮膚為陽故曰病在隂之隂者刺隂之滎輸病在陽之陽者刺陽之合病在陽之隂者刺隂之經病在隂之陽者刺絡脈故曰病在陽者命曰風病在隂者命曰痺隂陽俱病命曰風痺病有形而不痛者陽之類也無形而痛者隂之類也無形而痛者其陽完而隂傷之也急治其隂無攻其陽有形而不痛者其隂完而陽傷之也急治其陽無攻其隂隂陽俱動乍有形乍無形加以煩心命曰隂勝其陽此謂不表不裏其形不乆黄帝問於伯髙曰余聞形氣病之先後外内之應柰何伯髙答曰風寒傷形憂恐忿怒傷氣氣傷藏乃病藏寒傷形乃應形風傷筋脈筋脈乃應此形氣外内之相應也黄帝曰刺之奈何伯髙答曰病九日者三刺而已病一月者十刺而已多少逺近以此衰之乆痺不去身者視其血絡盡出其血黄帝曰外内之病難易之治奈何伯髙答曰形先病而未入藏者刺之半其日藏先病而形乃應者刺之倍其日此月内難易之應也黄帝問於伯髙曰余聞形有緩急氣有盛衰骨有大小肉有堅脆皮有厚薄其以立夀夭奈何伯髙答曰形與氣相任則夀不相任則夭皮與肉相果則夀不相果則夭血氣經絡勝形則夀不勝形則夭黄帝曰何謂形之緩急伯髙答曰形充而皮膚緩者則夀形充而皮膚急者則夭形充而脈堅大者順也形充而脈小以弱者氣衰衰則危矣若形充而顴不起者骨小骨小而夭矣形充而大肉䐃堅而有分者肉堅肉堅則夀矣形充而大肉無分理不堅者内脆肉脆則夭矣此天之生命所以立形定氣而視夀夭者必明乎此立形定氣而後以臨病人決死生黄帝曰余聞夀夭無以度之伯髙答曰牆基卑髙不及其地者不滿三十而死其有因加疾者不及}
