  - {type: variant, offset: 4, length: 0, content: '', WYG: 十而死也黄帝曰形氣之相勝以立夀夭奈何伯髙答曰平人而氣勝形者夀病而形肉脱氣勝形者死形勝氣者危矣黄帝曰余聞刺有三變何謂三變伯髙答曰有刺營者有刺衛者有刺寒痺之留經者黄帝曰刺三變者奈何伯髙答曰刺營者出血刺衛者出氣刺寒痺者内熱黄帝曰營衛寒痺之為病奈何伯髙答曰營之生病也寒熱少氣血上下行衛之生病也氣痛時來時去怫愾賁響風寒客于腸胃之中寒痺之為病也留而不去時痛而皮不仁黄帝曰刺寒痺内熱奈何伯髙答曰刺布衣者以火焠之刺大人者以藥熨之黄帝曰藥熨奈何伯髙答曰用淳酒二十升蜀椒一升乾姜一斤桂心一斤凡四種皆㕮咀漬酒中用綿絮一斤細白布四丈并内酒中置酒馬矢煴中葢封塗勿使泄五日五夜出布綿絮曝乾之乾復漬以盡其汁毎漬必晬其日乃出乾乾并用滓與綿絮複布為複巾長六七尺為六七巾則用之生桑炭炙巾以熨寒痺所刺之處令熱入至于病所寒複炙巾以熨之三十遍而止汗出以巾拭身亦三十遍而止起步内中無見風毎刺必熨如此病已矣此所謂内熱也顴音權䐃堅上渠永切腹中䐃脂怫愾上扶勿切鬱也為意舒下許氣切㕮咀上音甫下才與切煴於文切烟煴氣也晬其日上音醉同也官針第七法星凡刺之要官針最妙九針之宜各有所為長短大小各有所施也不得其用病弗能移疾淺針深内傷良肉皮膚為癰病深針淺病氣不寫支為大膿病小針大氣寫大甚疾必為害病大針小氣不泄寫亦復為敗失針之宜大者寫小者不移已言其過請言其所施病在皮膚無常處者取以鑱針於病所膚白勿取病在分内間取以員針於病所病在經絡痼痺者取以鋒針病在脈氣少當補之者取之鍉針於井滎分輸病為大膿者取以鈹針病痺氣暴發者取以貟利針病痺氣痛而不去者取以毫針病在中者取以長針病水腫不能通闗節者取以大針病在五藏固居者取以鋒針寫於井滎分輸取以四時凡刺有九日應九變一曰輸刺輸刺者刺諸經滎輸藏腧也二曰逺道刺逺道刺者病在上取之下刺府腧也三曰經刺經刺者刺大經之結絡經分也四曰絡刺絡刺者刺小絡之血脈也五曰分刺分刺者刺分肉之間也六曰大寫刺大寫刺者刺大膿以鈹針也七曰毛刺毛刺者刺浮痺皮膚也八曰巨刺巨刺者左取右右取左九曰焠刺焠刺者刺燔針則取痺也凡刺有十二節以應十二經一曰偶刺偶刺者以手直心若背直痛所一刺前一刺後以治心痺刺此者傍針之也二曰報刺報刺者刺痛無常處也上下行者直内無拔針以左手隨病所按之乃出針復刺之也三曰恢刺恢刺直刺傍之舉之前後恢筋急以治筋痺也四曰齊刺齊刺者直入一傍入二以治寒氣小深者或曰三刺三刺者治痺氣小深者也五曰揚刺揚刺者正内一傍内四而浮之以治寒氣之博大者也六曰直針刺直針刺者引皮乃刺之以治寒氣之淺者也七曰輸刺輸刺者直入直出稀發針而深之以治氣盛而熱者也八曰短刺短刺者刺骨痺稍摇而深之致針骨所以上下摩骨也九曰浮刺浮刺者傍入而浮之以治肌急而寒者也十曰隂刺隂刺者左右率刺之以治寒厥中寒厥足踝後少隂也十一曰傍針刺傍針刺者直刺傍刺各一以治留痺乆居者也十二曰賛刺賛刺者直入直出數發針而淺之出血是謂治癰腫也脈之所居深不見者刺之微内針而乆留之以致其空脈氣也脈淺者勿刺按絶其脈乃刺之無令精出獨出其邪氣耳所謂三刺則榖氣出者先淺刺絶皮以出陽邪再刺則隂邪出者少益深絶皮致肌肉未入分肉間也已入分肉之間則榖氣出故刺法曰始刺淺之以逐邪氣而來血氣後刺深之以致隂氣之邪最後刺極深之以下榖氣此之謂也故用針者不知年之所加氣之盛衰虚實之所起不可以為工也凡刺有五以應五藏一曰半刺半刺者淺内而疾發針無針傷肉如拔毛狀以取皮氣此肺之應也二曰豹文刺豹文刺者左右前後針之中脈為故以取經絡之血者此心之應也三曰闗刺闗刺者直刺左右盡筋上以取筋痺慎無出血此肝之應也或曰淵刺一曰豈刺四曰合谷刺合谷刺者左右雞足針于分肉之間以取肌痺此脾之應也五曰輸刺輸刺者直入直出深内之至骨以取骨痺此腎之應也燔針上音煩􅀈刺上苦回切大也一}
