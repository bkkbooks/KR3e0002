  - {type: variant, offset: 18, length: 0, content: '', SBCK: 法先必本于神血脉營氣精神此五藏之所藏也至其􅁋泆離藏則精失魂魄飛􅀭志意恍亂智慮去身者何因而然乎夭之罪與人之過乎何謂德氣生精神魂魄心意志思智慮請問其故歧伯荅曰天之在我者德也地之在我者氣也德流氣薄而生者也故生之來謂之精兩精相搏謂之神隨神往來者謂之魂並精而出入者謂之魄所以任物者謂之心心有所憶謂之意意之所存謂之志因志而存變謂之思因思而遠慕謂之慮因慮而處物謂之智故智者之養生也必順四時而適寒暑和喜怒而安居處節隂陽而調剛柔如是則僻邪不至長生久視是故怵惕思慮者則傷神神傷則恐懼流􅁋而不止因悲哀動中者竭絶而失生喜樂者神憚散而不藏愁憂者氣閉塞而不行盛怒者迷惑而不治恐懼者神蕩憚而不收心怵愓思慮則傷神神傷則恐懼自失破䐃脫肉毛悴色夭死于冬脾愁憂而不解則傷意意傷則悗亂四肢不舉毛悴色夭死於春肝悲哀動中則傷魂魂傷則狂忘不精不精則不正當人隂縮而攣筋兩脇骨不舉毛悴色夭死於秋肺喜樂無極則傷魄魄傷則狂狂者意不存人皮革焦毛悴色夭死於夏腎盛怒而不止則傷志志傷則喜忘其前言腰脊不可以俛仰屈伸毛悴色夭死於季夏恐懼而不解則傷精精傷則骨痠痿厥精時自下是故五藏主藏精者也不可傷傷則失守而隂虛隂虚則無氣無氣則死矣是故用鍼者察觀病人之態以知精神魂魄之存亡得失之意五者以傷鍼不可以治之也肝藏血血舎魂肝氣虛則恐實則怒脾藏營營舎意脾氣虛則四肢不用五藏不安實則腹脹經溲不利心藏脉脉舎神心氣虚則悲實則笑不休肺藏氣氣舎魄肺氣虛則鼻塞不利少氣實則喘喝胷盈仰息腎藏精精舎志腎氣虛則厥實則脹五藏不安必審五藏之病形以知其氣之虛實謹而調之也悗亂悶上音怵惕的切􅋺懼也上恥律切下他終始第九法野凡刺之}
