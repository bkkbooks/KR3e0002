  - {type: variant, offset: 20, length: 0, content: '', krp: 通隂陽五藏爲隂六府爲陽傳之後世以血爲盟敬之者昌慢之者亡無道行私必得天殃謹奉天道請言終始終始者經脉爲紀持其脉口人迎以知隂陽有餘不足平與不平天道畢矣所謂平人者不病不病者脉口人迎應四時也上下相應而俱徃來也六經之脉不結動也本末之寒温之相守司也形肉血氣必相稱也是謂平人少氣者脉口人迎俱少而不稱尺寸也如是者則隂陽俱不足補陽則隂竭寫隂則陽脱如是者可将以甘藥不可飲以至劑如此者弗炙不已者因而寫之則五藏氣壊矣人迎一盛病在足少陽一盛而躁病在手少陽人迎二盛病在足太陽二盛而躁病在手太陽人迎三盛病在足陽朙三盛而躁病在手陽朙人迎四盛且大且數名曰溢陽溢陽爲外格脉口一盛病在足厥隂厥隂一盛而躁在手心主脉口二盛病在足少隂二盛而躁在手少隂脉口三盛病在足太隂三盛而躁在手太隂脉口四盛且大且數者名曰溢隂溢隂爲内關内關不通死不治人迎與太隂脉口俱盛四倍以上命曰關格關格者與之短期人迎一盛寫足少陽而補足厥隂二寫一補日一取之必切而驗之踈取之上氣和乃止人迎二盛寫足太陽補足少隂二冩一補二日一取之必切而驗之踈取之上氣和乃止人迎三盛寫足陽朙而補足太隂二寫一補日二取之必切而驗之踈取之上氣和乃止脉口一盛寫足厥隂而補足少陽二補一寫日一取之必切而驗之踈而取上氣和乃止脉口二盛寫足少隂而補足太陽二補一寫二日一取之必切而驗之踈取之上氣和乃止脉口三盛寫足太隂而補足陽朙二補一寫日二取之必切而驗之踈而取之上氣和乃止所以日二取之者太陽主胃大富于榖氣故可日二取之也人迎與脉口俱盛三倍以上命曰隂陽俱溢如是者不開則血脉閉塞氣無所行流淫于中五藏内傷如此者因而灸之則變易而爲他病矣凡刺之道氣調而止補隂瀉陽音氣益彰耳目聰朙反此者血氣不行所謂氣至而有効者寫則益虛虛者脉大如其故而不堅也堅如其故者適雖言故病未去也補則益實實者脉大如其故而益堅也夫如其故而不堅者適雖言快病未去也故補則實寫則虛痛雖不隨鍼病必衰去必先}
