  - {type: variant, offset: 1324, length: 521, content: 間為滎注于本節之後三間為腧過于合谷合谷在大指歧骨之間為原行于陽谿陽谿在兩筋間陷者中也為經入于曲池在肘外輔骨陷者中屈臂而得之為合手陽明也是謂五藏六府之腧五五二十五腧六六三十六腧也六府皆出足之三陽上合于手者也缺盆之中任脈也名曰天突一次任脈側之動脈足陽明也名曰人迎二次脈手陽明也名曰扶突三次脈手太陽也名曰天窗四次脈足少陽也名曰天容五次脈手少陽也名曰天牖六次脈足太陽也名曰天柱七次脈頸中央之脈督脈也名曰風府腋內動脈手太陰也名曰天府腋下三寸手心主也名曰天池刺上關者呿不能欠刺下關者欠不能呿刺犢鼻者屈不能伸刺兩關者伸不能屈足陽明挾喉之動脈也其腧在膺中手陽明次在其腧外不至曲頰一寸手太陽當曲頰足少陽在耳下曲頰之後手少陽出耳後上加完骨之上足太陽挾項大筋之中髮際陰尺動脈在五里五腧之禁也肺合大腸大腸者傳道之府心合小腸小腸者受盛之府肝合膽膽者中精之府脾合胃胃者五穀之府腎合膀胱膀胱者津液之府也少陽屬腎腎上連肺故將兩藏三焦者中瀆之府也水道出焉屬膀胱是孤之府也是六府之所與合者春取絡脈諸滎大經分肉之間甚者深取之間者淺取之夏取諸腧孫絡肌肉皮膚之上秋取諸合餘如春法冬取諸井諸腧之分欲深而留之此四時之序氣之所處病之所舍藏之所宜轉筋者立而取之可令遂已痿厥者張而刺之可令立快也, SBCK: ''}
