  - {type: variant, offset: 1103, length: 1, content: 少, SBCK: 屈而不伸者其病在筋伸而不屈者其病在骨在骨守骨在筋守筋補須一方實深取之稀按其痏以極出其邪氣一方虛淺刺之以養其脉疾按其痏無使邪氣得入邪氣來也緊而疾邪氣來也徐而和脉實者深刺之以泄其氣脉虛者淺刺之使精氣無得出以養其脉獨出其邪氣刺諸痛者其脉皆實故曰從腰以上者手太隂}
