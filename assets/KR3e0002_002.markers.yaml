markers:
  front:
  - {type: variant, offset: 0, length: 0, content: '', SBCK: 黄帝素問靈樞經卷之二根結第五法音歧伯曰天地相感寒暖相移隂陽之道孰少孰多隂道偶陽道竒發于春夏隂氣少陽氣多隂陽不調何補何寫發于秋冬陽氣少隂氣多隂氣盛而陽氣衰故莖葉枯槁濕雨下歸隂陽相移何寫何補竒邪離經不可勝數不知根結五藏六府折關敗樞開闔而走隂陽大失不可復取九鍼之玄要在終始故能知終始一言而畢不知終始鍼道咸絶太陽根于至隂結于命門命門者目也陽朙根于厲兊結于顙大顙大者鉗耳也少陽根于竅隂結于窻籠窻籠者耳中也太陽為開陽朙為闔少陽為樞故開折則肉節瀆而㬥病起矣故㬥病者取之太陽視有餘不足瀆者皮肉宛膲而弱也闔折則氣無所止息而痿疾起矣故痿疾者取之陽朙視有餘不足無所止息者眞氣稽留邪氣居之也樞折即骨繇而不安於地故骨繇者取之少陽視有餘不足骨繇者節緩而不收也所謂骨繇者摇故也當竆其}
