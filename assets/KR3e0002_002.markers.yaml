  - {type: variant, offset: 2, length: 0, content: '', krp: 膈洞膈洞者取之太隂視有餘不足故開折者氣不足而生病也闔折即氣絶而喜悲悲者取之厥隂視有餘不足樞折則脉有所結而不通不通者取之少隂視有餘不足有結者皆取之不足足太陽根于至隂溜于京骨注于崑崙入于天柱飛揚也足少陽根于竅隂溜于丘墟注于陽輔入于天容光朙也足陽朙根于厲兌溜于衝陽注于下陵入于人迎豐隆也手太陽根于少澤溜于陽谷注于少海入于天窻支正也手少陽根于關衝溜于陽池注于支溝入于天牖外關也手陽朙根于商陽溜于合谷注于陽谿入于扶突偏歷也此所謂十二經者盛絡皆當取之一日一夜五十營以營五藏之精不應數者名曰狂生所謂五十營者五藏皆受氣持其脉口數其至也五十動而不一代者五藏皆受氣四十動一代者一藏無氣三十動一代者二藏無氣二十動一代者三藏無氣十動一代者四藏無氣不滿十動一代者五藏無氣子之短期要在終始所謂五十動而不一代者以爲常也以知五藏之期子之短期者乍數乍踈也黄帝曰逆順五體者言人骨節之小大肉之堅脆皮之厚薄血之清濁氣之滑濇脉之長短血之多少經絡之數余已知之矣此皆布衣匹夫之士也夫王公大人血食之君身體柔脆肌肉軟弱血氣慓悍滑利其刺之徐疾淺深多少可得同之乎歧伯荅曰膏粱菽藿之味何可同也氣滑即出疾其氣濇則出遲氣悍則鍼小而入淺氣濇則鍼大而入深深則欲留淺則欲疾以此觀之刺布衣者深以留之刺大人者微以徐之此皆因氣慓悍滑利也黄帝曰形氣之逆順奈何歧伯曰形氣不足病氣有餘是邪勝也急寫之形氣有餘病氣不足急補之形氣不足病氣不足此隂陽氣俱不足也不可刺之刺之則重不足重不足則隂陽俱竭血氣皆盡五藏空虛筋骨髓枯老者絶滅壯者不復矣形氣有餘病氣有餘此謂隂陽俱有餘也急寫其邪調其虛實故曰有餘者寫之不足者補之此之謂也故曰刺不知逆順眞邪相搏滿而補之則隂陽四溢腸胃充郭肝肺内䐜隂陽相錯虛而寫之則經脉空虛血氣竭枯腸胃㒤辟皮膚薄著毛腠夭膲子之死期故曰用鍼之要在于知調隂與陽調隂與陽精氣乃光合形與氣使神内藏故曰上工平氣中工亂脉下工絶氣危生故曰下工不可不愼也必審五藏變化之病五脉之應經絡之實虛皮之柔麤而後取之也骨繇搖音慓悍岸切勇㨗貌也上比昭切下侯陽道竒箕音夀夭剛柔}
