  - {type: variant, offset: 1105, length: 1, content: 經, SBCK: 朙皆主之從腰以下者足太隂陽朙皆主之病在上者下取之病在下者高取之病在頭者取之足病在足者取之膕病生於頭者頭重生於手者臂重生於足者足重治病者先刺其病所從生者也春氣在毛夏氣在皮膚秋氣在分肉冬氣在筋骨刺此病者各以其時為齊故刺肥人者秋冬之齊刺瘦人者以春夏之齊病痛者隂也痛而以手按之不得者隂也深刺之病在上者陽也病在下者隂也癢者陽也淺刺之病先起隂者先治其隂而後治其陽病先起陽者先治其陽而後治其隂刺熱厥者留鍼反爲寒刺寒厥者留鍼反爲熱刺熱厥者二隂一陽刺寒厥者二陽一隂所謂二隂者二刺隂}
