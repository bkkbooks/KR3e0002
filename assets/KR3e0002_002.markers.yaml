  - {type: variant, offset: 12, length: 0, content: '', SBCK: 少師曰余聞人之生也有剛有柔有弱有强有短有長有隂有陽願聞其方少師荅曰隂中有隂陽中有陽審知隂陽刺之有方得病所始刺之有理謹度病端與時相應内合于五藏六府外合于筋骨皮膚是故内有隂陽外亦有隂陽在内者五藏為隂六府爲陽在外者筋骨爲隂皮膚爲陽故曰病在隂之隂者刺隂之滎輸病在陽之陽者刺陽之合病在陽之隂者刺隂之經病在隂之陽者刺絡脉故曰病在陽者命曰風病在隂者命曰痺病隂陽俱病命曰風痺病有形而不痛者陽之類也無形而痛者隂之類也無形而痛者其陽完而隂傷之也急治其隂無攻其陽有形而不痛者其隂完而陽傷之也急治其陽無攻其隂隂陽俱動乍有形乍無形加以煩心命曰隂勝其陽此謂不表不裏其形不乆黄帝問於伯高曰余聞形氣病之先後外内之應奈何伯高荅曰風寒傷形憂恐忿怒傷氣氣傷藏乃病藏寒傷形乃應形風傷筋脉筋脉乃應此形氣外内之相應也黄帝曰刺之奈何伯高荅曰病九日者三刺而已病一月者十刺而已多少逺近以此衰之久痺不去身者視其血絡盡出其血黄帝曰外内之病難易之治奈何伯高荅曰形先病而未入藏者刺之半其日藏先病而形乃應者刺之倍其日此月内難易之應也黄帝問於伯髙曰余聞形有緩急氣有盛衰骨有大小肉有堅脆皮有厚薄其以立夀夭奈何伯高荅曰形與氣相任則夀不相任則夭皮與肉相果則夀不相果則夭血氣經絡勝形則夀不勝形則夭黄帝曰何謂形之緩急伯高荅曰形充而皮膚緩者則夀形充而皮膚急者則夭形充而脉堅大者順也形充而脉小以弱者氣衰衰則危矣若形充而顴不起者骨小骨小而夭矣形充而大肉䐃堅而有分者肉堅肉堅則夀矣形充而大肉無分理不堅者肉脆肉脆則夭矣此天之生命所以立形定氣而視夀夭者必朙乎此立形定氣而後以臨病人決死生黄帝曰余聞夀夭無以度之伯高荅曰牆基卑高不及其地者不滿三十而死其有因加疾者不及二十而死也黄帝曰形氣之相勝以立夀夭奈何伯高荅曰平人而氣勝形者夀病而形肉脱氣勝形者死形勝氣者危矣黄帝曰余聞刺有三變何謂三變伯高荅曰有刺營者有刺衛者有刺寒痺之留經者黄帝曰刺三變者奈何伯高荅曰刺營者出血刺衛者出氣刺寒痺者内熱黄帝曰營衛寒痺之爲病奈何伯高荅曰營之生病也寒熱少氣血上下行衛之生病也氣痛時來時去怫愾賁響風寒客于腸胃之中寒痺之為病也留而不去時痛而皮不仁黄帝曰刺寒痺内熱奈何伯高荅曰刺布衣者以火焠之刺大人者以藥熨之黄帝曰藥熨奈何伯高荅曰用淳酒二十升蜀椒一升乾薑一斤桂心一斤凡四種皆㕮咀漬酒中用綿絮一斤細白布四丈幷内酒中置酒馬矢煴中蓋封塗勿使泄五日五夜出布綿絮􅤱乾之乾復漬以盡其汁毎漬必晬其日乃出乾乾幷用滓與綿絮複布爲複巾長六七尺爲六七巾則用之生桑炭炙巾以熨寒痺所刺之處令熱入至于病所寒復炙巾以熨之三十遍而止汗出以巾拭身亦三十遍而止起步内中無見風毎刺必熨如此病已矣此所謂内熱也顴權音䐃堅腹中䐃脂上渠永切怫愾爲意舒下許氣上扶勿切鬱也切㕮咀才與切上音甫下官鍼第七法星凡刺之要官鍼最妙九鍼之宜各有所爲長短大小各有所施也不得其用病弗能移疾淺鍼深内傷良内皮膚爲癰病深鍼淺病氣不寫支爲大膿病小鍼大氣寫太甚疾必爲害病大鍼小氣不泄寫亦復爲敗失鍼之宜大者寫小者不移已言其過請言其所施病在皮膚無常處者取以鑱鍼于病所膚白勿取病在分肉間取以員鍼于病所病在經絡痼痺者取以鋒鍼病在脉氣少當補之者取以鍉鍼于井滎分輸病爲大膿者取以鈹鍼病痺氣㬥發者取以員利鍼病痺氣痛而不去者取以毫鍼病在中者取以長鍼病水腫不能通關節者取以大鍼病在五藏固居者取以鋒鍼寫于井滎分輸取以四時凡刺有九日應九變一曰輸刺輸刺者刺諸經滎輸藏腧也二曰逺道刺逺道刺者病在上取之下刺府腧也三曰經刺經刺者刺大經之結絡經分也四曰絡刺絡刺者刺小絡之血脉也五曰分刺分刺者刺分肉之間也六曰大寫刺大寫刺者刺大膿以鈹鍼也七曰毛刺毛刺者刺浮痺皮膚也八曰巨刺巨刺者左取右右取左九曰焠刺焠刺者刺燔鍼則取痺也凡刺有十二節以應十二經一曰偶刺偶刺者以手直心若背直痛所一刺前一刺後以治心痺刺此者傍鍼之也二曰報刺報刺者刺痛無常處也上下行者直内無拔鍼以左手隨病所按之乃出鍼復刺之也三曰恢刺恢刺直刺傍之舉之前後恢筋急以治筋痺也四曰齊刺齊刺者直入一傍入二以治寒氣小深者或曰三刺三刺者治痺氣小深者也五曰􅀭刺􅀭刺者正内一傍内四而浮之以治寒氣之愽大者也六曰直鍼刺直鍼刺者引皮乃刺之以治寒氣之淺者也七曰輸刺輸刺者直入直出稀發鍼而深之以治氣盛而熱者也八曰短刺短刺者刺骨痺稍摇而深之致鍼骨所以上下摩骨也九曰浮刺浮刺者傍入而浮之以治肌急而寒者也十曰隂刺隂刺者左右率刺之以治寒厥中寒厥足踝後少隂也十一曰傍鍼刺傍鍼刺者直刺傍刺各一以治留痺久居者也十二曰賛刺賛刺者直入直出數發鍼而淺之出血是謂治癰腫也脉之所居深不見者刺之微内鍼而久留之以致其空脉氣也脉淺者勿刺按絶其脉乃刺之無令精出獨出其邪氣耳所謂三刺則榖氣出者先淺刺絶皮以出陽邪再刺則隂邪出者少益深絶皮致肌肉未入分肉間也已入分肉之間則榖氣出故刺法曰始刺淺之以逐邪氣而來血氣後刺深之以致隂氣之邪最後刺極深之以下榖氣此之謂也故用鍼者不知年之所加氣之盛衰虛實之所起不可以爲工也凡刺有五以應五藏一曰半刺半刺者淺内而疾發鍼無鍼傷肉如拔毛狀以取皮氣此肺之應也二曰豹文刺豹文刺者左右前後鍼之中脉為故以取經絡之血者此心之應也三曰關刺關刺者􅀡刺左右盡筋上以取筋痺愼無出血此肝之應也或曰淵刺一曰豈刺四曰合谷刺合谷刺者左右雞足鍼于分肉之間以取肌痺此脾之應也五曰輸刺輸刺者直入直出深内之至骨以取骨痺此腎之應也燔鍼煩上音恢刺一本作怪字上苦囘切大也本神第八法風黄帝問于}
