  - {type: variant, offset: 4, length: 5, content: 終始第九凡, SBCK: 黄帝曰衛氣之留于腹中搐積不行􅁐藴不得常所使人肢脇胃中滿喘呼逆息者何以去之伯高曰其氣積于胷中者上取之積于腹中者下取之上下皆滿者傍取之黄帝曰取之奈何伯高對曰積于上寫人迎天突喉中積于下者寫三里與氣街上下皆滿者上下取之與季脇之下一寸之下深一寸一本云季脇重者雞足取之診視其脉大而弦急及絶不至者及腹皮急甚者不可}
