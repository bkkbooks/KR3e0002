  - {type: punctuation, offset: 101, content: ，, id: KR3e0002_CHANT_009-bkkpn24}
  - {type: 'tls:seg', offset: 101, content: '', id: KR3e0002_CHANT_009-1a.26}
  - {type: variant, offset: 103, length: 0, content: '', SBCK: 酸則縮綣約而不通水道不行故癃隂者積筋之所終也故酸入而走筋矣黄帝曰鹹走血多食之令人渇何也少俞曰鹹入于胃其氣上走中焦注于脉則血氣走之血與鹹相得則凝凝則胃中汁注之注之則胃中竭竭則咽路焦故舌本乾而善渇血脉者中焦之道也故鹹入而走血矣黄帝曰辛走氣多食之令人洞心何也少俞曰辛入于胃其氣走于上焦上焦者受氣而營諸陽者也薑韭之氣薰之營衛之氣不時受之久留心下故洞心辛與氣俱行故辛入而與汗俱出黄帝曰苦走骨多食之令人變嘔何也少俞曰苦入于胃五穀之氣皆不能勝苦苦入下脘三焦之道皆閉而不通故變嘔齒者骨之所終也故苦入而走骨故入而復出知其走骨也黄帝曰甘走肉多食之令人悗心何也少俞曰甘入于胃其氣弱小不能上至于上焦而與穀留于胃中者令人柔潤者也胃柔則緩緩則蟲動蟲動則令人悗心其氣外通於肉故甘走肉隂陽二十五人第六十四黄帝曰余聞隂陽之人何如伯高曰}
