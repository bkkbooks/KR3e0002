  - {type: variant, offset: 86, length: 0, content: '', SBCK: 為刺禁令民勿敢犯也五禁第六十一黄帝問于歧伯曰余聞刺有五禁何謂五禁歧伯曰禁其不可刺也黄帝曰余聞刺有五奪歧伯曰無寫其不可奪者也黄帝曰余聞刺有五過歧伯曰補寫無過其度黄帝曰余聞刺有五逆歧伯曰病與脉相逆命曰五逆黄帝曰余聞刺有九宜歧伯曰朙知九鍼之論是謂九宜黄帝曰何謂五禁願聞其不可刺之時歧伯曰甲乙日自乗無刺頭無發矇于耳内丙丁日自乗無振埃于肩喉廉泉戊巳日自乘四季無刺腹去爪寫水庚辛日自乘無刺闗節于股膝壬癸日自乘無刺足脛是謂五禁黄帝曰何謂五奪歧伯曰形肉已奪是一奪也大奪}
  - {type: page-break, offset: 86, content: '', id: KR3e0002_SBCK_009-10a}
  - {type: page-break, offset: 86, content: '', id: KR3e0002_SBCK_009-10b}
  - {type: variant, offset: 86, length: 0, content: '', WYG: 為刺禁令民勿敢犯也五禁第六十一黄帝問于岐伯曰余聞刺有五禁何謂五禁岐伯曰禁其不可刺也黄帝曰余聞刺有五奪岐伯曰无寫其不可奪者也黄帝曰余聞刺有五過岐伯曰補寫無過其度黄帝曰余聞刺有五逆岐伯曰病與脈相逆命曰五逆黄帝曰余聞刺有九宜岐伯曰明知九針之論是謂九宜黄帝曰何謂五禁願聞其不可刺之時岐伯曰甲乙日自乗无刺頭无發矇于耳内丙丁日自乗無振埃于負喉亷泉戊巳日自乘四季旡刺腹去爪寫水庚辛日自乘無刺闗節于股脥壬癸日自乘無刺足脛是謂五禁黄帝曰何謂五奪岐伯曰形肉已奪是一奪也大奪}
