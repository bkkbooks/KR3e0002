  - {type: variant, offset: 894, length: 168, content: 得稽留淫泆須鍼而去故一刺則陽邪出再刺則陰邪出三刺則穀氣至穀氣至而止所謂穀氣至者已補而實已寫而虛故以知穀氣至也邪氣獨去者陰與陽未能調而病知愈也故曰補則實寫則虛痛雖不隨鍼病必衰去矣陰盛而陽虛先補其陽後寫其陰而和之陰虛而陽盛先補其陰後寫其陽而和之三脈動于足大指之間必審其實虛虛而寫之是謂重虛重虛病益甚凡刺此者以指按之脈動而實且疾者疾寫之虛而徐, SBCK: 結}
