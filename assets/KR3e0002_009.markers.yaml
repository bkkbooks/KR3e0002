  - {type: variant, offset: 111, length: 4, content: 終始終始, WYG: 之木形之人比於上角似於蒼帝其為人蒼色小頭長面大肩背直身小手足好有才勞心少力多憂勞于事能春夏不能秋冬感而病生足厥隂佗佗然大角之人比於左足少陽少陽之上遺遺然左角之人比於右足少陽少陽之下隨隨然一曰少角釱角之人比於右足少陽少陽之上推推然一曰右角判角之人比於左足少陽少陽之下括括然火形之人比於上徵似於赤帝其為人赤色廣䏖脫面小頭好肩背髀腹小手足行安地疾心行摇肩背肉滿有氣輕財少信多慮見事明好顔急心不壽暴死能春夏不能秋冬秋冬感而病生手少隂核核然質徵之人比於左手太陽太陽之上肌肌然一曰質之人一曰大徵少徵之人比於左手太陽太陽之下慆慆然右徵之人比於右手太陽太陽之上鮫鮫然一曰熊熊然質判之人比於左手太陽太陽之下支支頥頥然一曰質徵土形之人比於上宫似於上古黄帝其為人黄色圓面大頭美肩背大腹美股脛小手足多肉上下相稱行安地舉足浮安心好利人不喜權勢善附人也能秋冬不能春夏春夏感而病生足太隂敦敦然大宫之人比於左足陽明陽明之上婉婉然加宫之人比於左足陽明陽明之下坎坎然一曰衆之人少宫之人比於右足陽明陽明之上樞樞然左宫之人比於右足陽明陽明之下兀兀然一曰衆之人一曰陽明之上金形之人比於上商似於白帝其為人方面白色小頭小肩背小腹小手足如骨發踵外骨輕身清亷急心静悍善為吏能秋冬不能春夏春夏感而病生手太隂敦敦然釱商之人比於左手陽明陽明之上廉廉然左商之人比于左手陽明陽明之下脫脫然右商之人比於右手陽明陽明之上監監然小商之人比於右手陽明陽明之下嚴嚴然水形之人比於上羽似於黑帝其為人黒色面不平大頭廉頤小肩大腹動手足發行摇身下尻長背延延然不敬畏善欺給人戮死能秋冬不能春夏春夏感而病生足少隂汙汙然大羽之人比於右足太陽太陽之上頰頰然小羽之人比於左足大陽大陽之下紆紆然衆之為人比于右足太陽太陽之下潔潔然一曰加之人桎之為人比於左足大陽大陽之上安安然是故五形之人二十五變}
