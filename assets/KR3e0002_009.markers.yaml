  - {type: variant, offset: 111, length: 4, content: 終始終始, SBCK: 之木形之人比於上角似於蒼帝其為人蒼色小頭長面大肩背直身小手足好有才勞心少力多憂勞於事能春夏不能秋冬感而病生足厥隂佗佗然大角之人比於左足少陽少陽之上遺遺然左角之人比於右足少陽少陽之下隨隨然少角一曰􅎂角之人比於右足少陽少陽之上推推然右角一曰判角之人比於左足少陽少陽之下栝栝然火形之人比於上徵似於赤帝其為人赤色廣䏖脫面小頭好肩背髀腹小手足行安地疾心行摇肩背肉滿有氣輕財少信多慮見事朙好顔急心不壽㬥死能春夏不能秋冬秋冬感而病生手少隂核核然質徵之人比於左手太陽太陽之上肌肌然一曰大徴一曰質之人少徵之人比於右手太陽太陽之下慆慆然右徵之人比於右手太陽太陽之上鮫鮫然熊然一曰熊質判之人比於左手太陽太陽之下支支頤頤然質徴一曰土形之人比於上宫似於上古黄帝其為人黄色圓面大頭美肩背大腹美股脛小手足多肉上下相稱行安地舉足浮安心好利人不喜權勢善附人也能秋冬不能春夏春夏感而病生足太隂敦敦然大宫之人比於左足陽朙陽朙之上婉婉然加宫之人比於左足陽朙陽朙之下坎坎然之人一曰衆少宫之人比於右足陽朙陽朙之上樞樞然左宫之人比於右足陽朙陽朙之下兀兀然曰陽朙之上一曰衆之人一金形之人比於上商似於白帝其爲人方面白色小頭小肩背小腹小手足如骨發踵外骨輕身清亷急心静悍善為吏能秋冬不能春夏春夏感而病生手太隂敦敦然􅎂商之人比於左手陽朙陽朙之上廉廉然右商之人比於左手陽朙陽朙之下脫脫然大商之人比於右手陽朙陽朙之上監監然少商之人比於右手陽朙陽朙之下嚴嚴然水形之人比於上羽似於黑帝其為人黒色面不平大頭廉頤小肩大腹動手足發行摇身下尻長背延延然不敬畏善欺給人戮死能秋冬不能春夏春夏感而病生足少隂汗汗然大羽之人比於右足太陽太陽之上頰頰然少羽之人比於左足太陽太陽之下紆紆然衆之為人比於右足太陽太陽之下潔潔然之人一曰加桎之為人比於左足太陽太陽之上安安然是故五形之人二十五變}
