  - {type: variant, offset: 116, length: 2, content: 經脈, SBCK: 衆之所以相欺者是也黄帝曰得其形不得其色何如歧伯曰形勝色色勝形者至其勝時年加感則病行失則憂矣形色相得者富貴大樂黄帝曰其形色相勝之時年加可知乎歧伯曰凡年忌下上之人大忌常加七歲十六歳二十五歲三十四歳四十三歳五十二歳六十一歲皆人之大忌不可不自安也感則病行失則憂矣當此之時無}
