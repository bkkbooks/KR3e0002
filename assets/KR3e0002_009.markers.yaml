  - {type: variant, offset: 104, length: 3, content: 殃謹奉, SBCK: 地之間六合之内不離于五人亦應之故五五二十五人之政而隂陽之人不與焉其態又不合于衆者五余已知之矣願聞二十五人之形血氣之所生别而以候從外知内何如歧伯曰悉乎哉問也此先師之祕也雖伯高猶不能朙之也黄帝避席遵循而却曰余聞之得其人弗教是謂重失得而洩之}
