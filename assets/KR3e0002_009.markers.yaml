  - {type: variant, offset: 92, length: 2, content: 昌慢, SBCK: 循咽上走空竅循眼系入絡腦出顑下客主人循牙車合陽朙幷下人迎此胃氣别走于陽朙者也故隂陽上下其動也若一故陽病而陽脉小者為逆隂病而隂脉大者為逆故隂陽俱靜俱動若引繩相傾者病黄帝曰足少隂何因而動歧伯曰衝脉者十二經}
