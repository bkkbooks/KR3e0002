  - {type: variant, offset: 100, length: 2, content: 私必, SBCK: 相失也氣何由還歧伯曰夫四末隂陽之㑹者此氣之大絡也四街者氣之徑路也故絡絶則徑通四末解則氣從合相輸如環黄帝曰善此所謂如環無端莫知其紀終而復始此之謂也五味論第六十三黄帝問于少俞曰五味入于口也各有所走各有所病酸走筋多食之令人癃鹹走血多食之令人渇辛走氣多食之令人洞心苦走骨多食之令人變嘔甘走肉多食之令人悗心余知其然也不知其何由願聞其故少俞荅曰酸入于胃其氣澀以收上之兩焦弗能出入也不出即留于胃中胃中和温則下注膀胱膀胱之胞薄以懦}
