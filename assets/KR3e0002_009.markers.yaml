  - {type: variant, offset: 91, length: 0, content: '', SBCK: 海其清氣上注于肺肺氣從太隂而行之其行也以息徃來故人一呼脉再動一吸脉亦再動呼吸不已故動而不止黄帝曰氣之過于寸口也上十焉息下八焉伏何道從還不知其極歧伯曰氣之離藏也卒然如弓弩之發如水之下㟁上于魚以反衰其餘氣衰散以逆上故其行微黄帝曰足之陽朙何因而動歧伯曰胃氣上注于肺其悍氣上衝頭}
  - {type: page-break, offset: 91, content: '', id: KR3e0002_SBCK_009-12a}
