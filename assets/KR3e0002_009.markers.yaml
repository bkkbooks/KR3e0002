  - {type: variant, offset: 2, length: 0, content: '', krp: 起也目窠上微腫如新臥起之狀其頸脉動時欬隂股間寒足脛瘇腹乃大其水已成矣以手按其腹隨手而起如裹水之狀此其候也黄帝曰膚脹何以候之歧伯曰膚脹者寒氣客于皮膚之間􅠻􅠻然不堅腹大身盡腫皮厚按其腹窅而不起腹色不變此其候也鼓脹何如歧伯曰腹脹身皆大大與膚脹等也色蒼黄腹筋起此其候也腸覃何如歧伯曰寒氣客于腸外與衛氣相摶氣不得榮因有所繫癖而内著惡氣乃起瘜肉乃生其始生也大如雞卵稍以益大至其成如懷子之狀久者離歲按之則堅推之則移月事以時下此其候也石瘕何如歧伯曰石瘕生于胞中寒氣客于子門子門閉塞氣不得通惡血當寫不寫衃以留止日以益大狀如懷子月事不以時下皆生于女子可導而下黄帝曰膚脹鼓脹可刺邪歧伯曰先寫其脹之血絡後調其經刺去其血絡也賊風}
  - {type: variant, offset: 3, length: 0, content: '', SBCK: 五十八黄帝曰夫子言賊風邪氣之傷人也令人病焉今有其不離屏蔽不出室穴之中卒然病者非不離賊風邪氣其故何也歧伯曰此皆嘗有所傷于濕氣藏于血脉之中分肉之間久留而不去若有所墮墜惡血在内而不去卒然喜怒不節飲食不適寒温不時腠理閉而不通其開而遇風寒則血氣凝結與故邪相襲則為寒痺其有熱則汗出汗出則受風雖不遇賊風邪氣必有因加而發焉黄帝曰今夫子之所言者皆病人之所自知也其毋所遇邪氣又毋怵惕之所志卒然而病者其故何也唯有因鬼神之事乎歧伯曰此亦有故邪留而未發因而志有所惡及有所慕血氣内亂兩氣相摶其所從來者微視之不見聽而不聞故似鬼神黄帝曰其祝而已者其故何也歧伯曰先巫者因知百病之勝先知其病之所從生者可祝而已也衛氣夫常第五十}
