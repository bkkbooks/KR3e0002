  - {type: variant, offset: 462, length: 235, content: 驗之疎取之上氣和乃止人迎二盛寫足太陽補足少陰二寫一補二日一取之必切而驗之疎取之上氣和乃止人迎三盛寫足陽明而補足太陰二寫一補日二取之必切而驗之疎取之上氣和乃止脈口一盛寫足厥陰而補足少陽二補一寫日一取之必切而驗之疎而取上氣和乃止脈口二盛寫足少陰而補足太陽二補一寫二日一取之必切而驗之疎取之上氣和乃止脈口三盛寫足太陰而補足陽明二補一寫日二取之必切而驗之疎而取之上氣和乃止所以日二取之者太陽主胃大富于穀氣故可日二取之也人迎與脈口俱盛三倍以上命曰陰陽俱溢如是者不開則血脈閉塞氣無所, SBCK: ''}
