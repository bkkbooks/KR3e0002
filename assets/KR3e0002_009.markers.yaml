  - {type: variant, offset: 1114, length: 388, content: 不伸者其病在筋伸而不屈者其病在骨在骨守骨在筋守筋補須一方實深取之稀按其痏以極出其邪氣一方虛淺刺之以養其脈疾按其痏無使邪氣得入邪氣來也緊而疾穀氣來也徐而和脈實者深刺之以泄其氣脈虛者淺刺之使精氣無得出以養其脈獨出其邪氣刺諸痛者其脈皆實故曰從腰以上者手太陰陽明皆主之從腰以下者足太陰陽明皆主之病在上者下取之病在下者高取之病在頭者取之足病在足者取之膕病生於頭者頭重生於手者臂重生於足者足重治病者先刺其病所從生者也春氣在毛夏氣在皮膚秋氣在分肉冬氣在筋骨刺此病者各以其時為齊故刺肥人者以秋冬之齊刺瘦人者以春夏之齊病痛者陰也痛而以手按之不得者陰也深刺之病在上者陽也病在下者陰也癢者陽也淺刺之病先起陰者先治其陰而後治其陽病先起陽者先治其陽而後治其陰刺熱厥者留鍼反為寒刺寒厥者留鍼反為熱刺熱厥者二陰一陽刺寒厥者二陽一陰所謂二陰者二刺陰也一陽者一刺陽也久病者邪氣入深刺此病者深內而久留之間日而復刺, SBCK: 予}
