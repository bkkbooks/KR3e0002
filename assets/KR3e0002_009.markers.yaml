  - {type: variant, offset: 42, length: 1, content: 陰, SBCK: 肉之柱在臂脛諸陽分肉之間與足少隂分間血氣之輸輸于諸絡氣血留居則盛而起筋部無隂無陽無左無右候病所在骨之屬者骨空之所以受益而益腦髓者也黄帝曰取之奈何伯高曰夫病變化浮沉深淺不可勝窮各在其處病間者淺之甚者深之間者小之甚者衆之隨變而調氣故曰上工黄帝問于歧伯曰人之肥瘦大小寒温有老壯少小别之奈何伯高對曰人年五十已上為老二十已上為壯十八已上為少六歲已上為小黄帝曰何以度知其肥瘦伯高曰人有肥有膏有内黄帝曰别此奈何伯高曰膕内堅䐃内一本云皮滿者肥膕内不堅皮緩者膏皮内不相離者肉黄帝曰身之寒温何如伯高曰膏者其肉淖而麤理者身寒細理者身熱脂者其肉堅細理者熱麤理者寒黄帝曰其肥瘦大小奈何伯高曰膏者多氣而皮縱緩故能縱腹垂􅃾肉者身體容大脂者其身收小黄帝曰三者之氣血多少何如伯高曰膏者多氣多氣者熱熱者耐寒肉者多血則充形充形則平脂者其血清氣滑少故不能大此别于衆人者也黄帝曰衆人奈何伯高曰衆人皮肉脂膏不能相加也血與氣不能相多故其形不小不大各自稱其身命曰衆人黄帝曰善治之奈何伯高曰必先别其三形血之多少氣之清濁而後調之治無失常經是故膏人縱腹垂􅃾肉人者上下容大脂人者雖脂不能大者玉版第六十黄帝曰余以小鍼為細物也夫子乃言上合之于天下合之于地中合之于人余以為過鍼之意矣願聞其故歧伯曰何物大於天乎夫大于鍼者惟五兵者焉五兵者死之僃也非生之具且夫人者天地之鎭也其不可不參乎夫治民者亦唯鍼焉夫鍼之與五兵其孰小乎黄帝曰病之生時有喜怒不測飲食不節隂氣不足陽氣有餘營氣不行乃發爲癰疽隂陽不通兩熱相摶乃化爲膿小鍼能取之乎歧伯曰聖人不能使化者爲之邪不可留也故兩軍相當旗幟相望白刃陳于中野者此非一日之謀也能使其民令行禁止士卒無白刃之難者非一日之教也須㬰之得也夫至使身被癰疽之病膿血之聚者不亦離道逺乎夫癰疽之生膿血之成也不從天下不從地出積微之所生也故聖人自治于未有形也愚者遭其已成也黄帝曰其已形不予遭膿已成不予見為之奈何歧伯曰膿已成十死一生故聖人弗使已成而朙為良方著之竹帛使能者踵而傳之後世無有終時者為其不予遭也黄帝曰其已有膿血而後遭乎不導之以小鍼治乎歧伯曰以小治小者其功小以大治大者多害故其已成膿血者其唯砭石鈹鋒之所取也黄帝曰多害者其不可全乎歧伯曰其在逆順焉黄帝曰願聞逆順歧伯曰以為傷者其白眼青黒眼小是一逆也内藥而嘔者是二逆也腹痛渴甚是三逆也肩項中不便是四逆也音嘶色脱是五逆也除此五者為順矣黄帝曰諸病皆有逆順可得聞乎歧伯曰腹脹身熱脉大是一逆也腹鳴而滿四肢清泄其脉大是二逆也衂而不止脉大是三逆也咳且溲血脱形其脉小勁是四逆也欬脱形身熱脉小以疾是謂五逆也如是者不過十五日而死矣其腹大脹四末清脫形泄甚是一逆也腹脹便血其脉大時絶是二逆也欬溲血形内脫脉摶是三逆也嘔血胷滿引背脉小而疾是四逆也欬嘔腹脹且飱泄其脉絶是五逆也如是者不及一時而死矣工不察此者而刺之是謂逆治黄帝曰夫子之言鍼甚駿以配天地上數天文下度地紀内别五藏外次六府經脉二十八㑹盡有周紀能殺生人不能起死者子能反之乎歧伯曰能殺生人不能起死者也黄帝曰余聞之則為不仁然願聞其道弗行於人歧伯曰是朙道也其必然也其如刀劒之可以殺人如飲酒使人醉也雖勿診猶可知矣黄帝曰願卒聞之歧伯曰人之所}
