  - {type: variant, offset: 87, length: 0, content: '', SBCK: 之後是二奪也大汗出之後是三奪也大泄之後是四奪也新産及大血之後是五奪也此皆不可寫黄帝曰何謂五逆歧伯曰熱病永静汗已出脉盛躁是一逆也病泄脉洪大是二逆也著痺不移䐃肉破身熱脉偏絶是三逆也淫而奪形身熱色夭然白及後下血衃血衃篤重是謂四逆也寒熱奪形脉堅摶是謂五逆也動輸第六十二黄帝曰經脉十二而手太隂足少隂陽朙獨動不休何也歧伯曰是朙胃脉也胃}
