  front:
  - {type: variant, offset: 0, length: 1, content: 終, SBCK: 黃帝素問靈樞經巻之九水脹第五十七黄帝問于歧伯曰水與膚脹鼓脹腸覃石瘕石水何以别之歧伯荅曰水}
  - {type: page-break, offset: 0, content: '', id: KR3e0002_SBCK_009-1a}
  - {type: variant, offset: 0, length: 1, content: 終, WYG: 欽定四庫全書靈樞經巻九宋史崧音釋水脹第五十七黄帝問于岐伯曰水與膚脹鼓脹腸覃石瘕石水何以别之岐伯答曰水}
  - {type: page-break, offset: 0, content: '', id: KR3e0002_WYG_009-1a, image: WYG0733/WYG0733-0393c.png}
  - {type: variant, offset: 0, length: 1, content: 終, krp: 黃帝素問靈樞經巻之九水脹第五十七黄帝問于歧伯曰水與膚脹鼓脹腸覃石瘕石水何以别之歧伯荅曰水}
  body:
  - {type: punctuation, offset: 0, content: 〈, id: KR3e0002_CHANT_009-bkkpn1}
  - {type: punctuation, offset: 2, content: 〉, id: KR3e0002_CHANT_009-bkkpn2}
  - {type: variant, offset: 2, length: 0, content: '', SBCK: 起也目窠上微腫如新臥起之狀其頸脉動時欬隂股間寒足脛瘇腹乃大其水已成矣以手按其腹隨手而起如裹水之狀此其候也黄帝曰膚脹何以候之歧伯曰膚脹者寒氣客于皮膚之間􅠻􅠻然不堅腹大身盡腫皮厚按其腹窅而不起腹色不變此其候也鼓脹何如歧伯曰腹脹身皆大大與膚脹等也色蒼黄腹筋起此其候也腸覃何如歧伯曰寒氣客于腸外與衛氣相摶氣不得榮因有所繫癖而内著惡氣乃起瘜肉乃生其始生也大如雞卵稍以益大至其成如懷子之狀久者離歲按之則堅推之則移月事以時下此其候也石瘕何如歧伯曰石瘕生于胞中寒氣客于子門子門閉塞氣不得通惡血當寫不寫衃以留止日以益大狀如懷子月事不以時下皆生于女子可導而下黄帝曰膚脹鼓脹可刺邪歧伯曰先寫其脹之血絡後調其經刺去其血絡也賊風}
  - {type: page-break, offset: 2, content: '', id: KR3e0002_SBCK_009-1b}
  - {type: page-break, offset: 2, content: '', id: KR3e0002_SBCK_009-2a}
