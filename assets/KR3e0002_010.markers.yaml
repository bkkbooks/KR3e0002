  - {type: variant, offset: 2247, length: 1176, content: 上出耳上角以屈下頰至䪼其支者從耳後入耳中出走耳前過客主人前交頰至目銳眥是動則病耳聾渾渾焞焞嗌腫喉痺是主氣所生病者汗出目銳眥痛頰痛耳後肩臑肘臂外皆痛小指次指不用為此諸病盛則寫之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者人迎大一倍于寸口虛者人迎反小于寸口也膽足少陽之脈起于目銳眥上抵頭角下耳後循頸行手少陽之前至肩上卻交出手少陽之後入缺盆其支者從耳後入耳中出走耳前至目銳眥後其支者別銳眥下大迎合于手少陽抵于䪼下加頰車下頸合缺盆以下胸中貫膈絡肝屬膽循脅裏出氣街繞毛際橫入髀厭中其直者從缺盆下腋循胸過季脅下合髀厭中以下循髀陽出膝外廉下外輔骨之前直下抵絕骨之端下出外踝之前循足跗上入小指次指之間其支者別跗上入大指之間循大指歧骨內出其端還貫爪甲出三毛是動則病口苦善太息心脅痛不能轉側甚則面微有塵體無膏澤足外反熱是為陽厥是主骨所生病者頭痛頷痛目銳眥痛缺盆中腫痛腋下腫馬刁俠癭汗出振寒瘧胸脅肋髀膝外至脛絕骨外髁前及諸節皆痛小指次指不用為此諸病盛則寫之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者人迎大一倍于寸口虛者人迎反小于寸口也肝足厥陰之脈起于大指叢毛之際上循足跗上廉去內踝一寸上踝八寸交出太陰之後上膕內廉循股陰入毛中過陰器抵小腹挾胃屬肝絡膽上貫膈布脅肋循喉嚨之後上入頏顙連目系上出額與督脈會于巔其支者從目系下頰裏環脣內其支者復從肝別貫膈上注肺是動則病腰痛不可以俛仰丈夫㿉疝婦人少腹腫甚則嗌乾面塵脫色是肝所生病者胸滿嘔逆飧泄狐疝遺溺閉癃為此諸病盛則寫之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者寸口大一倍于人迎虛者寸口反小于人迎也手太陰氣絕則皮毛焦太陰者行氣溫于皮毛者也故氣不榮則皮毛焦皮毛焦則津液去皮節津液去皮節者則爪枯毛折毛折者則毛先死丙篤丁死火勝金也手少陰氣絕則脈不通脈不通則血不流血不流則髦色不澤故其面黑如漆柴者血先死壬篤癸死水勝火也足太陰氣絕者則脈不榮肌肉脣舌者肌肉之本也脈不榮則肌肉軟肌肉軟則舌萎人中滿人中滿則脣反脣反者肉先死甲篤乙死木勝土也足少陰氣絕則骨枯少陰者冬脈也伏行而濡骨髓者也故骨不濡則肉不能著也骨肉不相親則肉軟卻肉軟卻故齒長而垢髮無澤髮無澤者骨先死戊篤己死土勝水也足厥陰氣絕則筋絕厥陰者肝脈也肝者筋之合也筋者聚于陰氣而脈絡于舌本也故脈弗榮則筋急筋急則引舌與卵故脣青舌卷卵縮則筋先死庚篤辛死金勝木也五陰氣俱絕則目系轉轉則目運目運者為志先死志先死則遠一日半死矣六陽氣絕則陰與陽相離離則腠理發泄絕汗乃出故旦占夕死夕占旦死經脈十二者伏行分肉之間深而不見其常見者足太陰過于外踝之上無所隱故也諸脈之浮而常見者皆絡脈也六經絡手陽明少陽之大絡起于五指間上合肘中飲酒者衛氣先行皮膚先充絡脈絡脈先盛故衛氣已平營氣乃滿而經脈大盛脈之卒然動者皆邪氣居之留于本末不動則熱不堅則陷且空不與眾同是以知其何脈之動也雷公曰何以知經脈之與絡脈異也, SBCK: 稔䁢切辭縁}
