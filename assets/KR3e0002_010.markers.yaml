  - {type: variant, offset: 1366, length: 2, content: 膈抵, SBCK: 齊湛湛好内而惡出心和而不發不務於時動而後之此太隂之人也少隂之人小貪而賊心見人有亡常若有得好傷好害見人有榮乃反愠怒心疾而無恩此少隂之人也太陽之人居處于于好言大事無能而虚説志發於四野舉措不顧是非為事如常自用事雖敗而常無悔此太陽之人也少陽之人諟諦好自貴有小小官則髙自宜好為外交而不内附此少陽之人也隂陽和平之人居處安静無為懼懼無為欣欣婉然從物或與不争與時變化尊則謙謙譚而不治是謂至治古之善用鍼艾者視人五態乃治之盛者寫之虚者補之黄帝曰治人之五態奈何少師曰太隂之人多隂而無陽其隂血濁其衛氣濇隂陽不和緩筋而厚皮不之疾寫不能移之少隂之人多隂少陽小}
