  front:
  - {type: variant, offset: 0, length: 12, content: 經脈第十經脈第十雷公問於, SBCK: ''}
  - {type: variant, offset: 0, length: 0, content: '', WYG: 欽定四庫全書靈樞經巻十宋史崧音釋五音五味第六十六右徵與少徵調右手太陽上左商與左徵調左手陽明上少徵與大宫調左手陽明上右角與大角調右足少陽下大徵與少徵調左手太陽上衆羽與少羽調右足太陽下少商與右商調右手太陽下桎羽與衆羽調右足太陽下少宫與大宫調右足陽明下判角與少角調右足少陽下釱商與上商調右足陽明下釱商與上角調左足太陽下上徵與右徵同穀麥畜羊果杏手少陽藏心色赤味苦時夏上羽與大羽同穀大豆畜彘果栗足少隂藏腎色黒味鹹時冬上宫與大宫同穀稷畜牛果􅀥足太隂藏脾色黄味甘時季夏上商與右商同穀黍畜雞果桃手太隂藏肺色白味辛時秋上角與大角同穀麻畜犬果李足厥隂藏肝色青味酸時春大宫與上角同右足陽明上左角與大角同左足陽明上少羽與大羽同右足太陽下左商與右商同左手陽明上加宫與大宫同左足少陽上質判與大宫同左手太陽下判角與大角同左足少陽下大羽與大角同右足太陽上大角與大宫同右足少陽上右徵少徵質徵上徵判徵右角釱角上角大角判角右商少商釱商上商左商少宫上宫大宫加宫左角宫衆羽桎羽上羽大羽少羽黄帝曰婦人無鬚者無血氣乎岐伯曰衝脈任脈皆起於胞中上循背裏為經絡之海其浮而外者循腹右上行㑹於咽喉别而絡唇口血氣盛則充膚熱肉血獨盛則澹滲皮膚生毫毛今婦人之生有餘於氣不足於血以其數脱血也衝任之脈不榮口唇故鬚不生焉黄帝曰士人有傷於隂隂氣絶而不起隂不用然其鬚不去其故何也宦者獨去何也願聞其故岐伯曰宦者去其宗筋傷其衝脈血寫不復皮膚内結唇口不營故鬚不生黄帝曰其有天宦者未嘗被傷不脱於血然其鬚不生其故何也岐伯曰此天之所不足也其任衝不盛宗筋不成有氣無血唇口不榮故鬚不生黄帝曰善乎哉聖人之通萬物也若日月之光影音聲鼓響聞其聲而知其形其非夫子孰能明萬物之精是故聖人視其顔色黄赤者多熱氣青白者少熱氣黒色者多血少氣美眉者太陽多血通髯極鬚者少陽多血美鬚者陽明多血此其時然也夫人之常數太陽常多血少氣少陽常多氣少血陽明常多血多氣厥隂常多氣少血少隂常多血少氣太隂常多血少氣此天之常數也百病始生第六十六黄帝問于岐伯曰夫百病之始生也皆生於風雨寒暑清濕喜怒喜怒不節則傷藏風雨則傷上清濕則傷下三部之氣所傷異類願聞其㑹歧伯曰三部之氣各不同或起於隂或起於陽請言其方喜怒不節則傷藏藏傷則病起於隂也清濕襲虚則病起於下風雨襲虚則病起於上是謂三部至於其淫泆不可勝數黄帝曰余固不能數故問先師願卒聞其道歧伯曰風雨寒熱不得虚邪不能獨傷人卒然逢疾風暴雨而不病者盖無虚故邪不能獨傷人此必因虚邪之風與其身形兩虚相得乃客其形兩實相逢衆人肉堅其中於虚邪也因於天時與其身形參以虚實大病乃成氣有定舎因處為名上下中外分為三員是故虚邪之中人也始於皮膚皮膚緩則腠理開開則邪從毛髮入入則抵深深則毛髮立毛髮立則淅然故皮膚痛留而不去則傳舎於絡脈在絡之時痛於肌肉其痛之時息大經乃代留而不去傳舍於經在經之時洒淅喜驚留而不去傳舍於輸在輸之時六經不通四肢則肢節痛腰脊乃强留而不去傳舍於伏衝之脈在伏衝之時體重身痛留而不去𫝊舍於腸胃在腸胃之時賁嚮腹脹多寒則腸鳴飱泄食不化多熱則溏出麋留而不去𫝊舍於腸胃之外募原之間留著于脈稽留而不去息而成積或著孫脈或著絡脈或著}
