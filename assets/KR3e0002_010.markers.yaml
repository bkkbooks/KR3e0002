  - {type: variant, offset: 1363, length: 0, content: '', SBCK: 脉黄帝曰手少隂之脉獨無腧何也歧伯曰少隂心脉也心者五藏六府之大主也精神之所舍也其藏堅固邪弗能容也容之則心傷心傷則神去神去則死矣故諸邪之在於心者皆在於心之包絡包絡者心主之脉也故獨無腧焉黄帝曰少隂獨無腧者不病乎歧伯曰其外經病而藏不病故獨取其經於掌後鋭骨之端其餘脉出入屈折其行之徐疾皆如手少隂心主之脉行也故本腧者皆因其氣之虚實疾徐以取之是謂因衝而寫因衰而補如是者邪氣得去真氣堅固是謂因天之序黄帝曰持鍼縱舍奈何歧伯曰必先朙知十二經脉之本末皮膚之寒熱脉之盛衰滑濇其脉滑而盛者病日進虚而細者久以持大以濇者為痛痺隂陽如一者病難治其本末尚熱者病尚在其熱以衰者其病亦去矣持其尺察其肉之堅脆小大滑濇寒温燥濕因視目之五色以知五藏而決死生視其血脉察其色以知其寒熱痛痺黄帝曰持鍼縱舍余未得其意也歧伯曰持鍼之道欲端以正安以静先知虚實而行疾徐左手執骨右手}
