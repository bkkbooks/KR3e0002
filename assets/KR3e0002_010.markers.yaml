  - {type: variant, offset: 60, length: 2, content: 腦髓, SBCK: 痛深其癰在外者則癰外而痛浮癰上皮熱黄帝曰刺之奈何歧伯曰微按其癰視氣所行先淺刺其傍稍内益深還而刺之毋過三行察其沉浮以為深淺已刺必熨令熱入中日使􅀬内邪氣益衰大癰乃潰伍以參禁以除其内恬憺無為乃能行氣後以鹹苦化穀乃下矣潰會音憂恚無言第六十九黄帝問於少師曰人之卒然憂恚而言無音者何道之塞何氣出行使音不彰願聞其方少師荅曰咽喉者水穀之道也喉嚨者氣之所以上下者也㑹厭者音聲之户也口脣者音聲之扇也舌者音聲之機也懸雍垂者音聲之闗也頏顙者分氣之所泄也横骨者神氣所使主發舌者也故人之鼻洞涕出不收者頏顙不開分氣失也是故厭小而疾薄則發氣疾其開闔利其出氣易其厭大而厚則開闔難其氣出遲故重言也人卒然無音者寒氣客于厭則厭不能發發不能下至其開闔不致故無音黄帝曰刺之奈何歧伯曰足之少隂上繫於舌絡於横骨終於㑹厭兩寫其血脉濁氣乃辟㑹厭之脉上絡任脉取之天突其厭乃發也寒熱第七十黄帝問于歧伯曰寒熱瘰癧在於頸腋者皆何氣使}
