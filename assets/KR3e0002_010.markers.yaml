  - {type: variant, offset: 1363, length: 0, content: '', WYG: 脈黄帝曰手少隂之脈獨無腧何也歧伯曰少隂心脈也心者五蔵六府之大主也精神之所舍也其蔵堅固邪弗能容也容之則心傷心傷則神去神去則死矣故諸邪之在於心者皆在於心之包絡包絡者心主之脈也故獨無腧焉黄帝曰少隂獨無腧者不病乎歧伯曰其外經病而蔵不病故獨取其經於掌後鋭骨之端其餘脈出入屈折其行之徐疾皆如手少隂心主之脈行也故本腧者皆因其氣之虚實疾徐以取之是謂因衝而冩因衰而補如是者邪氣得去真氣堅固是謂因天之序黄帝曰持鍼縱舍奈何歧伯曰必先明知十二經脈之本末皮膚之寒熱脈之盛衰滑濇其脈滑而盛者病日進虚而細者久以持大而濇者為痛痺隂陽如一者病難治其本末尚熱者病尚在其熱以衰者其病亦去矣持其尺察其肉之堅脆小大滑濇寒温燥濕因視目之五色以知五蔵而決死生視其血脈察其色以知其寒熱痛痺黄帝曰持鍼縱舍余未得其意也歧伯曰持鍼之道欲端以正安以静先知虚實而行疾徐左手執骨右手}
  - {type: page-break, offset: 1363, content: '', id: KR3e0002_WYG_010-13b, image: WYG0733/WYG0733-0409d.png}
  - {type: page-break, offset: 1363, content: '', id: KR3e0002_WYG_010-14a, image: WYG0733/WYG0733-0410a.png}
  - {type: page-break, offset: 1363, content: '', id: KR3e0002_WYG_010-14b, image: WYG0733/WYG0733-0410b.png}
  - {type: variant, offset: 1363, length: 0, content: '', krp: 脉黄帝曰手少隂之脉獨無腧何也歧伯曰少隂心脉也心者五藏六府之大主也精神之所舍也其藏堅固邪弗能容也容之則心傷心傷則神去神去則死矣故諸邪之在於心者皆在於心之包絡包絡者心主之脉也故獨無腧焉黄帝曰少隂獨無腧者不病乎歧伯曰其外經病而藏不病故獨取其經於掌後鋭骨之端其餘脉出入屈折其行之徐疾皆如手少隂心主之脉行也故本腧者皆因其氣之虚實疾徐以取之是謂因衝而寫因衰而補如是者邪氣得去真氣堅固是謂因天之序黄帝曰持鍼縱舍奈何歧伯曰必先朙知十二經脉之本末皮膚之寒熱脉之盛衰滑濇其脉滑而盛者病日進虚而細者久以持大以濇者為痛痺隂陽如一者病難治其本末尚熱者病尚在其熱以衰者其病亦去矣持其尺察其肉之堅脆小大滑濇寒温燥濕因視目之五色以知五藏而決死生視其血脉察其色以知其寒熱痛痺黄帝曰持鍼縱舍余未得其意也歧伯曰持鍼之道欲端以正安以静先知虚實而行疾徐左手執骨右手}
  - {type: variant, offset: 1364, length: 1, content: 咽, SBCK: 之無與肉果寫欲端以正補必閉膚輔鍼導氣邪得淫泆真氣得居黄帝曰扞皮開腠理奈何歧伯曰因其分肉左别其膚微内而徐端之適神不散邪氣得去黄帝問於歧伯曰人有八虚各何以􅀱歧伯荅曰以􅀱五藏黄帝曰􅀱之奈何歧伯曰肺心有邪其氣留於兩肘肝有邪其氣流于兩腋脾有邪其氣留于兩髀腎有邪其氣留于兩膕凡此八虚者皆機闗之室真氣之所過血絡之所遊邪氣惡血固不得住留住留則傷筋絡骨節機闗不得屈伸故痀攣也泌切兵媚扞切苦旱痀拘音通天第七十二黄帝問于少師曰余嘗聞人有隂陽何謂隂人何謂陽人少師曰天地之間六合之内不離於五人亦應之非徒一隂一陽而已也而畧言耳口弗能徧朙也黄帝曰願畧聞其意有賢人聖人心能備而行之乎少師曰蓋有太隂之人少隂之人太陽之人少陽之人隂陽和平之人凡五人者其態不同其筋骨氣血各不等黄帝曰其不等者可得聞乎少師曰太隂之人貪而不仁}
