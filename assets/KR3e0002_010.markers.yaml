  - {type: variant, offset: 79, length: 3, content: 毛髮長, SBCK: 絶其寒熱審按其道以予之徐往徐來以去之其小如麥者一刺知三刺而已黄帝曰決其生死奈何歧伯曰反其目視之其中有赤脉上下貫瞳子見一脉一歳死見一脉半一嵗半死見二脉二嵗死見二脉半二嵗半死見三脉三嵗而死見赤脉不下貫瞳子可治也邪客第七十一黄帝問于伯髙曰夫邪氣之客人也或令人目不瞑不臥出者何氣使然伯髙曰五}
