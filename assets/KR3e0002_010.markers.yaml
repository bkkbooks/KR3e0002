  - {type: variant, offset: 3278, length: 1093, content: 二者伏行分肉之間深而不見其常見者足太陰過于外踝之上無所隱故也諸脈之浮而常見者皆絡脈也六經絡手陽明少陽之大絡起于五指間上合肘中飲酒者衛氣先行皮膚先充絡脈絡脈先盛故衛氣已平營氣乃滿而經脈大盛脈之卒然動者皆邪氣居之留于本末不動則熱不堅則陷且空不與眾同是以知其何脈之動也雷公曰何以知經脈之與絡脈異也黃帝曰經脈者常不可見也其虛實也以氣口知之脈之見者皆絡脈也雷公曰細子無以明其然也黃帝曰諸絡脈皆不能經大節之間必行絕道而出入復合于皮中其會皆見于外故諸刺絡脈者必刺其結上甚血者雖無結急取之以寫其邪而出其血留之發為痺也凡診絡脈脈色青則寒且痛赤則有熱胃中寒手魚之絡多青矣胃中有熱魚際絡赤其暴黑者留久痺也其有赤有黑有青者寒熱氣也其青短者少氣也凡刺寒熱者皆多血絡必間日而一取之血盡而止乃調其虛實其小而短者少氣甚者寫之則悶悶甚則仆不得言悶則急坐之也手太陰之別名曰列缺起于腕上分間並太陰之經直入掌中散入于魚際其病實則手銳掌熱虛則欠㰦小便遺數取之去腕半寸別走陽明也手少陰之別名曰通里去腕一寸半別而上行循經入于心中繫舌本屬目系其實則支膈虛則不能言取之掌後一寸別走太陽也手心主之別名曰內關去腕二寸出于兩筋之間循經以上繫于心包絡心系實則心痛虛則為頭強取之兩筋間也手太陽之別名曰支正上腕五寸內注少陰其別者上走肘絡肩髃實則節弛肘廢虛則生肬小者如指痂疥取之所別也手陽明之別名曰偏歷去腕三寸別入太陰其別者上循臂乘肩髃上曲頰偏齒其別者入耳合于宗脈實則齲聾虛則齒寒痺隔取之所別也手少陽之別名曰外關去腕二寸外遶臂注胸中合心主病實則肘攣虛則不收取之所別也足太陽之別名曰飛陽去踝七寸別走少陰實則鼽窒頭背痛虛則鼽衄取之所別也足少陽之別名曰光明去踝五寸別走厥陰下絡足跗實則厥虛則痿躄坐不能起取之所別也足陽明之別名曰豐隆去踝八寸別走太陰其別者循脛骨外廉上絡頭項合諸經之氣下絡喉嗌其病氣逆則喉痺瘁瘖實則狂巔虛則足不收脛枯取之所別也足太陰之別名曰公孫去本節之後一寸別走陽明其別者入絡腸胃厥氣上逆則霍亂實則腸中切痛虛則鼓脹取之所別也足少陰之別名曰大鍾當踝後繞跟別走太陽其別者并經上走于心包下外貫腰脊其病氣逆則煩悶實則閉癃虛則腰痛取之所別者也足厥陰之別名曰蠡溝去內踝五寸別走少陽其別者徑脛上睪結于莖其病氣逆則睪腫卒疝實則挺長虛則暴癢取之所別也任脈之別名曰尾翳下鳩尾散于腹實則腹皮痛虛則癢搔取之所別也督脈之別名曰長強挾膂上項散頭上下當肩胛左右別走太陽入貫膂實則脊強虛則頭重高搖之挾脊之有過者取之所別也脾之大絡名曰大包出淵腋下三寸布胸脅實則身盡痛虛則百節盡皆縱此脈若羅絡之血者皆取之脾之大絡脈也凡此十五絡者實則必見虛則必下視之不見求之上下人經不同絡脈異所別也, WYG: ''}
