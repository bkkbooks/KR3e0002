  - {type: variant, offset: 40, length: 3, content: 別六府, SBCK: 募原之間留著於脉稽留而不去息而成積或著孫脉或著絡脉或著經脉或著輸脉或著於伏衝之脉或著於膂筋或著於腸胃之募原上連於緩筋邪氣淫泆不可勝論黄帝曰}
