  - {type: variant, offset: 86, length: 2, content: 脈道, SBCK: 也其糟粕津液宗氣分為三隧故宗氣積于胸中出于喉嚨以貫心脉而行呼吸焉營氣者泌其津液注之於脉化以為血以榮四末内注五藏六府以應刻數焉衛氣者出其悍氣之慓疾而先行於四末分肉皮膚之間而不休者也晝日行於陽夜行於隂常從足少隂之分間行於五藏六府今厥氣客於五藏六府則衛氣獨衛其外行於陽不得入於隂行於陽則陽氣盛陽氣盛則陽蹻陷不得入於隂隂虚故目不瞑黄帝曰善治之奈何伯髙曰補其不足寫其有餘調其虚實}
