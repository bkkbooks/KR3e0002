  - {type: variant, offset: 54, length: 0, content: '', SBCK: 至其已成奈何歧伯曰積之始生得寒乃生厥乃成積也黄帝曰其成積奈何歧伯曰厥氣生足悗悗生脛寒脛寒則血脉凝濇血脉凝濇則寒氣上入於腸胃入於腸胃則䐜脹䐜脹則膓外之汁沫迫聚不得散日以成積卒然多食飲則腸滿起居不節用力過度則絡脉傷陽絡傷則血外溢血外溢則衂血隂絡傷則血内溢血内溢則後血腸胃之絡傷則血溢於腸外腸外有寒汁沫與血相摶則并合凝聚不得散而積成矣卒然外中於寒若内傷於憂怒則氣上逆氣上逆則六輸不通温氣不行凝血藴裏而不散津液濇滲著而不去而積皆成矣黄帝曰其生於隂者奈何歧伯曰憂思傷心重寒傷肺忿怒傷肝醉以入房汗出當風傷脾用力過度若入房汗出浴則傷腎此内外三部之所生病者也黄帝曰善治之奈何歧伯荅曰察其所痛以知其應有餘不足當補則補當寫則寫毋逆天時是謂至治泆亦音行鍼第六十七黄帝問于歧伯曰余聞九鍼於夫子而行之於百姓百姓之血氣各不同形或神動而氣}
