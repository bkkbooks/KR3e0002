  - {type: variant, offset: 90, length: 1, content: 血, SBCK: 其道而去其邪飲以半夏湯一劑隂陽已通其臥立至黄帝曰善此所謂決瀆壅塞經絡大通隂陽和得者也願聞其方伯髙曰其湯方以流水千里以外者八升􅀭之萬遍取其清五升煑之炊以葦薪火沸置秫米一升治半夏五合徐炊令竭為一升半去其滓飲汁一小杯日三稍益以知為度故其病新發者覆杯則卧汗出則已矣久者三飲而已也黄帝問於伯髙曰願聞人之肢節以應天地奈何伯髙荅曰天圓地方人頭圓足方以應之天有日月人有兩目地有九州人有九竅天有風雨人有喜怒天有雷電人有音聲天有四時人有四肢天有五音人有五藏天有六律人有六府天有冬夏人有寒熱天有十日人有手十指辰有十二人有足十指莖垂以應之女子不足二節以抱人形天有隂陽人有夫妻歳有三百六十五日人有三百六十節地有髙山人有肩膝地有深谷人有腋膕地有十二經水人有十二經脉地有泉脉人有衛}
