  - {type: variant, offset: 395, length: 785, content: 髃骨之前廉上出于柱骨之會上下入缺盆絡肺下膈屬大腸其支者從缺盆上頸貫頰入下齒中還出挾口交人中左之右右之左上挾鼻孔是動則病齒痛頸腫是主津液所生病者目黃口乾鼽衂喉痺肩前臑痛大指次指痛不用氣有餘則當脈所過者熱腫虛則寒慄不復為此諸病盛則寫之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者人迎大三倍于寸口虛者人迎反小於寸口也胃足陽明之脈起於鼻之交頞中旁納太陽之脈下循鼻外入上齒中還出挾口環脣下交承漿卻循頤後下廉出大迎循頰車上耳前過客主人循髮際至額顱其支者從大迎前下人迎循喉嚨入缺盆下膈屬胃絡脾其直者從缺盆下乳內廉下挾臍入氣街中其支者起于胃口下循腹裏下至氣街中而合以下髀關抵伏兔下膝臏中下循脛外廉下足跗入中指內間其支者下廉三寸而別下入中指外間其支者別跗上入大指間出其端是動則病洒洒振寒善呻數欠顏黑病至則惡人與火聞木聲則惕然而驚心欲動獨閉戶塞牖而處甚則欲上高而歌棄衣而走賁響腹脹是為骭厥是主血所生病者狂瘧溫淫汗出鼽衂口喎脣胗頸腫喉痺大腹水腫膝臏腫痛循膺乳氣街股伏兔骭外廉足跗上皆痛中指不用氣盛則身以前皆熱其有餘于胃則消穀善饑溺色黃氣不足則身以前皆寒慄胃中寒則脹滿為此諸病盛則寫之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者人迎大三倍于寸口虛者人迎反小于寸口也脾足太陰之脈起于大指之端循指內側白肉際過核骨後上內踝前廉上踹內循脛骨後交出厥陰之前上膝股內前廉入腹屬脾絡胃上膈挾咽連舌本散舌下其支者復從胃別上膈注心中是動則病舌本強食則嘔胃脘痛腹脹善噫得後與氣則快然如衰身體皆重是主脾所生病者舌本痛體不能動搖食不下煩心心下急痛溏瘕泄水閉黃疸不能臥強立股膝內腫厥足大指不用為此諸病盛則寫之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者寸口大三倍于人迎虛者寸口反小于人迎也心手少陰之脈起于心中出屬心系下膈絡小腸其支者從心系上挾咽繫目系其直者復從心系卻上肺下出腋下下循臑內後廉, SBCK: ''}
