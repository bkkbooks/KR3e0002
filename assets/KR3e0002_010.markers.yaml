  - {type: variant, offset: 55, length: 0, content: '', SBCK: 鍼行或氣與鍼相逢或鍼巳出氣獨行或數刺乃知或發鍼而氣逆或數刺病益劇凡此六者各不同形願聞其方歧伯曰重陽之人其神易動其氣易徃也黄帝曰何謂重陽之人歧伯曰重陽之人熇熇髙髙言語善疾舉足善髙心肺之蔵氣有餘陽氣滑盛而􅀭故神動而氣先行黄帝曰重陽之人而神不先行者何也歧伯曰此人頗有隂者也黄帝曰何以知其頗有隂也歧伯曰多陽者多喜多隂者多怒數怒者易解故曰頗有隂其隂陽之離合難故其神不能先行也黄帝曰其氣與鍼相逢奈何歧伯曰隂陽和調而血氣淖澤滑利故鍼入而氣出疾而相逢也黄帝曰鍼已出而氣獨行者何氣使然歧伯曰其隂氣多而陽氣少隂氣沉而陽氣浮者内蔵故鍼已出氣乃隨其後故獨行也黄帝曰數刺乃知何氣使然歧伯曰此人之多隂而少陽其氣沉而氣徃難故數刺乃知也黄帝曰鍼入而氣逆者何氣使然歧伯曰其氣逆與其數刺病益甚者非隂陽之氣浮沉之勢也此皆麤之所敗上之所失其形氣無過焉上膈第六十八黄帝曰氣爲上膈者食飲入而還出余已知之矣蟲爲下膈下膈者食晬時乃出余未得其意願卒聞之歧伯曰喜怒不適食飲不節寒温不時則寒汁流於腸中流於腸中則蟲寒蟲寒則積聚守於下管則腸胃充郭衛氣不營邪氣居之人食則蟲上食蟲上食則下管虛下管虚則邪氣勝之積聚以留留則癰}
