  - {type: variant, offset: 47, length: 2, content: 道黃, SBCK: 所由然歧伯曰其著孫絡之脉而成積者其積徃來上下臂手孫絡之居也浮而緩不能句積而止之故徃來移行腸胃之間水湊滲注灌濯濯有音有寒則䐜䐜滿雷引故時切痛其著於陽朙之經則挾臍而居飽食則益大饑則益小其著於緩筋也似陽朙之積飽食則痛饑則安其著於腸胃之募原也痛而外連於緩筋飽食則安饑則痛其著於伏衝之脉者揣之應手而動發手則熱氣下於兩股如湯沃之狀其著於膂筋在腸後者饑則積見飽則積不見按之不得其著於輸之脉者閉塞不通津液不下孔竅乾壅此邪氣之從外入内從上下也黄}
  - {type: page-break, offset: 47, content: '', id: KR3e0002_SBCK_010-7a}
