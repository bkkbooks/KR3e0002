body:
  text: 癲狂病第二十二癲狂病第二十二目眥外決于面者為銳眥在內近鼻者為內眥上為外眥下為內眥癲疾始生先不樂頭重痛視舉目赤甚作極已而煩心候之于顏取手太陽陽明太陰血變而止癲疾始作而引口啼呼喘悸者候之手陽明太陽左強者攻其右右強者攻其左血變而止癲疾始作先反僵因而脊痛候之足太陽陽明太陰手太陽血變而止治癲疾者常與之居察其所當取之處病至視之有過者寫之置其血于瓠壺之中至其發時血獨動矣不動灸窮骨二十壯窮骨者骶骨也骨癲疾者顑齒諸腧分肉皆滿而骨居汗出煩悗嘔多沃沫氣下泄不治筋癲疾者身倦攣急大刺項大經之大杼脈嘔多沃沫氣下泄不治脈癲疾者暴仆四肢之脈皆脹而縱脈滿盡刺之出血不滿灸之挾項太陽灸帶脈于腰相去三寸諸分肉本輸嘔多沃沫氣下泄不治癲疾者疾發如狂者死不治狂始生先自悲也喜忘苦怒善恐者得之憂饑治之取手太陰陽明血變而止及取足太陰陽明狂始發少臥不饑自高賢也自辯智也自尊貴也善罵詈日夜不休治之取手陽明太陽太陰舌下少陰視之盛者皆取之不盛釋之也狂言驚善笑好歌樂妄行不休者得之大恐治之取手陽明太陽太陰狂目妄見耳妄聞善呼者少氣之所生也治之取手太陽太陰陽明足太陰頭兩顑狂者多食善見鬼神善笑而不發于外者得之有所大喜治之取足太陰太陽陽明後取手太陰太陽陽明狂而新發未應如此者先取曲泉左右動脈及盛者見血有頃已不已以法取之灸骨骶二十壯風逆暴四肢腫身漯漯唏然時寒饑則煩飽則善變取手太陰表裏足少陰陽明之經肉凊取滎骨凊取井經也厥逆為病也足暴凊胸若將裂腸若將以刀切之煩而不能食脈大小皆濇煖取足少陰凊取足陽明凊則補之溫則寫之厥逆腹脹滿腸鳴胸滿不得息取之下胸二脅欬而動手者與背腧以手按之立快者是也內閉不得溲刺足少陰太陽與骶上以長鍼氣逆則取其太陰陽明厥陰甚取少陰陽明動者之經也少氣身漯漯也言吸吸也骨痠體重懈惰不能動補足少陰短氣息短不屬動作氣索補足少陰去血絡也
