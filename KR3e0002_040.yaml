body:
  text: 陰陽清濁第四十陰陽清濁第四十黃帝曰余聞十二經脈以應十二經水者其五色各異清濁不同人之血氣若一應之奈何歧伯曰人之血氣苟能若一則天下為一矣惡有亂者乎黃帝曰余問一人非問天下之眾歧伯曰夫一人者亦有亂氣天下之眾亦有亂人其合為一耳黃帝曰願聞人氣之清濁歧伯曰受穀者濁受氣者清清者注陰濁者注陽濁而清者上出于咽清而濁者則下行清濁相干命曰亂氣黃帝曰夫陰清而陽濁濁者有清清者有濁清濁別之奈何歧伯曰氣之大別清者上注于肺濁者下走于胃胃之清氣上出于口肺之濁氣下注于經內積于海黃帝曰諸陽皆濁何陽濁甚乎歧伯曰手太陽獨受陽之濁手太陰獨受陰之清其清者上走空竅其濁者下行諸經諸陰皆清足太陰獨受其濁黃帝曰治之奈何歧伯曰清者其氣滑濁者其氣濇此氣之常也故刺陰者深而留之刺陽者淺而疾之清濁相干者以數調之也
