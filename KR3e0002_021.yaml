body:
  text: 寒熱病第二十一寒熱病第二十一皮寒熱者不可附席毛髮焦鼻稿臘不得汗取三陽之絡以補手太陰肌寒熱者肌痛毛髮焦而脣稿臘不得汗取三陽于下以去其血者補足太陰以出其汗骨寒熱者病無所安汗注不休齒未稿取其少陰于陰股之絡齒已稿死不治骨厥亦然骨痺舉節不用而痛汗注煩心取三陰之經補之身有所傷血出多及中風寒若有所墮墜四支懈惰不收名曰體惰取其小腹臍下三結交三結交者陽明大陰也臍下三寸關元也厥痺者厥氣上及腹取陰陽之絡視主病也寫陽補陰經也頸側之動脈人迎人迎足陽明也在嬰筋之前嬰筋之後手陽明也名曰扶突次脈足少陽脈也名曰天牖次脈足太陽也名曰天柱腋下動脈臂太陰也名曰天府陽迎頭痛胸滿不得息取之人迎暴瘖氣鞕取扶突與舌本出血暴聾氣蒙耳目不明取天牖暴攣癇眩足不任身取天柱暴疸內逆肝肺相搏血溢鼻口取天府此為天牖五部臂陽明有入頄遍齒者名曰大迎下齒齲取之臂惡寒補之不惡寒寫之足太陽有入頄遍齒者名曰角孫上齒齲取之在鼻與頄前方病之時其脈盛盛則寫之虛則補之一曰取之出鼻外足陽明有挾鼻入于面者名曰懸顱屬口對入繫目本視有過者取之損有餘益不足反者益其足太陽有通項入于腦者正屬目本名曰眼系頭目苦痛取之在項中兩筋間入腦乃別陰蹻陽蹻陰陽相交陽入陰陰出陽交于目鋭眥陽氣盛則瞋目陰氣盛則瞑目熱厥取足太陰少陽皆留之寒厥取足陽明少陰于足皆留之舌縱涎下煩悗取足少陰振寒灑灑鼓頷不得汗出腹脹煩悗取手太陰刺虛者刺其去也刺實者刺其來也春取絡脈夏取分腠秋取氣口冬取經輸凡此四時各以時為齊絡脈治皮膚分腠治肌肉氣口治筋脈經輸治骨髓五藏身有五部伏兔一腓二腓者腨也背三五藏之腧四項五此五部有癰疽者死病始手臂者先取手陽明太陰而汗出病始頭首者先取項太陽而汗出病始足脛者先取足陽明而汗出臂太陰可汗出足陽明可汗出故取陰而汗出甚者止之于陽取陽而汗出甚者止之於陰凡刺之害中而不去則精泄不中而去則致氣精泄則病甚而恇致氣則生為癰疽也
