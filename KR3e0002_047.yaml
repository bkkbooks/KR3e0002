body:
  text: 本藏第四十七本藏第四十七黃帝問于歧伯曰人之血氣精神者所以奉生而周于性命者也經脈者所以行血氣而營陰陽濡筋骨利關節者也衛氣者所以溫分肉充皮膚肥腠理司關闔者也志意者所以御精神收魂魄適寒溫和喜怒者也是故血和則經脈流行營覆陰陽筋骨徑強關節清利矣衛氣和則分肉解利皮膚調柔腠理緻密矣志意和則精神專直魂魄不散悔怒不起五藏不受邪矣寒溫和則六府化穀風痺不作經脈通利肢節得安矣此人之常平也五藏者所以藏精神血氣魂魄者也六府者所以化水穀而行津液者也此人之所以具受于天也無愚智賢不肖無以相倚也然有其獨盡天壽而無邪僻之病百年不衰雖犯風雨卒寒大暑猶有弗能害也有其不離屏蔽室內無怵惕之恐然猶不免於病何也願聞其故歧伯對曰窘乎哉問也五藏者所以參天地副陰陽而連四時化五節者也五藏者固有小大高下堅脆端正偏傾者六府亦有小大長短厚薄結直緩急凡此二十五者各不同或善或惡或吉或凶請言其方心小則安邪弗能傷易傷以憂心大則憂不能傷易傷于邪心高則滿于肺中悗而善忘難開以言心下則藏外易傷于寒易恐以言心堅則藏安守固心脆則善病消疸熱中心端正則和利難傷心偏傾則操持不一無守司也肺小則少飲不病喘喝肺大則多飲善病胸痺喉痺逆氣肺高則上氣肩息咳肺下則居賁迫肺善脅下痛肺堅則不病咳上氣肺脆則苦病消疸易傷肺端正則和利難傷肺偏傾則胸偏痛也肝小則藏安無脅下之病肺大則逼胃迫咽迫咽則苦膈中且脅下痛肝高則上支賁切脅悗為息賁肝下則逼胃脅下空脅下空則易受邪肝堅則藏安難傷肝脆則善病消疸易傷肝端正則和利難傷肝偏傾則脅下痛也脾小則藏安難傷于邪也脾大則苦湊䏚而痛不能疾行脾高則䏚引季脅而痛脾下則下加于大腸下加于大腸則藏苦受邪脾堅則藏安難傷脾脆則善病消疸易傷脾端正則和利難傷脾偏傾則善滿善脹也腎小則藏安難傷腎大則善病腰痛不可以俯仰易傷以邪腎高則苦背膂痛不可以俯仰腎下則腰尻痛不可以俯仰為狐疝腎堅則不病腰背痛腎脆則善病消疸易傷腎端正則和利難傷腎偏傾則苦腰尻痛也凡此二十五變者人之所苦常病黃帝曰何以知其然也歧伯曰赤色小理者心小粗理者心大無𩩲者心高𩩲小短舉者心下𩩲長者心下堅𩩲弱小以薄者心脆𩩲直下不舉者心端正𩩲倚一方者心偏傾也白色小理者肺小粗理者肺大巨肩反膺陷喉者肺高合腋張脅者肺下好肩背厚者肺堅肩背薄者肺脆背膺厚者肺端正脅偏踈者肺偏傾也青色小理者肝小粗理者肝大廣胸反骹者肝高合脅兔骹者肝下胸脅好者肝堅脅骨弱者肝脆膺腹好相得者肝端正脅骨偏舉者肝偏傾也黃色小理者脾小粗理者脾大揭脣者脾高脣下縱者脾下脣堅者脾堅脣大而不堅者脾脆脣上下好者脾端正脣偏舉者脾偏傾也黑色小理者腎小粗理者腎大高耳者腎高耳後陷者腎下耳堅者腎堅耳薄不堅者腎脆耳好前居牙車者腎端正耳偏高者腎偏傾也凡此諸變者持則安減則病也帝曰善然非余之所問也願聞人之有不可病者至盡天壽雖有深憂大恐怵惕之志猶不能減也甚寒大熱不能傷也其有不離屏蔽室內又無怵惕之恐然不免于病者何也願聞其故歧伯曰五藏六府邪之舍也請言其故五藏皆小者少病苦燋心大愁憂五藏皆大者緩于事難使以憂五藏皆高者好高舉措五藏皆下者好出人下五藏皆堅者無病五藏皆脆者不離于病五藏皆端正者和利得人心五藏皆偏傾者邪心而善盜不可以為人平反覆言語也黃帝曰願聞六府之應歧伯答曰肺合大腸大腸者皮其應心合小腸小腸者脈其應肝合膽膽者筋其應脾合胃胃者肉其應腎合三焦膀胱三焦膀胱者腠理毫毛其應黃帝曰應之奈何歧伯曰肺應皮皮厚者大腸厚皮薄者大腸薄皮緩腹裏大者大腸大而長皮急者大腸急而短皮滑者大腸直皮肉不相離者大腸結心應脈皮厚者脈厚脈厚者小腸厚皮薄者脈薄脈薄者小腸薄皮緩者脈緩脈緩者小腸大而長皮薄而脈沖小者小腸小而短諸陽經脈皆多紆屈者小腸結脾應肉肉䐃堅大者胃厚肉䐃麼者胃薄肉䐃小而麼者胃不堅肉䐃不稱身者胃下胃下者下管約不利肉䐃不堅者胃緩肉䐃無小裏纍者胃急肉䐃多少裏纍者胃結胃結者上管約不利也肝應爪爪厚色黃者膽厚爪薄色紅者膽薄爪堅色青者膽急爪濡色赤者膽緩爪直色白無約者膽直爪惡色黑多紋者膽結也腎應骨密理厚皮者三焦膀胱厚粗理薄皮者三焦膀胱薄踈腠理者三焦膀胱緩皮急而無毫毛者三焦膀胱急毫毛美而粗者三焦膀胱直稀毫毛者三焦膀胱結也黃帝曰厚薄美惡皆有形願聞其所病歧伯答曰視其外應以知其內藏則知所病矣
