body:
  text: 口問第二十八口問第二十八黃帝閒居辟左右而問于歧伯曰余已聞九針之經論陰陽逆順六經已畢願得口問歧伯避席再拜曰善乎哉問也此先師之所口傳也黃帝曰願聞口傳歧伯答曰夫百病之始生也皆生于風雨寒暑陰陽喜怒飲食居處大驚卒恐則血氣分離陰陽破敗經絡厥絶脈道不通陰陽相逆衛氣稽留經脈虛空血氣不次乃失其常論不在經者請道其方黃帝曰人之缺者何氣使然歧伯答曰衛氣晝日行于陽夜半則行于陰陰者主夜夜者臥陽者主上陰者主下故陰氣積于下陽氣未盡陽引而上陰引而下陰陽相引故數缺陽氣盡陰氣盛則目瞑陰氣盡而陽氣盛則寤矣寫足少陰補足太陽黃帝曰人之噦者何氣使然歧伯曰穀入于胃胃氣上注于肺今有故寒氣與新谷氣俱還入于胃新故相亂真邪相攻氣并相逆復出于胃故為噦補手太陰寫足少陰黃帝曰人之唏者何氣使然歧伯曰此陰氣盛而陽氣虛陰氣疾而陽氣徐陰氣盛而陽氣絶故為唏補足太陽寫足少陰黃帝曰人之振寒者何氣使然歧伯曰寒氣客于皮膚陰氣盛陽氣虛故為振寒寒栗補諸陽黃帝曰人之噫者何氣使然歧伯曰寒氣客于胃厥逆從下上散復出于胃故為噫補足太陰陽明一曰補眉本也黃帝曰人之嚏者何氣使然歧伯曰陽氣和利滿于心出于鼻故為嚏補足太陽榮眉本一曰眉上也黃帝曰人之嚲者何氣使然歧伯曰胃不實則諸脈虛諸脈虛則筋脈懈惰筋脈懈惰則行陰用力氣不能復故為嚲因其所在補分肉間黃帝曰人之哀而泣涕出者何氣使然歧伯曰心者五藏六府之主也目者宗脈之所聚也上液之道也口鼻者氣之門戶也故悲哀愁憂則心動心動則五藏六府皆搖搖則宗脈感宗脈感則液道開液道開故泣涕出焉液者所以灌精濡空竅者也故上液之道開則泣泣不止則液竭液竭則精不灌精不灌則目無所見矣故命曰奪精補天柱經俠頸黃帝曰人之太息者何氣使然歧伯曰憂思則心系急心系急則氣道約約則不利故太息以伸出之補手少陰心主足少陽留之也黃帝曰人之涎下者何氣使然歧伯曰飲食者皆入于胃胃中有熱則蟲動蟲動則胃緩胃緩則廉泉開故涎下補足少陰黃帝曰人之耳中鳴者何氣使然歧伯曰耳者宗脈之所聚也故胃中空則宗脈虛虛則下溜脈有所竭者故耳鳴補客主人手大指爪甲上與肉交者也黃帝曰人之自齧舌者何氣使然此厥逆走上脈氣輩至也少陰氣至則齧舌少陽氣至則齧頰陽明氣至則齧脣矣視主病者則補之凡此十二邪者皆奇邪之走空竅者也故邪之所在皆為不足故上氣不足腦為之不滿耳為之苦鳴頭為之苦傾目為之眩中氣不足溲便為之變腸為之苦鳴下氣不足則乃為痿厥心悗補足外踝下留之黃帝曰治之奈何歧伯曰腎主為缺取足少陰肺主為噦取手太陰足少陰唏者陰與陽絶故補足太陽寫足少陰振寒者補諸陽噫者補足太陰陽明嚏者補足太陽眉本嚲因其所在補分肉間泣出補天柱經俠頸俠頸者頭中分也太息補手少陰心主足少陽留之涎下補足少陰耳鳴補客主人手大指爪甲上與肉交者自齧舌視主病者則補之目眩頭傾補足外踝下留之痿厥心悗刺足大指間上二寸留之一曰足外踝下留之
