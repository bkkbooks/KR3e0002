body:
  text: 脈度第十七脈度第十七黃帝曰願聞脈度歧伯荅曰手之六陽從手至頭長五尺五六三丈手之六陰從手至胸中三尺五寸三六一丈八尺五六三尺合二丈一尺足之六陽從足上至頭八尺六八四丈八尺足之六陰從足至胸中六尺五寸六六三丈六尺五六三尺合三丈九尺蹻脈從足至目七尺五寸二七一丈四尺二五一尺合一丈五尺督脈任脈各四尺五寸二四八尺二五一尺合九尺凡都合一十六丈二尺此氣之大經隧也經脈為裏支而橫者為絡絡之別者為孫盛而血者疾誅之盛者寫之虛者飲藥以補之五藏常內閱于上七竅也故肺氣通於鼻肺和則鼻能知臭香矣心氣通于舌心和則舌能知五味矣肝氣通于目肝和則目能辨五色矣脾氣通于口脾和則口能知五穀矣腎氣通于耳腎和則耳能聞五音矣五藏不和則七竅不通六府不和則留為癰故邪在府則陽脈不和陽脈不和則氣留之氣留之則陽氣盛矣陽氣太盛則陰不利陰脈不利則血留之血留之則陰氣盛矣陰氣太盛則陽氣不能榮也故曰關陽氣太盛則陰氣弗能榮也故曰格陰陽俱盛不得相榮故曰關格關格者不得盡期而死也黃帝曰蹻脈安起安止何氣榮水歧伯荅曰蹻脈者少陰之別起于然骨之後上內踝之上直上循陰股入陰上循胸裏入缺盆上出人迎之前入頄屬目內眥合于太陽陽蹻而上行氣并相還則為濡目氣不榮則目不合黃帝曰氣獨行五藏不榮六府何也歧伯荅曰氣之不得無行也如水之流如日月之行不休故陰脈榮其藏陽脈榮其府如環之無端莫知其紀終而復始其流溢之氣內溉藏府外濡腠理黃帝曰蹻脈有陰陽何脈當其數歧伯荅曰男子數其陽女子數其陰當數者為經其不當數者為絡也
