body:
  text: 逆順肥瘦第三十八逆順肥瘦第三十八黃帝問于歧伯曰余聞針道于夫子衆多畢悉矣夫子之道應若失而據未有堅然者也夫子之問學熟乎將審察于物而心生之乎歧伯曰聖人之為道者上合于天下合于地中合于人事必有明法以起度數法式檢押乃後可傳焉故匠人不能釋尺寸而意短長廢繩墨而起平水也工人不能置規而為圓去矩而為方知用此者固自然之物易用之教逆順之常也黃帝曰願聞自然奈何歧伯曰臨深決水不用功力而水可竭也循掘決衝而經可通也此言氣之滑澀血之清濁行之逆順也黃帝曰願聞人之白黑肥瘦小長各有數乎歧伯曰年質壯大血氣充盈膚革堅固因加以邪刺此者深而留之此肥人也廣肩腋項肉薄厚皮而黑色脣臨臨然其血黑以濁其氣澀以遲其為人也貪于取與刺此者深而留之多益其數也黃帝曰刺瘦人奈何歧伯曰瘦人者皮薄色少肉廉廉然薄脣輕言其血清氣滑易脫于氣易損于血刺此者淺而疾之黃帝曰刺常人奈何歧伯曰視其白黑各為調之其端正敦厚者其血氣和調刺此者無失常數也黃帝曰刺壯士真骨者奈何歧伯曰刺壯士真骨堅肉緩節監監然此人重則氣澀血濁刺此者深而留之多益其數徑則氣滑血清刺此者淺而疾之黃帝曰刺嬰兒奈何歧伯曰嬰兒者其肉脆血少氣弱刺此者以豪針淺刺而疾發針日再可也黃帝曰臨深決水奈何歧伯曰血清氣濁疾寫之則氣竭焉黃帝曰循掘決衝奈何歧伯曰血濁氣澀疾寫之則經可通也黃帝曰脈行之逆順奈何歧伯曰手之三陰從藏走手手之三陽從手走頭足之三陽從頭走足足之三陰從足走腹黃帝曰少陰之脈獨下行何也歧伯曰不然夫衝脈者五藏六府之海也五藏六府皆稟焉其上者出於頏顙滲諸陽灌諸精其下者注少陰之大絡出于氣街循陰股內廉入膕中伏行骭骨內下至內踝之後屬而別其下者並于少陰之經滲三陰其前者伏行出跗屬下循跗入大指間滲諸絡而溫肌肉故別絡結則跗上不動不動則厥厥則寒矣黃帝曰何以明之歧伯曰以言導之切而驗之其非必動然後乃可明逆順之行也黃帝曰窘乎哉聖人之為道也明于日月微于毫釐其非夫子孰能道之也
