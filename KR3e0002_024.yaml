body:
  text: 厥病第二十四厥病第二十四厥頭痛面若腫起而煩心取之足陽明太陰厥頭痛頭脈痛心悲善泣視頭動脈反盛者刺盡去血後調足厥陰厥頭痛貞貞頭重而痛寫頭上五行行五先取手少陰後取足少陰厥頭痛意善忘按之不得取頭面左右動脈後取足太陰厥頭痛項先痛腰脊為應先取天柱後取足太陽厥頭痛頭痛甚耳前後脈湧有熱寫出其血後取足少陽真頭痛頭痛甚腦盡痛手足寒至節死不治頭痛不可取于腧者有所擊墮惡血在于內若肉傷痛未已可則刺不可遠取也頭痛不可刺者大痺為惡日作者可令少愈不可已頭半寒痛先取手少陽陽明後取足少陽陽明厥心痛與背相控善瘛如從後觸其心傴僂者腎心痛也先取京骨崑崙發狂不已取然谷厥心痛腹脹胸滿心尤痛甚胃心痛也取之大都大白厥心痛痛如以錐針刺其心心痛甚者脾心痛也取之然谷太溪厥心痛色蒼蒼如死狀終日不得太息肝心痛也取之行間大衝厥心痛臥若徒居心痛間動作痛益甚色不變肺心痛也取之魚際大淵真心痛手足凊至節心痛甚旦發夕死夕發旦死心痛不可刺者中有盛聚不可取于腧腸中有蟲瘕及蛟蛔皆不可取以小針心腸痛憹作痛腫聚往來上下行痛有休止腹熱喜渴涎出者是蛟蛔也以手聚按而堅持之無令得移以大針刺之久持之蟲不動乃出針也恲腹憹痛形中上者耳聾無聞取耳中耳鳴取耳前動脈耳痛不可刺者耳中有膿若有乾耵聹耳無聞也耳聾取手小指次指爪甲上與肉交者先取手後取足耳鳴取手中指爪甲上左取右右取左先取手後取足足髀不可舉側而取之在樞合中以員利針大針不可刺病注下血取曲泉風痺淫濼病不可已者足如履冰時如入湯中股脛淫濼煩心頭痛時嘔時悗眩已汗出久則目眩悲以喜恐短氣不樂不出三年死也
