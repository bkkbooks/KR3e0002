body:
  text: 五色第四十九五色第四十九雷公問于黃帝曰五色獨決于明堂乎小子未知其所謂也黃帝曰明堂者鼻也闕者眉間也庭者顏也蕃者頰側也蔽者耳門也其間欲方大去之十步皆見于外如是者壽必中百歲雷公曰五官之辨奈何黃帝曰明堂骨高以起平以直五藏次于中央六府挾其兩側首面上于闕庭王宮在于下極五藏安于胸中真色以致病色不見明堂潤澤以清五官惡得無辨乎雷公曰其不辨者可得聞乎黃帝曰五色之見也各出其色部部骨陷者必不免于病矣其色部乘襲者雖病甚不死矣雷公曰官五色奈何黃帝曰青黑為痛黃赤為熱白為寒是謂五官雷公曰病之益甚與其方衰如何黃帝曰外內皆在焉切其脈口滑小緊以沉者病益甚在中人迎氣大緊以浮者其病益甚在外其脈口浮滑者病日進人迎沉而滑者病日損其脈口滑以沉者病日進在內其人迎脈滑盛以浮者其病日進在外脈之浮沉及人迎與寸口氣小大等者病難已病之在藏沉而大者易已小為逆病在府浮而大者其病易已人迎盛堅者傷於寒氣口盛堅者傷於食雷公曰以色言病之間甚奈何黃帝曰其色粗以明沉大者為甚其色上行者病益甚其色下行如雲徹散者病方以五色各有藏部有外部有內部也色從外部走內部者其病從外走內其色從內走外者其病從內走外病生於內者先治其陰後治其陽反者益甚其病生於陽者先治其外後治其內反者益甚其脈滑大以代而長者病從外來目有所見志有所惡此陽氣之并也可變而已雷公曰小子聞風者百病之始也厥逆者寒濕之起也別之奈何黃帝曰常候闕中薄澤為風沖濁為痺在地為厥此其常也各以其色言其病雷公曰人不病卒死何以知之黃帝曰大氣入于藏府者不病而卒死矣雷公曰病小愈而卒死者何以知之黃帝曰赤色出兩顴大如母指者病雖小愈必卒死黑色出於庭大如母指必不病而卒死雷公再拜曰善哉其死有期乎黃帝曰察色以言其時雷公曰善乎願卒聞之黃帝曰庭者首面也闕上者咽喉也闕中者肺也下極者心也直下者肝也肝左者膽也下者脾也方上者胃也中央者大腸也挾大腸者腎也當腎者臍也面王以上者小腸也面王以下者膀胱子處也顴者肩也顴後者臂也臂下者手也目內眥上者膺乳也挾繩而上者背也循牙車以下者股也中央者膝也膝以下者脛也當脛以下者足也巨分者股裏也巨屈者膝臏也此五藏六府肢節之部也各有部分有部分用陰和陽用陽和陰當明部分萬舉萬當能別左右是謂大道男女異位故曰陰陽審察澤夭謂之良工沉濁為內浮澤為外黃赤為風青黑為痛白為寒黃而膏潤為膿赤甚者為血痛甚為攣寒甚為皮不仁五色各見其部察其浮沉以知淺深察其澤夭以觀成敗察其散搏以知遠近視色上下以知病處積神于心以知往今故相氣不微不知是非屬意勿去乃知新故色明不粗沉大為甚不明不澤其病不甚其色散駒駒然未有聚其病散而氣痛聚未成也腎乘心心先病腎為應色皆如是男子色在于面王為小腹痛下為卵痛其圜直為莖痛高為本下為首狐疝㿉陰之屬也女子在于面王為膀胱子處之病散為痛搏為聚方員左右各如其色形其隨而下至胝為淫有潤如膏狀為暴食不潔左為左右為右其色有邪聚散而不端面色所指者也色者青黑赤白黃皆端滿有別鄉別鄉赤者其色亦大如榆莢在面王為不日其色上鋭首空上向下鋭下向在左右如法以五色命藏青為肝赤為心白為肺黃為脾黑為腎肝合筋心合脈肺合皮脾合肉腎合骨也
