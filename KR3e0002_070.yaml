body:
  text: 寒熱第七十寒熱第七十黃帝問于歧伯曰寒熱瘰癧在於頸腋者皆何氣使生歧伯曰此皆鼠瘻寒熱之毒氣也留於脈而不去者也黃帝曰去之奈何歧伯曰鼠瘻之本皆在於藏其末上出於頸腋之間其浮於脈中而未內著於肌肉而外為膿血者易去也黃帝曰去之奈何歧伯曰請從其本引其末可使衰去而絶其寒熱審按其道以豫之徐往徐來以去之其小如麥者一刺知三刺而已黃帝曰決其生死奈何歧伯曰反其目視之其中有赤脈上下貫瞳子見一脈一歲死見一脈半一歲半死見二脈二歲死見二脈半二歲半死見三脈三歲而死見赤脈不下貫瞳子可治也
