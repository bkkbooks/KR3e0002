body:
  text: 腸胃第三十一腸胃第三十一黃帝問于伯高曰余願聞六府傳穀者腸胃之小大長短受穀之多少奈何伯高曰請盡言之穀所從出入淺深遠近長短之度脣至齒長九分口廣二寸半齒以後至會厭深三寸半大容五合舌重十兩長七寸廣二寸半咽門重十兩廣一寸半至胃長一尺六寸胃䊸曲屈伸之長二尺六寸大一尺五寸徑五寸大容三斗五升小腸後附脊左環回周疊積其注于回腸者外附于臍上回運環十六曲大二寸半徑八分分之少半長三丈二尺回腸當臍左環回周葉積而下回運環反十六曲大四寸徑一寸寸之少半長二丈一尺廣腸傳脊以受回腸左環葉脊上下辟大八寸徑二寸寸之大半長二尺八寸腸胃所入至所出長六丈四寸四分回曲環反三十二曲也
