body:
  text: 論痛第五十三論痛第五十三黃帝問于少俞曰筋骨之強弱肌肉之堅脆皮膚之厚薄腠理之踈密各不同其于鍼石火焫之痛何如腸胃之厚薄堅脆亦不等其於毒藥何如願盡聞之少俞曰人之骨強筋弱肉緩皮膚厚者耐痛其于鍼石之痛火焫亦然黃帝曰其耐火焫者何以知之少俞荅曰加以黑色而美骨者耐火焫黃帝曰其不耐鍼石之痛者何以知之少俞曰堅肉薄皮者不耐鍼石之痛于火焫亦然黃帝曰人之病或同時而傷或易已或難已其故何如少俞曰同時而傷其身多熱者易已多寒者難已黃帝曰人之勝毒何以知之少俞曰胃厚色黑大骨及肥者皆勝毒故其瘦而薄胃者皆不勝毒也
