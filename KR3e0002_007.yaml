body:
  text: 官鍼第七官鍼第七凡刺之要官鍼最妙九鍼之宜各有所為長短大小各有所施也不得其用病弗能移疾淺鍼深內傷良肉皮膚為癰病深鍼淺病氣不寫反為大膿病小鍼大氣寫太甚疾必為害病大鍼小氣不泄寫亦復為敗失鍼之宜大者寫小者不移已言其過請言其所施病在皮膚無常處者取以鑱鍼于病所膚白勿取病在分肉間取以員鍼于病所病在經絡痼痺者取以鋒鍼病在脈氣少當補之者取以鍉鍼于井滎分輸病為大膿者取以鈹鍼病痺氣暴發者取以員利鍼病痺氣痛而不去者取以毫鍼病在中者取以長鍼病水腫不能通關節者取以大鍼病在五藏固居者取以鋒鍼寫于井滎分輸取以四時凡刺有九日應九變一曰輸刺輸刺者刺諸經滎輸藏腧也二曰遠道刺遠道刺者病在上取之下刺府腧也三曰經刺經刺者刺大經之結絡經分也四曰絡刺絡刺者刺小絡之血脈也五曰分刺分刺者刺分肉之間也六曰大寫刺大寫刺者刺大膿以鈹鍼也七曰毛刺毛刺者刺浮痺皮膚也八曰巨刺巨刺者左取右右取左九曰焠刺焠刺者刺燔鍼則取痺也凡刺有十二節以應十二經一曰偶刺偶刺者以手直心若背直痛所一刺前一刺後以治心痺刺此者傍鍼之也二曰報刺報刺者刺痛無常處也上下行者直內無拔鍼以左手隨病所按之乃出鍼復刺之也三曰恢刺恢刺者直刺傍之舉之前後恢筋急以治筋痺也四曰齊刺齊刺者直入一傍入二以治寒氣小深者或曰三刺三刺者治痺氣小深者也五曰揚刺揚刺者正內一傍內四而浮之以治寒氣之博大者也六曰直鍼刺直鍼刺者引皮乃刺之以治寒氣之淺者也七曰輸刺輸刺者直入直出稀發鍼而深之以治氣盛而熱者也八曰短刺短刺者刺骨痺稍搖而深之致鍼骨所以上下摩骨也九曰浮刺浮刺者傍入而浮之以治肌急而寒者也十曰陰刺陰刺者左右率刺之以治寒厥中寒厥足踝後少陰也十一曰傍鍼刺傍鍼刺者直刺傍刺各一以治留痺久居者也十二曰贊刺贊刺者直入直出數發鍼而淺之出血是謂治癰腫也脈之所居深不見者刺之微內鍼而久留之以致其空脈氣也脈淺者勿刺按絕其脈乃刺之無令精出獨出其邪氣耳所謂三刺則穀氣出者先淺刺絕皮以出陽邪再刺則陰邪出者少益深絕皮致肌肉未入分肉間也已入分肉之間則穀氣出故刺法曰始刺淺之以逐邪氣而來血氣後刺深之以致陰氣之邪最後刺極深之以下穀氣此之謂也故用鍼者不知年之所加氣之盛衰虛實之所起不可以為工也凡刺有五以應五藏一曰半刺半刺者淺內而疾發鍼無鍼傷肉如拔毛狀以取皮氣此肺之應也二曰豹文刺豹文刺者左右前後鍼之中脈為故以取經絡之血者此心之應也三曰關刺關刺者直刺左右盡筋上以取筋痺慎無出血此肝之應也或曰淵刺一曰豈刺四曰合谷刺合谷刺者左右雞足鍼于分肉之間以取肌痺此脾之應也五曰輸刺輸刺者直入直出深內之至骨以取骨痺此腎之應也
