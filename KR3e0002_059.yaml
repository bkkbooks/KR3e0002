body:
  text: 衛氣失常第五十九衛氣失常第五十九黃帝曰衛氣之留于腹中搐積不行苑蘊不得常所使人肢脅胃中滿喘呼逆息者何以去之伯高曰其氣積于胸中者上取之積于腹中者下取之上下皆滿者傍取之黃帝曰取之奈何伯高對曰積于上寫人迎天突喉中積于下者寫三里與氣街上下皆滿者上下取之與季脅之下一寸重者雞足取之診視其脈大而弦急及絕不至者及腹皮急甚者不可刺也黃帝曰善黃帝問于伯高曰何以知皮肉氣血筋骨之病也伯高曰色起兩眉薄澤者病在皮脣色青黃赤白黑者病在肌肉營氣濡然者病在血氣目色青黃赤白黑者病在筋耳焦枯受塵垢病在骨黃帝曰病形何如取之奈何伯高曰夫百病變化不可勝數然皮有部肉有柱血氣有輸骨有屬黃帝曰願聞其故伯高曰皮之部輸于四末肉之柱在臂脛諸陽分肉之間與足少陰分間血氣之輸輸于諸絡氣血留居則盛而起筋部無陰無陽無左無右候病所在骨之屬者骨空之所以受益而益腦髓者也黃帝曰取之奈何伯高曰夫病變化浮沉深淺不可勝窮各在其處病間者淺之甚者深之間者小之甚者眾之隨變而調氣故曰上工黃帝問于伯高曰人之肥瘦大小寒溫有老壯少小別之奈何伯高對曰人年五十已上為老二十已上為壯十八已上為少六歲已上為小黃帝曰何以度知其肥瘦伯高曰人有肥有膏有肉黃帝曰別此奈何伯高曰膕肉堅皮滿者肥膕肉不堅皮緩者膏皮肉不相離者肉黃帝曰身之寒溫何如伯高曰膏者其肉淖而麤理者身寒細理者身熱脂者其肉堅細理者熱麤理者寒黃帝曰其肥瘦大小奈何伯高曰膏者多氣而皮縱緩故能縱腹垂腴肉者身體容大脂者其身收小黃帝曰三者之氣血多少何如伯高曰膏者多氣多氣者熱熱者耐寒肉者多血則充形充形則平脂者其血清氣滑少故不能大此別于眾人者也黃帝曰眾人奈何伯高曰眾人皮肉脂膏不能相加也血與氣不能相多故其形不小不大各自稱其身命曰眾人黃帝曰善治之奈何伯高曰必先別其三形血之多少氣之清濁而後調之治無失常經是故膏人縱腹垂腴肉人者上下容大脂人者雖脂不能大者
