body:
  text: 根結第五根結第五歧伯曰天地相感寒暖相移陰陽之道孰少孰多陰道偶陽道奇發于春夏陰氣少陽氣多陰陽不調何補何寫發于秋冬陽氣少陰氣多陰氣盛而陽氣衰故莖葉枯槁濕雨下歸陰陽相移何寫何補奇邪離經不可勝數不知根結五藏六府折關敗樞開闔而走陰陽大失不可復取九針之玄要在終始故能知終始一言而畢不知終始針道咸絶太陽根于至陰結于命門命門者目也陽明根于厲兌結于顙大顙大者鉗耳也少陽根于竅陰結于窗籠窗籠者耳中也太陽為開陽明為闔少陽為樞故開折則肉節瀆而暴病起矣故暴病者取之太陽視有餘不足瀆者皮肉宛膲而弱也闔折則氣無所止息而痿疾起矣故痿疾者取之陽明視有餘不足無所止息者真氣稽留邪氣居之也樞折即骨繇而不安於地故骨繇者取之少陽視有餘不足骨繇者節緩而不收也所謂骨繇者搖故也當窮其本也太陰根于隱白結于大倉少陰根于湧泉結于廉泉厥陰根于大敦結于玉英絡于膻中太陰為開厥陰為闔少陽為樞故開折則倉廩無所輸膈洞膈洞者取之太陰視有餘不足故開折者氣不足而生病也闔折即氣絶而喜悲悲者取之厥陰視有餘不足樞折則脈有所結而不通不通者取之少陰視有餘不足有結者皆取之不足足太陽根于至陰溜于京骨注于崑崙入于天柱飛揚也足少陽根于竅陰溜于丘墟注于陽輔入于天容光明也足陽明根于厲兌溜于衝陽注于下陵入于人迎豐隆也手太陽根于少澤溜于陽谷注于少海入于天窗支正也手少陽根于關衝溜于陽池注于支溝入于天牖外關也手陽明根于商陽溜于合谷注于陽溪入于扶突偏歷也此所謂十二經者盛絡皆當取之一日一夜五十營以營五藏之精不應數者名曰狂生所謂五十營者五藏皆受氣持其脈口數其至也五十動而不一代者五藏皆受氣四十動一代者一藏無氣三十動一代者二藏無氣二十動一代者三藏無氣十動一代者四藏無氣不滿十動一代者五藏無氣豫之短期要在終始所謂五十動而不一代者以為常也以知五藏之期豫之短期者乍數乍疏也黃帝曰逆順五體者言人骨節之小大肉之堅脆皮之厚薄血之清濁氣之滑澀脈之長短血之多少經絡之數余已知之矣此皆布衣匹夫之士也夫王公大人血食之君身體柔脆肌肉軟弱血氣慓悍滑利其刺之徐疾淺深多少可得同之乎歧伯答曰膏粱菽藿之味何可同也氣滑即出疾其氣澀則出遲氣悍則針小而入淺氣澀則針大而入深深則欲留淺則欲疾以此觀之刺布衣者深以留之刺大人者微以徐之此皆因氣慓悍滑利也黃帝曰形氣之逆順奈何歧伯曰形氣不足病氣有餘是邪勝也急寫之形氣有餘病氣不足急補之形氣不足病氣不足此陰陽氣俱不足也不可刺之刺之則重不足重不足則陰陽俱竭血氣皆盡五藏空虛筋骨髓枯老者絶滅壯者不復矣形氣有餘病氣有餘此謂陰陽俱有餘也急寫其邪調其虛實故曰有餘者寫之不足者補之此之謂也故曰刺不知逆順真邪相搏滿而補之則陰陽四溢腸胃充郭肝肺內䐜陰陽相錯虛而寫之則經脈空虛血氣竭枯腸胃㒤辟皮膚薄著毛腠夭膲豫之死期故曰用針之要在于知調陰與陽調陰與陽精氣乃光合形與氣使神內藏故曰上工平氣中工亂脈下工絶氣危生故曰下工不可不慎也必審五藏變化之病五脈之應經絡之實虛皮之柔粗而後取之也
