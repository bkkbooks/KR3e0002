body:
  text: 禁服第四十八禁服第四十八雷公問于黃帝曰細子得受業通于九針六十篇旦暮勤服之近者編絶久者簡垢然尚諷誦弗置未盡解於意矣外揣言渾束為一未知所謂也夫大則無外小則無內大小無極高下無度束之奈何士之才力或有厚薄智慮褊淺不能博大深奧自強于學若細子細子恐其散于後世絶于子孫敢問約之奈何黃帝曰善乎哉問也此先師之所禁坐私傳之也割臂歃血之盟也子若欲得之何不齊乎雷公再拜而起曰請聞命于是也乃齊宿三日而請曰敢問今日正陽細子願以受盟黃帝乃與俱入齊室割臂歃血黃帝親祝曰今日正陽歃血傳方有敢背此言者反受其殃雷公再拜曰細子受之黃帝乃左握其手右授之書曰慎之慎之吾為子言之凡刺之理經脈為始營其所行知其度量內刺五藏外刺六府審察衛氣為百病母調其虛實虛實乃止寫其血絡血盡不殆矣雷公曰此皆細子之所以通未知其所約也黃帝曰夫約方者猶約囊也囊滿而弗約則輸泄方成弗約則神與弗俱雷公曰願為下材者勿滿而約之黃帝曰未滿而知約之以為工不可以為天下師雷公曰願聞為工黃帝曰寸口主中人迎主外兩者相應俱往俱來若引繩大小齊等春夏人迎微大秋冬寸口微大如是者名曰平人人迎大一倍于寸口病在足少陽一倍而躁在手少陽人迎二倍病在足太陽二倍而躁病在手太陽人迎三倍病在足陽明三倍而躁病在手陽明盛則為熱虛則為寒緊則為痛痺代則乍甚乍間盛則寫之虛則補之緊痛則取之分肉代則取血絡且飲藥陷下則灸之不盛不虛以經取之名曰經刺人迎四倍者且大且數名曰溢陽溢陽為外格死不治必審按其本末察其寒熱以驗其藏府之病寸口大于人迎一倍病在足厥陰一倍而躁在手心主寸口二倍病在足少陰二倍而躁在手少陰寸口三倍病在足太陰三倍而躁在手太陰盛則脹滿寒中食不化虛則熱中出縻少氣溺色變緊則痛痺代則乍痛乍止盛則寫之虛則補之緊則先刺而後灸之代則取血絡而後調之陷下則徒灸之陷下者脈血結于中中有著血血寒故宜灸之不盛不虛以經取之寸口四倍者名曰內關內關者且大且數死不治必審察其本末之寒溫以驗其藏府之病通其營輸乃可傳于大數大數曰盛則徒寫之虛則徒補之緊則灸刺且飲藥陷下則徒灸之不盛不虛以經取之所謂經治者飲藥亦曰灸刺脈急則引脈大以弱則欲安靜用力無勞也
