body:
  text: 五味第五十六五味第五十六黃帝曰願聞穀氣有五味其入五藏分別奈何伯高曰胃者五藏六府之海也水穀皆入于胃五藏六府皆稟氣于胃五味各走其所喜穀味酸先走肝穀味苦先走心穀味甘先走脾穀味辛先走肺穀味鹹先走腎穀氣津液已行營衛大通乃化糟粕以次傳下黃帝曰營衛之行奈何伯高曰穀始入于胃其精微者先出于胃之兩焦以溉五藏別出兩行營衛之道其大氣之搏而不行者積于胸中命曰氣海出于肺循喉咽故呼則出吸則入天地之精氣其大數常出三入一故穀不入半日則氣衰一日則氣少矣黃帝曰穀之五味可得聞乎伯高曰請盡言之五穀秔米甘麻酸大豆鹹麥苦黃黍辛五果棗甘李酸栗鹹杏苦桃辛五畜牛甘犬酸豬鹹羊苦雞辛五菜葵甘韭酸藿鹹薤苦葱辛五色黃色宜甘青色宜酸黑色宜鹹赤色宜苦白色宜辛凡此五者各有所宜五宜所言五色者脾病者宜食秔米飯牛肉棗葵心病者宜食麥羊肉杏薤腎病者宜食大豆黃卷豬肉栗藿肝病者宜食麻犬肉李韭肺病者宜食黃黍雞肉桃葱五禁肝病禁辛心病禁鹹脾病禁酸腎病禁甘肺病禁苦肝色青宜食甘秔米飯牛肉棗葵皆甘心色赤宜食酸犬肉麻李韭皆酸脾色黃宜食鹹大豆豕肉栗藿皆鹹肺色白宜食苦麥羊肉杏薤皆苦腎色黑宜食辛黃黍雞肉桃葱皆辛
