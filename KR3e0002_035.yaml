body:
  text: 脹論第三十五脹論第三十五黃帝曰脈之應于寸口如何而脹歧伯曰其脈大堅以澀者脹也黃帝曰何以知藏府之脹也歧伯曰陰為藏陽為府黃帝曰夫氣之令人脹也在于血脈之中耶藏府之內乎歧伯曰三者皆存焉然非脹之舍也黃帝曰願聞脹之舍歧伯曰夫脹者皆在于藏府之外排藏府而郭胸脅脹皮膚故命曰脹黃帝曰藏府之在胸脅腹裏之內也若匣匱之藏禁器也各有次舍異名而同處一域之中其氣各異願聞其故黃帝曰未解其意再問歧伯曰夫胸腹藏府之郭也膻中者心主之宮城也胃者太倉也咽喉小腸者傳送也胃之五竅者閭里門戶也廉泉玉英者津液之道也故五藏六府者各有畔界其病各有形狀營氣循脈衛氣逆為脈脹衛氣並脈循分為膚脹三里而寫近者一下遠者三下無問虛實工在疾寫黃帝曰願聞脹形歧伯曰夫心脹者煩心短氣臥不安肺脹者虛滿而喘咳肝脹者脅下滿而痛引小腹脾脹者善噦四肢煩悗體重不能勝衣臥不安腎脹者腹滿引背央央然腰髀痛六府脹胃脹者腹滿胃脘痛鼻聞焦臭妨于食大便難大腸脹者腸鳴而痛濯濯冬日重感于寒則飧泄不化小腸脹者少腹䐜脹引腰而痛膀胱脹者少腹滿而氣癃三焦脹者氣滿于皮膚中輕輕然而不堅膽脹者脅下痛脹口中苦善太息凡此諸脹者其道在一明知逆順針數不失寫虛補實神去其室致邪失正真不可定粗之所敗謂之夭命補虛寫實神歸其室久塞其空謂之良工黃帝曰脹者焉生何因而有歧伯曰衛氣之在身也常然並脈循分肉行有逆順陰陽相隨乃得天和五藏更始四時循序五穀乃化然後厥氣在下營衛留止寒氣逆上真邪相攻兩氣相搏乃合為脹也黃帝曰善何以解惑歧伯曰合之于真三合而得帝曰善黃帝問于歧伯曰脹論言無問虛實工在疾寫近者一下遠者三下今有其三而不下者其過焉在歧伯對曰此言陷于肉盲而中氣穴者也不中氣穴則氣內閉針不陷盲則氣不行上越中肉則衛氣相亂陰陽相逐其于脹也當寫不寫氣故不下三而不下必更其道氣下乃止不下復始可以萬全烏有殆者乎其于脹也必審其疹當寫則寫當補則補如鼓應桴惡有不下者乎
