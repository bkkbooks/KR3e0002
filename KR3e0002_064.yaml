body:
  text: 陰陽二十五人第六十四陰陽二十五人第六十四黃帝曰余聞陰陽之人何如伯高曰天地之間六合之內不離于五人亦應之故五五二十五人之政而陰陽之人不與焉其態又不合于衆者五余已知之矣願聞二十五人之形血氣之所生別而以候從外知內何如歧伯曰悉乎哉問也此先師之祕也雖伯高猶不能明之也黃帝避席遵循而卻曰余聞之得其人弗教是謂重失得而泄之天將厭之余願得而明之金匱藏之不敢揚之歧伯曰先立五形金木水火土別其五色異其五形之人而二十五人具矣黃帝曰願卒聞之歧伯曰慎之慎之臣請言之木形之人比於上角似於蒼帝其為人蒼色小頭長面大肩背直身小手足好有才勞心少力多憂勞於事能春夏不能秋冬感而病生足厥陰他他然大角之人比於左足少陽少陽之上遺遺然左角之人比於右足少陽少陽之下隨隨然釱角之人比於右足少陽少陽之上推推然判角之人比於左足少陽少陽之下栝栝然火形之人比於上徵似於赤帝其為人赤色廣䏖脫面小頭好肩背髀腹小手足行安地疾心行搖肩背肉滿有氣輕財少信多慮見事明好顏急心不壽暴死能春夏不能秋冬秋冬感而病生手少陰核核然質徵之人比於左手太陽太陽之上肌肌然少徵之人比於右手太陽太陽之下慆慆然右徵之人比於右手太陽太陽之上鮫鮫然質判之人比於左手太陽太陽之下支支頤頤然土形之人比於上宮似於上古黃帝其為人黃色圓面大頭美肩背大腹美股脛小手足多肉上下相稱行安地舉足浮安心好利人不喜權勢善附人也能秋冬不能春夏春夏感而病生足太陰敦敦然大宮之人比於左足陽明陽明之上婉婉然加宮之人比於左足陽明陽明之下坎坎然少宮之人比於右足陽明陽明之上樞樞然左宮之人比於右足陽明陽明之下兀兀然金形之人比於上商似於白帝其為人方面白色小頭小肩背小腹小手足如骨發踵外骨輕身清廉急心靜悍善為吏能秋冬不能春夏春夏感而病生手太陰敦敦然釱商之人比於左手陽明陽明之上廉廉然右商之人比於左手陽明陽明之下脫脫然大商之人比於右手陽明陽明之上監監然少商之人比於右手陽明陽明之下嚴嚴然水形之人比於上羽似於黑帝其為人黑色面不平大頭廉頤小肩大腹動手足發行搖身下尻長背延延然不敬畏善欺紿人戮死能秋冬不能春夏春夏感而病生足少陰汗汗然大羽之人比於右足太陽太陽之上頰頰然少羽之人比於左足太陽太陽之下紆紆然衆之為人比於右足太陽太陽之下潔潔然桎之為人比於左足太陽太陽之上安安然是故五形之人二十五變者衆之所以相欺者是也黃帝曰得其形不得其色何如歧伯曰形勝色色勝形者至其勝時年加感則病行失則憂矣形色相得者富貴大樂黃帝曰其形色相勝之時年加可知乎歧伯曰凡年忌下上之人大忌常加七歲十六歲二十五歲三十四歲四十三歲五十二歲六十一歲皆人之大忌不可不自安也感則病行失則憂矣當此之時無為姦事是謂年忌黃帝曰夫子之言脈之上下血氣之候以知形氣奈何歧伯曰足陽明之上血氣盛則髯美長血少氣多則髯短故氣少血多則髯少血氣皆少則無髯兩吻多畫足陽明之下血氣盛則下毛美長至胸血多氣少則下毛美短至臍行則善高舉足足指少肉足善寒血少氣多則肉而善瘃血氣皆少則無毛有則稀枯悴善痿厥足痺足少陽之上氣血盛則通髯美長血多氣少則通髯美短血少氣多則少髯血氣皆少則無鬚感於寒濕則善痺骨痛爪枯也足少陽之下血氣盛則脛毛美長外踝肥血多氣少則脛毛美短外踝皮堅而厚血少氣多則胻毛少外踝皮薄而軟血氣皆少則無毛外踝瘦無肉足太陽之上血氣盛則美眉眉有毫毛血多氣少則惡眉面多少理血少氣多則面多肉血氣和則美色足太陰之下血氣盛則跟肉滿踵堅氣少血多則瘦跟空血氣皆少則喜轉筋踵下痛手陽明之上血氣盛則髭美血少氣多則髭惡血氣皆少則無髭手陽明之下血氣盛則腋下毛美手魚肉以溫氣血皆少則手瘦以寒手少陽之上血氣盛則眉美以長耳色美血氣皆少則耳焦惡色手少陽之下血氣盛則手捲多肉以溫血氣皆少則寒以瘦氣少血多則瘦以多脈手太陽之上血氣盛則有多鬚面多肉以平血氣皆少則面瘦惡色手太陽之下血氣盛則掌肉充滿血氣皆少則掌瘦以寒黃帝曰二十五人者刺之有約乎歧伯曰美眉者足太陽之脈氣血多惡眉者血氣少其肥而澤者血氣有餘肥而不澤者氣有餘血不足瘦而無澤者氣血俱不足審察其形氣有餘不足而調之可以知逆順矣黃帝曰刺其諸陰陽奈何歧伯曰按其寸口人迎以調陰陽切循其經絡之凝澀結而不通者此於身皆為痛痺甚則不行故凝澀凝澀者致氣以溫之血和乃止其結絡者脈結血不和決之乃行故曰氣有餘於上者導而下之氣不足於上者推而休之其稽留不至者因而迎之必明於經隧乃能持之寒與熱爭者導而行之其宛陳血不結者則而豫之必先明知二十五人則血氣之所在左右上下刺約畢也
