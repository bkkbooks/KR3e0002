body:
  text: 營衛生會第十八營衛生會第十八黃帝問于歧伯曰人焉受氣陰陽焉會何氣為營何氣為衛營安從生衛于焉會老壯不同氣陰陽異位願聞其會歧伯答曰人受氣于穀穀入于胃以傳與肺五藏六府皆以受氣其清者為營濁者為衛營在脈中衛在脈外營周不休五十而復大會陰陽相貫如環無端衛氣行于陰二十五度行于陽二十五度分為晝夜故氣至陽而起至陰而止故曰日中而陽隴為重陽夜半而陰隴為重陰故太陰主內太陽主外各行二十五度分為晝夜夜半為陰隴夜半後而為陰衰平旦陰盡而陽受氣矣日中為陽隴日西而陽衰日入陽盡而陰受氣矣夜半而大會萬民皆臥命曰合陰平旦陰盡而陽受氣如是無已與天地同紀黃帝曰老人之不夜瞑者何氣使然少壯之人不晝瞑者何氣使然歧伯答曰壯者之氣血盛其肌肉滑氣道通營衛之行不失其常故晝精而夜瞑老者之氣血衰其肌肉枯氣道澀五藏之氣相搏其營氣衰少而衛氣內伐故晝不精夜不瞑黃帝曰願聞營衛之所行皆何道從來歧伯答曰營出于中焦衛出于下焦黃帝曰願聞三焦之所出歧伯答曰上焦出于胃上口並咽以上貫膈而布胸中走腋循太陰之分而行還至陽明上至舌下足陽明常與營俱行于陽二十五度行于陰亦二十五度一周也故五十度而復太會于手太陰矣黃帝曰人有熱飲食下胃其氣未定汗則出或出于面或出于背或出于身半其不循衛氣之道而出何也歧伯曰此外傷于風內開腠理毛蒸理泄衛氣走之固不得循其道此氣慓悍滑疾見開而出故不得從其道故命曰漏泄黃帝曰願聞中焦之所出歧伯答曰中焦亦並胃中出上焦之後此所受氣者泌糟粕蒸津液化其精微上注于肺脈乃化而為血以奉生身莫貴于此故獨得行于經隧命曰營氣黃帝曰夫血之與氣異名同類何謂也歧伯答曰營衛者精氣也血者神氣也故血之與氣異名同類焉故奪血者無汗奪汗者無血故人生有兩死而無兩生黃帝曰願聞下焦之所出歧伯答曰下焦者別回腸注于膀胱而滲入焉故水穀者常并居于胃中成糟粕而俱下于大腸而成下焦滲而俱下濟泌別汁循下焦而滲入膀胱焉黃帝曰人飲酒酒亦入胃穀未熟而小便獨先下何也歧伯答曰酒者熟穀之液也其氣悍以清故後穀而入先穀而液出焉黃帝曰善余聞上焦如霧中焦如漚下焦如瀆此之謂也
