body:
  text: 四時氣第十九四時氣第十九黃帝問于歧伯曰夫四時之氣各不同形百病之起皆有所生灸刺之道何者為定歧伯答曰四時之氣各有所在灸別之道得氣穴為定故春取經血脈分肉之間甚者深刺之間者淺刺之夏取盛經孫絡取分間絶皮膚秋取經腧邪在府取之合冬取井滎必深以留之溫瘧汗不出為五十九痏風㽷膚脹為五十七痏取皮膚之血者盡取之飧泄補三陰之上補陰陵泉皆久留之熱行乃止轉筋于陽治其陽轉筋于陰治其陰皆卒刺之徒㽷先取環谷下三寸以鈹針針之已刺而筒之而內之入而復之以盡其㽷必堅來緩則煩悗來急則安靜間日一刺之㽷盡乃止飲閉藥方刺之時徒飲之方飲無食方食無飲無食他食百三十五日著痺不去久寒不已卒取其三里骨為幹腸中不便取三里盛寫之虛補之癘風者素刺其腫上已刺以鋭針針其處按出其惡氣腫盡乃止常食方食無食他食腹中常鳴氣上衝胸喘不能久立邪在大腸刺盲之原巨虛上廉三里小腹控睪引腰脊上衝心邪在小腸者連睪系屬于脊貫肝肺絡心系氣盛則厥逆上衝腸胃燻肝散于盲結于臍故取之盲原以散之刺太陰以豫之取厥陰以下之取巨虛下廉以去之按其所過之經以調之善嘔嘔有苦長太息心中憺憺恐人將捕之邪在膽逆在胃膽液泄則口苦胃氣逆則嘔苦故曰嘔膽取三里以下胃氣逆則刺少陽血絡以閉膽逆卻調其虛實以去其邪飲食不下膈塞不通邪在胃脘在上脘則刺抑而下之在下脘則散而去之小腹痛腫不得小便邪在三焦約取之太陽大絡視其絡脈與厥陰小絡結而血者腫上及胃脘取三里覩其色察其以知其散復者視其目色以知病之存亡也一其形聽其動靜者持氣口人迎以視其脈堅且盛且滑者病日進脈軟者病將下諸經實者病三日已氣口候陰人迎候陽也
