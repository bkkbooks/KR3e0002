body:
  text: 五邪第二十五邪第二十邪在肺則病皮膚痛寒熱上氣喘汗出欬動肩背取之膺中外腧背三節五藏之傍以手疾按之快然乃刺之取之缺盆中以越之邪在肝則兩脅中痛寒中惡血在內行善掣節時腳腫取之行間以引脅下補三里以溫胃中取血脈以散惡血取耳間青脈以去其掣邪在脾胃則病肌肉痛陽氣有餘陰氣不足則熱中善饑陽氣不足陰氣有餘則寒中腸鳴腹痛陰陽俱有餘若俱不足則有寒有熱皆調于三里邪在腎則病骨痛陰痺陰痺者按之而不得腹脹腰痛大便難肩背頸項痛時眩耳之湧泉崑崙視有血者盡取之邪在心則病心痛喜悲時眩仆視有餘不足而調之其輸也
