body:
  text: 大惑論第八十大惑論第八十黃帝問於歧伯曰余嘗上於清泠之臺中階而顧匍匐而前則惑余私異之竊內怪之獨瞑獨視安心定氣久而不解獨博獨眩披髮長跪俯而視之後久之不已也卒然自上何氣使然歧伯對曰五藏六府之精氣皆上注於目而為之精精之窠為眼骨之精為瞳子筋之精為黑眼血之精為絡其窠氣之精為白眼肌肉之精為約束裹擷筋骨血氣之精而與脈并為系上屬於腦後出於項中故邪中於項因逢其身之虛其入深則隨眼系以入於腦入於腦則腦轉腦轉則引目系急目系急則目眩以轉矣邪其精其精所中不相比也則精散精散則視歧視歧見兩物目者五藏六府之精也營衛魂魄之所常營也神氣之所生也故神勞則魂魄散志意亂是故瞳子黑眼法於陰白眼赤脈法於陽也故陰陽合傳而精明也目者心使也心者神之舍也故神精亂而不轉卒然見非常處精神魂魄散不相得故曰惑也黃帝曰余疑其然余每之東苑未曾不惑去之則復余唯獨為東苑勞神乎何其異也歧伯曰不然也心有所喜神有所惡卒然相惑則精氣亂視誤故惑神移乃復是故間者為迷甚者為惑黃帝曰人之善忘者何氣使然歧伯曰上氣不足下氣有餘腸胃實而心肺虛虛則營衛留於下久之不以時上故善忘也黃帝曰人之善飢而不嗜食者何氣使然歧伯曰精氣并於脾熱氣留於胃胃熱則消穀穀消故善飢胃氣逆上則胃脘寒故不嗜食也黃帝曰病而不得臥者何氣使然歧伯曰衛氣不得入於陰常留於陽留於陽則陽氣滿陽氣滿則陽蹻盛不得入於陰則陰氣虛故目不瞑矣黃帝曰病目而不得視者何氣使然歧伯曰衛氣留於陰不得行於陽留於陰則陰氣盛陰氣盛則陰蹻滿不得入於陽則陽氣虛故目閉也黃帝曰人之多臥者何氣使然歧伯曰此人腸胃大而皮膚濕而分肉不解焉腸胃大則衛氣留久皮膚濕則分肉不解其行遲夫衛氣者晝日常行於陽夜行於陰故陽氣盡則臥陰氣盡則寤故腸胃大則衛氣行留久皮膚濕分肉不解則行遲留於陰也久其氣不清則欲瞑故多臥矣其腸胃小皮膚滑以緩分肉解利衛氣之留於陽也久故少瞑焉黃帝曰其非常經也卒然多臥者何氣使然歧伯曰邪氣留於上膲上膲閉而不通已食若飲湯衛氣留久於陰而不行故卒然多臥焉黃帝曰善治此諸邪奈何歧伯曰先其藏府誅其小過後調其氣盛者寫之虛者補之必先明知其形志之苦樂定乃取之
